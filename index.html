    try {
      for(const h of this.activeHazards) {
        const hazType = this.hazardTypes[h.type];
        if(hazType && hazType.render) {
          hazType.render(ctx, h);
        }
      }
    } catch(e) {}
  },

  checkPlayerCollision: function(px, py, ps) {
    try {
      const results = [];
      for(const h of this.activeHazards) {
        if(!h.active) continue;
        if(h.type === 'lightning_bolt') {
          if(h.warningTimer <= 0 && h.strikeTimer < h.strikeDuration) {
            for(const seg of h.segments) {
              const dx = px - seg.x;
              const dy = py - seg.y;
              if(dx*dx + dy*dy < (ps+h.width*2)*(ps+h.width*2)) {
                results.push({ type: h.type, damage: h.damage });
                break;
              }
            }
          }
        } else if(h.type === 'void_rift_hazard') {
          const dx = px - h.x;
          const dy = py - h.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < h.pullRange) {
            results.push({
              type: h.type,
              damage: dist < h.size ? h.damage : 0,
              pullX: -dx/dist * h.pullStrength * (1-dist/h.pullRange),
              pullY: -dy/dist * h.pullStrength * (1-dist/h.pullRange)
            });
          }
        } else if(h.type === 'fire_geyser') {
          if(h.warningTimer <= 0 && h.height > 0) {
            if(px > h.x - h.width/2 && px < h.x + h.width/2 &&
               py > h.y - h.height && py < h.y) {
              results.push({ type: h.type, damage: h.damage, burn: h.burnDuration });
            }
          }
        } else if(h.type === 'crystal_shard_rain') {
          for(const shard of h.shards) {
            const dx = px - shard.x;
            const dy = py - shard.y;
            if(dx*dx + dy*dy < (ps+shard.size)*(ps+shard.size)) {
              results.push({ type: h.type, damage: h.damage });
              break;
            }
          }
        } else if(h.type === 'asteroid_field' || h.type === 'ice_crystal') {
          const dx = px - h.x;
          const dy = py - h.y;
          if(dx*dx + dy*dy < (ps+h.size)*(ps+h.size)) {
            results.push({
              type: h.type,
              damage: h.damage,
              slow: h.slowAmount || 0,
              slowDuration: h.slowDuration || 0
            });
          }
        }
      }
      return results;
    } catch(e) { return []; }
  },

  clear: function() {
    this.activeHazards = [];
  }
};

  playerMaterials: {},

  addMaterial: function(materialId, count) {
    try {
      if(!this.materials[materialId]) return;
      this.playerMaterials[materialId] = (this.playerMaterials[materialId] || 0) + (count || 1);
    } catch(e) {}
  },

  canCraft: function(recipeId) {
    try {
      const recipe = this.recipes.find(r => r.id === recipeId);
      if(!recipe || !recipe.unlocked) return false;
      for(const ing of recipe.ingredients) {
        if((this.playerMaterials[ing.material] || 0) < ing.count) return false;
      }
      return true;
    } catch(e) { return false; }
  },

  craft: function(recipeId) {
    try {
      if(!this.canCraft(recipeId)) return null;
      const recipe = this.recipes.find(r => r.id === recipeId);
      if(!recipe) return null;
      for(const ing of recipe.ingredients) {
        this.playerMaterials[ing.material] -= ing.count;
      }
      return { ...recipe.result, name: recipe.name, id: recipe.id + '_' + Date.now() };
    } catch(e) { return null; }
  },

  unlockRecipe: function(recipeId) {
    try {
      const recipe = this.recipes.find(r => r.id === recipeId);
      if(recipe) recipe.unlocked = true;
    } catch(e) {}
  },

  renderCraftingScreen: function(ctx, W, H, scrollOffset) {
    try {
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#44ddaa';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CRAFTING', W/2, 40);

      // Materials bar
      ctx.fillStyle = '#111122';
      ctx.fillRect(10, 55, W-20, 50);
      ctx.strokeStyle = '#334455';
      ctx.strokeRect(10, 55, W-20, 50);

      let mx = 18;
      const matKeys = Object.keys(this.playerMaterials).filter(k => this.playerMaterials[k] > 0);
      ctx.font = '9px monospace';
      for(const matId of matKeys) {
        const mat = this.materials[matId];
        if(!mat || mx > W - 60) break;
        ctx.fillStyle = mat.color + '44';
        ctx.fillRect(mx, 62, 44, 36);
        ctx.strokeStyle = mat.color;
        ctx.lineWidth = 1;
        ctx.strokeRect(mx, 62, 44, 36);
        ctx.fillStyle = mat.color;
        ctx.textAlign = 'center';
        ctx.fillText(mat.icon, mx+22, 78);
        ctx.fillStyle = '#ffffff';
        ctx.fillText('x'+this.playerMaterials[matId], mx+22, 92);
        mx += 48;
      }
      ctx.textAlign = 'left';

      // Recipes
      const so = scrollOffset || 0;
      let ry = 115 - so;
      const tierColors = {
        common: '#aaaacc', uncommon: '#44cc88', rare: '#4488ff',
        epic: '#aa44ff', legendary: '#ffaa44'
      };

      for(const recipe of this.recipes) {
        if(ry > H - 70 || ry < 80) { ry += 90; continue; }

        const canMake = this.canCraft(recipe.id);
        const alpha = recipe.unlocked ? 1 : 0.4;

        ctx.globalAlpha = alpha;
        ctx.fillStyle = canMake ? '#112222' : '#111118';
        ctx.fillRect(15, ry, W-30, 80);
        ctx.strokeStyle = canMake ? '#44ddaa' : (tierColors[recipe.result.tier] || '#334455');
        ctx.lineWidth = canMake ? 2 : 1;
        ctx.strokeRect(15, ry, W-30, 80);

        // Recipe name
        ctx.fillStyle = tierColors[recipe.result.tier] || '#aaaacc';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(recipe.unlocked ? recipe.name : '??? LOCKED ???', 25, ry + 18);

        // Result info
        if(recipe.unlocked) {
          ctx.fillStyle = '#8888aa';
          ctx.font = '9px monospace';
          const statStr = Object.entries(recipe.result.stats || {}).map(([k,v]) => {
            if(k === 'element') return v.toUpperCase();
            return k + ':' + (typeof v === 'number' ? (v > 0 ? '+' : '') + v : v);
          }).join('  ');
          ctx.fillText(statStr, 25, ry + 32);

          // Ingredients
          let ix = 25;
          ctx.font = '8px monospace';
          for(const ing of recipe.ingredients) {
            const mat = this.materials[ing.material];
            if(!mat) continue;
            const have = this.playerMaterials[ing.material] || 0;
            const enough = have >= ing.count;
            ctx.fillStyle = enough ? mat.color : '#ff4444';
            ctx.fillText(mat.icon + ' ' + have + '/' + ing.count, ix, ry + 50);
            ix += 65;
          }

          // Craft button
          if(canMake) {
            ctx.fillStyle = '#44ddaa';
            ctx.fillRect(W-100, ry + 50, 70, 22);
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('CRAFT', W-65, ry + 64);
            ctx.textAlign = 'left';
          }
        }

        ctx.globalAlpha = 1;
        ry += 90;
      }

      // Back button
      ctx.fillStyle = '#334455';
      ctx.fillRect(W/2-60, H-55, 120, 38);
      ctx.strokeStyle = '#4488cc';
      ctx.strokeRect(W/2-60, H-55, 120, 38);
      ctx.fillStyle = '#88ccff';
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BACK', W/2, H-31);
      ctx.textAlign = 'left';
    } catch(e) {}
  }
};

      cooldown: 840,
      duration: 150,
      activate: function(player) {
        try {
          player.voidCollapseActive = true;
          player.voidCollapseTimer = 0;
          player.voidCollapseX = player.x;
          player.voidCollapseY = player.y - 100;
        } catch(e) {}
      },
      update: function(player, timer, enemies) {
        try {
          player.voidCollapseTimer = timer;
          const cx = player.voidCollapseX;
          const cy = player.voidCollapseY;
          const pullRange = 150;
          const pullStr = 2;

          if(enemies) {
            for(const e of enemies) {
              if(e && e.active) {
                const dx = cx - e.x;
                const dy = cy - e.y;
                const dist = Math.sqrt(dx*dx+dy*dy);
                if(dist < pullRange && dist > 0) {
                  const force = pullStr * (1 - dist/pullRange);
                  e.x += dx/dist * force;
                  e.y += dy/dist * force;
                  if(dist < 20) {
                    e.hp -= 5;
                  }
                }
              }
            }
          }
          if(timer >= 150) player.voidCollapseActive = false;
        } catch(e) {}
      },
      render: function(ctx, player) {
        try {
          if(!player.voidCollapseActive) return;
          const cx = player.voidCollapseX;
          const cy = player.voidCollapseY;
          const t = player.voidCollapseTimer;
          const lifeRatio = 1 - t/150;

          // Black hole center
          const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
          grad.addColorStop(0, `rgba(0,0,0,${0.9*lifeRatio})`);
          grad.addColorStop(0.5, `rgba(34,0,68,${0.5*lifeRatio})`);
          grad.addColorStop(1, `rgba(153,68,204,${0.1*lifeRatio})`);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(cx, cy, 40, 0, Math.PI*2);
          ctx.fill();

          // Accretion disk
          ctx.strokeStyle = `rgba(153,68,204,${0.4*lifeRatio})`;
          ctx.lineWidth = 2;
          for(let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.ellipse(cx, cy, 50+i*15, 15+i*5, t*0.02+i*0.5, 0, Math.PI*2);
            ctx.stroke();
          }

          // Pull range indicator
          ctx.strokeStyle = `rgba(100,50,150,${0.15*lifeRatio})`;
          ctx.lineWidth = 1;
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          ctx.arc(cx, cy, 150, 0, Math.PI*2);
          ctx.stroke();
          ctx.setLineDash([]);
        } catch(e) {}
      }
    }
  },

  getAbility: function(shipId) {
    return this.abilities[shipId] || this.abilities[0];
  }
};

      const pool = this.missionPool.filter(m => !this.completedMissions.includes(m.id));
      const shuffled = pool.sort(() => Math.random() - 0.5);
      const count = Math.min(this.maxActiveMissions, shuffled.length);

      for(let i = 0; i < count; i++) {
        this.activeMissions.push({
          ...shuffled[i],
          progress: 0,

          claimed: false
        });

        if(mission.completed || mission.type !== type) continue;
        mission.progress = Math.min(mission.target, (mission.progress||0) + (amount||1));
        if(mission.progress >= mission.target) {
          mission.completed = true;
          this.completedMissions.push(mission.id);
          if(typeof NotificationQueue !== 'undefined') {
            NotificationQueue.add('Mission Complete: ' + mission.name, '#44ff88');

      if(!mission || !mission.completed || mission.claimed) return null;

const BulletTrails = {

  addTrailPoint: function(x, y, color, size) {
    try {
      if(this.trails.length >= this.maxTrails) {
        this.trails[this.trails.length-1] = { x, y, color, size: size||2, alpha: 1 };
      } else {
        this.trails.push({ x, y, color, size: size||2, alpha: 1 });
      }
    } catch(e) {}
  },

  update: function() {
    try {
      for(let i = this.trails.length - 1; i >= 0; i--) {
        this.trails[i].alpha -= 0.06;
        if(this.trails[i].alpha <= 0) {
          this.trails.splice(i, 1);
        }
      }
    } catch(e) {}
  },

  render: function(ctx) {
    try {
      for(const t of this.trails) {
        ctx.fillStyle = t.color;
        ctx.globalAlpha = t.alpha;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.size * t.alpha, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  clear: function() {
    this.trails = [];
  }
};

// SECTION 99: PROGRESSIVE DIFFICULTY MODIFIERS
// Fine-grained difficulty adjustments based on player performance
// ============================================================
const AdaptiveDifficulty = {
  playerSkillRating: 50,
  recentDeaths: 0,
  recentWavesCleared: 0,
  damageAvoidedRatio: 0.5,
  averageCombo: 5,
  adjustmentTimer: 0,
  adjustmentInterval: 300,

  modifiers: {
    enemyHPMult: 1.0,
    enemyDamageMult: 1.0,
    enemySpeedMult: 1.0,
    enemyCountMult: 1.0,
    dropRateMult: 1.0,
    xpMult: 1.0,
    creditsMult: 1.0
  },

  recordDeath: function() {
    this.recentDeaths++;
    this.playerSkillRating = Math.max(10, this.playerSkillRating - 5);
  },

  recordWaveClear: function(combo, damageAvoided) {
    try {
      this.recentWavesCleared++;
      this.averageCombo = this.averageCombo * 0.8 + (combo||0) * 0.2;
      this.damageAvoidedRatio = this.damageAvoidedRatio * 0.8 + (damageAvoided||0.5) * 0.2;
      this.playerSkillRating = Math.min(100, this.playerSkillRating + 2);
    } catch(e) {}
  },

  update: function() {
    try {
      this.adjustmentTimer++;
      if(this.adjustmentTimer < this.adjustmentInterval) return;
      this.adjustmentTimer = 0;

      const skill = this.playerSkillRating / 50;

      if(this.recentDeaths > 2) {
        // Player struggling - make it easier
        this.modifiers.enemyHPMult = Math.max(0.6, this.modifiers.enemyHPMult - 0.1);
        this.modifiers.enemyDamageMult = Math.max(0.6, this.modifiers.enemyDamageMult - 0.1);
        this.modifiers.enemySpeedMult = Math.max(0.7, this.modifiers.enemySpeedMult - 0.05);
        this.modifiers.dropRateMult = Math.min(1.5, this.modifiers.dropRateMult + 0.1);
        this.modifiers.xpMult = Math.min(1.5, this.modifiers.xpMult + 0.1);
      } else if(this.recentWavesCleared > 3 && this.averageCombo > 20 && this.damageAvoidedRatio > 0.8) {
        // Player dominating - ramp up
        this.modifiers.enemyHPMult = Math.min(2.0, this.modifiers.enemyHPMult + 0.1);
        this.modifiers.enemyDamageMult = Math.min(1.8, this.modifiers.enemyDamageMult + 0.05);
        this.modifiers.enemySpeedMult = Math.min(1.5, this.modifiers.enemySpeedMult + 0.05);
        this.modifiers.enemyCountMult = Math.min(1.5, this.modifiers.enemyCountMult + 0.05);
        this.modifiers.creditsMult = Math.min(2.0, this.modifiers.creditsMult + 0.1);
      }
      // else maintain current difficulty

      this.recentDeaths = 0;
      this.recentWavesCleared = 0;
    } catch(e) {}
  },

  applyToEnemy: function(enemy) {
    try {
      enemy.hp = Math.floor((enemy.hp||30) * this.modifiers.enemyHPMult);
      enemy.speed = (enemy.speed||1) * this.modifiers.enemySpeedMult;
      enemy.damage = Math.floor((enemy.damage||10) * this.modifiers.enemyDamageMult);
    } catch(e) {}
  },

  getDropMultiplier: function() {
    return this.modifiers.dropRateMult * this.modifiers.creditsMult;
  },

  getXPMultiplier: function() {
    return this.modifiers.xpMult;
  },

  reset: function() {
    this.playerSkillRating = 50;
    this.recentDeaths = 0;
    this.recentWavesCleared = 0;
    this.modifiers = {
      enemyHPMult: 1.0, enemyDamageMult: 1.0, enemySpeedMult: 1.0,
      enemyCountMult: 1.0, dropRateMult: 1.0, xpMult: 1.0, creditsMult: 1.0
    };
  }
};

// SECTION 101: BACKGROUND STAR FIELD SYSTEM
// Enhanced multi-layer starfield with nebula effects
// ============================================================
const StarField = {
  layers: [],
  initialized: false,

  init: function(W, H) {
    try {
      this.layers = [];
      // Layer 1: Far stars (slow)
      const far = [];
      for(let i = 0; i < 80; i++) {
        far.push({
          x: Math.random()*W, y: Math.random()*H,
          size: 0.5+Math.random()*0.8, speed: 0.2+Math.random()*0.3,
          brightness: 0.3+Math.random()*0.4,
          twinkle: Math.random()*Math.PI*2, twinkleSpeed: 0.01+Math.random()*0.03
        });
      }
      this.layers.push(far);

      // Layer 2: Mid stars
      const mid = [];
      for(let i = 0; i < 50; i++) {
        mid.push({
          x: Math.random()*W, y: Math.random()*H,
          size: 0.8+Math.random()*1.2, speed: 0.5+Math.random()*0.5,
          brightness: 0.4+Math.random()*0.4,
          twinkle: Math.random()*Math.PI*2, twinkleSpeed: 0.02+Math.random()*0.04,
          color: ['#ffffff','#aaccff','#ffccaa','#aaffcc'][Math.floor(Math.random()*4)]
        });
      }
      this.layers.push(mid);

      // Layer 3: Close stars (fast)
      const close = [];
      for(let i = 0; i < 25; i++) {
        close.push({
          x: Math.random()*W, y: Math.random()*H,
          size: 1+Math.random()*2, speed: 1+Math.random()*1,
          brightness: 0.5+Math.random()*0.5,
          twinkle: Math.random()*Math.PI*2, twinkleSpeed: 0.03+Math.random()*0.05,
          color: ['#ffffff','#88bbff','#ffbb88','#88ffbb'][Math.floor(Math.random()*4)]
        });
      }
      this.layers.push(close);

      this.initialized = true;
    } catch(e) {}
  },

  update: function(W, H) {
    try {
      if(!this.initialized) return;
      for(const layer of this.layers) {
        for(const star of layer) {
          star.y += star.speed;
          star.twinkle += star.twinkleSpeed;
          if(star.y > H + 5) {
            star.y = -5;
            star.x = Math.random() * W;
          }
        }
      }
    } catch(e) {}
  },

  render: function(ctx, W, H) {
    try {
      if(!this.initialized) return;
      for(let l = 0; l < this.layers.length; l++) {
        for(const star of this.layers[l]) {
          const twinkleAlpha = star.brightness * (0.7 + Math.sin(star.twinkle)*0.3);
          ctx.fillStyle = star.color || '#ffffff';
          ctx.globalAlpha = twinkleAlpha;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI*2);
          ctx.fill();

          // Cross sparkle for bright close stars
          if(l === 2 && star.brightness > 0.7) {
            ctx.globalAlpha = twinkleAlpha * 0.3;
            ctx.fillRect(star.x - star.size*3, star.y - 0.5, star.size*6, 1);
            ctx.fillRect(star.x - 0.5, star.y - star.size*3, 1, star.size*6);
          }
        }
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  }
};

// ============================================================
// SECTION 102: GESTURE RECOGNITION FOR MOBILE
// Advanced touch gesture detection
// ============================================================
const GestureRecognizer = {
  touches: [],
  lastTap: 0,
  lastTapX: 0,
  lastTapY: 0,
  swipeThreshold: 30,
  doubleTapThreshold: 300,
  longPressThreshold: 500,
  longPressTimer: null,
  pinchStartDist: 0,
  gestureCallbacks: {},

  on: function(gesture, callback) {
    this.gestureCallbacks[gesture] = callback;
  },

  emit: function(gesture, data) {
    try {
      if(this.gestureCallbacks[gesture]) {
        this.gestureCallbacks[gesture](data);
      }
    } catch(e) {}
  },

  onTouchStart: function(e) {
    try {
      const touch = e.touches[0];
      this.touches.push({
        id: touch.identifier,
        startX: touch.clientX,
        startY: touch.clientY,
        currentX: touch.clientX,
        currentY: touch.clientY,
        startTime: Date.now()
      });

      // Long press detection
      if(this.longPressTimer) clearTimeout(this.longPressTimer);
      this.longPressTimer = setTimeout(() => {
        if(this.touches.length === 1) {
          const t = this.touches[0];
          const dx = t.currentX - t.startX;
          const dy = t.currentY - t.startY;
          if(Math.abs(dx) < 15 && Math.abs(dy) < 15) {
            this.emit('longpress', { x: t.startX, y: t.startY });
          }
        }
      }, this.longPressThreshold);

      // Pinch detection
      if(e.touches.length === 2) {
        const t1 = e.touches[0];
        const t2 = e.touches[1];
        this.pinchStartDist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
      }
    } catch(e) {}
  },

  onTouchMove: function(e) {
    try {
      for(const touch of e.changedTouches) {
        const tracked = this.touches.find(t => t.id === touch.identifier);
        if(tracked) {
          tracked.currentX = touch.clientX;
          tracked.currentY = touch.clientY;
        }
      }

      // Pinch
      if(e.touches.length === 2 && this.pinchStartDist > 0) {
        const t1 = e.touches[0];
        const t2 = e.touches[1];
        const dist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
        const scale = dist / this.pinchStartDist;
        this.emit('pinch', { scale: scale });
      }
    } catch(e) {}
  },

  onTouchEnd: function(e) {
    try {
      if(this.longPressTimer) clearTimeout(this.longPressTimer);

      for(const touch of e.changedTouches) {
        const tracked = this.touches.find(t => t.id === touch.identifier);
        if(!tracked) continue;

        const dx = touch.clientX - tracked.startX;
        const dy = touch.clientY - tracked.startY;
        const dist = Math.hypot(dx, dy);
        const duration = Date.now() - tracked.startTime;

        if(dist < this.swipeThreshold) {
          // Tap
          const now = Date.now();
          const tapDist = Math.hypot(touch.clientX - this.lastTapX, touch.clientY - this.lastTapY);
          if(now - this.lastTap < this.doubleTapThreshold && tapDist < 30) {
            this.emit('doubletap', { x: touch.clientX, y: touch.clientY });
          } else {
            this.emit('tap', { x: touch.clientX, y: touch.clientY });
          }
          this.lastTap = now;
          this.lastTapX = touch.clientX;
          this.lastTapY = touch.clientY;
        } else if(duration < 500) {
          // Swipe
          const angle = Math.atan2(dy, dx);
          let direction = 'right';
          if(angle > -Math.PI/4 && angle < Math.PI/4) direction = 'right';
          else if(angle > Math.PI/4 && angle < 3*Math.PI/4) direction = 'down';
          else if(angle > -3*Math.PI/4 && angle < -Math.PI/4) direction = 'up';
          else direction = 'left';

          this.emit('swipe', {
            direction: direction,
            startX: tracked.startX, startY: tracked.startY,
            endX: touch.clientX, endY: touch.clientY,
            velocity: dist / duration
          });
        }

        this.touches = this.touches.filter(t => t.id !== touch.identifier);
      }

      if(e.touches.length < 2) this.pinchStartDist = 0;
    } catch(e) {}
  }
};

const ReplaySystem = {
  recording: false,
  frames: [],
  maxFrames: 18000, // ~5 minutes at 60fps
  playback: false,
  playbackFrame: 0,
  playbackSpeed: 1,

  startRecording: function() {
    this.recording = true;
    this.frames = [];
  },

  stopRecording: function() {
    this.recording = false;
  },

  recordFrame: function(playerState, enemies, bullets, particles) {
    try {
      if(!this.recording) return;
      if(this.frames.length >= this.maxFrames) {
        this.frames.shift(); // Remove oldest frame
      }

      this.frames.push({
        player: {
          x: safeNum(playerState.x),
          y: safeNum(playerState.y),
          hp: safeNum(playerState.hp),
          shield: safeNum(playerState.shield),
          ship: safeNum(playerState.ship),
          element: safeStr(playerState.element, 'neutral')
        },
        enemies: enemies.filter(e => e && e.active).slice(0, 30).map(e => ({
          x: safeNum(e.x), y: safeNum(e.y),
          type: safeStr(e.type), hp: safeNum(e.hp),
          size: safeNum(e.s || e.size, 12)
        })),
        score: safeNum(playerState.score),
        wave: safeNum(playerState.wave),
        combo: safeNum(playerState.combo),
        time: Date.now()
      });
    } catch(e) {}
  },

  startPlayback: function() {
    if(this.frames.length === 0) return;
    this.playback = true;
    this.playbackFrame = 0;
  },

  stopPlayback: function() {
    this.playback = false;
  },

  getPlaybackFrame: function() {
    try {
      if(!this.playback) return null;
      if(this.playbackFrame >= this.frames.length) {
        this.playback = false;
        return null;
      }
      const frame = this.frames[this.playbackFrame];
      this.playbackFrame += this.playbackSpeed;
      return frame;
    } catch(e) { return null; }
  },

  renderPlaybackOverlay: function(ctx, W, H) {

      ctx.fillRect(40, H-25, W-80, 6);
      ctx.fillStyle = '#ff4444';

      ctx.font = '9px monospace';

      ctx.fillText('TAP TO EXIT', W/2, H-32);

    } catch(e) {}
  }
};

// SECTION 105: SPRITE ANIMATION SYSTEM
// Frame-based animations for complex visual effects
// ============================================================
const AnimationSystem = {
  animations: {},
  activeAnimations: [],
  maxActive: 40,

  define: function(name, frameCount, frameDuration, loop) {
    this.animations[name] = {
      name: name,
      frameCount: frameCount,
      frameDuration: frameDuration || 4,
      loop: loop !== false
    };
  },

  play: function(name, x, y, scale, onComplete) {
    try {
      const def = this.animations[name];
      if(!def) return null;

      if(this.activeAnimations.length >= this.maxActive) {
        // Remove oldest non-looping
        const idx = this.activeAnimations.findIndex(a => !a.loop);
        if(idx >= 0) this.activeAnimations.splice(idx, 1);
        else return null;
      }

      const anim = {
        name: name,
        x: x, y: y,
        scale: scale || 1,
        frame: 0,
        timer: 0,
        frameDuration: def.frameDuration,
        frameCount: def.frameCount,
        loop: def.loop,
        active: true,
        onComplete: onComplete
      };
      this.activeAnimations.push(anim);
      return anim;
    } catch(e) { return null; }
  },

  update: function() {
    try {
      for(let i = this.activeAnimations.length - 1; i >= 0; i--) {
        const anim = this.activeAnimations[i];
        if(!anim.active) {
          this.activeAnimations.splice(i, 1);
          continue;
        }

        anim.timer++;
        if(anim.timer >= anim.frameDuration) {
          anim.timer = 0;
          anim.frame++;
          if(anim.frame >= anim.frameCount) {
            if(anim.loop) {
              anim.frame = 0;
            } else {
              anim.active = false;
              if(anim.onComplete) anim.onComplete();
              this.activeAnimations.splice(i, 1);
            }
          }
        }
      }
    } catch(e) {}
  },

  getFrame: function(anim) {
    if(!anim || !anim.active) return -1;
    return anim.frame;
  },

  stop: function(anim) {
    if(anim) anim.active = false;
  },

  clearAll: function() {
    this.activeAnimations = [];
  }
};

// Procedural animation renderer
const AnimRenderer = {
  render: function(ctx, anim) {
    try {
      if(!anim || !anim.active) return;
      const f = anim.frame;
      const t = f / anim.frameCount;
      const s = anim.scale;
      const x = anim.x;
      const y = anim.y;

      switch(anim.name) {
        case 'explosion_small':
          this.renderExplosion(ctx, x, y, s*15, t, '#ff6644', '#ffaa44');
          break;
        case 'explosion_medium':
          this.renderExplosion(ctx, x, y, s*25, t, '#ff4422', '#ff8844');
          break;
        case 'explosion_large':
          this.renderExplosion(ctx, x, y, s*40, t, '#ff2200', '#ffcc44');
          break;
        case 'shield_break':
          this.renderShieldBreak(ctx, x, y, s*20, t);
          break;
        case 'level_up':
          this.renderLevelUp(ctx, x, y, s*30, t);
          break;
        case 'pickup_sparkle':
          this.renderSparkle(ctx, x, y, s*12, t);
          break;
        case 'heal_pulse':
          this.renderHealPulse(ctx, x, y, s*20, t);
          break;
        case 'combo_burst':
          this.renderComboBurst(ctx, x, y, s*25, t);
          break;
        case 'electric_arc':
          this.renderElectricArc(ctx, x, y, s*20, t);
          break;
        case 'frost_shatter':
          this.renderFrostShatter(ctx, x, y, s*18, t);
          break;
        case 'void_implode':
          this.renderVoidImplode(ctx, x, y, s*22, t);
          break;
      }
    } catch(e) {}
  },

  renderExplosion: function(ctx, x, y, maxR, t, innerColor, outerColor) {
    try {
      const r = maxR * (t < 0.3 ? t/0.3 : 1);
      const alpha = t < 0.3 ? 1 : 1 - (t-0.3)/0.7;
      ctx.globalAlpha = alpha;

      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.3, innerColor);
      grad.addColorStop(0.7, outerColor);
      grad.addColorStop(1, outerColor + '00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fill();

      // Sparks
      if(t < 0.5) {
        for(let i = 0; i < 8; i++) {
          const a = i * Math.PI / 4 + t * 2;
          const sr = r * (0.8 + t);
          ctx.fillStyle = '#ffcc44';
          ctx.beginPath();
          ctx.arc(x + Math.cos(a)*sr, y + Math.sin(a)*sr, 2*(1-t), 0, Math.PI*2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  renderShieldBreak: function(ctx, x, y, maxR, t) {
    try {
      const alpha = 1 - t;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#4488ff';
      ctx.lineWidth = 3 * (1-t);
      const segments = 8;
      for(let i = 0; i < segments; i++) {
        const a = i * Math.PI * 2 / segments;
        const r = maxR * (1 + t * 2);
        const dx = Math.cos(a) * r;
        const dy = Math.sin(a) * r;
        ctx.beginPath();
        ctx.arc(x + dx, y + dy, 4*(1-t), 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  renderLevelUp: function(ctx, x, y, maxR, t) {
    try {
      // Rising rings
      for(let i = 0; i < 3; i++) {
        const ringT = Math.max(0, t - i * 0.15);
        if(ringT <= 0) continue;
        const alpha = Math.max(0, 1 - ringT * 1.5);
        const r = maxR * ringT * 2;
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#ffcc44';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y - ringT * 30, r, 0, Math.PI*2);
        ctx.stroke();
      }
      // Central flash
      if(t < 0.3) {
        ctx.globalAlpha = 1 - t/0.3;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(x, y, maxR * 0.5 * (1-t/0.3), 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  renderSparkle: function(ctx, x, y, maxR, t) {
    try {
      ctx.globalAlpha = 1 - t;
      for(let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3 + t * 3;
        const r = maxR * t;
        ctx.fillStyle = '#ffee88';
        ctx.beginPath();
        const sx = x + Math.cos(a)*r;
        const sy = y + Math.sin(a)*r;
        ctx.moveTo(sx, sy-3*(1-t));
        ctx.lineTo(sx+2*(1-t), sy);
        ctx.lineTo(sx, sy+3*(1-t));
        ctx.lineTo(sx-2*(1-t), sy);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  renderHealPulse: function(ctx, x, y, maxR, t) {
    try {
      ctx.globalAlpha = (1-t)*0.5;
      const r = maxR * t * 2;
      ctx.strokeStyle = '#44ff88';
      ctx.lineWidth = 2 * (1-t);
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.stroke();
      // Cross
      if(t < 0.5) {
        ctx.globalAlpha = 1 - t*2;
        ctx.fillStyle = '#44ff88';
        ctx.fillRect(x-2, y-8*(1-t), 4, 16*(1-t));
        ctx.fillRect(x-8*(1-t), y-2, 16*(1-t), 4);
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  renderComboBurst: function(ctx, x, y, maxR, t) {
    try {
      ctx.globalAlpha = 1-t;
      // Radiating lines
      for(let i = 0; i < 12; i++) {
        const a = i * Math.PI / 6;
        const r1 = maxR * t;
        const r2 = maxR * t * 1.5;
        ctx.strokeStyle = i % 2 === 0 ? '#ffcc44' : '#ff8844';
        ctx.lineWidth = 2 * (1-t);
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(a)*r1, y + Math.sin(a)*r1);
        ctx.lineTo(x + Math.cos(a)*r2, y + Math.sin(a)*r2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  renderElectricArc: function(ctx, x, y, maxR, t) {
    try {
      ctx.globalAlpha = 1-t;
      ctx.strokeStyle = '#ffee44';
      ctx.lineWidth = 2 * (1-t);
      for(let i = 0; i < 5; i++) {
        const a = Math.random() * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(x, y);
        const midX = x + Math.cos(a) * maxR * 0.5 + (Math.random()-0.5)*10;
        const midY = y + Math.sin(a) * maxR * 0.5 + (Math.random()-0.5)*10;
        ctx.lineTo(midX, midY);
        ctx.lineTo(x + Math.cos(a)*maxR, y + Math.sin(a)*maxR);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  renderFrostShatter: function(ctx, x, y, maxR, t) {
    try {
      ctx.globalAlpha = 1-t;
      for(let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4 + t;
        const r = maxR * t * 2;
        ctx.fillStyle = '#88ccff';
        ctx.save();
        ctx.translate(x + Math.cos(a)*r, y + Math.sin(a)*r);
        ctx.rotate(a + t*3);
        ctx.fillRect(-3*(1-t), -5*(1-t), 6*(1-t), 10*(1-t));
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  renderVoidImplode: function(ctx, x, y, maxR, t) {
    try {
      const invT = 1-t;
      // Collapsing ring
      ctx.globalAlpha = invT;
      ctx.strokeStyle = '#9944cc';
      ctx.lineWidth = 3 * invT;
      ctx.beginPath();
      ctx.arc(x, y, maxR * invT * 2, 0, Math.PI*2);
      ctx.stroke();
      // Pulling particles
      for(let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3 + t * 4;
        const r = maxR * invT * 1.5;
        ctx.fillStyle = '#bb66ee';
        ctx.beginPath();
        ctx.arc(x + Math.cos(a)*r, y + Math.sin(a)*r, 3*invT, 0, Math.PI*2);
        ctx.fill();
      }
      // Central void
      if(t > 0.5) {
        const voidAlpha = (t-0.5)*2;
        ctx.fillStyle = `rgba(0,0,0,${voidAlpha * 0.8})`;
        ctx.beginPath();
        ctx.arc(x, y, maxR*0.3, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  }
};

      const wave = player.wave || 1;
      if(Math.random() < 0.15) {
        const materials = Object.keys(CraftingSystem.materials);
        const matRarityWeights = { common: 50, uncommon: 30, rare: 15, epic: 4, legendary: 1 };
        const filtered = materials.filter(m => {
          const mat = CraftingSystem.materials[m];
          const weight = matRarityWeights[mat.rarity] || 0;
          return Math.random() * 100 < weight;
        });
        if(filtered.length > 0) {
          const mat = filtered[Math.floor(Math.random()*filtered.length)];
          CraftingSystem.addMaterial(mat, 1);
        }
      }

      // Adaptive difficulty tracking
      AdaptiveDifficulty.recordWaveClear(player.combo || 0, player.damageAvoided || 0.5);

      // Spawn death particles
      const bp = BiomeParticles[biome];
      if(bp && bp.death) bp.death(enemy.x, enemy.y);

      // Play animation
      AnimationSystem.play('explosion_small', enemy.x, enemy.y, 1);
    } catch(e) {}
  },

  onBossKill: function(bossId, player) {
    try {
      MissionSystem.updateProgress('boss_kill', 1);
      const drops = LootTables.getDropsForBoss(bossId);
      AnimationSystem.play('explosion_large', player.x || 210, (player.y || 600) - 200, 2);
      if(typeof ExtendedAudio !== 'undefined') ExtendedAudio.playVictoryFanfare();
      return drops;
    } catch(e) { return []; }
  },

  onPlayerDeath: function(player) {
    try {
      AdaptiveDifficulty.recordDeath();
      ReplaySystem.stopRecording();
      const rank = RankSystem.calculateRank({
        score: player.score || 0,
        maxCombo: player.maxCombo || 0,
        wavesCleared: player.wave || 1,
        accuracy: player.accuracy || 0.5,
        deaths: 1
      });
      Leaderboard.addEntry(
        player.score || 0, player.wave || 1,
        player.ship || 0, player.element || 'neutral',
        player.gameTime || 0, rank
      );
      return rank;
    } catch(e) { return 'D'; }
  },

  onWaveClear: function(wave, player) {
    try {
      MissionSystem.updateProgress('survive_waves', 1);
      MissionSystem.updateProgress('score', player.score || 0);
      AdaptiveDifficulty.recordWaveClear(player.combo || 0, 0.7);
    } catch(e) {}
  },

  onComboReached: function(combo) {
    try {
      MissionSystem.updateProgress('combo', combo);
    } catch(e) {}
  }
};

  activeTrail: 'default',
  trailPoints: [],
  maxPoints: 50,
  colorIndex: 0,

  setTrail: function(trailId) {
    if(this.trails[trailId]) this.activeTrail = trailId;
  },

  update: function(x, y) {
    try {
      const trail = this.trails[this.activeTrail];
      if(!trail) return;

      for(let i = 0; i < trail.particles; i++) {
        const offsetX = (Math.random() - 0.5) * trail.spread;
        const offsetY = Math.random() * 3 + 2;
        let color = trail.color;

        if(trail.colorCycle && trail.colors) {
          this.colorIndex = (this.colorIndex + 0.05) % trail.colors.length;
          color = trail.colors[Math.floor(this.colorIndex)];
        } else if(trail.secondaryColor && Math.random() > 0.5) {
          color = trail.secondaryColor;
        }

        this.trailPoints.push({
          x: x + offsetX,
          y: y + offsetY,
          vx: trail.zigzag ? (Math.random()-0.5)*2 : (Math.random()-0.5)*0.3,
          vy: trail.pulse ? 0.5 + Math.random()*0.5 : 0.3 + Math.random()*0.3,
          size: trail.size * (0.8 + Math.random()*0.4),
          color: color,
          alpha: 1,
          lifetime: trail.lifetime,
          timer: 0,
          sparkle: trail.sparkle || false,
          angular: trail.angular || false,
          angle: Math.random() * Math.PI * 2
        });
      }

      // Trim old points
      while(this.trailPoints.length > this.maxPoints) {
        this.trailPoints.shift();
      }

      // Update existing points
      for(let i = this.trailPoints.length - 1; i >= 0; i--) {
        const p = this.trailPoints[i];
        p.x += p.vx;
        p.y += p.vy;
        p.timer++;
        p.alpha = 1 - (p.timer / p.lifetime);
        if(p.angular) p.angle += 0.1;
        if(p.timer >= p.lifetime) {
          this.trailPoints.splice(i, 1);
        }
      }
    } catch(e) {}
  },

    try {
      for(const p of this.trailPoints) {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;

        if(p.angular) {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillRect(-p.size*p.alpha, -p.size*p.alpha*0.5, p.size*p.alpha*2, p.size*p.alpha);
          ctx.restore();
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.alpha, 0, Math.PI * 2);
          ctx.fill();
        }

        if(p.sparkle && Math.random() > 0.7) {
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(p.x + (Math.random()-0.5)*4, p.y + (Math.random()-0.5)*4, 1, 0, Math.PI*2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    } catch(e) {}
  },

  clear: function() {
    this.trailPoints = [];
  }
};

// ============================================================
// SECTION 111: FULL GAME STATE VALIDATOR
// Validates all game state to prevent NaN/undefined crashes
// ============================================================
const GameStateValidator = {
  validate: function(state) {
    try {
      if(!state) return this.getDefaultState();

      state.score = safeNum(state.score);
      state.wave = safeNum(state.wave, 1);
      state.combo = safeNum(state.combo);
      state.maxCombo = safeNum(state.maxCombo);
      state.credits = safeNum(state.credits);
      state.xp = safeNum(state.xp);
      state.level = safeNum(state.level, 1);
      state.gameTime = safeNum(state.gameTime);
      state.kills = safeNum(state.kills);

      if(state.player) {
        state.player.x = safeNum(state.player.x, 210);
        state.player.y = safeNum(state.player.y, 600);
        state.player.hp = safeNum(state.player.hp, 100);
        state.player.maxHP = safeNum(state.player.maxHP, 100);
        state.player.shield = safeNum(state.player.shield);
        state.player.maxShield = safeNum(state.player.maxShield, 50);
        state.player.speed = safeNum(state.player.speed, 4);
        state.player.damage = safeNum(state.player.damage, 8);
        state.player.ship = safeNum(state.player.ship);
        state.player.element = safeStr(state.player.element, 'neutral');
        state.player.damageMultiplier = safeNum(state.player.damageMultiplier, 1);
        state.player.speedMultiplier = safeNum(state.player.speedMultiplier, 1);
        state.player.critChance = safeNum(state.player.critChance, 0.05);
        state.player.xpMultiplier = safeNum(state.player.xpMultiplier, 1);

        // Clamp values
        state.player.x = Math.max(0, Math.min(420, state.player.x));
        state.player.y = Math.max(0, Math.min(750, state.player.y));
        state.player.hp = Math.max(0, Math.min(state.player.maxHP, state.player.hp));
        state.player.shield = Math.max(0, Math.min(state.player.maxShield, state.player.shield));
        state.player.speed = Math.max(1, Math.min(15, state.player.speed));
        state.player.damage = Math.max(1, Math.min(999, state.player.damage));
      }

      return state;
    } catch(e) { return this.getDefaultState(); }
  },

  getDefaultState: function() {
    return {
      score: 0, wave: 1, combo: 0, maxCombo: 0,
      credits: 0, xp: 0, level: 1, gameTime: 0, kills: 0,
      player: {
        x: 210, y: 600, hp: 100, maxHP: 100,
        shield: 50, maxShield: 50, speed: 4, damage: 8,
        ship: 0, element: 'neutral', damageMultiplier: 1,
        speedMultiplier: 1, critChance: 0.05, xpMultiplier: 1
      }
    };
  },

  validateEnemy: function(enemy) {
    try {
      if(!enemy) return null;
      enemy.x = safeNum(enemy.x);
      enemy.y = safeNum(enemy.y);
      enemy.hp = safeNum(enemy.hp, 30);
      enemy.maxHP = safeNum(enemy.maxHP, enemy.hp);
      enemy.speed = safeNum(enemy.speed, 1);
      enemy.s = safeNum(enemy.s || enemy.size, 12);
      enemy.damage = safeNum(enemy.damage, 10);
      return enemy;
    } catch(e) { return null; }
  },

  validateBullet: function(bullet) {
    try {
      if(!bullet) return null;
      bullet.x = safeNum(bullet.x);
      bullet.y = safeNum(bullet.y);
      bullet.vx = safeNum(bullet.vx);
      bullet.vy = safeNum(bullet.vy, -5);
      bullet.damage = safeNum(bullet.damage, 5);
      bullet.s = safeNum(bullet.s || bullet.size, 3);
      return bullet;
    } catch(e) { return null; }
  }
};

// ============================================================
// SECTION 113: ENDGAME CONTENT - VOID ESSENCE SYSTEM
// Post-game meta currency and prestige system
// ============================================================
const VoidEssenceSystem = {
  essence: 0,
  totalEarned: 0,
  prestigeLevel: 0,
  
  permanentUpgrades: {
    starting_hp: { name: 'Fortified Hull', maxLevel: 10, cost: [5,10,20,35,55,80,110,150,200,300], effect: 10, desc: '+10 starting HP per level' },
    starting_shield: { name: 'Shield Core', maxLevel: 10, cost: [5,10,20,35,55,80,110,150,200,300], effect: 5, desc: '+5 starting shield per level' },
    starting_damage: { name: 'Weapon Calibration', maxLevel: 10, cost: [8,15,25,40,60,90,125,170,230,350], effect: 1, desc: '+1 starting damage per level' },
    crit_chance: { name: 'Precision Optics', maxLevel: 5, cost: [15,30,60,120,250], effect: 0.02, desc: '+2% crit chance per level' },
    xp_gain: { name: 'Neural Link', maxLevel: 5, cost: [10,25,50,100,200], effect: 0.1, desc: '+10% XP gain per level' },
    credit_gain: { name: 'Salvage Module', maxLevel: 5, cost: [10,25,50,100,200], effect: 0.1, desc: '+10% credit gain per level' },
    dash_cooldown: { name: 'Phase Drive', maxLevel: 5, cost: [12,28,55,110,220], effect: -10, desc: '-10% dash cooldown per level' },
    start_wave: { name: 'Warp Core', maxLevel: 5, cost: [20,50,100,200,500], effect: 1, desc: 'Start +1 wave ahead per level' },
    drop_rate: { name: 'Magnetizer', maxLevel: 5, cost: [15,35,70,140,280], effect: 0.05, desc: '+5% drop rate per level' },
    revive: { name: 'Phoenix Protocol', maxLevel: 3, cost: [50,150,400], effect: 1, desc: '+1 revive per run per level' }
  },

  upgradeLevels: {},

  addEssence: function(amount) {
    this.essence += safeNum(amount);
    this.totalEarned += safeNum(amount);
  },

  getUpgradeLevel: function(id) {
    return safeNum(this.upgradeLevels[id]);
  },

  getUpgradeCost: function(id) {
    try {
      const upgrade = this.permanentUpgrades[id];
      if(!upgrade) return Infinity;
      const level = this.getUpgradeLevel(id);
      if(level >= upgrade.maxLevel) return Infinity;
      return upgrade.cost[level] || Infinity;
    } catch(e) { return Infinity; }
  },

  purchaseUpgrade: function(id) {
    try {
      const cost = this.getUpgradeCost(id);
      if(this.essence < cost) return false;
      this.essence -= cost;
      this.upgradeLevels[id] = (this.upgradeLevels[id] || 0) + 1;
      this.save();
      return true;
    } catch(e) { return false; }
  },

  getBonus: function(id) {
    try {
      const upgrade = this.permanentUpgrades[id];
      if(!upgrade) return 0;
      return upgrade.effect * this.getUpgradeLevel(id);
    } catch(e) { return 0; }
  },

  applyBonuses: function(player) {
    try {
      player.maxHP += this.getBonus('starting_hp');
      player.hp = player.maxHP;
      player.maxShield += this.getBonus('starting_shield');
      player.shield = player.maxShield;
      player.damage += this.getBonus('starting_damage');
      player.critChance = (player.critChance || 0.05) + this.getBonus('crit_chance');
      player.xpMultiplier = (player.xpMultiplier || 1) + this.getBonus('xp_gain');
    } catch(e) {}
  },

  prestige: function() {
    try {
      if(this.totalEarned < 100) return false;
      this.prestigeLevel++;
      // Reset upgrades but give a permanent multiplier
      this.upgradeLevels = {};
      this.essence = Math.floor(this.totalEarned * 0.1);
      this.totalEarned = this.essence;
      this.save();
      return true;
    } catch(e) { return false; }
  },

  save: function() {
    try {
      localStorage.setItem('voidrift_essence', JSON.stringify({
        essence: this.essence,
        totalEarned: this.totalEarned,
        prestigeLevel: this.prestigeLevel,
        upgradeLevels: this.upgradeLevels
      }));
    } catch(e) {}
  },

  load: function() {
    try {
      const data = JSON.parse(localStorage.getItem('voidrift_essence'));
      if(data) {
        this.essence = safeNum(data.essence);
        this.totalEarned = safeNum(data.totalEarned);
        this.prestigeLevel = safeNum(data.prestigeLevel);
        this.upgradeLevels = data.upgradeLevels || {};
      }
    } catch(e) {}
  },

  renderPrestigeScreen: function(ctx, W, H) {
    try {
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#9944cc';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('VOID ESSENCE', W/2, 40);

      // Essence counter
      ctx.fillStyle = '#bb66ee';
      ctx.font = 'bold 18px monospace';
      ctx.fillText(this.essence + ' VE', W/2, 70);

      ctx.fillStyle = '#666688';
      ctx.font = '10px monospace';
      ctx.fillText('Prestige Level: ' + this.prestigeLevel, W/2, 88);

      // Upgrades grid
      let uy = 105;
      const ids = Object.keys(this.permanentUpgrades);
      for(const id of ids) {
        if(uy > H - 70) break;
        const u = this.permanentUpgrades[id];
        const level = this.getUpgradeLevel(id);
        const cost = this.getUpgradeCost(id);
        const maxed = level >= u.maxLevel;
        const canBuy = this.essence >= cost && !maxed;

        ctx.fillStyle = canBuy ? '#112222' : '#111118';
        ctx.fillRect(15, uy, W-30, 38);
        ctx.strokeStyle = canBuy ? '#9944cc' : '#333355';
        ctx.lineWidth = 1;
        ctx.strokeRect(15, uy, W-30, 38);

        ctx.fillStyle = maxed ? '#ffcc44' : '#ccccdd';
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(u.name, 22, uy + 15);

        ctx.fillStyle = '#8888aa';
        ctx.font = '8px monospace';
        ctx.fillText(u.desc, 22, uy + 28);

        // Level dots
        for(let i = 0; i < u.maxLevel; i++) {
          ctx.fillStyle = i < level ? '#9944cc' : '#333355';
          ctx.beginPath();
          ctx.arc(W - 100 + i * 8, uy + 12, 3, 0, Math.PI*2);
          ctx.fill();
        }

        // Cost
        if(!maxed) {
          ctx.fillStyle = canBuy ? '#bb66ee' : '#555566';
          ctx.font = '9px monospace';
          ctx.textAlign = 'right';
          ctx.fillText(cost + ' VE', W - 22, uy + 30);
        } else {
          ctx.fillStyle = '#ffcc44';
          ctx.font = '9px monospace';
          ctx.textAlign = 'right';
          ctx.fillText('MAX', W - 22, uy + 30);
        }

        uy += 42;
      }
      ctx.textAlign = 'left';

      // Back button
      ctx.fillStyle = '#334455';
      ctx.fillRect(W/2-60, H-55, 120, 38);
      ctx.strokeStyle = '#9944cc';
      ctx.strokeRect(W/2-60, H-55, 120, 38);
      ctx.fillStyle = '#bb88ee';
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BACK', W/2, H-31);
      ctx.textAlign = 'left';
    } catch(e) {}
  }
};

try { VoidEssenceSystem.load(); } catch(e) {}
