<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID RIFT - ULTRA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #000;
      width: 100vw;
      height: 100vh;
      max-width: 420px;
      max-height: 750px;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
'use strict';

(function() {
  // ============================================================================
  // CONSTANTS
  // ============================================================================
  const CANVAS_WIDTH = 420;
  const CANVAS_HEIGHT = 750;
  const FIXED_DT = 1000 / 60;
  const MAX_DELTA_FRAMES = 4;
  const MAX_PARTICLES = 400;

  // Game state
  let gameState = 'menu'; // menu, play, levelUp, dead, shop, pause
  let score = 0;
  let wave = 0;
  let combo = 0;
  let maxCombo = 0;
  let gold = 0;
  let level = 1;
  let xp = 0;
  let xpNeeded = 100;
  let highScore = 0;
  let enemiesKilled = 0;
  let timeSurvived = 0;
  let goldEarned = 0;

  // Player
  let player = {
    x: CANVAS_WIDTH / 2,
    y: CANVAS_HEIGHT - 80,
    vx: 0,
    vy: 0,
    radius: 12,
    hp: 5,
    maxHp: 5,
    fireRate: 8,
    fireTimer: 0,
    dashCooldown: 0,
    dashCooldownMax: 60,
    isDashing: false,
    dashTimer: 0,
    dashDuration: 8,
    speed: 200,
    bulletCount: 1,
    bulletDamage: 1,
    invulnTimer: 0,
    shieldActive: false,
    shieldDuration: 0,
    rapidFireActive: false,
    rapidFireDuration: 0,
    spreadShotActive: false,
    spreadShotDuration: 0
  };

  // Upgrades and shop
  let baseStats = {
    maxHp: 5,
    fireRate: 8,
    speed: 200,
    bulletCount: 1,
    bulletDamage: 1,
    magnetRadius: 100
  };

  let shopUpgrades = [
    { id: 'hp', name: 'HP+', cost: 50, level: 0 },
    { id: 'fireRate', name: 'Fire Rate+', cost: 50, level: 0 },
    { id: 'speed', name: 'Speed+', cost: 50, level: 0 },
    { id: 'magnetism', name: 'Magnet+', cost: 50, level: 0 },
    { id: 'damage', name: 'Damage+', cost: 50, level: 0 }
  ];

  // Arrays
  let bullets = [];
  let enemies = [];
  let particles = [];
  let pickups = [];
  let stars = [];
  let nebulas = [];
  let screenShakeIntensity = 0;
  let levelUpChoices = [];
  let waveEnemiesRemaining = 0;
  let waveTimer = null;
  let waveAnnouncementTimer = 0;
  let waveAnnouncementText = '';
  let comboAnnouncementTimer = 0;
  let comboAnnouncementValue = 0;
  let damageFlashTimer = 0;

  // Audio
  let audioContext = null;
  let bassOscillator = null;
  let bassGain = null;
  let melodyOscillator = null;
  let melodyGain = null;
  let melodyPhase = 0;
  let melodyTimer = 0;

  // Input
  let keys = {};
  let touchStartX = 0;
  let touchStartY = 0;
  let touchDragging = false;
  let mousePos = { x: 0, y: 0 };
  let mouseDown = false;
  let lastShotTime = 0;
  let killTimer = 0;

  // ============================================================================
  // INITIALIZATION
  // ============================================================================
  function initAudio() {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      startAmbientMusic();
    }
  }

  function startAmbientMusic() {
    if (!audioContext) return;
    try {
      const now = audioContext.currentTime;

      // Bass drone
      bassOscillator = audioContext.createOscillator();
      bassGain = audioContext.createGain();
      bassOscillator.type = 'sine';
      bassOscillator.frequency.setValueAtTime(60, now);
      bassOscillator.connect(bassGain);
      bassGain.connect(audioContext.destination);
      bassGain.gain.setValueAtTime(0.03, now);
      bassOscillator.start(now);

      // Melody oscillator
      melodyOscillator = audioContext.createOscillator();
      melodyGain = audioContext.createGain();
      melodyOscillator.type = 'sine';
      melodyOscillator.frequency.setValueAtTime(440, now);
      melodyOscillator.connect(melodyGain);
      melodyGain.connect(audioContext.destination);
      melodyGain.gain.setValueAtTime(0.02, now);
      melodyOscillator.start(now);
    } catch (e) {
      // Silently fail audio
    }
  }

  function updateAmbientMusic() {
    if (!audioContext || !melodyOscillator) return;
    try {
      const now = audioContext.currentTime;
      const pentatonicNotes = [440, 494, 587, 659, 784]; // A4, B4, D5, E5, G5

      melodyTimer++;
      if (melodyTimer > (120 - wave * 5)) {
        melodyTimer = 0;
        const noteIdx = Math.floor(Math.random() * pentatonicNotes.length);
        const freq = pentatonicNotes[noteIdx] * (gameState === 'play' ? (1 + wave * 0.05) : 1);
        melodyOscillator.frequency.setTargetAtTime(freq, now, 0.05);

        const intensity = gameState === 'play' ? 0.02 + wave * 0.003 : 0.01;
        melodyGain.gain.setTargetAtTime(intensity, now, 0.05);
      }
    } catch (e) {
      // Silently fail
    }
  }

  function playSound(type) {
    if (!audioContext) return;
    try {
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      gain.gain.setValueAtTime(0.1, now);

      switch (type) {
        case 'shoot':
          osc.type = 'square';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.exponentialRampToValueAtTime(200, now + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
          osc.start(now);
          osc.stop(now + 0.05);
          break;
        case 'hit':
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(300, now);
          osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
          break;
        case 'explode':
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
          break;
        case 'powerup':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
          osc.start(now);
          osc.stop(now + 0.2);
          break;
        case 'levelup':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, now);
          gain.gain.setValueAtTime(0.05, now);
          osc.start(now);
          osc.frequency.setValueAtTime(500, now + 0.1);
          osc.frequency.setValueAtTime(600, now + 0.2);
          osc.stop(now + 0.3);
          break;
        case 'pickup':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
          break;
      }
    } catch (e) {
      // Silently fail audio
    }
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * CANVAS_WIDTH,
        y: Math.random() * CANVAS_HEIGHT,
        radius: Math.random() * 1.5 + 0.5,
        layer: Math.random() < 0.3 ? 'near' : Math.random() < 0.6 ? 'mid' : 'far',
        opacity: Math.random() * 0.5 + 0.3,
        twinkle: Math.random()
      });
    }
  }

  function initNebulas() {
    nebulas = [];
    for (let i = 0; i < 5; i++) {
      nebulas.push({
        x: Math.random() * CANVAS_WIDTH,
        y: Math.random() * CANVAS_HEIGHT,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() - 0.5) * 10,
        radius: Math.random() * 30 + 30,
        hue: Math.random() * 60 + 250,
        opacity: 0.06
      });
    }
  }

  function loadGame() {
    try {
      const saved = localStorage.getItem('voidRiftSave');
      if (saved) {
        const data = JSON.parse(saved);
        gold = data.gold || 0;
        highScore = data.highScore || 0;
        if (data.baseStats) baseStats = data.baseStats;
        applyBaseStats();
      }
    } catch (e) {
      // Silently fail
    }
  }

  function saveGame() {
    try {
      localStorage.setItem('voidRiftSave', JSON.stringify({
        gold,
        highScore,
        baseStats
      }));
    } catch (e) {
      // Silently fail
    }
  }

  function applyBaseStats() {
    player.maxHp = baseStats.maxHp;
    player.fireRate = baseStats.fireRate;
    player.speed = baseStats.speed;
    player.bulletCount = baseStats.bulletCount;
    player.bulletDamage = baseStats.bulletDamage;
  }

  function startGame() {
    gameState = 'play';
    score = 0;
    wave = 0;
    combo = 0;
    maxCombo = 0;
    level = 1;
    xp = 0;
    xpNeeded = 100;
    enemiesKilled = 0;
    timeSurvived = 0;
    goldEarned = 0;
    bullets = [];
    enemies = [];
    particles = [];
    pickups = [];
    screenShakeIntensity = 0;
    damageFlashTimer = 0;
    player.x = CANVAS_WIDTH / 2;
    player.y = CANVAS_HEIGHT - 80;
    player.vx = 0;
    player.vy = 0;
    player.hp = player.maxHp;
    player.fireTimer = 0;
    player.dashCooldown = 0;
    player.isDashing = false;
    player.invulnTimer = 0;
    player.shieldActive = false;
    player.rapidFireActive = false;
    player.spreadShotActive = false;
    applyBaseStats();
    nextWave();
  }

  function nextWave() {
    wave++;
    const isBoss = wave % 5 === 0;
    const enemyCount = isBoss ? 1 : 3 + Math.floor(wave / 2);
    waveEnemiesRemaining = enemyCount;

    waveAnnouncementTimer = 90;
    if (isBoss) {
      waveAnnouncementText = 'BOSS INCOMING!';
    } else {
      waveAnnouncementText = `WAVE ${wave}`;
    }

    clearTimeout(waveTimer);

    let spawnedCount = 0;
    const spawnInterval = setInterval(() => {
      if (gameState !== 'play') {
        clearInterval(spawnInterval);
        return;
      }
      if (spawnedCount >= enemyCount) {
        clearInterval(spawnInterval);
        return;
      }

      if (isBoss && spawnedCount === 0) {
        spawnBoss();
      } else {
        spawnRandomEnemy();
      }
      spawnedCount++;
    }, 500);

    waveTimer = setTimeout(() => {
      clearInterval(spawnInterval);
    }, enemyCount * 500 + 1000);
  }

  function spawnRandomEnemy() {
    const types = ['drone', 'scout', 'tank', 'shooter'];
    if (wave >= 8) types.push('bomber');
    const type = types[Math.floor(Math.random() * types.length)];
    spawnEnemy(type);
  }

  function spawnEnemy(type) {
    const x = Math.random() * (CANVAS_WIDTH - 40) + 20;
    const enemy = {
      type,
      x,
      y: -30,
      vx: 0,
      vy: 0,
      radius: 10,
      hp: 1,
      maxHp: 1,
      fireTimer: 0,
      shootCooldown: 0,
      sinePhase: Math.random() * Math.PI * 2,
      shieldActive: false
    };

    const hpMult = 1 + wave * 0.1;
    const speedMult = 1 + wave * 0.05;

    switch (type) {
      case 'drone':
        enemy.hp = Math.ceil(2 * hpMult);
        enemy.maxHp = enemy.hp;
        enemy.vy = 120 * speedMult;
        enemy.radius = 10;
        break;
      case 'scout':
        enemy.hp = Math.ceil(1 * hpMult);
        enemy.maxHp = enemy.hp;
        enemy.vy = 180 * speedMult;
        enemy.radius = 8;
        break;
      case 'tank':
        enemy.hp = Math.ceil(6 * hpMult);
        enemy.maxHp = enemy.hp;
        enemy.vy = 80 * speedMult;
        enemy.radius = 14;
        enemy.shieldActive = true;
        break;
      case 'shooter':
        enemy.hp = Math.ceil(3 * hpMult);
        enemy.maxHp = enemy.hp;
        enemy.vy = 100 * speedMult;
        enemy.radius = 12;
        enemy.shootCooldown = 120;
        break;
      case 'bomber':
        enemy.hp = Math.ceil(4 * hpMult);
        enemy.maxHp = enemy.hp;
        enemy.vy = 90 * speedMult;
        enemy.radius = 11;
        enemy.shootCooldown = 180;
        break;
    }

    enemies.push(enemy);
  }

  function spawnBoss() {
    const boss = {
      type: 'boss',
      x: CANVAS_WIDTH / 2,
      y: -40,
      vx: 60,
      vy: 40,
      radius: 25,
      hp: 20 + wave * 4,
      maxHp: 20 + wave * 4,
      shootCooldown: 60,
      targetY: 100,
      bossPhase: 1,
      radialBurstCooldown: 180
    };
    enemies.push(boss);
  }

  function spawnPickup(x, y, type, value) {
    pickups.push({
      type,
      x,
      y,
      vx: (Math.random() - 0.5) * 50,
      vy: 30 + Math.random() * 30,
      radius: type === 'coin' ? 4 : type === 'xp' ? 3.5 : type === 'health' ? 5 : 6,
      lifetime: 600,
      maxLifetime: 600,
      value: value || 1
    });
  }

  function shoot() {
    if (gameState !== 'play') return;

    const now = Date.now();
    if (now - lastShotTime < player.fireRate * FIXED_DT) return;
    lastShotTime = now;

    playSound('shoot');

    const fireRateBonus = player.rapidFireActive ? 0.5 : 1;
    const spreadBonus = player.spreadShotActive ? 2 : 0;
    const bulletCount = player.bulletCount + spreadBonus;
    const spread = (bulletCount - 1) * 10;

    for (let i = 0; i < bulletCount; i++) {
      const angle = -Math.PI / 2 + (i * 20 - spread / 2) * (Math.PI / 180);
      const vel = 400;
      bullets.push({
        x: player.x,
        y: player.y - player.radius,
        vx: Math.cos(angle) * vel,
        vy: Math.sin(angle) * vel,
        radius: 3,
        damage: player.bulletDamage,
        lifetime: 120,
        trail: []
      });
    }
  }

  function dash() {
    if (player.dashCooldown > 0 || player.isDashing) return;
    if (gameState !== 'play') return;

    player.isDashing = true;
    player.dashTimer = player.dashDuration;
    player.dashCooldown = player.dashCooldownMax;
  }

  function triggerLevelUp() {
    gameState = 'levelUp';
    levelUpChoices = [];

    const upgrades = [
      { name: 'Max HP+1', desc: 'Gain 1 max health', apply: () => { baseStats.maxHp++; applyBaseStats(); } },
      { name: 'Fire Rate +10%', desc: 'Shoot 10% faster', apply: () => { baseStats.fireRate = Math.max(2, baseStats.fireRate * 0.9); applyBaseStats(); } },
      { name: 'Speed +20%', desc: 'Move 20% faster', apply: () => { baseStats.speed *= 1.2; applyBaseStats(); } },
      { name: 'Bullet Count +1', desc: 'Add 1 extra bullet', apply: () => { baseStats.bulletCount++; applyBaseStats(); } },
      { name: 'Damage +1', desc: 'Bullets deal +1 damage', apply: () => { baseStats.bulletDamage++; applyBaseStats(); } },
      { name: 'Magnet Radius +50px', desc: 'Pull items from further away', apply: () => { baseStats.magnetRadius = (baseStats.magnetRadius || 100) + 50; } }
    ];

    for (let i = 0; i < 3; i++) {
      const idx = Math.floor(Math.random() * upgrades.length);
      levelUpChoices.push(upgrades[idx]);
    }

    playSound('levelup');
  }

  function chooseLevelUp(idx) {
    if (levelUpChoices[idx]) {
      levelUpChoices[idx].apply();
    }
    level++;
    gameState = 'play';
  }

  function gameOver() {
    gameState = 'dead';
    goldEarned = Math.floor(score / 20);
    gold += goldEarned;
    if (score > highScore) highScore = score;
    if (combo > maxCombo) maxCombo = combo;
    saveGame();
    clearTimeout(waveTimer);
  }

  function goToShop() {
    gameState = 'shop';
  }

  function goToMenu() {
    gameState = 'menu';
  }

  function togglePause() {
    if (gameState === 'play') {
      gameState = 'pause';
    } else if (gameState === 'pause') {
      gameState = 'play';
    }
  }

  function buyUpgrade(idx) {
    if (shopUpgrades[idx] && gold >= shopUpgrades[idx].cost) {
      gold -= shopUpgrades[idx].cost;
      shopUpgrades[idx].cost += 25;

      switch (shopUpgrades[idx].id) {
        case 'hp':
          baseStats.maxHp++;
          break;
        case 'fireRate':
          baseStats.fireRate = Math.max(2, baseStats.fireRate - 1);
          break;
        case 'speed':
          baseStats.speed += 30;
          break;
        case 'magnetism':
          baseStats.magnetRadius = (baseStats.magnetRadius || 100) + 50;
          break;
        case 'damage':
          baseStats.bulletDamage++;
          break;
      }

      applyBaseStats();
      saveGame();
      playSound('powerup');
    }
  }

  // ============================================================================
  // UPDATE LOGIC
  // ============================================================================
  function update(dt) {
    if (gameState !== 'play') return;

    timeSurvived += dt;
    updateAmbientMusic();

    killTimer--;
    if (killTimer < 0) {
      combo = 0;
    }

    // Player movement
    let moveX = 0;
    let moveY = 0;

    if (keys['ArrowLeft'] || keys['a']) moveX -= 1;
    if (keys['ArrowRight'] || keys['d']) moveX += 1;
    if (keys['ArrowUp'] || keys['w']) moveY -= 1;
    if (keys['ArrowDown'] || keys['s']) moveY += 1;

    if (touchDragging) {
      const touchX = touchStartX;
      const touchRightThreshold = CANVAS_WIDTH / 2;
      if (touchX < touchRightThreshold) {
        moveX = (touchX - CANVAS_WIDTH * 0.25) / (CANVAS_WIDTH / 4);
        moveY = (touchStartY - CANVAS_HEIGHT * 0.8) / 100;
      }
    }

    if (mouseDown && mousePos.x < CANVAS_WIDTH / 2) {
      const dx = mousePos.x - player.x;
      const dy = mousePos.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0) {
        moveX = dx / dist;
        moveY = dy / dist;
      }
    }

    moveX = Math.max(-1, Math.min(1, moveX));
    moveY = Math.max(-1, Math.min(1, moveY));

    let currentSpeed = player.speed;
    if (player.isDashing) {
      currentSpeed *= 3;
    }

    player.vx = moveX * currentSpeed;
    player.vy = moveY * currentSpeed;

    // Apply velocity
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Clamp player to screen
    player.x = Math.max(player.radius, Math.min(CANVAS_WIDTH - player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(CANVAS_HEIGHT - player.radius, player.y));

    // Dash
    if (player.isDashing) {
      player.dashTimer--;
      if (player.dashTimer <= 0) {
        player.isDashing = false;
      }

      // Spawn dash trail particles
      if (particles.length < MAX_PARTICLES) {
        const angle = Math.random() * Math.PI * 2;
        particles.push({
          type: 'dashTrail',
          x: player.x + Math.cos(angle) * player.radius,
          y: player.y + Math.sin(angle) * player.radius,
          vx: (Math.random() - 0.5) * 50,
          vy: (Math.random() - 0.5) * 50,
          lifetime: 20,
          maxLifetime: 20,
          radius: Math.random() * 2 + 1
        });
      }
    }

    if (player.dashCooldown > 0) {
      player.dashCooldown--;
    }

    if (player.invulnTimer > 0) {
      player.invulnTimer--;
    }

    if (player.shieldActive) {
      player.shieldDuration--;
      if (player.shieldDuration <= 0) player.shieldActive = false;
    }

    if (player.rapidFireActive) {
      player.rapidFireDuration--;
      if (player.rapidFireDuration <= 0) player.rapidFireActive = false;
    }

    if (player.spreadShotActive) {
      player.spreadShotDuration--;
      if (player.spreadShotDuration <= 0) player.spreadShotActive = false;
    }

    // Auto fire
    player.fireTimer--;
    if (player.fireTimer <= 0) {
      shoot();
      player.fireTimer = player.rapidFireActive ? Math.ceil(player.fireRate * 0.5) : player.fireRate;
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.lifetime--;

      if (b.trail && b.trail.length < 5) {
        b.trail.push({ x: b.x, y: b.y });
      }

      if (b.lifetime <= 0 || b.x < 0 || b.x > CANVAS_WIDTH || b.y < 0 || b.y > CANVAS_HEIGHT) {
        bullets.splice(i, 1);
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.x += e.vx * dt;
      e.y += e.vy * dt;

      if (e.type === 'drone') {
        const amplitude = 30 + wave * 5;
        e.sinePhase += dt * 2;
        e.vx = Math.sin(e.sinePhase) * amplitude;
      }

      if (e.type === 'scout') {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
          const predictX = player.x + player.vx * 0.3;
          const predictY = player.y + player.vy * 0.3;
          const pdx = predictX - e.x;
          const pdy = predictY - e.y;
          const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
          const speed = 150 * (1 + wave * 0.05);
          e.vx = (pdx / pdist) * speed;
          e.vy = (pdy / pdist) * speed;
        }
      }

      if (e.type === 'shooter') {
        const baseSpeed = 100 * (1 + wave * 0.05);
        e.sinePhase += dt * 1.5;
        e.vx = Math.sin(e.sinePhase) * 80;

        e.shootCooldown--;
        if (e.shootCooldown <= 0) {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {
            bullets.push({
              x: e.x,
              y: e.y,
              vx: (dx / dist) * 150,
              vy: (dy / dist) * 150,
              radius: 3,
              damage: 1,
              lifetime: 300,
              isEnemyBullet: true,
              trail: []
            });
          }
          e.shootCooldown = 180;
        }
      }

      if (e.type === 'bomber') {
        e.shootCooldown--;
        if (e.shootCooldown <= 0) {
          spawnMine(e.x, e.y);
          e.shootCooldown = 240;
        }
      }

      if (e.type === 'tank') {
        e.shootCooldown = (e.shootCooldown || 0) + 1;
      }

      if (e.type === 'boss') {
        if (e.y < (e.targetY || 100)) {
          e.vy = Math.abs(e.vy) || 40;
        } else {
          e.vy = 0;
          if (e.x <= e.radius + 10) e.vx = Math.abs(e.vx);
          if (e.x >= CANVAS_WIDTH - e.radius - 10) e.vx = -Math.abs(e.vx);
        }

        e.bossPhase = e.hp > e.maxHp * 0.5 ? 1 : 2;

        e.shootCooldown--;
        if (e.shootCooldown <= 0) {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {
            if (e.bossPhase === 1) {
              for (let s = -1; s <= 1; s++) {
                const angle = Math.atan2(dy, dx) + s * (Math.PI / 8);
                bullets.push({
                  x: e.x,
                  y: e.y,
                  vx: Math.cos(angle) * 200,
                  vy: Math.sin(angle) * 200,
                  radius: 3,
                  damage: 1,
                  lifetime: 300,
                  isEnemyBullet: true,
                  trail: []
                });
              }
            } else {
              for (let s = -1; s <= 1; s++) {
                const angle = Math.atan2(dy, dx) + s * (Math.PI / 8);
                bullets.push({
                  x: e.x,
                  y: e.y,
                  vx: Math.cos(angle) * 200,
                  vy: Math.sin(angle) * 200,
                  radius: 3,
                  damage: 1,
                  lifetime: 300,
                  isEnemyBullet: true,
                  trail: []
                });
              }
            }
          }
          e.shootCooldown = 100;
        }

        e.radialBurstCooldown--;
        if (e.bossPhase === 2 && e.radialBurstCooldown <= 0) {
          for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 6) {
            bullets.push({
              x: e.x,
              y: e.y,
              vx: Math.cos(angle) * 180,
              vy: Math.sin(angle) * 180,
              radius: 3,
              damage: 1,
              lifetime: 300,
              isEnemyBullet: true,
              trail: []
            });
          }
          e.radialBurstCooldown = 180;
        }
      }

      if (e.y > CANVAS_HEIGHT + 50) {
        enemies.splice(i, 1);
        waveEnemiesRemaining--;
        if (waveEnemiesRemaining <= 0 && wave > 0) {
          score += 500 * wave;
          nextWave();
        }
      }
    }

    // Update pickups
    const magnetRadius = baseStats.magnetRadius || 100;
    for (let i = pickups.length - 1; i >= 0; i--) {
      const pk = pickups[i];
      pk.x += pk.vx * dt;
      pk.y += pk.vy * dt;
      pk.vy += 100 * dt;
      pk.lifetime--;

      const dx = player.x - pk.x;
      const dy = player.y - pk.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < magnetRadius) {
        pk.vx += (dx / dist) * 300 * dt;
        pk.vy += (dy / dist) * 300 * dt;
      }

      if (dist < player.radius + pk.radius) {
        if (pk.type === 'xp') {
          xp += pk.value;
          if (xp >= xpNeeded) {
            xp -= xpNeeded;
            triggerLevelUp();
          }
        } else if (pk.type === 'coin') {
          gold += pk.value;
        } else if (pk.type === 'health') {
          player.hp = Math.min(player.maxHp, player.hp + 1);
        } else if (pk.type === 'shield') {
          player.shieldActive = true;
          player.shieldDuration = 600;
          playSound('powerup');
        } else if (pk.type === 'rapidfire') {
          player.rapidFireActive = true;
          player.rapidFireDuration = 600;
          playSound('powerup');
        } else if (pk.type === 'spreadshot') {
          player.spreadShotActive = true;
          player.spreadShotDuration = 600;
          playSound('powerup');
        }

        playSound('pickup');
        pickups.splice(i, 1);
        continue;
      }

      if (pk.lifetime <= 0 || pk.y > CANVAS_HEIGHT) {
        pickups.splice(i, 1);
      }
    }

    // Collision: bullets vs enemies
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      if (b.isEnemyBullet) continue;

      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const dx = b.x - e.x;
        const dy = b.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < b.radius + e.radius) {
          let damage = b.damage;
          if (e.shieldActive && e.type === 'tank') {
            e.shieldActive = false;
          } else {
            e.hp -= damage;
          }

          playSound('hit');
          screenShakeIntensity = Math.max(screenShakeIntensity, 3);
          killTimer = 120;
          combo++;
          if (combo > maxCombo) maxCombo = combo;

          if (particles.length < MAX_PARTICLES) {
            for (let p = 0; p < 3; p++) {
              const angle = Math.random() * Math.PI * 2;
              particles.push({
                type: 'spark',
                x: b.x,
                y: b.y,
                vx: Math.cos(angle) * 100,
                vy: Math.sin(angle) * 100,
                lifetime: 15,
                maxLifetime: 15,
                radius: 1
              });
            }
          }

          particles.push({
            type: 'damageNumber',
            x: e.x,
            y: e.y,
            vx: 0,
            vy: -50,
            lifetime: 60,
            maxLifetime: 60,
            damage: Math.floor(damage)
          });

          bullets.splice(i, 1);
          break;
        }
      }
    }

    // Enemy death
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.hp <= 0) {
        const basePoints = {
          drone: 100,
          scout: 150,
          tank: 200,
          shooter: 250,
          bomber: 280,
          boss: 2000
        };
        const multiplier = 1 + Math.floor(combo / 5) * 0.5;
        score += Math.floor((basePoints[e.type] || 100) * multiplier);
        enemiesKilled++;

        playSound('explode');
        screenShakeIntensity = Math.max(screenShakeIntensity, 5);

        const particleCount = e.type === 'boss' ? 20 : 8;
        const explosionColor = {
          drone: '#ff4444',
          scout: '#ffff00',
          tank: '#ff8800',
          shooter: '#ff00ff',
          bomber: '#ff6600',
          boss: '#ff00ff'
        }[e.type] || '#ff8888';

        for (let p = 0; p < particleCount; p++) {
          if (particles.length < MAX_PARTICLES) {
            const angle = (p / particleCount) * Math.PI * 2;
            particles.push({
              type: 'explosion',
              x: e.x,
              y: e.y,
              vx: Math.cos(angle) * 150,
              vy: Math.sin(angle) * 150,
              lifetime: 30,
              maxLifetime: 30,
              radius: Math.random() * 3 + 2,
              color: explosionColor
            });
          }
        }

        // Spawn drops
        const dropChance = Math.random();
        if (dropChance < 0.15) {
          spawnPickup(e.x, e.y, 'health', 1);
        } else if (dropChance < 0.23) {
          spawnPickup(e.x, e.y, 'shield', 1);
        } else if (dropChance < 0.30) {
          spawnPickup(e.x, e.y, 'rapidfire', 1);
        } else if (dropChance < 0.35) {
          spawnPickup(e.x, e.y, 'spreadshot', 1);
        } else if (dropChance < 0.65) {
          spawnPickup(e.x, e.y, 'coin', 5 + wave * 2);
        } else {
          spawnPickup(e.x, e.y, 'xp', 10);
        }

        xp += e.type === 'boss' ? 50 : 10;
        if (xp >= xpNeeded) {
          xp -= xpNeeded;
          triggerLevelUp();
        }

        enemies.splice(i, 1);
        waveEnemiesRemaining--;
        if (waveEnemiesRemaining <= 0 && wave > 0) {
          score += 500 * wave;
          nextWave();
        }
      }
    }

    // Collision: enemy bullets vs player
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      if (!b.isEnemyBullet) continue;

      const dx = b.x - player.x;
      const dy = b.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < b.radius + player.radius && !player.isDashing && player.invulnTimer <= 0) {
        if (player.shieldActive) {
          player.shieldActive = false;
          playSound('hit');
        } else {
          player.hp--;
          player.invulnTimer = 45;
          playSound('hit');
          screenShakeIntensity = 5;
          damageFlashTimer = 10;
          killTimer = -120;
          combo = 0;

          if (player.hp <= 0) {
            gameOver();
          }
        }
        bullets.splice(i, 1);
      }
    }

    // Collision: enemies vs player
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      const dx = e.x - player.x;
      const dy = e.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < e.radius + player.radius && !player.isDashing && player.invulnTimer <= 0) {
        if (player.shieldActive) {
          player.shieldActive = false;
          playSound('hit');
        } else {
          player.hp--;
          player.invulnTimer = 45;
          playSound('hit');
          screenShakeIntensity = 5;
          damageFlashTimer = 10;
          killTimer = -120;
          combo = 0;

          if (player.hp <= 0) {
            gameOver();
          }
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.lifetime--;

      if (p.lifetime <= 0) {
        particles.splice(i, 1);
      }
    }

    // Update stars for parallax
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      let speed = 0;
      if (s.layer === 'near') speed = 20;
      else if (s.layer === 'mid') speed = 10;
      else speed = 5;

      s.y += speed * dt;
      if (s.y > CANVAS_HEIGHT) {
        s.y = -10;
        s.x = Math.random() * CANVAS_WIDTH;
      }

      s.twinkle += dt * 2;
    }

    // Update nebulas
    for (let i = 0; i < nebulas.length; i++) {
      const n = nebulas[i];
      n.x += n.vx * dt;
      n.y += n.vy * dt;

      if (n.x < -100) n.x = CANVAS_WIDTH + 100;
      if (n.x > CANVAS_WIDTH + 100) n.x = -100;
      if (n.y < -100) n.y = CANVAS_HEIGHT + 100;
      if (n.y > CANVAS_HEIGHT + 100) n.y = -100;
    }

    waveAnnouncementTimer--;
    if (damageFlashTimer > 0) damageFlashTimer--;
    screenShakeIntensity = Math.max(0, screenShakeIntensity - 1);
  }

  function spawnMine(x, y) {
    particles.push({
      type: 'mine',
      x,
      y,
      vx: 0,
      vy: 40,
      lifetime: 180,
      maxLifetime: 180,
      radius: 5,
      exploded: false
    });
  }

  // ============================================================================
  // DRAWING
  // ============================================================================
  function draw(ctx) {
    const cw = CANVAS_WIDTH;
    const ch = CANVAS_HEIGHT;

    // Background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, ch);
    bgGrad.addColorStop(0, '#1a0033');
    bgGrad.addColorStop(1, '#000000');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, cw, ch);

    // Draw stars with twinkling
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      const twinkleAlpha = Math.max(0.1, s.opacity * (0.5 + 0.5 * Math.sin(s.twinkle)));
      ctx.fillStyle = `rgba(255, 255, 255, ${twinkleAlpha})`;
      ctx.fillRect(s.x, s.y, s.radius, s.radius);
    }

    // Draw nebulas
    for (let i = 0; i < nebulas.length; i++) {
      const n = nebulas[i];
      const nebGrad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
      nebGrad.addColorStop(0, `hsla(${n.hue}, 100%, 50%, ${n.opacity})`);
      nebGrad.addColorStop(1, `hsla(${n.hue}, 100%, 50%, 0)`);
      ctx.fillStyle = nebGrad;
      ctx.fillRect(n.x - n.radius, n.y - n.radius, n.radius * 2, n.radius * 2);
    }

    if (gameState === 'play') {
      // Draw bullet trails
      ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i < bullets.length; i++) {
        const b = bullets[i];
        if (b.isEnemyBullet || !b.trail || b.trail.length < 2) continue;
        ctx.beginPath();
        ctx.moveTo(b.trail[0].x, b.trail[0].y);
        for (let j = 1; j < b.trail.length; j++) {
          ctx.lineTo(b.trail[j].x, b.trail[j].y);
        }
        ctx.stroke();
      }

      // Draw bullets (player)
      ctx.fillStyle = '#00ffff';
      for (let i = 0; i < bullets.length; i++) {
        const b = bullets[i];
        if (b.isEnemyBullet) continue;

        const w = 3;
        const h = 8;
        const grad = ctx.createLinearGradient(b.x - w, b.y - h, b.x + w, b.y + h);
        grad.addColorStop(0, '#00ffff');
        grad.addColorStop(0.5, '#00ff88');
        grad.addColorStop(1, '#0088ff');
        ctx.fillStyle = grad;

        ctx.beginPath();
        ctx.ellipse(b.x, b.y, w, h, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw bullets (enemy)
      for (let i = 0; i < bullets.length; i++) {
        const b = bullets[i];
        if (!b.isEnemyBullet) continue;

        ctx.fillStyle = '#ff4488';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw pickups
      for (let i = 0; i < pickups.length; i++) {
        const pk = pickups[i];
        const alpha = Math.max(0, pk.lifetime / pk.maxLifetime);
        ctx.globalAlpha = alpha;

        if (pk.type === 'xp') {
          ctx.fillStyle = '#00ff00';
          ctx.beginPath();
          ctx.arc(pk.x, pk.y, pk.radius, 0, Math.PI * 2);
          ctx.fill();
        } else if (pk.type === 'coin') {
          ctx.fillStyle = '#ffff00';
          ctx.beginPath();
          ctx.arc(pk.x, pk.y, pk.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#ff8800';
          ctx.lineWidth = 1;
          ctx.stroke();
        } else if (pk.type === 'health') {
          ctx.fillStyle = '#ff4444';
          ctx.fillRect(pk.x - pk.radius, pk.y - pk.radius, pk.radius * 2, pk.radius * 2);
        } else if (pk.type === 'shield') {
          ctx.strokeStyle = '#0088ff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(pk.x, pk.y, pk.radius, 0, Math.PI * 2);
          ctx.stroke();
        } else if (pk.type === 'rapidfire') {
          ctx.fillStyle = '#ff6600';
          ctx.beginPath();
          ctx.arc(pk.x, pk.y, pk.radius, 0, Math.PI * 2);
          ctx.fill();
        } else if (pk.type === 'spreadshot') {
          ctx.fillStyle = '#ff00ff';
          ctx.beginPath();
          for (let j = 0; j < 3; j++) {
            const angle = (j / 3) * Math.PI * 2;
            const x = pk.x + Math.cos(angle) * pk.radius;
            const y = pk.y + Math.sin(angle) * pk.radius;
            if (j === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
        }

        ctx.globalAlpha = 1;
      }

      // Draw player (flash when invulnerable)
      const shouldDrawPlayer = player.invulnTimer <= 0 || Math.floor(player.invulnTimer / 3) % 2 === 0;
      const shake = Math.random() * screenShakeIntensity * 2 - screenShakeIntensity;
      const playerX = player.x + shake;
      const playerY = player.y + shake;

      if (shouldDrawPlayer) {
        const shipGrad = ctx.createLinearGradient(playerX, playerY - player.radius, playerX, playerY + player.radius);
        shipGrad.addColorStop(0, '#00ffff');
        shipGrad.addColorStop(1, '#0055ff');
        ctx.fillStyle = shipGrad;

        ctx.beginPath();
        ctx.moveTo(playerX, playerY - player.radius);
        ctx.lineTo(playerX + player.radius, playerY + player.radius);
        ctx.lineTo(playerX, playerY + player.radius * 0.6);
        ctx.lineTo(playerX - player.radius, playerY + player.radius);
        ctx.closePath();
        ctx.fill();

        // Shield bubble
        if (player.shieldActive) {
          ctx.strokeStyle = `rgba(0, 136, 255, ${0.5 + 0.3 * Math.sin(Date.now() / 100)})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(playerX, playerY, player.radius + 8, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Engine flame
        if (!player.isDashing) {
          ctx.fillStyle = `rgba(255, 150, 0, ${0.5 + Math.random() * 0.5})`;
          ctx.beginPath();
          ctx.moveTo(playerX - 4, playerY + player.radius);
          ctx.lineTo(playerX + 4, playerY + player.radius);
          ctx.lineTo(playerX, playerY + player.radius + 12 + Math.random() * 6);
          ctx.closePath();
          ctx.fill();
        }

        // Thruster particles
        if (particles.length < MAX_PARTICLES && (moveX !== 0 || moveY !== 0)) {
          particles.push({
            type: 'thruster',
            x: playerX + (Math.random() - 0.5) * 6,
            y: playerY + player.radius + (Math.random() - 0.5) * 4,
            vx: (Math.random() - 0.5) * 50,
            vy: Math.random() * 50 + 30,
            lifetime: 15,
            maxLifetime: 15,
            radius: Math.random() + 0.5
          });
        }
      }

      // Draw enemies
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];

        if (e.type === 'drone') {
          const dGrad = ctx.createLinearGradient(e.x, e.y - e.radius, e.x, e.y + e.radius);
          dGrad.addColorStop(0, '#ff4444');
          dGrad.addColorStop(1, '#aa0000');
          ctx.fillStyle = dGrad;

          ctx.beginPath();
          ctx.moveTo(e.x, e.y - e.radius);
          ctx.lineTo(e.x + e.radius, e.y + e.radius);
          ctx.lineTo(e.x - e.radius, e.y + e.radius);
          ctx.closePath();
          ctx.fill();
        } else if (e.type === 'scout') {
          const sGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
          sGrad.addColorStop(0, '#ffff00');
          sGrad.addColorStop(1, '#ff8800');
          ctx.fillStyle = sGrad;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
          ctx.fill();
        } else if (e.type === 'tank') {
          const tGrad = ctx.createLinearGradient(e.x - e.radius, e.y, e.x + e.radius, e.y);
          tGrad.addColorStop(0, '#ff8800');
          tGrad.addColorStop(1, '#dd4400');
          ctx.fillStyle = tGrad;
          ctx.fillRect(e.x - e.radius, e.y - e.radius, e.radius * 2, e.radius * 2);

          if (e.shieldActive) {
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 2;
            ctx.fillRect(e.x - e.radius - 2, e.y - e.radius - 2, e.radius * 2 + 4, 4);
          } else {
            ctx.fillStyle = '#666666';
            ctx.fillRect(e.x - 4, e.y - 4, 8, 8);
          }
        } else if (e.type === 'shooter') {
          const shGrad = ctx.createLinearGradient(e.x - e.radius, e.y - e.radius, e.x + e.radius, e.y + e.radius);
          shGrad.addColorStop(0, '#ff00ff');
          shGrad.addColorStop(1, '#aa0088');
          ctx.fillStyle = shGrad;

          ctx.beginPath();
          ctx.moveTo(e.x, e.y - e.radius);
          ctx.lineTo(e.x + e.radius, e.y);
          ctx.lineTo(e.x, e.y + e.radius);
          ctx.lineTo(e.x - e.radius, e.y);
          ctx.closePath();
          ctx.fill();
        } else if (e.type === 'bomber') {
          const bGrad = ctx.createLinearGradient(e.x - e.radius, e.y - e.radius, e.x + e.radius, e.y + e.radius);
          bGrad.addColorStop(0, '#ff6600');
          bGrad.addColorStop(1, '#cc3300');
          ctx.fillStyle = bGrad;
          ctx.fillRect(e.x - e.radius, e.y - e.radius, e.radius * 2, e.radius * 2);
        } else if (e.type === 'boss') {
          const bGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
          bGrad.addColorStop(0, '#ffff00');
          bGrad.addColorStop(1, '#ff0000');
          ctx.fillStyle = bGrad;

          ctx.beginPath();
          for (let j = 0; j < 6; j++) {
            const angle = (j / 6) * Math.PI * 2;
            const x = e.x + Math.cos(angle) * e.radius;
            const y = e.y + Math.sin(angle) * e.radius;
            if (j === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();

          // Boss HP bar
          ctx.fillStyle = '#222222';
          ctx.fillRect(e.x - 30, e.y - e.radius - 15, 60, 6);
          const hpPercent = e.hp / e.maxHp;
          ctx.fillStyle = hpPercent > 0.5 ? '#00ff00' : '#ff6600';
          ctx.fillRect(e.x - 30, e.y - e.radius - 15, 60 * hpPercent, 6);
        }

        // Enemy HP bar (if multi-hp)
        if (e.maxHp > 1 && e.type !== 'boss') {
          ctx.fillStyle = '#222222';
          ctx.fillRect(e.x - 12, e.y - e.radius - 8, 24, 3);
          ctx.fillStyle = '#ff6600';
          ctx.fillRect(e.x - 12, e.y - e.radius - 8, 24 * (e.hp / e.maxHp), 3);
        }
      }

      // Draw particles
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        if (p.type === 'explosion') {
          const alpha = p.lifetime / p.maxLifetime;
          ctx.fillStyle = `rgba(255, 150, 0, ${alpha * 0.8})`;
          if (p.color) {
            const rgb = parseInt(p.color.replace('#', ''), 16);
            const r = (rgb >> 16) & 255;
            const g = (rgb >> 8) & 255;
            const b = rgb & 255;
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.8})`;
          }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type === 'damageNumber') {
          const alpha = p.lifetime / p.maxLifetime;
          ctx.fillStyle = `rgba(255, 100, 100, ${alpha})`;
          ctx.font = 'bold 16px Arial';
          ctx.textAlign = 'center';
          ctx.fillText(p.damage, p.x, p.y);
        } else if (p.type === 'spark') {
          const alpha = p.lifetime / p.maxLifetime;
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type === 'dashTrail') {
          const alpha = p.lifetime / p.maxLifetime;
          ctx.fillStyle = `rgba(0, 255, 255, ${alpha * 0.6})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type === 'thruster') {
          const alpha = p.lifetime / p.maxLifetime;
          ctx.fillStyle = `rgba(255, 150, 0, ${alpha * 0.8})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type === 'mine') {
          const alpha = Math.max(0, p.lifetime / p.maxLifetime);
          ctx.fillStyle = `rgba(255, 100, 0, ${0.5 + 0.3 * Math.sin(Date.now() / 100)})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();

          if (p.lifetime < 30) {
            ctx.strokeStyle = `rgba(255, 100, 0, ${alpha})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius + 3, 0, Math.PI * 2);
            ctx.stroke();
          }

          if (p.lifetime <= 0 && !p.exploded) {
            p.exploded = true;
            for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
              if (particles.length < MAX_PARTICLES) {
                particles.push({
                  type: 'explosion',
                  x: p.x,
                  y: p.y,
                  vx: Math.cos(angle) * 200,
                  vy: Math.sin(angle) * 200,
                  lifetime: 25,
                  maxLifetime: 25,
                  radius: 2,
                  color: '#ff6600'
                });
              }
            }
          }
        }
      }

      // Draw HUD
      drawHUD(ctx, cw, ch);

      // Draw wave announcement
      if (waveAnnouncementTimer > 0) {
        const progress = 1 - (waveAnnouncementTimer / 90);
        let scale = progress < 0.5 ? progress * 2 : (1 - (progress - 0.5) * 2);
        const alpha = progress < 0.1 || progress > 0.9 ? (progress < 0.1 ? progress * 10 : (1 - progress) * 10) : 1;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = waveAnnouncementText.includes('BOSS') ? '#ff0000' : '#00ffff';
        ctx.font = `${Math.floor(40 * scale)} bold Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(waveAnnouncementText, cw / 2, ch / 2);
        ctx.restore();
      }

      // Damage flash
      if (damageFlashTimer > 0) {
        const alpha = damageFlashTimer / 10;
        ctx.fillStyle = `rgba(255, 0, 0, ${alpha * 0.3})`;
        ctx.fillRect(0, 0, cw, ch);
      }

      // CRT scanlines
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.02)';
      ctx.lineWidth = 2;
      for (let y = 0; y < ch; y += 2) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(cw, y);
        ctx.stroke();
      }

      // Vignette
      const vigGrad = ctx.createRadialGradient(cw / 2, ch / 2, 0, cw / 2, ch / 2, Math.sqrt(cw * cw + ch * ch));
      vigGrad.addColorStop(0, 'transparent');
      vigGrad.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
      ctx.fillStyle = vigGrad;
      ctx.fillRect(0, 0, cw, ch);
    } else if (gameState === 'menu') {
      drawMenu(ctx, cw, ch);
    } else if (gameState === 'shop') {
      drawShop(ctx, cw, ch);
    } else if (gameState === 'levelUp') {
      drawLevelUp(ctx, cw, ch);
    } else if (gameState === 'dead') {
      drawDead(ctx, cw, ch);
    } else if (gameState === 'pause') {
      drawPause(ctx, cw, ch);
    }
  }

  function drawHUD(ctx, cw, ch) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'left';

    // Top left
    ctx.fillText(`Wave: ${wave}`, 10, 20);
    ctx.fillText(`Level: ${level}`, 10, 40);
    ctx.fillText(`Combo: ${combo}`, 10, 60);

    // Top right
    ctx.textAlign = 'right';
    ctx.fillText(`Score: ${score}`, cw - 10, 20);
    ctx.fillText(`Gold: ${gold}`, cw - 10, 40);

    // Power-up display
    let powerupX = cw / 2 - 30;
    if (player.shieldActive) {
      ctx.fillStyle = '#0088ff';
      ctx.font = 'bold 12px Arial';
      ctx.fillText('SHIELD', powerupX, 20);
      powerupX += 70;
    }
    if (player.rapidFireActive) {
      ctx.fillStyle = '#ff6600';
      ctx.font = 'bold 12px Arial';
      ctx.fillText('RAPID', powerupX, 20);
      powerupX += 60;
    }
    if (player.spreadShotActive) {
      ctx.fillStyle = '#ff00ff';
      ctx.font = 'bold 12px Arial';
      ctx.fillText('SPREAD', powerupX, 20);
    }

    // HP bar
    ctx.fillStyle = '#222222';
    ctx.fillRect(10, ch - 40, 100, 15);
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(10, ch - 40, 100 * (player.hp / player.maxHp), 15);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.strokeRect(10, ch - 40, 100, 15);

    // XP bar
    ctx.fillStyle = '#222222';
    ctx.fillRect(120, ch - 40, 100, 15);
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(120, ch - 40, 100 * (xp / xpNeeded), 15);
    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(120, ch - 40, 100, 15);

    // Dash cooldown
    if (player.dashCooldown > 0) {
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(cw - 110, ch - 40, 100 * (player.dashCooldown / player.dashCooldownMax), 15);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.strokeRect(cw - 110, ch - 40, 100, 15);
    }
  }

  function drawMenu(ctx, cw, ch) {
    // Title with bob effect
    const bob = Math.sin(Date.now() / 800) * 5;
    ctx.fillStyle = '#00ffff';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#0088ff';
    ctx.shadowBlur = 20;
    ctx.fillText('VOID RIFT', cw / 2, 100 + bob);
    ctx.shadowBlur = 0;

    // High score
    ctx.fillStyle = '#ffffff';
    ctx.font = '16px Arial';
    ctx.fillText(`High Score: ${highScore}`, cw / 2, 150);
    ctx.fillText(`Gold: ${gold}`, cw / 2, 175);

    // Buttons
    drawButton(ctx, cw / 2, 250, 120, 50, 'PLAY', '#00ff00');
    drawButton(ctx, cw / 2, 320, 120, 50, 'SHOP', '#ff6600');
  }

  function drawShop(ctx, cw, ch) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('SHOP', cw / 2, 40);

    let y = 80;
    for (let i = 0; i < shopUpgrades.length; i++) {
      const item = shopUpgrades[i];
      const color = gold >= item.cost ? '#00ff00' : '#ff0000';
      drawButton(ctx, cw / 2, y, 200, 40, `${item.name} - $${item.cost}`, color);
      y += 50;
    }

    drawButton(ctx, cw / 2, ch - 60, 100, 40, 'BACK', '#ff6600');
  }

  function drawLevelUp(ctx, cw, ch) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, cw, ch);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL UP!', cw / 2, 100);

    ctx.font = '14px Arial';
    let y = 180;
    for (let i = 0; i < levelUpChoices.length; i++) {
      drawButton(ctx, cw / 2, y, 180, 50, levelUpChoices[i].name, '#00ff88');
      ctx.fillStyle = '#cccccc';
      ctx.font = '12px Arial';
      ctx.fillText(levelUpChoices[i].desc, cw / 2, y + 28);
      y += 70;
    }
  }

  function drawDead(ctx, cw, ch) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
    ctx.fillRect(0, 0, cw, ch);

    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', cw / 2, 100);

    ctx.fillStyle = '#ffffff';
    ctx.font = '16px Arial';
    ctx.fillText(`Score: ${score}`, cw / 2, 140);
    ctx.fillText(`Wave: ${wave}`, cw / 2, 160);
    ctx.fillText(`Max Combo: ${maxCombo}`, cw / 2, 180);
    ctx.fillText(`Enemies Killed: ${enemiesKilled}`, cw / 2, 200);
    ctx.fillText(`Gold Earned: ${goldEarned}`, cw / 2, 220);
    ctx.fillText(`Time: ${Math.floor(timeSurvived)}s`, cw / 2, 240);

    drawButton(ctx, cw / 2, 300, 120, 50, 'MENU', '#ff6600');
  }

  function drawPause(ctx, cw, ch) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
    ctx.fillRect(0, 0, cw, ch);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', cw / 2, 200);

    ctx.font = '14px Arial';
    ctx.fillText('Press P or tap gear icon to resume', cw / 2, 250);

    drawButton(ctx, cw / 2, 320, 120, 50, 'RESUME', '#00ff88');
    drawButton(ctx, cw / 2, 380, 120, 50, 'MENU', '#ff6600');
  }

  function drawButton(ctx, cx, cy, w, h, text, color) {
    ctx.fillStyle = color;
    ctx.fillRect(cx - w / 2, cy - h / 2, w, h);
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, cx, cy);
  }

  // ============================================================================
  // INPUT HANDLING
  // ============================================================================
  function handleKeyDown(e) {
    keys[e.key] = true;
    if (e.key === ' ') {
      e.preventDefault();
      if (gameState === 'play') {
        dash();
      }
    }
    if (e.key === 'p' || e.key === 'P') {
      togglePause();
    }
  }

  function handleKeyUp(e) {
    keys[e.key] = false;
  }

  function handleMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    mousePos.x = (e.clientX - rect.left) * scaleX;
    mousePos.y = (e.clientY - rect.top) * scaleY;
  }

  function handleMenuClick(x, y) {
    if (gameState === 'menu') {
      if (x > CANVAS_WIDTH / 2 - 60 && x < CANVAS_WIDTH / 2 + 60 && y > 225 && y < 275) {
        startGame();
      } else if (x > CANVAS_WIDTH / 2 - 60 && x < CANVAS_WIDTH / 2 + 60 && y > 295 && y < 345) {
        goToShop();
      }
    } else if (gameState === 'shop') {
      for (let i = 0; i < shopUpgrades.length; i++) {
        const itemY = 80 + i * 50;
        if (x > CANVAS_WIDTH / 2 - 100 && x < CANVAS_WIDTH / 2 + 100 && y > itemY - 20 && y < itemY + 20) {
          buyUpgrade(i);
          return;
        }
      }
      if (x > CANVAS_WIDTH / 2 - 50 && x < CANVAS_WIDTH / 2 + 50 && y > CANVAS_HEIGHT - 80 && y < CANVAS_HEIGHT - 40) {
        goToMenu();
      }
    } else if (gameState === 'levelUp') {
      for (let i = 0; i < 3; i++) {
        const itemY = 180 + i * 70;
        if (x > CANVAS_WIDTH / 2 - 90 && x < CANVAS_WIDTH / 2 + 90 && y > itemY - 25 && y < itemY + 25) {
          chooseLevelUp(i);
          return;
        }
      }
    } else if (gameState === 'dead') {
      if (x > CANVAS_WIDTH / 2 - 60 && x < CANVAS_WIDTH / 2 + 60 && y > 275 && y < 325) {
        goToMenu();
      }
    } else if (gameState === 'pause') {
      if (x > CANVAS_WIDTH / 2 - 60 && x < CANVAS_WIDTH / 2 + 60 && y > 295 && y < 345) {
        togglePause();
      } else if (x > CANVAS_WIDTH / 2 - 60 && x < CANVAS_WIDTH / 2 + 60 && y > 355 && y < 405) {
        goToMenu();
      }
    }
  }

  function handleMouseDown(e) {
    mouseDown = true;
    initAudio();
    if (gameState === 'play') {
      if (e.clientX > window.innerWidth * 0.75) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = CANVAS_WIDTH / rect.width;
        const scaleY = CANVAS_HEIGHT / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        if (x > CANVAS_WIDTH - 40 && y < 40) {
          togglePause();
        }
      }
      return;
    }

    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    handleMenuClick(x, y);
  }

  function handleMouseUp(e) {
    mouseDown = false;
  }

  function handleTouchStart(e) {
    e.preventDefault();
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const touch = e.touches[0];
    touchStartX = (touch.clientX - rect.left) * scaleX;
    touchStartY = (touch.clientY - rect.top) * scaleY;
    touchDragging = false;

    if (gameState === 'play') {
      if (touchStartX > CANVAS_WIDTH / 2) {
        dash();
      }
    } else {
      handleMenuClick(touchStartX, touchStartY);
    }
  }

  function handleTouchMove(e) {
    e.preventDefault();
    if (gameState !== 'play') return;
    touchDragging = true;
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const touch = e.touches[0];
    touchStartX = (touch.clientX - rect.left) * scaleX;
    touchStartY = (touch.clientY - rect.top) * scaleY;
  }

  function handleTouchEnd(e) {
    touchDragging = false;
  }

  // ============================================================================
  // MAIN LOOP
  // ============================================================================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }

  let lastFrameTime = Date.now();

  function gameLoop() {
    const now = Date.now();
    let deltaTime = (now - lastFrameTime) / 1000;
    lastFrameTime = now;

    deltaTime = Math.min(deltaTime, 0.1);

    let steps = 0;
    let remainingDt = deltaTime;
    while (remainingDt > 0 && steps < MAX_DELTA_FRAMES) {
      const stepDt = Math.min(remainingDt, FIXED_DT / 1000);
      update(stepDt);
      remainingDt -= stepDt;
      steps++;
    }

    draw(ctx);

    requestAnimationFrame(gameLoop);
  }

  // ============================================================================
  // STARTUP
  // ============================================================================
  window.addEventListener('keydown', handleKeyDown);
  window.addEventListener('keyup', handleKeyUp);
  window.addEventListener('mousemove', handleMouseMove);
  window.addEventListener('mousedown', handleMouseDown);
  window.addEventListener('mouseup', handleMouseUp);
  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', handleTouchEnd);

  window.addEventListener('resize', resizeCanvas);

  initStars();
  initNebulas();
  loadGame();
  resizeCanvas();

  gameLoop();
})();
</script>
</body>
</html>
