<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA BREACH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #000;
            width: 100vw;
            height: 100vh;
            max-width: 420px;
            max-height: 750px;
            image-rendering: auto;
        }
        #errorOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: #f00;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 18px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="errorOverlay"></div>
    <script>
'use strict';

(() => {
    // ============================================================================
    // NOVA BREACH - FINAL MERGED VERSION
    // ============================================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: true, willReadFrequently: false });
    const VIRTUAL_WIDTH = 420;
    const VIRTUAL_HEIGHT = 750;
    let dpr = window.devicePixelRatio || 1;

    function resizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = VIRTUAL_WIDTH * dpr;
        canvas.height = VIRTUAL_HEIGHT * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================================================
    // CONSTANTS & STATE
    // ============================================================================
    const FIXED_DT = 1000 / 60;
    const dt = FIXED_DT / 1000;
    const SAVE_KEY = 'void_rift_save';

    let gameState = {
        mode: 'menu', // menu, upgrade, playing, dead
        wave: 1,
        score: 0,
        combo: 0,
        comboTimer: 0,
        kills: 0,
        xp: 0,
        xpMax: 100,
        health: 100,
        maxHealth: 100,
        selectedShip: 'viper',
        difficulty: 1,
        screenShake: 0,
        screenFlash: 0,
        screenFlashColor: '#fff',
        invulnTimer: 0,
        dashCooldown: 0,
        deaths: 0,
        totalKills: 0,
        gold: 0,
        playStreak: 0,
        lastPlayDate: null,
        achievements: {},
        dailyChallenge: '',
        prestigeLevel: 0,
        upgradeChoices: [],
        selectedUpgradeIdx: 0,
        messageTimer: 0,
        messageText: '',
        waves: [],
        numEnemies: 0,
        isDailyMode: false,
    };

    let player = null;
    let bullets = [];
    let enemies = [];
    let explosions = [];
    let particles = [];
    let pickups = [];
    let scorePopups = [];
    let stars = [];
    let nebulaClouds = [];
    let dustParticles = [];

    let touchX = null;
    let touchY = null;
    let keys = {};

    let audioContext = null;
    let masterVolume = 0.3;

    const SHIP_STATS = {
        viper: { hp: 100, speed: 240, fireRate: 8, damage: 1, magnet: 100, name: 'VIPER' },
        phantom: { hp: 60, speed: 320, fireRate: 8, damage: 1, magnet: 100, name: 'PHANTOM' },
        titan: { hp: 150, speed: 180, fireRate: 7, damage: 1.3, magnet: 100, name: 'TITAN' },
        spectre: { hp: 90, speed: 250, fireRate: 9, damage: 1, magnet: 180, name: 'SPECTRE' },
    };

    const ENEMIES = {
        drone: { hp: 20, speed: 100, score: 50, size: 8, color: '#ff3333', fireRate: 0.5 },
        scout: { hp: 15, speed: 200, score: 75, size: 10, color: '#ff8833', fireRate: 0.3 },
        tank: { hp: 60, speed: 60, score: 200, size: 16, color: '#00ff44', fireRate: 1 },
        shooter: { hp: 40, speed: 140, score: 150, size: 12, color: '#ffff44', fireRate: 2 },
        bomber: { hp: 80, speed: 80, score: 250, size: 14, color: '#ff00ff', fireRate: 0.8 },
        boss: { hp: 500, speed: 80, score: 2000, size: 40, color: '#0ff', fireRate: 2 },
    };

    const ACHIEVEMENTS = {
        first_blood: { name: 'First Blood', desc: 'Kill your first enemy' },
        combo_king: { name: 'Combo King', desc: 'Get a 10x combo' },
        boss_slayer: { name: 'Boss Slayer', desc: 'Defeat a boss' },
        wave_10: { name: 'Wave Master', desc: 'Reach wave 10' },
        unstoppable: { name: 'Unstoppable', desc: 'Get a 50x combo' },
        gold_rush: { name: 'Gold Rush', desc: 'Collect 1000 gold' },
        speed_demon: { name: 'Speed Demon', desc: 'Travel 50000 units' },
        pacifist: { name: 'Pacifist', desc: 'Complete a wave without shooting' },
        glass_cannon: { name: 'Glass Cannon', desc: 'Deal 10000 damage in one game' },
        collector: { name: 'Collector', desc: 'Collect 100 pickups in one game' },
        max_level: { name: 'Max Level', desc: 'Reach upgrade level 20' },
        millionaire: { name: 'Millionaire', desc: 'Accumulate 10000 gold lifetime' },
    };

    // ============================================================================
    // HELPERS
    // ============================================================================

    function clamp(v, min, max) {
        return Math.min(Math.max(v, min), max);
    }

    function distance(x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function colorAlpha(color, alpha) {
        if (!color || typeof color !== 'string') {
            return `rgba(255,255,255,${alpha})`;
        }
        if (color.startsWith('#')) {
            let hex = color.replace('#', '');
            if (hex.length === 3) {
                hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
            }
            if (hex.length !== 6) {
                return `rgba(255,255,255,${alpha})`;
            }
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        } else if (color.startsWith('rgba')) {
            return color.replace(/[\d.]+\)$/, `${alpha})`);
        } else if (color.startsWith('rgb')) {
            return color.replace('rgb', 'rgba').replace(')', `, ${alpha})`);
        }
        return `rgba(255,255,255,${alpha})`;
    }

    function rrPath(x, y, w, h, r) {
        const path = new Path2D();
        r = Math.min(r, w / 2, h / 2);
        path.moveTo(x + r, y);
        path.lineTo(x + w - r, y);
        path.arcTo(x + w, y, x + w, y + r, r);
        path.lineTo(x + w, y + h - r);
        path.arcTo(x + w, y + h, x + w - r, y + h, r);
        path.lineTo(x + r, y + h);
        path.arcTo(x, y + h, x, y + h - r, r);
        path.lineTo(x, y + r);
        path.arcTo(x, y, x + r, y, r);
        path.closePath();
        return path;
    }

    function getDailyChallenge() {
        const challenges = ['double_time', 'no_dash', 'one_life', 'boss_rush', 'rapid_fire', 'double_gold', 'slow_mo', 'magnet'];
        const dateStr = new Date().toISOString().split('T')[0];
        const hash = dateStr.split('').reduce((a, c) => ((a << 5) - a) + c.charCodeAt(0), 0);
        return challenges[Math.abs(hash) % challenges.length];
    }

    function savePersistentData() {
        const data = {
            gold: gameState.gold,
            deaths: gameState.deaths,
            totalKills: gameState.totalKills,
            playStreak: gameState.playStreak,
            lastPlayDate: gameState.lastPlayDate,
            achievements: gameState.achievements,
            prestigeLevel: gameState.prestigeLevel,
            highScore: window.highScore || 0,
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    }

    function loadPersistentData() {
        const data = localStorage.getItem(SAVE_KEY);
        if (data) {
            try {
                const saved = JSON.parse(data);
                gameState.gold = saved.gold || 0;
                gameState.deaths = saved.deaths || 0;
                gameState.totalKills = saved.totalKills || 0;
                gameState.playStreak = saved.playStreak || 0;
                gameState.lastPlayDate = saved.lastPlayDate;
                gameState.achievements = saved.achievements || {};
                gameState.prestigeLevel = saved.prestigeLevel || 0;
                window.highScore = saved.highScore || 0;

                const today = new Date().toISOString().split('T')[0];
                const lastDay = saved.lastPlayDate ? saved.lastPlayDate.split('T')[0] : null;
                if (lastDay && lastDay !== today) {
                    gameState.playStreak++;
                } else if (!lastDay) {
                    gameState.playStreak = 1;
                }
                gameState.lastPlayDate = new Date().toISOString();
            } catch (e) {
                console.error('Failed to load save:', e);
            }
        }
        window.highScore = window.highScore || 0;
        gameState.dailyChallenge = getDailyChallenge();
    }

    function declareAchievement(id) {
        if (!gameState.achievements[id]) {
            gameState.achievements[id] = true;
            savePersistentData();
            showToast(`Achievement Unlocked: ${ACHIEVEMENTS[id].name}`);
        }
    }

    function showToast(text) {
        gameState.messageText = text;
        gameState.messageTimer = 180;
    }

    // ============================================================================
    // AUDIO
    // ============================================================================

    function initAudio() {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
            console.warn('Web Audio API not supported');
        }
    }

    function playSound(type, freq = 400, duration = 0.1) {
        if (!audioContext || audioContext.state !== 'running') return;
        try {
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            gain.gain.setValueAtTime(masterVolume * 0.7, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            if (type === 'shoot') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.6, now + duration);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq + Math.random() * 100, now);
            } else if (type === 'kill') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq * 1.5, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.3, now + duration);
            } else if (type === 'pickup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq * 1.2, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.8, now + duration);
            }

            osc.start(now);
            osc.stop(now + duration);
        } catch (e) {
            // Silently fail if audio isn't available
        }
    }

    // ============================================================================
    // PLAYER CLASS
    // ============================================================================

    class Player {
        constructor(ship) {
            const stats = SHIP_STATS[ship];
            this.ship = ship;
            this.x = VIRTUAL_WIDTH / 2;
            this.y = VIRTUAL_HEIGHT - 80;
            this.vx = 0;
            this.vy = 0;
            this.speed = stats.speed;
            this.fireRate = stats.fireRate;
            this.fireCooldown = 0;
            this.weapon = 0; // 0=blaster, 1=laser, 2=missile
            this.damage = stats.damage;
            this.hp = stats.hp;
            this.maxHp = stats.hp;
            this.magnet = stats.magnet;
            this.shieldEnergy = 0;
            this.shieldMax = 100;
            this.shield = false;
            this.invulnTimer = 0;
            this.dashCooldown = 0;
            this.dashEnergy = 100;
            this.dashMax = 100;
            this.upgrades = {
                maxHp: 0,
                fireRate: 0,
                speed: 0,
                damage: 0,
                magnet: 0,
                pierce: 0,
                rearGun: false,
                sideGuns: false,
                shieldRegen: 0,
                xpRange: 0,
            };
            this.distanceTraveled = 0;
            this.damageDealt = 0;
            this.pickupsCollected = 0;
            this.shieldAngle = 0;
            this.shipColor = { viper: '#00ffff', phantom: '#ff00ff', titan: '#ffff00', spectre: '#00ff88' }[ship] || '#0f0';
            this.shipAccent = { viper: '#0088ff', phantom: '#ff0088', titan: '#ff8800', spectre: '#0088ff' }[ship] || '#00aa00';
        }

        update(keys, touchX, touchY, gameState) {
            this.fireCooldown = Math.max(0, this.fireCooldown - dt);
            this.invulnTimer = Math.max(0, this.invulnTimer - dt);
            this.dashCooldown = Math.max(0, this.dashCooldown - dt);
            this.shieldEnergy = Math.min(this.shieldMax, this.shieldEnergy + 5 * dt);

            let ax = 0, ay = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) ax -= 1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) ax += 1;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) ay -= 1;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) ay += 1;

            if (touchX !== null && touchY !== null) {
                const dx = touchX - this.x;
                const dy = touchY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 20) {
                    ax = dx / Math.max(dist, 0.1);
                    ay = dy / Math.max(dist, 0.1);
                }
            }

            const mag = Math.sqrt(ax * ax + ay * ay);
            if (mag > 0) {
                ax /= mag;
                ay /= mag;
                this.vx = ax * this.speed * (1 + 0.5 * this.upgrades.speed);
                this.vy = ay * this.speed * (1 + 0.5 * this.upgrades.speed);
            } else {
                this.vx *= 0.85;
                this.vy *= 0.85;
            }

            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.x = clamp(this.x, 15, VIRTUAL_WIDTH - 15);
            this.y = clamp(this.y, 15, VIRTUAL_HEIGHT - 15);

            const prevX = this.x - this.vx * dt;
            const prevY = this.y - this.vy * dt;
            this.distanceTraveled += distance(prevX, prevY, this.x, this.y);

            if (keys[' '] && this.dashCooldown <= 0 && this.dashEnergy > 30) {
                this.dashEnergy -= 30;
                this.dashCooldown = 0.5;
                this.vx *= 2.5;
                this.vy *= 2.5;
                for (let i = 0; i < 12; i++) {
                    particles.push({
                        x: this.x + (Math.random() - 0.5) * 20,
                        y: this.y + (Math.random() - 0.5) * 20,
                        vx: (Math.random() - 0.5) * 300,
                        vy: (Math.random() - 0.5) * 300,
                        life: 0.3,
                        color: '#0ff',
                        size: Math.random() * 4 + 2,
                    });
                }
            }
            this.dashEnergy = Math.min(this.dashMax, this.dashEnergy + 30 * dt);
        }

        fire() {
            if (this.fireCooldown > 0) return;
            this.fireCooldown = 1 / (this.fireRate * (1 + 0.3 * this.upgrades.fireRate));

            const fireRate = this.fireRate * (1 + 0.3 * this.upgrades.fireRate);
            const speed = 400;
            const damage = this.damage * (1 + 0.2 * this.upgrades.damage);

            if (this.weapon === 0) { // Blaster
                bullets.push({
                    x: this.x,
                    y: this.y - 15,
                    vx: 0,
                    vy: -speed,
                    life: 3,
                    type: 'blaster',
                    damage: damage,
                    piercing: this.upgrades.pierce,
                    color: '#0f0',
                    size: 5,
                });
                if (this.upgrades.sideGuns) {
                    bullets.push({
                        x: this.x - 10,
                        y: this.y,
                        vx: -speed * 0.3,
                        vy: -speed * 0.95,
                        life: 3,
                        type: 'blaster',
                        damage: damage * 0.6,
                        piercing: this.upgrades.pierce,
                        color: '#0f0',
                        size: 5,
                    });
                    bullets.push({
                        x: this.x + 10,
                        y: this.y,
                        vx: speed * 0.3,
                        vy: -speed * 0.95,
                        life: 3,
                        type: 'blaster',
                        damage: damage * 0.6,
                        piercing: this.upgrades.pierce,
                        color: '#0f0',
                        size: 5,
                    });
                }
                if (this.upgrades.rearGun) {
                    bullets.push({
                        x: this.x,
                        y: this.y + 15,
                        vx: 0,
                        vy: speed * 0.5,
                        life: 3,
                        type: 'blaster',
                        damage: damage * 0.5,
                        piercing: this.upgrades.pierce,
                        color: '#0f0',
                        size: 5,
                    });
                }
            } else if (this.weapon === 1) { // Laser
                bullets.push({
                    x: this.x,
                    y: this.y - 15,
                    vx: 0,
                    vy: -speed,
                    life: 2,
                    type: 'laser',
                    damage: damage * 0.7,
                    piercing: 999,
                    color: '#ff0',
                    width: 6,
                    size: 6,
                });
            } else if (this.weapon === 2) { // Missile
                bullets.push({
                    x: this.x,
                    y: this.y - 15,
                    vx: 0,
                    vy: -speed * 0.6,
                    life: 5,
                    type: 'missile',
                    damage: damage * 2,
                    piercing: this.upgrades.pierce,
                    color: '#f80',
                    target: null,
                    speed: speed * 0.6,
                    size: 7,
                });
            }
            playSound('shoot', 600 + Math.random() * 200, 0.08);
        }

        takeDamage(amount) {
            if (this.invulnTimer > 0) return;
            amount = Math.max(1, amount - (this.shield ? 30 : 0));
            this.hp -= amount;
            this.invulnTimer = 1.5;
            this.shield = false;
            gameState.screenShake = 0.3;
            gameState.screenFlash = 0.15;
            playSound('hit', 200, 0.1);
        }

        draw(ctx) {
            try {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Engine exhaust
                if (Math.abs(this.vx) > 10 || Math.abs(this.vy) > 10) {
                    for (let i = 0; i < 3; i++) {
                        const offset = i * 0.05;
                        const scale = 1 - offset;
                        particles.push({
                            x: this.x + (Math.random() - 0.5) * 6,
                            y: this.y + 12 + i * 4,
                            vx: (Math.random() - 0.5) * 80 - this.vx * 0.3,
                            vy: (Math.random() - 0.5) * 80 + 100,
                            life: 0.2,
                            color: Math.random() > 0.5 ? '#f80' : '#0ff',
                            size: 3 + i,
                        });
                    }
                }

                // Flash on invuln
                if (this.invulnTimer > 0 && Math.sin(this.invulnTimer * Math.PI * 8) > 0) {
                    ctx.fillStyle = '#fff';
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -12);
                    ctx.lineTo(8, 8);
                    ctx.lineTo(0, 5);
                    ctx.lineTo(-8, 8);
                    ctx.closePath();
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }

                // Engine flame (V3 style)
                const flameLife = (Date.now() % 100) / 100;
                const flameSize = 15 + Math.sin(Date.now() * 0.02) * 8;
                const flameBrightness = 0.6 + Math.sin(Date.now() * 0.025) * 0.4;

                const flameGrad = ctx.createLinearGradient(0, 8, 0, 8 + flameSize);
                flameGrad.addColorStop(0, `rgba(255, 150, 0, ${flameBrightness})`);
                flameGrad.addColorStop(0.5, `rgba(255, 100, 0, ${flameBrightness * 0.7})`);
                flameGrad.addColorStop(1, `rgba(0, 200, 255, 0)`);

                ctx.fillStyle = flameGrad;
                ctx.beginPath();
                ctx.moveTo(-4, 8);
                ctx.lineTo(4, 8);
                ctx.lineTo(2 + Math.sin(Date.now() * 0.03) * 2, 8 + flameSize);
                ctx.lineTo(-2 + Math.sin(Date.now() * 0.025) * 2, 8 + flameSize);
                ctx.closePath();
                ctx.fill();

                // Hull with gradient
                const hullGrad = ctx.createLinearGradient(-8, -10, 8, 12);
                hullGrad.addColorStop(0, this.shipColor);
                hullGrad.addColorStop(0.5, this.shipAccent);
                hullGrad.addColorStop(1, colorAlpha(this.shipColor, 0.3));

                ctx.fillStyle = hullGrad;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(-10, 12);
                ctx.lineTo(0, 8);
                ctx.lineTo(10, 12);
                ctx.closePath();
                ctx.fill();

                // Cockpit glow
                ctx.fillStyle = colorAlpha('#ffff00', 0.8);
                ctx.beginPath();
                ctx.arc(0, -2, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = colorAlpha('#ffffff', 0.5);
                ctx.beginPath();
                ctx.arc(0, -2, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Wing accents
                ctx.strokeStyle = this.shipAccent;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-8, 0);
                ctx.lineTo(-10, 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(8, 0);
                ctx.lineTo(10, 8);
                ctx.stroke();

                // Shield
                if (this.shield) {
                    this.shieldAngle += 2;
                    ctx.strokeStyle = colorAlpha(this.shipAccent, 0.8);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Dash energy indicator
                ctx.fillStyle = colorAlpha('#0ff', 0.4);
                ctx.fillRect(-6, 12, 12, 2);
                ctx.fillStyle = '#0ff';
                ctx.fillRect(-6, 12, (this.dashEnergy / this.dashMax) * 12, 2);

                ctx.restore();
            } catch (e) {
                console.error('Player draw error:', e);
            }
        }
    }

    // ============================================================================
    // ENEMY CLASS
    // ============================================================================

    class Enemy {
        constructor(type, x, y, waveNum) {
            const stats = ENEMIES[type];
            this.type = type;
            this.x = x;
            this.y = y;
            this.vx = 0;
            this.vy = 0;
            this.hp = stats.hp + waveNum * 5;
            this.maxHp = this.hp;
            this.speed = stats.speed + waveNum * 5;
            this.size = stats.size;
            this.color = stats.color;
            this.fireRate = stats.fireRate + waveNum * 0.1;
            this.fireCooldown = Math.random() * 2;
            this.score = stats.score + Math.floor(waveNum * 10);
            this.angle = 0;
            this.pattern = Math.random();
            this.time = 0;
            this.spin = 0;
            this.accentColor = { drone: '#ff6600', scout: '#ffaa00', tank: '#00aa00', shooter: '#ffff00', bomber: '#cc00ff', boss: '#00ffff' }[type] || '#ff6600';
            this.flashTime = 0;
        }

        update(gameState, waveTime) {
            this.time += dt;
            this.fireCooldown = Math.max(0, this.fireCooldown - dt);
            this.flashTime = Math.max(0, this.flashTime - dt);

            const playerX = player ? player.x : VIRTUAL_WIDTH / 2;
            const playerY = player ? player.y : VIRTUAL_HEIGHT / 2;

            if (this.type === 'drone') {
                this.vx = Math.sin(waveTime * 2 + this.x * 0.01) * this.speed;
                this.vy = 60;
            } else if (this.type === 'scout') {
                this.spin += 0.1;
                const figure8 = Math.sin(this.time * 3) * Math.cos(this.time * 1.5);
                this.vx = figure8 * this.speed * 0.7;
                this.vy = 80;
            } else if (this.type === 'tank') {
                const dx = playerX - this.x;
                const dist = Math.sqrt(dx * dx + (playerY - this.y) * (playerY - this.y));
                this.vx = (dx / Math.max(dist, 0.1)) * this.speed * 0.5;
                this.vy = Math.sin(waveTime * 0.5 + this.x * 0.01) * this.speed * 0.3 + 40;
            } else if (this.type === 'shooter') {
                const dx = playerX - this.x;
                const dy = playerY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    this.vx = -(dx / Math.max(dist, 0.1)) * this.speed;
                    this.vy = -(dy / Math.max(dist, 0.1)) * this.speed * 0.5;
                } else {
                    this.vx = (dx / Math.max(dist, 0.1)) * this.speed * 0.7;
                    this.vy = (dy / Math.max(dist, 0.1)) * this.speed * 0.5;
                }
            } else if (this.type === 'bomber') {
                const orbit = 80 + Math.sin(this.time * 2) * 40;
                const angle = this.time + this.x * 0.01;
                this.vx = Math.cos(angle) * orbit * 0.5;
                this.vy = Math.sin(angle) * orbit * 0.3 + 30;
            } else if (this.type === 'boss') {
                const dx = playerX - this.x;
                const dy = playerY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const target = dist < 180 ? 150 : 180;
                this.vx = (dx / Math.max(dist, 0.1)) * (target < dist ? this.speed : -this.speed * 0.3);
                this.vy = (dy / Math.max(dist, 0.1)) * (target < dist ? this.speed * 0.5 : -this.speed * 0.3);
                this.vx = clamp(this.vx, -this.speed, this.speed);
                this.vy = clamp(this.vy, -this.speed * 0.5, this.speed * 0.5);
            }

            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.x = clamp(this.x, this.size, VIRTUAL_WIDTH - this.size);
            this.y = clamp(this.y, this.size, VIRTUAL_HEIGHT + 50);

            if (this.type !== 'boss' && this.y > VIRTUAL_HEIGHT + 50) {
                this.hp = 0;
            }

            // Firing
            if (player && this.fireCooldown <= 0) {
                const px = player.x;
                const py = player.y;
                const dx = px - this.x;
                const dy = py - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 300 || this.type === 'boss') {
                    const angle = Math.atan2(dy, dx);
                    bullets.push({
                        x: this.x + Math.cos(angle) * this.size,
                        y: this.y + Math.sin(angle) * this.size,
                        vx: Math.cos(angle) * 150,
                        vy: Math.sin(angle) * 150,
                        life: 3,
                        type: 'enemy',
                        damage: 10,
                        color: '#f00',
                        size: 5,
                    });
                    if (this.type === 'shooter' || this.type === 'boss') {
                        bullets.push({
                            x: this.x + Math.cos(angle - 0.3) * this.size,
                            y: this.y + Math.sin(angle - 0.3) * this.size,
                            vx: Math.cos(angle - 0.3) * 150,
                            vy: Math.sin(angle - 0.3) * 150,
                            life: 3,
                            type: 'enemy',
                            damage: 10,
                            color: '#f00',
                            size: 5,
                        });
                        bullets.push({
                            x: this.x + Math.cos(angle + 0.3) * this.size,
                            y: this.y + Math.sin(angle + 0.3) * this.size,
                            vx: Math.cos(angle + 0.3) * 150,
                            vy: Math.sin(angle + 0.3) * 150,
                            life: 3,
                            type: 'enemy',
                            damage: 10,
                            color: '#f00',
                            size: 5,
                        });
                    }
                    this.fireCooldown = 1 / this.fireRate;
                }
            }
        }

        draw(ctx) {
            try {
                ctx.save();
                ctx.translate(this.x, this.y);

                const baseColor = this.flashTime > 0 ? '#ffffff' : this.color;

                if (this.type === 'drone') {
                    const grad = ctx.createLinearGradient(-6, -4, 6, 6);
                    grad.addColorStop(0, this.accentColor);
                    grad.addColorStop(1, colorAlpha(this.color, 0.5));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(0, -8);
                    ctx.lineTo(-8, 6);
                    ctx.lineTo(0, 4);
                    ctx.lineTo(8, 6);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = colorAlpha(this.accentColor, 0.8);
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2);
                    ctx.fill();

                    // Glow
                    ctx.strokeStyle = colorAlpha(this.accentColor, 0.3);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 12, 0, Math.PI * 2);
                    ctx.stroke();

                } else if (this.type === 'scout') {
                    const grad = ctx.createLinearGradient(-6, -6, 6, 6);
                    grad.addColorStop(0, this.accentColor);
                    grad.addColorStop(1, colorAlpha(this.color, 0.4));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(0, -8);
                    ctx.lineTo(8, 0);
                    ctx.lineTo(0, 8);
                    ctx.lineTo(-8, 0);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = colorAlpha(this.accentColor, 0.6);
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, 12, this.angle, this.angle + Math.PI / 2);
                    ctx.stroke();

                    ctx.fillStyle = colorAlpha('#ffff00', 0.9);
                    ctx.beginPath();
                    ctx.arc(0, 0, 2, 0, Math.PI * 2);
                    ctx.fill();

                    // Glow
                    ctx.strokeStyle = colorAlpha(this.accentColor, 0.3);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 14, 0, Math.PI * 2);
                    ctx.stroke();

                } else if (this.type === 'tank') {
                    ctx.fillStyle = colorAlpha(this.color, 0.7);
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const ang = (i / 6) * Math.PI * 2;
                        const px = Math.cos(ang) * 10;
                        const py = Math.sin(ang) * 9;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = this.accentColor;
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 6; i++) {
                        const ang = (i / 6) * Math.PI * 2;
                        const px = Math.cos(ang) * 8;
                        const py = Math.sin(ang) * 7;
                        ctx.beginPath();
                        ctx.arc(px, py, 2, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    ctx.fillStyle = colorAlpha(this.accentColor, 0.8);
                    ctx.beginPath();
                    ctx.arc(0, 0, 4, 0, Math.PI * 2);
                    ctx.fill();

                    // Glow
                    ctx.strokeStyle = colorAlpha(this.accentColor, 0.3);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 18, 0, Math.PI * 2);
                    ctx.stroke();

                } else if (this.type === 'shooter') {
                    const grad = ctx.createLinearGradient(-8, -6, 8, 6);
                    grad.addColorStop(0, this.accentColor);
                    grad.addColorStop(1, colorAlpha(this.color, 0.5));
                    ctx.fillStyle = grad;

                    ctx.beginPath();
                    ctx.moveTo(0, -8);
                    ctx.lineTo(-10, 0);
                    ctx.lineTo(-5, 8);
                    ctx.lineTo(0, 6);
                    ctx.lineTo(5, 8);
                    ctx.lineTo(10, 0);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = colorAlpha(this.accentColor, 0.9);
                    ctx.beginPath();
                    ctx.arc(-4, -2, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(4, -2, 2, 0, Math.PI * 2);
                    ctx.fill();

                    // Glow
                    ctx.strokeStyle = colorAlpha(this.accentColor, 0.3);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.stroke();

                } else if (this.type === 'bomber') {
                    const pulse = 0.7 + Math.sin(Date.now() * 0.008) * 0.3;
                    const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, Math.max(0.1, 10 * pulse));
                    grad.addColorStop(0, colorAlpha(this.accentColor, 0.9));
                    grad.addColorStop(0.7, colorAlpha(this.color, 0.5));
                    grad.addColorStop(1, colorAlpha(this.color, 0));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.7, 0, Math.PI * 2);
                    ctx.fill();

                    const ring = Math.sin(this.time * 5) * 0.3 + 0.7;
                    ctx.strokeStyle = colorAlpha(this.color, 0.6);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * ring, 0, Math.PI * 2);
                    ctx.stroke();

                    // Glow
                    ctx.strokeStyle = colorAlpha(this.accentColor, 0.3);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 20, 0, Math.PI * 2);
                    ctx.stroke();

                } else if (this.type === 'boss') {
                    // Boss with rotating energy arms
                    ctx.fillStyle = this.color;
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 + this.time * 2;
                        const px = Math.cos(angle) * 30;
                        const py = Math.sin(angle) * 30;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(px, py);
                        ctx.lineWidth = 3;
                        ctx.strokeStyle = colorAlpha(this.color, 0.7);
                        ctx.stroke();
                    }
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI * 2);
                    ctx.fill();

                    const pulse = Math.sin(this.time * 3) * 0.3 + 0.7;
                    ctx.strokeStyle = colorAlpha('#0ff', 0.8);
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 15 * pulse, 0, Math.PI * 2);
                    ctx.stroke();

                    // Glow aura
                    ctx.strokeStyle = colorAlpha('#0ff', 0.2);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 45, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();
            } catch (e) {
                console.error('Enemy draw error:', e);
            }
        }
    }

    // ============================================================================
    // EFFECTS
    // ============================================================================

    function createExplosion(x, y, size = 1, color = '#ff6600') {
        explosions.push({
            x, y, size, color,
            rings: [
                { radius: 0, maxRadius: 20 * size, life: 0.3, color: colorAlpha(color, 1) },
                { radius: 0, maxRadius: 35 * size, life: 0.4, color: colorAlpha(color, 0.6) },
                { radius: 0, maxRadius: 50 * size, life: 0.5, color: colorAlpha(color, 0.3) },
            ],
        });
    }

    function createPickup(x, y, type) {
        pickups.push({
            x, y, type,
            life: 5,
            collected: false,
            angle: 0,
        });
    }

    function createScorePopup(x, y, text) {
        scorePopups.push({
            x, y, text,
            life: 1,
            scale: 1,
        });
    }

    // ============================================================================
    // WAVE GENERATION
    // ============================================================================

    function generateWave(wave) {
        const enemies = [];
        const waveEnemies = [
            { type: 'drone', count: 3 + wave },
            { type: 'scout', count: 2 + Math.floor(wave / 2) },
        ];

        if (wave > 3) waveEnemies.push({ type: 'tank', count: 1 + Math.floor(wave / 3) });
        if (wave > 5) waveEnemies.push({ type: 'shooter', count: 1 + Math.floor(wave / 4) });
        if (wave > 7) waveEnemies.push({ type: 'bomber', count: 1 + Math.floor(wave / 5) });
        if (wave > 10) {
            waveEnemies.push({ type: 'boss', count: 1 });
        }

        let spawnX = 0;
        for (const w of waveEnemies) {
            for (let i = 0; i < w.count; i++) {
                spawnX = 50 + Math.random() * (VIRTUAL_WIDTH - 100);
                enemies.push(new Enemy(w.type, spawnX, -30 - i * 40, wave));
            }
        }
        return enemies;
    }

    // ============================================================================
    // BACKGROUND
    // ============================================================================

    function initBackground() {
        stars = [];
        nebulaClouds = [];
        dustParticles = [];

        // Initialize stars (parallax layers)
        for (let layer = 0; layer < 3; layer++) {
            const count = 80 + layer * 40;
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * VIRTUAL_WIDTH,
                    y: Math.random() * VIRTUAL_HEIGHT,
                    size: Math.random() * (2 - layer * 0.3) + 0.3,
                    brightness: Math.random() * 0.4 + 0.3 + layer * 0.15,
                    layer: layer,
                });
            }
        }

        // Nebula clouds
        nebulaClouds.push({
            x: VIRTUAL_WIDTH * 0.3,
            y: VIRTUAL_HEIGHT * 0.2,
            radius: 150,
            color: '#ff006e',
        });
        nebulaClouds.push({
            x: VIRTUAL_WIDTH * 0.7,
            y: VIRTUAL_HEIGHT * 0.6,
            radius: 200,
            color: '#0084ff',
        });
        nebulaClouds.push({
            x: VIRTUAL_WIDTH * 0.5,
            y: VIRTUAL_HEIGHT * 0.8,
            radius: 180,
            color: '#00ff88',
        });

        // Dust particles
        for (let i = 0; i < 300; i++) {
            dustParticles.push({
                x: Math.random() * VIRTUAL_WIDTH,
                y: Math.random() * VIRTUAL_HEIGHT,
                vx: (Math.random() - 0.5) * 5,
                vy: (Math.random() - 0.5) * 5,
                size: Math.random() * 0.3 + 0.05,
                brightness: Math.random() * 0.2 + 0.1,
            });
        }
    }

    function drawBackground() {
        try {
            // Clear background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

            // Update and draw dust
            for (let d of dustParticles) {
                d.x += d.vx;
                d.y += d.vy;
                if (d.x < 0) d.x = VIRTUAL_WIDTH;
                if (d.x > VIRTUAL_WIDTH) d.x = 0;
                if (d.y < 0) d.y = VIRTUAL_HEIGHT;
                if (d.y > VIRTUAL_HEIGHT) d.y = 0;

                ctx.fillStyle = colorAlpha('#fff', d.brightness);
                ctx.fillRect(d.x, d.y, d.size, d.size);
            }

            // Draw parallax stars
            const time = Date.now() * 0.0001;
            for (let star of stars) {
                const speed = (star.layer + 1) * 0.02;
                const scrollX = (time * speed) % VIRTUAL_WIDTH;
                const displayX = (star.x + scrollX * 10) % VIRTUAL_WIDTH;

                ctx.fillStyle = colorAlpha('#fff', star.brightness);
                ctx.globalAlpha = star.brightness;
                ctx.fillRect(displayX, star.y, star.size, star.size);
                ctx.globalAlpha = 1;
            }

            // Draw nebula clouds
            for (let neb of nebulaClouds) {
                const grad = ctx.createRadialGradient(neb.x, neb.y, 10, neb.x, neb.y, Math.max(0.1, neb.radius));
                grad.addColorStop(0, colorAlpha(neb.color, 0.2));
                grad.addColorStop(1, colorAlpha(neb.color, 0));
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
            }

            // Vignette
            const vigGrad = ctx.createRadialGradient(VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2, 0, VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2, Math.max(VIRTUAL_WIDTH, VIRTUAL_HEIGHT));
            vigGrad.addColorStop(0, colorAlpha('#000', 0));
            vigGrad.addColorStop(1, colorAlpha('#000', 0.3));
            ctx.fillStyle = vigGrad;
            ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        } catch (e) {
            console.error('Background draw error:', e);
        }
    }

    // ============================================================================
    // BULLETS & DRAWING
    // ============================================================================

    function drawBullets() {
        for (let b of bullets) {
            try {
                ctx.save();
                ctx.translate(b.x, b.y);

                const size = b.size || 5;

                // Glow halo
                ctx.fillStyle = colorAlpha(b.color, 0.15);
                ctx.beginPath();
                ctx.arc(0, 0, size * 3, 0, Math.PI * 2);
                ctx.fill();

                // Main bullet
                if (b.type === 'laser') {
                    ctx.strokeStyle = b.color;
                    ctx.lineWidth = b.width || 6;
                    ctx.beginPath();
                    ctx.moveTo(0, -20);
                    ctx.lineTo(0, 20);
                    ctx.stroke();

                    // Laser glow
                    ctx.strokeStyle = colorAlpha(b.color, 0.4);
                    ctx.lineWidth = 12;
                    ctx.stroke();
                } else if (b.type === 'missile') {
                    const grad = ctx.createLinearGradient(0, -size, 0, size);
                    grad.addColorStop(0, b.color);
                    grad.addColorStop(1, colorAlpha(b.color, 0.3));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(0, -size * 2);
                    ctx.lineTo(-size, size);
                    ctx.lineTo(0, size * 1.5);
                    ctx.lineTo(size, size);
                    ctx.closePath();
                    ctx.fill();

                    // Missile glow
                    ctx.strokeStyle = colorAlpha(b.color, 0.3);
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    // Blaster
                    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(0.1, size));
                    grad.addColorStop(0, colorAlpha(b.color, 0.9));
                    grad.addColorStop(1, colorAlpha(b.color, 0.3));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, size, 0, Math.PI * 2);
                    ctx.fill();

                    // Bright center
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 0, size * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            } catch (e) {
                console.error('Bullet draw error:', e);
            }
        }
    }

    function drawExplosions() {
        for (let ex of explosions) {
            try {
                for (let ring of ex.rings) {
                    if (ring.radius > 0) {
                        ctx.strokeStyle = ring.color;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(ex.x, ex.y, ring.radius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            } catch (e) {
                console.error('Explosion draw error:', e);
            }
        }
    }

    function drawParticles() {
        for (let p of particles) {
            try {
                ctx.fillStyle = colorAlpha(p.color, p.life);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            } catch (e) {
                console.error('Particle draw error:', e);
            }
        }
    }

    function drawPickups() {
        for (let p of pickups) {
            try {
                ctx.save();
                ctx.translate(p.x, p.y + Math.sin(Date.now() * 0.003) * 3);
                ctx.rotate(p.angle);

                if (p.type === 'gold') {
                    ctx.fillStyle = '#ff0';
                    ctx.beginPath();
                    ctx.moveTo(0, -6);
                    ctx.lineTo(6, -2);
                    ctx.lineTo(6, 2);
                    ctx.lineTo(0, 6);
                    ctx.lineTo(-6, 2);
                    ctx.lineTo(-6, -2);
                    ctx.closePath();
                    ctx.fill();

                    // Glow
                    ctx.strokeStyle = colorAlpha('#ff0', 0.3);
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (p.type === 'health') {
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(-4, -4, 8, 8);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(-2, -1, 4, 2);
                    ctx.fillRect(-1, -2, 2, 4);

                    // Glow
                    ctx.strokeStyle = colorAlpha('#0f0', 0.3);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 8, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (p.type === 'xp') {
                    ctx.fillStyle = '#0ff';
                    ctx.beginPath();
                    ctx.moveTo(0, -6);
                    ctx.lineTo(4, 2);
                    ctx.lineTo(2, 2);
                    ctx.lineTo(2, 6);
                    ctx.lineTo(-2, 6);
                    ctx.lineTo(-2, 2);
                    ctx.lineTo(-4, 2);
                    ctx.closePath();
                    ctx.fill();

                    // Glow
                    ctx.strokeStyle = colorAlpha('#0ff', 0.3);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 8, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();
            } catch (e) {
                console.error('Pickup draw error:', e);
            }
        }
    }

    function drawScorePopups() {
        for (let sp of scorePopups) {
            try {
                ctx.save();
                ctx.globalAlpha = sp.scale;
                ctx.font = 'bold 16px system-ui, -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ff0';
                ctx.fillText(sp.text, sp.x, sp.y);
                ctx.restore();
            } catch (e) {
                console.error('Score popup draw error:', e);
            }
        }
    }

    // ============================================================================
    // UI DRAWING
    // ============================================================================

    function drawUI() {
        try {
            if (gameState.mode === 'playing' && player) {
                // Health bar with gradient
                const barWidth = 100;
                const barHeight = 8;
                const barX = 10;
                const barY = 10;

                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barWidth, barHeight);

                const hpPercent = Math.max(0, player.hp / player.maxHp);
                const grad = ctx.createLinearGradient(barX, barY, barX + barWidth, barY);
                grad.addColorStop(0, hpPercent > 0.5 ? '#00ff00' : '#ff6600');
                grad.addColorStop(1, hpPercent > 0.5 ? '#00aa00' : '#ff0000');
                ctx.fillStyle = grad;
                ctx.fillRect(barX, barY, barWidth * hpPercent, barHeight);

                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 1;
                ctx.strokeRect(barX, barY, barWidth, barHeight);

                // Score
                ctx.font = 'bold 14px system-ui, -apple-system, sans-serif';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'right';
                ctx.fillText(`Score: ${Math.floor(gameState.score)}`, VIRTUAL_WIDTH - 10, 20);

                // Wave
                ctx.fillText(`Wave: ${gameState.wave}`, VIRTUAL_WIDTH - 10, 40);

                // Combo
                if (gameState.combo > 0) {
                    ctx.fillStyle = '#ff0';
                    ctx.font = 'bold 20px system-ui, -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${gameState.combo}x COMBO!`, VIRTUAL_WIDTH / 2, 40);
                }

                // Boss HP bar
                const boss = enemies.find(e => e.type === 'boss');
                if (boss) {
                    const bossBarWidth = 200;
                    const bossBarHeight = 10;
                    const bossBarX = VIRTUAL_WIDTH / 2 - bossBarWidth / 2;
                    const bossBarY = 20;

                    ctx.fillStyle = '#333';
                    ctx.fillRect(bossBarX, bossBarY, bossBarWidth, bossBarHeight);

                    const bossHpPercent = Math.max(0, boss.hp / boss.maxHp);
                    const bossGrad = ctx.createLinearGradient(bossBarX, bossBarY, bossBarX + bossBarWidth, bossBarY);
                    bossGrad.addColorStop(0, '#f00');
                    bossGrad.addColorStop(1, '#ff6600');
                    ctx.fillStyle = bossGrad;
                    ctx.fillRect(bossBarX, bossBarY, bossBarWidth * bossHpPercent, bossBarHeight);

                    ctx.strokeStyle = '#0ff';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(bossBarX, bossBarY, bossBarWidth, bossBarHeight);

                    ctx.fillStyle = '#0ff';
                    ctx.font = 'bold 10px system-ui, -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`BOSS: ${Math.ceil(boss.hp)}/${Math.ceil(boss.maxHp)}`, VIRTUAL_WIDTH / 2, bossBarY + 22);
                }

                // Message toast
                if (gameState.messageTimer > 0) {
                    ctx.globalAlpha = Math.min(1, gameState.messageTimer / 60);
                    ctx.font = 'bold 18px system-ui, -apple-system, sans-serif';
                    ctx.fillStyle = '#0ff';
                    ctx.textAlign = 'center';
                    ctx.fillText(gameState.messageText, VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2);
                    ctx.globalAlpha = 1;
                }
            }
        } catch (e) {
            console.error('UI draw error:', e);
        }
    }

    function drawMenu() {
        try {
            // Title with glow
            ctx.save();
            ctx.shadowColor = '#0ff';
            ctx.shadowBlur = 20;
            ctx.font = 'bold 40px system-ui, -apple-system, sans-serif';
            ctx.fillStyle = '#0ff';
            ctx.textAlign = 'center';
            ctx.fillText('NOVA BREACH', VIRTUAL_WIDTH / 2, 100);
            ctx.restore();

            ctx.font = '14px system-ui, -apple-system, sans-serif';
            ctx.fillStyle = '#888';
            ctx.textAlign = 'center';
            ctx.fillText(`High Score: ${window.highScore || 0}`, VIRTUAL_WIDTH / 2, 140);

            const buttons = [
                { label: 'PLAY', y: 360 },
                { label: 'DAILY', y: 420 },
                { label: 'SHOP', y: 480 },
                { label: 'STATS', y: 540 },
            ];

            buttons.forEach((btn, i) => {
                const isHovered = false;
                ctx.fillStyle = isHovered ? '#0ff' : '#00aa00';
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                ctx.fillRect(VIRTUAL_WIDTH / 2 - 80, btn.y - 20, 160, 40);
                ctx.strokeRect(VIRTUAL_WIDTH / 2 - 80, btn.y - 20, 160, 40);

                ctx.font = 'bold 16px system-ui, -apple-system, sans-serif';
                ctx.fillStyle = '#000';
                ctx.textAlign = 'center';
                ctx.fillText(btn.label, VIRTUAL_WIDTH / 2, btn.y + 8);
            });

            // Gold counter
            ctx.font = '12px system-ui, -apple-system, sans-serif';
            ctx.fillStyle = '#ff0';
            ctx.textAlign = 'right';
            ctx.fillText(`Gold: ${gameState.gold}`, VIRTUAL_WIDTH - 10, VIRTUAL_HEIGHT - 10);
        } catch (e) {
            console.error('Menu draw error:', e);
        }
    }

    function drawUpgrade() {
        try {
            ctx.font = 'bold 20px system-ui, -apple-system, sans-serif';
            ctx.fillStyle = '#0ff';
            ctx.textAlign = 'center';
            ctx.fillText('CHOOSE AN UPGRADE', VIRTUAL_WIDTH / 2, 80);

            for (let i = 0; i < gameState.upgradeChoices.length; i++) {
                const upgrade = gameState.upgradeChoices[i];
                const y = 200 + i * 120;

                ctx.fillStyle = gameState.selectedUpgradeIdx === i ? '#0ff' : '#00aa00';
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                ctx.fillRect(VIRTUAL_WIDTH / 2 - 100, y - 40, 200, 80);
                ctx.strokeRect(VIRTUAL_WIDTH / 2 - 100, y - 40, 200, 80);

                ctx.font = 'bold 14px system-ui, -apple-system, sans-serif';
                ctx.fillStyle = '#000';
                ctx.textAlign = 'center';
                ctx.fillText(upgrade.toUpperCase(), VIRTUAL_WIDTH / 2, y + 10);
            }
        } catch (e) {
            console.error('Upgrade draw error:', e);
        }
    }

    function drawDead() {
        try {
            ctx.font = 'bold 40px system-ui, -apple-system, sans-serif';
            ctx.fillStyle = '#f00';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', VIRTUAL_WIDTH / 2, 150);

            ctx.font = '16px system-ui, -apple-system, sans-serif';
            ctx.fillStyle = '#fff';
            ctx.fillText(`Wave: ${gameState.wave}`, VIRTUAL_WIDTH / 2, 210);
            ctx.fillText(`Score: ${Math.floor(gameState.score)}`, VIRTUAL_WIDTH / 2, 240);
            ctx.fillText(`Kills: ${gameState.kills}`, VIRTUAL_WIDTH / 2, 270);

            ctx.fillStyle = '#00aa00';
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 2;
            ctx.fillRect(VIRTUAL_WIDTH / 2 - 80, 380, 160, 40);
            ctx.strokeRect(VIRTUAL_WIDTH / 2 - 80, 380, 160, 40);

            ctx.font = 'bold 16px system-ui, -apple-system, sans-serif';
            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.fillText('MENU', VIRTUAL_WIDTH / 2, 408);
        } catch (e) {
            console.error('Dead screen draw error:', e);
        }
    }

    // ============================================================================
    // GAME LOGIC
    // ============================================================================

    function update() {
        if (gameState.mode !== 'playing' || !player) return;

        player.update(keys, touchX, touchY, gameState);
        player.fire();

        // Update bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.life -= dt;
            b.x += b.vx * dt;
            b.y += b.vy * dt;

            // Missile homing
            if (b.type === 'missile' && !b.target) {
                let closest = null;
                let closestDist = 200;
                for (const e of enemies) {
                    const d = distance(b.x, b.y, e.x, e.y);
                    if (d < closestDist) {
                        closestDist = d;
                        closest = e;
                    }
                }
                b.target = closest;
            }
            if (b.type === 'missile' && b.target && b.target.hp > 0) {
                const dx = b.target.x - b.x;
                const dy = b.target.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    b.vx += (dx / dist) * b.speed * 0.5 * dt;
                    b.vy += (dy / dist) * b.speed * 0.5 * dt;
                    const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                    b.vx = (b.vx / speed) * b.speed;
                    b.vy = (b.vy / speed) * b.speed;
                }
            }

            // Remove off-screen
            if (b.life <= 0 || b.y < -50 || b.y > VIRTUAL_HEIGHT + 50 || b.x < -50 || b.x > VIRTUAL_WIDTH + 50) {
                bullets.splice(i, 1);
                continue;
            }

            // Collision with enemies (player bullets only)
            if (b.type === 'enemy') continue;
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                if (distance(b.x, b.y, e.x, e.y) < (b.size || 5) + e.size) {
                    const damage = b.damage || 1;
                    e.hp -= damage;
                    e.flashTime = 0.1;
                    player.damageDealt += damage;
                    particles.push({
                        x: b.x, y: b.y,
                        vx: (Math.random() - 0.5) * 200,
                        vy: (Math.random() - 0.5) * 200,
                        life: 0.2,
                        color: '#0f0',
                        size: 2,
                    });
                    if (b.piercing > 0) {
                        b.piercing--;
                    } else {
                        bullets.splice(i, 1);
                    }
                    if (e.hp <= 0) {
                        createExplosion(e.x, e.y, 1, e.color);
                        gameState.score += e.score * (1 + gameState.combo * 0.2);
                        gameState.kills++;
                        gameState.totalKills++;
                        if (gameState.kills === 1) declareAchievement('first_blood');
                        gameState.combo++;
                        gameState.comboTimer = 2.5;
                        createPickup(e.x, e.y, Math.random() > 0.7 ? 'gold' : (Math.random() > 0.5 ? 'xp' : 'health'));
                        if (gameState.combo >= 10) declareAchievement('combo_king');
                        if (gameState.combo >= 50) declareAchievement('unstoppable');
                        playSound('kill', 300 + Math.random() * 100, 0.15);
                    }
                    break;
                }
            }
        }

        // Update enemies
        const waveTime = (gameState.wave * 10 + gameState.kills) * 0.1;
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update(gameState, waveTime);
            if (enemies[i].hp <= 0) {
                enemies.splice(i, 1);
            }
        }

        if (enemies.length === 0 && gameState.numEnemies > 0) {
            advanceWave();
        }

        // Collision with enemy bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            if (b.type === 'enemy' && player) {
                if (distance(b.x, b.y, player.x, player.y) < 8) {
                    player.takeDamage(b.damage);
                    bullets.splice(i, 1);
                }
            }
        }

        // Update pickups
        for (let i = pickups.length - 1; i >= 0; i--) {
            const p = pickups[i];
            p.life -= dt;
            p.angle += 0.05;
            if (!p.collected && player && distance(p.x, p.y, player.x, player.y) < player.magnet * (1 + player.upgrades.magnet * 0.1)) {
                p.collected = true;
                if (p.type === 'gold') {
                    gameState.gold += 10;
                    gameState.score += 5;
                } else if (p.type === 'xp') {
                    gameState.xp += 25;
                    player.pickupsCollected++;
                } else if (p.type === 'health') {
                    player.hp = Math.min(player.maxHp, player.hp + 30);
                    player.pickupsCollected++;
                }
                createScorePopup(p.x, p.y, p.type === 'gold' ? '+10' : '+25');
                playSound('pickup', 800, 0.05);
            }
            if (p.life <= 0) {
                pickups.splice(i, 1);
            }
        }

        // Update combo timer
        gameState.comboTimer -= dt;
        if (gameState.comboTimer <= 0) {
            gameState.combo = 0;
        }

        // Update particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].life -= dt;
            particles[i].x += particles[i].vx * dt;
            particles[i].y += particles[i].vy * dt;
            particles[i].vy += 100 * dt;
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            }
        }

        // Update explosions
        for (let i = explosions.length - 1; i >= 0; i--) {
            const ex = explosions[i];
            for (let ring of ex.rings) {
                ring.radius = Math.min(ring.radius + ring.maxRadius * 3 * dt, ring.maxRadius);
            }
            if (ex.rings.every(r => r.radius >= r.maxRadius)) {
                explosions.splice(i, 1);
            }
        }

        // Update score popups
        for (let i = scorePopups.length - 1; i >= 0; i--) {
            scorePopups[i].life -= dt;
            scorePopups[i].y -= 50 * dt;
            scorePopups[i].scale = scorePopups[i].life;
            if (scorePopups[i].life <= 0) {
                scorePopups.splice(i, 1);
            }
        }

        // Game over check
        if (player.hp <= 0) {
            gameOver();
        }
    }

    function advanceWave() {
        gameState.wave++;
        gameState.comboTimer = 0;
        gameState.combo = 0;
        gameState.upgradeChoices = [
            'fireRate', 'damage', 'maxHp',
            'speed', 'magnet', 'pierce',
            'xpRange', 'shieldRegen'
        ].sort(() => Math.random() - 0.5).slice(0, 3);
        gameState.mode = 'upgrade';
        gameState.messageText = `WAVE ${gameState.wave} COMPLETE`;
        gameState.messageTimer = 120;
        showToast(`Wave ${gameState.wave} - Choose an upgrade!`);
    }

    function gameOver() {
        gameState.mode = 'dead';
        gameState.deaths++;
        const highScore = window.highScore || 0;
        if (gameState.score > highScore) {
            window.highScore = gameState.score;
            savePersistentData();
        }
        savePersistentData();
        gameState.messageText = 'GAME OVER';
        gameState.messageTimer = 120;
    }

    function selectUpgrade(idx) {
        if (idx < 0 || idx >= gameState.upgradeChoices.length) return;
        const upgrade = gameState.upgradeChoices[idx];
        const levels = [
            { key: 'maxHp', val: 20, stat: 'Max HP' },
            { key: 'fireRate', val: 1, stat: 'Fire Rate' },
            { key: 'speed', val: 1, stat: 'Speed' },
            { key: 'damage', val: 1, stat: 'Damage' },
            { key: 'magnet', val: 30, stat: 'Magnet' },
            { key: 'pierce', val: 1, stat: 'Piercing' },
            { key: 'xpRange', val: 30, stat: 'XP Range' },
            { key: 'shieldRegen', val: 1, stat: 'Shield Regen' },
        ];
        const level = levels.find(l => l.key === upgrade);
        if (level && player) {
            if (level.key === 'maxHp') {
                player.maxHp += 20;
                player.hp = player.maxHp;
            } else if (level.key === 'rearGun') {
                player.upgrades.rearGun = true;
            } else if (level.key === 'sideGuns') {
                player.upgrades.sideGuns = true;
            } else {
                player.upgrades[level.key] += level.val;
            }
            showToast(`+${level.stat}`);
        }
        gameState.mode = 'playing';
        gameState.upgradeChoices = [];
    }

    function startGame(ship, isDaily = false) {
        gameState.mode = 'playing';
        gameState.wave = 1;
        gameState.score = 0;
        gameState.combo = 0;
        gameState.comboTimer = 0;
        gameState.kills = 0;
        gameState.xp = 0;
        gameState.xpMax = 100;
        gameState.screenShake = 0;
        gameState.screenFlash = 0;
        gameState.selectedShip = ship;
        gameState.upgradeChoices = [];
        gameState.selectedUpgradeIdx = 0;
        gameState.isDailyMode = isDaily;

        player = new Player(ship);
        enemies = generateWave(gameState.wave);
        gameState.numEnemies = enemies.length;
        bullets = [];
        particles = [];
        pickups = [];
        explosions = [];
        scorePopups = [];
    }

    // ============================================================================
    // INPUT HANDLING
    // ============================================================================

    document.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (e.key === ' ') e.preventDefault();
        if (e.key === 'Enter' && gameState.mode === 'menu') {
            startGame('viper');
        }
    });

    document.addEventListener('keyup', e => {
        keys[e.key] = false;
    });

    canvas.addEventListener('touchstart', e => {
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        touchX = (touch.clientX - rect.left) / rect.width * VIRTUAL_WIDTH;
        touchY = (touch.clientY - rect.top) / rect.height * VIRTUAL_HEIGHT;
    });

    canvas.addEventListener('touchmove', e => {
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        touchX = (touch.clientX - rect.left) / rect.width * VIRTUAL_WIDTH;
        touchY = (touch.clientY - rect.top) / rect.height * VIRTUAL_HEIGHT;
    });

    window.addEventListener('touchend', e => { touchX = null; touchY = null; }, false);

    canvas.addEventListener('click', e => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * VIRTUAL_WIDTH;
        const y = (e.clientY - rect.top) / rect.height * VIRTUAL_HEIGHT;
        handleClickOrTap(x, y);
    });

    canvas.addEventListener('touchend', e => {
        if (e.changedTouches.length > 0) {
            const touch = e.changedTouches[0];
            const rect = canvas.getBoundingClientRect();
            const x = (touch.clientX - rect.left) / rect.width * VIRTUAL_WIDTH;
            const y = (touch.clientY - rect.top) / rect.height * VIRTUAL_HEIGHT;
            handleClickOrTap(x, y);
        }
    });

    function handleClickOrTap(x, y) {
        if (gameState.mode === 'menu') {
            const buttons = [
                { label: 'PLAY', y: 360 },
                { label: 'DAILY', y: 420 },
                { label: 'SHOP', y: 480 },
                { label: 'STATS', y: 540 },
            ];
            buttons.forEach((btn, i) => {
                if (Math.abs(y - btn.y) < 22 && Math.abs(x - VIRTUAL_WIDTH / 2) < 90) {
                    if (btn.label === 'PLAY') {
                        startGame('viper');
                    } else if (btn.label === 'DAILY') {
                        startGame('viper', true);
                    }
                }
            });
        } else if (gameState.mode === 'upgrade') {
            for (let i = 0; i < 3; i++) {
                const btnX = VIRTUAL_WIDTH / 2;
                const btnY = 200 + i * 120;
                if (Math.abs(y - btnY) < 50 && Math.abs(x - btnX) < 100) {
                    selectUpgrade(i);
                }
            }
        } else if (gameState.mode === 'dead') {
            if (Math.abs(y - 408) < 22 && Math.abs(x - VIRTUAL_WIDTH / 2) < 90) {
                gameState.mode = 'menu';
            }
        }
    }

    // ============================================================================
    // MAIN LOOP
    // ============================================================================

    function draw() {
        try {
            drawBackground();

            if (gameState.mode === 'playing' && player) {
                for (const e of enemies) {
                    e.draw(ctx);
                }

                player.draw(ctx);

                drawBullets();
                drawExplosions();
                drawParticles();
                drawPickups();
                drawScorePopups();

                drawUI();
            } else if (gameState.mode === 'menu') {
                drawMenu();
            } else if (gameState.mode === 'upgrade') {
                drawUpgrade();
            } else if (gameState.mode === 'dead') {
                drawDead();
            }

            // Screen shake
            if (gameState.screenShake > 0) {
                gameState.screenShake -= dt;
                ctx.save();
                const shake = Math.random() * gameState.screenShake * 4;
                ctx.translate(shake - gameState.screenShake * 2, shake - gameState.screenShake * 2);
            }

            // Screen flash
            if (gameState.screenFlash > 0) {
                gameState.screenFlash -= dt;
                ctx.fillStyle = colorAlpha(gameState.screenFlashColor, gameState.screenFlash);
                ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
            }

        } catch (e) {
            console.error('Draw error:', e);
        }
    }

    let lastTime = Date.now();
    function gameLoop() {
        const now = Date.now();
        const delta = now - lastTime;
        lastTime = now;

        update();
        draw();

        requestAnimationFrame(gameLoop);
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================

    initAudio();
    loadPersistentData();
    initBackground();

    gameLoop();
})();
    </script>
