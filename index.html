<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VOID RIFT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        canvas {
            display: block;
            border: 2px solid #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .ui-text {
            color: #0f0;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // ============================================================================
        // VOID RIFT - Complete Mobile Game
        // ============================================================================

        // Utility: Safe number validation
        function safeNum(val, def = 0) {
            const n = Number(val);
            return isFinite(n) ? n : def;
        }

        // Utility: Safe string validation
        function safeStr(val, def = '') {
            return String(val || def).toString();
        }

        // Utility: Distance between two points
        function dist(x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // Utility: Random number between min and max
        function rand(min, max) {
            return Math.random() * (max - min) + min;
        }

        // Utility: Clamp value
        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }

        // ============================================================================
        // AUDIO SYSTEM - Web Audio API
        // ============================================================================

        class AudioManager {
            constructor() {
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    this.ctx = null;
                }
                this.masterVolume = 0.3;
            }

            createOscillator(freq, duration, type = 'sine', envelope = null) {
                if (!this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);

                    osc.frequency.value = safeNum(freq, 440);
                    osc.type = type;
                    gain.gain.value = this.masterVolume;

                    if (envelope) {
                        const now = this.ctx.currentTime;
                        gain.gain.setValueAtTime(envelope.start || this.masterVolume, now);
                        if (envelope.peak) {
                            gain.gain.linearRampToValueAtTime(envelope.peak, now + safeNum(envelope.peakTime, 0.05));
                        }
                        gain.gain.linearRampToValueAtTime(0, now + safeNum(duration, 0.1));
                    } else {
                        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + safeNum(duration, 0.1));
                    }

                    osc.start(this.ctx.currentTime);
                    osc.stop(this.ctx.currentTime + safeNum(duration, 0.1));
                } catch (e) {
                    console.warn('Audio error:', e);
                }
            }

            shoot() {
                this.createOscillator(400, 0.08, 'square', {
                    start: this.masterVolume,
                    peak: this.masterVolume * 0.8,
                    peakTime: 0.02
                });
                this.createOscillator(200, 0.08, 'sine', {
                    start: this.masterVolume * 0.5,
                    peak: this.masterVolume * 0.3,
                    peakTime: 0.04
                });
            }

            explosion(pitch = 100) {
                this.createOscillator(pitch, 0.3, 'square', {
                    start: this.masterVolume,
                    peak: this.masterVolume * 0.6,
                    peakTime: 0.05
                });
                this.createOscillator(pitch * 0.6, 0.25, 'sine', {
                    start: this.masterVolume * 0.3,
                    peak: 0,
                    peakTime: 0.2
                });
            }

            pickup() {
                this.createOscillator(600, 0.1, 'sine');
                this.createOscillator(800, 0.08, 'sine');
            }

            damage() {
                this.createOscillator(150, 0.15, 'square');
            }

            levelUp() {
                this.createOscillator(800, 0.1, 'sine');
                this.createOscillator(1000, 0.1, 'sine');
                this.createOscillator(1200, 0.1, 'sine');
            }
        }

        // ============================================================================
        // OBJECT POOL - For bullets, enemies, particles
        // ============================================================================

        class Pool {
            constructor(factory, maxSize = 100) {
                this.factory = factory;
                this.maxSize = maxSize;
                this.available = [];
                this.inUse = [];
                this.createdCount = 0;
            }

            spawn(config) {
                try {
                    let obj;
                    if (this.available.length > 0) {
                        obj = this.available.pop();
                        if (obj.init) obj.init(config);
                    } else if (this.createdCount < this.maxSize) {
                        obj = this.factory();
                        this.createdCount++;
                        if (obj.init) obj.init(config);
                    } else {
                        // Recycle oldest in-use object
                        if (this.inUse.length > 0) {
                            obj = this.inUse.shift();
                            if (obj.init) obj.init(config);
                        } else {
                            return null;
                        }
                    }
                    this.inUse.push(obj);
                    return obj;
                } catch (e) {
                    console.warn('Pool spawn error:', e);
                    return null;
                }
            }

            recycle(obj) {
                try {
                    const idx = this.inUse.indexOf(obj);
                    if (idx !== -1) {
                        this.inUse.splice(idx, 1);
                        this.available.push(obj);
                    }
                } catch (e) {
                    console.warn('Pool recycle error:', e);
                }
            }

            updateAll(dt) {
                for (let i = this.inUse.length - 1; i >= 0; i--) {
                    const obj = this.inUse[i];
                    if (obj.update) {
                        obj.update(dt);
                        if (obj.isDead) {
                            this.recycle(obj);
                        }
                    }
                }
            }

            drawAll(ctx) {
                for (let i = 0; i < this.inUse.length; i++) {
                    if (this.inUse[i].draw) {
                        this.inUse[i].draw(ctx);
                    }
                }
            }

            clear() {
                this.inUse = [];
                this.available = [];
            }

            getCount() {
                return this.inUse.length;
            }
        }

        // ============================================================================
        // PARTICLE SYSTEM
        // ============================================================================

        function createParticle() {
            return {
                x: 0, y: 0,
                vx: 0, vy: 0,
                life: 1,
                maxLife: 1,
                size: 2,
                color: '#fff',
                isDead: false,

                init(config) {
                    this.x = safeNum(config.x, 0);
                    this.y = safeNum(config.y, 0);
                    this.vx = safeNum(config.vx, 0);
                    this.vy = safeNum(config.vy, 0);
                    this.life = safeNum(config.life, 0.5);
                    this.maxLife = this.life;
                    this.size = safeNum(config.size, 2);
                    this.color = safeStr(config.color, '#fff');
                    this.isDead = false;
                },

                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.vy += 50 * dt; // Gravity
                    this.life -= dt;
                    if (this.life <= 0) {
                        this.isDead = true;
                    }
                },

                draw(ctx) {
                    const alpha = this.life / this.maxLife;
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = alpha;
                    ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                    ctx.globalAlpha = 1;
                }
            };
        }

        // ============================================================================
        // BULLET SYSTEM
        // ============================================================================

        function createBullet() {
            return {
                x: 0, y: 0,
                vx: 0, vy: 0,
                speed: 400,
                radius: 3,
                color: '#0f0',
                damage: 10,
                isDead: false,
                owner: 'player',
                element: 'normal',

                init(config) {
                    this.x = safeNum(config.x, 0);
                    this.y = safeNum(config.y, 0);
                    this.vx = safeNum(config.vx, 0);
                    this.vy = safeNum(config.vy, -400);
                    this.speed = safeNum(config.speed, 400);
                    this.damage = safeNum(config.damage, 10);
                    this.color = safeStr(config.color, '#0f0');
                    this.owner = safeStr(config.owner, 'player');
                    this.element = safeStr(config.element, 'normal');
                    this.isDead = false;

                    // Normalize velocity
                    const len = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (len > 0) {
                        this.vx = (this.vx / len) * this.speed;
                        this.vy = (this.vy / len) * this.speed;
                    }
                },

                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;

                    // Out of bounds
                    if (this.y < -10 || this.y > game.height + 10 ||
                        this.x < -10 || this.x > game.width + 10) {
                        this.isDead = true;
                    }
                },

                draw(ctx) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Trail
                    ctx.strokeStyle = this.color;
                    ctx.globalAlpha = 0.5;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.vx * 0.05, this.y - this.vy * 0.05);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            };
        }

        // ============================================================================
        // PICKUP SYSTEM
        // ============================================================================

        function createPickup() {
            return {
                x: 0, y: 0,
                vy: 100,
                type: 'coin',
                size: 5,
                color: '#ff0',
                isDead: false,

                init(config) {
                    this.x = safeNum(config.x, 0);
                    this.y = safeNum(config.y, 0);
                    this.type = safeStr(config.type, 'coin');
                    this.isDead = false;
                    this.vy = 100;

                    // Color by type
                    switch (this.type) {
                        case 'health': this.color = '#f00'; break;
                        case 'coin': this.color = '#ff0'; break;
                        case 'xp': this.color = '#0ff'; break;
                        default: this.color = '#fff';
                    }
                },

                update(dt) {
                    this.y += this.vy * dt;
                    if (this.y > game.height + 10) {
                        this.isDead = true;
                    }
                },

                draw(ctx) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            };
        }

        // ============================================================================
        // ENEMY SYSTEM
        // ============================================================================

        function createEnemy() {
            return {
                x: 0, y: 0,
                vx: 0, vy: 100,
                radius: 8,
                health: 30,
                maxHealth: 30,
                type: 'grunt',
                color: '#f0f',
                speed: 100,
                shootTimer: 0,
                shootInterval: 2,
                damage: 5,
                isDead: false,
                element: 'normal',

                init(config) {
                    this.x = safeNum(config.x, 0);
                    this.y = safeNum(config.y, 0);
                    this.vx = safeNum(config.vx, 0);
                    this.vy = safeNum(config.vy, 100);
                    this.type = safeStr(config.type, 'grunt');
                    this.health = safeNum(config.health, 30);
                    this.maxHealth = this.health;
                    this.speed = safeNum(config.speed, 100);
                    this.shootInterval = safeNum(config.shootInterval, 2);
                    this.damage = safeNum(config.damage, 5);
                    this.shootTimer = safeNum(config.shootTimer, 0);
                    this.isDead = false;
                    this.element = safeStr(config.element, 'normal');

                    // Properties by type
                    switch (this.type) {
                        case 'grunt':
                            this.radius = 8;
                            this.color = '#f0f';
                            this.health = 20;
                            this.maxHealth = 20;
                            this.speed = 100;
                            this.shootInterval = 3;
                            this.damage = 5;
                            break;
                        case 'scout':
                            this.radius = 6;
                            this.color = '#0ff';
                            this.health = 10;
                            this.maxHealth = 10;
                            this.speed = 200;
                            this.shootInterval = 5;
                            this.damage = 3;
                            break;
                        case 'fighter':
                            this.radius = 10;
                            this.color = '#ff0';
                            this.health = 40;
                            this.maxHealth = 40;
                            this.speed = 120;
                            this.shootInterval = 1.5;
                            this.damage = 8;
                            break;
                        case 'tank':
                            this.radius = 14;
                            this.color = '#f00';
                            this.health = 80;
                            this.maxHealth = 80;
                            this.speed = 60;
                            this.shootInterval = 2.5;
                            this.damage = 12;
                            break;
                        case 'bomber':
                            this.radius = 12;
                            this.color = '#f80';
                            this.health = 50;
                            this.maxHealth = 50;
                            this.speed = 80;
                            this.shootInterval = 1;
                            this.damage = 10;
                            break;
                    }
                },

                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.shootTimer += dt;

                    // Out of bounds
                    if (this.y > game.height + 20) {
                        this.isDead = true;
                    }

                    // Shoot at player
                    if (this.shootTimer >= this.shootInterval && game.gameState === 'playing') {
                        this.shoot();
                        this.shootTimer = 0;
                    }
                },

                shoot() {
                    try {
                        const dx = game.player.x - this.x;
                        const dy = game.player.y - this.y;
                        const len = Math.sqrt(dx * dx + dy * dy);

                        if (len > 0) {
                            const bullet = game.enemyBullets.spawn({
                                x: this.x,
                                y: this.y,
                                vx: (dx / len) * 250,
                                vy: (dy / len) * 250,
                                damage: this.damage,
                                color: this.color,
                                owner: 'enemy',
                                speed: 250
                            });
                        }
                    } catch (e) {
                        console.warn('Enemy shoot error:', e);
                    }
                },

                takeDamage(amt, element = 'normal') {
                    this.health -= safeNum(amt, 0);
                    if (this.health <= 0) {
                        this.isDead = true;
                    }
                },

                draw(ctx) {
                    // Body
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Health bar if damaged
                    if (this.health < this.maxHealth) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(this.x - this.radius, this.y - this.radius - 10, this.radius * 2, 3);
                        ctx.fillStyle = '#0f0';
                        const healthPct = this.health / this.maxHealth;
                        ctx.fillRect(this.x - this.radius, this.y - this.radius - 10, this.radius * 2 * healthPct, 3);
                    }

                    // Eyes
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(this.x - 3, this.y - 2, 2, 2);
                    ctx.fillRect(this.x + 1, this.y - 2, 2, 2);
                }
            };
        }

        // ============================================================================
        // BOSS SYSTEM
        // ============================================================================

        function createBoss() {
            return {
                x: 0, y: 50,
                vx: 100,
                vy: 0,
                radius: 20,
                health: 500,
                maxHealth: 500,
                color: '#f0f',
                shootTimer: 0,
                shootInterval: 0.8,
                isDead: false,
                pattern: 0,
                patternTimer: 0,

                init(config) {
                    this.x = safeNum(config.x, game.width / 2);
                    this.y = safeNum(config.y, 50);
                    this.health = safeNum(config.health, 500);
                    this.maxHealth = this.health;
                    this.vx = 100;
                    this.vy = 0;
                    this.shootTimer = 0;
                    this.pattern = 0;
                    this.patternTimer = 0;
                    this.isDead = false;
                },

                update(dt) {
                    // Movement pattern
                    this.patternTimer += dt;
                    if (this.patternTimer > 4) {
                        this.pattern = (this.pattern + 1) % 2;
                        this.patternTimer = 0;
                    }

                    if (this.pattern === 0) {
                        this.x += this.vx * dt;
                        if (this.x < 20 || this.x > game.width - 20) {
                            this.vx *= -1;
                        }
                    } else {
                        this.x += Math.sin(this.patternTimer * Math.PI) * 150 * dt;
                    }

                    this.shootTimer += dt;

                    // Shoot pattern
                    if (this.shootTimer >= this.shootInterval) {
                        this.shootPattern();
                        this.shootTimer = 0;
                    }
                },

                shootPattern() {
                    try {
                        const bulletCount = 5;
                        for (let i = 0; i < bulletCount; i++) {
                            const angle = (i / bulletCount) * Math.PI * 2;
                            const bullet = game.enemyBullets.spawn({
                                x: this.x,
                                y: this.y,
                                vx: Math.cos(angle) * 200,
                                vy: Math.sin(angle) * 200,
                                damage: 15,
                                color: '#f0f',
                                owner: 'boss',
                                speed: 200
                            });
                        }
                    } catch (e) {
                        console.warn('Boss shoot error:', e);
                    }
                },

                takeDamage(amt) {
                    this.health -= safeNum(amt, 0);
                    if (this.health <= 0) {
                        this.isDead = true;
                    }
                },

                draw(ctx) {
                    // Large circular body
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Inner circle
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
                    ctx.fill();

                    // Eyes
                    ctx.fillStyle = '#000';
                    ctx.fillRect(this.x - 8, this.y - 2, 4, 4);
                    ctx.fillRect(this.x + 4, this.y - 2, 4, 4);

                    // Health bar
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(this.x - 30, this.y - this.radius - 20, 60, 5);
                    ctx.fillStyle = '#0f0';
                    const healthPct = this.health / this.maxHealth;
                    ctx.fillRect(this.x - 30, this.y - this.radius - 20, 60 * healthPct, 5);

                    // Health text
                    ctx.fillStyle = '#0f0';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(Math.ceil(this.health), this.x, this.y);
                }
            };
        }

        // ============================================================================
        // PLAYER SYSTEM
        // ============================================================================

        const Player = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: 7,
            health: 100,
            maxHealth: 100,
            speed: 250,
            isDead: false,

            // Stats
            level: 1,
            xp: 0,
            xpToLevel: 100,
            coins: 0,
            score: 0,
            combo: 0,
            comboTimer: 0,

            // Upgrades
            damage: 10,
            fireRate: 0.15,
            shootTimer: 0,
            dashCooldown: 0,
            dashDuration: 0,
            hasDash: true,

            // Element system
            element: 'normal',
            elementTimer: 0,

            // Biome
            biomeColor: '#000033',

            init() {
                this.x = game.width / 2;
                this.y = game.height - 50;
                this.vx = 0;
                this.vy = 0;
                this.health = this.maxHealth;
                this.isDead = false;
                this.shootTimer = 0;
                this.dashCooldown = 0;
                this.dashDuration = 0;
                this.combo = 0;
                this.comboTimer = 0;
            },

            update(dt) {
                // Movement from joystick
                const joyMag = Math.sqrt(game.joyX * game.joyX + game.joyY * game.joyY);
                if (joyMag > 0.2) {
                    this.vx = (game.joyX / joyMag) * this.speed;
                    this.vy = (game.joyY / joyMag) * this.speed;
                } else {
                    this.vx = 0;
                    this.vy = 0;
                }

                // Dash
                if (game.dashPressed && this.dashCooldown <= 0) {
                    this.dashCooldown = 1.5;
                    this.dashDuration = 0.2;
                }

                // Apply movement
                if (this.dashDuration > 0) {
                    const dashSpeed = this.speed * 3;
                    const dashMag = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (dashMag > 0) {
                        this.x += (this.vx / dashMag) * dashSpeed * dt;
                        this.y += (this.vy / dashMag) * dashSpeed * dt;
                    }
                    this.dashDuration -= dt;
                } else {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                }

                // Clamp to bounds
                this.x = clamp(this.x, this.radius, game.width - this.radius);
                this.y = clamp(this.y, this.radius, game.height - this.radius);

                // Cooldowns
                this.shootTimer += dt;
                this.dashCooldown -= dt;
                this.comboTimer -= dt;
                this.elementTimer -= dt;

                // Auto-fire
                if (this.shootTimer >= this.fireRate) {
                    this.shoot();
                    this.shootTimer = 0;
                }

                // Reset combo if timer expires
                if (this.comboTimer <= 0) {
                    this.combo = 0;
                }
            },

            shoot() {
                try {
                    const bullet = game.playerBullets.spawn({
                        x: this.x,
                        y: this.y - this.radius,
                        vx: 0,
                        vy: -500,
                        damage: this.damage,
                        color: this.getElementColor(),
                        owner: 'player',
                        element: this.element,
                        speed: 500
                    });

                    game.audio.shoot();
                } catch (e) {
                    console.warn('Player shoot error:', e);
                }
            },

            getElementColor() {
                switch (this.element) {
                    case 'fire': return '#ff4444';
                    case 'ice': return '#44ffff';
                    case 'lightning': return '#ffff44';
                    default: return '#0f0';
                }
            },

            takeDamage(amt) {
                this.health -= safeNum(amt, 0);
                this.combo = 0; // Reset combo on damage
                this.comboTimer = 0;
                game.audio.damage();

                if (this.health <= 0) {
                    this.isDead = true;
                }
            },

            addXP(amount) {
                this.xp += safeNum(amount, 0);

                while (this.xp >= this.xpToLevel) {
                    this.xp -= this.xpToLevel;
                    this.levelUp();
                }
            },

            levelUp() {
                this.level++;
                this.damage += 2;
                this.maxHealth += 20;
                this.health = this.maxHealth;
                this.xpToLevel = Math.floor(this.xpToLevel * 1.2);
                game.audio.levelUp();
            },

            draw(ctx) {
                // Dash effect
                if (this.dashDuration > 0) {
                    ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Main body
                ctx.fillStyle = '#0f0';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Cockpit
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x - 2, this.y - 3, 4, 2);

                // Engine trail
                ctx.strokeStyle = '#0f0';
                ctx.globalAlpha = 0.6;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x - 2, this.y + this.radius);
                ctx.lineTo(this.x - 2, this.y + this.radius + 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(this.x + 2, this.y + this.radius);
                ctx.lineTo(this.x + 2, this.y + this.radius + 8);
                ctx.stroke();
                ctx.globalAlpha = 1;

                // Dash cooldown indicator
                if (this.dashCooldown > 0) {
                    ctx.strokeStyle = '#0f0';
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.5;
                    const pct = 1 - (this.dashCooldown / 1.5);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 5, -Math.PI / 2, -Math.PI / 2 + pct * Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
        };

        // ============================================================================
        // MAIN GAME OBJECT
        // ============================================================================

        const game = {
            width: 420,
            height: 750,
            canvas: null,
            ctx: null,
            dpr: 1,

            gameState: 'title', // title, playing, gameOver, shop
            player: Player,
            audio: new AudioManager(),

            // Pools
            playerBullets: null,
            enemyBullets: null,
            enemies: null,
            particles: null,
            pickups: null,

            // Game state
            wave: 1,
            waveTimer: 0,
            waveDuration: 60,
            enemiesSpawned: 0,
            enemiesPerWave: 10,
            score: 0,
            combo: 0,
            comboTimer: 0,
            boss: null,
            isBossWave: false,

            // Input
            joyX: 0,
            joyY: 0,
            dashPressed: false,
            touchStart: {},

            // Visuals
            backgroundColor: '#000033',
            biomeIndex: 0,
            biomeColors: ['#000033', '#330000', '#003300'],
            biomeNames: ['Void', 'Inferno', 'Nebula'],

            // Shop
            shopUpgrades: [
                { id: 'damage', name: 'Damage', cost: 50, level: 1, maxLevel: 5 },
                { id: 'fireRate', name: 'Fire Rate', cost: 75, level: 1, maxLevel: 5 },
                { id: 'health', name: 'Health', cost: 100, level: 1, maxLevel: 5 },
                { id: 'shield', name: 'Shield', cost: 150, level: 1, maxLevel: 3 }
            ],

            init() {
                try {
                    this.canvas = document.getElementById('gameCanvas');
                    this.ctx = this.canvas.getContext('2d');
                    this.dpr = window.devicePixelRatio || 1;

                    // Set canvas size
                    this.canvas.width = this.width * this.dpr;
                    this.canvas.height = this.height * this.dpr;
                    this.canvas.style.width = this.width + 'px';
                    this.canvas.style.height = this.height + 'px';
                    this.ctx.scale(this.dpr, this.dpr);

                    // Create pools
                    this.playerBullets = new Pool(createBullet, 200);
                    this.enemyBullets = new Pool(createBullet, 200);
                    this.enemies = new Pool(createEnemy, 100);
                    this.particles = new Pool(createParticle, 500);
                    this.pickups = new Pool(createPickup, 100);

                    // Initialize player
                    this.player.init();

                    // Setup input
                    this.setupInput();

                    // Start game loop
                    this.lastTime = Date.now();
                    this.update();
                } catch (e) {
                    console.error('Game init error:', e);
                }
            },

            setupInput() {
                try {
                    // Touch controls
                    this.canvas.addEventListener('touchstart', (e) => this.handleTouchStart(e), false);
                    this.canvas.addEventListener('touchmove', (e) => this.handleTouchMove(e), false);
                    this.canvas.addEventListener('touchend', (e) => this.handleTouchEnd(e), false);

                    // Mouse controls (for testing)
                    this.canvas.addEventListener('mousedown', (e) => this.handleMouseDown(e), false);
                    this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e), false);
                    this.canvas.addEventListener('mouseup', (e) => this.handleMouseUp(e), false);

                    // Click for title/game over
                    this.canvas.addEventListener('click', (e) => this.handleClick(e), false);
                } catch (e) {
                    console.warn('Input setup error:', e);
                }
            },

            handleTouchStart(e) {
                try {
                    e.preventDefault();
                    const rect = this.canvas.getBoundingClientRect();

                    for (let touch of e.touches) {
                        const x = touch.clientX - rect.left;
                        const y = touch.clientY - rect.top;

                        this.touchStart[touch.identifier] = { x, y };

                        // Right side = dash
                        if (x > this.width * 0.6) {
                            this.dashPressed = true;
                        }
                    }
                } catch (e) {
                    console.warn('Touch start error:', e);
                }
            },

            handleTouchMove(e) {
                try {
                    e.preventDefault();
                    const rect = this.canvas.getBoundingClientRect();

                    for (let touch of e.touches) {
                        const x = touch.clientX - rect.left;
                        const y = touch.clientY - rect.top;

                        // Left side = joystick
                        if (x < this.width * 0.4) {
                            const centerX = this.width * 0.15;
                            const centerY = this.height * 0.85;
                            const dx = x - centerX;
                            const dy = y - centerY;
                            const mag = Math.sqrt(dx * dx + dy * dy);
                            const maxRadius = 50;

                            if (mag > 0) {
                                const ratio = Math.min(1, mag / maxRadius);
                                this.joyX = (dx / mag) * ratio;
                                this.joyY = (dy / mag) * ratio;
                            }
                        }
                    }
                } catch (e) {
                    console.warn('Touch move error:', e);
                }
            },

            handleTouchEnd(e) {
                try {
                    e.preventDefault();
                    for (let touch of e.changedTouches) {
                        delete this.touchStart[touch.identifier];
                    }

                    if (e.touches.length === 0) {
                        this.joyX = 0;
                        this.joyY = 0;
                        this.dashPressed = false;
                    }
                } catch (e) {
                    console.warn('Touch end error:', e);
                }
            },

            handleMouseDown(e) {
                try {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    if (x > this.width * 0.6) {
                        this.dashPressed = true;
                    }
                } catch (e) {
                    console.warn('Mouse down error:', e);
                }
            },

            handleMouseMove(e) {
                try {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    if (x < this.width * 0.4) {
                        const centerX = this.width * 0.15;
                        const centerY = this.height * 0.85;
                        const dx = x - centerX;
                        const dy = y - centerY;
                        const mag = Math.sqrt(dx * dx + dy * dy);
                        const maxRadius = 50;

                        if (mag > 0) {
                            const ratio = Math.min(1, mag / maxRadius);
                            this.joyX = (dx / mag) * ratio;
                            this.joyY = (dy / mag) * ratio;
                        }
                    }
                } catch (e) {
                    console.warn('Mouse move error:', e);
                }
            },

            handleMouseUp(e) {
                try {
                    this.dashPressed = false;
                } catch (e) {
                    console.warn('Mouse up error:', e);
                }
            },

            handleClick(e) {
                try {
                    if (this.gameState === 'title') {
                        this.startGame();
                    } else if (this.gameState === 'gameOver') {
                        this.gameState = 'title';
                    } else if (this.gameState === 'shop') {
                        this.startWave();
                    }
                } catch (e) {
                    console.warn('Click error:', e);
                }
            },

            startGame() {
                try {
                    this.gameState = 'playing';
                    this.wave = 1;
                    this.score = 0;
                    this.player.init();
                    this.waveTimer = 0;
                    this.enemiesSpawned = 0;
                    this.biomeIndex = 0;
                    this.backgroundColor = this.biomeColors[this.biomeIndex];
                    this.enemiesPerWave = 10;

                    this.playerBullets.clear();
                    this.enemyBullets.clear();
                    this.enemies.clear();
                    this.particles.clear();
                    this.pickups.clear();
                    this.boss = null;
                    this.isBossWave = false;

                    this.startWave();
                } catch (e) {
                    console.error('Start game error:', e);
                }
            },

            startWave() {
                try {
                    this.waveTimer = 0;
                    this.enemiesSpawned = 0;
                    this.isBossWave = (this.wave % 5 === 0);

                    if (this.isBossWave) {
                        this.boss = createBoss();
                        this.boss.init({
                            x: this.width / 2,
                            y: 50,
                            health: 300 + this.wave * 50
                        });
                    }

                    this.gameState = 'playing';
                    this.biomeIndex = Math.floor((this.wave - 1) / 5) % 3;
                    this.backgroundColor = this.biomeColors[this.biomeIndex];
                } catch (e) {
                    console.error('Start wave error:', e);
                }
            },

            spawnEnemy() {
                try {
                    const x = rand(30, this.width - 30);
                    const enemyTypes = ['grunt', 'scout', 'fighter', 'tank', 'bomber'];
                    const difficulty = Math.min(4, Math.floor((this.wave - 1) / 2));
                    const type = enemyTypes[Math.min(difficulty, 4)];

                    let config = {
                        x: x,
                        y: -20,
                        vx: 0,
                        vy: 100,
                        type: type
                    };

                    const enemy = this.enemies.spawn(config);
                    if (enemy) {
                        this.enemiesSpawned++;
                    }
                } catch (e) {
                    console.warn('Spawn enemy error:', e);
                }
            },

            endWave() {
                try {
                    if (this.isBossWave) {
                        this.boss = null;
                    }
                    this.wave++;
                    this.gameState = 'shop';
                } catch (e) {
                    console.error('End wave error:', e);
                }
            },

            gameOver() {
                try {
                    this.gameState = 'gameOver';
                } catch (e) {
                    console.error('Game over error:', e);
                }
            },

            addScore(amount) {
                try {
                    const multiplier = 1 + (this.player.combo * 0.1);
                    const points = Math.floor(safeNum(amount, 0) * multiplier);
                    this.score += points;
                } catch (e) {
                    console.warn('Add score error:', e);
                }
            },

            createExplosion(x, y, particleCount = 15) {
                try {
                    for (let i = 0; i < particleCount; i++) {
                        const angle = (i / particleCount) * Math.PI * 2;
                        const speed = rand(100, 300);
                        this.particles.spawn({
                            x: safeNum(x, 0),
                            y: safeNum(y, 0),
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            life: rand(0.3, 0.7),
                            size: rand(2, 5),
                            color: ['#ff0', '#f80', '#f00', '#ff8800'][Math.floor(Math.random() * 4)]
                        });
                    }
                    this.audio.explosion(150);
                } catch (e) {
                    console.warn('Explosion error:', e);
                }
            },

            update() {
                try {
                    const now = Date.now();
                    const dt = Math.min((now - this.lastTime) / 1000, 0.016);
                    this.lastTime = now;

                    if (this.gameState === 'playing') {
                        this.updateGameplay(dt);
                    }

                    this.draw();
                    requestAnimationFrame(() => this.update());
                } catch (e) {
                    console.error('Update error:', e);
                    requestAnimationFrame(() => this.update());
                }
            },

            updateGameplay(dt) {
                try {
                    // Update player
                    this.player.update(dt);
                    if (this.player.isDead) {
                        this.gameOver();
                        return;
                    }

                    // Spawn enemies
                    if (!this.isBossWave) {
                        this.waveTimer += dt;
                        const spawnRate = 0.5;
                        if (this.waveTimer >= spawnRate && this.enemiesSpawned < this.enemiesPerWave) {
                            this.spawnEnemy();
                            this.waveTimer = 0;
                        }
                    }

                    // Update pools
                    this.playerBullets.updateAll(dt);
                    this.enemyBullets.updateAll(dt);
                    this.enemies.updateAll(dt);
                    this.particles.updateAll(dt);
                    this.pickups.updateAll(dt);

                    // Update boss
                    if (this.boss) {
                        this.boss.update(dt);
                    }

                    // Collisions: player bullets vs enemies
                    for (let i = this.playerBullets.inUse.length - 1; i >= 0; i--) {
                        const bullet = this.playerBullets.inUse[i];

                        for (let j = this.enemies.inUse.length - 1; j >= 0; j--) {
                            const enemy = this.enemies.inUse[j];
                            const d = dist(bullet.x, bullet.y, enemy.x, enemy.y);

                            if (d < bullet.radius + enemy.radius) {
                                enemy.takeDamage(this.player.damage);
                                bullet.isDead = true;

                                if (enemy.isDead) {
                                    this.createExplosion(enemy.x, enemy.y);
                                    this.addScore(enemy.type === 'tank' ? 50 : 25);
                                    this.player.combo++;
                                    this.player.comboTimer = 3;

                                    // Drop pickups
                                    if (Math.random() < 0.3) {
                                        const type = Math.random() < 0.5 ? 'coin' : 'xp';
                                        this.pickups.spawn({
                                            x: enemy.x,
                                            y: enemy.y,
                                            type: type
                                        });
                                    }
                                    if (Math.random() < 0.1) {
                                        this.pickups.spawn({
                                            x: enemy.x,
                                            y: enemy.y,
                                            type: 'health'
                                        });
                                    }

                                    this.enemies.recycle(enemy);
                                    this.playerBullets.recycle(bullet);
                                    break;
                                }
                            }
                        }
                    }

                    // Collisions: player bullets vs boss
                    if (this.boss && !this.boss.isDead) {
                        for (let i = this.playerBullets.inUse.length - 1; i >= 0; i--) {
                            const bullet = this.playerBullets.inUse[i];
                            const d = dist(bullet.x, bullet.y, this.boss.x, this.boss.y);

                            if (d < bullet.radius + this.boss.radius) {
                                this.boss.takeDamage(this.player.damage);
                                bullet.isDead = true;
                                this.playerBullets.recycle(bullet);

                                if (this.boss.isDead) {
                                    this.createExplosion(this.boss.x, this.boss.y, 30);
                                    this.addScore(500);
                                    this.endWave();
                                }
                            }
                        }
                    }

                    // Collisions: enemy bullets vs player
                    for (let i = this.enemyBullets.inUse.length - 1; i >= 0; i--) {
                        const bullet = this.enemyBullets.inUse[i];
                        const d = dist(bullet.x, bullet.y, this.player.x, this.player.y);

                        if (d < bullet.radius + this.player.radius) {
                            this.player.takeDamage(bullet.damage);
                            bullet.isDead = true;
                            this.enemyBullets.recycle(bullet);
                        }
                    }

                    // Collisions: enemies vs player
                    for (let i = this.enemies.inUse.length - 1; i >= 0; i--) {
                        const enemy = this.enemies.inUse[i];
                        const d = dist(enemy.x, enemy.y, this.player.x, this.player.y);

                        if (d < enemy.radius + this.player.radius) {
                            this.player.takeDamage(enemy.damage * 2);
                            enemy.isDead = true;
                            this.enemies.recycle(enemy);
                        }
                    }

                    // Collisions: pickups vs player
                    for (let i = this.pickups.inUse.length - 1; i >= 0; i--) {
                        const pickup = this.pickups.inUse[i];
                        const d = dist(pickup.x, pickup.y, this.player.x, this.player.y);

                        if (d < pickup.size + this.player.radius) {
                            switch (pickup.type) {
                                case 'coin':
                                    this.player.coins += 10;
                                    this.addScore(10);
                                    break;
                                case 'health':
                                    this.player.health = Math.min(this.player.maxHealth, this.player.health + 25);
                                    break;
                                case 'xp':
                                    this.player.addXP(25);
                                    break;
                            }
                            this.audio.pickup();
                            pickup.isDead = true;
                            this.pickups.recycle(pickup);
                        }
                    }

                    // Check wave completion
                    if (!this.isBossWave) {
                        if (this.enemiesSpawned >= this.enemiesPerWave && this.enemies.getCount() === 0) {
                            this.endWave();
                        }
                    } else {
                        if (this.boss && this.boss.isDead) {
                            this.endWave();
                        }
                    }
                } catch (e) {
                    console.error('Gameplay update error:', e);
                }
            },

            draw() {
                try {
                    // Background
                    this.ctx.fillStyle = this.backgroundColor;
                    this.ctx.fillRect(0, 0, this.width, this.height);

                    if (this.gameState === 'title') {
                        this.drawTitle();
                    } else if (this.gameState === 'playing') {
                        this.drawGameplay();
                    } else if (this.gameState === 'gameOver') {
                        this.drawGameOver();
                    } else if (this.gameState === 'shop') {
                        this.drawShop();
                    }
                } catch (e) {
                    console.error('Draw error:', e);
                }
            },

            drawTitle() {
                try {
                    this.ctx.fillStyle = '#0f0';
                    this.ctx.font = 'bold 60px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('VOID RIFT', this.width / 2, 200);

                    this.ctx.font = '20px Arial';
                    this.ctx.fillText('Space Shooter', this.width / 2, 250);

                    this.ctx.fillStyle = '#0f0';
                    this.ctx.font = 'bold 30px Arial';
                    this.ctx.fillText('TAP TO PLAY', this.width / 2, this.height - 100);

                    // Display controls
                    this.ctx.font = '14px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('Left: Move | Right: Dash', this.width / 2, this.height - 50);
                } catch (e) {
                    console.warn('Draw title error:', e);
                }
            },

            drawGameplay() {
                try {
                    // Draw all entities
                    this.particles.drawAll(this.ctx);
                    this.playerBullets.drawAll(this.ctx);
                    this.enemyBullets.drawAll(this.ctx);
                    this.enemies.drawAll(this.ctx);
                    this.pickups.drawAll(this.ctx);

                    if (this.boss) {
                        this.boss.draw(this.ctx);
                    }

                    this.player.draw(this.ctx);

                    // HUD
                    this.drawHUD();
                    this.drawJoystick();
                    this.drawDashButton();
                } catch (e) {
                    console.warn('Draw gameplay error:', e);
                }
            },

            drawHUD() {
                try {
                    this.ctx.fillStyle = '#0f0';
                    this.ctx.font = 'bold 16px Courier New';
                    this.ctx.textAlign = 'left';

                    // Score
                    this.ctx.fillText('Score: ' + this.score, 10, 25);

                    // Wave
                    this.ctx.fillText('Wave: ' + this.wave, 10, 50);

                    // Level & XP
                    this.ctx.fillText('Level: ' + this.player.level, 10, 75);
                    const xpPct = Math.floor((this.player.xp / this.player.xpToLevel) * 100);
                    this.ctx.fillText('XP: ' + xpPct + '%', 10, 100);

                    // Health bar
                    const barWidth = 100;
                    const barHeight = 10;
                    const barX = this.width - barWidth - 10;
                    const barY = 10;

                    this.ctx.strokeStyle = '#0f0';
                    this.ctx.lineWidth = 1;
                    this.ctx.strokeRect(barX, barY, barWidth, barHeight);

                    const healthPct = Math.max(0, this.player.health / this.player.maxHealth);
                    this.ctx.fillStyle = healthPct > 0.3 ? '#0f0' : '#f00';
                    this.ctx.fillRect(barX, barY, barWidth * healthPct, barHeight);

                    this.ctx.fillStyle = '#0f0';
                    this.ctx.font = '12px Courier New';
                    this.ctx.textAlign = 'right';
                    this.ctx.fillText(Math.ceil(this.player.health) + '/' + this.player.maxHealth, this.width - 10, barY + 20);

                    // Combo
                    if (this.player.combo > 0) {
                        this.ctx.fillStyle = '#ff0';
                        this.ctx.font = 'bold 24px Courier New';
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText('COMBO x' + this.player.combo, this.width / 2, 40);
                    }

                    // Coins
                    this.ctx.fillStyle = '#ff0';
                    this.ctx.font = '14px Courier New';
                    this.ctx.textAlign = 'right';
                    this.ctx.fillText('Coins: ' + this.player.coins, this.width - 10, 45);
                } catch (e) {
                    console.warn('Draw HUD error:', e);
                }
            },

            drawJoystick() {
                try {
                    const centerX = this.width * 0.15;
                    const centerY = this.height * 0.85;
                    const baseRadius = 50;
                    const knobRadius = 20;

                    // Base
                    this.ctx.strokeStyle = '#0f0';
                    this.ctx.globalAlpha = 0.3;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(centerX, centerY, baseRadius, 0, Math.PI * 2);
                    this.ctx.stroke();

                    // Knob
                    const knobX = centerX + this.joyX * (baseRadius - knobRadius);
                    const knobY = centerY + this.joyY * (baseRadius - knobRadius);
                    this.ctx.fillStyle = '#0f0';
                    this.ctx.globalAlpha = 0.6;
                    this.ctx.beginPath();
                    this.ctx.arc(knobX, knobY, knobRadius, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                } catch (e) {
                    console.warn('Draw joystick error:', e);
                }
            },

            drawDashButton() {
                try {
                    const buttonX = this.width * 0.85;
                    const buttonY = this.height * 0.85;
                    const buttonSize = 40;

                    this.ctx.fillStyle = this.dashPressed ? '#00ff00' : '#0f0';
                    this.ctx.globalAlpha = this.dashPressed ? 0.8 : 0.4;
                    this.ctx.beginPath();
                    this.ctx.arc(buttonX, buttonY, buttonSize, 0, Math.PI * 2);
                    this.ctx.fill();

                    this.ctx.fillStyle = '#000';
                    this.ctx.globalAlpha = 1;
                    this.ctx.font = 'bold 20px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText('DASH', buttonX, buttonY);
                } catch (e) {
                    console.warn('Draw dash button error:', e);
                }
            },

            drawGameOver() {
                try {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.width, this.height);

                    this.ctx.fillStyle = '#f00';
                    this.ctx.font = 'bold 50px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('GAME OVER', this.width / 2, 150);

                    this.ctx.fillStyle = '#0f0';
                    this.ctx.font = '24px Arial';
                    this.ctx.fillText('Final Score: ' + this.score, this.width / 2, 250);
                    this.ctx.fillText('Wave: ' + this.wave, this.width / 2, 300);
                    this.ctx.fillText('Level: ' + this.player.level, this.width / 2, 350);

                    this.ctx.font = 'bold 30px Arial';
                    this.ctx.fillText('TAP TO RESTART', this.width / 2, this.height - 100);
                } catch (e) {
                    console.warn('Draw game over error:', e);
                }
            },

            drawShop() {
                try {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.fillRect(0, 0, this.width, this.height);

                    this.ctx.fillStyle = '#0f0';
                    this.ctx.font = 'bold 40px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('WAVE ' + this.wave, this.width / 2, 80);

                    this.ctx.font = '20px Arial';
                    this.ctx.fillText('Coins: ' + this.player.coins, this.width / 2, 130);

                    this.ctx.font = '16px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('TAP TO CONTINUE', this.width / 2, this.height - 50);

                    // Display upgrades
                    let y = 180;
                    for (let upgrade of this.shopUpgrades) {
                        this.ctx.font = '14px Arial';
                        const cost = upgrade.cost * upgrade.level;
                        this.ctx.fillText(upgrade.name + ' (Lv.' + upgrade.level + ') - ' + cost + ' coins', this.width / 2, y);
                        y += 30;
                    }
                } catch (e) {
                    console.warn('Draw shop error:', e);
                }
            }
        };

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        window.addEventListener('load', () => {
            try {
                game.init();
            } catch (e) {
                console.error('Initialization error:', e);
            }
        });
