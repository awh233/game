<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOID RIFT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:monospace}
canvas{display:block;width:100%;height:100%;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// VOID RIFT v5.0 - Cosmic Survivor
// Bulletproof single-file mobile game
(function() {
"use strict";

// === CANVAS SETUP ===
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 420, H = 750;
var scale = 1;
var offsetX = 0, offsetY = 0;

function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    var scaleX = canvas.width / W;
    var scaleY = canvas.height / H;
    scale = Math.min(scaleX, scaleY);
    offsetX = (canvas.width - W * scale) / 2;
    offsetY = (canvas.height - H * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

// === AUDIO ===
var audioCtx = null;
var masterGain = null;

function initAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.3;
        masterGain.connect(audioCtx.destination);
    } catch(e) { audioCtx = null; }
}

function playSound(type) {
    if (!audioCtx) return;
    try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(masterGain);
        var t = audioCtx.currentTime;
        switch(type) {
            case 'shoot':
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, t);
                osc.frequency.exponentialRampToValueAtTime(200, t + 0.08);
                gain.gain.setValueAtTime(0.12, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                osc.start(t); osc.stop(t + 0.08);
                break;
            case 'hit':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.12);
                gain.gain.setValueAtTime(0.15, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
                osc.start(t); osc.stop(t + 0.12);
                break;
            case 'explode':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(30, t + 0.25);
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                osc.start(t); osc.stop(t + 0.25);
                break;
            case 'powerup':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(800, t + 0.12);
                gain.gain.setValueAtTime(0.15, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                osc.start(t); osc.stop(t + 0.15);
                break;
            case 'damage':
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, t);
                osc.frequency.exponentialRampToValueAtTime(50, t + 0.15);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                osc.start(t); osc.stop(t + 0.15);
                break;
            case 'levelup':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, t);
                osc.frequency.linearRampToValueAtTime(1000, t + 0.1);
                osc.frequency.linearRampToValueAtTime(700, t + 0.2);
                osc.frequency.linearRampToValueAtTime(1200, t + 0.3);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                osc.start(t); osc.stop(t + 0.35);
                break;
            case 'boss':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, t);
                osc.frequency.linearRampToValueAtTime(120, t + 0.2);
                osc.frequency.linearRampToValueAtTime(60, t + 0.5);
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                osc.start(t); osc.stop(t + 0.5);
                break;
        }
    } catch(e) { /* audio error, ignore */ }
}

// === GAME STATES ===
var STATE_MENU = 0, STATE_PLAY = 1, STATE_SHOP = 2, STATE_DEAD = 3;
var STATE_LEVELUP = 4, STATE_BOSS_WARN = 5;
var state = STATE_MENU;

// === GAME VARIABLES ===
var score = 0, highScore = 0, wave = 1, gold = 0;
var xp = 0, xpNeeded = 50, level = 1;
var combo = 0, comboTimer = 0, maxCombo = 0, killCount = 0;
var screenShake = 0, flashAlpha = 0, bossWarningTimer = 0, gameTime = 0;
var waveEnemiesRemaining = 0; // CRITICAL: tracks pending + alive enemies
var waveSpawnTimers = []; // track pending setTimeout IDs

// === PLAYER ===
var baseStats = {
    maxHp: 5, speed: 4, fireRate: 12, bulletDmg: 1,
    bulletSpeed: 8, bulletCount: 1, shield: 0, magnetRange: 60
};
var player = {};

function resetPlayer() {
    player.x = W / 2;
    player.y = H - 120;
    player.w = 30;
    player.h = 30;
    player.hp = baseStats.maxHp;
    player.maxHp = baseStats.maxHp;
    player.speed = baseStats.speed;
    player.fireRate = baseStats.fireRate;
    player.bulletDmg = baseStats.bulletDmg;
    player.bulletSpeed = baseStats.bulletSpeed;
    player.bulletCount = baseStats.bulletCount;
    player.shield = baseStats.shield;
    player.magnetRange = baseStats.magnetRange;
    player.fireTimer = 0;
    player.invincible = 60;
    player.dashCooldown = 0;
    player.dashTimer = 0;
    player.isDashing = false;
    player.trail = [];
}
resetPlayer();

// === ENTITY ARRAYS ===
var bullets = [];
var enemies = [];
var particles = [];
var pickups = [];
var enemyBullets = [];
var stars = [];
var damageNumbers = [];

// Max limits to prevent memory issues
var MAX_PARTICLES = 200;
var MAX_BULLETS = 100;
var MAX_ENEMY_BULLETS = 80;
var MAX_PICKUPS = 50;

// === STARS ===
function initStars() {
    stars = [];
    for (var i = 0; i < 60; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 1.5 + 0.3,
            bright: Math.random() * 0.5 + 0.5
        });
    }
}
initStars();

// === INPUT HANDLING ===
var touch = { active: false, id: -1, sx: 0, sy: 0, x: 0, y: 0 };
var mouseDown = false, mouseX = W / 2, mouseY = H / 2;
var keys = {};

function screenToGame(sx, sy) {
    var rect = canvas.getBoundingClientRect();
    var px = (sx - rect.left) * devicePixelRatio;
    var py = (sy - rect.top) * devicePixelRatio;
    return { x: (px - offsetX) / scale, y: (py - offsetY) / scale };
}

canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (!audioCtx) initAudio();
    for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        var p = screenToGame(t.clientX, t.clientY);
        if (state === STATE_MENU) { handleMenuClick(p.x, p.y); return; }
        if (state === STATE_DEAD) { handleDeadClick(p.x, p.y); return; }
        if (state === STATE_SHOP) { handleShopClick(p.x, p.y); return; }
        if (state === STATE_LEVELUP) { handleLevelUpClick(p.x, p.y); return; }
        if (p.x > W * 0.65) { triggerDash(); }
        else if (!touch.active) {
            touch.active = true;
            touch.id = t.identifier;
            touch.sx = p.x; touch.sy = p.y;
            touch.x = p.x; touch.y = p.y;
        }
    }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        if (t.identifier === touch.id) {
            var p = screenToGame(t.clientX, t.clientY);
            touch.x = p.x; touch.y = p.y;
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === touch.id) {
            touch.active = false; touch.id = -1;
        }
    }
}, { passive: false });

canvas.addEventListener('mousedown', function(e) {
    if (!audioCtx) initAudio();
    var p = screenToGame(e.clientX, e.clientY);
    mouseDown = true; mouseX = p.x; mouseY = p.y;
    if (state === STATE_MENU) handleMenuClick(p.x, p.y);
    else if (state === STATE_DEAD) handleDeadClick(p.x, p.y);
    else if (state === STATE_SHOP) handleShopClick(p.x, p.y);
    else if (state === STATE_LEVELUP) handleLevelUpClick(p.x, p.y);
});
canvas.addEventListener('mousemove', function(e) {
    var p = screenToGame(e.clientX, e.clientY);
    mouseX = p.x; mouseY = p.y;
});
canvas.addEventListener('mouseup', function() { mouseDown = false; });

window.addEventListener('keydown', function(e) {
    keys[e.key] = true;
    if (!audioCtx) initAudio();
    if (state === STATE_MENU && (e.key === ' ' || e.key === 'Enter')) startGame();
    if (state === STATE_PLAY && e.key === ' ') triggerDash();
});
window.addEventListener('keyup', function(e) { keys[e.key] = false; });

// === DASH ===
function triggerDash() {
    if (state !== STATE_PLAY) return;
    if (player.dashCooldown > 0 || player.isDashing) return;
    player.isDashing = true;
    player.dashTimer = 8;
    player.dashCooldown = 60;
    player.invincible = Math.max(player.invincible, 10);
    playSound('powerup');
}

// === MENU ===
function handleMenuClick(x, y) {
    if (x > W/2 - 90 && x < W/2 + 90) {
        if (y > 355 && y < 405) startGame();
        else if (y > 425 && y < 475) { state = STATE_SHOP; playSound('powerup'); }
    }
}

// === SHOP ===
var shopItems = [
    { name: '+1 MAX HP', cost: 50, stat: 'maxHp', val: 1 },
    { name: 'FIRE RATE+', cost: 80, stat: 'fireRate', val: -2 },
    { name: 'SPEED+', cost: 60, stat: 'speed', val: 0.5 },
    { name: 'MAGNET+', cost: 40, stat: 'magnetRange', val: 20 },
    { name: 'DAMAGE+', cost: 100, stat: 'bulletDmg', val: 1 }
];

function handleShopClick(x, y) {
    if (x > W/2 - 60 && x < W/2 + 60 && y > 650 && y < 690) {
        state = STATE_MENU; playSound('shoot'); return;
    }
    for (var i = 0; i < shopItems.length; i++) {
        var iy = 250 + i * 70;
        if (x > 40 && x < W - 40 && y > iy - 25 && y < iy + 25) {
            if (gold >= shopItems[i].cost) {
                gold -= shopItems[i].cost;
                baseStats[shopItems[i].stat] += shopItems[i].val;
                if (shopItems[i].stat === 'fireRate' && baseStats.fireRate < 4) baseStats.fireRate = 4;
                shopItems[i].cost = Math.floor(shopItems[i].cost * 1.5);
                playSound('levelup');
            } else {
                playSound('damage');
            }
        }
    }
}

// === LEVEL UP ===
var levelUpChoices = [];

function generateLevelUpChoices() {
    var all = [
        { name: 'REPAIR +2', fn: function() { player.hp = Math.min(player.hp + 2, player.maxHp); }},
        { name: 'FIRE RATE+', fn: function() { player.fireRate = Math.max(3, player.fireRate - 2); }},
        { name: 'DAMAGE+', fn: function() { player.bulletDmg += 1; }},
        { name: 'SPEED+', fn: function() { player.speed += 0.5; }},
        { name: 'MAGNET+', fn: function() { player.magnetRange += 30; }},
        { name: '+1 MAX HP', fn: function() { player.maxHp += 1; player.hp += 1; }},
        { name: 'SHIELD+', fn: function() { player.shield += 1; }},
        { name: 'BULLET SPD+', fn: function() { player.bulletSpeed += 2; }},
        { name: '+1 BULLET', fn: function() { if (player.bulletCount < 5) player.bulletCount += 1; }}
    ];
    // Fisher-Yates shuffle
    for (var i = all.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = all[i]; all[i] = all[j]; all[j] = tmp;
    }
    levelUpChoices = all.slice(0, 3);
}

function handleLevelUpClick(x, y) {
    for (var i = 0; i < 3; i++) {
        var iy = 320 + i * 80;
        if (x > 60 && x < W - 60 && y > iy - 28 && y < iy + 28) {
            levelUpChoices[i].fn();
            state = STATE_PLAY;
            playSound('levelup');
            return;
        }
    }
}

// === DEAD ===
function handleDeadClick(x, y) {
    if (y > 450 && y < 520 && x > W/2 - 80 && x < W/2 + 80) {
        state = STATE_MENU; playSound('shoot');
    }
}

// === START GAME ===
function startGame() {
    // Clear any pending spawn timers
    for (var i = 0; i < waveSpawnTimers.length; i++) {
        clearTimeout(waveSpawnTimers[i]);
    }
    waveSpawnTimers = [];

    state = STATE_PLAY;
    score = 0; wave = 1; xp = 0; xpNeeded = 50; level = 1;
    combo = 0; comboTimer = 0; maxCombo = 0; killCount = 0;
    gameTime = 0; waveEnemiesRemaining = 0;
    bullets = []; enemies = []; particles = [];
    pickups = []; enemyBullets = []; damageNumbers = [];
    resetPlayer();
    spawnWave();
    playSound('levelup');
}

// === ENEMY TYPES ===
var ENEMY_TYPES = [
    { name: 'drone', w: 24, h: 24, hp: 2, speed: 1.5, color: '#f55', score: 10, shootRate: 0 },
    { name: 'scout', w: 20, h: 20, hp: 1, speed: 3, color: '#ff5', score: 15, shootRate: 0 },
    { name: 'tank', w: 36, h: 36, hp: 6, speed: 0.8, color: '#f80', score: 25, shootRate: 0 },
    { name: 'shooter', w: 26, h: 26, hp: 3, speed: 1, color: '#f0f', score: 20, shootRate: 120 },
    { name: 'zigzag', w: 22, h: 22, hp: 2, speed: 2, color: '#5ff', score: 18, shootRate: 0 }
];

// === WAVE SPAWNING (no race conditions) ===
function spawnWave() {
    var isBoss = (wave % 5 === 0);
    var count = isBoss ? 4 : Math.min(3 + wave * 2, 20);
    waveEnemiesRemaining = count;

    // Clear old timers
    for (var i = 0; i < waveSpawnTimers.length; i++) clearTimeout(waveSpawnTimers[i]);
    waveSpawnTimers = [];

    if (isBoss) {
        state = STATE_BOSS_WARN;
        bossWarningTimer = 90;
        playSound('boss');
        // Spawn boss immediately
        var bossHp = 20 + wave * 5;
        enemies.push({
            x: W / 2, y: -50, w: 60, h: 60,
            hp: bossHp, maxHp: bossHp, speed: 0.5,
            color: '#f0f', score: wave * 50, shootRate: 50,
            shootTimer: 0, type: 'boss', phaseTimer: 0,
            moveDir: 1, goldDrop: 10 + wave * 2, isBoss: true
        });
        // 3 minions
        for (var i = 0; i < 3; i++) {
            (function(delay) {
                var tid = setTimeout(function() { spawnOneEnemy(0); }, delay);
                waveSpawnTimers.push(tid);
            })(i * 400 + 500);
        }
    } else {
        for (var i = 0; i < count; i++) {
            (function(idx, delay) {
                var tid = setTimeout(function() {
                    if (state === STATE_PLAY || state === STATE_BOSS_WARN) {
                        var typeMax = Math.min(ENEMY_TYPES.length, 1 + Math.floor(wave / 2));
                        spawnOneEnemy(Math.floor(Math.random() * typeMax));
                    }
                }, delay);
                waveSpawnTimers.push(tid);
            })(i, i * 350);
        }
    }
}

function spawnOneEnemy(typeIdx) {
    if (typeIdx < 0 || typeIdx >= ENEMY_TYPES.length) typeIdx = 0;
    var t = ENEMY_TYPES[typeIdx];
    var hpMult = 1 + (wave - 1) * 0.15;
    enemies.push({
        x: 30 + Math.random() * (W - 60),
        y: -30 - Math.random() * 80,
        w: t.w, h: t.h,
        hp: Math.ceil(t.hp * hpMult),
        maxHp: Math.ceil(t.hp * hpMult),
        speed: t.speed + wave * 0.05,
        color: t.color, score: t.score,
        shootRate: t.shootRate,
        shootTimer: Math.floor(Math.random() * 60),
        type: t.name, moveDir: Math.random() > 0.5 ? 1 : -1,
        phaseTimer: Math.random() * 100,
        goldDrop: Math.floor(Math.random() * 3) + 1,
        isBoss: false
    });
}

// === COLLISION HELPERS ===
function rectsHit(ax, ay, aw, ah, bx, by, bw, bh) {
    return Math.abs(ax - bx) < (aw + bw) / 2 && Math.abs(ay - by) < (ah + bh) / 2;
}
function dist(ax, ay, bx, by) {
    var dx = ax - bx, dy = ay - by;
    return Math.sqrt(dx * dx + dy * dy);
}

// === SPAWN HELPERS ===
function addPickup(x, y, type, goldAmt) {
    if (pickups.length >= MAX_PICKUPS) return;
    pickups.push({
        x: x, y: y, type: type,
        size: type === 'gold' ? 8 : (type === 'health' ? 10 : 6),
        life: 300, bobPhase: Math.random() * 6.28,
        goldAmt: goldAmt || 1
    });
}

function addParticles(x, y, count, color, spd) {
    for (var i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
        var a = Math.random() * 6.28;
        var s = Math.random() * (spd || 3) + 1;
        particles.push({
            x: x, y: y,
            vx: Math.cos(a) * s, vy: Math.sin(a) * s,
            life: 20 + Math.random() * 20,
            maxLife: 20 + Math.random() * 20,
            color: color || '#fff',
            size: Math.random() * 3 + 1
        });
    }
}

function addDmgNum(x, y, text, color) {
    damageNumbers.push({
        x: x, y: y, text: String(text),
        color: color || '#fff', life: 40, vy: -2
    });
}

// === PLAYER SHOOT ===
function playerShoot() {
    if (player.fireTimer > 0) return;
    if (bullets.length >= MAX_BULLETS) return;
    player.fireTimer = player.fireRate;
    playSound('shoot');
    var count = player.bulletCount;
    var spread = 0.15;
    var startA = -((count - 1) * spread) / 2;
    for (var i = 0; i < count; i++) {
        var a = startA + i * spread;
        bullets.push({
            x: player.x,
            y: player.y - player.h / 2 - 5,
            vx: Math.sin(a) * player.bulletSpeed,
            vy: -player.bulletSpeed * Math.cos(a),
            dmg: player.bulletDmg, w: 4, h: 10
        });
    }
}

// === KILL ENEMY ===
function killEnemy(idx) {
    if (idx < 0 || idx >= enemies.length) return;
    var e = enemies[idx];
    score += e.score * (1 + Math.floor(combo / 5));
    combo++;
    comboTimer = 120;
    killCount++;
    waveEnemiesRemaining = Math.max(0, waveEnemiesRemaining - 1);

    addParticles(e.x, e.y, e.isBoss ? 25 : 8, e.color, e.isBoss ? 5 : 3);
    playSound('explode');
    screenShake = e.isBoss ? 15 : 5;
    if (e.isBoss) flashAlpha = 0.4;

    // Drops
    addPickup(e.x, e.y, 'xp');
    if (Math.random() < 0.5) addPickup(e.x + (Math.random()-0.5)*20, e.y, 'gold', e.goldDrop || 1);
    if (Math.random() < 0.1) addPickup(e.x + (Math.random()-0.5)*20, e.y, 'health');

    enemies.splice(idx, 1);
}

// === DAMAGE PLAYER ===
function damagePlayer(dmg) {
    if (player.invincible > 0) return;
    if (player.shield > 0) {
        player.shield--;
        player.invincible = 20;
        playSound('hit');
        addDmgNum(player.x, player.y - 20, 'SHIELD', '#0ff');
        return;
    }
    player.hp -= dmg;
    player.invincible = 40;
    screenShake = 8;
    flashAlpha = 0.3;
    playSound('damage');
    addParticles(player.x, player.y, 6, '#f55', 3);
    if (player.hp <= 0) {
        player.hp = 0;
        state = STATE_DEAD;
        if (score > highScore) highScore = score;
        gold += Math.floor(score / 20);
        addParticles(player.x, player.y, 30, '#ff0', 6);
        playSound('explode');
        // Clear spawn timers
        for (var i = 0; i < waveSpawnTimers.length; i++) clearTimeout(waveSpawnTimers[i]);
        waveSpawnTimers = [];
    }
}

// === MAIN UPDATE ===
function update() {
    // Stars always update
    for (var i = 0; i < stars.length; i++) {
        stars[i].y += stars[i].speed;
        if (stars[i].y > H) { stars[i].y = 0; stars[i].x = Math.random() * W; }
    }

    if (state === STATE_BOSS_WARN) {
        bossWarningTimer--;
        if (bossWarningTimer <= 0) state = STATE_PLAY;
        return;
    }
    if (state !== STATE_PLAY) return;

    gameTime++;

    // --- Player Movement ---
    var dx = 0, dy = 0;
    var spd = player.isDashing ? player.speed * 3 : player.speed;

    if (touch.active) {
        var tdx = touch.x - touch.sx;
        var tdy = touch.y - touch.sy;
        var td = Math.sqrt(tdx * tdx + tdy * tdy);
        if (td > 5) { dx = (tdx / td) * spd; dy = (tdy / td) * spd; }
    }
    if (mouseDown) {
        var mdx = mouseX - player.x;
        var mdy = mouseY - player.y;
        var md = Math.sqrt(mdx * mdx + mdy * mdy);
        if (md > 5) { dx = (mdx / md) * spd; dy = (mdy / md) * spd; }
    }
    if (keys['ArrowLeft'] || keys['a']) dx -= spd;
    if (keys['ArrowRight'] || keys['d']) dx += spd;
    if (keys['ArrowUp'] || keys['w']) dy -= spd;
    if (keys['ArrowDown'] || keys['s']) dy += spd;

    player.x += dx;
    player.y += dy;
    player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
    player.y = Math.max(player.h/2, Math.min(H - player.h/2, player.y));

    // Trail
    if (player.isDashing) player.trail.push({ x: player.x, y: player.y, a: 1 });
    for (var i = player.trail.length - 1; i >= 0; i--) {
        player.trail[i].a -= 0.08;
        if (player.trail[i].a <= 0) player.trail.splice(i, 1);
    }

    // Timers
    if (player.isDashing) { player.dashTimer--; if (player.dashTimer <= 0) player.isDashing = false; }
    if (player.dashCooldown > 0) player.dashCooldown--;
    if (player.invincible > 0) player.invincible--;
    if (player.fireTimer > 0) player.fireTimer--;

    // Auto-fire
    playerShoot();

    // Combo timer
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) { if (combo > maxCombo) maxCombo = combo; combo = 0; }
    }

    // --- Update Player Bullets ---
    for (var i = bullets.length - 1; i >= 0; i--) {
        var b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) {
            bullets.splice(i, 1);
            continue;
        }
        // Hit enemies
        var bulletHit = false;
        for (var j = enemies.length - 1; j >= 0; j--) {
            var e = enemies[j];
            if (rectsHit(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
                e.hp -= b.dmg;
                bulletHit = true;
                addParticles(b.x, b.y, 2, e.color, 2);
                addDmgNum(e.x, e.y - e.h/2, b.dmg, '#ff0');
                playSound('hit');
                if (e.hp <= 0) {
                    killEnemy(j);
                }
                break; // bullet only hits one enemy
            }
        }
        if (bulletHit) bullets.splice(i, 1);
    }

    // --- Update Enemy Bullets ---
    for (var i = enemyBullets.length - 1; i >= 0; i--) {
        var eb = enemyBullets[i];
        eb.x += eb.vx;
        eb.y += eb.vy;
        if (eb.y > H + 20 || eb.y < -20 || eb.x < -20 || eb.x > W + 20) {
            enemyBullets.splice(i, 1);
            continue;
        }
        if (player.invincible <= 0 && rectsHit(eb.x, eb.y, 6, 6, player.x, player.y, player.w * 0.6, player.h * 0.6)) {
            damagePlayer(1);
            enemyBullets.splice(i, 1);
            if (state !== STATE_PLAY) break; // player died
        }
    }

    // --- Update Enemies ---
    for (var i = enemies.length - 1; i >= 0; i--) {
        var e = enemies[i];
        e.phaseTimer += 0.03;

        // Movement
        if (e.isBoss) {
            if (e.y < 80) e.y += e.speed;
            else {
                e.x += e.moveDir * 1.5;
                if (e.x < 50 || e.x > W - 50) e.moveDir *= -1;
                e.y = 80 + Math.sin(e.phaseTimer) * 20;
            }
        } else if (e.type === 'zigzag') {
            e.y += e.speed;
            e.x += Math.sin(e.phaseTimer * 3) * 3;
        } else if (e.type === 'scout') {
            e.y += e.speed * 0.5;
            if (e.y > 0) e.x += (player.x > e.x ? 1 : -1) * e.speed * 0.5;
        } else {
            e.y += e.speed;
            e.x += Math.sin(e.phaseTimer) * 0.5;
        }

        // Keep in bounds horizontally
        e.x = Math.max(e.w/2, Math.min(W - e.w/2, e.x));

        // Shooting
        if (e.shootRate > 0 && e.y > 0 && e.y < H) {
            e.shootTimer++;
            if (e.shootTimer >= e.shootRate && enemyBullets.length < MAX_ENEMY_BULLETS) {
                e.shootTimer = 0;
                var angle = Math.atan2(player.y - e.y, player.x - e.x);
                enemyBullets.push({ x: e.x, y: e.y + e.h/2, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3 });
                if (e.isBoss) {
                    enemyBullets.push({ x: e.x, y: e.y + e.h/2, vx: Math.cos(angle - 0.3) * 3, vy: Math.sin(angle - 0.3) * 3 });
                    enemyBullets.push({ x: e.x, y: e.y + e.h/2, vx: Math.cos(angle + 0.3) * 3, vy: Math.sin(angle + 0.3) * 3 });
                }
            }
        }

        // Off screen below
        if (e.y > H + 80) {
            waveEnemiesRemaining = Math.max(0, waveEnemiesRemaining - 1);
            enemies.splice(i, 1);
            continue;
        }

        // Collision with player
        if (player.invincible <= 0 && rectsHit(player.x, player.y, player.w * 0.6, player.h * 0.6, e.x, e.y, e.w, e.h)) {
            damagePlayer(1);
            if (!e.isBoss) {
                e.hp -= 2;
                if (e.hp <= 0) killEnemy(i);
            }
            if (state !== STATE_PLAY) break; // player died
        }
    }

    // --- Wave completion check (using counter, not array length) ---
    if (state === STATE_PLAY && waveEnemiesRemaining <= 0 && enemies.length === 0) {
        wave++;
        spawnWave();
    }

    // --- Pickups ---
    for (var i = pickups.length - 1; i >= 0; i--) {
        var p = pickups[i];
        p.life--;
        p.bobPhase += 0.08;
        p.y += 0.3;

        var d = dist(p.x, p.y, player.x, player.y);
        if (d < player.magnetRange) {
            var pull = (player.magnetRange - d) / player.magnetRange * 5;
            if (d > 1) { p.x += (player.x - p.x) / d * pull; p.y += (player.y - p.y) / d * pull; }
        }
        if (d < 20) {
            if (p.type === 'xp') { xp += 5; addDmgNum(p.x, p.y, '+5 XP', '#0ff'); }
            else if (p.type === 'gold') { gold += p.goldAmt; addDmgNum(p.x, p.y, '+' + p.goldAmt + 'G', '#ff0'); }
            else if (p.type === 'health') { player.hp = Math.min(player.hp + 1, player.maxHp); addDmgNum(p.x, p.y, '+1 HP', '#0f0'); }
            playSound('powerup');
            pickups.splice(i, 1);
            continue;
        }
        if (p.life <= 0 || p.y > H + 20) pickups.splice(i, 1);
    }

    // --- Level Up ---
    if (xp >= xpNeeded && state === STATE_PLAY) {
        xp -= xpNeeded;
        level++;
        xpNeeded = Math.floor(xpNeeded * 1.4);
        generateLevelUpChoices();
        state = STATE_LEVELUP;
        playSound('levelup');
    }

    // --- Particles ---
    for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.96; p.vy *= 0.96;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // --- Damage Numbers ---
    for (var i = damageNumbers.length - 1; i >= 0; i--) {
        var d = damageNumbers[i];
        d.y += d.vy; d.vy *= 0.95; d.life--;
        if (d.life <= 0) damageNumbers.splice(i, 1);
    }

    // --- Effects ---
    if (screenShake > 0) { screenShake *= 0.85; if (screenShake < 0.5) screenShake = 0; }
    if (flashAlpha > 0) flashAlpha -= 0.05;
}

// === DRAWING ===
function draw() {
    ctx.save();
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    var sx = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
    var sy = screenShake > 0 ? (Math.random() - 0.5) * screenShake : 0;
    ctx.translate(offsetX + sx * scale, offsetY + sy * scale);
    ctx.scale(scale, scale);

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W, H);
    ctx.clip();

    // Background
    var bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0a0a2e');
    bg.addColorStop(1, '#1a0a2e');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        ctx.globalAlpha = s.bright;
        ctx.fillStyle = '#fff';
        ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    ctx.globalAlpha = 1;

    // State-based rendering
    if (state === STATE_MENU) drawMenu();
    else if (state === STATE_SHOP) drawShop();
    else if (state === STATE_DEAD) drawDead();
    else {
        drawGame();
        if (state === STATE_BOSS_WARN) drawBossWarn();
        if (state === STATE_LEVELUP) drawLevelUp();
    }

    // Flash
    if (flashAlpha > 0) {
        ctx.globalAlpha = Math.min(flashAlpha, 1);
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
    }

    ctx.restore();
    ctx.restore();
}

function drawMenu() {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 60px monospace';
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
    ctx.fillText('VOID', W/2, 180);
    ctx.fillStyle = '#f0f'; ctx.shadowColor = '#f0f';
    ctx.fillText('RIFT', W/2, 250);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#888'; ctx.font = '14px monospace';
    ctx.fillText('COSMIC SURVIVOR', W/2, 290);
    ctx.fillText('v5.0', W/2, 310);

    ctx.fillStyle = '#aaa'; ctx.font = '12px monospace';
    ctx.fillText('HIGH: ' + highScore + '  GOLD: ' + gold, W/2, 340);

    // Play button
    drawButton(W/2, 380, 180, 50, 'PLAY', '#0ff');
    // Shop button
    drawButton(W/2, 450, 180, 50, 'SHOP', '#ff0');

    ctx.fillStyle = '#555'; ctx.font = '11px monospace';
    ctx.fillText('TAP or CLICK to START', W/2, H - 40);
    ctx.fillText('WASD/ARROWS + SPACE to DASH', W/2, H - 22);
}

function drawShop() {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 36px monospace';
    ctx.fillText('SHOP', W/2, 80);
    ctx.fillStyle = '#ff0'; ctx.font = '16px monospace';
    ctx.fillText('GOLD: ' + gold, W/2, 120);
    ctx.fillStyle = '#888'; ctx.font = '12px monospace';
    ctx.fillText('Upgrades persist between runs', W/2, 150);

    for (var i = 0; i < shopItems.length; i++) {
        var item = shopItems[i];
        var iy = 250 + i * 70;
        var canBuy = gold >= item.cost;
        ctx.strokeStyle = canBuy ? '#0f0' : '#555';
        ctx.lineWidth = 2;
        ctx.strokeRect(50, iy - 28, W - 100, 56);
        ctx.fillStyle = canBuy ? 'rgba(0,255,0,0.08)' : 'rgba(100,100,100,0.05)';
        ctx.fillRect(50, iy - 28, W - 100, 56);
        ctx.textAlign = 'left';
        ctx.fillStyle = canBuy ? '#fff' : '#666'; ctx.font = '16px monospace';
        ctx.fillText(item.name, 70, iy + 5);
        ctx.textAlign = 'right';
        ctx.fillStyle = canBuy ? '#ff0' : '#664';
        ctx.fillText(item.cost + 'g', W - 70, iy + 5);
    }
    ctx.textAlign = 'center';
    drawButton(W/2, 670, 120, 40, 'BACK', '#f55');
}

function drawDead() {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f55'; ctx.font = 'bold 48px monospace';
    ctx.shadowColor = '#f55'; ctx.shadowBlur = 15;
    ctx.fillText('DESTROYED', W/2, 200);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff'; ctx.font = '20px monospace';
    ctx.fillText('SCORE: ' + score, W/2, 280);
    ctx.fillText('WAVE: ' + wave, W/2, 310);
    ctx.fillText('KILLS: ' + killCount, W/2, 340);
    ctx.fillText('MAX COMBO: ' + maxCombo, W/2, 370);

    ctx.fillStyle = '#ff0'; ctx.font = '16px monospace';
    ctx.fillText('+' + Math.floor(score / 20) + ' GOLD EARNED', W/2, 410);

    drawButton(W/2, 480, 160, 50, 'MENU', '#0ff');
}

function drawGame() {
    // Player trail
    for (var i = 0; i < player.trail.length; i++) {
        var t = player.trail[i];
        ctx.globalAlpha = t.a * 0.4;
        ctx.fillStyle = '#0ff';
        drawShip(t.x, t.y, player.w * 0.8);
    }
    ctx.globalAlpha = 1;

    // Player (blink when invincible)
    if (player.invincible <= 0 || Math.floor(player.invincible / 3) % 2 === 0) {
        drawShip(player.x, player.y, player.w);
    }

    // Shield
    if (player.shield > 0) {
        ctx.strokeStyle = 'rgba(0,255,255,0.5)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.w * 0.8, 0, 6.28); ctx.stroke();
    }

    // Player bullets
    ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 6;
    for (var i = 0; i < bullets.length; i++) {
        var b = bullets[i];
        ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
    }
    ctx.shadowBlur = 0;

    // Enemy bullets
    ctx.fillStyle = '#f55'; ctx.shadowColor = '#f55'; ctx.shadowBlur = 4;
    for (var i = 0; i < enemyBullets.length; i++) {
        var eb = enemyBullets[i];
        ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, 6.28); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Enemies
    for (var i = 0; i < enemies.length; i++) drawEnemy(enemies[i]);

    // Pickups
    for (var i = 0; i < pickups.length; i++) {
        var p = pickups[i];
        var bob = Math.sin(p.bobPhase) * 3;
        ctx.globalAlpha = p.life < 60 ? p.life / 60 : 1;
        if (p.type === 'xp') {
            ctx.fillStyle = '#0ff';
            ctx.beginPath(); ctx.arc(p.x, p.y + bob, p.size, 0, 6.28); ctx.fill();
        } else if (p.type === 'gold') {
            ctx.fillStyle = '#ff0';
            ctx.fillRect(p.x - p.size/2, p.y + bob - p.size/2, p.size, p.size);
        } else if (p.type === 'health') {
            ctx.fillStyle = '#0f0';
            ctx.fillRect(p.x - 2, p.y + bob - p.size/2, 4, p.size);
            ctx.fillRect(p.x - p.size/2, p.y + bob - 2, p.size, 4);
        }
        ctx.globalAlpha = 1;
    }

    // Particles
    for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Damage numbers
    for (var i = 0; i < damageNumbers.length; i++) {
        var d = damageNumbers[i];
        ctx.globalAlpha = d.life / 40;
        ctx.fillStyle = d.color; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
        ctx.fillText(d.text, d.x, d.y);
    }
    ctx.globalAlpha = 1;

    drawHUD();
}

function drawShip(x, y, size) {
    var s = size / 2;
    ctx.fillStyle = '#0cf'; ctx.shadowColor = '#0cf'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(x, y - s * 1.2);
    ctx.lineTo(x + s, y + s * 0.8);
    ctx.lineTo(x + s * 0.3, y + s * 0.4);
    ctx.lineTo(x - s * 0.3, y + s * 0.4);
    ctx.lineTo(x - s, y + s * 0.8);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    // Engine glow
    ctx.fillStyle = '#f80';
    ctx.beginPath();
    ctx.moveTo(x - s * 0.3, y + s * 0.5);
    ctx.lineTo(x, y + s * 1.2 + Math.random() * 4);
    ctx.lineTo(x + s * 0.3, y + s * 0.5);
    ctx.fill();
}

function drawEnemy(e) {
    ctx.fillStyle = e.color; ctx.shadowColor = e.color; ctx.shadowBlur = 6;
    if (e.isBoss) {
        ctx.beginPath();
        for (var i = 0; i < 6; i++) {
            var a = i * Math.PI / 3 - Math.PI / 6;
            var ex = e.x + Math.cos(a) * e.w / 2;
            var ey = e.y + Math.sin(a) * e.h / 2;
            if (i === 0) ctx.moveTo(ex, ey); else ctx.lineTo(ex, ey);
        }
        ctx.closePath(); ctx.fill();
        ctx.shadowBlur = 0;
        // Boss HP bar
        ctx.fillStyle = '#333'; ctx.fillRect(e.x - 30, e.y - e.h/2 - 12, 60, 5);
        ctx.fillStyle = '#f0f'; ctx.fillRect(e.x - 30, e.y - e.h/2 - 12, 60 * (e.hp / e.maxHp), 5);
    } else if (e.type === 'drone') {
        ctx.beginPath();
        ctx.moveTo(e.x, e.y - e.h/2);
        ctx.lineTo(e.x + e.w/2, e.y + e.h/2);
        ctx.lineTo(e.x - e.w/2, e.y + e.h/2);
        ctx.closePath(); ctx.fill();
    } else if (e.type === 'tank') {
        ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
    } else if (e.type === 'shooter') {
        ctx.beginPath();
        ctx.moveTo(e.x, e.y - e.h/2);
        ctx.lineTo(e.x + e.w/2, e.y);
        ctx.lineTo(e.x, e.y + e.h/2);
        ctx.lineTo(e.x - e.w/2, e.y);
        ctx.closePath(); ctx.fill();
    } else {
        ctx.beginPath(); ctx.arc(e.x, e.y, e.w / 2, 0, 6.28); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // HP bar for enemies with >1 hp
    if (!e.isBoss && e.maxHp > 1 && e.hp < e.maxHp) {
        ctx.fillStyle = '#333'; ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 7, e.w, 3);
        ctx.fillStyle = e.color; ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 7, e.w * (e.hp / e.maxHp), 3);
    }
}

function drawHUD() {
    ctx.textAlign = 'left';
    // HP bar
    var hpW = 120;
    ctx.fillStyle = '#333'; ctx.fillRect(10, 10, hpW, 12);
    var hpR = player.hp / player.maxHp;
    ctx.fillStyle = hpR > 0.5 ? '#0f0' : (hpR > 0.25 ? '#ff0' : '#f00');
    ctx.fillRect(10, 10, hpW * hpR, 12);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(10, 10, hpW, 12);
    ctx.fillStyle = '#fff'; ctx.font = '10px monospace';
    ctx.fillText('HP: ' + player.hp + '/' + player.maxHp, 14, 20);

    // XP bar
    ctx.fillStyle = '#333'; ctx.fillRect(10, 28, hpW, 6);
    ctx.fillStyle = '#0ff'; ctx.fillRect(10, 28, hpW * (xp / xpNeeded), 6);

    // Score
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
    ctx.fillText(String(score), W - 10, 24);
    ctx.fillStyle = '#888'; ctx.font = '12px monospace';
    ctx.fillText('WAVE ' + wave, W - 10, 42);

    // Level + gold
    ctx.textAlign = 'left';
    ctx.fillStyle = '#0ff'; ctx.font = '11px monospace';
    ctx.fillText('LV.' + level, 10, 48);
    ctx.fillStyle = '#ff0';
    ctx.fillText(gold + 'G', 10, 62);

    // Combo
    if (combo > 1) {
        ctx.textAlign = 'center'; ctx.fillStyle = '#f80';
        ctx.font = 'bold 18px monospace';
        ctx.fillText('x' + combo + ' COMBO', W/2, 30);
    }

    // Dash indicator
    ctx.textAlign = 'right'; ctx.font = '11px monospace';
    if (player.dashCooldown > 0) {
        ctx.fillStyle = '#555';
        ctx.fillText('DASH: ' + Math.ceil(player.dashCooldown / 60) + 's', W - 10, H - 15);
    } else {
        ctx.fillStyle = '#0ff';
        ctx.fillText('DASH READY', W - 10, H - 15);
    }
}

function drawBossWarn() {
    var a = Math.abs(Math.sin(bossWarningTimer * 0.1));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#f00'; ctx.textAlign = 'center';
    ctx.font = 'bold 40px monospace';
    ctx.fillText('WARNING', W/2, H/2 - 20);
    ctx.font = 'bold 24px monospace';
    ctx.fillText('BOSS INCOMING', W/2, H/2 + 20);
    ctx.globalAlpha = 1;
}

function drawLevelUp() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#0ff'; ctx.font = 'bold 32px monospace';
    ctx.fillText('LEVEL UP!', W/2, 200);
    ctx.fillStyle = '#fff'; ctx.font = '16px monospace';
    ctx.fillText('Level ' + level, W/2, 240);
    ctx.fillText('Choose an upgrade:', W/2, 270);

    for (var i = 0; i < levelUpChoices.length; i++) {
        var iy = 320 + i * 80;
        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
        ctx.strokeRect(70, iy - 26, W - 140, 52);
        ctx.fillStyle = 'rgba(0,255,255,0.1)';
        ctx.fillRect(70, iy - 26, W - 140, 52);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
        ctx.fillText(levelUpChoices[i].name, W/2, iy + 6);
    }
}

function drawButton(cx, cy, w, h, text, color) {
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.strokeRect(cx - w/2, cy - h/2, w, h);
    ctx.fillStyle = color.replace(')', ',0.1)').replace('rgb', 'rgba');
    ctx.fillRect(cx - w/2, cy - h/2, w, h);
    ctx.fillStyle = color; ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(text, cx, cy + 7);
}

// === GAME LOOP ===
var lastTime = 0;
var accumulator = 0;
var STEP = 1000 / 60;

function loop(ts) {
    if (lastTime === 0) lastTime = ts;
    var dt = ts - lastTime;
    lastTime = ts;
    if (dt > 100) dt = 100; // cap to prevent spiral

    accumulator += dt;
    var steps = 0;
    while (accumulator >= STEP && steps < 4) { // max 4 steps per frame
        update();
        accumulator -= STEP;
        steps++;
    }
    if (steps >= 4) accumulator = 0; // drop frames rather than spiral

    draw();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

})();
</script>
