  function drawDeathScreen() {
    // Semi-transparent dark overlay with subtle red tint
    ctx.fillStyle = 'rgba(20, 0, 0, 0.85)';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    // "GAME OVER" with chromatic aberration effect
    const aberrationAmount = 2;
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';

    // Red channel (shifted left)
    ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
    ctx.fillText('GAME OVER', CANVAS_WIDTH / 2 - aberrationAmount, 150);

    // Cyan channel (shifted right)
    ctx.fillStyle = 'rgba(0, 255, 255, 0.6)';
    ctx.fillText('GAME OVER', CANVAS_WIDTH / 2 + aberrationAmount, 150);

    // White text on top (centered)
    ctx.fillStyle = '#ffffff';
    ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 150);

    // Stats in rounded dark boxes
    const statBoxY = [210, 240, 270, 300];
    const statTexts = [
      `Score: ${Math.floor(score)}`,
      `Wave: ${wave}`,
      `Gold: ${Math.floor(goldEarned)}G`,
      `Enemies Killed: ${enemiesKilled}`
    ];

    ctx.font = 'bold 14px Arial';
    for (let i = 0; i < statTexts.length; i++) {
      const y = statBoxY[i];
      // Draw stat box background
      const boxW = 200;
      const boxH = 20;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      const statPath = rrPath(CANVAS_WIDTH / 2 - boxW / 2, y - boxH / 2, boxW, boxH, 4);
      ctx.fill(statPath);

      ctx.strokeStyle = 'rgba(100, 100, 150, 0.5)';
      ctx.lineWidth = 1;
      ctx.stroke(statPath);

      // Draw text
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.fillText(statTexts[i], CANVAS_WIDTH / 2, y);
    }

    // High score notification
    if (score > highScore) {
      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 16px Arial';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 12;
      ctx.fillText('NEW HIGH SCORE!', CANVAS_WIDTH / 2, 350);
      ctx.shadowBlur = 0;
    }

    drawButton(ctx, CANVAS_WIDTH / 2, 410, 150, 40, 'CONTINUE', '#00ccff');
    drawButton(ctx, CANVAS_WIDTH / 2, 470, 150, 40, 'MENU', '#aa88ff');
  }

  function drawUpgradeScreen() {
    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    // "CHOOSE UPGRADE" with glow
    ctx.fillStyle = '#00ccff';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#00ccff';
    ctx.shadowBlur = 12;
    ctx.fillText('CHOOSE UPGRADE', CANVAS_WIDTH / 2, 60);
    ctx.shadowBlur = 0;

    if (upgradeSelection && upgradeSelection.upgrades.length > 0) {
      let yPos = 140;
      for (let i = 0; i < upgradeSelection.upgrades.length; i++) {
        const upgrade = upgradeSelection.upgrades[i];
        const isSelected = i === selectedUpgradeIndex;

        // Upgrade card with colored left accent bar
        const cardPath = rrPath(30, yPos - 20, CANVAS_WIDTH - 60, 50, 8);
        ctx.fillStyle = isSelected ? 'rgba(100, 200, 255, 0.4)' : 'rgba(100, 100, 150, 0.25)';
        ctx.fill(cardPath);

        // Left accent bar
        const accentColor = isSelected ? '#00ff00' : '#00ccff';
        ctx.fillStyle = accentColor;
        ctx.fillRect(30, yPos - 20, 4, 50);

        // Border
        ctx.strokeStyle = accentColor;
        ctx.lineWidth = isSelected ? 2 : 1;
        ctx.globalAlpha = isSelected ? 1 : 0.6;
        ctx.stroke(cardPath);
        ctx.globalAlpha = 1;

        // Scale up selected card slightly
        if (isSelected) {
          ctx.strokeStyle = accentColor;
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.3;
          const expandedPath = rrPath(25, yPos - 25, CANVAS_WIDTH - 50, 60, 8);
          ctx.stroke(expandedPath);
          ctx.globalAlpha = 1;
        }

        // Upgrade name
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(upgrade.name, 50, yPos);

        // Upgrade description
        ctx.fillStyle = '#aaaaaa';
        ctx.font = '11px Arial';
        ctx.fillText(upgrade.desc, 50, yPos + 18);

        yPos += 70;
      }
    }

    // Instructions
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Tap to select or use Arrow keys + Space', CANVAS_WIDTH / 2, CANVAS_HEIGHT - 20);
  }

  // ============================================================================
  // UPDATE LOGIC
  // ============================================================================
  function updatePlayer(dt) {
    const ship = SHIPS[selectedShipIndex];
    const mods = ship.statMods;
    const moveSpeed = player.speed * mods.speedMul * dt;

    player.vx = 0;
    player.vy = 0;

    if (keys['ArrowLeft'] || keys['a']) player.vx = -moveSpeed * 2;
    if (keys['ArrowRight'] || keys['d']) player.vx = moveSpeed * 2;
    if (keys['ArrowUp'] || keys['w']) player.vy = -moveSpeed * 2;
    if (keys['ArrowDown'] || keys['s']) player.vy = moveSpeed * 2;

    // Touch/virtual joystick input
    if (touchActive) {
      const dx = touchCurrentX - touchStartX;
      const dy = touchCurrentY - touchStartY;
      const dist = Math.hypot(dx, dy);
      const deadZone = 10;
      if (dist > deadZone) {
        const normalized = Math.min(dist, 60) / 60;
        player.vx = (dx / dist) * moveSpeed * 2 * normalized;
        player.vy = (dy / dist) * moveSpeed * 2 * normalized;
      }
    }

    player.x = Math.max(player.radius, Math.min(CANVAS_WIDTH - player.radius, player.x + player.vx));
    player.y = Math.max(player.radius, Math.min(CANVAS_HEIGHT - player.radius, player.y + player.vy));

    player.fireTimer += dt;
    const fireRate = WEAPONS[player.weapon].fireRate * mods.fireMul * (activeDailyMod?.mod.alwaysRapid ? 0.5 : 1);
    const fireInterval = 1 / fireRate;

    if (player.fireTimer >= fireInterval) {
      const weapon = WEAPONS[player.weapon];
      if (weapon.bulletSpeed > 0) {
        const angle = -Math.PI / 2;
        const vx = Math.cos(angle) * weapon.bulletSpeed;
        const vy = Math.sin(angle) * weapon.bulletSpeed;
        spawnPlayerBullet(player.x, player.y, vx, vy, weapon.bulletDamage * mods.damageMul, 'standard');

        if (runUpgrades.includes('reargun')) {
          spawnPlayerBullet(player.x, player.y, -vx, -vy, weapon.bulletDamage * mods.damageMul * 0.5, 'standard');
        }
        if (runUpgrades.includes('sidegun')) {
          spawnPlayerBullet(player.x, player.y, Math.cos(angle + Math.PI / 4) * weapon.bulletSpeed, Math.sin(angle + Math.PI / 4) * weapon.bulletSpeed, weapon.bulletDamage * mods.damageMul * 0.5, 'standard');
          spawnPlayerBullet(player.x, player.y, Math.cos(angle - Math.PI / 4) * weapon.bulletSpeed, Math.sin(angle - Math.PI / 4) * weapon.bulletSpeed, weapon.bulletDamage * mods.damageMul * 0.5, 'standard');
        }
      }
      player.fireTimer = 0;
    }

    player.dashCooldown = Math.max(0, player.dashCooldown - dt);
    player.shield = Math.max(0, player.shield - dt * 0.5);
    if (player.invulnTimer > 0) player.invulnTimer -= dt;

    if (runUpgrades.includes('shieldgen') && player.shield <= 0) {
      player.shield = 100;
    }

    comboTimer = Math.max(0, comboTimer - dt);
    if (comboTimer <= 0) combo = 0;
  }

  function updateEnemies(dt) {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.patternTime += dt;
      e.worldTime += dt;
      e.flashTimer = Math.max(0, e.flashTimer - dt);

      const moveSpeed = e.speed * dt;

      // Movement patterns
      if (e.movementPattern === 'sine') {
        e.x += Math.sin(e.patternTime * 3) * moveSpeed;
        e.vy = 60 + Math.sin(e.patternTime * 4) * 20;
      } else if (e.movementPattern === 'figure8') {
        e.x += Math.sin(e.patternTime * 2) * moveSpeed;
        e.vy = 60 + Math.sin(e.patternTime * 4) * 30;
      } else if (e.movementPattern === 'divebomb') {
        if (e.patternTime < 1.5) {
          e.vy = 200;
        } else if (e.patternTime < 3.0) {
          e.vy = -150;
        } else {
          e.patternTime = 0;
        }
      } else if (e.movementPattern === 'orbit') {
        const angle = e.patternTime * 2 + (e.formationData.angle || 0);
        const orbitRadius = 60;
        e.x = CANVAS_WIDTH / 2 + Math.cos(angle) * orbitRadius;
        e.y = 120 + Math.sin(angle) * orbitRadius;
      } else if (e.movementPattern === 'strafe') {
        const dir = e.formationData.sweepDir || 1;
        e.x += dir * moveSpeed * 2;
      }

      e.y += e.vy * dt;

      // Clamp movement
      e.x = Math.max(0, Math.min(CANVAS_WIDTH, e.x));
      e.y = Math.max(0, Math.min(CANVAS_HEIGHT, e.y));

      // Firing
      e.shootCooldown = Math.max(0, e.shootCooldown - dt);
      if (e.shootCooldown <= 0) {
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        spawnEnemyBullet(e.x, e.y, angle, e.bulletDamage, e.color);
        e.shootCooldown = 1 / e.fireRate;
      }

      // Boss phases
      if (e.type === 'boss') {
        const hpRatio = e.hp / e.maxHp;
        if (hpRatio < 0.66 && e.bossPhase === 0) {
          e.bossPhase = 1;
          bossPhaseChangeTimer = 0.3;
          triggerFlash('#ff0000', 15);
          e.fireRate *= 1.5;
        }
        if (hpRatio < 0.33 && e.bossPhase === 1) {
          e.bossPhase = 2;
          bossPhaseChangeTimer = 0.3;
          triggerFlash('#ffff00', 15);
          e.fireRate *= 1.5;
        }
      }

      if (e.hp <= 0) {
        enemies.splice(i, 1);
        waveEnemiesRemaining--;
        const points = e.points * getComboMul();
        score += points;
        gold += e.goldDrop * (activeDailyMod?.mod.goldMul || 1.0);
        goldEarned += e.goldDrop;
        addScorePopup(e.x, e.y, '+' + Math.floor(points), '#ffff00', 14);

        combo++;
        maxCombo = Math.max(maxCombo, combo);
        comboTimer = COMBO_TIMEOUT;
        lastKillTime = 0;
        enemiesKilled++;

        spawnExplosion(e.x, e.y, 20, e.color);
        playExplosionSound(e.type === 'boss');

        if (e.type === 'boss') {
          bossKilled = true;
          triggerFlash('#ffff00', 30);
          triggerShake(8, 15);
          unlockAchievement('boss_slayer');
          score += 1000;
          spawnPickup(e.x, e.y, 'gold');
        }

        if (Math.random() < 0.3) {
          spawnPickup(e.x, e.y, 'gold');
        }
        if (Math.random() < 0.1) {
          spawnPickup(e.x, e.y, 'xp');
        }
      }
    }

    if (waveEnemiesRemaining <= 0 && gameState === 'play' && !nextWaveTimer) {
      nextWaveTimer = 2;
    }
  }

  function updateProjectiles(dt) {
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const bullet = playerBullets[i];
      bullet.x += bullet.vx * dt;
      bullet.y += bullet.vy * dt;

      let hit = false;
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const dist = Math.hypot(e.x - bullet.x, e.y - bullet.y);
        if (dist < e.radius + bullet.radius) {
          e.hp -= bullet.damage;
          e.flashTimer = 0.1;
          hit = true;
          break;
        }
      }

      if (hit || bullet.x < 0 || bullet.x > CANVAS_WIDTH || bullet.y < 0 || bullet.y > CANVAS_HEIGHT) {
        playerBullets.splice(i, 1);
      }
    }

    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const bullet = enemyBullets[i];
      bullet.x += bullet.vx * dt;
      bullet.y += bullet.vy * dt;
      bullet.age = (bullet.age || 0) + dt;

      const dist = Math.hypot(player.x - bullet.x, player.y - bullet.y);
      if (dist < player.radius + bullet.radius && player.invulnTimer <= 0) {
        if (player.shield > 0) {
          player.shield -= bullet.damage * 30;
        } else {
          player.hp -= bullet.damage;
          player.invulnTimer = 1.5; // 1.5 seconds of invulnerability
        }
        enemyBullets.splice(i, 1);
        triggerFlash('#ff0000', 5);
      } else if (bullet.x < 0 || bullet.x > CANVAS_WIDTH || bullet.y < 0 || bullet.y > CANVAS_HEIGHT) {
        enemyBullets.splice(i, 1);
      }
    }
  }

  function updatePickups(dt) {
    for (let i = pickups.length - 1; i >= 0; i--) {
      const pickup = pickups[i];
      pickup.timer -= dt;

      const dist = Math.hypot(player.x - pickup.x, player.y - pickup.y);
      if (dist < player.magnetRange) {
        const angle = Math.atan2(player.y - pickup.y, player.x - pickup.x);
        const speed = 300 * dt;
        pickup.x += Math.cos(angle) * speed;
        pickup.y += Math.sin(angle) * speed;
      }

      if (dist < player.radius + pickup.radius) {
        if (pickup.type === 'gold') {
          gold += 10;
          goldEarned += 10;
          totalGoldEarned += 10;
          addScorePopup(pickup.x, pickup.y, '+10G', '#ffcc00', 12);
        } else if (pickup.type === 'xp') {
          xp += 15;
          addScorePopup(pickup.x, pickup.y, '+XP', '#aa88ff', 12);
          while (xp >= xpNeeded) {
            xp -= xpNeeded;
            level++;
            xpNeeded = Math.floor(xpNeeded * 1.2);
            unlockAchievement('max_level');
          }
        }
        itemsCollected++;
        pickups.splice(i, 1);
      } else if (pickup.timer <= 0) {
        pickups.splice(i, 1);
      }
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.timer -= dt;

      if (p.type === 'debris') {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 300 * dt;
      }

      if (p.timer <= 0) {
        particles.splice(i, 1);
      }
    }
  }

  function updateUI() {
    if (achievementToast) {
      achievementToast.timer--;
      if (achievementToast.timer <= 0) {
        achievementToast = null;
      }
    }

    if (waveAnnouncement) {
      waveAnnouncement.timer--;
      if (waveAnnouncement.timer <= 0) {
        waveAnnouncement = null;
      }
    }

    for (let i = scorePopups.length - 1; i >= 0; i--) {
      const popup = scorePopups[i];
      popup.timer--;
      popup.y -= 50 * (FIXED_DT / 1000);
      if (popup.timer <= 0) {
        scorePopups.splice(i, 1);
      }
    }

    lastKillTime += FIXED_DT / 1000;
    pacifistTimer = lastKillTime;

    if (pacifistTimer >= 30) {
      unlockAchievement('pacifist');
    }

    if (score >= 100000) {
      unlockAchievement('millionaire');
    }

    if (wave >= 10) {
      unlockAchievement('wave_10');
    }

    if (wave >= 20) {
      unlockAchievement('unstoppable');
    }

    if (combo >= 20) {
      unlockAchievement('combo_king');
    }

    if (enemiesKilled >= 1) {
      unlockAchievement('first_blood');
    }

    if (totalGoldEarned >= 1000) {
      unlockAchievement('gold_rush');
    }

    if (itemsCollected >= 100) {
      unlockAchievement('collector');
    }

    if (wave >= 5 && player.hp === 1) {
      unlockAchievement('glass_cannon');
    }

    if (dashesUsed >= 50) {
      unlockAchievement('speed_demon');
    }
  }

  function update(dt) {
    if (gameState === 'play') {
      updatePlayer(dt);
      updateEnemies(dt);
      updateProjectiles(dt);
      updatePickups(dt);
      updateParticles(dt);
      updateUI();

      timeSurvived += dt;

      if (player.hp <= 0) {
        gameState = 'dead';
        highScore = Math.max(highScore, score);
        dailyHighScore = Math.max(dailyHighScore, score);
        savePersistentData();
      }

      if (nextWaveTimer !== null) {
        nextWaveTimer -= dt;
        if (nextWaveTimer <= 0) {
          wave++;
          showUpgradeSelection();
          gameState = 'upgrade';
          nextWaveTimer = null;
        }
      }

      if (shakeTimer > 0) {
        shakeTimer--;
        shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
        shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
      } else {
        shakeX = 0;
        shakeY = 0;
      }

      if (flashTimer > 0) {
        flashTimer--;
      }
    } else if (gameState === 'upgrade') {
      // Wait for selection
    }
  }

  // ============================================================================
  // INPUT
  // ============================================================================
  let keys = {};

  document.addEventListener('keydown', (e) => {
    keys[e.key] = true;

    if (e.key === 'm' || e.key === 'M') {
      audioMuted = !audioMuted;
      if (!audioMuted) {
        initAudio();
        startProceduralMusic();
      }
    }

    if (e.key === '1') switchWeapon('blaster');
    if (e.key === '2') switchWeapon('laser');
    if (e.key === '3') switchWeapon('missiles');

    if (e.key === 'Enter' || e.key === ' ') {
      if (gameState === 'menu') {
        if (screen === 'main') {
          gameState = 'play';
          wave = 1;
          score = 0;
          combo = 0;
          maxCombo = 0;
          enemiesKilled = 0;
          itemsCollected = 0;
          timeSurvived = 0;
          goldEarned = 0;
          dashesUsed = 0;
          pacifistTimer = 0;
          lastKillTime = 0;
          runUpgrades = [];
          playerBullets = [];
          enemyBullets = [];
          pickups = [];
          particles = [];
          enemies = [];

          resetPlayer();
          activeDailyMod = null;
          recordPlayToday();

          spawnWave(1);
          startProceduralMusic();
        }
      } else if (gameState === 'dead') {
        gameState = 'menu';
        screen = 'main';
      } else if (gameState === 'upgrade') {
        if (selectedUpgradeIndex >= 0 && upgradeSelection) {
          const upgrade = upgradeSelection.upgrades[selectedUpgradeIndex];
          applyUpgrade(upgrade.id);
          spawnWave(wave);
          gameState = 'play';
        }
      }
    }

    if (e.key === 'Escape') {
      if (gameState === 'play') {
        gameState = 'menu';
        screen = 'main';
      }
    }

    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      if (gameState === 'upgrade') {
        const dir = e.key === 'ArrowUp' ? -1 : 1;
        selectedUpgradeIndex = (selectedUpgradeIndex + dir + 3) % 3;
      }
    }
  });

  document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
  });

  // ============================================================================
  // TOUCH CONTROLS FOR MOBILE GAMEPLAY
  // ============================================================================
  let touchActive = false;
  let touchStartX = 0, touchStartY = 0;
  let touchCurrentX = 0, touchCurrentY = 0;
  let joystickVisible = false;

  function startNewGame(dailyMod) {
    gameState = 'play';
    wave = 1;
    score = 0;
    combo = 0;
    maxCombo = 0;
    enemiesKilled = 0;
    itemsCollected = 0;
    timeSurvived = 0;
    goldEarned = 0;
    dashesUsed = 0;
    runUpgrades = [];
    playerBullets = [];
    enemyBullets = [];
    pickups = [];
    particles = [];
    enemies = [];

    resetPlayer();
    activeDailyMod = dailyMod;
    recordPlayToday();

    spawnWave(1);
    initAudio();
    startProceduralMusic();
  }

  function handleClick(x, y) {
    initAudio();

    if (gameState === 'menu') {
      if (screen === 'main') {
        if (Math.abs(y - 160) < 20) {
          startNewGame(null);
        } else if (Math.abs(y - 210) < 20) {
          screen = 'ships';
          playUISound('click');
        } else if (Math.abs(y - 260) < 20) {
          screen = 'achievements';
          playUISound('click');
        } else if (Math.abs(y - 310) < 20) {
          screen = 'daily';
          playUISound('click');
        }
      } else if (screen === 'ships') {
        for (let i = 0; i < SHIPS.length; i++) {
          if (Math.abs(y - (160 + i * 50)) < 25) {
            if (SHIPS[i].unlocked) {
              selectedShipIndex = i;
              playUISound('click');
            } else if (gold >= SHIPS[i].cost) {
              gold -= SHIPS[i].cost;
              SHIPS[i].unlocked = true;
              selectedShipIndex = i;
              savePersistentData();
              playUISound('click');
            }
          }
        }
        if (Math.abs(y - (CANVAS_HEIGHT - 40)) < 18) {
          screen = 'main';
          playUISound('click');
        }
      } else if (screen === 'achievements') {
        if (Math.abs(y - (CANVAS_HEIGHT - 40)) < 18) {
          screen = 'main';
          playUISound('click');
        }
      } else if (screen === 'daily') {
        if (Math.abs(y - 310) < 20) {
          startNewGame(dailyChallenge);
        } else if (Math.abs(y - 380) < 20) {
          screen = 'main';
          playUISound('click');
        }
      }
    } else if (gameState === 'dead') {
      if (Math.abs(y - 410) < 20) {
        // CONTINUE → restart game
        startNewGame(null);
        playUISound('click');
      } else if (Math.abs(y - 470) < 20) {
        // MENU
        gameState = 'menu';
        screen = 'main';
        playUISound('click');
      }
    } else if (gameState === 'upgrade') {
      // Click on upgrade cards
      if (upgradeSelection && upgradeSelection.upgrades.length > 0) {
        let yPos = 140;
        for (let i = 0; i < upgradeSelection.upgrades.length; i++) {
          if (y >= yPos - 20 && y <= yPos + 30) {
            selectedUpgradeIndex = i;
            const upgrade = upgradeSelection.upgrades[i];
            applyUpgrade(upgrade.id);
            spawnWave(wave);
            gameState = 'play';
            playUISound('click');
            return;
          }
          yPos += 70;
        }
      }
    }
  }

  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width);
    const y = (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);
    handleClick(x, y);
  }, { passive: false });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const x = (touch.clientX - rect.left) * (CANVAS_WIDTH / rect.width);
    const y = (touch.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);

    if (gameState === 'play') {
      // Start virtual joystick
      touchActive = true;
      touchStartX = x;
      touchStartY = y;
      touchCurrentX = x;
      touchCurrentY = y;
      joystickVisible = true;
    } else {
      handleClick(x, y);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchActive || gameState !== 'play') return;

    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    touchCurrentX = (touch.clientX - rect.left) * (CANVAS_WIDTH / rect.width);
    touchCurrentY = (touch.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    touchActive = false;
    joystickVisible = false;
  }, { passive: false });

  canvas.addEventListener('touchcancel', (e) => {
    touchActive = false;
    joystickVisible = false;
  }, { passive: false });

  // ============================================================================
  // MAIN LOOP
  // ============================================================================
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function loop() {
    let now = Date.now();
    let delta = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;

    let accumulator = delta;
    let frames = 0;
    while (accumulator >= FIXED_DT / 1000 && frames < MAX_DELTA_FRAMES) {
      update(FIXED_DT / 1000);
      accumulator -= FIXED_DT / 1000;
      frames++;
    }

    ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.save();
    ctx.translate(shakeX, shakeY);

    if (gameState === 'menu') {
      drawMenu();
    } else if (gameState === 'play' || gameState === 'upgrade') {
      drawNebulaBackground();
      drawProjectiles();
      drawEnemies();
      drawParticles();
      drawPickups();
      drawPlayer();
      drawHUD();

      if (waveAnnouncement) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, CANVAS_HEIGHT / 2 - 40, CANVAS_WIDTH, 80);

        ctx.fillStyle = '#00ccff';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(waveAnnouncement.text, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 10);

        ctx.fillStyle = '#aaaaaa';
        ctx.font = '12px Arial';
        ctx.fillText(waveAnnouncement.sub, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 15);
      }

      for (let popup of scorePopups) {
        ctx.fillStyle = popup.color;
        ctx.globalAlpha = popup.timer / popup.maxTimer;
        ctx.font = `bold ${popup.size}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(popup.text, popup.x, popup.y);
        ctx.globalAlpha = 1;
      }

      if (gameState === 'upgrade') {
        drawUpgradeScreen();
      }
    } else if (gameState === 'dead') {
      drawNebulaBackground();
      drawDeathScreen();
    }

    if (flashTimer > 0) {
      ctx.globalAlpha = flashTimer / 30;
      ctx.fillStyle = flashColor;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    requestAnimationFrame(loop);
  }

  // Initialize
  loadPersistentData();
  initAudio();

  loop();
})();
</script>
