// ─────────────────────────────────────────────────────────────────────────
// 1.1 Canvas Setup
// ─────────────────────────────────────────────────────────────────────────
const C = document.getElementById('G');
const X = C.getContext('2d', { alpha: false });
const W = 420, H = 750;
let SCALE = 1;
let canvasReady = false;

// ─────────────────────────────────────────────────────────────────────────
// 1.2 Math Shortcuts & Utilities
// ─────────────────────────────────────────────────────────────────────────
const PI = Math.PI, TAU = PI * 2;
const sin = Math.sin, cos = Math.cos, abs = Math.abs;
const min = Math.min, max = Math.max, floor = Math.floor, ceil = Math.ceil;
const sqrt = Math.sqrt, atan2 = Math.atan2, pow = Math.pow;
const round = Math.round, sign = Math.sign;
const rng = () => Math.random();
const rnd = (a, b) => a + rng() * (b - a);
const rndi = (a, b) => floor(rnd(a, b + 0.999));
const pick = (a) => a.length > 0 ? a[rndi(0, a.length - 1)] : null;
const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
const lerp = (a, b, t) => a + (b - a) * clamp(t, 0, 1);
const lerpUnclamped = (a, b, t) => a + (b - a) * t;
const dist = (ax, ay, bx, by) => sqrt((ax - bx) ** 2 + (ay - by) ** 2);
const distSq = (ax, ay, bx, by) => (ax - bx) ** 2 + (ay - by) ** 2;
const angle = (ax, ay, bx, by) => atan2(by - ay, bx - ax);
const hsl = (h, s, l, a = 1) => `hsla(${h},${s}%,${l}%,${a})`;
const rgb = (r, g, b, a = 1) => `rgba(${r},${g},${b},${a})`;
const hex2rgb = (h) => {
  try {
    if (!h || typeof h !== 'string') return [255, 255, 255];
    if (h.length === 4) h = '#' + h[1]+h[1] + h[2]+h[2] + h[3]+h[3];
    if (h.length !== 7) return [255, 255, 255];
    const n = parseInt(h.slice(1), 16);
    if (isNaN(n)) return [255, 255, 255];
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  } catch (e) { return [255, 255, 255]; }
};
const rgb2hex = (r, g, b) => '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);

// Easing functions
const easeInQuad = (t) => t * t;
const easeOutQuad = (t) => t * (2 - t);
const easeInOutQuad = (t) => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
const easeOutCubic = (t) => (--t) * t * t + 1;
const easeInOutCubic = (t) => t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1;
const easeOutElastic = (t) => {
  if (t === 0 || t === 1) return t;
  return pow(2, -10 * t) * sin((t - 0.075) * (2 * PI) / 0.3) + 1;
};
const easeOutBounce = (t) => {
  if (t < 1 / 2.75) return 7.5625 * t * t;
  if (t < 2 / 2.75) return 7.5625 * (t -= 1.5 / 2.75) * t + 0.75;
  if (t < 2.5 / 2.75) return 7.5625 * (t -= 2.25 / 2.75) * t + 0.9375;
  return 7.5625 * (t -= 2.625 / 2.75) * t + 0.984375;
};

// Safe number helpers (prevents NaN propagation)
const safeNum = (v, fallback = 0) => (typeof v === 'number' && !isNaN(v) && isFinite(v)) ? v : fallback;
const safeStr = (v, fallback = '') => (typeof v === 'string') ? v : fallback;

// Timer helper
const timer = (dur) => ({ t: 0, dur, get pct() { return clamp(this.t / this.dur, 0, 1); }, get done() { return this.t >= this.dur; }, tick(dt) { this.t = min(this.t + dt, this.dur + 1); }, reset() { this.t = 0; } });

// ─────────────────────────────────────────────────────────────────────────
// 1.3 Responsive Canvas Scaling (crash-proof)
// ─────────────────────────────────────────────────────────────────────────
function resizeCanvas() {
  try {
    const dpr = window.devicePixelRatio || 1;
    const vw = window.innerWidth || 420;
    const vh = window.innerHeight || 750;
    const sx = vw / W, sy = vh / H;
    const fitScale = Math.min(sx, sy);
    SCALE = fitScale * dpr;
    C.width = Math.round(W * SCALE);
    C.height = Math.round(H * SCALE);
    C.style.width = Math.round(W * fitScale) + 'px';
    C.style.height = Math.round(H * fitScale) + 'px';
    C.style.position = 'absolute';
    C.style.left = Math.round((vw - W * fitScale) / 2) + 'px';
    C.style.top = Math.round((vh - H * fitScale) / 2) + 'px';
    X.setTransform(SCALE, 0, 0, SCALE, 0, 0);
    // Invalidate caches that depend on canvas size
    if (typeof nebulaCache !== 'undefined') {
      for (const k in nebulaCache) delete nebulaCache[k];
    }
    if (typeof spriteCache !== 'undefined') {
      for (const k in spriteCache) delete spriteCache[k];
    }
    canvasReady = true;
  } catch (e) {
    console.warn('resizeCanvas error:', e);
  }
}

// Debounced resize
let resizeTimer = null;
window.addEventListener('resize', () => {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resizeCanvas, 100);
});
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));

// ─────────────────────────────────────────────────────────────────────────
// 1.4 Object Pool System (crash-proof with overflow protection)
// ─────────────────────────────────────────────────────────────────────────
class Pool {
  constructor(maxSize, factory) {
    this.items = [];
    this.max = maxSize;
    this.activeCount = 0;
    for (let i = 0; i < maxSize; i++) {
      const obj = factory(i);
      obj._active = false;
      obj._idx = i;
      this.items.push(obj);
    }
  }

  spawn() {
    for (let i = 0; i < this.max; i++) {
      if (!this.items[i]._active) {
        this.items[i]._active = true;
        this.activeCount++;
        return this.items[i];
      }
    }
    // Pool exhausted — recycle oldest active item
    const oldest = this.items[0];
    oldest._active = true;
    return oldest;
  }

  kill(obj) {
    if (obj && obj._active) {
      obj._active = false;
      this.activeCount = max(0, this.activeCount - 1);
    }
  }

  forEach(fn) {
    for (let i = 0; i < this.max; i++) {
      if (this.items[i]._active) {
        try { fn(this.items[i], i); }
        catch (e) { this.items[i]._active = false; }
      }
    }
  }

  filter(fn) {
    const results = [];
    for (let i = 0; i < this.max; i++) {
      if (this.items[i]._active && fn(this.items[i])) results.push(this.items[i]);
    }
    return results;
  }

  closest(x, y, maxDist = 9999) {
    let best = null, bestD = maxDist * maxDist;
    for (let i = 0; i < this.max; i++) {
      if (this.items[i]._active) {
        const d = distSq(x, y, this.items[i].x, this.items[i].y);
        if (d < bestD) { bestD = d; best = this.items[i]; }
      }
    }
    return best;
  }

  clear() {
    for (let i = 0; i < this.max; i++) this.items[i]._active = false;
    this.activeCount = 0;
  }
}

// ─────────────────────────────────────────────────────────────────────────
// 1.5 Tween System for smooth animations
// ─────────────────────────────────────────────────────────────────────────
const tweens = [];
function tween(obj, props, dur, ease = easeOutQuad, onDone = null) {
  const tw = { obj, props: {}, dur, elapsed: 0, ease, onDone };
  for (const key in props) {
    tw.props[key] = { from: obj[key] || 0, to: props[key] };
  }
  tweens.push(tw);
  return tw;
}

function updateTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const tw = tweens[i];
    tw.elapsed += dt;
    const t = clamp(tw.elapsed / tw.dur, 0, 1);
    const eased = tw.ease(t);
    for (const key in tw.props) {
      const p = tw.props[key];
      tw.obj[key] = lerp(p.from, p.to, eased);
    }
    if (t >= 1) {
      if (tw.onDone) tw.onDone();
      tweens.splice(i, 1);
    }
  }
}


// ███████████████████████████████████████████████████████████████████████████

// █  SECTION 2: PARTICLE & VFX SYSTEMS                                      █

// ─────────────────────────────────────────────────────────────────────────
// 2.1 Particle Pool
// ─────────────────────────────────────────────────────────────────────────
const MAXP = 600;
const parts = new Pool(MAXP, () => ({
  x: 0, y: 0, vx: 0, vy: 0, life: 0, ml: 0, sz: 0,
  r: 255, g: 255, b: 255, grav: 0, fric: 0.97,
  glow: false, trail: false, shape: 0, rot: 0, rotV: 0,
  fadeIn: 0, pulseRate: 0, pulseAmt: 0, scaleEnd: 1
}));

function emit(x, y, o = {}) {
  const p = parts.spawn();
  if (!p) return;
  const a = o.angle != null ? o.angle : rnd(0, TAU);
  const sp = o.speed != null ? o.speed : rnd(30, 100);
  p.x = safeNum(x); p.y = safeNum(y);
  p.vx = cos(a) * sp; p.vy = sin(a) * sp;
  p.life = o.life || rnd(0.3, 0.8); p.ml = p.life;
  p.sz = o.size || rnd(1, 3); p.grav = o.grav || 0;
  p.fric = o.fric || 0.97; p.glow = !!o.glow; p.trail = !!o.trail;
  p.shape = o.shape || 0; p.rot = 0; p.rotV = o.rotV || rnd(-5, 5);
  p.fadeIn = o.fadeIn || 0; p.pulseRate = o.pulseRate || 0;
  p.pulseAmt = o.pulseAmt || 0; p.scaleEnd = o.scaleEnd || 1;
  if (o.color) {
    const c = typeof o.color === 'string' ? hex2rgb(o.color) : o.color;
    p.r = c[0]; p.g = c[1]; p.b = c[2];
  } else { p.r = 255; p.g = 255; p.b = 255; }
}

function burst(x, y, n, color, o = {}) {
  const c = typeof color === 'string' ? hex2rgb(color) : (color || [255, 255, 255]);
  for (let i = 0; i < n; i++) {
    emit(x, y, {
      color: c, angle: rnd(0, TAU),
      speed: rnd(o.minS || 30, o.maxS || 120),
      life: rnd(o.minL || 0.2, o.maxL || 0.6),
      size: rnd(o.minSz || 1, o.maxSz || 3),
      grav: o.grav || 0, glow: !!o.glow, trail: !!o.trail,
      shape: o.shape || 0, fric: o.fric || 0.97
    });
  }
}

function sparkLine(x1, y1, x2, y2, n, color, o = {}) {
  const c = typeof color === 'string' ? hex2rgb(color) : (color || [255, 255, 255]);
  for (let i = 0; i < n; i++) {
    const t = rng();
    emit(lerp(x1, x2, t), lerp(y1, y2, t), {
      color: c, angle: rnd(0, TAU),
      speed: rnd(o.minS || 10, o.maxS || 40),
      life: rnd(o.minL || 0.1, o.maxL || 0.4),
      size: rnd(o.minSz || 0.5, o.maxSz || 2),
      glow: !!o.glow
    });
  }
}

function ring(x, y, n, radius, color, o = {}) {
  const c = typeof color === 'string' ? hex2rgb(color) : (color || [255, 255, 255]);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU + rnd(-0.1, 0.1);
    emit(x + cos(a) * radius, y + sin(a) * radius, {
      color: c, angle: a,
      speed: rnd(o.minS || 20, o.maxS || 60),
      life: rnd(o.minL || 0.2, o.maxL || 0.5),
      size: rnd(o.minSz || 1, o.maxSz || 2.5),
      glow: !!o.glow
    });
  }
}

function updateParts(dt) {
  parts.forEach(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= p.fric; p.vy *= p.fric; p.vy += p.grav * dt;
    p.rot += p.rotV * dt; p.life -= dt;
    if (p.life <= 0) parts.kill(p);
  });
}

function drawParts() {
  parts.forEach(p => {
    let a = clamp(p.life / p.ml, 0, 1);
    if (p.fadeIn > 0 && (p.ml - p.life) < p.fadeIn) {
      a *= (p.ml - p.life) / p.fadeIn;
    }
    if (p.pulseRate > 0) {
      a *= 0.7 + 0.3 * sin(p.life * p.pulseRate);
    }
    const scale = lerp(p.scaleEnd, 1, a);
    const sz = p.sz * scale;
    if (p.glow) {
      const g = X.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz * 3);
      g.addColorStop(0, `rgba(${p.r},${p.g},${p.b},${a * 0.6})`);
      g.addColorStop(1, 'transparent');
      X.fillStyle = g;
      X.fillRect(p.x - sz * 3, p.y - sz * 3, sz * 6, sz * 6);
    }
    X.globalAlpha = a;
    X.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
    if (p.shape === 0) {
      // Circle
      X.beginPath(); X.arc(p.x, p.y, sz, 0, TAU); X.fill();
    } else if (p.shape === 1) {
      // Square
      X.save(); X.translate(p.x, p.y); X.rotate(p.rot);
      X.fillRect(-sz, -sz, sz * 2, sz * 2); X.restore();
    } else if (p.shape === 2) {
      // Diamond
      X.save(); X.translate(p.x, p.y); X.rotate(p.rot + PI / 4);
      X.fillRect(-sz * 0.7, -sz * 0.7, sz * 1.4, sz * 1.4); X.restore();
    } else if (p.shape === 3) {
      // Star
      X.save(); X.translate(p.x, p.y); X.rotate(p.rot);
      X.beginPath();
      for (let i = 0; i < 5; i++) {
        const a1 = (i / 5) * TAU - PI / 2;
        const a2 = ((i + 0.5) / 5) * TAU - PI / 2;
        X.lineTo(cos(a1) * sz, sin(a1) * sz);
        X.lineTo(cos(a2) * sz * 0.4, sin(a2) * sz * 0.4);
      }
      X.closePath(); X.fill(); X.restore();
    } else if (p.shape === 4) {
      // Line/streak
      const len = sz * 3;
      const ang = atan2(p.vy, p.vx);
      X.beginPath();
      X.moveTo(p.x - cos(ang) * len, p.y - sin(ang) * len);
      X.lineTo(p.x + cos(ang) * len, p.y + sin(ang) * len);
      X.strokeStyle = `rgba(${p.r},${p.g},${p.b},${a})`;
      X.lineWidth = sz * 0.5;
      X.stroke();
    }
  });
  X.globalAlpha = 1;
}

// ─────────────────────────────────────────────────────────────────────────
// 2.2 Float Text Pool
// ─────────────────────────────────────────────────────────────────────────
const MAXFT = 80;
const ftexts = new Pool(MAXFT, () => ({
  x: 0, y: 0, text: '', r: 255, g: 255, b: 255, size: 12,
  life: 0, ml: 0, vy: 0, vx: 0, scale: 1, bold: false,
  outline: false, icon: '', shake: false
}));

function ftext(x, y, t, color = '#ffffff', s = 12, dur = 1, bold = true) {
  const f = ftexts.spawn();
  if (!f) return;
  f.x = safeNum(x); f.y = safeNum(y); f.text = safeStr(t, '');
  f.size = s; f.life = dur; f.ml = dur; f.vy = -60; f.vx = rnd(-10, 10);
  f.scale = 1.5; f.bold = bold; f.outline = false; f.icon = ''; f.shake = false;
  const c = hex2rgb(color);
  f.r = c[0]; f.g = c[1]; f.b = c[2];
}

function ftextBig(x, y, t, color = '#ffee44', dur = 1.5) {
  const f = ftexts.spawn();
  if (!f) return;
  f.x = safeNum(x); f.y = safeNum(y); f.text = safeStr(t, '');
  f.size = 18; f.life = dur; f.ml = dur; f.vy = -40; f.vx = 0;
  f.scale = 2; f.bold = true; f.outline = true; f.icon = ''; f.shake = true;
  const c = hex2rgb(color);
  f.r = c[0]; f.g = c[1]; f.b = c[2];
}

function updateFT(dt) {
  ftexts.forEach(f => {
    f.y += f.vy * dt; f.x += f.vx * dt;
    f.vy *= 0.94; f.vx *= 0.94; f.life -= dt;
    f.scale = lerp(1, 1.5, clamp(f.life / f.ml, 0, 1));
    if (f.life <= 0) ftexts.kill(f);
  });
}

function drawFT() {
  ftexts.forEach(f => {
    const a = clamp(f.life / f.ml, 0, 1);
    const sx = f.shake ? rnd(-1, 1) : 0;
    const sy = f.shake ? rnd(-1, 1) : 0;
    X.save();
    X.translate(f.x + sx, f.y + sy);
    X.scale(f.scale, f.scale);
    X.globalAlpha = a;
    X.textAlign = 'center'; X.textBaseline = 'middle';
    const weight = f.bold ? 'bold ' : '';
    X.font = `${weight}${f.size}px 'Courier New',monospace`;
    if (f.outline) {
      X.strokeStyle = `rgba(0,0,0,${a * 0.8})`;
      X.lineWidth = 3;
      X.strokeText(f.text, 0, 0);
    }
    X.fillStyle = `rgba(${f.r},${f.g},${f.b},${a})`;
    X.shadowBlur = f.bold ? 4 : 0;
    X.shadowColor = `rgba(${f.r},${f.g},${f.b},${a * 0.5})`;
    X.fillText(f.text, 0, 0);
    X.shadowBlur = 0;
    X.restore();
  });
  X.globalAlpha = 1;
}

// ─────────────────────────────────────────────────────────────────────────
// 2.3 Screen Effects System
// ─────────────────────────────────────────────────────────────────────────
let shakeAmt = 0, shakeT = 0;
let flashR = 0, flashG = 0, flashB = 0, flashA = 0;
let slowMo = 1, slowT = 0, hitStopT = 0;
let screenTintR = 0, screenTintG = 0, screenTintB = 0, screenTintA = 0;
let chromAb = 0;
let vignetteAmt = 0.3;
let screenPulse = 0;

function shake(a, d) { shakeAmt = max(shakeAmt, a); shakeT = max(shakeT, d); }
function flash(color, a = 0.3) {
  const c = hex2rgb(color);
  flashR = c[0]; flashG = c[1]; flashB = c[2]; flashA = a;
}
function slow(f, d) { slowMo = f; slowT = d; }
function hitStop(d) { hitStopT = max(hitStopT, d); }
function tint(color, a) {
  const c = hex2rgb(color);
  screenTintR = c[0]; screenTintG = c[1]; screenTintB = c[2]; screenTintA = a;
}

function updateFX(dt) {
  if (shakeT > 0) { shakeT -= dt; if (shakeT <= 0) shakeAmt = 0; }
  if (flashA > 0) flashA = max(0, flashA - dt * 3);
  if (slowT > 0) { slowT -= dt; if (slowT <= 0) slowMo = 1; }
  if (hitStopT > 0) hitStopT -= dt;
  if (screenTintA > 0) screenTintA = max(0, screenTintA - dt * 0.5);
  if (chromAb > 0) chromAb = max(0, chromAb - dt * 15);
  if (screenPulse > 0) screenPulse = max(0, screenPulse - dt * 3);
}

function drawScreenFX() {
  // Flash overlay
  if (flashA > 0) {
    X.fillStyle = `rgba(${flashR},${flashG},${flashB},${flashA})`;
    X.fillRect(0, 0, W, H);
  }
  // Tint overlay
  if (screenTintA > 0) {
    X.fillStyle = `rgba(${screenTintR},${screenTintG},${screenTintB},${screenTintA})`;
    X.fillRect(0, 0, W, H);
  }
  // Vignette
  if (vignetteAmt > 0) {
    const grd = X.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.85);
    grd.addColorStop(0, 'transparent');
    grd.addColorStop(1, `rgba(0,0,0,${vignetteAmt})`);
    X.fillStyle = grd;
    X.fillRect(0, 0, W, H);
  }
  // Screen pulse
  if (screenPulse > 0) {
    X.fillStyle = `rgba(255,255,255,${screenPulse * 0.15})`;
    X.fillRect(0, 0, W, H);
  }
}

let AC = null;
let masterVol = 0.5;
let sfxVol = 1.0;
let musicVol = 0.3;
let audioEnabled = true;

function initAudio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      if (AC.state === 'suspended') AC.resume();
    } catch (e) {
      audioEnabled = false;
    }
  }
}

// Sound effects library with safe fallback
const SFX_DEFS = {

function snd(type, vol = 0.2) {
  if (!AC || !audioEnabled) return;
  try {
    const t = AC.currentTime;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol * sfxVol * masterVol, t);
    g.connect(AC.destination);
    const sounds = SFX_DEFS[type] || SFX_DEFS.click;
    for (const s of sounds) {
      const osc = AC.createOscillator();
      const oscG = AC.createGain();
      osc.type = s.w;
      osc.frequency.setValueAtTime(s.f1, t);
      osc.frequency.exponentialRampToValueAtTime(max(s.f2, 1), t + s.d);
      oscG.gain.setValueAtTime(vol * (s.v || 1) * sfxVol * masterVol, t);
      oscG.gain.exponentialRampToValueAtTime(0.001, t + s.d);
      osc.connect(oscG);
      oscG.connect(g);
      osc.start(t);
      osc.stop(t + s.d + 0.01);
    }
  } catch (e) { /* audio fail safe */ }
}

// Simple background music generator
let musicOsc = null;
let musicGain = null;
let musicPlaying = false;

function startMusic() {
  if (!AC || musicPlaying || !audioEnabled) return;
  try {
    musicGain = AC.createGain();
    musicGain.gain.setValueAtTime(0, AC.currentTime);
    musicGain.gain.linearRampToValueAtTime(musicVol * masterVol * 0.08, AC.currentTime + 2);
    musicGain.connect(AC.destination);

    // Ambient pad
    const notes = [65.41, 82.41, 98.00, 110.00]; // C2, E2, G2, A2
    for (const freq of notes) {
      const osc = AC.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, AC.currentTime);
      const oscGain = AC.createGain();
      oscGain.gain.setValueAtTime(0.3, AC.currentTime);
      osc.connect(oscGain);
      oscGain.connect(musicGain);
      osc.start();
    }
    musicPlaying = true;
  } catch (e) { /* music fail safe */ }
}

const inp = {
  x: W / 2, y: H / 2, down: false,
  tap: false, tapX: 0, tapY: 0,
  joyActive: false, joyX: 0, joyY: 0,
  joySX: 0, joySY: 0, joyCX: 0, joyCY: 0,
  keys: {}, dashTap: 0, lastTapT: 0,
  swipeDir: null, swipeVX: 0, swipeVY: 0,
  // Multi-touch support
  touches: {}
};
let touchId = null;

function cpos(cx, cy) {
  const r = C.getBoundingClientRect();
  if (r.width === 0 || r.height === 0) return { x: W / 2, y: H / 2 };
  return { x: (cx - r.left) / r.width * W, y: (cy - r.top) / r.height * H };
}

C.addEventListener('touchstart', e => {
  e.preventDefault(); initAudio();
  const t = e.changedTouches[0];
  const p = cpos(t.clientX, t.clientY);
  inp.x = p.x; inp.y = p.y; inp.down = true; inp.tap = true;
  inp.tapX = p.x; inp.tapY = p.y; touchId = t.identifier;
  if (state === 'playing') {
    inp.joyActive = true; inp.joySX = p.x; inp.joySY = p.y;
    inp.joyCX = p.x; inp.joyCY = p.y;
    const now = performance.now();
    if (now - inp.lastTapT < 300) inp.dashTap = 1;
    inp.lastTapT = now;
  }
}, { passive: false });

C.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      const p = cpos(t.clientX, t.clientY);
      inp.x = p.x; inp.y = p.y;
      if (inp.joyActive) { inp.joyCX = p.x; inp.joyCY = p.y; }
    }
  }
}, { passive: false });

C.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      inp.down = false; inp.joyActive = false; touchId = null;
    }
  }
}, { passive: false });

// Mouse support
C.addEventListener('mousedown', e => {
  initAudio();
  const p = cpos(e.clientX, e.clientY);
  inp.x = p.x; inp.y = p.y; inp.down = true; inp.tap = true;
  inp.tapX = p.x; inp.tapY = p.y;
  if (state === 'playing') {
    inp.joyActive = true; inp.joySX = p.x; inp.joySY = p.y;
    inp.joyCX = p.x; inp.joyCY = p.y;
    const now = performance.now();
    if (now - inp.lastTapT < 300) inp.dashTap = 1;
    inp.lastTapT = now;
  }
});
C.addEventListener('mousemove', e => {
  const p = cpos(e.clientX, e.clientY);
  inp.x = p.x; inp.y = p.y;
  if (inp.joyActive) { inp.joyCX = p.x; inp.joyCY = p.y; }
});
C.addEventListener('mouseup', () => { inp.down = false; inp.joyActive = false; });

// Keyboard support
document.addEventListener('keydown', e => {
  inp.keys[e.key] = true;
  if (e.key === 'Escape' && state === 'playing') { state = 'paused'; snd('click'); }
  if (e.key === 'Escape' && state === 'paused') { state = 'playing'; snd('click'); }
});
document.addEventListener('keyup', e => { inp.keys[e.key] = false; });

// Utility: check if tap is within a rectangle
function tapIn(x, y, w, h) {
  return inp.tap && inp.tapX >= x && inp.tapX <= x + w && inp.tapY >= y && inp.tapY <= y + h;
}

// ─────────────────────────────────────────────────────────────────────────
// 5.1 Polygon Drawing
// ─────────────────────────────────────────────────────────────────────────
function drawPoly(pts, x, y, color, scale = 1, rot = 0) {
  if (!pts || pts.length < 2) return;
  X.save(); X.translate(x, y); X.rotate(rot); X.scale(scale, scale);
  X.fillStyle = color; X.beginPath();
  X.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) X.lineTo(pts[i][0], pts[i][1]);
  X.closePath(); X.fill(); X.restore();
}

function drawPolyStroke(pts, x, y, color, scale = 1, rot = 0, lw = 1) {
  if (!pts || pts.length < 2) return;
  X.save(); X.translate(x, y); X.rotate(rot); X.scale(scale, scale);
  X.strokeStyle = color; X.lineWidth = lw / scale; X.beginPath();
  X.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) X.lineTo(pts[i][0], pts[i][1]);
  X.closePath(); X.stroke(); X.restore();
}

// ─────────────────────────────────────────────────────────────────────────
// 5.2 Glow Effect
// ─────────────────────────────────────────────────────────────────────────
function drawGlow(x, y, r, color, alpha = 0.5) {
  const g = X.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, color); g.addColorStop(1, 'transparent');
  X.globalAlpha = alpha; X.fillStyle = g;
  X.fillRect(x - r, y - r, r * 2, r * 2); X.globalAlpha = 1;
}

// ─────────────────────────────────────────────────────────────────────────
// 5.3 Rounded Rectangle Helpers
// ─────────────────────────────────────────────────────────────────────────
function rrPath(x, y, w, h, r) {
  r = min(r, w / 2, h / 2);
  X.moveTo(x + r, y); X.lineTo(x + w - r, y);
  X.quadraticCurveTo(x + w, y, x + w, y + r);
  X.lineTo(x + w, y + h - r);
  X.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  X.lineTo(x + r, y + h);
  X.quadraticCurveTo(x, y + h, x, y + h - r);
  X.lineTo(x, y + r);
  X.quadraticCurveTo(x, y, x + r, y); X.closePath();
}

function rrFill(x, y, w, h, r) {
  if (w <= 0 || h <= 0) return;
  X.beginPath(); rrPath(x, y, w, h, r); X.fill();
}

function rrStroke(x, y, w, h, r) {
  if (w <= 0 || h <= 0) return;
  X.beginPath(); rrPath(x, y, w, h, r); X.stroke();
}

// ─────────────────────────────────────────────────────────────────────────
// 5.4 Progress/Health Bars
// ─────────────────────────────────────────────────────────────────────────
function drawBar(x, y, w, h, pct, fg, bg = '#111', border = null) {
  X.fillStyle = bg; rrFill(x, y, w, h, h / 2);
  if (pct > 0) {
    X.fillStyle = fg;
    rrFill(x, y, w * clamp(pct, 0, 1), h, h / 2);
  }
  if (border) {
    X.strokeStyle = border; X.lineWidth = 0.5;
    rrStroke(x, y, w, h, h / 2);
  }
}

function drawBarGradient(x, y, w, h, pct, colors, bg = '#111') {
  X.fillStyle = bg; rrFill(x, y, w, h, h / 2);
  if (pct > 0) {
    const bw = w * clamp(pct, 0, 1);
    const g = X.createLinearGradient(x, y, x + bw, y);
    for (let i = 0; i < colors.length; i++) {
      g.addColorStop(i / (colors.length - 1), colors[i]);
    }
    X.fillStyle = g;
    rrFill(x, y, bw, h, h / 2);
  }
}

// ─────────────────────────────────────────────────────────────────────────
// 5.5 Button Drawing with Glass Morphism
// ─────────────────────────────────────────────────────────────────────────
function drawBtn(x, y, w, h, label, color, active = true, fontSize = 0) {
  // Glass background
  X.fillStyle = active ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.4)';
  rrFill(x, y, w, h, 8);
  // Border glow
  X.strokeStyle = active ? color : '#333';
  X.lineWidth = active ? 1.5 : 0.8;
  rrStroke(x, y, w, h, 8);
  // Top highlight
  if (active) {
    const ig = X.createLinearGradient(x, y, x, y + h * 0.4);
    ig.addColorStop(0, 'rgba(255,255,255,0.12)');
    ig.addColorStop(1, 'transparent');
    X.fillStyle = ig; rrFill(x + 1, y + 1, w - 2, h * 0.4, 7);
  }
  // Glow behind
  if (active) drawGlow(x + w / 2, y + h / 2, w * 0.4, color, 0.08);
  // Text
  const fs = fontSize || (h > 38 ? 16 : h > 30 ? 14 : 12);
  X.fillStyle = active ? '#fff' : '#555';
  X.font = `bold ${fs}px 'Courier New',monospace`;
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.shadowBlur = active ? 3 : 0; X.shadowColor = color;
  X.fillText(label, x + w / 2, y + h / 2 + 1);
  X.shadowBlur = 0;
}

// Animated button with hover effect
function drawBtnAnimated(x, y, w, h, label, color, t, fontSize = 0) {
  const pulse = sin(t * 3) * 0.02;
  const s = 1 + pulse;
  const nx = x - w * pulse / 2;
  const ny = y - h * pulse / 2;
  drawBtn(nx, ny, w * s, h * s, label, color, true, fontSize);
}

// Icon button
function drawIconBtn(x, y, size, icon, color, active = true) {
  X.fillStyle = active ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.4)';
  X.beginPath(); X.arc(x, y, size, 0, TAU); X.fill();
  X.strokeStyle = active ? color : '#333'; X.lineWidth = 1;
  X.beginPath(); X.arc(x, y, size, 0, TAU); X.stroke();
  X.fillStyle = active ? '#fff' : '#555';
  X.font = `bold ${size}px 'Courier New',monospace`;
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillText(icon, x, y + 1);
}

// ─────────────────────────────────────────────────────────────────────────
// 5.6 Text Helpers
// ─────────────────────────────────────────────────────────────────────────
function drawText(text, x, y, color = '#fff', size = 14, align = 'center', bold = true) {
  X.fillStyle = color;
  X.font = `${bold ? 'bold ' : ''}${size}px 'Courier New',monospace`;
  X.textAlign = align; X.textBaseline = 'middle';
  X.fillText(text, x, y);
}

function drawTextGlow(text, x, y, color = '#fff', size = 14, glowColor = null, blur = 8) {
  X.shadowBlur = blur; X.shadowColor = glowColor || color;
  X.fillStyle = color;
  X.font = `bold ${size}px 'Courier New',monospace`;
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillText(text, x, y);
  X.shadowBlur = 0;
}

function drawTextOutline(text, x, y, color = '#fff', size = 14, outColor = '#000', outW = 3) {
  X.font = `bold ${size}px 'Courier New',monospace`;
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.strokeStyle = outColor; X.lineWidth = outW;
  X.strokeText(text, x, y);
  X.fillStyle = color;
  X.fillText(text, x, y);
}

// Word wrap helper
function wrapText(text, maxWidth, size = 14) {
  X.font = `${size}px 'Courier New',monospace`;
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (X.measureText(test).width > maxWidth && cur) {
      lines.push(cur); cur = w;
    } else { cur = test; }
  }
  if (cur) lines.push(cur);
  return lines;
}

// ─────────────────────────────────────────────────────────────────────────
// 6.1 Scrolling Parallax Stars
// ─────────────────────────────────────────────────────────────────────────
const STAR_LAYERS = [
  { stars: [], speed: 0.3, count: 60, minSize: 0.3, maxSize: 0.8, minBright: 0.15, maxBright: 0.35 },
  { stars: [], speed: 0.6, count: 40, minSize: 0.5, maxSize: 1.5, minBright: 0.25, maxBright: 0.55 },
  { stars: [], speed: 1.0, count: 25, minSize: 1.0, maxSize: 2.8, minBright: 0.4, maxBright: 0.85 }
];

for (const layer of STAR_LAYERS) {
  for (let i = 0; i < layer.count; i++) {
    layer.stars.push({
      x: rnd(0, W), y: rnd(0, H),
      s: rnd(layer.minSize, layer.maxSize),
      b: rnd(layer.minBright, layer.maxBright),
      twinkle: rnd(0, TAU), twinkleSpd: rnd(1, 4),
      color: pick(['#ffffff', '#ddeeff', '#ffeedd', '#eeffee', '#ffddff'])
    });
  }
}

function updateStars(dt, speedMul = 1) {
  for (const layer of STAR_LAYERS) {
    const spd = layer.speed * 80 * speedMul;
    for (const s of layer.stars) {
      s.y += spd * dt;
      s.twinkle += s.twinkleSpd * dt;
      if (s.y > H + 5) { s.y = -5; s.x = rnd(0, W); }
    }
  }
}

function drawStars() {
  for (const layer of STAR_LAYERS) {
    for (const s of layer.stars) {
      const a = s.b * (0.5 + 0.5 * sin(s.twinkle));
      X.globalAlpha = a;
      X.fillStyle = s.color;
      if (s.s > 2) {
        X.fillRect(s.x - s.s * 0.5, s.y, s.s, 0.8);
        X.fillRect(s.x, s.y - s.s * 0.5, 0.8, s.s);
      } else {
        X.fillRect(s.x, s.y, s.s, s.s);
      }
    }
  }
  X.globalAlpha = 1;
}

// ─────────────────────────────────────────────────────────────────────────
// 6.2 Nebula Background Cache (pre-rendered per biome)
// ─────────────────────────────────────────────────────────────────────────
const nebulaCache = {};

function renderNebula(biomeIdx) {
  if (nebulaCache[biomeIdx]) return nebulaCache[biomeIdx];
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const cx = c.getContext('2d');
  const b = BIOMES[biomeIdx] || BIOMES[0];

  // Base gradient
  const g = cx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, b.bg[0]); g.addColorStop(0.4, b.bg[1]);
  g.addColorStop(0.7, b.bg[2]); g.addColorStop(1, b.bg[3]);
  cx.fillStyle = g; cx.fillRect(0, 0, W, H);

  // Nebula clouds — multiple layers
  for (let layer = 0; layer < 3; layer++) {
    for (let i = 0; i < 6; i++) {
      const nx = rnd(0, W), ny = rnd(0, H);
      const nr = rnd(50 + layer * 30, 140 + layer * 40);
      const ng = cx.createRadialGradient(nx, ny, 0, nx, ny, nr);
      ng.addColorStop(0, b.nebula[layer * 2] || b.nebula[0]);
      ng.addColorStop(0.6, b.nebula[layer * 2 + 1] || b.nebula[1]);
      ng.addColorStop(1, 'transparent');
      cx.fillStyle = ng;
      cx.fillRect(nx - nr, ny - nr, nr * 2, nr * 2);
    }
  }

  // Cosmic dust lane
  cx.save();
  cx.globalAlpha = 0.03;
  cx.fillStyle = '#ffffff';
  cx.translate(W / 2, H / 2);
  cx.rotate(rnd(-0.3, 0.3));
  cx.fillRect(-W * 0.8, -8, W * 1.6, 16);
  cx.restore();

  // Background stars
  for (let i = 0; i < 300; i++) {
    cx.fillStyle = `rgba(255,255,255,${rnd(0.05, 0.4)})`;
    const sz = rnd(0.2, 1.0);
    cx.fillRect(rnd(0, W), rnd(0, H), sz, sz);
  }

  // Star clusters
  for (let i = 0; i < 4; i++) {
    const sx = rnd(30, W - 30), sy = rnd(30, H - 30);
    for (let j = 0; j < 40; j++) {
      const dx = sx + rnd(-50, 50), dy = sy + rnd(-50, 50);
      const dd = dist(dx, dy, sx, sy);
      cx.fillStyle = `rgba(255,255,255,${rnd(0.1, 0.35) * (1 - dd / 50)})`;
      cx.fillRect(dx, dy, rnd(0.3, 1.2), rnd(0.3, 1.2));
    }
  }

  nebulaCache[biomeIdx] = c;
  return c;
}

const LOOT_NAMES_PREFIX = ['Void','Star','Nebula','Cosmic','Solar','Astral','Dark','Light','Crystal','Ancient','Phantom','Storm','Frost','Flame','Thunder','Shadow','Radiant','Chaos','Mystic','Quantum'];
const LOOT_NAMES_SUFFIX = ['Core','Shard','Fragment','Relic','Module','Matrix','Drive','Cell','Prism','Gem','Orb','Ring','Amulet','Crown','Ward','Lens','Blade','Arc','Node','Nexus'];
const LOOT_STATS = ['hp','dmg','spd','luck','fireRate','crit','armor','regen','xpBonus','goldBonus'];

function genLoot(wave, luck = 0) {
  // Determine tier with luck bonus
  let roll = rng() * 100 - luck * 10;
  let tier = 0;
  let cumWeight = 0;
  for (let i = LOOT_TIERS.length - 1; i >= 0; i--) {
    cumWeight += LOOT_TIERS[i].weight;
    if (roll < LOOT_TIERS[i].weight * (1 + wave * 0.05)) { tier = i; break; }
  }
  tier = clamp(tier, 0, LOOT_TIERS.length - 1);
  const t = LOOT_TIERS[tier];

  const name = pick(LOOT_NAMES_PREFIX) + ' ' + pick(LOOT_NAMES_SUFFIX);
  const stats = {};
  const usedStats = new Set();
  for (let i = 0; i < t.statCount; i++) {
    let stat;
    do { stat = pick(LOOT_STATS); } while (usedStats.has(stat));
    usedStats.add(stat);
    stats[stat] = rndi(t.statRange[0], t.statRange[1]);
  }

  return { name, tier: t.name, color: t.color, stats, wave };
}

function loadS() {
  try {
    const d = JSON.parse(localStorage.getItem(SK));
    if (d && d.v) {
      // Merge with defaults to handle new fields
      const def = defaultSave();
      for (const k in def) {
        if (d[k] === undefined) d[k] = def[k];
      }
      if (!d.settings) d.settings = def.settings;
      if (!d.stats) d.stats = def.stats;
      return d;
    }
  } catch (e) { console.warn('Save load error:', e); }
  return defaultSave();
}

function saveS(d) {
  try { localStorage.setItem(SK, JSON.stringify(d)); }
  catch (e) { console.warn('Save error:', e); }
}

const spriteCache = {};

function getSprite(key, w, h, drawFn) {
  if (spriteCache[key]) return spriteCache[key];
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  try { drawFn(cx, w, h); } catch (e) { /* sprite gen error safe */ }
  spriteCache[key] = c;
  return c;
}

function drawShipSprite(x, y, ship, scale = 1, flash = false) {
  if (!ship) return;
  const c = flash ? '#ffffff' : ship.color;

  // Engine glow
  if (ship.engines) {
    for (const e of ship.engines) {
      const flicker = 3 + rng() * 5;
      drawGlow(x + e[0] * scale, y + e[1] * scale, flicker * scale, ship.color, 0.7);
      // Engine core
      X.fillStyle = '#fff'; X.globalAlpha = 0.9;
      X.beginPath(); X.arc(x + e[0] * scale, y + e[1] * scale, 1.2 * scale, 0, TAU); X.fill();
      X.globalAlpha = 1;
      // Engine flame trail
      for (let i = 1; i <= 3; i++) {
        X.globalAlpha = 0.4 - i * 0.1;
        X.fillStyle = ship.color;
        X.beginPath();
        X.arc(x + e[0] * scale, y + (e[1] + i * 3) * scale, (2 - i * 0.4) * scale, 0, TAU);
        X.fill();
      }
      X.globalAlpha = 1;
    }
  }

  // Body shadow
  if (ship.body) {
    drawPoly(ship.body, x + 1, y + 1, 'rgba(0,0,0,0.3)', scale);
    // Body
    drawPoly(ship.body, x, y, c, scale);
    // Cockpit highlight
    if (ship.cockpit) {
      X.globalAlpha = 0.6;
      drawPoly(ship.cockpit, x, y, '#ffffff', scale);
      X.globalAlpha = 1;
    }
    // Edge highlight
    drawPolyStroke(ship.body, x, y, 'rgba(255,255,255,0.35)', scale, 0, 0.6);
  }
}

// 9.2 Enemy Sprite Helpers
// ─────────────────────────────────────────────────────────────────────────
function drawEnemyBasic(x, y, sz, color, hp, maxHp, t = 0) {
  // Pulsing glow
  const pulseA = 0.15 + sin(t * 4) * 0.05;
  drawGlow(x, y, sz * 2, color, pulseA);

  // Body
  X.fillStyle = color;
  X.beginPath(); X.arc(x, y, sz, 0, TAU); X.fill();

  // Inner highlight
  X.globalAlpha = 0.3;
  X.fillStyle = '#fff';
  X.beginPath(); X.arc(x - sz * 0.2, y - sz * 0.2, sz * 0.5, 0, TAU); X.fill();
  X.globalAlpha = 1;

  // Eye/core
  X.fillStyle = '#000';
  X.beginPath(); X.arc(x, y, sz * 0.3, 0, TAU); X.fill();
  X.fillStyle = '#fff';
  X.beginPath(); X.arc(x, y - sz * 0.05, sz * 0.15, 0, TAU); X.fill();

  // HP bar
  if (hp < maxHp) {
    const bw = sz * 2.5;
    drawBar(x - bw / 2, y - sz - 8, bw, 3, hp / maxHp, '#ff3333', '#333');
  }
}

function drawEnemyElite(x, y, sz, color, hp, maxHp, t = 0) {
  // Rotating shield ring
  X.save(); X.translate(x, y); X.rotate(t * 2);
  X.strokeStyle = color; X.lineWidth = 1.5; X.globalAlpha = 0.4;
  X.beginPath(); X.arc(0, 0, sz * 1.5, 0, PI); X.stroke();
  X.beginPath(); X.arc(0, 0, sz * 1.5, PI, TAU); X.stroke();
  X.restore();
  X.globalAlpha = 1;

  drawGlow(x, y, sz * 2.5, color, 0.2);

  // Hexagonal body
  X.fillStyle = color; X.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * TAU - PI / 2;
    const px = x + cos(a) * sz, py = y + sin(a) * sz;
    if (i === 0) X.moveTo(px, py); else X.lineTo(px, py);
  }
  X.closePath(); X.fill();

  // Core glow
  X.fillStyle = '#fff'; X.globalAlpha = 0.5;
  X.beginPath(); X.arc(x, y, sz * 0.4, 0, TAU); X.fill();
  X.globalAlpha = 1;

  // HP bar
  if (hp < maxHp) {
    const bw = sz * 3;
    drawBar(x - bw / 2, y - sz - 10, bw, 4, hp / maxHp, '#ff3333', '#333');
  }
}

function drawBoss(x, y, sz, color, hp, maxHp, phase, t = 0) {
  // Boss aura
  const auraR = sz * 3 + sin(t * 2) * 10;
  drawGlow(x, y, auraR, color, 0.12);

  // Rotating shield segments
  X.save(); X.translate(x, y);
  for (let i = 0; i < 4; i++) {
    X.rotate(t * 1.5 + (i / 4) * TAU);
    X.strokeStyle = color; X.lineWidth = 2; X.globalAlpha = 0.3;
    X.beginPath(); X.arc(0, 0, sz * 1.8, -0.3, 0.3); X.stroke();
  }
  X.restore(); X.globalAlpha = 1;

  // Main body - multi-layered
  X.fillStyle = 'rgba(0,0,0,0.5)';
  X.beginPath(); X.arc(x, y, sz + 2, 0, TAU); X.fill();

  const grad = X.createRadialGradient(x, y, 0, x, y, sz);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.3, color);
  grad.addColorStop(1, 'rgba(0,0,0,0.5)');
  X.fillStyle = grad;
  X.beginPath(); X.arc(x, y, sz, 0, TAU); X.fill();

  // Inner eye
  const eyeC = phase > 1 ? '#ff0000' : '#ffffff';
  X.fillStyle = eyeC;
  X.beginPath(); X.arc(x, y, sz * 0.25, 0, TAU); X.fill();

  // Boss name and HP
  const bw = sz * 4;
  drawBar(x - bw / 2, y - sz - 16, bw, 6, hp / maxHp,
    hp / maxHp > 0.5 ? '#ff4444' : hp / maxHp > 0.25 ? '#ff8800' : '#ff0000', '#222', color);
}

// ─────────────────────────────────────────────────────────────────────────
function newPlayer(shipIdx) {
  const s = SHIPS[shipIdx] || SHIPS[0];
  const upg = save.upg || {};

  // Calculate stats with upgrades and equipment
  let bonusHP = (upg.hp || 0) * 10;
  let bonusDmg = (upg.dmg || 0) * 0.05;
  let bonusSpd = (upg.spd || 0) * 0.03;
  let bonusLuck = (upg.lck || 0) * 0.05;
  let bonusArmor = (upg.arm || 0) * 2;
  let bonusCrit = (upg.crt || 0) * 0.02;
  let bonusRegen = (upg.reg || 0) * 0.5;

  // Apply equipment bonuses
  if (save.equip && save.loot) {
    for (const idx of save.equip) {
      if (idx >= 0 && save.loot[idx]) {
        const l = save.loot[idx];
        for (const [stat, val] of Object.entries(l.stats)) {
          if (stat === 'hp') bonusHP += val;
          if (stat === 'dmg') bonusDmg += val * 0.01;
          if (stat === 'spd') bonusSpd += val * 0.01;
          if (stat === 'luck') bonusLuck += val * 0.01;
          if (stat === 'armor') bonusArmor += val;
          if (stat === 'crit') bonusCrit += val * 0.01;
          if (stat === 'regen') bonusRegen += val * 0.1;
        }
      }
    }
  }

  const baseHP = s.hp + bonusHP;
  return {
    x: W / 2, y: H * 0.75,
    shipIdx, ship: s,
    hp: baseHP, maxHp: baseHP,
    dmg: s.dmg * (1 + bonusDmg),
    spd: s.spd * (1 + bonusSpd) * 180,
    luck: s.luck + bonusLuck,
    armor: bonusArmor,
    crit: 0.05 + bonusCrit,
    regen: bonusRegen,
    fireRate: s.fireRate,
    lv: 1, xp: 0, xpNeed: 20,
    combo: 0, comboT: 0, comboMax: 0,
    fever: 0, feverActive: false, feverT: 0,
    ult: 0, ultReady: false,
    shield: 0, shieldMax: 0,
    invT: 0, flashT: 0, dashT: 0, dashCd: 0,
    abils: (save.abils || [0, 1, 2]).map(id => ({
      id, ...ABILITIES[id], cdT: 0, lv: (save.sLv || [])[id] || 1
    })),
    buffs: [],
    kills: 0, moveAngle: 0, targetX: W / 2, targetY: H * 0.75
  };
}

function newRun() {
  const shipIdx = save.ships ? save.ships[save.ships.length - 1] || 0 : 0;
  player = newPlayer(shipIdx);
  run = {
    wave: 0, waveT: 0, waveDelay: 3, waveActive: false,
    spawned: 0, toSpawn: 0, spawnT: 0,
    score: 0, gold: 0, kills: 0, time: 0,
    multiplier: 1, maxHit: 0,
    biome: 0, bossWave: false, bossAlive: false,
    paused: false, ended: false,
    waveAnnounceT: 0, waveAnnounceTxt: ''
  };

  // Clear all pools
  enemies.clear(); bullets.clear(); eBullets.clear();

  // Start tutorial if first time
  if (!save.settings.tutorialDone) {
    tutorialStep = 1;
    tutorialTimer = 0;
  } else {
    startWave();
  }
}

// ─────────────────────────────────────────────────────────────────────────
// 12.1 Player Auto-fire
// ─────────────────────────────────────────────────────────────────────────
let autoFireT = 0;
const AUTO_FIRE_BASE = 0.18;

function updateAutoFire(dt) {
  if (!player || !run) return;
  autoFireT -= dt;
  if (autoFireT <= 0) {
    autoFireT = AUTO_FIRE_BASE / player.fireRate;

    // Find nearest enemy
    const target = enemies.closest(player.x, player.y, 400);
    let ang = -PI / 2; // Default: shoot up
    if (target) {
      ang = angle(player.x, player.y, target.x, target.y);
    }

    // Base damage
    const baseDmg = 8 * player.dmg;
    const isCrit = rng() < player.crit;
    const dmg = isCrit ? baseDmg * 2.5 : baseDmg;

    // Check for buffs
    let dmgMult = 1;
    for (const buff of player.buffs) {
      if (buff.type === 'overcharge') dmgMult += 0.6;
      if (buff.type === 'eclipse') dmgMult += 0.4;
    }

    const finalDmg = dmg * dmgMult * run.multiplier;

    // Shoot main bullet
    shootBullet(player.x, player.y - 5, ang, finalDmg, {
      color: player.ship.color, crit: isCrit,
      speed: 500, sz: isCrit ? 4 : 3
    });

    // Sound
    snd(isCrit ? 'crit' : 'shoot', 0.1);

    // Muzzle flash
    emit(player.x, player.y - 8, {
      color: player.ship.color, angle: ang, speed: rnd(50, 100),
      life: 0.1, size: rnd(1, 2), glow: true
    });
  }
}

// ─────────────────────────────────────────────────────────────────────────
// 12.2 Ability System
// ─────────────────────────────────────────────────────────────────────────
function updateAbilities(dt) {
  if (!player || !run) return;

  for (const ab of player.abils) {
    if (!ab) continue;
    ab.cdT -= dt;
    if (ab.cdT <= 0) {
      ab.cdT = ab.cd;
      fireAbility(ab);
    }
  }

  // Update ability projectiles
  projPool.forEach(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;

    if (p.homing && p.homingTarget && p.homingTarget._active) {
      const ta = angle(p.x, p.y, p.homingTarget.x, p.homingTarget.y);
      const ca = atan2(p.vy, p.vx);
      const da = ta - ca;
      const turn = ((da + PI * 3) % TAU) - PI;
      const na = ca + clamp(turn, -5 * dt, 5 * dt);
      p.vx = cos(na) * p.speed;
      p.vy = sin(na) * p.speed;
    }

    // Hit enemies
    enemies.forEach(e => {
      if (e.spawnT > 0) return;
      if (dist(p.x, p.y, e.x, e.y) < e.sz + p.sz) {
        damageEnemy(e, p.dmg, p.color);
        if (p.aoeRadius > 0) {
          spawnAOE(p.x, p.y, p.aoeRadius, p.dmg * 0.5, p.color, p.elem);
        }
        if (p.slow > 0) { e.slowT = 2; e.slowAmt = p.slow; }
        if (p.pierce <= 0) projPool.kill(p);
        else p.pierce--;
      }
    });

    // Trail
    if (p.life > 0) {
      emit(p.x, p.y, { color: p.color, speed: rnd(5, 20), life: 0.2,
        size: rnd(1, 2), glow: true });
    }

    if (p.life <= 0 || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) {
      projPool.kill(p);
    }
  });

  // Update AOE effects
  aoePool.forEach(a => {
    a.life -= dt;
    const pct = 1 - clamp(a.life / a.ml, 0, 1);
    a.radius = a.maxRadius * easeOutQuad(min(pct * 3, 1));

    // Damage enemies in range
    enemies.forEach(e => {
      if (e.spawnT > 0) return;
      if (!a.hitEnemies.has(e._idx) && dist(a.x, a.y, e.x, e.y) < a.radius + e.sz) {
        damageEnemy(e, a.dmg, a.color);
        a.hitEnemies.add(e._idx);
        if (a.slow > 0) { e.slowT = 2; e.slowAmt = a.slow; }
      }
    });

    if (a.life <= 0) aoePool.kill(a);
  });
}

function fireAbility(ab) {
  if (!player || !ab) return;
  const target = enemies.closest(player.x, player.y, ab.range || 300);
  const ang = target ? angle(player.x, player.y, target.x, target.y) : -PI / 2;

  const dmgMult = player.dmg * (1 + (ab.lv - 1) * 0.15);

  switch (ab.type) {
    case 'proj': {
      const p = projPool.spawn();
      if (!p) break;
      const spd = 350;
      p.x = player.x; p.y = player.y - 5;
      p.vx = cos(ang) * spd; p.vy = sin(ang) * spd;
      p.dmg = ab.dmg * dmgMult; p.sz = 6; p.life = 1.5;
      p.color = ab.color; p.type = ab.type; p.abilId = ab.id;
      p.pierce = 0; p.aoeRadius = ab.id === 0 ? 40 : 0;
      p.homing = false; p.speed = spd; p.elem = ab.elem;
      snd('shoot2', 0.15);
      break;
    }
    case 'aura': {
      enemies.forEach(e => {
        if (e.spawnT > 0) return;
        if (dist(player.x, player.y, e.x, e.y) < ab.range) {
          damageEnemy(e, ab.dmg * dmgMult * 0.3, ab.color);
        }
      });
      ring(player.x, player.y, 8, ab.range * 0.7, ab.color, { minS: 10, maxS: 30, minL: 0.1, maxL: 0.3 });
      break;
    }
    case 'aoe': {
      const tx = target ? target.x : player.x;
      const ty = target ? target.y : player.y - 100;
      spawnAOE(tx, ty, ab.range * 0.5, ab.dmg * dmgMult, ab.color, ab.elem);
      burst(tx, ty, 20, ab.color, { minS: 30, maxS: 100, glow: true });
      snd('explode', 0.2);
      shake(4, 0.2);
      break;
    }
    case 'chain': {
      if (!target) break;
      let current = target;
      const hits = [current];
      damageEnemy(current, ab.dmg * dmgMult, ab.color);
      for (let i = 0; i < 3; i++) {
        let next = null, bestD = 120;
        enemies.forEach(e => {
          if (e.spawnT > 0 || hits.includes(e)) return;
          const d = dist(current.x, current.y, e.x, e.y);
          if (d < bestD) { bestD = d; next = e; }
        });
        if (next) {
          sparkLine(current.x, current.y, next.x, next.y, 6, ab.color, { glow: true });
          damageEnemy(next, ab.dmg * dmgMult * 0.7, ab.color);
          hits.push(next); current = next;
        }
      }
      snd('laserHit', 0.15);
      break;
    }
    case 'shield': {
      player.shield = 30 + ab.lv * 10;
      player.shieldMax = player.shield;
      snd('shield', 0.2);
      flash('#ccffff', 0.15);
      ring(player.x, player.y, 12, 20, ab.color, { glow: true });
      break;
    }
    case 'buff': {
      player.buffs.push({ type: 'overcharge', dur: 4, t: 4 });
      snd('powerup', 0.2);
      flash('#ffdd66', 0.1);
      break;
    }
    case 'heal': {
      const healAmt = abs(ab.dmg) * (1 + (ab.lv - 1) * 0.2);
      player.hp = min(player.hp + healAmt, player.maxHp);
      ftext(player.x, player.y - 20, `+${round(healAmt)}`, '#44ff44', 14);
      snd('heal', 0.2);
      burst(player.x, player.y, 10, '#44ff44', { glow: true });
      break;
    }
    case 'spread': {
      const count = 5;
      for (let i = 0; i < count; i++) {
        const sa = ang + (i - (count - 1) / 2) * 0.25;
        const p = projPool.spawn();
        if (!p) break;
        const spd = 300;
        p.x = player.x; p.y = player.y - 5;
        p.vx = cos(sa) * spd; p.vy = sin(sa) * spd;
        p.dmg = ab.dmg * dmgMult; p.sz = 4; p.life = 0.8;
        p.color = ab.color; p.pierce = 0; p.homing = false;
        p.speed = spd; p.elem = ab.elem;
      }
      snd('shoot3', 0.15);
      break;
    }
    case 'homing': {
      const p = projPool.spawn();
      if (!p) break;
      const spd = 250;
      p.x = player.x; p.y = player.y - 5;
      p.vx = cos(ang) * spd; p.vy = sin(ang) * spd;
      p.dmg = ab.dmg * dmgMult; p.sz = 5; p.life = 2;
      p.color = ab.color; p.pierce = 0;
      p.homing = true; p.homingTarget = target;
      p.speed = spd; p.elem = ab.elem;
      snd('whoosh', 0.15);
      break;
    }
    case 'nova': {
      spawnAOE(player.x, player.y, ab.range, ab.dmg * dmgMult, ab.color, ab.elem);
      burst(player.x, player.y, 30, ab.color, { minS: 40, maxS: 120, glow: true });
      snd('bigExplode', 0.2);
      shake(5, 0.3);
      flash(ab.color, 0.2);
      break;
    }
    case 'beam': {
      if (!target) break;
      const bx = player.x, by = player.y - 5;
      const ex = target.x, ey = target.y;
      // Damage all enemies in beam path
      enemies.forEach(e => {
        if (e.spawnT > 0) return;
        // Point-to-line distance check
        const dx = ex - bx, dy = ey - by;
        const len = sqrt(dx * dx + dy * dy);
        if (len < 1) return;
        const t = clamp(((e.x - bx) * dx + (e.y - by) * dy) / (len * len), 0, 1);
        const px = bx + t * dx, py = by + t * dy;
        if (dist(e.x, e.y, px, py) < e.sz + 8) {
          damageEnemy(e, ab.dmg * dmgMult, ab.color);
        }
      });
      sparkLine(bx, by, ex, ey, 15, ab.color, { glow: true, minS: 20, maxS: 60 });
      snd('laserHit', 0.2);
      break;
    }
    case 'regen': {
      player.buffs.push({ type: 'regen', dur: 5, t: 5, value: abs(ab.dmg) });
      snd('heal', 0.15);
      break;
    }
    case 'teleport': {
      const tx = target ? target.x : player.x + rnd(-80, 80);
      const ty = target ? target.y : player.y + rnd(-80, 80);
      burst(player.x, player.y, 12, ab.color, { glow: true });
      player.x = clamp(tx, 20, W - 20);
      player.y = clamp(ty, 50, H - 50);
      spawnAOE(player.x, player.y, 60, ab.dmg * dmgMult, ab.color, ab.elem);
      burst(player.x, player.y, 15, ab.color, { glow: true });
      snd('warp', 0.2);
      player.invT = 0.5;
      break;
    }
    case 'smite': {
      if (!target) break;
      damageEnemy(target, ab.dmg * dmgMult, ab.color);
      burst(target.x, target.y, 20, ab.color, { glow: true, minS: 50, maxS: 120 });
      flash(ab.color, 0.15);
      snd('bigExplode', 0.2);
      break;
    }
    case 'trap': {
      const tx = target ? target.x : player.x;
      const ty = target ? target.y : player.y - 80;
      const a = aoePool.spawn();
      if (!a) break;
      a.x = tx; a.y = ty; a.radius = 0; a.maxRadius = ab.range;
      a.dmg = ab.dmg * dmgMult; a.life = 3; a.ml = 3;
      a.color = ab.color; a.type = 'trap'; a.elem = ab.elem;
      a.hitEnemies = new Set(); a.slow = 0.3;
      snd('shoot2', 0.12);
      break;
    }
    case 'debuff': {
      enemies.forEach(e => {
        if (e.spawnT > 0) return;
        if (dist(player.x, player.y, e.x, e.y) < ab.range) {
          e.cursed = true;
          damageEnemy(e, ab.dmg * dmgMult, ab.color);
        }
      });
      snd('whoosh', 0.15);
      break;
    }
  }
}

function spawnAOE(x, y, radius, dmg, color, elem) {
  const a = aoePool.spawn();
  if (!a) return;
  a.x = safeNum(x); a.y = safeNum(y);
  a.radius = 0; a.maxRadius = radius;
  a.dmg = dmg; a.life = 0.5; a.ml = 0.5;
  a.color = color; a.type = 'aoe'; a.elem = elem || '';
  a.hitEnemies = new Set(); a.slow = 0; a.dot = 0;
}

// ─────────────────────────────────────────────────────────────────────────
// 12.3 Damage & Death
// ─────────────────────────────────────────────────────────────────────────
function damageEnemy(e, dmg, color = '#ffffff') {
  if (!e || !e._active || e.spawnT > 0) return;

  // Cursed enemies take 50% more damage
  if (e.cursed) dmg *= 1.5;

  e.hp -= dmg;
  e.flashT = 0.08;

  // Damage number
  const col = dmg >= 30 ? '#ffaa33' : dmg >= 15 ? '#ffee44' : '#ffffff';
  ftext(e.x + rnd(-10, 10), e.y - e.sz - 5, round(dmg).toString(), color || col, dmg >= 30 ? 14 : 10);

  // Hit particles
  burst(e.x, e.y, 3, color, { minS: 20, maxS: 60, minL: 0.1, maxL: 0.2, minSz: 0.5, maxSz: 1.5 });

  // Track max hit
  if (run) run.maxHit = max(run.maxHit, dmg);

  if (e.hp <= 0) {
    killEnemy(e);
  }
}

function killEnemy(e) {
  if (!e || !e._active) return;

  // Death effects
  const n = e.boss ? 40 : e.elite ? 20 : 12;
  burst(e.x, e.y, n, e.color, {
    minS: 40, maxS: e.boss ? 200 : 120,
    minL: 0.3, maxL: e.boss ? 1 : 0.6,
    minSz: 1, maxSz: e.boss ? 5 : 3,
    glow: true
  });

  if (e.boss) {
    snd('bigExplode', 0.3);
    shake(8, 0.5);
    flash(e.color, 0.3);
    screenPulse = 1;
    // Boss loot
    for (let i = 0; i < 5; i++) spawnPickup(e.x, e.y, 'gold', e.gold / 5);
    spawnPickup(e.x, e.y, 'gem', 1);
    const loot = genLoot(run ? run.wave : 1, player ? player.luck : 0);
    save.loot.push(loot);
    ftextBig(e.x, e.y - 30, 'BOSS DEFEATED!', e.color);
    if (!save.bosses) save.bosses = [];
    if (!save.bosses.includes(e.bossName)) save.bosses.push(e.bossName);
    run.bossAlive = false;
  } else {
    snd(e.elite ? 'bigExplode' : 'explode', e.elite ? 0.2 : 0.12);
    if (e.elite) { shake(3, 0.2); flash(e.color, 0.1); }
  }

  // Drops
  spawnPickup(e.x, e.y, 'gold', e.gold);
  spawnPickup(e.x, e.y, 'xp', e.xp);
  if (rng() < 0.08 + (player ? player.luck * 0.1 : 0)) {
    spawnPickup(e.x, e.y, 'hp', 10);
  }
  if (rng() < 0.02 + (player ? player.luck * 0.05 : 0)) {
    spawnPickup(e.x, e.y, 'gem', 1);
  }

  // Splitter spawns mini enemies
  if (e.drops === 'split' && !e.boss) {
    for (let i = 0; i < 3; i++) {
      const mini = spawnEnemy(0, e.x + rnd(-20, 20), e.y + rnd(-10, 10), run ? run.wave : 1);
      if (mini) { mini.hp *= 0.3; mini.maxHp = mini.hp; mini.sz *= 0.7; }
    }
  }

  // Player combo & score
  if (player && run) {
    player.combo++;
    player.comboT = 3;
    player.comboMax = max(player.comboMax, player.combo);
    if (player.combo % 10 === 0) {
      snd('combo', 0.2);
      ftextBig(player.x, player.y - 40, `${player.combo}x COMBO!`, '#ffee44');
    }
    run.score += e.score * (1 + player.combo * 0.02);
    run.kills++;
    player.kills++;
    save.kills++;

    // Fever meter
    player.fever += 2;
    if (player.fever >= 100 && !player.feverActive) {
      player.feverActive = true;
      player.feverT = 10;
      player.fever = 100;
      save.fevers = (save.fevers || 0) + 1;
      ftextBig(W / 2, H / 2 - 50, 'FEVER MODE!', '#ff44ff');
      snd('fever', 0.3);
      flash('#ff44ff', 0.2);
    }

    // Ultimate meter
    player.ult = min(100, player.ult + 1.5);
    if (player.ult >= 100 && !player.ultReady) {
      player.ultReady = true;
      ftextBig(W / 2, H / 2 - 80, 'ULTIMATE READY!', '#ffaa33');
      snd('charge', 0.2);
    }

    // Ship passive effects
    if (player.ship.passive === 'Drain') {
      player.hp = min(player.maxHp, player.hp + 2);
    }
    if (player.ship.passive === 'TimeWarp') {
      slow(0.4, 0.3);
    }
    if (player.ship.passive === 'GoldRush') {
      spawnPickup(e.x, e.y, 'gold', ceil(e.gold * 0.5));
    }
  }

  enemies.kill(e);
}

function damagePlayer(dmg) {
  if (!player || !run) return;
  if (player.invT > 0) return;

  // Shield absorbs damage first
  if (player.shield > 0) {
    const absorbed = min(player.shield, dmg);
    player.shield -= absorbed;
    dmg -= absorbed;
    if (absorbed > 0) {
      snd('shield', 0.1);
      ring(player.x, player.y, 8, 15, '#44ddff', { glow: true });
    }
  }

  // Armor reduction
  dmg = max(1, dmg - player.armor);

  // Rage passive: less dmg when low HP
  if (player.ship.passive === 'Rage' && player.hp < player.maxHp * 0.3) {
    dmg *= 0.7;
  }

  player.hp -= dmg;
  player.invT = 0.5;
  player.flashT = 0.15;

  ftext(player.x, player.y - 20, `-${round(dmg)}`, '#ff3333', 14, 0.8);
  snd('hit', 0.2);
  shake(3, 0.15);
  flash('#ff0000', 0.15);
  chromAb = 5;

  if (player.hp <= 0) {
    playerDeath();
  }
}

function playerDeath() {
  if (!player || !run) return;

  // Death explosion
  burst(player.x, player.y, 40, player.ship.color, {
    minS: 50, maxS: 200, minL: 0.5, maxL: 1.5,
    minSz: 2, maxSz: 5, glow: true
  });
  snd('death', 0.3);
  shake(10, 0.5);
  flash('#ff0000', 0.4);

  // Save stats
  save.gold += run.gold;
  save.totalGold = (save.totalGold || 0) + run.gold;
  save.hi = max(save.hi || 0, floor(run.score));
  save.bWave = max(save.bWave || 0, run.wave);
  save.runs = (save.runs || 0) + 1;
  save.maxCombo = max(save.maxCombo || 0, player.comboMax);
  save.time = (save.time || 0) + run.time;
  if (run.time > (save.stats ? save.stats.longestRun || 0 : 0)) {
    if (!save.stats) save.stats = {};
    save.stats.longestRun = run.time;
  }
  saveS(save);

  // Check achievements
  checkAchievements();

  state = 'gameover';
}

// █                                                                         █
// █  SECTION 13: WAVE MANAGEMENT & ENEMY AI                                 █
// █                                                                         █
// ███████████████████████████████████████████████████████████████████████████

function startWave() {
  if (!run) return;
  run.wave++;
  run.waveT = 0;
  run.waveActive = true;
  run.spawned = 0;
  run.spawnT = 0;

  // Wave composition
  const w = run.wave;
  run.bossWave = (w % 5 === 0);
  run.biome = clamp(floor((w - 1) / 10), 0, BIOMES.length - 1);

  if (run.bossWave) {
    run.toSpawn = 1;
    run.waveAnnounceTxt = `⚠ BOSS WAVE ${w} ⚠`;
  } else {
    run.toSpawn = min(5 + floor(w * 1.5), 40);
    run.waveAnnounceTxt = `WAVE ${w}`;
  }

  run.waveAnnounceT = 2;
  run.multiplier = 1 + w * 0.02;

  snd('wave', 0.2);
}

function updateWaveSpawning(dt) {
  if (!run || !run.waveActive) return;

  // Wave announcement
  if (run.waveAnnounceT > 0) {
    run.waveAnnounceT -= dt;
    return; // Don't spawn during announcement
  }

  // Check if wave is complete
  if (run.spawned >= run.toSpawn && enemies.activeCount === 0) {
    run.waveActive = false;
    run.waveDelay = 2;

    // Wave clear bonus
    const bonus = run.wave * 5;
    run.gold += bonus;
    ftext(W / 2, H / 2, `WAVE CLEAR +${bonus}g`, '#ffdd00', 16, 1.5);
    snd('lvl', 0.2);

    // Small chance for loot between waves
    if (rng() < 0.1 + (player ? player.luck * 0.1 : 0)) {
      const loot = genLoot(run.wave, player ? player.luck : 0);
      save.loot.push(loot);
      ftextBig(W / 2, H / 2 + 30, `LOOT: ${loot.name}`, loot.color);
      snd('loot', 0.2);
    }
    return;
  }

  // Delay between waves
  if (!run.waveActive && run.waveDelay > 0) {
    run.waveDelay -= dt;
    if (run.waveDelay <= 0) startWave();
    return;
  }

  // Spawn enemies
  if (run.spawned < run.toSpawn) {
    run.spawnT -= dt;
    if (run.spawnT <= 0) {
      const w = run.wave;

      if (run.bossWave && run.spawned === 0) {
        const bossIdx = clamp(floor((w - 5) / 5), 0, BOSS_DEFS.length - 1);
        spawnBoss(bossIdx, w);
        run.bossAlive = true;
        snd('boss', 0.3);
        shake(5, 0.3);
        flash('#ff4444', 0.15);
        run.spawnT = 999;
      } else {
        // Pick enemy type based on wave
        const maxType = min(floor(w / 2) + 1, ENEMY_TYPES.length);
        const typeIdx = rndi(0, maxType - 1);
        const x = rnd(30, W - 30);

        // Chance for elite
        if (rng() < 0.05 + w * 0.005) {
          spawnElite(typeIdx, x, -20, w);
        } else {
          spawnEnemy(typeIdx, x, -20, w);
        }

        run.spawnT = max(0.3, 1.5 - w * 0.03);
      }
      run.spawned++;
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────
// 13.2 Enemy AI Update
// ─────────────────────────────────────────────────────────────────────────
function updateEnemies(dt) {
  if (!player || !run) return;

  enemies.forEach(e => {
    // Spawn animation
    if (e.spawnT > 0) { e.spawnT -= dt; return; }

    e.behaviorT += dt;
    e.flashT = max(0, e.flashT - dt);

    // Status effects
    if (e.slowT > 0) e.slowT -= dt;
    if (e.rootT > 0) { e.rootT -= dt; if (e.rootT <= 0) e.rooted = false; }
    if (e.poisonT > 0) {
      e.poisonT -= dt;
      e.hp -= e.poisonDmg * dt;
      if (e.hp <= 0) { killEnemy(e); return; }
    }

    const spd = e.speed * (e.slowT > 0 ? e.slowAmt : 1) * (e.rooted ? 0 : 1);
    e.angle += e.rotSpeed * dt;

    // Movement behavior
    switch (e.behavior) {
      case 'straight':
        e.vy = spd;
        e.vx *= 0.95;
        break;

      case 'zigzag':
        e.vy = spd * 0.8;
        e.vx = sin(e.behaviorT * 3) * spd * 0.6;
        break;

      case 'strafe':
        if (e.y < e.patternY) {
          e.vy = spd;
        } else {
          e.vy = 0;
          e.vx = sin(e.behaviorT * 2) * spd;
        }
        break;

      case 'swoop':
        if (e.behaviorT < 1) {
          e.vy = spd * 1.5;
          const ang = angle(e.x, e.y, player.x, player.y);
          e.vx = cos(ang) * spd * 0.5;
        } else if (e.behaviorT < 2) {
          e.vy = -spd * 0.5;
        } else {
          e.behaviorT = 0;
        }
        break;

      case 'dive':
        if (e.y < 100) {
          e.vy = spd;
        } else if (e.chargeT <= 0 && dist(e.x, e.y, player.x, player.y) < 200) {
          const ang = angle(e.x, e.y, player.x, player.y);
          e.vx = cos(ang) * spd * 3;
          e.vy = sin(ang) * spd * 3;
          e.chargeT = 2;
        } else {
          e.chargeT -= dt;
          e.vx *= 0.95; e.vy *= 0.95;
          e.vy += spd * 0.3;
        }
        break;

      case 'orbit': {
        const orbitR = 100;
        const a = e.behaviorT * 1.5;
        e.targetX = player.x + cos(a) * orbitR;
        e.targetY = player.y - 150 + sin(a) * orbitR * 0.5;
        const dx = e.targetX - e.x, dy = e.targetY - e.y;
        const d = sqrt(dx * dx + dy * dy);
        if (d > 2) { e.vx = (dx / d) * spd; e.vy = (dy / d) * spd; }
        break;
      }

      case 'guard': {
        // Guard stays at position and blocks
        if (e.y < e.patternY) {
          e.vy = spd;
        } else {
          e.vy = 0;
          e.vx = (e.patternX - e.x) * 2;
        }
        break;
      }

      case 'teleport':
        if (floor(e.behaviorT) % 3 === 0 && e.behaviorT % 3 < dt * 2) {
          burst(e.x, e.y, 8, e.color, { glow: true });
          e.x = rnd(30, W - 30);
          e.y = rnd(50, 300);
          burst(e.x, e.y, 8, e.color, { glow: true });
        }
        e.vy = sin(e.behaviorT * 2) * spd * 0.3;
        break;

      case 'charge':
        if (e.chargeT <= 0) {
          // Track player
          e.vy = spd * 0.4;
          const ang = angle(e.x, e.y, player.x, player.y);
          e.vx = cos(ang) * spd * 0.3;
          if (e.behaviorT > 2 && dist(e.x, e.y, player.x, player.y) < 300) {
            e.chargeT = 1.5;
            e.targetX = player.x; e.targetY = player.y;
            snd('warning', 0.1);
          }
        } else {
          e.chargeT -= dt;
          const ang = angle(e.x, e.y, e.targetX, e.targetY);
          e.vx = cos(ang) * spd * 4;
          e.vy = sin(ang) * spd * 4;
          emit(e.x, e.y, { color: e.color, speed: 30, life: 0.2, size: 2 });
        }
        break;

      case 'boss':
        // Boss moves to target position slowly
        if (e.y < e.targetY) {
          e.vy = spd;
        } else {
          e.vy = 0;
          // Sway side to side
          e.vx = sin(e.behaviorT * 0.8) * spd * 2;
          e.targetY = 80 + sin(e.behaviorT * 0.3) * 40;
        }

        // Boss phase transitions
        if (e.hp < e.maxHp * 0.5 && e.bossPhase === 1) {
          e.bossPhase = 2;
          e.shootCd *= 0.7;
          ftextBig(e.x, e.y - 40, 'ENRAGED!', '#ff0000');
          snd('boss', 0.2);
          burst(e.x, e.y, 20, '#ff0000', { glow: true });
        }
        if (e.hp < e.maxHp * 0.25 && e.bossPhase === 2) {
          e.bossPhase = 3;
          e.shootCd *= 0.7;
          ftextBig(e.x, e.y - 40, 'DESPERATE!', '#ff0000');
          snd('boss', 0.3);
        }
        break;

      default:
        e.vy = spd;
    }

    // Apply velocity
    e.x += e.vx * dt;
    e.y += e.vy * dt;

    // Keep in bounds (mostly)
    e.x = clamp(e.x, -20, W + 20);

    // Enemy shooting
    if (e.canShoot) {
      e.shootT -= dt;
      if (e.shootT <= 0) {
        e.shootT = e.shootCd;
        const ang = angle(e.x, e.y, player.x, player.y);

        if (e.boss) {
          // Boss attack patterns
          switch (e.bossPhase) {
            case 1:
              // Spray pattern
              for (let i = -2; i <= 2; i++) {
                shootEnemyBullet(e.x, e.y + e.sz, ang + i * 0.2, e.dmg, {
                  color: e.color, speed: 180
                });
              }
              break;
            case 2:
              // Ring pattern
              for (let i = 0; i < 8; i++) {
                const a = (i / 8) * TAU;
                shootEnemyBullet(e.x, e.y, a, e.dmg * 0.8, {
                  color: e.color, speed: 150
                });
              }
              break;
            case 3:
              // Aimed burst
              for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                  if (e._active && player) {
                    const a = angle(e.x, e.y, player.x, player.y);
                    shootEnemyBullet(e.x, e.y, a, e.dmg, {
                      color: '#ff0000', speed: 250
                    });
                  }
                }, i * 150);
              }
              break;
          }
          snd('shoot2', 0.15);
        } else {
          shootEnemyBullet(e.x, e.y + e.sz, ang, e.dmg, { color: e.color });
        }
      }
    }

    // Collision with player
    if (player.invT <= 0 && dist(e.x, e.y, player.x, player.y) < e.sz + 8) {
      damagePlayer(e.dmg);
      if (!e.boss) {
        e.hp -= 20;
        if (e.hp <= 0) killEnemy(e);
      }
    }

    // Remove if off screen
    if (e.y > H + 50) {
      enemies.kill(e);
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────
// 13.3 Bullet Updates
// ─────────────────────────────────────────────────────────────────────────
function updateBullets(dt) {
  // Player bullets
  bullets.forEach(b => {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    // Homing
    if (b.homing > 0) {
      const target = enemies.closest(b.x, b.y, 200);
      if (target) {
        const ta = angle(b.x, b.y, target.x, target.y);
        const ca = atan2(b.vy, b.vx);
        const da = ta - ca;
        const turn = ((da + PI * 3) % TAU) - PI;
        const spd = sqrt(b.vx * b.vx + b.vy * b.vy);
        const na = ca + clamp(turn, -b.homingStr * dt, b.homingStr * dt);
        b.vx = cos(na) * spd;
        b.vy = sin(na) * spd;
      }
    }

    // Trail particles
    if (b.trail) {
      emit(b.x, b.y, { color: b.color, speed: rnd(5, 15), life: 0.15,
        size: rnd(0.5, 1.5), glow: true });
    }

    // Hit enemies
    let hit = false;
    enemies.forEach(e => {
      if (hit && b.pierce <= 0) return;
      if (e.spawnT > 0) return;
      if (dist(b.x, b.y, e.x, e.y) < e.sz + b.sz) {
        damageEnemy(e, b.dmg, b.color);
        if (b.slow > 0) { e.slowT = 1.5; e.slowAmt = b.slow; }
        if (b.poison > 0) { e.poisonT = 3; e.poisonDmg = b.poison; }
        if (b.aoe > 0) {
          spawnAOE(b.x, b.y, b.aoe, b.dmg * 0.4, b.aoeColor, b.elem);
        }
        hit = true;
        if (b.pierce > 0) b.pierce--;
        else bullets.kill(b);
        hitStop(0.02);
      }
    });

    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -40 || b.y > H + 20) {
      bullets.kill(b);
    }
  });

  // Enemy bullets
  eBullets.forEach(b => {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    // Trail
    emit(b.x, b.y, { color: b.color, speed: 5, life: 0.1, size: 1 });

    // Hit player
    if (player && player.invT <= 0 && dist(b.x, b.y, player.x, player.y) < b.sz + 6) {
      damagePlayer(b.dmg);
      eBullets.kill(b);
    }

    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      eBullets.kill(b);
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────
// 13.4 Pickup Updates
// ─────────────────────────────────────────────────────────────────────────
function updatePickups(dt) {
  if (!player) return;

  pickups.forEach(p => {
    p.vy += 60 * dt; // gravity
    p.vy *= 0.98;
    p.y += p.vy * dt;
    p.bobT += dt * 4;
    p.life -= dt;

    // Magnet toward player
    const d = dist(p.x, p.y, player.x, player.y);
    const magnetRange = p.magnetDist + (player.feverActive ? 100 : 0);
    if (d < magnetRange) {
      const str = (1 - d / magnetRange) * 400;
      const ang = angle(p.x, p.y, player.x, player.y);
      p.x += cos(ang) * str * dt;
      p.y += sin(ang) * str * dt;
    }

    // Collect
    if (d < 15) {
      switch (p.type) {
        case 'gold':
          if (run) run.gold += p.value;
          ftext(p.x, p.y, `+${p.value}g`, '#ffdd00', 10, 0.6);
          snd('coin', 0.1);
          break;
        case 'gem':
          save.gems = (save.gems || 0) + p.value;
          ftext(p.x, p.y, `+${p.value} GEM`, '#ff44ff', 12, 0.8);
          snd('loot', 0.15);
          break;
        case 'hp':
          player.hp = min(player.maxHp, player.hp + p.value);
          ftext(p.x, p.y, `+${p.value} HP`, '#44ff44', 12, 0.8);
          snd('heal', 0.1);
          break;
        case 'xp':
          player.xp += p.value;
          if (player.xp >= player.xpNeed) {
            player.xp -= player.xpNeed;
            player.lv++;
            player.xpNeed = round(20 * pow(1.15, player.lv));
            snd('lvl', 0.2);
            genChoices();
            state = 'levelUp';
          }
          break;
        case 'bomb':
          // Kill all enemies on screen
          enemies.forEach(e => { damageEnemy(e, 999, '#ff8800'); });
          snd('bigExplode', 0.3);
          shake(6, 0.3);
          flash('#ff8800', 0.3);
          break;
        case 'magnet':
          // Pull all pickups
          pickups.forEach(pp => { pp.magnetDist = 999; });
          snd('powerup', 0.15);
          break;
        case 'shield':
          player.shield += 20;
          player.shieldMax = max(player.shieldMax, player.shield);
          snd('shield', 0.15);
          break;
      }
      emit(p.x, p.y, { color: p.color, speed: 50, life: 0.2, size: 1, glow: true });
      pickups.kill(p);
    }

    if (p.life <= 0 || p.y > H + 30) pickups.kill(p);
  });
}

const TUTORIAL_STEPS = [
  { text: 'Welcome to VOID RIFT!', subtext: 'A cosmic survival shooter', dur: 2.5 },
  { text: 'TOUCH & DRAG to move', subtext: 'Your ship follows your finger', dur: 3, showJoystick: true },
  { text: 'Your ship SHOOTS automatically!', subtext: 'It aims at the nearest enemy', dur: 3 },
  { text: 'COLLECT pickups', subtext: 'Gold (yellow), XP (blue), HP (green)', dur: 3 },
  { text: 'LEVEL UP to choose upgrades', subtext: 'New abilities and power boosts', dur: 3 },
  { text: 'DOUBLE-TAP to DASH', subtext: 'Dodge through enemy fire!', dur: 3 },
  { text: 'Survive as long as you can!', subtext: 'Good luck, Commander!', dur: 2.5 }
];

function updateTutorial(dt) {
  if (tutorialStep <= 0 || tutorialStep > TUTORIAL_STEPS.length) return;

  tutorialTimer += dt;
  const step = TUTORIAL_STEPS[tutorialStep - 1];

  // Spawn some easy enemies during tutorial
  if (tutorialStep === 3 && enemies.activeCount === 0) {
    spawnEnemy(0, W / 2, -20, 0);
  }

  if (tutorialTimer >= step.dur || inp.tap) {
    tutorialTimer = 0;
    tutorialStep++;
    if (tutorialStep > TUTORIAL_STEPS.length) {
      tutorialStep = 0;
      save.settings.tutorialDone = true;
      saveS(save);
      startWave();
    }
    inp.tap = false;
  }
}

function drawTutorial() {
  if (tutorialStep <= 0 || tutorialStep > TUTORIAL_STEPS.length) return;

  const step = TUTORIAL_STEPS[tutorialStep - 1];
  const a = min(1, tutorialTimer * 3) * (tutorialTimer < step.dur - 0.5 ? 1 : max(0, (step.dur - tutorialTimer) * 2));

  // Dark overlay at top
  X.fillStyle = `rgba(0,0,0,${a * 0.7})`;
  rrFill(20, 60, W - 40, 90, 12);

  // Border
  X.strokeStyle = `rgba(0,221,255,${a * 0.5})`;
  X.lineWidth = 1;
  rrStroke(20, 60, W - 40, 90, 12);

  // Tutorial step indicator
  X.fillStyle = `rgba(255,255,255,${a * 0.3})`;
  X.font = "bold 9px 'Courier New',monospace";
  X.textAlign = 'center';
  X.fillText(`${tutorialStep}/${TUTORIAL_STEPS.length}`, W / 2, 75);

  // Main text
  X.fillStyle = `rgba(255,255,255,${a})`;
  X.font = "bold 16px 'Courier New',monospace";
  X.textAlign = 'center';
  X.fillText(step.text, W / 2, 100);

  // Subtext
  X.fillStyle = `rgba(170,170,170,${a})`;
  X.font = "11px 'Courier New',monospace";
  X.fillText(step.subtext, W / 2, 120);

  // Visual hint for joystick
  if (step.showJoystick) {
    const cx = W / 2, cy = H * 0.6;
    X.strokeStyle = `rgba(0,221,255,${a * 0.3})`;
    X.lineWidth = 2;
    X.setLineDash([4, 4]);
    X.beginPath(); X.arc(cx, cy, 40, 0, TAU); X.stroke();
    X.setLineDash([]);

    // Animated finger
    const fingerX = cx + sin(gameTime * 2) * 25;
    const fingerY = cy + cos(gameTime * 2) * 15;
    X.fillStyle = `rgba(255,255,255,${a * 0.6})`;
    X.beginPath(); X.arc(fingerX, fingerY, 8, 0, TAU); X.fill();
  }

  // Tap to skip
  const blink = sin(gameTime * 4) > 0;
  if (blink) {
    X.fillStyle = `rgba(100,100,100,${a * 0.5})`;
    X.font = "8px 'Courier New',monospace";
    X.fillText('tap to skip', W / 2, 140);
  }
}

function genChoices() {
  lvlChoices = [];
  const available = [];

  // Stat upgrades
  const statUps = [
    { name:'+10% Damage', desc:'Increase all damage', type:'stat', stat:'dmg', val:0.1, color:'#ff5533' },
    { name:'+15% Fire Rate', desc:'Shoot faster', type:'stat', stat:'fireRate', val:0.15, color:'#ffee44' },
    { name:'+20 Max HP', desc:'More survivability', type:'stat', stat:'maxHp', val:20, color:'#44ff44' },
    { name:'+10% Speed', desc:'Move faster', type:'stat', stat:'spd', val:0.1, color:'#55ccff' },
    { name:'+5% Crit Chance', desc:'More critical hits', type:'stat', stat:'crit', val:0.05, color:'#ffaa33' },
    { name:'+2 Armor', desc:'Reduce incoming damage', type:'stat', stat:'armor', val:2, color:'#888888' },
    { name:'+1 HP Regen/s', desc:'Recover health over time', type:'stat', stat:'regen', val:1, color:'#88ff88' },
    { name:'+5% Luck', desc:'Better drops & crits', type:'stat', stat:'luck', val:0.05, color:'#ffdd00' }
  ];
  available.push(...statUps);

  // New ability option
  if (player && player.abils.length < 6) {
    const unusedAbils = ABILITIES.filter(a =>
      !player.abils.some(pa => pa.id === a.id)
    );
    if (unusedAbils.length > 0) {
      const newAb = pick(unusedAbils);
      available.push({
        name: newAb.name, desc: newAb.desc,
        type: 'ab', abilId: newAb.id,
        color: newAb.color, elem: newAb.elem
      });
    }
  }

  // Ability level up
  if (player) {
    for (const ab of player.abils) {
      if (ab.lv < 5) {
        available.push({
          name: `${ab.name} Lv${ab.lv + 1}`,
          desc: `+20% ${ab.name} power`,
          type: 'abUp', abilId: ab.id,
          color: ab.color, elem: ab.elem
        });
      }
    }
  }

  // Shuffle and pick 3
  for (let i = available.length - 1; i > 0; i--) {
    const j = rndi(0, i);
    [available[i], available[j]] = [available[j], available[i]];
  }
  lvlChoices = available.slice(0, 3);
}

function applyChoice(c) {
  if (!player) return;

  switch (c.type) {
    case 'stat':
      if (c.stat === 'dmg') player.dmg *= (1 + c.val);
      if (c.stat === 'fireRate') player.fireRate *= (1 + c.val);
      if (c.stat === 'maxHp') { player.maxHp += c.val; player.hp += c.val; }
      if (c.stat === 'spd') player.spd *= (1 + c.val);
      if (c.stat === 'crit') player.crit += c.val;
      if (c.stat === 'armor') player.armor += c.val;
      if (c.stat === 'regen') player.regen += c.val;
      if (c.stat === 'luck') player.luck += c.val;
      break;
    case 'ab': {
      const abDef = ABILITIES[c.abilId];
      if (abDef) {
        player.abils.push({ id: abDef.id, ...abDef, cdT: 0, lv: 1 });
      }
      break;
    }
    case 'abUp': {
      const ab = player.abils.find(a => a.id === c.abilId);
      if (ab) {
        ab.lv++;
        ab.dmg *= 1.2;
        ab.cd *= 0.9;
      }
      break;
    }
  }

  state = 'playing';
  snd('powerup', 0.2);
  flash('#ffee44', 0.15);
}

function checkAchievements() {
  for (const a of ACHIEVEMENTS) {
    if (!save.ach.includes(a.id) && a.check(save)) {
      save.ach.push(a.id);
      // Show achievement notification later
    }
  }
}
