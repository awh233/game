  // COMBO METER
  function drawComboMeter(ctx) {
    if (combo <= 0) return;
    const meterX = CANVAS_WIDTH - 18;
    const meterH = 200;
    const meterW = 8;
    const meterY = CANVAS_HEIGHT / 2 - meterH / 2;
    const fill = Math.min(1, combo / 50);

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(meterX, meterY, meterW, meterH);

    const g = ctx.createLinearGradient(meterX, meterY + meterH, meterX, meterY + meterH * (1 - fill));
    g.addColorStop(0, '#00ff00');
    g.addColorStop(0.5, '#ffff00');
    g.addColorStop(1, '#ff0000');
    ctx.fillStyle = g;
    ctx.fillRect(meterX, meterY + meterH * (1 - fill), meterW, meterH * fill);

    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(meterX, meterY, meterW, meterH);

    const mul = getComboMul();
    if (mul > 1) {
      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 11px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#ffff00';
      ctx.fillText(mul + 'x', meterX + meterW / 2, meterY - 4);
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = '#ffffff';
    ctx.font = '8px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(combo, meterX + meterW / 2, meterY + meterH + 3);
  }

  // SCORE POPUPS RENDERING
  function drawScorePopups(ctx) {
    for (const p of scorePopups) {
      const alpha = p.timer / p.maxTimer;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.font = `bold ${p.size}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowBlur = 4;
      ctx.shadowColor = p.color;
      ctx.fillText(p.text, p.x, p.y);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }
  }

  // WAVE ANNOUNCEMENT RENDERING
  function drawWaveAnnouncement(ctx) {
    if (!waveAnnouncement) return;
    const a = waveAnnouncement;
    const progress = 1 - a.timer / a.maxTimer;
    let alpha;
    if (progress < 0.2) alpha = progress / 0.2;
    else if (progress > 0.7) alpha = (1 - progress) / 0.3;
    else alpha = 1;

    const scale = progress < 0.15 ? 0.5 + progress / 0.15 * 0.5 : 1;

    ctx.globalAlpha = alpha;
    ctx.font = `bold ${Math.floor(36 * scale)}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = a.text.includes('BOSS') ? '#ff4400' : '#ffffff';
    ctx.shadowBlur = 12;
    ctx.shadowColor = a.text.includes('BOSS') ? '#ff0000' : '#00aaff';
    ctx.fillText(a.text, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);
    ctx.shadowBlur = 0;

    if (a.sub) {
      ctx.font = '14px Arial';
      ctx.fillStyle = '#aaaaaa';
      ctx.fillText(a.sub, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 15);
    }
    ctx.globalAlpha = 1;
  }

  // SCREEN FLASH
  function drawScreenFlash(ctx) {
    if (screenFlashTimer <= 0) return;
    const alpha = screenFlashTimer / 15 * 0.4;
    ctx.fillStyle = screenFlashColor;
    ctx.globalAlpha = alpha;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    ctx.globalAlpha = 1;
  }

  function render(ctx) {
    // Apply screen shake
    ctx.save();
    ctx.translate(shakeX, shakeY);

    if (gameState === 'menu') {
      drawMenu(ctx);
      if (screen === 'ships') drawShipsScreen(ctx);
      else if (screen === 'achievements') drawAchievementsScreen(ctx);
      else if (screen === 'daily') drawDailyScreen(ctx);
    } else if (gameState === 'play') {
      drawBackground(ctx);
      drawPickups(ctx);
      drawEnemyBullets(ctx);
      drawBullets(ctx);
      drawEnemies(ctx);
      drawParticles(ctx);
      drawPlayer(ctx);
      drawHUD(ctx);
      drawBossBar(ctx);
      drawWeaponUI(ctx);
      drawComboMeter(ctx);
      drawScorePopups(ctx);
      drawWaveAnnouncement(ctx);
      drawBiomeTransition(ctx);
      drawCRTEffect(ctx);
      drawScreenFlash(ctx);

      if (achievementToast) {
        achievementToast.timer -= 1;
        const alpha = achievementToast.timer / 120;
        ctx.fillStyle = `rgba(255, 200, 0, ${alpha * 0.9})`;
        ctx.fillRect(0, 90, CANVAS_WIDTH, 25);
        ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(achievementToast.text, CANVAS_WIDTH / 2, 102);
        if (achievementToast.timer <= 0) achievementToast = null;
      }

      // Mute indicator
      if (audioMuted) {
        ctx.fillStyle = 'rgba(255,0,0,0.6)';
        ctx.font = '9px Arial';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillText('MUTED (M)', 5, CANVAS_HEIGHT - 35);
      }
    } else if (gameState === 'dead') {
      drawBackground(ctx);
      drawParticles(ctx);
      drawDead(ctx);
    }

    ctx.restore(); // Reset screen shake
  }

  // ============================================================================
  // EVENT HANDLERS
  // ============================================================================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    const scaleX = (rect.width * dpr) / CANVAS_WIDTH;
    const scaleY = (rect.height * dpr) / CANVAS_HEIGHT;
    ctx.scale(scaleX, scaleY);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const keyState = {};
  window.addEventListener('keydown', (e) => {
    keyState[e.key.toLowerCase()] = true;
    if (e.key === '1') switchWeapon('blaster');
    if (e.key === '2') switchWeapon('laser');
    if (e.key === '3') switchWeapon('missiles');
    if (e.key === 'Enter' || e.key === ' ') {
      if (gameState === 'menu' && screen === 'main') {
        startGame();
      } else if (gameState === 'dead') {
        startGame();
      }
    }
    if (e.key === 'Escape') {
      if (gameState === 'play') {
        gameState = 'menu';
        screen = 'main';
      }
    }
    if (e.key === 'm' || e.key === 'M') {
      audioMuted = !audioMuted;
    }
  });
  window.addEventListener('keyup', (e) => {
    keyState[e.key.toLowerCase()] = false;
  });

  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    if (gameState === 'menu') {
      handleMenuClick(x, y);
    } else if (gameState === 'dead') {
      handleDeadClick(x, y);
    }
  });

  let touchStartX = 0;
  let touchStartY = 0;
  let touchPlayerStartX = 0;
  let touchPlayerStartY = 0;
  let touchDragging = false;
  let touchAutoFire = false;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 0) return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const x = (touch.clientX - rect.left) * scaleX;
    const y = (touch.clientY - rect.top) * scaleY;

    if (gameState === 'menu') {
      handleMenuClick(x, y);
    } else if (gameState === 'play') {
      if (y > CANVAS_HEIGHT - 80) {
        if (x < CANVAS_WIDTH / 3) switchWeapon('blaster');
        else if (x < 2 * CANVAS_WIDTH / 3) switchWeapon('laser');
        else switchWeapon('missiles');
      } else {
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        touchPlayerStartX = player.x;
        touchPlayerStartY = player.y;
        touchDragging = true;
        touchAutoFire = true;
      }
    } else if (gameState === 'dead') {
      handleDeadClick(x, y);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchDragging || gameState !== 'play') return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const dx = (touch.clientX - touchStartX) * scaleX;
    const dy = (touch.clientY - touchStartY) * scaleY;
    player.x = Math.max(player.radius, Math.min(CANVAS_WIDTH - player.radius, touchPlayerStartX + dx));
    player.y = Math.max(player.radius, Math.min(CANVAS_HEIGHT - player.radius, touchPlayerStartY + dy));
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    touchDragging = false;
    touchAutoFire = false;
  }, { passive: false });

  // ============================================================================
  // GAME LOOP
  // ============================================================================
  let lastTime = Date.now();
  let accumulator = 0;

  function gameLoop() {
    const now = Date.now();
    const deltaTime = now - lastTime;
    lastTime = now;
    accumulator += deltaTime;

    let updateCount = 0;
    const stepDt = FIXED_DT / 1000;
    while (accumulator >= FIXED_DT && updateCount < MAX_DELTA_FRAMES) {
      update(stepDt);
      accumulator -= FIXED_DT;
      updateCount++;
    }

    ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    render(ctx);
    requestAnimationFrame(gameLoop);
  }

  loadPersistentData();
  gameLoop();
})();
</script>
</body>
</html>
