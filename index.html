// █                                                                         █
// █  SECTION 16: MAIN GAMEPLAY UPDATE                                       █
// █                                                                         █
// ███████████████████████████████████████████████████████████████████████████

function updatePlay(dt) {
  if (!player || !run) return;
  if (hitStopT > 0) return; // Freeze frame

  const gameDt = dt * slowMo * (player.feverActive ? 1.2 : 1);
  run.time += gameDt;
  gameTime += dt;

  // ── Player Movement ──
  if (inp.joyActive) {
    const dx = inp.joyCX - inp.joySX;
    const dy = inp.joyCY - inp.joySY;
    const d = sqrt(dx * dx + dy * dy);
    if (d > 5) {
      const moveX = (dx / d) * player.spd * gameDt;
      const moveY = (dy / d) * player.spd * gameDt;
      player.x += moveX;
      player.y += moveY;
      player.moveAngle = atan2(dy, dx);
    }
  }

  // Keyboard movement
  let kx = 0, ky = 0;
  if (inp.keys['ArrowLeft'] || inp.keys['a']) kx -= 1;
  if (inp.keys['ArrowRight'] || inp.keys['d']) kx += 1;
  if (inp.keys['ArrowUp'] || inp.keys['w']) ky -= 1;
  if (inp.keys['ArrowDown'] || inp.keys['s']) ky += 1;
  if (kx || ky) {
    const len = sqrt(kx * kx + ky * ky);
    player.x += (kx / len) * player.spd * gameDt;
    player.y += (ky / len) * player.spd * gameDt;
  }

  // Keep player in bounds
  player.x = clamp(player.x, 15, W - 15);
  player.y = clamp(player.y, 30, H - 30);

  // ── Dash ──
  if (inp.dashTap && player.dashCd <= 0) {
    player.dashT = 0.15;
    player.dashCd = 1;
    player.invT = 0.2;
    const dashAngle = player.moveAngle || -PI / 2;
    player.x += cos(dashAngle) * 80;
    player.y += sin(dashAngle) * 80;
    player.x = clamp(player.x, 15, W - 15);
    player.y = clamp(player.y, 30, H - 30);
    snd('dash', 0.2);
    burst(player.x, player.y, 8, player.ship.color, { glow: true });
    save.stats.totalDash = (save.stats.totalDash || 0) + 1;
  }
  player.dashCd = max(0, player.dashCd - gameDt);
  player.dashT = max(0, player.dashT - gameDt);

  // ── Invincibility & Flash ──
  player.invT = max(0, player.invT - gameDt);
  player.flashT = max(0, player.flashT - gameDt);

  // ── Combo Timer ──
  if (player.comboT > 0) {
    player.comboT -= gameDt;
    if (player.comboT <= 0) { player.combo = 0; }
  }

  // ── Fever Mode ──
  if (player.feverActive) {
    player.feverT -= gameDt;
    player.fireRate *= 1.5;
    player.dmg *= 1.3;
    if (player.feverT <= 0) {
      player.feverActive = false;
      player.fever = 0;
      player.fireRate /= 1.5;
      player.dmg /= 1.3;
    }
  } else {
    player.fever = max(0, player.fever - 0.5 * gameDt);
  }

  // ── Buffs ──
  for (let i = player.buffs.length - 1; i >= 0; i--) {
    player.buffs[i].t -= gameDt;
    if (player.buffs[i].type === 'regen') {
      player.hp = min(player.maxHp, player.hp + player.buffs[i].value * gameDt * 0.3);
    }
    if (player.buffs[i].t <= 0) player.buffs.splice(i, 1);
  }

  // ── HP Regen ──
  if (player.regen > 0) {
    player.hp = min(player.maxHp, player.hp + player.regen * gameDt);
  }

  // ── Shield Passive ──
  if (player.ship.passive === 'Shield' && player.shield <= 0 && rng() < 0.002) {
    player.shield = 15;
    player.shieldMax = 15;
  }

  // ── Phase Passive (dodge through enemies) ──
  if (player.ship.passive === 'Phase' && player.dashT > 0) {
    player.invT = max(player.invT, 0.1);
  }

  // ── Update Systems ──
  updateAutoFire(gameDt);
  updateAbilities(gameDt);
  updateTutorial(gameDt);
  updateWaveSpawning(gameDt);
  updateEnemies(gameDt);
  updateBullets(gameDt);
  updatePickups(gameDt);
  updateParts(gameDt);
  updateFT(gameDt);
  updateStars(gameDt);
  updateFX(dt); // Screen FX use real dt
  updateTweens(gameDt);

  // ── Wave transition ──
  if (!run.waveActive && enemies.activeCount === 0 && run.waveDelay > 0) {
    run.waveDelay -= gameDt;
    if (run.waveDelay <= 0) startWave();
  }
}

function drawShop() {
  X.fillStyle = '#050510'; X.fillRect(0, 0, W, H);

  drawTextGlow('SHOP', W / 2, 35, '#ffdd00', 22);
  X.fillStyle = '#888'; X.font = "11px 'Courier New',monospace"; X.textAlign = 'center';
  X.fillText(`Gold: ${save.gold}  |  Gems: ${save.gems || 0}`, W / 2, 55);

  const upgrades = [
    { key:'hp', name:'Max HP', desc:'+10 HP per level', cost: lv => 50 + lv * 30, color:'#44ff44' },
    { key:'dmg', name:'Damage', desc:'+5% damage per level', cost: lv => 60 + lv * 35, color:'#ff5533' },
    { key:'spd', name:'Speed', desc:'+3% speed per level', cost: lv => 40 + lv * 25, color:'#55ccff' },
    { key:'lck', name:'Luck', desc:'+5% luck per level', cost: lv => 80 + lv * 50, color:'#ffdd00' },
    { key:'reg', name:'Regen', desc:'+0.5 HP/s per level', cost: lv => 70 + lv * 40, color:'#88ff88' },
    { key:'arm', name:'Armor', desc:'+2 armor per level', cost: lv => 60 + lv * 35, color:'#888888' },
    { key:'crt', name:'Crit', desc:'+2% crit per level', cost: lv => 100 + lv * 60, color:'#ffaa33' },
    { key:'mag', name:'Magnet', desc:'+pickup range', cost: lv => 50 + lv * 30, color:'#ff44ff' }
  ];

  for (let i = 0; i < upgrades.length; i++) {
    const u = upgrades[i];
    const lv = (save.upg[u.key] || 0);
    const cost = u.cost(lv);
    const y = 75 + i * 56;
    const maxed = lv >= 10;

    X.fillStyle = 'rgba(255,255,255,0.03)';
    rrFill(15, y, W - 30, 48, 6);
    X.strokeStyle = u.color + '66'; X.lineWidth = 0.5;
    rrStroke(15, y, W - 30, 48, 6);

    X.textAlign = 'left';
    X.fillStyle = u.color;
    X.font = "bold 12px 'Courier New',monospace";
    X.fillText(u.name, 25, y + 18);

    X.fillStyle = '#777';
    X.font = "8px 'Courier New',monospace";
    X.fillText(u.desc, 25, y + 32);

    // Level dots
    for (let j = 0; j < 10; j++) {
      X.fillStyle = j < lv ? u.color : '#222';
      X.fillRect(25 + j * 12, y + 38, 8, 4);
    }

    // Buy button
    X.textAlign = 'right';
    if (maxed) {
      X.fillStyle = '#555'; X.font = "bold 10px 'Courier New',monospace";
      X.fillText('MAX', W - 25, y + 26);
    } else {
      const canBuy = save.gold >= cost;
      X.fillStyle = canBuy ? '#ffdd00' : '#553300';
      X.font = "bold 10px 'Courier New',monospace";
      X.fillText(`${cost}g`, W - 25, y + 20);
      if (canBuy) {
        X.fillStyle = '#00ddff'; X.font = "bold 9px 'Courier New',monospace";
        X.fillText('BUY', W - 25, y + 36);
      }
      if (tapIn(15, y, W - 30, 48) && canBuy) {
        save.gold -= cost;
        save.upg[u.key] = lv + 1;
        saveS(save); snd('powerup');
      }
    }
  }

  X.textAlign = 'center';
  drawBtn(W / 2 - 50, H - 50, 100, 36, 'BACK', '#666');
  if (tapIn(W / 2 - 50, H - 50, 100, 36)) { snd('click'); state = 'title'; }
}

// ─────────────────────────────────────────────────────────────────────────
// 17.7 Gameplay HUD Drawing
// ─────────────────────────────────────────────────────────────────────────
function drawPlay() {
  if (!player || !run) return;

  // Background
  const nb = renderNebula(run.biome);
  X.drawImage(nb, 0, 0);
  drawStars();

  // Draw AOE effects (under entities)
  aoePool.forEach(a => {
    if (a.life <= 0) return;
    const alpha = clamp(a.life / a.ml, 0, 1) * 0.3;
    const c = hex2rgb(a.color);
    X.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
    X.beginPath(); X.arc(a.x, a.y, a.radius, 0, TAU); X.fill();
    X.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${alpha * 2})`;
    X.lineWidth = 1.5;
    X.beginPath(); X.arc(a.x, a.y, a.radius, 0, TAU); X.stroke();
  });

  // Draw pickups
  pickups.forEach(p => {
    const bob = sin(p.bobT) * 2;
    X.fillStyle = p.color;
    if (p.type === 'gold') {
      // Coin shape
      X.beginPath(); X.arc(p.x, p.y + bob, p.sz, 0, TAU); X.fill();
      X.fillStyle = '#fff'; X.globalAlpha = 0.4;
      X.beginPath(); X.arc(p.x - 1, p.y + bob - 1, p.sz * 0.5, 0, TAU); X.fill();
      X.globalAlpha = 1;
    } else if (p.type === 'gem') {
      // Diamond shape
      X.save(); X.translate(p.x, p.y + bob); X.rotate(PI / 4);
      X.fillRect(-p.sz * 0.5, -p.sz * 0.5, p.sz, p.sz); X.restore();
    } else if (p.type === 'hp') {
      // Cross/plus shape
      X.fillRect(p.x - p.sz * 0.3, p.y + bob - p.sz * 0.7, p.sz * 0.6, p.sz * 1.4);
      X.fillRect(p.x - p.sz * 0.7, p.y + bob - p.sz * 0.3, p.sz * 1.4, p.sz * 0.6);
    } else {
      X.beginPath(); X.arc(p.x, p.y + bob, p.sz, 0, TAU); X.fill();
    }
    // Glow
    drawGlow(p.x, p.y + bob, p.sz * 2, p.color, 0.2);
  });

  // Draw enemy bullets
  eBullets.forEach(b => {
    X.fillStyle = b.color;
    X.beginPath(); X.arc(b.x, b.y, b.sz, 0, TAU); X.fill();
    drawGlow(b.x, b.y, b.sz * 2, b.color, 0.3);
  });

  // Draw enemies
  enemies.forEach(e => {
    if (e.spawnT > 0) {
      X.globalAlpha = 1 - e.spawnT / 0.3;
      const spawnScale = 1 + e.spawnT * 3;
      drawGlow(e.x, e.y, e.sz * spawnScale, e.color, 0.3);
      X.globalAlpha = 1;
      return;
    }

    const flash = e.flashT > 0;
    if (flash) { X.globalAlpha = 0.5 + rng() * 0.5; }

    // Status effect visuals
    if (e.slowT > 0) {
      drawGlow(e.x, e.y, e.sz * 1.5, '#55ccff', 0.15);
    }
    if (e.poisonT > 0) {
      drawGlow(e.x, e.y, e.sz * 1.5, '#44ff44', 0.15);
    }
    if (e.cursed) {
      drawGlow(e.x, e.y, e.sz * 1.5, '#8855aa', 0.15);
    }

    if (e.boss) {
      drawBoss(e.x, e.y, e.sz, flash ? '#ffffff' : e.color, e.hp, e.maxHp, e.bossPhase, gameTime);
      // Boss name
      X.textAlign = 'center'; X.fillStyle = e.color;
      X.font = "bold 11px 'Courier New',monospace";
      X.fillText(e.bossName, e.x, e.y - e.sz - 22);
    } else if (e.elite) {
      drawEnemyElite(e.x, e.y, e.sz, flash ? '#ffffff' : e.color, e.hp, e.maxHp, gameTime);
      // Elite indicator
      X.fillStyle = '#ffee44'; X.font = "bold 7px 'Courier New',monospace";
      X.textAlign = 'center'; X.fillText('★', e.x, e.y - e.sz - 10);
    } else {
      drawEnemyBasic(e.x, e.y, e.sz, flash ? '#ffffff' : e.color, e.hp, e.maxHp, gameTime);
    }

    X.globalAlpha = 1;
  });

  // Draw player bullets
  bullets.forEach(b => {
    X.fillStyle = b.crit ? '#ffffff' : b.color;
    X.beginPath(); X.arc(b.x, b.y, b.sz, 0, TAU); X.fill();
    if (b.crit) drawGlow(b.x, b.y, b.sz * 3, '#ffee44', 0.3);
  });

  // Draw ability projectiles
  projPool.forEach(p => {
    X.fillStyle = p.color;
    X.beginPath(); X.arc(p.x, p.y, p.sz, 0, TAU); X.fill();
    drawGlow(p.x, p.y, p.sz * 2, p.color, 0.4);
  });

  // Draw player
  if (player.invT > 0 && floor(player.invT * 15) % 2 === 0) {
    // Blink during invincibility
  } else {
    drawShipSprite(player.x, player.y, player.ship, 1.5, player.flashT > 0);
  }

  // Shield visual
  if (player.shield > 0) {
    const sa = player.shield / max(player.shieldMax, 1);
    X.strokeStyle = `rgba(68,221,255,${sa * 0.5})`;
    X.lineWidth = 2;
    X.beginPath(); X.arc(player.x, player.y, 18, 0, TAU); X.stroke();
    drawGlow(player.x, player.y, 22, '#44ddff', sa * 0.15);
  }

  // Dash trail
  if (player.dashT > 0) {
    for (let i = 0; i < 3; i++) {
      X.globalAlpha = (1 - i * 0.3) * (player.dashT / 0.15);
      drawShipSprite(
        player.x - cos(player.moveAngle) * i * 12,
        player.y - sin(player.moveAngle) * i * 12,
        player.ship, 1.5
      );
    }
    X.globalAlpha = 1;
  }

  // Particles
  drawParts();

  // Float texts
  drawFT();

  // ─── HUD ───
  const hudY = 8;

  // HP Bar (bigger, clearer)
  const hpPct = clamp(player.hp / player.maxHp, 0, 1);
  const hpColor = hpPct > 0.6 ? '#44ff44' : hpPct > 0.3 ? '#ffaa33' : '#ff3333';
  drawBar(10, hudY, 130, 12, hpPct, hpColor, '#222', '#444');
  X.fillStyle = '#fff'; X.font = "bold 9px 'Courier New',monospace"; X.textAlign = 'left';
  X.fillText(`HP ${round(player.hp)}/${round(player.maxHp)}`, 14, hudY + 9);

  // Shield bar (if active)
  if (player.shieldMax > 0) {
    drawBar(10, hudY + 15, 130, 6, player.shield / max(player.shieldMax, 1), '#44ddff', '#111');
  }

  // XP Bar
  drawBar(10, hudY + 24, 130, 6, player.xp / player.xpNeed, '#55ccff', '#111');
  X.fillStyle = '#aaa'; X.font = "7px 'Courier New',monospace"; X.textAlign = 'left';
  X.fillText(`Lv${player.lv}`, 14, hudY + 28);

  // Score & Wave (top right)
  X.textAlign = 'right';
  X.fillStyle = '#fff'; X.font = "bold 14px 'Courier New',monospace";
  X.fillText(floor(run.score).toString(), W - 10, hudY + 12);
  X.fillStyle = '#888'; X.font = "10px 'Courier New',monospace";
  X.fillText(`Wave ${run.wave}`, W - 10, hudY + 26);

  // Gold display
  X.fillStyle = '#ffdd00'; X.font = "bold 10px 'Courier New',monospace";
  X.fillText(`${run.gold}g`, W - 10, hudY + 40);

  // Combo display
  if (player.combo > 1) {
    const comboA = min(1, player.comboT);
    X.globalAlpha = comboA;
    X.fillStyle = player.combo >= 20 ? '#ff44ff' : player.combo >= 10 ? '#ffee44' : '#ffffff';

// █                                                                         █
// █  SECTION 18: MAIN LOOP                                                  █

// ███████████████████████████████████████████████████████████████████████████

// Initialize canvas
resizeCanvas();

let lastT = 0, fps = 0, fpsT = 0, fpsC = 0;

function loop(t) {
  requestAnimationFrame(loop);

  try {
    const rawDt = lastT ? (t - lastT) / 1000 : 1 / 60;
    lastT = t;
    const dt = min(rawDt, 0.05); // Cap delta to prevent spiral of death

    // FPS counter
    fpsC++; fpsT += rawDt;
    if (fpsT >= 1) { fps = fpsC; fpsC = 0; fpsT = 0; }

    gameTime += dt;

    // Reset transform for HiDPI scaling
    X.setTransform(SCALE, 0, 0, SCALE, 0, 0);
    X.save();

    // Screen shake
    if (shakeT > 0 && save.settings.screenShake !== false) {
      if (state === 'playing' || state === 'gameover') {
        X.translate(rnd(-shakeAmt, shakeAmt), rnd(-shakeAmt, shakeAmt));
      }
    }

    switch (state) {
      case 'title': drawTitle(); break;
      case 'shipSel': drawShipSel(); break;
      case 'shop': drawShop(); break;
      case 'ach': drawAch(); break;
      case 'equip': drawEquip(); break;
      case 'settings': drawSettings(); break;
      case 'playing':
        updatePlay(dt);
        drawPlay();
        if (inp.tap && inp.tapX > W - 50 && inp.tapY > 40 && inp.tapY < 70) {
          state = 'paused'; snd('click');
        }
        break;
      case 'paused': drawPaused(); break;
      case 'levelUp': drawLevelUp(); break;
      case 'gameover': drawGameOver(); break;
    }

    X.restore();

    // Update effects for non-playing states
    if (state !== 'playing') {
      updateStars(dt);
      updateParts(dt);
      updateFT(dt);
      updateFX(dt);
      updateTweens(dt);
    }

    // FPS display
    X.fillStyle = 'rgba(255,255,255,0.2)';
    X.font = "9px 'Courier New',monospace";
    X.textAlign = 'right';
    X.fillText(`${fps}fps`, W - 6, H - 4);

    // Clear tap
    inp.tap = false;
    inp.dashTap = 0;

  } catch (e) {
    // Global error handler — prevent game crash
    console.error('Game loop error:', e);
    inp.tap = false;
    inp.dashTap = 0;
  }
}

  // Check if dialogue should trigger
  checkTrigger(wave, biome) {
    for (let ch of this.chapters) {
      if (!ch.seen && ch.triggerWave === wave) {
        this.startDialogue(ch);
        return true;
      }
    }
    return false;
  },

  startDialogue(chapter) {
    chapter.seen = true;
    this.currentDialogue = chapter;
    this.currentLine = 0;
    this.textProgress = 0;
    this.isActive = true;
    this.shakeTimer = 0;
    if (typeof Audio !== 'undefined' && Audio.ctx) {
      Audio.play('powerup');
    }
  },

  advance() {
    if (!this.currentDialogue) return;
    const line = this.currentDialogue.lines[this.currentLine];
    const fullText = line ? line.text : '';

    if (this.textProgress < fullText.length) {
      this.textProgress = fullText.length;
      return;
    }

    this.currentLine++;
    this.textProgress = 0;
    this.autoAdvanceTimer = 0;

    if (this.currentLine >= this.currentDialogue.lines.length) {
      this.isActive = false;
      this.currentDialogue = null;
      if (typeof Audio !== 'undefined' && Audio.ctx) {
        Audio.play('select');
      }
    } else {
      if (typeof Audio !== 'undefined' && Audio.ctx) {
        Audio.play('pickup');
      }
    }
  },

  update() {
    if (!this.isActive || !this.currentDialogue) return;
    const line = this.currentDialogue.lines[this.currentLine];
    if (!line) return;

    if (this.textProgress < line.text.length) {
      this.textProgress += this.textSpeed;
      if (this.textProgress > line.text.length) this.textProgress = line.text.length;
    }

    this.portraitAnimTimer += 0.05;
    if (this.shakeTimer > 0) this.shakeTimer--;
  },

  render(ctx) {
    if (!this.isActive || !this.currentDialogue) return;
    const line = this.currentDialogue.lines[this.currentLine];
    if (!line) return;

    const W = 420, H = 750;

    // Darken background
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    // Chapter title at top
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(this.currentDialogue.title, W/2, 80);

    // Dialogue box
    const boxX = 20, boxY = H - 280, boxW = W - 40, boxH = 200;
    const shakeX = this.shakeTimer > 0 ? (Math.random()-0.5) * this.shakeIntensity : 0;
    const shakeY = this.shakeTimer > 0 ? (Math.random()-0.5) * this.shakeIntensity : 0;

    // Box background with glass effect
    ctx.save();
    ctx.translate(shakeX, shakeY);

    ctx.fillStyle = 'rgba(10, 10, 30, 0.9)';
    ctx.strokeStyle = this.getMoodColor(line.mood);
    ctx.lineWidth = 2;
    roundRect(ctx, boxX, boxY, boxW, boxH, 12);
    ctx.fill();
    ctx.stroke();

    // Inner glow border
    ctx.strokeStyle = this.getMoodColor(line.mood) + '40';
    ctx.lineWidth = 4;
    roundRect(ctx, boxX-2, boxY-2, boxW+4, boxH+4, 14);
    ctx.stroke();

    // Portrait area
    const portX = boxX + 15, portY = boxY + 15, portS = 60;
    ctx.fillStyle = 'rgba(20,20,50,0.8)';
    ctx.strokeStyle = this.getMoodColor(line.mood);
    ctx.lineWidth = 2;
    roundRect(ctx, portX, portY, portS, portS, 8);
    ctx.fill();
    ctx.stroke();

    // Draw portrait icon
    this.drawPortrait(ctx, line.portrait, portX + portS/2, portY + portS/2, portS/2 - 5, line.mood);

    // Speaker name
    ctx.fillStyle = this.getMoodColor(line.mood);
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(line.speaker, portX + portS + 15, boxY + 35);

    // Divider line under name
    ctx.strokeStyle = this.getMoodColor(line.mood) + '60';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(portX + portS + 15, boxY + 42);
    ctx.lineTo(boxX + boxW - 15, boxY + 42);
    ctx.stroke();

    // Dialogue text with typewriter effect
    const displayText = line.text.substring(0, Math.floor(this.textProgress));
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '13px monospace';
    ctx.textAlign = 'left';
    this.wrapText(ctx, displayText, portX + portS + 15, boxY + 62, boxW - portS - 50, 18);

    // Advance prompt
    if (this.textProgress >= line.text.length) {
      const promptAlpha = 0.5 + Math.sin(Date.now() * 0.005) * 0.5;
      ctx.fillStyle = `rgba(255,255,255,${promptAlpha})`;
      ctx.font = '12px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('TAP TO CONTINUE ▶', boxX + boxW - 15, boxY + boxH - 15);
    }

    // Progress dots
    const dotY = boxY + boxH - 15;
    const totalDots = this.currentDialogue.lines.length;
    const dotStartX = boxX + 15;
    for (let i = 0; i < totalDots; i++) {
      ctx.beginPath();
      ctx.arc(dotStartX + i * 14, dotY, 4, 0, Math.PI * 2);
      if (i <= this.currentLine) {
        ctx.fillStyle = this.getMoodColor(line.mood);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
      }
      ctx.fill();
    }

    ctx.restore();
  },

  getMoodColor(mood) {
    const colors = {
      serious: '#4488FF',
      info: '#44BBFF',
      determined: '#FF8844',
      warning: '#FFaa00',
      alert: '#FF4444',
      worried: '#AAAAFF',
      curious: '#88FF88',
      menace: '#FF0044',
      shocked: '#FFFF44',
      static: '#666688',
      supportive: '#44FF88',
      heroic: '#FFD700'
    };
    return colors[mood] || '#FFFFFF';
  },

  drawPortrait(ctx, type, cx, cy, r, mood) {
    const t = this.portraitAnimTimer;
    const breathe = Math.sin(t * 2) * 2;

    ctx.save();
    if (type === 'command') {
      // Military star icon
      ctx.fillStyle = '#4488FF';
      for (let i = 0; i < 5; i++) {
        const angle = (i * Math.PI * 2 / 5) - Math.PI/2;
        const innerAngle = angle + Math.PI / 5;
        const outerR = r * 0.8 + breathe;
        const innerR = r * 0.35;
        if (i === 0) {
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
        }
        ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
        ctx.lineTo(cx + Math.cos(innerAngle) * innerR, cy + Math.sin(innerAngle) * innerR);
      }
      ctx.closePath();
      ctx.fill();
    } else if (type === 'pilot') {
      // Helmet visor shape
      ctx.fillStyle = '#FF8844';
      ctx.beginPath();
      ctx.arc(cx, cy - 2 + breathe * 0.5, r * 0.65, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#44CCFF';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 2 + breathe * 0.5, r * 0.5, r * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (type === 'scanner') {
      // Radar sweep
      ctx.strokeStyle = '#44FF88';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.4, 0, Math.PI * 2);
      ctx.stroke();
      const sweepAngle = t * 3;
      ctx.strokeStyle = '#44FF88';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(sweepAngle) * r * 0.7, cy + Math.sin(sweepAngle) * r * 0.7);
      ctx.stroke();
    } else if (type === 'void') {
      // Menacing void eye
      ctx.fillStyle = '#FF0044';
      ctx.beginPath();
      ctx.ellipse(cx, cy, r * 0.7, r * 0.4 + breathe, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.ellipse(cx, cy, r * 0.25, r * 0.35 + breathe * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FF0044';
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.08, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  },

  wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let currentY = y;
    for (let w of words) {
      const testLine = line + w + ' ';
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && line.length > 0) {
        ctx.fillText(line.trim(), x, currentY);
        line = w + ' ';
        currentY += lineHeight;
      } else {
        line = testLine;
      }
    }
    if (line.trim().length > 0) {
      ctx.fillText(line.trim(), x, currentY);
    }
  }
};

    for (let cat in this.entries) {

    const W = 420, H = 750;
    const px = typeof player !== 'undefined' ? player.x : W/2;
    const py = typeof player !== 'undefined' ? player.y : H/2;

    try {
      switch(pattern.type) {
        case 'spiral_shoot': {
          if (timer % 6 === 0) {
            const baseAngle = timer * (pattern.rotSpeed || 0.03);
            const count = pattern.bulletCount || 8;
            for (let i = 0; i < count; i++) {
              const angle = baseAngle + (i * Math.PI * 2 / count);
              const spd = pattern.bulletSpeed || 2;
              if (typeof EnemyBullets !== 'undefined') {
                EnemyBullets.spawn(boss.x, boss.y, Math.cos(angle) * spd, Math.sin(angle) * spd, 10, boss.color || '#FF4488');
              }
            }
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('enemyShoot');
          }
          break;
        }
        case 'aimed_burst': {
          if (timer % 15 === 0) {
            const baseAngle = Math.atan2(py - boss.y, px - boss.x);
            const count = pattern.bulletCount || 5;
            const spread = pattern.spreadAngle || 0.3;
            for (let i = 0; i < count; i++) {
              const angle = baseAngle - spread + (spread * 2 * i / Math.max(1, count-1));
              const spd = pattern.bulletSpeed || 3;
              if (typeof EnemyBullets !== 'undefined') {
                EnemyBullets.spawn(boss.x, boss.y, Math.cos(angle) * spd, Math.sin(angle) * spd, 12, '#FFAA44');
              }
            }
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('enemyShoot');
          }
          break;
        }
        case 'ring_burst': {
          const rings = pattern.rings || 3;
          const interval = Math.floor(pattern.duration / (rings + 1));
          if (timer % interval === 0 && timer > 0) {
            const count = pattern.bulletsPerRing || 16;
            const spd = pattern.bulletSpeed || 2;
            for (let i = 0; i < count; i++) {
              const angle = (i * Math.PI * 2 / count) + (timer * 0.01);
              if (typeof EnemyBullets !== 'undefined') {
                EnemyBullets.spawn(boss.x, boss.y, Math.cos(angle) * spd, Math.sin(angle) * spd, 8, '#FF88FF');
              }
            }
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('bossShoot');
          }
          break;
        }
        case 'summon_minions': {
          if (timer === 1) {
            const count = pattern.count || 4;
            for (let i = 0; i < count; i++) {
              const angle = Math.random() * Math.PI * 2;
              const dist = 80 + Math.random() * 60;
              const sx = boss.x + Math.cos(angle) * dist;
              const sy = boss.y + Math.sin(angle) * dist;
              if (typeof Enemies !== 'undefined') {
                const e = Enemies.spawn(sx, Math.max(-20, sy - 100));
                if (e) {
                  e.type = pattern.enemyType || 'basic';
                  e.hp = 15 + gameState.wave * 2;
                  e.maxHP = e.hp;
                }
              }
            }
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('powerup');
          }
          break;
        }
        case 'move_to_center': {
          const tx = W/2, ty = 120;
          boss.x += (tx - boss.x) * 0.02;
          boss.y += (ty - boss.y) * 0.02;
          break;
        }
        case 'move_to_random': {
          if (timer === 1) {
            boss._targetX = 60 + Math.random() * (W - 120);
            boss._targetY = 60 + Math.random() * 150;
          }
          if (boss._targetX !== undefined) {
            boss.x += (boss._targetX - boss.x) * 0.03;
            boss.y += (boss._targetY - boss.y) * 0.03;
          }
          break;
        }
        case 'charge_attack': {
          const chargeInterval = Math.floor(pattern.duration / (pattern.chargeCount || 3));
          if (timer % chargeInterval === 0) {
            const angle = Math.atan2(py - boss.y, px - boss.x);
            boss.vx = Math.cos(angle) * (pattern.chargeSpeed || 5);
            boss.vy = Math.sin(angle) * (pattern.chargeSpeed || 5);
            if (typeof ScreenFX !== 'undefined') ScreenFX.shake(5, 10);
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('dash');
          }
          // Decelerate
          if (boss.vx) boss.vx *= 0.95;
          if (boss.vy) boss.vy *= 0.95;
          boss.x += (boss.vx || 0);
          boss.y += (boss.vy || 0);
          // Keep in bounds
          boss.x = clamp(boss.x, 30, W - 30);
          boss.y = clamp(boss.y, 30, 300);
          break;
        }
        case 'shield_phase': {
          if (timer === 1) {
            this.bossShieldActive = true;
            this.bossShieldHP = pattern.shieldHP || 200;
            this.bossShieldMaxHP = this.bossShieldHP;
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('shield');
          }
          if (this.bossShieldHP <= 0) {
            this.bossShieldActive = false;
          }
          break;
        }
        case 'bomb_drop': {
          const bombInterval = pattern.bombDelay || 20;
          if (timer % bombInterval === 0) {
            const bx = px + (Math.random() - 0.5) * 150;
            const by = py + (Math.random() - 0.5) * 150;
            if (typeof AbilityProjectiles !== 'undefined') {
              // Reuse AOE pool for bombs
              const bomb = AOEs.spawn(bx, by);
              if (bomb) {
                bomb.radius = 0;
                bomb.maxRadius = pattern.blastRadius || 60;
                bomb.damage = 15 + gameState.wave;
                bomb.lifetime = 60;
                bomb.maxLifetime = 60;
                bomb.color = '#FF4400';
                bomb.isEnemyBomb = true;
              }
            }
          }
          break;
        }
        case 'laser_sweep': {
          if (!boss._laserAngle) boss._laserAngle = 0;
          boss._laserAngle += (pattern.sweepSpeed || 0.02);
          boss._laserWidth = pattern.laserWidth || 20;
          boss._laserActive = true;
          // Damage check done in main update
          break;
        }
        case 'missile_swarm': {
          const missileInterval = Math.floor(pattern.duration / (pattern.missileCount || 8));
          if (timer % missileInterval === 0 && timer > 0) {
            const angle = Math.random() * Math.PI * 2;
            const spd = pattern.missileSpeed || 1.5;
            if (typeof EnemyBullets !== 'undefined') {
              const b = EnemyBullets.spawn(boss.x, boss.y, Math.cos(angle) * spd, Math.sin(angle) * spd, 15, '#FFAA00');
              if (b) {
                b.homing = true;
                b.homingStrength = pattern.homingStrength || 0.02;
              }
            }
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('enemyShoot');
          }
          break;
        }
        case 'turret_barrage': {
          if (timer % (pattern.fireRate || 10) === 0) {
            const count = pattern.turretCount || 4;
            for (let i = 0; i < count; i++) {
              const angle = (i * Math.PI * 2 / count) + timer * 0.02;
              const tx = boss.x + Math.cos(angle) * 50;
              const ty = boss.y + Math.sin(angle) * 50;
              const aimAngle = Math.atan2(py - ty, px - tx);
              const spd = pattern.bulletSpeed || 3;
              if (typeof EnemyBullets !== 'undefined') {
                EnemyBullets.spawn(tx, ty, Math.cos(aimAngle) * spd, Math.sin(aimAngle) * spd, 8, '#44FFAA');
              }
            }
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('enemyShoot');
          }
          break;
        }
        case 'build_wall': {
          if (timer === 1) {
            const segments = pattern.wallSegments || 5;
            const startX = boss.x - segments * 20;
            for (let i = 0; i < segments; i++) {
              const e = typeof Enemies !== 'undefined' ? Enemies.spawn(startX + i * 40, boss.y + 60) : null;
              if (e) {
                e.type = 'shield';
                e.hp = pattern.wallHP || 50;
                e.maxHP = e.hp;
                e.vy = 0;
                e.vx = 0;
                e.isWall = true;
              }
            }
          }
          break;
        }
        case 'build_turret': {
          if (timer === 1) {
            const count = pattern.turretCount || 2;
            for (let i = 0; i < count; i++) {
              const angle = (i * Math.PI * 2 / count);
              const tx = boss.x + Math.cos(angle) * 100;
              const ty = boss.y + Math.sin(angle) * 80 + 30;
              const e = typeof Enemies !== 'undefined' ? Enemies.spawn(tx, ty) : null;
              if (e) {
                e.type = 'shooter';
                e.hp = pattern.turretHP || 30;
                e.maxHP = e.hp;
                e.vy = 0;
                e.vx = 0;
                e.isTurret = true;
                e.fireRate = pattern.turretFireRate || 30;
              }
            }
          }
          break;
        }
        case 'heal_minions': {
          if (timer % 10 === 0) {
            const healAmount = pattern.healAmount || 5;
            const healRadius = pattern.healRadius || 200;
            if (typeof Enemies !== 'undefined') {
              for (let i = 0; i < Enemies.pool.length; i++) {
                const e = Enemies.pool[i];
                if (e.active && e !== boss) {
                  const dx = e.x - boss.x, dy = e.y - boss.y;
                  if (dx*dx + dy*dy < healRadius*healRadius) {
                    e.hp = Math.min(e.maxHP, e.hp + healAmount);
                  }
                }
              }
            }
          }
          break;
        }
      }
    } catch(e) {
      // Pattern execution error - continue silently
    }
  },

  // Update boss phase based on HP
  updatePhase(boss) {
    if (!boss || !this.activeBoss) return;
    const def = this.bossDefinitions[this.activeBoss];
    if (!def) return;

    const hpPercent = boss.hp / boss.maxHP;
    this.healthBarTarget = hpPercent;

    // Smoothly animate health bar
    this.healthBarAnim += (this.healthBarTarget - this.healthBarAnim) * 0.1;

    // Check for phase transitions
    for (let i = def.phases.length - 1; i >= 0; i--) {
      if (hpPercent <= def.phases[i].hpThreshold && this.bossPhase < i) {
        this.bossPhase = i;
        this.bossPatternIndex = 0;
        this.bossPatternTimer = 0;
        this.bossShieldActive = false;
        boss._laserActive = false;
        if (typeof ScreenFX !== 'undefined') ScreenFX.shake(10, 20);
        if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('explosion');
        break;
      }
    }

    // Check for enrage
    if (!this.bossEnraged && hpPercent <= this.bossEnrageThreshold) {
      this.bossEnraged = true;
      if (typeof ScreenFX !== 'undefined') ScreenFX.flash('#FF000044', 30);
      if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('bossShoot');
    }
  },

  // Get current pattern and advance
  getCurrentPattern() {
    if (!this.activeBoss) return null;
    const def = this.bossDefinitions[this.activeBoss];
    if (!def || !def.phases[this.bossPhase]) return null;
    const phase = def.phases[this.bossPhase];
    return phase.patterns[this.bossPatternIndex % phase.patterns.length];
  },

  advancePattern() {
    if (!this.activeBoss) return;
    const def = this.bossDefinitions[this.activeBoss];
    if (!def || !def.phases[this.bossPhase]) return;
    const phase = def.phases[this.bossPhase];
    this.bossPatternIndex = (this.bossPatternIndex + 1) % phase.patterns.length;
    this.bossPatternTimer = 0;
  },

  // Render boss health bar and phase indicator
  renderBossHUD(ctx, boss) {
    if (!boss || !this.activeBoss) return;
    const def = this.bossDefinitions[this.activeBoss];
    if (!def) return;

    const W = 420;
    const barX = 30, barY = 45, barW = W - 60, barH = 12;

    // Boss name
    ctx.fillStyle = def.color;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(def.name, W/2, barY - 8);

    // Subtitle
    ctx.fillStyle = def.accentColor + '88';
    ctx.font = '10px monospace';
    ctx.fillText(def.subtitle, W/2, barY - 20);

    // Health bar background
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    roundRect(ctx, barX - 1, barY - 1, barW + 2, barH + 2, 6);
    ctx.fill();

    // Health bar fill
    const fillW = barW * Math.max(0, this.healthBarAnim);
    const grad = ctx.createLinearGradient(barX, barY, barX + fillW, barY);
    grad.addColorStop(0, def.color);
    grad.addColorStop(1, def.accentColor);
    ctx.fillStyle = grad;
    roundRect(ctx, barX, barY, fillW, barH, 5);
    ctx.fill();

    // Phase markers
    for (let i = 1; i < def.phases.length; i++) {
      const px = barX + barW * (1 - def.phases[i].hpThreshold);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px, barY);
      ctx.lineTo(px, barY + barH);
      ctx.stroke();
    }

    // Phase name
    if (def.phases[this.bossPhase]) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('Phase: ' + def.phases[this.bossPhase].name, barX + barW, barY + barH + 12);
    }

    // Shield indicator
    if (this.bossShieldActive && this.bossShieldMaxHP > 0) {
      const shieldPct = this.bossShieldHP / this.bossShieldMaxHP;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      roundRect(ctx, barX, barY + barH + 16, barW, 6, 3);
      ctx.fill();
      ctx.fillStyle = '#44DDFF';
      roundRect(ctx, barX, barY + barH + 16, barW * shieldPct, 6, 3);
      ctx.fill();
      ctx.fillStyle = '#44DDFF88';
      ctx.font = '8px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('SHIELD', barX + 2, barY + barH + 30);
    }

    // Enrage warning
    if (this.bossEnraged) {
      const alpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.5;
      ctx.fillStyle = `rgba(255,0,0,${alpha * 0.3})`;
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('⚠ ENRAGED', barX, barY + barH + (this.bossShieldActive ? 42 : 16));
    }
  },

  // Render laser beam
  renderLaser(ctx, boss) {
    if (!boss || !boss._laserActive) return;
    const angle = boss._laserAngle || 0;
    const width = boss._laserWidth || 20;
    const length = 800;

    const endX = boss.x + Math.cos(angle) * length;
    const endY = boss.y + Math.sin(angle) * length;

    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#FF0044';
    ctx.lineWidth = width + 10;
    ctx.beginPath();
    ctx.moveTo(boss.x, boss.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();

    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#FF4488';
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(boss.x, boss.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();

    ctx.globalAlpha = 1.0;
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = width * 0.3;
    ctx.beginPath();
    ctx.moveTo(boss.x, boss.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.restore();
  },

  reset() {
    this.activeBoss = null;
    this.bossPhase = 0;
    this.bossPhaseTimer = 0;
    this.bossPatternIndex = 0;
    this.bossPatternTimer = 0;
    this.bossShieldActive = false;
    this.bossShieldHP = 0;
    this.bossEnraged = false;
    this.healthBarAnim = 1.0;
    this.healthBarTarget = 1.0;
    this.bossWarningTimer = 0;
    this.bossIntroTimer = 0;
  }
};

const DailyChallenge = {
  active: false,
  seed: 0,
  modifiers: [],
  score: 0,
  bestScore: 0,
  completedToday: false,
  startWave: 1,
  maxWaves: 15,

  // Possible modifiers for daily runs
  modifierPool: [
    { id: 'double_speed', name: 'Hyperspeed', desc: 'All enemies move 2x faster', icon: '⚡', apply: (e) => { e.vy *= 2; e.vx *= 2; } },
    { id: 'glass_cannon', name: 'Glass Cannon', desc: 'Deal 3x damage but have 50% HP', icon: '💥', applyGlobal: () => { player.maxHP = Math.floor(player.maxHP * 0.5); player.hp = player.maxHP; } },
    { id: 'bullet_hell', name: 'Bullet Hell', desc: 'Enemies fire 2x as often', icon: '🔴', apply: (e) => { if(e.fireRate) e.fireRate = Math.floor(e.fireRate * 0.5); } },
    { id: 'swarm', name: 'Swarm Mode', desc: '2x enemy count per wave', icon: '🐝', applyWave: (count) => count * 2 },
    { id: 'no_heal', name: 'No Mercy', desc: 'Health pickups disabled', icon: '💀', applyPickup: (type) => type === 'hp' ? false : true },
    { id: 'big_enemies', name: 'Titans', desc: 'Enemies are 50% larger with more HP', icon: '🗿', apply: (e) => { e.size *= 1.5; e.hp *= 1.5; e.maxHP = e.hp; } },
    { id: 'fog', name: 'Void Fog', desc: 'Reduced visibility radius', icon: '🌫', applyRender: true },
    { id: 'ricochet', name: 'Ricochet', desc: 'Enemy bullets bounce off walls', icon: '↩', applyBullet: true },
    { id: 'elemental_chaos', name: 'Elemental Chaos', desc: 'Your element changes every 30 seconds', icon: '🔮', applyTimer: true },
    { id: 'shield_break', name: 'Shield Breaker', desc: 'Shields recharge 50% slower', icon: '🛡', applyGlobal: () => { /* handled in shield logic */ } },
    { id: 'gold_rush', name: 'Gold Rush', desc: '3x XP gain but enemies are tougher', icon: '🪙', applyXP: (xp) => xp * 3, apply: (e) => { e.hp *= 1.5; e.maxHP = e.hp; } },
    { id: 'one_life', name: 'Permadeath', desc: 'No continues, one shot one kill (for you)', icon: '☠', applyGlobal: () => { player.maxHP = 1; player.hp = 1; } }
  ],

  // Generate today's challenge
  generateChallenge() {
    const today = new Date();
    this.seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();

    // Seeded random
    let s = this.seed;
    const seededRandom = () => {
      s = (s * 1103515245 + 12345) & 0x7fffffff;
      return s / 0x7fffffff;
    };

    // Pick 3 modifiers
    this.modifiers = [];
    const available = [...this.modifierPool];
    for (let i = 0; i < 3 && available.length > 0; i++) {
      const idx = Math.floor(seededRandom() * available.length);
      this.modifiers.push(available.splice(idx, 1)[0]);
    }

    // Load best score
    try {
      const saved = localStorage.getItem('VR5_daily_' + this.seed);
      if (saved) {
        this.bestScore = parseInt(saved) || 0;
        this.completedToday = true;
      }
    } catch(e) {}
  },

  start() {
    this.active = true;
    this.score = 0;
    this.generateChallenge();

    // Apply global modifiers
    for (let mod of this.modifiers) {
      if (mod.applyGlobal) {
        try { mod.applyGlobal(); } catch(e) {}
      }
    }
  },

  end() {
    if (this.score > this.bestScore) {
      this.bestScore = this.score;
      try {
        localStorage.setItem('VR5_daily_' + this.seed, this.bestScore.toString());
      } catch(e) {}
    }
    this.completedToday = true;
    this.active = false;
  },

  applyToEnemy(enemy) {
    for (let mod of this.modifiers) {
      if (mod.apply) {
        try { mod.apply(enemy); } catch(e) {}
      }
    }
  },

  renderModifiers(ctx, x, y) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('DAILY CHALLENGE', x, y);

    for (let i = 0; i < this.modifiers.length; i++) {
      const mod = this.modifiers[i];
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '11px monospace';
      ctx.fillText(mod.icon + ' ' + mod.name, x, y + 18 + i * 16);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '9px monospace';
      ctx.fillText(mod.desc, x + 20, y + 30 + i * 16);
    }
  }
};

const NewGamePlus = {
  level: 0,
  maxLevel: 10,

  // Bonuses per NG+ level
  getBonuses() {
    return {
      enemyHPMultiplier: 1 + this.level * 0.5,
      enemyDamageMultiplier: 1 + this.level * 0.3,
      enemySpeedMultiplier: 1 + this.level * 0.1,
      xpMultiplier: 1 + this.level * 0.25,
      lootQualityBonus: this.level * 0.1,
      bossHPMultiplier: 1 + this.level * 0.75,
      startingLevel: this.level * 3,
      bonusAbilitySlots: Math.floor(this.level / 3),
      enemyCountMultiplier: 1 + this.level * 0.15,
      scoreMultiplier: 1 + this.level * 0.5
    };
  },

  // Start new game plus
  start() {
    if (this.level < this.maxLevel) {
      this.level++;
    }
    return this.getBonuses();
  },

  // Render NG+ indicator
  renderIndicator(ctx, x, y) {
    if (this.level <= 0) return;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    const stars = '★'.repeat(Math.min(this.level, 5));
    ctx.fillText('NG+' + this.level + ' ' + stars, x, y);
  },

  // Get difficulty label
  getDifficultyLabel() {
    if (this.level === 0) return 'Normal';
    if (this.level <= 2) return 'Hard';
    if (this.level <= 4) return 'Veteran';
    if (this.level <= 6) return 'Nightmare';
    if (this.level <= 8) return 'Apocalypse';
    return 'Void Master';
  }
};

// ============================================================
// SECTION 24: SCREEN TRANSITION SYSTEM
// ============================================================

const Transitions = {
  active: false,
  type: 'fade',
  progress: 0,
  speed: 0.04,
  callback: null,
  midpointReached: false,

  types: ['fade', 'wipe_left', 'wipe_right', 'wipe_down', 'circle', 'pixelate', 'glitch', 'dissolve'],

  start(type, callback) {
    this.active = true;
    this.type = type || 'fade';
    this.progress = 0;
    this.speed = 0.04;
    this.callback = callback;
    this.midpointReached = false;
  },

  update() {
    if (!this.active) return;
    this.progress += this.speed;

    if (this.progress >= 0.5 && !this.midpointReached) {
      this.midpointReached = true;
      if (this.callback) {
        try { this.callback(); } catch(e) {}
      }
    }

    if (this.progress >= 1.0) {
      this.active = false;
      this.progress = 0;
    }
  },

  render(ctx) {
    if (!this.active) return;
    const W = 420, H = 750;
    // t goes 0->1->0 (in then out)
    const t = this.progress < 0.5 ? this.progress * 2 : (1 - this.progress) * 2;

    ctx.save();
    switch(this.type) {
      case 'fade': {
        ctx.fillStyle = `rgba(0,0,0,${t})`;
        ctx.fillRect(0, 0, W, H);
        break;
      }
      case 'wipe_left': {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, W * t, H);
        break;
      }
      case 'wipe_right': {
        ctx.fillStyle = '#000000';
        ctx.fillRect(W * (1-t), 0, W * t, H);
        break;
      }
      case 'wipe_down': {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, W, H * t);
        break;
      }
      case 'circle': {
        const maxR = Math.sqrt(W*W + H*H) / 2;
        const r = maxR * (1-t);
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, W, H);
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(W/2, H/2, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
        break;
      }
      case 'pixelate': {
        const pixelSize = Math.max(1, Math.floor(t * 30));
        ctx.fillStyle = `rgba(0,0,0,${t * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        for (let x = 0; x < W; x += pixelSize) {
          for (let y = 0; y < H; y += pixelSize) {
            if (Math.random() < t * 0.3) {
              ctx.fillStyle = `rgba(0,0,0,${t})`;
              ctx.fillRect(x, y, pixelSize, pixelSize);
            }
          }
        }
        break;
      }
      case 'glitch': {
        const sliceCount = Math.floor(t * 20);
        for (let i = 0; i < sliceCount; i++) {
          const sy = Math.random() * H;
          const sh = 5 + Math.random() * 20;
          const offset = (Math.random() - 0.5) * t * 100;
          ctx.fillStyle = `rgba(${Math.random()*50},0,${Math.random()*50},${t})`;
          ctx.fillRect(offset, sy, W, sh);
        }
        ctx.fillStyle = `rgba(0,0,0,${t * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        break;
      }
      case 'dissolve': {
        const density = t * 0.5;
        for (let i = 0; i < 200; i++) {
          if (Math.random() < density) {
            const rx = Math.random() * W;
            const ry = Math.random() * H;
            const rs = 5 + Math.random() * 15;
            ctx.fillStyle = `rgba(0,0,0,${t})`;
            ctx.fillRect(rx, ry, rs, rs);
          }
        }
        break;
      }
    }
    ctx.restore();
  }
};

const ComboSystem = {
  combo: 0,
  maxCombo: 0,
  comboTimer: 0,
  comboDecayTime: 120,
  multiplier: 1,
  rank: '',
  rankColors: {
    'D': '#888888',
    'C': '#44AAFF',
    'B': '#44FF44',
    'A': '#FFAA00',
    'S': '#FF4444',
    'SS': '#FF44FF',
    'SSS': '#FFD700'
  },
  hitStreak: 0,
  perfectDodges: 0,
  stylePoints: 0,
  announcements: [],

  addHit(damage) {
    this.combo++;
    this.comboTimer = this.comboDecayTime;
    this.hitStreak++;

    if (this.combo > this.maxCombo) this.maxCombo = this.combo;

    // Calculate style points
    this.stylePoints += damage + this.combo;

    this.updateRank();
    this.checkMilestones();

    return this.multiplier;
  },

  addPerfectDodge() {
    this.perfectDodges++;
    this.stylePoints += 50;
    this.comboTimer = this.comboDecayTime;
    this.addAnnouncement('PERFECT DODGE!', '#44FFFF');
  },

  updateRank() {
    if (this.combo >= 200) { this.rank = 'SSS'; this.multiplier = 8; }
    else if (this.combo >= 150) { this.rank = 'SS'; this.multiplier = 6; }
    else if (this.combo >= 100) { this.rank = 'S'; this.multiplier = 5; }
    else if (this.combo >= 50) { this.rank = 'A'; this.multiplier = 4; }
    else if (this.combo >= 25) { this.rank = 'B'; this.multiplier = 3; }
    else if (this.combo >= 10) { this.rank = 'C'; this.multiplier = 2; }
    else if (this.combo >= 5) { this.rank = 'D'; this.multiplier = 1.5; }
    else { this.rank = ''; this.multiplier = 1; }
  },

  checkMilestones() {
    const milestones = [10, 25, 50, 100, 150, 200, 300, 500];
    if (milestones.includes(this.combo)) {
      this.addAnnouncement(this.combo + ' COMBO!', this.rankColors[this.rank] || '#FFFFFF');
      if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('combo');
    }
  },

  addAnnouncement(text, color) {
    this.announcements.push({
      text,
      color,
      timer: 90,
      maxTimer: 90,
      y: 200,
      scale: 2.0
    });
  },

  update() {
    if (this.comboTimer > 0) {
      this.comboTimer--;
    } else if (this.combo > 0) {
      this.combo = 0;
      this.hitStreak = 0;
      this.updateRank();
    }

    // Update announcements
    for (let i = this.announcements.length - 1; i >= 0; i--) {
      const a = this.announcements[i];
      a.timer--;
      a.y -= 0.5;
      a.scale += (1.0 - a.scale) * 0.1;
      if (a.timer <= 0) this.announcements.splice(i, 1);
    }
  },

  render(ctx) {
    // Render combo counter (main HUD renders this separately but we render announcements)
    const W = 420;

    for (let a of this.announcements) {
      const alpha = a.timer / a.maxTimer;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = a.color;
      ctx.font = `bold ${Math.floor(18 * a.scale)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(a.text, W/2, a.y);
      ctx.restore();
    }

    // Rank display
    if (this.rank) {
      const rankAlpha = 0.7 + Math.sin(Date.now() * 0.005) * 0.3;
      ctx.save();
      ctx.globalAlpha = rankAlpha;
      ctx.fillStyle = this.rankColors[this.rank] || '#FFFFFF';
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(this.rank, W - 15, 130);
      ctx.font = '10px monospace';
      ctx.fillText('x' + this.multiplier.toFixed(1), W - 15, 145);
      ctx.restore();
    }
  },

  reset() {
    this.combo = 0;
    this.maxCombo = 0;
    this.comboTimer = 0;
    this.multiplier = 1;
    this.rank = '';
    this.hitStreak = 0;
    this.perfectDodges = 0;
    this.stylePoints = 0;
    this.announcements = [];
  }
};

const DamageNumbers = {
  numbers: [],
  maxNumbers: 100,

  spawn(x, y, amount, type) {
    if (this.numbers.length >= this.maxNumbers) {
      this.numbers.shift();
    }

    const config = this.getConfig(type);
    this.numbers.push({
      x: x + (Math.random()-0.5) * 20,
      y: y,
      amount: Math.round(amount),
      type: type,
      timer: config.duration,
      maxTimer: config.duration,
      vx: (Math.random()-0.5) * config.spread,
      vy: -config.rise,
      scale: config.startScale,
      targetScale: config.endScale,
      color: config.color,
      outline: config.outline,
      font: config.font,
      prefix: config.prefix || '',
      suffix: config.suffix || '',
      bounce: config.bounce || false,
      bounced: false
    });
  },

  getConfig(type) {
    switch(type) {
      case 'crit':
        return { duration: 70, spread: 3, rise: 3, startScale: 2.5, endScale: 0.8, color: '#FF4444', outline: '#880000', font: 'bold', prefix: '', suffix: '!' };
      case 'heal':
        return { duration: 60, spread: 1, rise: 2, startScale: 1.5, endScale: 0.8, color: '#44FF44', outline: '#008800', font: 'bold', prefix: '+', suffix: '' };
      case 'shield':
        return { duration: 50, spread: 1, rise: 1.5, startScale: 1.2, endScale: 0.8, color: '#44DDFF', outline: '#006688', font: 'normal', prefix: '', suffix: '' };
      case 'fire':
        return { duration: 45, spread: 2, rise: 2, startScale: 1.2, endScale: 0.6, color: '#FF8800', outline: '#884400', font: 'normal', prefix: '', suffix: '' };
      case 'ice':
        return { duration: 45, spread: 2, rise: 2, startScale: 1.2, endScale: 0.6, color: '#88DDFF', outline: '#446688', font: 'normal', prefix: '', suffix: '' };
      case 'lightning':
        return { duration: 40, spread: 4, rise: 2.5, startScale: 1.5, endScale: 0.6, color: '#FFFF44', outline: '#888800', font: 'bold', prefix: '', suffix: '' };
      case 'poison':
        return { duration: 60, spread: 1, rise: 1, startScale: 1.0, endScale: 0.6, color: '#88FF44', outline: '#448800', font: 'normal', prefix: '', suffix: '' };
      case 'combo':
        return { duration: 80, spread: 0, rise: 2, startScale: 2.0, endScale: 1.0, color: '#FFD700', outline: '#886600', font: 'bold', prefix: '', suffix: 'x', bounce: true };
      case 'xp':
        return { duration: 50, spread: 1, rise: 1.5, startScale: 1.0, endScale: 0.5, color: '#BB88FF', outline: '#554488', font: 'normal', prefix: '+', suffix: 'xp' };
      default:
        return { duration: 50, spread: 2, rise: 2, startScale: 1.3, endScale: 0.7, color: '#FFFFFF', outline: '#444444', font: 'normal', prefix: '', suffix: '' };
    }
  },

  update() {
    for (let i = this.numbers.length - 1; i >= 0; i--) {
      const n = this.numbers[i];
      n.timer--;
      n.x += n.vx;
      n.y += n.vy;
      n.vy += 0.05; // gravity
      n.vx *= 0.98;

      // Bounce effect
      if (n.bounce && !n.bounced && n.vy > 0) {
        n.vy = -1.5;
        n.bounced = true;
      }

      // Scale interpolation
      const progress = 1 - (n.timer / n.maxTimer);
      n.scale += (n.targetScale - n.scale) * 0.1;

      if (n.timer <= 0) {
        this.numbers.splice(i, 1);
      }
    }
  },

  render(ctx) {
    for (let n of this.numbers) {
      const alpha = Math.min(1, n.timer / 20);
      const size = Math.max(8, Math.floor(14 * n.scale));

      ctx.save();
      ctx.globalAlpha = alpha;

      const text = n.prefix + n.amount + n.suffix;

      // Outline
      ctx.fillStyle = n.outline;
      ctx.font = `${n.font} ${size}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(text, n.x + 1, n.y + 1);

      // Main text
      ctx.fillStyle = n.color;
      ctx.fillText(text, n.x, n.y);

      ctx.restore();
    }
  },

  clear() {
    this.numbers = [];
  }
};

const AchievementNotifier = {
  queue: [],
  current: null,
  displayTimer: 0,
  displayDuration: 180,
  slideProgress: 0,

  notify(achievement) {
    this.queue.push({
      name: achievement.name || 'Achievement Unlocked',
      desc: achievement.desc || '',
      icon: achievement.icon || '🏆',
      color: achievement.color || '#FFD700',
      rarity: achievement.rarity || 'Common'
    });
  },

  update() {
    if (this.current) {
      this.displayTimer++;
      if (this.displayTimer < 20) {
        this.slideProgress = Math.min(1, this.slideProgress + 0.08);
      } else if (this.displayTimer > this.displayDuration - 20) {
        this.slideProgress = Math.max(0, this.slideProgress - 0.08);
      }
      if (this.displayTimer >= this.displayDuration) {
        this.current = null;
        this.displayTimer = 0;
        this.slideProgress = 0;
      }
    } else if (this.queue.length > 0) {
      this.current = this.queue.shift();
      this.displayTimer = 0;
      this.slideProgress = 0;
      if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('achievement');
    }
  },

  render(ctx) {
    if (!this.current) return;
    const W = 420;
    const notifW = 300, notifH = 70;
    const x = (W - notifW) / 2;
    const y = -notifH + (notifH + 20) * this.slideProgress;

    // Background
    ctx.fillStyle = 'rgba(10,10,30,0.95)';
    ctx.strokeStyle = this.current.color;
    ctx.lineWidth = 2;
    roundRect(ctx, x, y, notifW, notifH, 12);
    ctx.fill();
    ctx.stroke();

    // Inner glow
    ctx.strokeStyle = this.current.color + '40';
    ctx.lineWidth = 4;
    roundRect(ctx, x - 2, y - 2, notifW + 4, notifH + 4, 14);
    ctx.stroke();

    // Icon
    ctx.font = '28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(this.current.icon, x + 30, y + 42);

    // Achievement name
    ctx.fillStyle = this.current.color;
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(this.current.name, x + 55, y + 28);

    // Description
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '10px monospace';
    ctx.fillText(this.current.desc, x + 55, y + 45);

    // Rarity
    ctx.fillStyle = this.current.color + '88';
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(this.current.rarity, x + notifW - 10, y + 60);
  }
};

    // Weight formations by wave difficulty
    let available = names;
    if (wave < 5) available = ['v_formation', 'line', 'swarm_cloud'];
    else if (wave < 10) available = ['v_formation', 'diamond', 'line', 'arrow', 'swarm_cloud'];
    else if (wave < 20) available = ['diamond', 'circle', 'arrow', 'shielded_box', 'pincer'];

    return available[Math.floor(Math.random() * available.length)];
  }
};

const Weather = {
  current: 'clear',
  intensity: 0,

  timer: 0,
  changeInterval: 1800, // 30 seconds at 60fps
  particles: [],

  types: {

    },
    void_storm: {

    },
    solar_wind: {

      pushDirection: 1, // right
      pushStrength: 0.3,
      particleColor: '#FFCC44',
      particleSpeed: 5,
      particleAngle: 0,
      overlay: 'rgba(40,30,0,0.1)'
    },
    void_rain: {
      name: 'Void Rain',
      color: '#88008820',
      effect: 'enemy_buff',
      buffAmount: 1.3,
      particleColor: '#CC44FF',
      particleSpeed: 3.5,
      particleAngle: Math.PI * 0.52,
      overlay: 'rgba(30,0,30,0.15)'
    },
    energy_surge: {
      name: 'Energy Surge',
      color: '#44FF4420',
      effect: 'ability_boost',
      cooldownReduction: 0.5,
      particleColor: '#88FF44',
      particleSpeed: 2,
      particleAngle: -Math.PI * 0.5,
      overlay: 'rgba(0,30,0,0.1)'
    }
  },

  setWeather(type) {
    if (this.types[type]) {
      this.current = type;
      this.targetIntensity = type === 'clear' ? 0 : 0.7 + Math.random() * 0.3;
    }
  },

  update() {
    const W = 420, H = 750;
    this.timer++;

    // Transition intensity
    if (this.intensity < this.targetIntensity) {
      this.intensity = Math.min(this.targetIntensity, this.intensity + this.transitionSpeed);
    } else if (this.intensity > this.targetIntensity) {
      this.intensity = Math.max(this.targetIntensity, this.intensity - this.transitionSpeed);
    }

    // Weather change
    if (this.timer >= this.changeInterval) {
      this.timer = 0;
      const biome = typeof gameState !== 'undefined' ? (gameState.biome || 0) : 0;
      this.generateWeatherForBiome(biome);
    }

    // Update weather particles
    const weatherType = this.types[this.current];
    if (weatherType && weatherType.particleColor && this.intensity > 0) {
      // Spawn particles
      const spawnRate = Math.floor(this.intensity * 5);
      for (let i = 0; i < spawnRate; i++) {
        if (this.particles.length < this.maxParticles) {
          const angle = weatherType.particleAngle || Math.PI * 0.5;
          const speed = (weatherType.particleSpeed || 2) * (0.8 + Math.random() * 0.4);
          this.particles.push({
            x: Math.random() * (W + 100) - 50,
            y: -10,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 1 + Math.random() * 2,
            life: 200,
            color: weatherType.particleColor,
            alpha: 0.3 + Math.random() * 0.4
          });
        }
      }
    }

    // Update particles
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      if (p.life <= 0 || p.x < -20 || p.x > W + 20 || p.y > H + 20 || p.y < -20) {
        this.particles.splice(i, 1);
      }
    }

    // Apply effects
    this.applyEffects();
  },

  applyEffects() {
    if (this.intensity <= 0) return;
    const weatherType = this.types[this.current];
    if (!weatherType || !weatherType.effect) return;

    try {
      switch(weatherType.effect) {
        case 'periodic_damage':
          if (this.timer % (weatherType.damageInterval || 180) === 0) {
            if (typeof player !== 'undefined' && player.hp > 0) {
              player.hp -= Math.floor((weatherType.damageAmount || 3) * this.intensity);
              player.hp = Math.max(1, player.hp);
              if (typeof ScreenFX !== 'undefined') ScreenFX.shake(weatherType.screenShake || 2, 5);
            }
          }
          break;
        case 'push_force':
          if (typeof player !== 'undefined') {
            player.x += (weatherType.pushStrength || 0.3) * this.intensity * (weatherType.pushDirection || 1);
          }
          break;
        case 'random_pickups':
          if (this.timer % (weatherType.pickupInterval || 300) === 0) {
            const W = 420;
            if (typeof Pickups !== 'undefined') {
              const types = ['hp', 'xp', 'shield', 'coin'];
              Pickups.spawn(Math.random() * (W - 40) + 20, -10, types[Math.floor(Math.random() * types.length)]);
            }
          }
          break;
      }
    } catch(e) {}
  },

  generateWeatherForBiome(biome) {
    const biomeWeathers = [
      ['clear', 'clear', 'solar_wind'],
      ['clear', 'nebula_fog', 'void_rain'],
      ['clear', 'crystal_rain', 'energy_surge'],
      ['void_storm', 'void_storm', 'solar_wind'],
      ['nebula_fog', 'void_rain', 'void_storm'],
      ['void_storm', 'void_rain', 'energy_surge']
    ];
    const options = biomeWeathers[biome] || biomeWeathers[0];
    this.setWeather(options[Math.floor(Math.random() * options.length)]);
  },

  render(ctx) {
    if (this.intensity <= 0) return;
    const W = 420, H = 750;
    const weatherType = this.types[this.current];
    if (!weatherType) return;

    // Overlay
    if (weatherType.overlay) {
      ctx.fillStyle = weatherType.overlay;
      ctx.globalAlpha = this.intensity;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // Particles
    for (let p of this.particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha * this.intensity;
      if (this.current === 'crystal_rain') {
        // Diamond-shaped crystals
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.life * 0.1);
        ctx.beginPath();
        ctx.moveTo(0, -p.size);
        ctx.lineTo(p.size * 0.6, 0);
        ctx.lineTo(0, p.size);
        ctx.lineTo(-p.size * 0.6, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (this.current === 'void_storm') {
        // Lightning-like streaks
        ctx.strokeStyle = p.color;
        ctx.lineWidth = p.size * 0.5;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + p.vx * 3, p.y + p.vy * 3);
        ctx.stroke();
      } else {
        // Simple circles
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;

    // Weather name indicator
    if (this.current !== 'clear') {
      ctx.fillStyle = weatherType.particleColor || '#FFFFFF';
      ctx.globalAlpha = 0.5 * this.intensity;
      ctx.font = '9px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(weatherType.name, W - 10, H - 10);
      ctx.globalAlpha = 1;
    }
  }
};

const Minimap = {
  enabled: true,
  x: 340,
  y: 90,
  width: 70,
  height: 100,
  opacity: 0.6,

  render(ctx) {
    if (!this.enabled) return;
    const W = 420, H = 750;
    const mx = this.x, my = this.y, mw = this.width, mh = this.height;
    const scaleX = mw / W, scaleY = mh / H;

    // Background
    ctx.fillStyle = `rgba(0,0,20,${this.opacity})`;
    ctx.strokeStyle = `rgba(100,100,150,${this.opacity})`;
    ctx.lineWidth = 1;
    roundRect(ctx, mx, my, mw, mh, 4);
    ctx.fill();
    ctx.stroke();

    ctx.save();
    ctx.globalAlpha = this.opacity;

    // Player
    if (typeof player !== 'undefined') {
      ctx.fillStyle = '#44FF44';
      ctx.fillRect(mx + player.x * scaleX - 1, my + player.y * scaleY - 1, 3, 3);
    }

    // Enemies
    if (typeof Enemies !== 'undefined') {
      ctx.fillStyle = '#FF4444';
      for (let i = 0; i < Enemies.pool.length; i++) {
        const e = Enemies.pool[i];
        if (e.active) {
          const size = e.isBoss ? 3 : 1;
          ctx.fillRect(mx + e.x * scaleX - size/2, my + e.y * scaleY - size/2, size, size);
        }
      }
    }

    // Pickups
    if (typeof Pickups !== 'undefined') {
      ctx.fillStyle = '#FFD700';
      for (let i = 0; i < Pickups.pool.length; i++) {
        const p = Pickups.pool[i];
        if (p.active) {
          ctx.fillRect(mx + p.x * scaleX, my + p.y * scaleY, 1, 1);
        }
      }
    }

    // Enemy bullets
    if (typeof EnemyBullets !== 'undefined') {
      ctx.fillStyle = '#FF8888';
      for (let i = 0; i < EnemyBullets.pool.length; i++) {
        const b = EnemyBullets.pool[i];
        if (b.active) {
          ctx.fillRect(mx + b.x * scaleX, my + b.y * scaleY, 1, 1);
        }
      }
    }

    ctx.restore();
  }
};

    favoriteShip: '',
    favoriteElement: '',
    totalDeaths: 0
  },

  trackDamage(amount) {
    this.session.totalDamageDealt += amount;
    this.session.dpsWindow.push({ damage: amount, time: Date.now() });
    // Keep last 5 seconds of damage
    const cutoff = Date.now() - 5000;
    this.session.dpsWindow = this.session.dpsWindow.filter(d => d.time > cutoff);
    const totalInWindow = this.session.dpsWindow.reduce((sum, d) => sum + d.damage, 0);
    this.session.currentDPS = totalInWindow / 5;
    if (this.session.currentDPS > this.session.peakDPS) {
      this.session.peakDPS = this.session.currentDPS;
    }
  },

  trackKill(enemyType) {
    this.session.enemiesKilled++;
    if (!this.session.enemyTypesKilled[enemyType]) {
      this.session.enemyTypesKilled[enemyType] = 0;
    }
    this.session.enemyTypesKilled[enemyType]++;
  },

  trackMovement(px, py) {
    if (this.session.lastPlayerX !== 0 || this.session.lastPlayerY !== 0) {
      const dx = px - this.session.lastPlayerX;
      const dy = py - this.session.lastPlayerY;
      this.session.distanceTraveled += Math.sqrt(dx*dx + dy*dy);
    }
    this.session.lastPlayerX = px;
    this.session.lastPlayerY = py;
  },

  update() {
    this.session.timePlayed++;
  },

  getAccuracy() {
    if (this.session.bulletsFired === 0) return 0;
    return (this.session.bulletsHit / this.session.bulletsFired * 100);
  },

  getFormattedTime(frames) {
    const totalSeconds = Math.floor(frames / 60);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${minutes}:${seconds.toString().padStart(2, '0')}`;
  },

  saveCareer() {
    try {
      this.career.totalGamesPlayed++;
      this.career.totalTimePlayed += this.session.timePlayed;
      this.career.totalEnemiesKilled += this.session.enemiesKilled;
      this.career.totalBossesKilled += this.session.bossesKilled;
      this.career.totalDistanceTraveled += this.session.distanceTraveled;
      this.career.totalDeaths += this.session.deathCount;
      if (this.session.highestCombo > this.career.highestCombo) {
        this.career.highestCombo = this.session.highestCombo;
      }
      localStorage.setItem('VR5_career', JSON.stringify(this.career));
    } catch(e) {}
  },

  loadCareer() {
    try {
      const saved = localStorage.getItem('VR5_career');
      if (saved) {
        Object.assign(this.career, JSON.parse(saved));
      }
    } catch(e) {}
  },

  resetSession() {
    this.session.totalDamageDealt = 0;
    this.session.totalDamageTaken = 0;
    this.session.enemiesKilled = 0;
    this.session.bossesKilled = 0;

    this.session.dpsWindow = [];

  canUnlock(tree, nodeId) {
    const treeData = this.trees[tree];
    if (!treeData) return false;
    const node = treeData.nodes.find(n => n.id === nodeId);
    if (!node || node.unlocked) return false;

    // Check requirements
    if (node.requires) {
      for (let reqId of node.requires) {
        const reqNode = treeData.nodes.find(n => n.id === reqId);
        if (!reqNode || !reqNode.unlocked) return false;
      }
    }

    // Check cost
    if (typeof player !== 'undefined' && (player.coins || 0) < node.cost) return false;

    return true;
  },

  unlock(tree, nodeId) {
    if (!this.canUnlock(tree, nodeId)) return false;
    const node = this.trees[tree].nodes.find(n => n.id === nodeId);
    if (!node) return false;
    node.unlocked = true;
    if (typeof player !== 'undefined') {
      player.coins = (player.coins || 0) - node.cost;
    }
    return true;
  },

  getUnlockedEffects(tree) {
    const effects = {};
    const treeData = this.trees[tree];
    if (!treeData) return effects;
    for (let node of treeData.nodes) {
      if (node.unlocked && node.effect) {
        for (let key in node.effect) {
          if (typeof node.effect[key] === 'number') {
            effects[key] = (effects[key] || 0) + node.effect[key];
          } else {
            effects[key] = node.effect[key];
          }
        }
      }
    }
    return effects;
  },

  getAllEffects() {
    const all = {};
    for (let tree in this.trees) {
      const effects = this.getUnlockedEffects(tree);
      for (let key in effects) {
        if (typeof effects[key] === 'number') {
          all[key] = (all[key] || 0) + effects[key];
        } else {
          all[key] = effects[key];
        }
      }
    }
    return all;
  },

  getProgress(tree) {
    const treeData = this.trees[tree];
    if (!treeData) return { unlocked: 0, total: 0 };
    let unlocked = 0;
    for (let node of treeData.nodes) {
      if (node.unlocked) unlocked++;
    }
    return { unlocked, total: treeData.nodes.length };
  }
};

function renderCodexScreen(ctx) {
  const W = 420, H = 750;
  const codexCategories = ['enemies', 'bosses', 'elements', 'biomes'];
  const categoryNames = ['Enemies', 'Bosses', 'Elements', 'Biomes'];

  // Background
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VOID CODEX', W/2, 40);

  // Discovery count
  const discovery = Codex.getDiscoveredCount();
  ctx.fillStyle = '#AAAAAA';
  ctx.font = '11px monospace';
  ctx.fillText(`Discovered: ${discovery.count}/${discovery.total}`, W/2, 58);

  // Category tabs
  if (!gameState.codexTab) gameState.codexTab = 0;
  if (!gameState.codexScroll) gameState.codexScroll = 0;

  const tabW = (W - 40) / codexCategories.length;
  for (let i = 0; i < codexCategories.length; i++) {
    const tx = 20 + i * tabW;
    const isActive = gameState.codexTab === i;

    ctx.fillStyle = isActive ? 'rgba(255,215,0,0.2)' : 'rgba(255,255,255,0.05)';
    ctx.strokeStyle = isActive ? '#FFD700' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, tx + 2, 70, tabW - 4, 28, 6);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = isActive ? '#FFD700' : '#888888';
    ctx.font = `${isActive ? 'bold ' : ''}10px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(categoryNames[i], tx + tabW/2, 88);
  }

  // Entries
  const category = codexCategories[gameState.codexTab];
  const entries = Codex.getEntriesForCategory(category);
  const entryH = 80;
  const startY = 110;
  const visibleH = H - startY - 60;
  const maxScroll = Math.max(0, entries.length * entryH - visibleH);
  gameState.codexScroll = clamp(gameState.codexScroll || 0, 0, maxScroll);

  ctx.save();
  ctx.beginPath();
  ctx.rect(10, startY, W - 20, visibleH);
  ctx.clip();

  for (let i = 0; i < entries.length; i++) {
    const entry = entries[i];
    const ey = startY + i * entryH - gameState.codexScroll;

    if (ey + entryH < startY || ey > startY + visibleH) continue;

    // Entry card
    if (entry.discovered) {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    } else {
      ctx.fillStyle = 'rgba(100,100,100,0.05)';
      ctx.strokeStyle = 'rgba(100,100,100,0.1)';
    }
    ctx.lineWidth = 1;
    roundRect(ctx, 15, ey + 2, W - 30, entryH - 4, 8);
    ctx.fill();
    ctx.stroke();

    if (entry.discovered) {
      // Name
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(entry.name, 25, ey + 20);

      // Category
      ctx.fillStyle = '#888888';
      ctx.font = '9px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(entry.category || '', W - 25, ey + 20);

      // Description (truncated)
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '10px monospace';
      ctx.textAlign = 'left';
      const desc = entry.desc || '';
      const maxChars = 50;
      ctx.fillText(desc.length > maxChars ? desc.substring(0, maxChars) + '...' : desc, 25, ey + 38);

      // Stats
      if (entry.hp !== undefined) {
        ctx.fillStyle = '#FF8888';
        ctx.fillText('HP: ' + entry.hp, 25, ey + 55);
      }
      if (entry.threat !== undefined) {
        ctx.fillStyle = '#FFAA44';
        ctx.fillText('Threat: ' + '★'.repeat(Math.min(entry.threat, 10)), 120, ey + 55);
      }
      if (entry.weakness) {
        ctx.fillStyle = '#88FF88';
        ctx.font = '9px monospace';
        ctx.fillText('Weak: ' + entry.weakness, 25, ey + 70);
      }
    } else {
      // Undiscovered
      ctx.fillStyle = '#555555';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('???', 25, ey + 20);
      ctx.fillStyle = '#444444';
      ctx.font = '10px monospace';
      ctx.fillText('Not yet discovered', 25, ey + 38);
    }
  }

  ctx.restore();

  // Back button
  drawGlassButton(ctx, W/2 - 60, H - 50, 120, 36, 'BACK', '#FF4444', true);
}

// SECTION 35: WEAPON TREE SCREEN RENDERER

function renderWeaponTreeScreen(ctx) {
  const W = 420, H = 750;

  // Background
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WEAPON UPGRADE TREES', W/2, 35);

  // Element tabs
  const elements = Object.keys(WeaponTrees.trees);
  if (!gameState.weaponTreeTab) gameState.weaponTreeTab = 0;
  const tabW = (W - 20) / elements.length;

  for (let i = 0; i < elements.length; i++) {
    const tree = WeaponTrees.trees[elements[i]];
    const tx = 10 + i * tabW;
    const isActive = gameState.weaponTreeTab === i;

    ctx.fillStyle = isActive ? tree.color + '33' : 'rgba(255,255,255,0.03)';
    ctx.strokeStyle = isActive ? tree.color : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    roundRect(ctx, tx + 1, 48, tabW - 2, 24, 5);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = isActive ? tree.color : '#666666';
    ctx.font = `${isActive ? 'bold ' : ''}8px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(elements[i].toUpperCase(), tx + tabW/2, 64);
  }

  // Draw selected tree
  const selectedElement = elements[gameState.weaponTreeTab];
  const tree = WeaponTrees.trees[selectedElement];
  if (!tree) return;

  // Tree name
  ctx.fillStyle = tree.color;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(tree.name, W/2, 95);

  // Progress
  const progress = WeaponTrees.getProgress(selectedElement);
  ctx.fillStyle = '#AAAAAA';
  ctx.font = '10px monospace';
  ctx.fillText(`${progress.unlocked}/${progress.total} Unlocked`, W/2, 110);

  // Draw nodes in tiers
  const nodesByTier = {};
  for (let node of tree.nodes) {
    if (!nodesByTier[node.tier]) nodesByTier[node.tier] = [];
    nodesByTier[node.tier].push(node);
  }

  const tiers = Object.keys(nodesByTier).sort((a,b) => a-b);
  const tierY = 140;
  const tierSpacing = 120;

  // Draw connections first
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  for (let node of tree.nodes) {
    if (node.requires) {
      const nodeX = this.getNodeX(nodesByTier, node, W);
      const nodeY = tierY + node.tier * tierSpacing + 25;
      for (let reqId of node.requires) {
        const reqNode = tree.nodes.find(n => n.id === reqId);
        if (reqNode) {
          const reqX = this.getNodeX ? getNodeXForTree(nodesByTier, reqNode, W) : W/2;
          const reqY = tierY + reqNode.tier * tierSpacing + 25;
          ctx.strokeStyle = (node.unlocked && reqNode.unlocked) ? tree.color + '88' : 'rgba(255,255,255,0.1)';
          ctx.beginPath();
          ctx.moveTo(reqX, reqY + 25);
          ctx.lineTo(nodeX, nodeY);
          ctx.stroke();
        }
      }
    }
  }

  // Draw nodes
  for (let tier of tiers) {
    const nodes = nodesByTier[tier];
    const nodeW = 160, nodeH = 50;

    for (let i = 0; i < nodes.length; i++) {
      const node = nodes[i];
      const nx = getNodeXForTree(nodesByTier, node, W) - nodeW/2;
      const ny = tierY + parseInt(tier) * tierSpacing;

      // Node background
      if (node.unlocked) {
        ctx.fillStyle = tree.color + '33';
        ctx.strokeStyle = tree.color;
      } else if (WeaponTrees.canUnlock(selectedElement, node.id)) {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.strokeStyle = tree.color + '88';
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      }
      ctx.lineWidth = node.unlocked ? 2 : 1;
      roundRect(ctx, nx, ny, nodeW, nodeH, 8);
      ctx.fill();
      ctx.stroke();

      // Node name
      ctx.fillStyle = node.unlocked ? tree.color : (WeaponTrees.canUnlock(selectedElement, node.id) ? '#FFFFFF' : '#666666');
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(node.name, nx + nodeW/2, ny + 18);

      // Description
      ctx.fillStyle = node.unlocked ? '#CCCCCC' : '#888888';
      ctx.font = '8px monospace';
      ctx.fillText(node.desc, nx + nodeW/2, ny + 32);

      // Cost or checkmark
      if (node.unlocked) {
        ctx.fillStyle = '#44FF44';
        ctx.font = '9px monospace';
        ctx.fillText('✓ UNLOCKED', nx + nodeW/2, ny + 45);
      } else {
        ctx.fillStyle = '#FFD700';
        ctx.font = '9px monospace';
        ctx.fillText('Cost: ' + node.cost, nx + nodeW/2, ny + 45);
      }
    }
  }

  // Coins display
  const coins = typeof player !== 'undefined' ? (player.coins || 0) : 0;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('Coins: ' + coins, W - 20, H - 65);

  // Back button
  drawGlassButton(ctx, W/2 - 60, H - 50, 120, 36, 'BACK', '#FF4444', true);
}

function getNodeXForTree(nodesByTier, node, W) {
  const tier = node.tier;
  const nodesInTier = nodesByTier[tier];
  if (!nodesInTier) return W/2;
  const idx = nodesInTier.indexOf(node);
  const count = nodesInTier.length;
  if (count === 1) return W/2;
  const spacing = Math.min(180, (W - 40) / count);
  const startX = W/2 - ((count - 1) * spacing) / 2;
  return startX + idx * spacing;
}
