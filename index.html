<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA BREACH - DELUXE EDITION</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;

    }
    canvas {
      display: block;

      image-rendering: auto;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
'use strict';

window.onerror = function(msg, url, line, col, err) {
  var c = document.getElementById('canvas');
  if (c) {
    var cx = c.getContext('2d');
    cx.setTransform(1,0,0,1,0,0);
    cx.fillStyle = '#000';
    cx.fillRect(0,0,c.width,c.height);
    cx.fillStyle = '#ff0000';
    cx.font = '14px monospace';
    cx.fillText('ERROR: ' + msg, 10, 30);
    cx.fillText('Line: ' + line + ' Col: ' + col, 10, 50);
    if (err && err.stack) {
      var lines = err.stack.split('\n');
      for (var i = 0; i < Math.min(lines.length, 8); i++) {
        cx.fillText(lines[i].substring(0, 60), 10, 70 + i * 18);
      }
    }
  }
};

(function() {
  // ============================================================================
  // CONSTANTS
  // ============================================================================
  const CANVAS_WIDTH = 420;
  const CANVAS_HEIGHT = 750;
  const FIXED_DT = 1000 / 60;
  const MAX_DELTA_FRAMES = 4;
  const MAX_PARTICLES = 500;
  const BIOME_TRANSITION_FRAMES = 20;
  const MUSIC_BPM = 130;

  // ============================================================================
  // AUDIO CONTEXT
  // ============================================================================
  let audioContext = null;
  let audioMuted = false;
  let musicOscillators = [];
  let musicGains = [];

  function initAudio() {
    if (!audioContext) {
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {
        audioMuted = true;
      }

  // ============================================================================
  // GAME STATE
  // ============================================================================
  let gameState = 'menu'; // menu, play, dead, upgrade, pause
  let screen = 'main'; // main, ships, achievements, daily
  let score = 0;
  let wave = 0;

  // SCREEN SHAKE

  function triggerShake(intensity, dur) { shakeIntensity = intensity; shakeTimer = dur; }

  // SCREEN FLASH
  let flashTimer = 0, flashColor = '#ffffff';

  // SCORE POPUPS
  let scorePopups = [];
  function addScorePopup(x, y, text, color, size) {
    scorePopups.push({ x, y, text, color, size: size || 14, timer: 60, maxTimer: 60 });
  }

  // WAVE ANNOUNCEMENT
  let waveAnnouncement = null;
  function showWaveAnnouncement(text, sub, dur) {
    waveAnnouncement = { text, sub: sub || '', timer: dur || 120, maxTimer: dur || 120 };
  }

  // COMBO TIMER
  let comboTimer = 0;
  const COMBO_TIMEOUT = 2.5;
  function getComboMul() {
    return combo >= 50 ? 5 : combo >= 20 ? 3 : combo >= 10 ? 2 : combo >= 5 ? 1.5 : 1;
  }

  // ============================================================================
  // BIOME SYSTEM
  // ============================================================================
  const BIOMES = [
    {

      waveRange: [1, 5],
      colors: { top: '#0a0a1a', bottom: '#1a0a2a' },
      nebulaHue: { min: 250, max: 290 },
      desc: 'The endless void',

    },
    {
      id: 'nebula',
      name: 'NEBULA CORE',
      waveRange: [6, 10],
      colors: { top: '#0a1a3a', bottom: '#1a2a4a' },
      nebulaHue: { min: 180, max: 240 },
      desc: 'A cosmic nebula',
      bassNotes: [55, 62, 65, 62], // A1, D2, E2, D2
      minorKey: true
    },
    {
      id: 'crimson',
      name: 'CRIMSON RIFT',
      waveRange: [11, 15],
      colors: { top: '#3a0a0a', bottom: '#4a1a0a' },
      nebulaHue: { min: 0, max: 30 },
      desc: 'A crimson wasteland',
      bassNotes: [55, 58, 52, 55], // A1, Bb1, E1, A1
      minorKey: true
    },
    {
      id: 'frozen',
      name: 'FROZEN ABYSS',
      waveRange: [16, 20],
      colors: { top: '#0a1a3a', bottom: '#1a3a5a' },
      nebulaHue: { min: 180, max: 220 },
      desc: 'Frozen depths',
      bassNotes: [55, 62, 67, 62], // A1, D2, G2, D2
      minorKey: true
    },
    {
      id: 'solar',
      name: 'SOLAR STORM',
      waveRange: [21, 999],
      colors: { top: '#3a2a0a', bottom: '#5a4a1a' },
      nebulaHue: { min: 20, max: 60 },
      desc: 'Solar inferno',
      bassNotes: [55, 59, 62, 59], // A1, B1, D2, B1
      minorKey: true
    }
  ];

  function getCurrentBiome() {
    for (let b of BIOMES) {
      if (wave >= b.waveRange[0] && wave <= b.waveRange[1]) {
        return b;
      }
    }
    return BIOMES[0];
  }

  // ============================================================================
  // ACHIEVEMENT SYSTEM
  // ============================================================================
  const ACHIEVEMENTS = [
    { id: 'first_blood', name: 'First Blood', desc: 'Kill 1 enemy', reward: 10, unlocked: false },
    { id: 'combo_king', name: 'Combo King', desc: 'Reach 20 combo', reward: 50, unlocked: false },
    { id: 'boss_slayer', name: 'Boss Slayer', desc: 'Kill first boss', reward: 100, unlocked: false },
    { id: 'wave_10', name: 'Wave 10', desc: 'Reach wave 10', reward: 100, unlocked: false },
    { id: 'unstoppable', name: 'Unstoppable', desc: 'Reach wave 20', reward: 500, unlocked: false },
    { id: 'gold_rush', name: 'Gold Rush', desc: 'Collect 1000 gold total', reward: 200, unlocked: false },
    { id: 'speed_demon', name: 'Speed Demon', desc: 'Dash 50 times in one run', reward: 50, unlocked: false },
    { id: 'pacifist', name: 'Pacifist', desc: 'Survive 30s without killing', reward: 100, unlocked: false },
    { id: 'glass_cannon', name: 'Glass Cannon', desc: 'Beat wave 5 with 1 HP', reward: 200, unlocked: false },
    { id: 'collector', name: 'Collector', desc: 'Pick up 100 items in one run', reward: 100, unlocked: false },
    { id: 'max_level', name: 'Max Level', desc: 'Reach level 10', reward: 200, unlocked: false },
    { id: 'millionaire', name: 'Millionaire', desc: 'Score 100,000 points', reward: 500, unlocked: false }
  ];

  let achievementToast = null;

  function unlockAchievement(id) {
    const ach = ACHIEVEMENTS.find(a => a.id === id);
    if (ach && !ach.unlocked) {
      ach.unlocked = true;
      gold += ach.reward;
      achievementToast = { text: `ACHIEVEMENT: ${ach.name}! +${ach.reward}G`, timer: 120 };
      savePersistentData();
    }
  }

  // ============================================================================
  // SHIP SYSTEM
  // ============================================================================
  const SHIPS = [
    {
      id: 'viper',
      name: 'VIPER',
      desc: 'Balanced Fighter',
      cost: 0,
      unlocked: true,
      color: '#00aaff',
      statMods: { speedMul: 1.0, hpAdd: 0, damageMul: 1.0, magnetMul: 1.0, fireMul: 1.0, dashLen: 1.0 }
    },
    {
      id: 'phantom',
      name: 'PHANTOM',
      desc: '+30% Speed, -1 HP',
      cost: 500,
      unlocked: false,
      color: '#aa00ff',
      statMods: { speedMul: 1.3, hpAdd: -1, damageMul: 1.0, magnetMul: 1.0, fireMul: 1.0, dashLen: 1.0 }
    },
    {
      id: 'titan',
      name: 'TITAN',
      desc: '+3 HP, -30% Speed, +10% DMG',
      cost: 1000,
      unlocked: false,
      color: '#ffaa00',
      statMods: { speedMul: 0.7, hpAdd: 3, damageMul: 1.1, magnetMul: 1.0, fireMul: 1.0, dashLen: 1.0 }
    },
    {
      id: 'spectre',
      name: 'SPECTRE',
      desc: '+50% Magnet, +20% Fire, +2x Dash',
      cost: 2000,
      unlocked: false,
      color: '#00ff88',
      statMods: { speedMul: 1.0, hpAdd: 0, damageMul: 1.0, magnetMul: 1.5, fireMul: 1.2, dashLen: 2.0 }
    }
  ];

  let selectedShipIndex = 0;

  // ============================================================================
  // DAILY CHALLENGE SYSTEM
  // ============================================================================
  function getDailyChallenge() {
    const today = new Date().toDateString();
    const seed = today.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const challenges = [
      { name: 'DOUBLE TIME', desc: '2x Enemy Speed', mod: { enemySpeedMul: 2.0 } },
      { name: 'NO DASH', desc: 'Dash disabled', mod: { noDash: true } },
      { name: 'ONE LIFE', desc: '1 HP only', mod: { oneHp: true } },
      { name: 'BOSS RUSH', desc: 'Bosses only', mod: { bossOnly: true } },
      { name: 'RAPID FIRE', desc: 'Always rapid fire on', mod: { alwaysRapid: true } },
      { name: 'DOUBLE GOLD', desc: '2x Gold drops', mod: { goldMul: 2.0 } },
      { name: 'SLOW MO', desc: '0.5x Enemy Speed', mod: { enemySpeedMul: 0.5 } },
      { name: 'MAGNET', desc: '2x Pickup range', mod: { magnetMul: 2.0 } }
    ];
    return challenges[seed % challenges.length];
  }

  let dailyChallenge = getDailyChallenge();
  let activeDailyMod = null;

  // ============================================================================
  // STREAK SYSTEM
  // ============================================================================
  function getPlayStreak() {
    const lastPlayDate = localStorage.getItem('void_rift_last_play_date');
    const streakCount = parseInt(localStorage.getItem('void_rift_streak_count') || '0', 10);
    const today = new Date().toDateString();

    if (lastPlayDate === today) {
      return streakCount;
    }
    const lastDate = lastPlayDate ? new Date(lastPlayDate) : null;
    const todayDate = new Date(today);
    if (lastDate) {
      const diff = (todayDate - lastDate) / (1000 * 60 * 60 * 24);
      if (Math.abs(diff - 1) < 0.5) {
        return streakCount + 1;
      }
    }
    return 1;
  }

  function getStreakMultiplier() {
    const streak = getPlayStreak();
    if (streak >= 7) return 2.0;
    if (streak >= 5) return 1.5;
    if (streak >= 3) return 1.2;
    if (streak >= 2) return 1.1;
    return 1.0;
  }

  function recordPlayToday() {
    const today = new Date().toDateString();
    const lastPlayDate = localStorage.getItem('void_rift_last_play_date');
    if (lastPlayDate !== today) {
      const currentStreak = getPlayStreak();
      localStorage.setItem('void_rift_last_play_date', today);
      localStorage.setItem('void_rift_streak_count', currentStreak);
    }
  }

  // ============================================================================
  // PLAYER
  // ============================================================================
  let player = {
    x: CANVAS_WIDTH / 2,
    y: CANVAS_HEIGHT - 80,
    vx: 0,
    vy: 0,
    radius: 12,
    maxHp: 4,
    hp: 4,
    weapon: 'blaster',
    fireTimer: 0,
    dashCooldown: 0,
    dashLength: 200,
    dashActive: false,
    dashTimer: 0,
    dashDir: 0,
    magnetRange: 100,
    shield: 0,
    color: '#00aaff',
    speed: 200
  };

  function resetPlayer() {
    const ship = SHIPS[selectedShipIndex];
    const mods = ship.statMods;
    player.x = CANVAS_WIDTH / 2;
    player.y = CANVAS_HEIGHT - 80;
    player.vx = 0;
    player.vy = 0;
    player.maxHp = Math.max(1, 4 + mods.hpAdd + (activeDailyMod?.mod.oneHp ? -3 : 0));
    player.hp = player.maxHp;
    player.weapon = 'blaster';
    player.fireTimer = 0;
    player.dashCooldown = 0;
    player.dashLength = 200 * mods.dashLen;
    player.magnetRange = 100 * mods.magnetMul * (activeDailyMod?.mod.magnetMul || 1.0);
    player.shield = 0;
    player.color = ship.color;
    player.speed = 200;
    player.invulnTimer = 0;
  }

  // ============================================================================
  // WEAPONS
  // ============================================================================
  const WEAPONS = {
    blaster: {
      name: 'BLASTER',
      desc: 'Standard weapon',
      fireRate: 1.0,
      bulletDamage: 1.0,
      bulletSpeed: 400,
      color: '#00ff00'
    },
    laser: {
      name: 'LASER',
      desc: 'Continuous beam',
      fireRate: 1.0,
      bulletDamage: 0.3,
      bulletSpeed: 0,
      color: '#00ff00'
    },
    missiles: {
      name: 'MISSILES',
      desc: 'Homing projectiles',
      fireRate: 0.33,
      bulletDamage: 2.0,
      bulletSpeed: 250,
      color: '#ffff00'
    }
  };

  let laserActive = false;
  let laserTarget = null;

  function switchWeapon(weaponId) {
    if (WEAPONS[weaponId]) {
      player.weapon = weaponId;
      laserActive = false;
      laserTarget = null;
      playUISound('click');
    }
  }

  // ============================================================================
  // ENEMIES
  // ============================================================================
  let enemies = [];
  let waveEnemiesRemaining = 0;
  let nextWaveTimer = null;
  let bossKilled = false;
  let bossPhaseChangeTimer = 0;

  const ENEMY_TYPES = {
    drone: {
      radius: 8,
      maxHp: 1,
      speed: 100,
      fireRate: 1.5,
      bulletDamage: 0.5,
      color: '#ff3300',
      points: 10,
      goldDrop: 5
    },
    scout: {
      radius: 6,
      maxHp: 1,
      speed: 180,
      fireRate: 0.8,
      bulletDamage: 0.5,
      color: '#ffaa00',
      points: 15,
      goldDrop: 8
    },
    tank: {
      radius: 14,
      maxHp: 4,
      speed: 60,
      fireRate: 0.5,
      bulletDamage: 1.0,
      color: '#00ff00',
      points: 40,
      goldDrop: 15
    },
    shooter: {
      radius: 10,
      maxHp: 2,
      speed: 80,
      fireRate: 0.6,
      bulletDamage: 1.0,
      color: '#0088ff',
      points: 25,
      goldDrop: 12
    },
    bomber: {
      radius: 11,
      maxHp: 3,
      speed: 120,
      fireRate: 2.0,
      bulletDamage: 1.5,
      color: '#ff00ff',
      points: 35,
      goldDrop: 14
    },
    boss: {
      radius: 25,
      maxHp: 30,
      speed: 80,
      fireRate: 0.5,
      bulletDamage: 1.5,
      color: '#ffff00',
      points: 500,
      goldDrop: 100
    }
  };

  function spawnEnemy(type, x, y, formationData) {
    if (!ENEMY_TYPES[type]) return;
    const spec = ENEMY_TYPES[type];
    const speedMul = activeDailyMod?.mod.enemySpeedMul || 1.0;
    enemies.push({
      type,
      x,
      y,
      vx: 0,
      vy: (type === 'boss') ? 60 : 100,
      radius: spec.radius,
      maxHp: spec.maxHp,
      hp: spec.maxHp,
      speed: spec.speed * speedMul,
      fireRate: spec.fireRate,
      fireTimer: 0,
      bulletDamage: spec.bulletDamage,
      color: spec.color,
      points: spec.points,
      goldDrop: spec.goldDrop,
      shootCooldown: 0,
      bossPhase: 0,
      bossTimer: 0,
      bossAttackTimer: 0,
      chargeTimer: 0,
      fireTrail: [],
      iceWalls: [],
      formationData: formationData || {},
      movementPattern: formationData?.pattern || 'sine',
      patternTime: 0,
      flashTimer: 0,
      worldTime: 0
    });
  }

  // Formation types
  const FORMATIONS = ['v', 'circle', 'line', 'diamond', 'scatter'];

  function getFormation(waveNum) {
    return FORMATIONS[waveNum % FORMATIONS.length];
  }

  function spawnWave(waveNum) {
    enemies = [];
    const isBossWave = (waveNum % 5 === 0);
    bossKilled = false;
    bossPhaseChangeTimer = 0;

    if (isBossWave) {
      const bx = CANVAS_WIDTH / 2;
      spawnEnemy('boss', bx, 80, { pattern: 'orbit' });
      waveEnemiesRemaining = 1;
      showWaveAnnouncement('BOSS INCOMING!', 'Wave ' + waveNum, 120);
      triggerShake(4, 10);
      playBossEntranceSound();
    } else {
      const formation = getFormation(waveNum);
      const baseCount = 3 + Math.floor(waveNum / 2);
      const totalEnemies = Math.min(baseCount + waveNum, 20);
      waveEnemiesRemaining = totalEnemies;

      if (formation === 'v') {
        spawnVFormation(totalEnemies);
      } else if (formation === 'circle') {
        spawnCircleFormation(totalEnemies);
      } else if (formation === 'line') {
        spawnLineFormation(totalEnemies);
      } else if (formation === 'diamond') {
        spawnDiamondFormation(totalEnemies);
      } else {
        spawnScatterFormation(totalEnemies);
      }

      showWaveAnnouncement(`WAVE ${waveNum}`, formation.toUpperCase() + ' FORMATION', 80);
      triggerShake(2, 5);
    }
  }

  function spawnVFormation(count) {
    const centerX = CANVAS_WIDTH / 2;
    const startY = 60;
    const spacing = 50;
    const patterns = ['sine', 'figure8', 'strafe'];

    for (let i = 0; i < count; i++) {
      const offset = i - Math.floor(count / 2);
      const x = centerX + offset * spacing;
      const y = startY - Math.abs(offset) * 30;
      const pattern = patterns[Math.floor(Math.random() * patterns.length)];
      const type = pickEnemyType(wave);
      spawnEnemy(type, x, y, { pattern, formation: 'v' });
    }
  }

  function spawnCircleFormation(count) {
    const centerX = CANVAS_WIDTH / 2;
    const centerY = 100;
    const radius = 80;
    const patterns = ['orbit', 'strafe'];

    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2;
      const x = centerX + Math.cos(angle) * radius;
      const y = centerY + Math.sin(angle) * radius;
      const pattern = patterns[Math.floor(Math.random() * patterns.length)];
      const type = pickEnemyType(wave);
      spawnEnemy(type, x, y, { pattern, formation: 'circle', angle });
    }
  }

  function spawnLineFormation(count) {
    const startX = 0;
    const centerY = 100;
    const spacing = CANVAS_WIDTH / (count + 1);

    for (let i = 0; i < count; i++) {
      const x = spacing * (i + 1);
      const type = pickEnemyType(wave);
      spawnEnemy(type, x, centerY, { pattern: 'strafe', formation: 'line', sweepDir: i % 2 ? 1 : -1 });
    }
  }

  function spawnDiamondFormation(count) {
    const centerX = CANVAS_WIDTH / 2;
    const centerY = 100;
    const patterns = ['orbit', 'divebomb'];

    for (let i = 0; i < count; i++) {
      const ratio = i / Math.max(1, count - 1);
      const angle = ratio * Math.PI * 2;
      const distance = 60 + (i % 2) * 40;
      const x = centerX + Math.cos(angle) * distance;
      const y = centerY + Math.sin(angle) * distance;
      const pattern = patterns[Math.floor(Math.random() * patterns.length)];
      const type = pickEnemyType(wave);
      spawnEnemy(type, x, y, { pattern, formation: 'diamond', angle });
    }
  }

  function spawnScatterFormation(count) {
    for (let i = 0; i < count; i++) {
      const x = Math.random() * CANVAS_WIDTH;
      const y = Math.random() * (CANVAS_HEIGHT * 0.3) + 40;
      const type = pickEnemyType(wave);
      spawnEnemy(type, x, y, { pattern: 'sine' });
    }
  }

  function pickEnemyType(waveNum) {
    if (waveNum <= 3) {
      return Math.random() < 0.7 ? 'drone' : 'scout';
    } else if (waveNum <= 8) {
      const r = Math.random();
      return r < 0.4 ? 'drone' : r < 0.7 ? 'scout' : 'shooter';
    } else if (waveNum <= 15) {
      const r = Math.random();
      return r < 0.3 ? 'shooter' : r < 0.6 ? 'tank' : 'bomber';
    } else {
      const r = Math.random();
      return r < 0.2 ? 'tank' : r < 0.5 ? 'bomber' : 'scout';
    }
  }

  let enemyBullets = [];

  function spawnEnemyBullet(ex, ey, angle, damage, color) {
    enemyBullets.push({
      x: ex,
      y: ey,
      vx: Math.cos(angle) * 200,
      vy: Math.sin(angle) * 200,
      damage,
      color: color || '#ff0000',
      radius: 4,
      trail: [],
      age: 0
    });
  }

  // ============================================================================
  // PROJECTILES & PICKUPS
  // ============================================================================
  let playerBullets = [];
  let pickups = [];
  let particles = [];

  function spawnPlayerBullet(x, y, vx, vy, damage, bulletType) {
    playerBullets.push({
      x, y, vx, vy, damage, bulletType,
      radius: 3,
      target: null,
      trail: [],
      pierceCount: 0,
      maxPierce: runUpgrades.includes('piercing') ? 1 : 0
    });
  }

  function spawnPickup(x, y, type) {
    pickups.push({ x, y, type, timer: 300, radius: 8, collected: false });
  }

  function spawnExplosion(x, y, size, color) {
    triggerShake(Math.min(5, size / 20), 8);
    for (let i = 0; i < 20 + size / 10; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 150 + Math.random() * 200;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: 2 + Math.random() * 3,
        color: color || '#ffaa00',
        timer: 0.5 + Math.random() * 0.5,
        maxTimer: 0.5 + Math.random() * 0.5,
        type: 'debris'
      });
    }
    // Ring effect
    for (let i = 0; i < 3; i++) {
      particles.push({
        x, y,
        vx: 0, vy: 0,
        radius: 5,
        color: color || '#ffaa00',
        timer: 0.3,
        maxTimer: 0.3,
        maxRadius: 40 + i * 30,
        type: 'ring'
      });
    }
  }

  // ============================================================================
  // UPGRADE SYSTEM (Between waves)
  // ============================================================================
  let upgradeSelection = null;
  let selectedUpgradeIndex = -1;

  const AVAILABLE_UPGRADES = [
    { id: 'maxhp', name: '+1 Max HP', desc: 'Increase max health' },
    { id: 'firerate', name: '+15% Fire Rate', desc: 'Shoot faster' },

  function showUpgradeSelection() {
    const availableUpgrades = AVAILABLE_UPGRADES.filter(u => !runUpgrades.includes(u.id));
    const shuffled = availableUpgrades.sort(() => Math.random() - 0.5);
    upgradeSelection = {
      upgrades: shuffled.slice(0, 3),
      timer: 0
    };
    selectedUpgradeIndex = -1;
  }

  function applyUpgrade(upgradeId) {
    if (!runUpgrades.includes(upgradeId)) {
      runUpgrades.push(upgradeId);
    }

    if (upgradeId === 'maxhp') {
      player.maxHp++;
      player.hp = player.maxHp;
    } else if (upgradeId === 'firerate') {
      const w = WEAPONS[player.weapon];
      if (w) w.fireRate *= 0.87;
    } else if (upgradeId === 'movespeed') {
      player.speed *= 1.2;
    } else if (upgradeId === 'damage') {
      const w = WEAPONS[player.weapon];
      if (w) w.bulletDamage *= 1.25;
    } else if (upgradeId === 'magnet') {
      player.magnetRange *= 1.3;
    }

    upgradeSelection = null;
    selectedUpgradeIndex = -1;
  }

  // ============================================================================
  // PROCEDURAL MUSIC SYSTEM
  // ============================================================================
  function playKickDrum(time, duration) {
    if (!audioContext || audioMuted) return;
    try {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.frequency.setValueAtTime(150, time);
      osc.frequency.exponentialRampToValueAtTime(0.01, time + duration);

      gain.gain.setValueAtTime(0.3, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + duration);

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.start(time);
      osc.stop(time + duration);
      musicOscillators.push(osc);
    } catch (e) {}
  }

  function playHiHat(time) {
    if (!audioContext || audioMuted) return;
    try {
      const noise = audioContext.createBufferSource();
      const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.1, audioContext.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseBuffer.length; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      noise.buffer = noiseBuffer;

      const filter = audioContext.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 8000;

      const gain = audioContext.createGain();
      gain.gain.setValueAtTime(0.08, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);

      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioContext.destination);

      noise.start(time);
      noise.stop(time + 0.05);
    } catch (e) {}
  }

  function playBassSynth(time, frequency, duration) {
    if (!audioContext || audioMuted) return;
    try {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(frequency, time);

      gain.gain.setValueAtTime(0.12, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + duration);

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.start(time);
      osc.stop(time + duration);
      musicOscillators.push(osc);
    } catch (e) {}
  }

  function playAtmosphericPad(time, duration) {
    if (!audioContext || audioMuted) return;
    try {
      const oscs = [];
      const baseFreq = 55;

      for (let i = 0; i < 3; i++) {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(baseFreq * (1 + i * 0.01), time);

        gain.gain.setValueAtTime(0.02, time);
        gain.gain.linearRampToValueAtTime(0.02, time + duration);

        osc.connect(gain);
        gain.connect(audioContext.destination);

        osc.start(time);
        osc.stop(time + duration);
        oscs.push(osc);
      }
      musicOscillators.push(...oscs);
    } catch (e) {}
  }

  function startProceduralMusic() {
    if (audioMuted || !audioContext) return;
    const now = audioContext.currentTime;

    musicOscillators.forEach(osc => {
      try { osc.stop(now + 0.1); } catch (e) {}
    });
    musicOscillators = [];

    const biome = getCurrentBiome();
    const tempo = MUSIC_BPM / 60;
    const beatDur = 1 / tempo;
    const loopDur = beatDur * 16;

    // Kick pattern (beats 1 and 3)
    for (let beat = 0; beat < 16; beat += 2) {
      const beatTime = now + beat * beatDur;
      playKickDrum(beatTime, 0.3);
    }

    // Hi-hat on 8th notes
    for (let beat = 0; beat < 16; beat += 0.5) {
      const beatTime = now + beat * beatDur;
      playHiHat(beatTime);
    }

    // Bass synth line
    const bassNotes = biome.bassNotes || [55, 62, 49, 55];
    for (let i = 0; i < 4; i++) {
      const beatTime = now + i * beatDur * 4;
      playBassSynth(beatTime, bassNotes[i % bassNotes.length], beatDur * 4 * 0.8);
    }

    // Atmospheric pad
    playAtmosphericPad(now, loopDur);

    // Loop music
    const loopTimer = setInterval(() => {
      if (gameState !== 'play' && gameState !== 'upgrade') {
        clearInterval(loopTimer);
        return;
      }
      const now2 = audioContext.currentTime;
      for (let beat = 0; beat < 16; beat += 2) {
        playKickDrum(now2 + beat * beatDur, 0.3);
      }
      for (let beat = 0; beat < 16; beat += 0.5) {
        playHiHat(now2 + beat * beatDur);
      }
      const bassNotes2 = biome.bassNotes || [55, 62, 49, 55];
      for (let i = 0; i < 4; i++) {
        playBassSynth(now2 + i * beatDur * 4, bassNotes2[i % bassNotes2.length], beatDur * 4 * 0.8);
      }
      playAtmosphericPad(now2, loopDur);
    }, loopDur * 1000 - 100);
  }

      gold = data.gold || 0;
      totalGoldEarned = data.totalGoldEarned || 0;

  // ============================================================================
  // RENDERING
  // ============================================================================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let lastTime = Date.now();

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = CANVAS_WIDTH * window.devicePixelRatio;
    canvas.height = CANVAS_HEIGHT * window.devicePixelRatio;
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  }

  // Helper: convert any CSS color to rgba with given alpha
  function colorAlpha(color, alpha) {
    if (color.startsWith('#')) {
      const hex = color.length === 4
        ? color[1]+color[1]+color[2]+color[2]+color[3]+color[3]
        : color.slice(1);
      const r = parseInt(hex.substring(0,2),16);
      const g = parseInt(hex.substring(2,4),16);
      const b = parseInt(hex.substring(4,6),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }
    if (color.startsWith('rgba')) return color.replace(/,[^,]*\)$/, `,${alpha})`);
    if (color.startsWith('rgb')) return color.replace('rgb', 'rgba').replace(')', `,${alpha})`);
    return color;
  }

  function rrPath(x, y, w, h, r) {
    const path = new Path2D();
    path.moveTo(x + r, y);
    path.lineTo(x + w - r, y);
    path.arcTo(x + w, y, x + w, y + r, r);
    path.lineTo(x + w, y + h - r);
    path.arcTo(x + w, y + h, x + w - r, y + h, r);
    path.lineTo(x + r, y + h);
    path.arcTo(x, y + h, x, y + h - r, r);
    path.lineTo(x, y + r);
    path.arcTo(x, y, x + r, y, r);
    path.closePath();
    return path;
  }

  function drawButton(ctx, cx, cy, w, h, text, color) {
    const path = rrPath(cx - w / 2, cy - h / 2, w, h, 8);

    // Dark gradient fill (glass effect)
    const grad = ctx.createLinearGradient(cx - w / 2, cy - h / 2, cx - w / 2, cy + h / 2);
    grad.addColorStop(0, 'rgba(20, 25, 40, 0.9)');
    grad.addColorStop(1, 'rgba(10, 12, 25, 0.9)');
    ctx.fillStyle = grad;
    ctx.fill(path);

    // Subtle top highlight
    const topPath = rrPath(cx - w / 2, cy - h / 2, w, h * 0.4, 8);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
    ctx.fill(topPath);

    // Colored border with reduced opacity
    ctx.strokeStyle = color || '#00ccff';
    ctx.globalAlpha = 0.6;
    ctx.lineWidth = 2;
    ctx.stroke(path);
    ctx.globalAlpha = 1;

    // Outer glow
    ctx.shadowColor = color || '#00ccff';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = color || '#00ccff';
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = 1;
    ctx.stroke(path);
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Text in accent color
    ctx.fillStyle = color || '#00ccff';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, cx, cy);
  }

  function drawNebulaBackground() {
    const biome = getCurrentBiome();
    const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
    grad.addColorStop(0, biome.colors.top);
    grad.addColorStop(1, biome.colors.bottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    // Starfield with parallax scrolling (3 layers)
    const starLayers = [
      { count: 50, speed: 0.3, size: 0.5 },
      { count: 60, speed: 0.5, size: 1 },
      { count: 40, speed: 0.8, size: 1.5 }
    ];

    const time = Date.now() * 0.0001;
    for (let layer of starLayers) {
      for (let i = 0; i < layer.count; i++) {
        const seed = Math.sin(i * 12.9898) * 43758.5453;
        const sx = ((seed - Math.floor(seed)) * CANVAS_WIDTH + time * layer.speed * 100) % CANVAS_WIDTH;
        const sy = ((Math.sin(i * 78.233 + seed) * 0.5 + 0.5) * CANVAS_HEIGHT);
        const twinkle = Math.sin(Date.now() * 0.001 + i) * 0.5 + 0.5;
        const opacity = 0.3 + twinkle * 0.4;
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
        ctx.beginPath();
        ctx.arc(sx, sy, layer.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Subtle nebula wisps with low opacity
    try {
    ctx.globalAlpha = 0.05;
    for (let i = 0; i < 7; i++) {
      const seed = Math.sin(i * 23.456) * 43758.5453;
      const nx = (seed - Math.floor(seed)) * CANVAS_WIDTH;
      const ny = (Math.sin(i * 45.789) * 0.5 + 0.5) * CANVAS_HEIGHT;
      const seedFrac = seed - Math.floor(seed);
      const rad = ctx.createRadialGradient(nx, ny, 0, nx, ny, 30 + seedFrac * 50);
      const hueObj = biome.nebulaHue || { min: 250, max: 290 };
      const hue = typeof hueObj === 'number' ? hueObj : (hueObj.min + hueObj.max) / 2;
      rad.addColorStop(0, `hsl(${hue}, 70%, 50%)`);
      rad.addColorStop(1, `hsl(${hue}, 70%, 20%)`);
      ctx.fillStyle = rad;
      ctx.fillRect(nx - 40, ny - 40, 80, 80);
    }
    ctx.globalAlpha = 1;
    } catch(e) { ctx.globalAlpha = 1; }

    // Space dust particles
    try {
    ctx.globalAlpha = 0.15;
    for (let i = 0; i < 20; i++) {
      const seed = Math.sin(i * 34.567) * 43758.5453;
      const dx = (seed - Math.floor(seed)) * CANVAS_WIDTH;
      const dy = ((Math.sin(i * 56.789 + seed) * 0.5 + 0.5) * CANVAS_HEIGHT + Date.now() * 0.01 * (i * 0.01)) % CANVAS_HEIGHT;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.beginPath();
      const dustFrac = seed - Math.floor(seed);
      ctx.arc(dx, dy, 1 + dustFrac * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    } catch(e) { ctx.globalAlpha = 1; }
  }

  function drawPlayer() {
    const ship = SHIPS[selectedShipIndex];

    // Skip rendering every other frame during invulnerability
    if (player.invulnTimer > 0 && Math.floor(player.invulnTimer * 10) % 2 === 0) {
      return;
    }

    ctx.save();
    ctx.translate(player.x, player.y);

    // Engine exhaust (flame trails)
    const exhaustLength1 = 8 + Math.random() * 5;
    const exhaustLength2 = 7 + Math.random() * 6;

    // Left exhaust
    const grad1 = ctx.createLinearGradient(0, 0, -2, exhaustLength1);
    grad1.addColorStop(0, 'rgba(255, 150, 0, 1)');
    grad1.addColorStop(0.5, 'rgba(255, 100, 0, 0.5)');
    grad1.addColorStop(1, 'rgba(255, 100, 0, 0)');
    ctx.fillStyle = grad1;
    ctx.beginPath();
    ctx.moveTo(-2, 5);
    ctx.lineTo(-4, 5 + exhaustLength1);
    ctx.lineTo(0, 5 + exhaustLength1);
    ctx.closePath();
    ctx.fill();

    // Right exhaust
    const grad2 = ctx.createLinearGradient(0, 0, 2, exhaustLength2);
    grad2.addColorStop(0, 'rgba(255, 150, 0, 1)');
    grad2.addColorStop(0.5, 'rgba(255, 100, 0, 0.5)');
    grad2.addColorStop(1, 'rgba(255, 100, 0, 0)');
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.moveTo(2, 5);
    ctx.lineTo(4, 5 + exhaustLength2);
    ctx.lineTo(0, 5 + exhaustLength2);
    ctx.closePath();
    ctx.fill();

    // Glow effect
    ctx.shadowColor = ship.color;
    ctx.shadowBlur = 18;

    // Main hull - spaceship shape
    ctx.fillStyle = ship.color;
    ctx.beginPath();
    ctx.moveTo(0, -14);  // Pointed nose
    ctx.lineTo(8, 2);    // Right wing sweep back
    ctx.lineTo(6, 8);    // Right engine pod base
    ctx.lineTo(3, 12);   // Right bottom
    ctx.lineTo(-3, 12);  // Left bottom
    ctx.lineTo(-6, 8);   // Left engine pod base
    ctx.lineTo(-8, 2);   // Left wing sweep back
    ctx.closePath();
    ctx.fill();

    // Wing edges (darker shade)
    const darkColor = colorAlpha(ship.color, 0.6);
    ctx.strokeStyle = darkColor;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(8, 2);
    ctx.lineTo(6, 8);
    ctx.moveTo(0, -14);
    ctx.lineTo(-8, 2);
    ctx.lineTo(-6, 8);
    ctx.stroke();

    // Engine pods (small circles at wing tips with glow)
    ctx.shadowColor = ship.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = ship.color;
    ctx.beginPath();
    ctx.arc(6, 2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-6, 2, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Cockpit bright highlight
    ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
    ctx.shadowBlur = 8;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.beginPath();
    ctx.arc(0, -7, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Glow trail (fading circles behind ship)
    for (let i = 1; i <= 3; i++) {
      const trailOpacity = (1 - i / 4) * 0.4;
      const trailSize = player.radius * (1 - i / 4);
      ctx.fillStyle = colorAlpha(ship.color, trailOpacity);
      ctx.beginPath();
      ctx.arc(0, 8 + i * 3, trailSize, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Shield - pulsing double ring
    if (player.shield > 0) {
      const shieldAlpha = Math.min(1, player.shield / 100);
      const pulse = Math.sin(Date.now() * 0.008) * 0.3 + 0.7;

      // Outer ring
      ctx.strokeStyle = `rgba(100, 200, 255, ${shieldAlpha * 0.5})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius + 10 + pulse * 2, 0, Math.PI * 2);
      ctx.stroke();

      // Inner ring (brighter)
      ctx.strokeStyle = `rgba(150, 220, 255, ${shieldAlpha * 0.8})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius + 6, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawEnemies() {
    for (let enemy of enemies) {
      ctx.save();
      ctx.translate(enemy.x, enemy.y);

      // Subtle shadow glow in enemy color
      ctx.shadowColor = enemy.color;
      ctx.shadowBlur = 12;

      // Flash white when hit
      if (enemy.flashTimer > 0) {
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#ffffff';
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = enemy.color;
      }

      // Draw enemy shapes per type
      if (enemy.type === 'drone') {
        // Small triangular fighter pointing down
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.lineTo(7, 6);
        ctx.lineTo(-7, 6);
        ctx.closePath();
        ctx.fill();
        // Wing edges darker
        if (enemy.flashTimer === 0) {
          ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      } else if (enemy.type === 'scout') {
        // Diamond/rhombus rotating slowly
        const angle = Date.now() * 0.003;
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, -6);
        ctx.lineTo(6, 0);
        ctx.lineTo(0, 6);
        ctx.lineTo(-6, 0);
        ctx.closePath();
        ctx.fill();
      } else if (enemy.type === 'tank') {
        // Hexagon with thick border and inner detail
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = (i * Math.PI / 3);
          const x = Math.cos(angle) * 14;
          const y = Math.sin(angle) * 14;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        // Detail lines
        if (enemy.flashTimer === 0) {
          ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      } else if (enemy.type === 'shooter') {
        // Arrow/chevron pointing down
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(9, 4);
        ctx.lineTo(4, 4);
        ctx.lineTo(4, 8);
        ctx.lineTo(-4, 8);
        ctx.lineTo(-4, 4);
        ctx.lineTo(-9, 4);
        ctx.closePath();
        ctx.fill();
        // Wing glow
        if (enemy.flashTimer === 0) {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(-9, 4);
          ctx.lineTo(0, -10);
          ctx.lineTo(9, 4);
          ctx.stroke();
        }
      } else if (enemy.type === 'bomber') {
        // Fat oval/ellipse pulsing
        const pulse = Math.sin(Date.now() * 0.006) * 1.5 + 1;
        ctx.shadowBlur = 15 + pulse * 3;
        ctx.beginPath();
        ctx.ellipse(0, 0, 11, 11 + pulse, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (enemy.type === 'boss') {
        // Large diamond with rotating spike ring
        const rotation = Date.now() * 0.002;
        ctx.shadowBlur = 20;

        // Inner glowing core
        ctx.fillStyle = enemy.flashTimer > 0 ? '#ffffff' : enemy.color;
        ctx.beginPath();
        ctx.arc(0, 0, 6, 0, Math.PI * 2);
        ctx.fill();

        // Main diamond
        ctx.fillStyle = enemy.flashTimer > 0 ? '#ffffff' : enemy.color;
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(20, 0);
        ctx.lineTo(0, 20);
        ctx.lineTo(-20, 0);
        ctx.closePath();
        ctx.fill();

        // Rotating spike ring (8 spikes)
        for (let i = 0; i < 8; i++) {
          const angle = (i * Math.PI / 4) + rotation;
          const x = Math.cos(angle) * 25;
          const y = Math.sin(angle) * 25;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(x, y);
          ctx.lineTo(Math.cos(angle + 0.3) * 28, Math.sin(angle + 0.3) * 28);
          ctx.closePath();
          ctx.fill();
        }

        // Outer concentric ring
        ctx.strokeStyle = enemy.flashTimer > 0 ? '#ffffff' : enemy.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 30, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();

      // HP bar (if HP < maxHP and not boss)
      if (enemy.type !== 'boss' && enemy.hp < enemy.maxHp) {
        const barW = enemy.radius * 2 + 4;
        const barH = 2;
        const hpRatio = Math.max(0, enemy.hp / enemy.maxHp);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(enemy.x - barW / 2, enemy.y + enemy.radius + 8, barW, barH);

        const barColor = hpRatio > 0.66 ? '#00ff00' : hpRatio > 0.33 ? '#ffaa00' : '#ff0000';
        ctx.fillStyle = barColor;
        ctx.fillRect(enemy.x - barW / 2, enemy.y + enemy.radius + 8, barW * hpRatio, barH);

        ctx.strokeStyle = barColor;
        ctx.lineWidth = 0.5;
        ctx.strokeRect(enemy.x - barW / 2, enemy.y + enemy.radius + 8, barW, barH);
      }

      // Boss HP bar at top of screen (wider with glow)
      if (enemy.type === 'boss') {
        const barW = 200;
        const barH = 8;
        const hpRatio = Math.max(0, enemy.hp / enemy.maxHp);
        const barColor = hpRatio > 0.66 ? '#00ff00' : hpRatio > 0.33 ? '#ffaa00' : '#ff0000';

        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.beginPath();
        ctx.moveTo(CANVAS_WIDTH / 2 - barW / 2 + 4, 15);
        ctx.lineTo(CANVAS_WIDTH / 2 + barW / 2 - 4, 15);
        ctx.arcTo(CANVAS_WIDTH / 2 + barW / 2, 15, CANVAS_WIDTH / 2 + barW / 2, 15 + barH, 4);
        ctx.lineTo(CANVAS_WIDTH / 2 + barW / 2, 15 + barH - 4);
        ctx.arcTo(CANVAS_WIDTH / 2 + barW / 2, 15 + barH, CANVAS_WIDTH / 2 - barW / 2 + 4, 15 + barH, 4);
        ctx.lineTo(CANVAS_WIDTH / 2 - barW / 2, 15 + barH - 4);
        ctx.arcTo(CANVAS_WIDTH / 2 - barW / 2, 15 + barH, CANVAS_WIDTH / 2 - barW / 2 + 4, 15, 4);
        ctx.lineTo(CANVAS_WIDTH / 2 - barW / 2 + 4, 15);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = barColor;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.moveTo(CANVAS_WIDTH / 2 - barW / 2 + 4, 15);
        ctx.lineTo(CANVAS_WIDTH / 2 - barW / 2 + 4 + (barW - 8) * hpRatio, 15);
        ctx.arcTo(CANVAS_WIDTH / 2 - barW / 2 + 4 + (barW - 8) * hpRatio, 15, CANVAS_WIDTH / 2 - barW / 2 + 4 + (barW - 8) * hpRatio, 15 + barH, 4);
        ctx.lineTo(CANVAS_WIDTH / 2 - barW / 2 + 4, 15 + barH - 4);
        ctx.arcTo(CANVAS_WIDTH / 2 - barW / 2, 15 + barH, CANVAS_WIDTH / 2 - barW / 2 + 4, 15, 4);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;

        ctx.strokeStyle = barColor;
        ctx.shadowColor = barColor;
        ctx.shadowBlur = 8;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(CANVAS_WIDTH / 2 - barW / 2, 15, barW, barH);
        ctx.shadowBlur = 0;
      }
    }
  }

  function drawProjectiles() {
    for (let bullet of playerBullets) {
      const weaponColor = WEAPONS[player.weapon].color;
      const angle = Math.atan2(bullet.vy, bullet.vx);

      // Bright white core
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = weaponColor;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.ellipse(bullet.x, bullet.y, bullet.radius * 2, bullet.radius, angle, 0, Math.PI * 2);
      ctx.fill();

      // Colored outer glow
      ctx.fillStyle = weaponColor;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.ellipse(bullet.x, bullet.y, bullet.radius * 2.5, bullet.radius * 1.3, angle, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Trail of 3 fading dots
      for (let i = 1; i <= 3; i++) {
        const trailX = bullet.x - (bullet.vx / 60) * i * 8;
        const trailY = bullet.y - (bullet.vy / 60) * i * 8;
        const trailOpacity = (1 - i / 4) * 0.6;
        ctx.fillStyle = colorAlpha(weaponColor, trailOpacity);
        ctx.beginPath();
        ctx.arc(trailX, trailY, bullet.radius * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.shadowBlur = 0;
    }

    for (let bullet of enemyBullets) {
      const age = bullet.age || 0;
      const spin = age * 0.1;

      ctx.save();
      ctx.translate(bullet.x, bullet.y);
      ctx.rotate(spin);

      // Spinning diamond shape
      ctx.fillStyle = bullet.color;
      ctx.shadowColor = bullet.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(0, -bullet.radius);
      ctx.lineTo(bullet.radius, 0);
      ctx.lineTo(0, bullet.radius);
      ctx.lineTo(-bullet.radius, 0);
      ctx.closePath();
      ctx.fill();

      // Inner bright core
      ctx.fillStyle = '#ffff88';
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(0, 0, bullet.radius * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.restore();
      ctx.shadowBlur = 0;

      // Trail of 2 dots
      for (let i = 1; i <= 2; i++) {
        const trailX = bullet.x - (bullet.vx / 60) * i * 6;
        const trailY = bullet.y - (bullet.vy / 60) * i * 6;
        const trailOpacity = (1 - i / 3) * 0.5;
        ctx.fillStyle = colorAlpha(bullet.color, trailOpacity);
        ctx.beginPath();
        ctx.arc(trailX, trailY, bullet.radius * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawPickups() {
    for (let pickup of pickups) {
      if (pickup.collected) continue;

      const bob = Math.sin(Date.now() * 0.006) * 4;
      const pickupY = pickup.y + bob;

      ctx.save();
      ctx.translate(pickup.x, pickupY);

      let color = '#ffcc00';
      let shape = 'diamond';

      // Shape and color per type
      if (pickup.type === 'gold') {
        color = '#ffcc00';
        shape = 'diamond';
      } else if (pickup.type === 'health') {
        color = '#00ff00';
        shape = 'plus';
      } else if (pickup.type === 'shield') {
        color = '#00ccff';
        shape = 'shield';
      } else if (pickup.type === 'rapid') {
        color = '#ffaa44';
        shape = 'bolt';
      } else if (pickup.type === 'spread') {
        color = '#ff00ff';
        shape = 'star';
      }

      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = color;

      // Draw shape
      if (shape === 'diamond') {
        const rotation = Date.now() * 0.004;
        ctx.rotate(rotation);
        ctx.beginPath();
        ctx.moveTo(0, -pickup.radius);
        ctx.lineTo(pickup.radius, 0);
        ctx.lineTo(0, pickup.radius);
        ctx.lineTo(-pickup.radius, 0);
        ctx.closePath();
        ctx.fill();
      } else if (shape === 'plus') {
        ctx.fillRect(-pickup.radius * 0.4, -pickup.radius, pickup.radius * 0.8, pickup.radius * 2);
        ctx.fillRect(-pickup.radius, -pickup.radius * 0.4, pickup.radius * 2, pickup.radius * 0.8);
      } else if (shape === 'shield') {
        ctx.beginPath();
        ctx.moveTo(-pickup.radius, -pickup.radius);
        ctx.lineTo(pickup.radius, -pickup.radius);
        ctx.arcTo(pickup.radius, pickup.radius * 0.5, 0, pickup.radius, pickup.radius);
        ctx.arcTo(-pickup.radius, pickup.radius * 0.5, -pickup.radius, -pickup.radius, pickup.radius);
        ctx.closePath();
        ctx.fill();
      } else if (shape === 'bolt') {
        // Lightning bolt
        ctx.beginPath();
        ctx.moveTo(0, -pickup.radius);
        ctx.lineTo(pickup.radius * 0.4, -pickup.radius * 0.3);
        ctx.lineTo(pickup.radius * 0.2, 0);
        ctx.lineTo(pickup.radius * 0.5, pickup.radius * 0.3);
        ctx.lineTo(0, pickup.radius);
        ctx.lineTo(-pickup.radius * 0.3, pickup.radius * 0.2);
        ctx.lineTo(-pickup.radius * 0.1, -pickup.radius * 0.3);
        ctx.lineTo(-pickup.radius * 0.5, -pickup.radius * 0.2);
        ctx.closePath();
        ctx.fill();
      } else if (shape === 'star') {
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const angle = (i * Math.PI / 5) - Math.PI / 2;
          const radius = i % 2 === 0 ? pickup.radius : pickup.radius * 0.4;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
      }

      // Orbiting sparkle particles
      for (let i = 0; i < 3; i++) {
        const sparkleAngle = (Date.now() * 0.006) + (i * Math.PI * 2 / 3);
        const sparkleX = Math.cos(sparkleAngle) * (pickup.radius + 6);
        const sparkleY = Math.sin(sparkleAngle) * (pickup.radius + 6);
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.arc(sparkleX, sparkleY, 1, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  function drawParticles() {
    for (let p of particles) {
      if (p.type === 'ring') {
        const expand = p.timer / p.maxTimer;
        const radius = p.maxRadius * (1 - expand);

        // Thicker outer ring
        ctx.strokeStyle = colorAlpha(p.color, 1 - expand);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.stroke();

        // Inner ring at 0.5 opacity
        ctx.strokeStyle = colorAlpha(p.color, (1 - expand) * 0.5);
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius * 0.5, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        const alpha = p.timer / p.maxTimer;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 5;

        // Vary between square and circle
        const isSquare = Math.random() > 0.5;
        if (isSquare) {
          // Rotated square (diamond)
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(Math.PI / 4);
          ctx.fillRect(-p.radius, -p.radius, p.radius * 2, p.radius * 2);
          ctx.restore();
        } else {
          // Circle
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        }

        // Motion blur effect
        ctx.globalAlpha = alpha * 0.5;
        ctx.fillStyle = p.color;
        const blurX = p.x - (p.vx || 0) * 0.016;
        const blurY = p.y - (p.vy || 0) * 0.016;

        if (isSquare) {
          ctx.save();
          ctx.translate(blurX, blurY);
          ctx.rotate(Math.PI / 4);
          ctx.fillRect(-p.radius, -p.radius, p.radius * 2, p.radius * 2);
          ctx.restore();
        } else {
          ctx.beginPath();
          ctx.arc(blurX, blurY, p.radius, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.shadowBlur = 0;
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    const ship = SHIPS[selectedShipIndex];

    // HP bar - Rounded rectangle with gradient
    const hpPercent = Math.max(0, Math.min(1, player.hp / player.maxHp));
    const hpColor = hpPercent > 0.3 ? '#00ff00' : hpPercent > 0 ? '#ffaa00' : '#ff0000';

    // Background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    const hpBgPath = rrPath(10, 8, 100, 16, 4);
    ctx.fill(hpBgPath);

    // Fill with gradient
    const hpGrad = ctx.createLinearGradient(10, 8, 10 + 100, 8);
    hpGrad.addColorStop(0, '#00ff00');
    hpGrad.addColorStop(0.5, '#ffaa00');
    hpGrad.addColorStop(1, '#ff0000');
    ctx.fillStyle = hpGrad;
    const hpFillPath = rrPath(10, 8, 100 * hpPercent, 16, 4);
    ctx.fill(hpFillPath);

    // Border
    ctx.strokeStyle = hpColor;
    ctx.lineWidth = 1.5;
    ctx.stroke(hpBgPath);

    // Inner highlight
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
    ctx.lineWidth = 1;
    const hpHighlightPath = rrPath(11, 9, 98, 6, 3);
    ctx.stroke(hpHighlightPath);

    // HP label
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`HP: ${player.hp}/${player.maxHp}`, 115, 17);

    // Score - Larger, gold with shadow
    ctx.fillStyle = '#ccaa44';
    ctx.shadowColor = '#ccaa44';
    ctx.shadowBlur = 8;
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(`${Math.floor(score)}`, CANVAS_WIDTH - 10, 20);
    ctx.shadowBlur = 0;

    // Wave indicator with biome color
    const biome = getCurrentBiome();
    ctx.fillStyle = '#00ccff';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(`WAVE ${wave}`, CANVAS_WIDTH - 10, 40);

    // Combo display - Pulsing with size scaling
    if (combo > 0) {
      const comboFontSize = Math.min(28, 14 + combo * 0.3);
      ctx.fillStyle = combo >= 20 ? '#ff0000' : '#ffaa00';
      ctx.font = `bold ${comboFontSize}px Arial`;
      ctx.textAlign = 'center';
      ctx.shadowColor = ctx.fillStyle;
      const pulse = Math.sin(Date.now() * 0.008) * 8 + 2;
      ctx.shadowBlur = pulse;
      ctx.fillText(`COMBO x${combo}`, CANVAS_WIDTH / 2, 30);
      ctx.shadowBlur = 0;
    }

    // XP bar - Thin elegant bar at bottom
    const xpPercent = Math.max(0, Math.min(1, xp / xpNeeded));
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(10, CANVAS_HEIGHT - 12, 100, 6);

    const xpGrad = ctx.createLinearGradient(10, CANVAS_HEIGHT - 12, 110, CANVAS_HEIGHT - 12);
    xpGrad.addColorStop(0, '#aa88ff');
    xpGrad.addColorStop(1, '#ff88ff');
    ctx.fillStyle = xpGrad;
    ctx.fillRect(10, CANVAS_HEIGHT - 12, 100 * xpPercent, 6);

    ctx.strokeStyle = '#aa88ff';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(10, CANVAS_HEIGHT - 12, 100, 6);

    // Kill counter
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '10px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Kills: ${enemiesKilled}`, 10, CANVAS_HEIGHT - 18);

    // Gold counter
    ctx.fillStyle = '#ccaa44';
    ctx.font = '10px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Gold: ${Math.floor(gold || 0)}`, 70, CANVAS_HEIGHT - 18);

    // Weapon indicator
    ctx.fillStyle = '#00ccff';
    ctx.font = '11px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(WEAPONS[player.weapon].name, CANVAS_WIDTH - 10, CANVAS_HEIGHT - 18);

    // Achievement toast
    if (achievementToast) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, CANVAS_HEIGHT - 35, CANVAS_WIDTH, 30);

      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(achievementToast.text, CANVAS_WIDTH / 2, CANVAS_HEIGHT - 12);
    }

    // Virtual joystick overlay (touch controls)
    if (joystickVisible && touchActive) {
      // Outer ring
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(touchStartX, touchStartY, 50, 0, Math.PI * 2);
      ctx.stroke();

      // Inner thumb
      const dx = touchCurrentX - touchStartX;
      const dy = touchCurrentY - touchStartY;
      const dist = Math.min(Math.hypot(dx, dy), 50);
      const angle = Math.atan2(dy, dx);
      const thumbX = touchStartX + Math.cos(angle) * dist;
      const thumbY = touchStartY + Math.sin(angle) * dist;

      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.beginPath();
      ctx.arc(thumbX, thumbY, 15, 0, Math.PI * 2);
      ctx.fill();
    }

    // Screen pulse for high combo
    if (combo >= 20) {
      const pulse = Math.sin(Date.now() * 0.01) * 0.1 + 0.1;
      ctx.fillStyle = `rgba(255, 255, 0, ${pulse * 0.1})`;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    }
  }
