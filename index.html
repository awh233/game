<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID RIFT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #000;
      width: 100vw;
      height: 100vh;
      max-width: 420px;
      max-height: 750px;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
'use strict';

(function() {
  // ============================================================================
  // CONSTANTS
  // ============================================================================
  const CANVAS_WIDTH = 420;
  const CANVAS_HEIGHT = 750;
  const FIXED_DT = 1000 / 60;
  const MAX_DELTA_FRAMES = 4;
  const MAX_PARTICLES = 200;

  // Game state
  let gameState = 'menu'; // menu, play, levelUp, dead, shop
  let score = 0;
  let wave = 0;
  let combo = 0;
  let gold = 0;
  let level = 1;
  let xp = 0;
  let xpNeeded = 100;
  let highScore = 0;

  // Player
  let player = {
    x: CANVAS_WIDTH / 2,
    y: CANVAS_HEIGHT - 80,
    vx: 0,
    vy: 0,
    radius: 12,
    hp: 5,
    maxHp: 5,
    fireRate: 8,
    fireTimer: 0,
    dashCooldown: 0,
    dashCooldownMax: 60,
    isDashing: false,
    dashTimer: 0,
    dashDuration: 8,
    speed: 200,
    bulletCount: 1,
    bulletDamage: 1,
    invulnTimer: 0
  };

  // Upgrades and shop
  let baseStats = {
    maxHp: 5,
    fireRate: 8,
    speed: 200,
    bulletCount: 1,
    bulletDamage: 1,
    magnetRadius: 100
  };

  let shopUpgrades = [
    { id: 'hp', name: 'HP+', cost: 50, level: 0 },
    { id: 'fireRate', name: 'Fire Rate+', cost: 50, level: 0 },
    { id: 'speed', name: 'Speed+', cost: 50, level: 0 },
    { id: 'magnetism', name: 'Magnet+', cost: 50, level: 0 },
    { id: 'damage', name: 'Damage+', cost: 50, level: 0 }
  ];

  // Arrays
  let bullets = [];
  let enemies = [];
  let particles = [];
  let stars = [];
  let nebulas = [];
  let screenShakeIntensity = 0;
  let levelUpChoices = [];
  let waveEnemiesRemaining = 0;
  let waveTimer = null;

  // Input
  let keys = {};
  let touchStartX = 0;
  let touchStartY = 0;
  let touchDragging = false;
  let mousePos = { x: 0, y: 0 };
  let mouseDown = false;
  let lastShotTime = 0;

  // Audio
  let audioContext = null;

  // ============================================================================
  // INITIALIZATION
  // ============================================================================
  function initAudio() {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioContext) return;
    try {
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      gain.gain.setValueAtTime(0.1, now);

      switch (type) {
        case 'shoot':
          osc.type = 'square';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.exponentialRampToValueAtTime(200, now + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
          osc.start(now);
          osc.stop(now + 0.05);
          break;
        case 'hit':
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(300, now);
          osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
          break;
        case 'explode':
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
          break;
        case 'powerup':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
          osc.start(now);
          osc.stop(now + 0.2);
          break;
        case 'levelup':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, now);
          gain.gain.setValueAtTime(0.05, now);
          osc.start(now);
          osc.frequency.setValueAtTime(500, now + 0.1);
          osc.frequency.setValueAtTime(600, now + 0.2);
          osc.stop(now + 0.3);
          break;
      }
    } catch (e) {
      // Silently fail audio
    }
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({
        x: Math.random() * CANVAS_WIDTH,
        y: Math.random() * CANVAS_HEIGHT,
        radius: Math.random() * 1.5 + 0.5,
        layer: Math.random() < 0.3 ? 'near' : Math.random() < 0.6 ? 'mid' : 'far',
        opacity: Math.random() * 0.5 + 0.3
      });
    }
  }

  function initNebulas() {
    nebulas = [];
    for (let i = 0; i < 4; i++) {
      nebulas.push({
        x: Math.random() * CANVAS_WIDTH,
        y: Math.random() * CANVAS_HEIGHT,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() - 0.5) * 10,
        radius: Math.random() * 30 + 30,
        hue: Math.random() * 60 + 250,
        opacity: 0.06
      });
    }
  }

  function loadGame() {
    try {
      const saved = localStorage.getItem('voidRiftSave');
      if (saved) {
        const data = JSON.parse(saved);
        gold = data.gold || 0;
        highScore = data.highScore || 0;
        if (data.baseStats) baseStats = data.baseStats;
        applyBaseStats();
      }
    } catch (e) {
      // Silently fail
    }
  }

  function saveGame() {
    try {
      localStorage.setItem('voidRiftSave', JSON.stringify({
        gold,
        highScore,
        baseStats
      }));
    } catch (e) {
      // Silently fail
    }
  }

  function applyBaseStats() {
    player.maxHp = baseStats.maxHp;
    player.fireRate = baseStats.fireRate;
    player.speed = baseStats.speed;
    player.bulletCount = baseStats.bulletCount;
    player.bulletDamage = baseStats.bulletDamage;
  }

  function startGame() {
    gameState = 'play';
    score = 0;
    wave = 0;
    combo = 0;
    level = 1;
    xp = 0;
    xpNeeded = 100;
    bullets = [];
    enemies = [];
    particles = [];
    screenShakeIntensity = 0;
    player.x = CANVAS_WIDTH / 2;
    player.y = CANVAS_HEIGHT - 80;
    player.vx = 0;
    player.vy = 0;
    player.hp = player.maxHp;
    player.fireTimer = 0;
    player.dashCooldown = 0;
    player.isDashing = false;
    player.invulnTimer = 0;
    applyBaseStats();
    nextWave();
  }

  function nextWave() {
    wave++;
    const isBoss = wave % 5 === 0;
    const enemyCount = isBoss ? 1 : 3 + Math.floor(wave / 2);
    waveEnemiesRemaining = enemyCount;

    clearTimeout(waveTimer);

    let spawnedCount = 0;
    const spawnInterval = setInterval(() => {
      if (gameState !== 'play') {
        clearInterval(spawnInterval);
        return;
      }
      if (spawnedCount >= enemyCount) {
        clearInterval(spawnInterval);
        return;
      }

      if (isBoss && spawnedCount === 0) {
        spawnBoss();
      } else {
        spawnRandomEnemy();
      }
      spawnedCount++;
    }, 500);

    waveTimer = setTimeout(() => {
      clearInterval(spawnInterval);
    }, enemyCount * 500 + 1000);
  }

  function spawnRandomEnemy() {
    const types = ['drone', 'scout', 'tank', 'shooter'];
    const type = types[Math.floor(Math.random() * types.length)];
    spawnEnemy(type);
  }

  function spawnEnemy(type) {
    const x = Math.random() * (CANVAS_WIDTH - 40) + 20;
    const enemy = {
      type,
      x,
      y: -30,
      vx: 0,
      vy: 0,
      radius: 10,
      hp: 1,
      maxHp: 1,
      fireTimer: 0,
      shootCooldown: 0
    };

    switch (type) {
      case 'drone':
        enemy.hp = 2;
        enemy.maxHp = 2;
        enemy.vy = 120;
        enemy.radius = 10;
        break;
      case 'scout':
        enemy.hp = 1;
        enemy.maxHp = 1;
        enemy.vy = 180;
        enemy.radius = 8;
        break;
      case 'tank':
        enemy.hp = 6;
        enemy.maxHp = 6;
        enemy.vy = 80;
        enemy.radius = 14;
        break;
      case 'shooter':
        enemy.hp = 3;
        enemy.maxHp = 3;
        enemy.vy = 100;
        enemy.radius = 12;
        enemy.shootCooldown = 120;
        break;
    }

    enemies.push(enemy);
  }

  function spawnBoss() {
    const boss = {
      type: 'boss',
      x: CANVAS_WIDTH / 2,
      y: -40,
      vx: 60,
      vy: 40,
      radius: 25,
      hp: 20 + wave * 2,
      maxHp: 20 + wave * 2,
      shootCooldown: 60,
      targetY: 100
    };
    enemies.push(boss);
  }

  function shoot() {
    if (gameState !== 'play') return;

    const now = Date.now();
    if (now - lastShotTime < player.fireRate * FIXED_DT) return;
    lastShotTime = now;

    playSound('shoot');

    const spread = (player.bulletCount - 1) * 10;
    for (let i = 0; i < player.bulletCount; i++) {
      const angle = -Math.PI / 2 + (i * 20 - spread / 2) * (Math.PI / 180);
      const vel = 400;
      bullets.push({
        x: player.x,
        y: player.y - player.radius,
        vx: Math.cos(angle) * vel,
        vy: Math.sin(angle) * vel,
        radius: 3,
        damage: player.bulletDamage,
        lifetime: 120
      });
    }
  }

  function dash() {
    if (player.dashCooldown > 0 || player.isDashing) return;
    if (gameState !== 'play') return;

    player.isDashing = true;
    player.dashTimer = player.dashDuration;
    player.dashCooldown = player.dashCooldownMax;
  }

  function triggerLevelUp() {
    gameState = 'levelUp';
    levelUpChoices = [];

    const upgrades = [
      { name: 'Max HP+1', apply: () => { baseStats.maxHp++; applyBaseStats(); } },
      { name: 'Fire Rate +10%', apply: () => { baseStats.fireRate = Math.max(2, baseStats.fireRate * 0.9); applyBaseStats(); } },
      { name: 'Speed +20%', apply: () => { baseStats.speed *= 1.2; applyBaseStats(); } },
      { name: 'Bullet Count +1', apply: () => { baseStats.bulletCount++; applyBaseStats(); } },
      { name: 'Damage +1', apply: () => { baseStats.bulletDamage++; applyBaseStats(); } },
      { name: 'Magnet Radius +50px', apply: () => { baseStats.magnetRadius = (baseStats.magnetRadius || 100) + 50; } }
    ];

    for (let i = 0; i < 3; i++) {
      const idx = Math.floor(Math.random() * upgrades.length);
      levelUpChoices.push(upgrades[idx]);
    }

    playSound('levelup');
  }

  function chooseLevelUp(idx) {
    if (levelUpChoices[idx]) {
      levelUpChoices[idx].apply();
    }
    level++;
    gameState = 'play';
  }

  function gameOver() {
    gameState = 'dead';
    const goldEarned = Math.floor(score / 20);
    gold += goldEarned;
    if (score > highScore) highScore = score;
    saveGame();
    clearTimeout(waveTimer);
  }

  function goToShop() {
    gameState = 'shop';
  }

  function goToMenu() {
    gameState = 'menu';
  }

  function buyUpgrade(idx) {
    if (shopUpgrades[idx] && gold >= shopUpgrades[idx].cost) {
      gold -= shopUpgrades[idx].cost;
      shopUpgrades[idx].cost += 25;

      switch (shopUpgrades[idx].id) {
        case 'hp':
          baseStats.maxHp++;
          break;
        case 'fireRate':
          baseStats.fireRate = Math.max(2, baseStats.fireRate - 1);
          break;
        case 'speed':
          baseStats.speed += 30;
          break;
        case 'magnetism':
          baseStats.magnetRadius = (baseStats.magnetRadius || 100) + 50;
          break;
        case 'damage':
          baseStats.bulletDamage++;
          break;
      }

      applyBaseStats();
      saveGame();
      playSound('powerup');
    }
  }

  // ============================================================================
  // UPDATE LOGIC
  // ============================================================================
  function update(dt) {
    if (gameState !== 'play') return;

    // Player movement
    let moveX = 0;
    let moveY = 0;

    if (keys['ArrowLeft'] || keys['a']) moveX -= 1;
    if (keys['ArrowRight'] || keys['d']) moveX += 1;
    if (keys['ArrowUp'] || keys['w']) moveY -= 1;
    if (keys['ArrowDown'] || keys['s']) moveY += 1;

    if (touchDragging) {
      const touchX = touchStartX;
      const touchRightThreshold = CANVAS_WIDTH / 2;
      if (touchX < touchRightThreshold) {
        moveX = (touchX - CANVAS_WIDTH * 0.25) / (CANVAS_WIDTH / 4);
        moveY = (touchStartY - CANVAS_HEIGHT * 0.8) / 100;
      }
    }

    if (mouseDown && mousePos.x < CANVAS_WIDTH / 2) {
      const dx = mousePos.x - player.x;
      const dy = mousePos.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0) {
        moveX = dx / dist;
        moveY = dy / dist;
      }
    }

    moveX = Math.max(-1, Math.min(1, moveX));
    moveY = Math.max(-1, Math.min(1, moveY));

    let currentSpeed = player.speed;
    if (player.isDashing) {
      currentSpeed *= 3;
    }

    player.vx = moveX * currentSpeed;
    player.vy = moveY * currentSpeed;

    // Apply velocity
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Clamp player to screen
    player.x = Math.max(player.radius, Math.min(CANVAS_WIDTH - player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(CANVAS_HEIGHT - player.radius, player.y));

    // Dash
    if (player.isDashing) {
      player.dashTimer--;
      if (player.dashTimer <= 0) {
        player.isDashing = false;
      }
    }

    if (player.dashCooldown > 0) {
      player.dashCooldown--;
    }

    if (player.invulnTimer > 0) {
      player.invulnTimer--;
    }

    // Auto fire
    player.fireTimer--;
    if (player.fireTimer <= 0) {
      shoot();
      player.fireTimer = player.fireRate;
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.lifetime--;

      if (b.lifetime <= 0 || b.x < 0 || b.x > CANVAS_WIDTH || b.y < 0 || b.y > CANVAS_HEIGHT) {
        bullets.splice(i, 1);
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.x += e.vx * dt;
      e.y += e.vy * dt;

      if (e.type === 'scout') {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
          e.vx = (dx / dist) * 150;
          e.vy = (dy / dist) * 150;
        }
      }

      if (e.type === 'shooter') {
        e.shootCooldown--;
        if (e.shootCooldown <= 0) {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {
            bullets.push({
              x: e.x,
              y: e.y,
              vx: (dx / dist) * 150,
              vy: (dy / dist) * 150,
              radius: 3,
              damage: 1,
              lifetime: 300,
              isEnemyBullet: true
            });
          }
          e.shootCooldown = 180;
        }
      }

      if (e.type === 'boss') {
        // Boss movement: drift to targetY, bounce off walls
        if (e.y < (e.targetY || 100)) {
          e.vy = Math.abs(e.vy) || 40;
        } else {
          e.vy = 0;
          // Horizontal patrol
          if (e.x <= e.radius + 10) e.vx = Math.abs(e.vx);
          if (e.x >= CANVAS_WIDTH - e.radius - 10) e.vx = -Math.abs(e.vx);
        }

        e.shootCooldown--;
        if (e.shootCooldown <= 0) {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {
            for (let s = -1; s <= 1; s++) {
              const angle = Math.atan2(dy, dx) + s * (Math.PI / 8);
              bullets.push({
                x: e.x,
                y: e.y,
                vx: Math.cos(angle) * 200,
                vy: Math.sin(angle) * 200,
                radius: 3,
                damage: 1,
                lifetime: 300,
                isEnemyBullet: true
              });
            }
          }
          e.shootCooldown = 120;
        }
      }

      if (e.y > CANVAS_HEIGHT + 50) {
        enemies.splice(i, 1);
        waveEnemiesRemaining--;
        if (waveEnemiesRemaining <= 0 && wave > 0) {
          nextWave();
        }
      }
    }

    // Collision: bullets vs enemies
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      if (b.isEnemyBullet) continue;

      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const dx = b.x - e.x;
        const dy = b.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < b.radius + e.radius) {
          e.hp -= b.damage;
          playSound('hit');
          screenShakeIntensity = Math.max(screenShakeIntensity, 3);
          combo++;

          // Add damage number
          particles.push({
            type: 'damageNumber',
            x: e.x,
            y: e.y,
            vx: 0,
            vy: -50,
            lifetime: 60,
            maxLifetime: 60,
            damage: Math.floor(b.damage)
          });

          bullets.splice(i, 1);
          break;
        }
      }
    }

    // Enemy death
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.hp <= 0) {
        const basePoints = {
          drone: 100,
          scout: 150,
          tank: 200,
          shooter: 250,
          boss: 1000
        };
        score += (basePoints[e.type] || 100) * combo;

        playSound('explode');
        screenShakeIntensity = Math.max(screenShakeIntensity, 5);

        for (let p = 0; p < 8; p++) {
          if (particles.length < MAX_PARTICLES) {
            const angle = (p / 8) * Math.PI * 2;
            particles.push({
              type: 'explosion',
              x: e.x,
              y: e.y,
              vx: Math.cos(angle) * 150,
              vy: Math.sin(angle) * 150,
              lifetime: 30,
              maxLifetime: 30,
              radius: Math.random() * 3 + 2
            });
          }
        }

        xp += e.type === 'boss' ? 50 : 10;
        if (xp >= xpNeeded) {
          xp = 0;
          triggerLevelUp();
        }

        enemies.splice(i, 1);
        waveEnemiesRemaining--;
        if (waveEnemiesRemaining <= 0 && wave > 0) {
          nextWave();
        }
      }
    }

    // Collision: enemy bullets vs player
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      if (!b.isEnemyBullet) continue;

      const dx = b.x - player.x;
      const dy = b.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < b.radius + player.radius && !player.isDashing && player.invulnTimer <= 0) {
        player.hp--;
        player.invulnTimer = 45; // ~0.75s invincibility
        playSound('hit');
        screenShakeIntensity = 5;
        combo = 0;
        bullets.splice(i, 1);

        if (player.hp <= 0) {
          gameOver();
        }
      }
    }

    // Collision: enemies vs player
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      const dx = e.x - player.x;
      const dy = e.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < e.radius + player.radius && !player.isDashing && player.invulnTimer <= 0) {
        player.hp--;
        player.invulnTimer = 45; // ~0.75s invincibility
        playSound('hit');
        screenShakeIntensity = 5;
        combo = 0;

        if (player.hp <= 0) {
          gameOver();
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.lifetime--;

      if (p.lifetime <= 0) {
        particles.splice(i, 1);
      }
    }

    // Update stars for parallax
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      let speed = 0;
      if (s.layer === 'near') speed = 20;
      else if (s.layer === 'mid') speed = 10;
      else speed = 5;

      s.y += speed * dt;
      if (s.y > CANVAS_HEIGHT) {
        s.y = -10;
        s.x = Math.random() * CANVAS_WIDTH;
      }
    }

    // Update nebulas
    for (let i = 0; i < nebulas.length; i++) {
      const n = nebulas[i];
      n.x += n.vx * dt;
      n.y += n.vy * dt;

      if (n.x < -100) n.x = CANVAS_WIDTH + 100;
      if (n.x > CANVAS_WIDTH + 100) n.x = -100;
      if (n.y < -100) n.y = CANVAS_HEIGHT + 100;
      if (n.y > CANVAS_HEIGHT + 100) n.y = -100;
    }

    screenShakeIntensity = Math.max(0, screenShakeIntensity - 1);
  }

  // ============================================================================
  // DRAWING
  // ============================================================================
  function draw(ctx) {
    const cw = CANVAS_WIDTH;
    const ch = CANVAS_HEIGHT;

    // Background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, ch);
    bgGrad.addColorStop(0, '#1a0033');
    bgGrad.addColorStop(1, '#000000');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, cw, ch);

    // Draw stars
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
      ctx.fillRect(s.x, s.y, s.radius, s.radius);
    }

    // Draw nebulas
    for (let i = 0; i < nebulas.length; i++) {
      const n = nebulas[i];
      const nebGrad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
      nebGrad.addColorStop(0, `hsla(${n.hue}, 100%, 50%, ${n.opacity})`);
      nebGrad.addColorStop(1, `hsla(${n.hue}, 100%, 50%, 0)`);
      ctx.fillStyle = nebGrad;
      ctx.fillRect(n.x - n.radius, n.y - n.radius, n.radius * 2, n.radius * 2);
    }

    if (gameState === 'play') {
      // Draw bullets (player)
      ctx.fillStyle = '#00ffff';
      for (let i = 0; i < bullets.length; i++) {
        const b = bullets[i];
        if (b.isEnemyBullet) continue;

        const w = 3;
        const h = 8;
        const grad = ctx.createLinearGradient(b.x - w, b.y - h, b.x + w, b.y + h);
        grad.addColorStop(0, '#00ffff');
        grad.addColorStop(0.5, '#00ff88');
        grad.addColorStop(1, '#0088ff');
        ctx.fillStyle = grad;

        ctx.beginPath();
        ctx.ellipse(b.x, b.y, w, h, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw bullets (enemy)
      for (let i = 0; i < bullets.length; i++) {
        const b = bullets[i];
        if (!b.isEnemyBullet) continue;

        ctx.fillStyle = '#ff4488';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw player (flash when invulnerable)
      const shouldDrawPlayer = player.invulnTimer <= 0 || Math.floor(player.invulnTimer / 3) % 2 === 0;
      const shake = Math.random() * screenShakeIntensity * 2 - screenShakeIntensity;
      const playerX = player.x + shake;
      const playerY = player.y + shake;

      if (shouldDrawPlayer) {
        const shipGrad = ctx.createLinearGradient(playerX, playerY - player.radius, playerX, playerY + player.radius);
        shipGrad.addColorStop(0, '#00ffff');
        shipGrad.addColorStop(1, '#0055ff');
        ctx.fillStyle = shipGrad;

        ctx.beginPath();
        ctx.moveTo(playerX, playerY - player.radius);
        ctx.lineTo(playerX + player.radius, playerY + player.radius);
        ctx.lineTo(playerX, playerY + player.radius * 0.6);
        ctx.lineTo(playerX - player.radius, playerY + player.radius);
        ctx.closePath();
        ctx.fill();

        // Engine flame
        if (!player.isDashing) {
          ctx.fillStyle = `rgba(255, 150, 0, ${0.5 + Math.random() * 0.5})`;
          ctx.beginPath();
          ctx.moveTo(playerX - 4, playerY + player.radius);
          ctx.lineTo(playerX + 4, playerY + player.radius);
          ctx.lineTo(playerX, playerY + player.radius + 12 + Math.random() * 6);
          ctx.closePath();
          ctx.fill();
        }
      }

      // Draw enemies
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];

        if (e.type === 'drone') {
          const dGrad = ctx.createLinearGradient(e.x, e.y - e.radius, e.x, e.y + e.radius);
          dGrad.addColorStop(0, '#ff4444');
          dGrad.addColorStop(1, '#aa0000');
          ctx.fillStyle = dGrad;

          ctx.beginPath();
          ctx.moveTo(e.x, e.y - e.radius);
          ctx.lineTo(e.x + e.radius, e.y + e.radius);
          ctx.lineTo(e.x - e.radius, e.y + e.radius);
          ctx.closePath();
          ctx.fill();
        } else if (e.type === 'scout') {
          const sGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
          sGrad.addColorStop(0, '#ffff00');
          sGrad.addColorStop(1, '#ff8800');
          ctx.fillStyle = sGrad;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
          ctx.fill();
        } else if (e.type === 'tank') {
          const tGrad = ctx.createLinearGradient(e.x - e.radius, e.y, e.x + e.radius, e.y);
          tGrad.addColorStop(0, '#ff8800');
          tGrad.addColorStop(1, '#dd4400');
          ctx.fillStyle = tGrad;
          ctx.fillRect(e.x - e.radius, e.y - e.radius, e.radius * 2, e.radius * 2);

          ctx.fillStyle = '#666666';
          ctx.fillRect(e.x - 4, e.y - 4, 8, 8);
        } else if (e.type === 'shooter') {
          const shGrad = ctx.createLinearGradient(e.x - e.radius, e.y - e.radius, e.x + e.radius, e.y + e.radius);
          shGrad.addColorStop(0, '#ff00ff');
          shGrad.addColorStop(1, '#aa0088');
          ctx.fillStyle = shGrad;

          ctx.beginPath();
          ctx.moveTo(e.x, e.y - e.radius);
          ctx.lineTo(e.x + e.radius, e.y);
          ctx.lineTo(e.x, e.y + e.radius);
          ctx.lineTo(e.x - e.radius, e.y);
          ctx.closePath();
          ctx.fill();
        } else if (e.type === 'boss') {
          const bGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
          bGrad.addColorStop(0, '#ffff00');
          bGrad.addColorStop(1, '#ff0000');
          ctx.fillStyle = bGrad;

          ctx.beginPath();
          for (let j = 0; j < 6; j++) {
            const angle = (j / 6) * Math.PI * 2;
            const x = e.x + Math.cos(angle) * e.radius;
            const y = e.y + Math.sin(angle) * e.radius;
            if (j === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();

          // Boss HP bar
          ctx.fillStyle = '#222222';
          ctx.fillRect(e.x - 30, e.y - e.radius - 15, 60, 6);
          ctx.fillStyle = '#00ff00';
          ctx.fillRect(e.x - 30, e.y - e.radius - 15, 60 * (e.hp / e.maxHp), 6);
        }

        // Enemy HP bar (if multi-hp)
        if (e.maxHp > 1 && e.type !== 'boss') {
          ctx.fillStyle = '#222222';
          ctx.fillRect(e.x - 12, e.y - e.radius - 8, 24, 3);
          ctx.fillStyle = '#ff6600';
          ctx.fillRect(e.x - 12, e.y - e.radius - 8, 24 * (e.hp / e.maxHp), 3);
        }
      }

      // Draw particles
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        if (p.type === 'explosion') {
          const alpha = p.lifetime / p.maxLifetime;
          ctx.fillStyle = `rgba(255, 150, 0, ${alpha * 0.8})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type === 'damageNumber') {
          const alpha = p.lifetime / p.maxLifetime;
          ctx.fillStyle = `rgba(255, 100, 100, ${alpha})`;
          ctx.font = 'bold 16px Arial';
          ctx.textAlign = 'center';
          ctx.fillText(p.damage, p.x, p.y);
        }
      }

      // Draw HUD
      drawHUD(ctx, cw, ch);

      // Vignette
      const vigGrad = ctx.createRadialGradient(cw / 2, ch / 2, 0, cw / 2, ch / 2, Math.sqrt(cw * cw + ch * ch));
      vigGrad.addColorStop(0, 'transparent');
      vigGrad.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
      ctx.fillStyle = vigGrad;
      ctx.fillRect(0, 0, cw, ch);
    } else if (gameState === 'menu') {
      drawMenu(ctx, cw, ch);
    } else if (gameState === 'shop') {
      drawShop(ctx, cw, ch);
    } else if (gameState === 'levelUp') {
      drawLevelUp(ctx, cw, ch);
    } else if (gameState === 'dead') {
      drawDead(ctx, cw, ch);
    }
  }

  function drawHUD(ctx, cw, ch) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'left';

    // Top left
    ctx.fillText(`Wave: ${wave}`, 10, 20);
    ctx.fillText(`Level: ${level}`, 10, 40);
    ctx.fillText(`Combo: ${combo}`, 10, 60);

    // Top right
    ctx.textAlign = 'right';
    ctx.fillText(`Score: ${score}`, cw - 10, 20);
    ctx.fillText(`Gold: ${gold}`, cw - 10, 40);

    // HP bar
    ctx.fillStyle = '#222222';
    ctx.fillRect(10, ch - 40, 100, 15);
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(10, ch - 40, 100 * (player.hp / player.maxHp), 15);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.strokeRect(10, ch - 40, 100, 15);

    // XP bar
    ctx.fillStyle = '#222222';
    ctx.fillRect(120, ch - 40, 100, 15);
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(120, ch - 40, 100 * (xp / xpNeeded), 15);
    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(120, ch - 40, 100, 15);

    // Dash cooldown
    if (player.dashCooldown > 0) {
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(cw - 110, ch - 40, 100 * (player.dashCooldown / player.dashCooldownMax), 15);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.strokeRect(cw - 110, ch - 40, 100, 15);
    }
  }

  function drawMenu(ctx, cw, ch) {
    // Title
    ctx.fillStyle = '#00ffff';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#0088ff';
    ctx.shadowBlur = 20;
    ctx.fillText('VOID RIFT', cw / 2, 100);
    ctx.shadowBlur = 0;

    // High score
    ctx.fillStyle = '#ffffff';
    ctx.font = '16px Arial';
    ctx.fillText(`High Score: ${highScore}`, cw / 2, 150);
    ctx.fillText(`Gold: ${gold}`, cw / 2, 175);

    // Buttons
    drawButton(ctx, cw / 2, 250, 120, 50, 'PLAY', '#00ff00');
    drawButton(ctx, cw / 2, 320, 120, 50, 'SHOP', '#ff6600');
  }

  function drawShop(ctx, cw, ch) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('SHOP', cw / 2, 40);

    let y = 80;
    for (let i = 0; i < shopUpgrades.length; i++) {
      const item = shopUpgrades[i];
      const color = gold >= item.cost ? '#00ff00' : '#ff0000';
      drawButton(ctx, cw / 2, y, 200, 40, `${item.name} - $${item.cost}`, color);
      y += 50;
    }

    drawButton(ctx, cw / 2, ch - 60, 100, 40, 'BACK', '#ff6600');
  }

  function drawLevelUp(ctx, cw, ch) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, cw, ch);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL UP!', cw / 2, 100);

    ctx.font = '14px Arial';
    let y = 180;
    for (let i = 0; i < levelUpChoices.length; i++) {
      drawButton(ctx, cw / 2, y, 180, 50, levelUpChoices[i].name, '#00ff88');
      y += 70;
    }
  }

  function drawDead(ctx, cw, ch) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
    ctx.fillRect(0, 0, cw, ch);

    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', cw / 2, 100);

    ctx.fillStyle = '#ffffff';
    ctx.font = '18px Arial';
    const goldEarned = Math.floor(score / 20);
    ctx.fillText(`Score: ${score}`, cw / 2, 150);
    ctx.fillText(`Gold Earned: ${goldEarned}`, cw / 2, 180);
    ctx.fillText(`Total Gold: ${gold}`, cw / 2, 210);

    drawButton(ctx, cw / 2, 300, 120, 50, 'MENU', '#ff6600');
  }

  function drawButton(ctx, cx, cy, w, h, text, color) {
    ctx.fillStyle = color;
    ctx.fillRect(cx - w / 2, cy - h / 2, w, h);
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, cx, cy);
  }

  // ============================================================================
  // INPUT HANDLING
  // ============================================================================
  function handleKeyDown(e) {
    keys[e.key] = true;
    if (e.key === ' ') {
      e.preventDefault();
      if (gameState === 'play') {
        dash();
      }
    }
  }

  function handleKeyUp(e) {
    keys[e.key] = false;
  }

  function handleMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    mousePos.x = (e.clientX - rect.left) * scaleX;
    mousePos.y = (e.clientY - rect.top) * scaleY;
  }

  function handleMenuClick(x, y) {
    if (gameState === 'menu') {
      if (x > CANVAS_WIDTH / 2 - 60 && x < CANVAS_WIDTH / 2 + 60 && y > 225 && y < 275) {
        startGame();
      } else if (x > CANVAS_WIDTH / 2 - 60 && x < CANVAS_WIDTH / 2 + 60 && y > 295 && y < 345) {
        goToShop();
      }
    } else if (gameState === 'shop') {
      for (let i = 0; i < shopUpgrades.length; i++) {
        const itemY = 80 + i * 50;
        if (x > CANVAS_WIDTH / 2 - 100 && x < CANVAS_WIDTH / 2 + 100 && y > itemY - 20 && y < itemY + 20) {
          buyUpgrade(i);
          return;
        }
      }
      if (x > CANVAS_WIDTH / 2 - 50 && x < CANVAS_WIDTH / 2 + 50 && y > CANVAS_HEIGHT - 80 && y < CANVAS_HEIGHT - 40) {
        goToMenu();
      }
    } else if (gameState === 'levelUp') {
      for (let i = 0; i < 3; i++) {
        const itemY = 180 + i * 70;
        if (x > CANVAS_WIDTH / 2 - 90 && x < CANVAS_WIDTH / 2 + 90 && y > itemY - 25 && y < itemY + 25) {
          chooseLevelUp(i);
          return;
        }
      }
    } else if (gameState === 'dead') {
      if (x > CANVAS_WIDTH / 2 - 60 && x < CANVAS_WIDTH / 2 + 60 && y > 275 && y < 325) {
        goToMenu();
      }
    }
  }

  function handleMouseDown(e) {
    mouseDown = true;
    initAudio();
    if (gameState === 'play') return;

    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    handleMenuClick(x, y);
  }

  function handleMouseUp(e) {
    mouseDown = false;
  }

  function handleTouchStart(e) {
    e.preventDefault();
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const touch = e.touches[0];
    touchStartX = (touch.clientX - rect.left) * scaleX;
    touchStartY = (touch.clientY - rect.top) * scaleY;
    touchDragging = false;

    if (gameState === 'play') {
      if (touchStartX > CANVAS_WIDTH / 2) {
        dash();
      }
    } else {
      // Simulate click for menu/shop/levelUp/dead screens
      handleMenuClick(touchStartX, touchStartY);
    }
  }

  function handleTouchMove(e) {
    e.preventDefault();
    if (gameState !== 'play') return;
    touchDragging = true;
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const touch = e.touches[0];
    touchStartX = (touch.clientX - rect.left) * scaleX;
    touchStartY = (touch.clientY - rect.top) * scaleY;
  }

  function handleTouchEnd(e) {
    touchDragging = false;
  }

  // ============================================================================
  // MAIN LOOP
  // ============================================================================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }

  let lastFrameTime = Date.now();

  function gameLoop() {
    const now = Date.now();
    let deltaTime = (now - lastFrameTime) / 1000;
    lastFrameTime = now;

    // Cap delta time
    deltaTime = Math.min(deltaTime, 0.1);

    let steps = 0;
    let remainingDt = deltaTime;
    while (remainingDt > 0 && steps < MAX_DELTA_FRAMES) {
      const stepDt = Math.min(remainingDt, FIXED_DT / 1000);
      update(stepDt);
      remainingDt -= stepDt;
      steps++;
    }

    draw(ctx);

    requestAnimationFrame(gameLoop);
  }

  // ============================================================================
  // STARTUP
  // ============================================================================
  window.addEventListener('keydown', handleKeyDown);
  window.addEventListener('keyup', handleKeyUp);
  window.addEventListener('mousemove', handleMouseMove);
  window.addEventListener('mousedown', handleMouseDown);
  window.addEventListener('mouseup', handleMouseUp);
  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', handleTouchEnd);

  window.addEventListener('resize', resizeCanvas);

  initStars();
  initNebulas();
  loadGame();
  resizeCanvas();

  gameLoop();
})();
</script>
</body>
</html>
