const ScreenManager = {
  screens: {
    title: 'title',
    shipSelect: 'shipSelect',
    shop: 'shop',
    equipment: 'equipment',
    achievements: 'achievements',
    settings: 'settings',
    codex: 'codex',
    weaponTree: 'weaponTree',
    stats: 'stats',
    daily: 'daily',
    story: 'story',
    playing: 'playing',
    paused: 'paused',
    levelUp: 'levelUp',
    gameOver: 'gameOver'
  },

  history: [],
  maxHistory: 10,

  navigate(screen, transition) {
    if (gameState.screen === screen) return;
    this.history.push(gameState.screen);
    if (this.history.length > this.maxHistory) this.history.shift();

    if (transition) {
      Transitions.start(transition, () => {
        gameState.screen = screen;
      });
    } else {
      gameState.screen = screen;
    }
    if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
  },

  back(transition) {
    if (this.history.length === 0) {
      this.navigate('title', transition);
      return;
    }
    const prev = this.history.pop();
    if (transition) {
      Transitions.start(transition, () => {
        gameState.screen = prev;
      });
    } else {
      gameState.screen = prev;
    }
    if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('back');
  }
};

// SECTION 40: ENHANCED TITLE SCREEN WITH MENUS
// ============================================================

function renderEnhancedTitleScreen(ctx) {
  const W = 420, H = 750;
  const t = Date.now() * 0.001;

  // Animated background
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  // Animated void rift effect
  for (let i = 0; i < 5; i++) {
    const x = W/2 + Math.sin(t + i * 1.2) * 80;
    const y = 180 + Math.cos(t * 0.7 + i * 0.8) * 30;
    const r = 40 + Math.sin(t * 1.5 + i) * 20;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
    const hue = (t * 30 + i * 50) % 360;
    grad.addColorStop(0, `hsla(${hue}, 80%, 60%, 0.15)`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Animated stars in background
  for (let i = 0; i < 80; i++) {
    const sx = ((i * 137.5 + t * (10 + i % 5)) % (W + 20)) - 10;
    const sy = ((i * 97.3 + t * (5 + i % 3)) % (H + 20)) - 10;
    const brightness = 0.3 + Math.sin(t * 2 + i) * 0.3;
    const size = 0.5 + (i % 3) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title text with glow
  ctx.save();
  const titleY = 100 + Math.sin(t * 0.5) * 5;

  // Outer glow
  ctx.shadowColor = '#FF0044';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#FF0044';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VOID', W/2, titleY);

  ctx.shadowColor = '#4400FF';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#4400FF';
  ctx.fillText('RIFT', W/2, titleY + 50);

  ctx.shadowBlur = 0;
  ctx.restore();

  // Inner bright text
  ctx.fillStyle = '#FF4488';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VOID', W/2, titleY);
  ctx.fillStyle = '#8844FF';
  ctx.fillText('RIFT', W/2, titleY + 50);

  // Version & subtitle
  ctx.fillStyle = '#666688';
  ctx.font = '10px monospace';
  ctx.fillText('v5.0 — THE COMPLETE EXPERIENCE', W/2, titleY + 70);

  // NG+ indicator
  NewGamePlus.renderIndicator(ctx, W/2, titleY + 88);

  // Menu buttons
  const menuItems = [
    { label: 'START GAME', color: '#44FF44', screen: 'shipSelect' },
    { label: 'DAILY CHALLENGE', color: '#FFD700', screen: 'daily' },
    { label: 'WEAPON TREES', color: '#FF8844', screen: 'weaponTree' },
    { label: 'VOID CODEX', color: '#44AAFF', screen: 'codex' },
    { label: 'STORY LOG', color: '#CC44FF', screen: 'story' },
    { label: 'STATISTICS', color: '#88FF88', screen: 'stats' },
    { label: 'SHOP', color: '#FFD700', screen: 'shop' },
    { label: 'ACHIEVEMENTS', color: '#FFAA44', screen: 'achievements' },
    { label: 'SETTINGS', color: '#AAAACC', screen: 'settings' }
  ];

  const btnW = 220, btnH = 36;
  const startBtnY = 280;
  const btnSpacing = 44;

  for (let i = 0; i < menuItems.length; i++) {
    const item = menuItems[i];
    const by = startBtnY + i * btnSpacing;
    const bx = W/2 - btnW/2;

    // Hover effect (using touch position)
    const isHover = Input.touch.active &&
      Input.touch.x > bx && Input.touch.x < bx + btnW &&
      Input.touch.y > by && Input.touch.y < by + btnH;

    drawGlassButton(ctx, bx, by, btnW, btnH, item.label, item.color, isHover);
  }

  // Footer
  ctx.fillStyle = '#444466';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TAP A BUTTON TO BEGIN', W/2, H - 30);

  // Copyright
  ctx.fillStyle = '#333344';
  ctx.fillText('© 2026 VOID RIFT', W/2, H - 15);
}

// ============================================================
// SECTION 41: ENHANCED GAMEPLAY HUD
// ============================================================

function renderEnhancedHUD(ctx) {
  const W = 420, H = 750;

  // Top section - Boss bar or wave info
  if (BossSystem.activeBoss) {
    // Find boss entity
    let bossEntity = null;
    if (typeof Enemies !== 'undefined') {
      for (let i = 0; i < Enemies.pool.length; i++) {
        if (Enemies.pool[i].active && Enemies.pool[i].isBoss) {
          bossEntity = Enemies.pool[i];
          break;
        }
      }
    }
    if (bossEntity) {
      BossSystem.renderBossHUD(ctx, bossEntity);
    }
  } else {
    // Wave info
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(ctx, 10, 5, W - 20, 30, 8);
    ctx.fill();

    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('WAVE ' + gameState.wave, 20, 24);

    // Biome name
    const biomeNames = ['Deep Space', 'Crimson Nebula', 'Crystal Void', 'Storm Sector', 'Deep Abyss', 'Void Core'];
    ctx.fillStyle = '#888888';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    const biomeName = biomeNames[gameState.biome || 0] || 'Unknown';
    ctx.fillText(biomeName, W/2, 24);

    // Score
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(safeStr(gameState.score), W - 20, 24);
  }

  // HP Bar (left side)
  const hpBarX = 10, hpBarY = 42, hpBarW = 150, hpBarH = 10;
  const hpPct = player.maxHP > 0 ? player.hp / player.maxHP : 0;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, hpBarX, hpBarY, hpBarW, hpBarH, 5);
  ctx.fill();

  const hpColor = hpPct > 0.5 ? '#44FF44' : hpPct > 0.25 ? '#FFAA00' : '#FF4444';
  ctx.fillStyle = hpColor;
  roundRect(ctx, hpBarX, hpBarY, hpBarW * Math.max(0, hpPct), hpBarH, 5);
  ctx.fill();

  ctx.fillStyle = '#FFFFFF';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.ceil(player.hp)}/${player.maxHP}`, hpBarX + hpBarW/2, hpBarY + 8);

  // Shield Bar (if applicable)
  if (player.shield > 0 || player.maxShield > 0) {
    const shBarY = hpBarY + 14;
    const shPct = player.maxShield > 0 ? player.shield / player.maxShield : 0;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, hpBarX, shBarY, hpBarW, 6, 3);
    ctx.fill();
    ctx.fillStyle = '#44DDFF';
    roundRect(ctx, hpBarX, shBarY, hpBarW * Math.max(0, shPct), 6, 3);
    ctx.fill();
  }

  // XP Bar (bottom of screen area)
  const xpBarY = hpBarY + (player.maxShield > 0 ? 24 : 14);
  const xpPct = player.xpToNext > 0 ? player.xp / player.xpToNext : 0;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, hpBarX, xpBarY, hpBarW, 6, 3);
  ctx.fill();
  ctx.fillStyle = '#BB88FF';
  roundRect(ctx, hpBarX, xpBarY, hpBarW * Math.max(0, xpPct), 6, 3);
  ctx.fill();
  ctx.fillStyle = '#BB88FF';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('Lv.' + player.level, hpBarX, xpBarY + 14);

  // Combo display
  if (ComboSystem.combo > 0) {
    ctx.fillStyle = ComboSystem.rankColors[ComboSystem.rank] || '#FFFFFF';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(ComboSystem.combo + 'x', W - 15, 55);

    // Combo timer bar
    const comboTimerPct = ComboSystem.comboTimer / ComboSystem.comboDecayTime;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(ctx, W - 100, 60, 85, 4, 2);
    ctx.fill();
    ctx.fillStyle = ComboSystem.rankColors[ComboSystem.rank] || '#FFFFFF';
    roundRect(ctx, W - 100, 60, 85 * comboTimerPct, 4, 2);
    ctx.fill();
  }

  // Fever mode indicator
  if (gameState.feverMode) {
    const feverAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.5;
    ctx.fillStyle = `rgba(255,215,0,${feverAlpha})`;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('★ FEVER MODE ★', W/2, 85);
  }

  // Ultimate charge
  if (gameState.ultimateCharge !== undefined) {
    const ultPct = (gameState.ultimateCharge || 0) / 100;
    const ultBarX = W - 55, ultBarY = 70, ultBarW = 40, ultBarH = 6;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, ultBarX, ultBarY, ultBarW, ultBarH, 3);
    ctx.fill();
    ctx.fillStyle = ultPct >= 1 ? '#FFD700' : '#FF8844';
    roundRect(ctx, ultBarX, ultBarY, ultBarW * Math.min(1, ultPct), ultBarH, 3);
    ctx.fill();
    if (ultPct >= 1) {
      ctx.fillStyle = '#FFD700';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ULT READY', ultBarX + ultBarW/2, ultBarY + 14);
    }
  }

  // Ability cooldowns (bottom right)
  if (player.abilities && player.abilities.length > 0) {
    const abilityY = H - 160;
    const abilitySize = 32;
    const abilitySpacing = 38;
    const startX = W - 15 - player.abilities.length * abilitySpacing;

    for (let i = 0; i < player.abilities.length; i++) {
      const ability = player.abilities[i];
      const ax = startX + i * abilitySpacing;

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.strokeStyle = ability.element ? (
        ability.element === 'fire' ? '#FF4400' :
        ability.element === 'ice' ? '#44AAFF' :
        ability.element === 'lightning' ? '#FFFF44' :
        ability.element === 'earth' ? '#88AA44' :
        ability.element === 'wind' ? '#44FFAA' :
        ability.element === 'dark' ? '#AA44FF' :
        '#FFDD44'
      ) : '#888888';
      ctx.lineWidth = 2;
      roundRect(ctx, ax, abilityY, abilitySize, abilitySize, 6);
      ctx.fill();
      ctx.stroke();

      // Cooldown overlay
      if (ability.cooldownTimer > 0 && ability.cooldown > 0) {
        const cdPct = ability.cooldownTimer / ability.cooldown;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(ax, abilityY + abilitySize * (1-cdPct), abilitySize, abilitySize * cdPct);

        ctx.fillStyle = '#FFFFFF';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(Math.ceil(ability.cooldownTimer / 60) + 's', ax + abilitySize/2, abilityY + abilitySize/2 + 3);
      } else {
        // Ready indicator
        ctx.fillStyle = '#44FF44';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('▶', ax + abilitySize/2, abilityY + abilitySize/2 + 3);
      }

      // Ability name (tiny)
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      const shortName = (ability.name || 'Ability').substring(0, 5);
      ctx.fillText(shortName, ax + abilitySize/2, abilityY + abilitySize + 10);
    }
  }

  // DPS counter (top right area, small)
  if (Statistics.session.currentDPS > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('DPS: ' + Math.floor(Statistics.session.currentDPS), W - 15, 82 + (gameState.feverMode ? 10 : 0));
  }

  // Minimap
  Minimap.render(ctx);

  // Wave announcement
  if (gameState.waveAnnounce > 0) {
    gameState.waveAnnounce--;
    const announceAlpha = Math.min(1, gameState.waveAnnounce / 30);
    const announceScale = 1 + (1 - announceAlpha) * 0.3;

    ctx.save();
    ctx.globalAlpha = announceAlpha;
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `bold ${Math.floor(24 * announceScale)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('WAVE ' + gameState.wave, W/2, H/2 - 50);

    if (gameState.wave % 5 === 0) {
      ctx.fillStyle = '#FF4444';
      ctx.font = `bold ${Math.floor(16 * announceScale)}px monospace`;
      ctx.fillText('⚠ BOSS INCOMING ⚠', W/2, H/2 - 25);
    }
    ctx.restore();
  }

  // Joystick (virtual)
  if (Input.touch.active || Input.joystick.active) {
    const jx = Input.joystick.baseX || 80;
    const jy = Input.joystick.baseY || H - 120;
    const jr = 50;

    // Base
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(jx, jy, jr, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Stick
    const stickX = jx + (Input.joystick.dx || 0) * jr * 0.8;
    const stickY = jy + (Input.joystick.dy || 0) * jr * 0.8;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(stickX, stickY, 18, 0, Math.PI * 2);
    ctx.fill();
  }

  // Dash button
  const dashBtnX = W - 70, dashBtnY = H - 100, dashBtnR = 25;
  const dashReady = !player.dashCooldown || player.dashCooldown <= 0;
  ctx.fillStyle = dashReady ? 'rgba(68,255,255,0.2)' : 'rgba(100,100,100,0.1)';
  ctx.strokeStyle = dashReady ? 'rgba(68,255,255,0.5)' : 'rgba(100,100,100,0.2)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(dashBtnX, dashBtnY, dashBtnR, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = dashReady ? '#44FFFF' : '#666666';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DASH', dashBtnX, dashBtnY + 4);

  // Pause button
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  roundRect(ctx, W - 40, 5, 30, 24, 6);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('❚❚', W - 25, 22);

  // Combo announcements
  ComboSystem.render(ctx);

  // Achievement notifications
  AchievementNotifier.render(ctx);

  // Damage numbers
  DamageNumbers.render(ctx);

  // Weather overlay
  Weather.render(ctx);

  // Story dialogue overlay
  if (StorySystem.isActive) {
    StorySystem.render(ctx);
  }

  // Screen transitions
  Transitions.render(ctx);
}

// SECTION 42: ENHANCED GAME OVER SCREEN
// ============================================================

function renderEnhancedGameOver(ctx) {
  const W = 420, H = 750;

  // Background with red tint
  ctx.fillStyle = '#100008';
  ctx.fillRect(0, 0, W, H);

  // Floating particles
  const t = Date.now() * 0.001;
  for (let i = 0; i < 30; i++) {
    const px = ((i * 137.5 + t * 15) % (W + 20)) - 10;
    const py = H - ((i * 97.3 + t * 20) % (H + 20));
    ctx.fillStyle = `rgba(255,0,50,${0.1 + Math.sin(t + i) * 0.1})`;
    ctx.beginPath();
    ctx.arc(px, py, 1 + Math.sin(t + i) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // GAME OVER title
  ctx.fillStyle = '#FF0044';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, 80);

  // Stats summary
  const s = Statistics.session;
  const lineH = 24;
  let y = 130;

  function statRow(label, value, color) {
    ctx.fillStyle = '#888888';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(label, 40, y);
    ctx.fillStyle = color || '#FFFFFF';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(String(value), W - 40, y);
    y += lineH;
  }

  // Score
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(safeStr(gameState.score), W/2, y);
  y += 15;
  ctx.fillStyle = '#888888';
  ctx.font = '10px monospace';
  ctx.fillText('FINAL SCORE', W/2, y);
  y += 30;

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(40, y);
  ctx.lineTo(W - 40, y);
  ctx.stroke();
  y += 15;

  statRow('Wave Reached', gameState.wave, '#44AAFF');
  statRow('Enemies Killed', s.enemiesKilled, '#FF8888');
  statRow('Bosses Killed', s.bossesKilled, '#FF4444');
  statRow('Damage Dealt', Math.floor(s.totalDamageDealt).toLocaleString(), '#FF8844');
  statRow('Highest Combo', s.highestCombo, '#FFD700');
  statRow('Accuracy', Statistics.getAccuracy().toFixed(1) + '%', '#44FF44');
  statRow('Time Survived', Statistics.getFormattedTime(s.timePlayed), '#44FFFF');
  statRow('Peak DPS', Math.floor(s.peakDPS), '#FF8844');
  statRow('Style Points', s.stylePoints.toLocaleString(), '#CC44FF');

  // Rank based on performance
  let rank = 'D';
  const score = gameState.score || 0;
  if (score > 100000) rank = 'SSS';
  else if (score > 50000) rank = 'SS';
  else if (score > 25000) rank = 'S';
  else if (score > 10000) rank = 'A';
  else if (score > 5000) rank = 'B';
  else if (score > 1000) rank = 'C';

  y += 15;
  ctx.fillStyle = ComboSystem.rankColors[rank] || '#FFFFFF';
  ctx.font = 'bold 40px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(rank, W/2, y + 10);
  ctx.font = '10px monospace';
  ctx.fillText('RANK', W/2, y + 25);

  // NG+ info
  y += 50;
  if (gameState.wave >= 50) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('✨ NEW GAME+ UNLOCKED ✨', W/2, y);
    y += 20;
  }

  // Buttons
  const btnY = H - 140;
  drawGlassButton(ctx, W/2 - 80, btnY, 160, 40, 'PLAY AGAIN', '#44FF44', true);
  drawGlassButton(ctx, W/2 - 80, btnY + 50, 160, 40, 'MAIN MENU', '#FF4444', true);

  // Tips
  ctx.fillStyle = '#555555';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  const tips = [
    'TIP: Combine elements for powerful synergy effects!',
    'TIP: Dash through enemy bullets for perfect dodge bonus!',
    'TIP: Upgrade your weapon tree to unlock new abilities!',
    'TIP: Check the codex to learn enemy weaknesses!',
    'TIP: Use abilities at max combo for bonus damage!',
    'TIP: The shop sells permanent stat upgrades!',
    'TIP: Try Daily Challenge for unique modifiers!',
    'TIP: Each ship has different passive abilities!',
    'TIP: Boss phases change at HP thresholds - be ready!'
  ];
  const tipIndex = Math.floor(Date.now() / 5000) % tips.length;
  ctx.fillText(tips[tipIndex], W/2, H - 15);
}

function renderEnhancedShopScreen(ctx) {
  const W = 420, H = 750;

  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 20px monospace';

  // Coins
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('💰 ' + (player.coins || 0), W - 20, 35);

  // Shop items
  const shopItems = [
    { name: 'Max HP +10', stat: 'maxHP', amount: 10, baseCost: 50, color: '#44FF44', icon: '❤️' },
    { name: 'Attack +2', stat: 'attack', amount: 2, baseCost: 75, color: '#FF4444', icon: '⚔️' },
    { name: 'Defense +1', stat: 'defense', amount: 1, baseCost: 60, color: '#44AAFF', icon: '🛡️' },
    { name: 'Speed +0.2', stat: 'speed', amount: 0.2, baseCost: 40, color: '#44FFFF', icon: '💨' },
    { name: 'Crit Chance +3%', stat: 'critChance', amount: 0.03, baseCost: 80, color: '#FFFF44', icon: '⚡' },
    { name: 'Fire Rate +5%', stat: 'fireRate', amount: 0.05, baseCost: 70, color: '#FF8844', icon: '🔥' },
    { name: 'Shield +5', stat: 'maxShield', amount: 5, baseCost: 90, color: '#44DDFF', icon: '🔷' },
    { name: 'XP Gain +10%', stat: 'xpMult', amount: 0.1, baseCost: 100, color: '#BB88FF', icon: '✨' },
    { name: 'Magnet Range +15', stat: 'magnetRange', amount: 15, baseCost: 45, color: '#FFD700', icon: '🧲' },
    { name: 'Luck +5%', stat: 'luck', amount: 0.05, baseCost: 65, color: '#88FF88', icon: '🍀' }
  ];

  if (!gameState.shopScrollY) gameState.shopScrollY = 0;
  const itemH = 65;
  const startY = 55;
  const visibleH = H - startY - 60;
  const maxScroll = Math.max(0, shopItems.length * itemH - visibleH);
  gameState.shopScrollY = clamp(gameState.shopScrollY, 0, maxScroll);

  ctx.save();
  ctx.beginPath();
  ctx.rect(10, startY, W - 20, visibleH);
  ctx.clip();

  for (let i = 0; i < shopItems.length; i++) {
    const item = shopItems[i];
    const iy = startY + i * itemH - gameState.shopScrollY;
    if (iy + itemH < startY || iy > startY + visibleH) continue;

    const level = player.shopLevels ? (player.shopLevels[item.stat] || 0) : 0;
    const cost = Math.floor(item.baseCost * Math.pow(1.3, level));
    const canBuy = (player.coins || 0) >= cost;

    // Card
    ctx.fillStyle = canBuy ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.02)';
    ctx.strokeStyle = canBuy ? item.color + '44' : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    roundRect(ctx, 15, iy + 2, W - 30, itemH - 4, 8);
    ctx.fill();
    ctx.stroke();

    // Icon
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(item.icon, 38, iy + 38);

    // Name
    ctx.fillStyle = canBuy ? item.color : '#666666';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(item.name, 60, iy + 22);

    // Level
    ctx.fillStyle = '#888888';
    ctx.font = '10px monospace';
    ctx.fillText('Level ' + level, 60, iy + 38);

    // Current value
    const currentVal = player[item.stat] || 0;
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText('Current: ' + (typeof currentVal === 'number' ? (currentVal % 1 === 0 ? currentVal : currentVal.toFixed(2)) : currentVal), 60, iy + 52);

    // Cost
    ctx.fillStyle = canBuy ? '#FFD700' : '#FF4444';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('💰 ' + cost, W - 25, iy + 30);

    // Buy button
    if (canBuy) {
      ctx.fillStyle = item.color + '33';
      ctx.strokeStyle = item.color;
      ctx.lineWidth = 1;
      roundRect(ctx, W - 85, iy + 38, 55, 20, 5);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = item.color;
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BUY', W - 57, iy + 52);
    }
  }

  ctx.restore();

  // Back button
  drawGlassButton(ctx, W/2 - 60, H - 50, 120, 36, 'BACK', '#FF4444', true);
}

// ============================================================
// SECTION 45: ENHANCED SHIP SELECT SCREEN
// ============================================================

function renderEnhancedShipSelect(ctx) {
  const W = 420, H = 750;

  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SELECT YOUR SHIP', W/2, 35);

  // Ship data
  const ships = typeof SHIPS !== 'undefined' ? SHIPS : [];
  if (!gameState.selectedShip) gameState.selectedShip = 0;

  const cardW = 180, cardH = 280;
  const cardX = W/2 - cardW/2;
  const cardY = 60;
  const currentShip = ships[gameState.selectedShip] || {};

  // Navigation arrows
  if (gameState.selectedShip > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('◀', 25, cardY + cardH/2);
  }
  if (gameState.selectedShip < ships.length - 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('▶', W - 25, cardY + cardH/2);
  }

  // Ship card
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.strokeStyle = (currentShip.color || '#888888') + '66';
  ctx.lineWidth = 2;
  roundRect(ctx, cardX, cardY, cardW, cardH, 12);
  ctx.fill();
  ctx.stroke();

  // Ship preview (animated)
  const t = Date.now() * 0.001;
  const shipCX = W/2;
  const shipCY = cardY + 80;
  const breathe = Math.sin(t * 2) * 3;

  // Ship glow
  const glow = ctx.createRadialGradient(shipCX, shipCY, 0, shipCX, shipCY, 50);
  glow.addColorStop(0, (currentShip.color || '#888888') + '22');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(shipCX, shipCY, 50, 0, Math.PI * 2);
  ctx.fill();

  // Draw ship sprite
  if (typeof drawShipSprite === 'function') {
    try {
      drawShipSprite(ctx, shipCX, shipCY + breathe, 25, currentShip.color || '#FFFFFF');
    } catch(e) {
      // Fallback: simple triangle
      ctx.fillStyle = currentShip.color || '#FFFFFF';
      ctx.beginPath();
      ctx.moveTo(shipCX, shipCY - 20 + breathe);
      ctx.lineTo(shipCX - 15, shipCY + 15 + breathe);
      ctx.lineTo(shipCX + 15, shipCY + 15 + breathe);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Ship name
  ctx.fillStyle = currentShip.color || '#FFFFFF';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(currentShip.name || 'Unknown', W/2, cardY + 140);

  // Ship passive
  ctx.fillStyle = '#AAAAAA';
  ctx.font = '9px monospace';
  ctx.fillText(currentShip.passive || '', W/2, cardY + 156);

  // Stat bars
  const stats = ['hp', 'atk', 'def', 'spd'];
  const statLabels = ['HP', 'ATK', 'DEF', 'SPD'];
  const statColors = ['#44FF44', '#FF4444', '#44AAFF', '#44FFFF'];
  const barX = cardX + 15;
  const barStartY = cardY + 175;
  const barMaxW = cardW - 30;
  const barH = 8;
  const barSpacing = 22;

  for (let i = 0; i < stats.length; i++) {
    const by = barStartY + i * barSpacing;
    const val = currentShip[stats[i]] || 50;
    const maxVal = 150;

    ctx.fillStyle = '#888888';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(statLabels[i], barX, by);

    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(ctx, barX + 30, by - 7, barMaxW - 30, barH, 4);
    ctx.fill();

    ctx.fillStyle = statColors[i];
    roundRect(ctx, barX + 30, by - 7, (barMaxW - 30) * (val / maxVal), barH, 4);
    ctx.fill();

    ctx.fillStyle = '#FFFFFF';
    ctx.textAlign = 'right';
    ctx.fillText(String(val), barX + barMaxW, by);
  }

  // Cost or OWNED
  const isOwned = !currentShip.cost || currentShip.cost === 0 || (player.ownedShips && player.ownedShips.includes(gameState.selectedShip));
  if (isOwned) {
    ctx.fillStyle = '#44FF44';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('✓ OWNED', W/2, cardY + cardH - 10);
  } else {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('💰 ' + (currentShip.cost || 0), W/2, cardY + cardH - 10);
  }

  // Ship counter
  ctx.fillStyle = '#666666';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${gameState.selectedShip + 1} / ${ships.length}`, W/2, cardY + cardH + 15);

  // Element select
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CHOOSE ELEMENT', W/2, cardY + cardH + 45);

  const elements = ['fire', 'ice', 'lightning', 'earth', 'wind', 'dark', 'light'];
  const elementColors = ['#FF4400', '#44AAFF', '#FFFF44', '#88AA44', '#44FFAA', '#AA44FF', '#FFDD44'];
  if (!gameState.selectedElement) gameState.selectedElement = 0;

  const elemW = 42, elemH = 42;
  const elemStartX = (W - elements.length * (elemW + 4)) / 2;
  const elemY = cardY + cardH + 55;

  for (let i = 0; i < elements.length; i++) {
    const ex = elemStartX + i * (elemW + 4);
    const isSelected = gameState.selectedElement === i;

    ctx.fillStyle = isSelected ? elementColors[i] + '44' : 'rgba(255,255,255,0.03)';
    ctx.strokeStyle = isSelected ? elementColors[i] : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = isSelected ? 2 : 1;
    roundRect(ctx, ex, elemY, elemW, elemH, 6);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = isSelected ? elementColors[i] : '#666666';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(elements[i].toUpperCase(), ex + elemW/2, elemY + elemH/2 + 3);
  }

  // Element description
  const elemDescs = [
    'Burn damage over time',
    'Slow and freeze enemies',
    'Chain hits, high crit',
    'Tanky, rock shields',
    'Speed and pushback',
    'Life drain, void dmg',
    'Heal on hit, holy zones'
  ];
  ctx.fillStyle = '#AAAAAA';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(elemDescs[gameState.selectedElement] || '', W/2, elemY + elemH + 16);

  // Launch button
  const launchY = H - 100;
  if (isOwned) {
    drawGlassButton(ctx, W/2 - 90, launchY, 180, 44, '▶  LAUNCH  ▶', '#44FF44', true);
  } else {
    const canBuy = (player.coins || 0) >= (currentShip.cost || 0);
    drawGlassButton(ctx, W/2 - 90, launchY, 180, 44, canBuy ? 'PURCHASE' : 'NOT ENOUGH 💰', canBuy ? '#FFD700' : '#666666', canBuy);
  }

  // Back button
  drawGlassButton(ctx, W/2 - 60, H - 45, 120, 36, 'BACK', '#FF4444', true);
}

// ============================================================
// SECTION 46: TOUCH INPUT HANDLER FOR MENUS
// ============================================================

function handleMenuTap(x, y) {
  const W = 420, H = 750;

  try {
    switch(gameState.screen) {
      case 'title': {
        // Menu buttons
        const menuItems = [
          { screen: 'shipSelect' },
          { screen: 'daily' },
          { screen: 'weaponTree' },
          { screen: 'codex' },
          { screen: 'story' },
          { screen: 'stats' },
          { screen: 'shop' },
          { screen: 'achievements' },
          { screen: 'settings' }
        ];
        const btnW = 220, btnH = 36;
        const startBtnY = 280;
        const btnSpacing = 44;

        for (let i = 0; i < menuItems.length; i++) {
          const by = startBtnY + i * btnSpacing;
          const bx = W/2 - btnW/2;
          if (x >= bx && x <= bx + btnW && y >= by && y <= by + btnH) {
            ScreenManager.navigate(menuItems[i].screen, 'fade');
            return;
          }
        }
        break;
      }

      case 'shipSelect': {
        const ships = typeof SHIPS !== 'undefined' ? SHIPS : [];
        // Left arrow
        if (x < 50 && y > 100 && y < 380) {
          if (gameState.selectedShip > 0) {
            gameState.selectedShip--;
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
          }
          return;
        }
        // Right arrow
        if (x > W - 50 && y > 100 && y < 380) {
          if (gameState.selectedShip < ships.length - 1) {
            gameState.selectedShip++;
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
          }
          return;
        }
        // Element buttons
        const elemW = 42;
        const elemStartX = (W - 7 * (elemW + 4)) / 2;
        const elemY = 395;
        for (let i = 0; i < 7; i++) {
          const ex = elemStartX + i * (elemW + 4);
          if (x >= ex && x <= ex + elemW && y >= elemY && y <= elemY + 42) {
            gameState.selectedElement = i;
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
            return;
          }
        }
        // Launch button
        if (x >= W/2 - 90 && x <= W/2 + 90 && y >= H - 100 && y <= H - 56) {
          // Start game
          startNewGame();
          return;
        }
        // Back button
        if (x >= W/2 - 60 && x <= W/2 + 60 && y >= H - 45 && y <= H - 9) {
          ScreenManager.back('fade');
          return;
        }
        break;
      }

      case 'playing': {
        // Pause button
        if (x >= W - 40 && x <= W && y >= 5 && y <= 29) {
          gameState.screen = 'paused';
          if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
          return;
        }
        // Dash button
        if (Math.hypot(x - (W - 70), y - (H - 100)) < 30) {
          if (typeof player !== 'undefined' && (!player.dashCooldown || player.dashCooldown <= 0)) {
            player.dashing = true;
            player.dashTimer = 12;
            player.dashCooldown = 90;
            Statistics.session.dashesUsed++;
            if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('dash');
          }
          return;
        }
        // Dialogue advance
        if (StorySystem.isActive) {
          StorySystem.advance();
          return;
        }
        break;
      }

      case 'paused': {
        // Resume
        if (x >= W/2 - 80 && x <= W/2 + 80 && y >= 400 && y <= 440) {
          gameState.screen = 'playing';
          if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
          return;
        }
        // Settings
        if (x >= W/2 - 80 && x <= W/2 + 80 && y >= 455 && y <= 495) {
          ScreenManager.navigate('settings');
          return;
        }
        // Quit
        if (x >= W/2 - 80 && x <= W/2 + 80 && y >= 510 && y <= 550) {
          gameState.screen = 'title';
          if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
          return;
        }
        break;
      }

      case 'gameOver': {
        // Play again
        if (x >= W/2 - 80 && x <= W/2 + 80 && y >= H - 140 && y <= H - 100) {
          startNewGame();
          return;
        }
        // Main menu
        if (x >= W/2 - 80 && x <= W/2 + 80 && y >= H - 90 && y <= H - 50) {
          ScreenManager.navigate('title', 'fade');
          return;
        }
        break;
      }

      case 'codex': {
        // Tab switching
        const tabW = (W - 40) / 4;
        if (y >= 70 && y <= 98) {
          for (let i = 0; i < 4; i++) {
            if (x >= 20 + i * tabW && x <= 20 + (i+1) * tabW) {
              gameState.codexTab = i;
              gameState.codexScroll = 0;
              if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
              return;
            }
          }
        }
        // Back
        if (x >= W/2 - 60 && x <= W/2 + 60 && y >= H - 50 && y <= H - 14) {
          ScreenManager.back('fade');
          return;
        }
        break;
      }

      case 'weaponTree': {
        // Tab switching
        const elements = Object.keys(WeaponTrees.trees);
        const wtabW = (W - 20) / elements.length;
        if (y >= 48 && y <= 72) {
          for (let i = 0; i < elements.length; i++) {
            if (x >= 10 + i * wtabW && x <= 10 + (i+1) * wtabW) {
              gameState.weaponTreeTab = i;
              if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
              return;
            }
          }
        }
        // Node clicking (upgrade)
        const selectedElement = elements[gameState.weaponTreeTab];
        const tree = WeaponTrees.trees[selectedElement];
        if (tree) {
          for (let node of tree.nodes) {
            if (WeaponTrees.canUnlock(selectedElement, node.id)) {
              // Simple hit test based on tier position
              const nodesByTier = {};
              for (let n of tree.nodes) {
                if (!nodesByTier[n.tier]) nodesByTier[n.tier] = [];
                nodesByTier[n.tier].push(n);
              }
              const nx = getNodeXForTree(nodesByTier, node, W);
              const ny = 140 + node.tier * 120;
              if (x >= nx - 80 && x <= nx + 80 && y >= ny && y <= ny + 50) {
                if (WeaponTrees.unlock(selectedElement, node.id)) {
                  if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('powerup');
                }
                return;
              }
            }
          }
        }
        // Back
        if (x >= W/2 - 60 && x <= W/2 + 60 && y >= H - 50 && y <= H - 14) {
          ScreenManager.back('fade');
          return;
        }
        break;
      }

      case 'stats':
      case 'story':
      case 'daily':
      case 'achievements':
      case 'settings':
      case 'shop':
      case 'equipment': {
        // Back button (common position)
        if (x >= W/2 - 60 && x <= W/2 + 60 && y >= H - 50 && y <= H - 14) {
          ScreenManager.back('fade');
          return;
        }
        // Stats tab toggle
        if (gameState.screen === 'stats' && y >= 50 && y <= 78) {
          if (x >= W/2 - 100 && x < W/2) gameState.statsTab = 0;
          else if (x >= W/2 && x <= W/2 + 100) gameState.statsTab = 1;
          if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('select');
          return;
        }
        // Daily start
        if (gameState.screen === 'daily') {
          if (x >= W/2 - 80 && x <= W/2 + 80 && y >= H - 130 && y <= H - 86) {
            DailyChallenge.start();
            startNewGame();
            return;
          }
        }
        break;
      }

      case 'levelUp': {
        // Level up choices handled in existing code
        break;
      }
    }
  } catch(e) {
    // Menu tap error - ignore
  }
}

// ============================================================
// SECTION 47: GAME INITIALIZATION & NEW GAME SETUP
// ============================================================

function startNewGame() {
  try {
    // Reset systems
    ComboSystem.reset();
    DamageNumbers.clear();
    Statistics.resetSession();
    BossSystem.reset();
    Weather.current = 'clear';
    Weather.intensity = 0;
    Weather.timer = 0;

    // Reset story chapters for new playthough
    // (Don't reset 'seen' - that persists)

    // Player setup
    const ships = typeof SHIPS !== 'undefined' ? SHIPS : [];
    const ship = ships[gameState.selectedShip || 0] || {};
    const elements = ['fire', 'ice', 'lightning', 'earth', 'wind', 'dark', 'light'];
    const selectedElement = elements[gameState.selectedElement || 0] || 'fire';

    player.x = 210;
    player.y = 600;
    player.hp = ship.hp || 100;
    player.maxHP = ship.hp || 100;
    player.attack = ship.atk || 10;
    player.defense = ship.def || 5;
    player.speed = (ship.spd || 80) / 20;
    player.shield = 0;
    player.maxShield = ship.maxShield || 0;
    player.level = 1;
    player.xp = 0;
    player.xpToNext = 100;
    player.element = selectedElement;
    player.abilities = [];
    player.dashCooldown = 0;
    player.dashing = false;
    player.dashTimer = 0;
    player.invulnTimer = 120; // 2 seconds of invuln at start
    player.fireTimer = 0;
    player.fireRate = 10;
    player.critChance = 0.05;

    // Apply NG+ bonuses
    if (NewGamePlus.level > 0) {
      const bonuses = NewGamePlus.getBonuses();
      player.level = bonuses.startingLevel;
      player.xpToNext = 100 * Math.pow(1.15, player.level);
    }

    // Apply weapon tree effects
    const treeEffects = WeaponTrees.getAllEffects();
    if (treeEffects.hpBonus) player.maxHP = Math.floor(player.maxHP * (1 + treeEffects.hpBonus));
    if (treeEffects.moveSpeed) player.speed *= (1 + treeEffects.moveSpeed);
    if (treeEffects.critChance) player.critChance += treeEffects.critChance;
    player.hp = player.maxHP;

    // Reset game state
    gameState.screen = 'playing';
    gameState.wave = 1;
    gameState.score = 0;
    gameState.biome = 0;
    gameState.feverMode = false;
    gameState.ultimateCharge = 0;
    gameState.waveAnnounce = 120;
    gameState.waveTimer = 0;
    gameState.enemiesRemaining = 0;

    // Clear pools
    if (typeof Enemies !== 'undefined') {
      for (let i = 0; i < Enemies.pool.length; i++) Enemies.pool[i].active = false;
    }
    if (typeof PlayerBullets !== 'undefined') {
      for (let i = 0; i < PlayerBullets.pool.length; i++) PlayerBullets.pool[i].active = false;
    }
    if (typeof EnemyBullets !== 'undefined') {
      for (let i = 0; i < EnemyBullets.pool.length; i++) EnemyBullets.pool[i].active = false;
    }
    if (typeof Pickups !== 'undefined') {
      for (let i = 0; i < Pickups.pool.length; i++) Pickups.pool[i].active = false;
    }
    if (typeof Particles !== 'undefined') {
      for (let i = 0; i < Particles.pool.length; i++) Particles.pool[i].active = false;
    }

    // Trigger first story if not seen
    StorySystem.checkTrigger(1, 0);

    // Discover first biome
    Codex.discover('biomes', 'deep_space');

    // Play start sound
    if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('powerup');

    // Start weather
    Weather.generateWeatherForBiome(0);

    // Tutorial (only on first play)
    if (!gameState.tutorialComplete && typeof Tutorial !== 'undefined') {
      Tutorial.start();
    }

  } catch(e) {
    // Initialization error - still proceed
    gameState.screen = 'playing';
  }
}

// ============================================================
// SECTION 48: MAIN RENDER DISPATCHER
// ============================================================

function renderScreen(ctx) {
  try {
    switch(gameState.screen) {
      case 'title':
        renderEnhancedTitleScreen(ctx);
        break;
      case 'shipSelect':
        renderEnhancedShipSelect(ctx);
        break;
      case 'shop':
        renderEnhancedShopScreen(ctx);
        break;
      case 'equipment':
        if (typeof renderEquipmentScreen === 'function') renderEquipmentScreen(ctx);
        break;
      case 'achievements':
        if (typeof renderAchievementsScreen === 'function') renderAchievementsScreen(ctx);
        break;
      case 'settings':
        if (typeof renderSettingsScreen === 'function') renderSettingsScreen(ctx);
        break;
      case 'codex':
        renderCodexScreen(ctx);
        break;
      case 'weaponTree':
        renderWeaponTreeScreen(ctx);
        break;
      case 'stats':
        renderStatsScreen(ctx);
        break;
      case 'daily':
        renderDailyChallengeScreen(ctx);
        break;
      case 'story':
        renderStoryScreen(ctx);
        break;
      case 'playing':
        // Game rendering handled by main loop
        renderEnhancedHUD(ctx);
        break;
      case 'paused':
        renderEnhancedPauseScreen(ctx);
        break;
      case 'levelUp':
        if (typeof renderLevelUpScreen === 'function') renderLevelUpScreen(ctx);
        break;
      case 'gameOver':
        renderEnhancedGameOver(ctx);
        break;
      default:
        renderEnhancedTitleScreen(ctx);
    }

    // Always render transitions on top
    Transitions.update();
    Transitions.render(ctx);

  } catch(e) {
    // Render error fallback
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 420, 750);
    ctx.fillStyle = '#FF0000';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Render Error - Tap to continue', 210, 375);
  }
}

// ============================================================
// SECTION 49: ENHANCED MAIN UPDATE LOOP
// ============================================================

function enhancedUpdate() {
  try {
    if (gameState.screen !== 'playing') return;

    // Update statistics
    Statistics.update();
    if (typeof player !== 'undefined') {
      Statistics.trackMovement(player.x, player.y);
    }

    // Update combo
    ComboSystem.update();

    // Update damage numbers
    DamageNumbers.update();

    // Update achievement notifications
    AchievementNotifier.update();

    // Update weather
    Weather.update();

    // Update story
    StorySystem.update();

    // Update boss system
    if (BossSystem.activeBoss) {
      let bossEntity = null;
      if (typeof Enemies !== 'undefined') {
        for (let i = 0; i < Enemies.pool.length; i++) {
          if (Enemies.pool[i].active && Enemies.pool[i].isBoss) {
            bossEntity = Enemies.pool[i];
            break;
          }
        }
      }
      if (bossEntity) {
        BossSystem.updatePhase(bossEntity);
        const pattern = BossSystem.getCurrentPattern();
        if (pattern) {
          BossSystem.bossPatternTimer++;
          BossSystem.executePattern(bossEntity, pattern, BossSystem.bossPatternTimer);
          if (BossSystem.bossPatternTimer >= pattern.duration) {
            BossSystem.advancePattern();
          }
        }
      } else {
        // Boss died
        BossSystem.reset();
      }
    }

    // Check story triggers
    if (gameState.waveTimer === 1) {
      StorySystem.checkTrigger(gameState.wave, gameState.biome || 0);
    }

    // Update biome based on wave
    const newBiome = Math.min(5, Math.floor((gameState.wave - 1) / 10));
    if (newBiome !== gameState.biome) {
      gameState.biome = newBiome;
      const biomeKeys = ['deep_space', 'crimson_nebula', 'crystal_void', 'storm_sector', 'abyss', 'core_sector'];
      Codex.discover('biomes', biomeKeys[newBiome] || 'deep_space');
      Weather.generateWeatherForBiome(newBiome);
    }

    // Daily challenge modifiers
    if (DailyChallenge.active && gameState.wave > DailyChallenge.maxWaves) {
      DailyChallenge.score = gameState.score;
      DailyChallenge.end();
      gameState.screen = 'gameOver';
    }

  } catch(e) {
    // Update error - continue
  }
}

// ============================================================
// SECTION 50: LOOT DROP ANIMATION SYSTEM
// ============================================================

const LootDropAnimation = {
  drops: [],
  maxDrops: 20,

  spawn(x, y, item) {
    if (this.drops.length >= this.maxDrops) {
      this.drops.shift();
    }
    this.drops.push({
      x: x,
      y: y,
      item: item,
      timer: 0,
      maxTimer: 120,
      vy: -3,
      vx: (Math.random()-0.5) * 2,
      scale: 0,
      targetScale: 1,
      alpha: 1,
      rotation: 0,
      rotSpeed: (Math.random()-0.5) * 0.1,
      glowTimer: 0,
      collected: false
    });
  },

  update() {
    for (let i = this.drops.length - 1; i >= 0; i--) {
      const d = this.drops[i];
      d.timer++;
      d.vy += 0.08;
      d.x += d.vx;
      d.y += d.vy;
      d.vx *= 0.99;
      d.rotation += d.rotSpeed;
      d.scale += (d.targetScale - d.scale) * 0.15;
      d.glowTimer += 0.1;

      // Bounce
      if (d.y > 750 - 50) {
        d.y = 750 - 50;
        d.vy = -Math.abs(d.vy) * 0.5;
        if (Math.abs(d.vy) < 0.5) d.vy = 0;
      }

      // Fade out near end
      if (d.timer > d.maxTimer - 30) {
        d.alpha = (d.maxTimer - d.timer) / 30;
      }

      if (d.timer >= d.maxTimer) {
        this.drops.splice(i, 1);
      }
    }
  },

  render(ctx) {
    for (let d of this.drops) {
      ctx.save();
      ctx.globalAlpha = d.alpha;
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rotation);
      ctx.scale(d.scale, d.scale);

      const tierColors = {
        common: '#AAAAAA',
        uncommon: '#44FF44',
        rare: '#44AAFF',
        epic: '#AA44FF',
        legendary: '#FF8800',
        mythic: '#FF0044'
      };

      const color = tierColors[d.item.tier] || '#FFFFFF';

      // Glow
      const glowAlpha = 0.3 + Math.sin(d.glowTimer) * 0.2;
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 20);
      glow.addColorStop(0, color + Math.floor(glowAlpha * 255).toString(16).padStart(2,'0'));
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, 20, 0, Math.PI * 2);
      ctx.fill();

      // Item shape
      ctx.fillStyle = color;
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1;

      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(0, -10);
      ctx.lineTo(8, 0);
      ctx.lineTo(0, 10);
      ctx.lineTo(-8, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Tier text
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText((d.item.tier || 'common').toUpperCase(), 0, 20);

      // Name
      ctx.font = '6px monospace';
      ctx.fillText(d.item.name || 'Item', 0, 28);

      ctx.restore();
    }
  }
};

// ============================================================
// SECTION 51: SCREEN SHAKE MANAGER
// ============================================================

const ScreenShakeManager = {
  shakes: [],
  currentOffsetX: 0,
  currentOffsetY: 0,
  currentRotation: 0,

  add(intensity, duration, type) {
    this.shakes.push({
      intensity: intensity,
      duration: duration,
      timer: duration,
      type: type || 'random', // random, horizontal, vertical, rotational
      frequency: 0.5 + Math.random() * 0.5
    });
  },

  update() {
    this.currentOffsetX = 0;
    this.currentOffsetY = 0;
    this.currentRotation = 0;

    for (let i = this.shakes.length - 1; i >= 0; i--) {
      const s = this.shakes[i];
      s.timer--;

      const progress = s.timer / s.duration;
      const decay = progress * progress;
      const magnitude = s.intensity * decay;

      switch(s.type) {
        case 'random':
          this.currentOffsetX += (Math.random()-0.5) * magnitude * 2;
          this.currentOffsetY += (Math.random()-0.5) * magnitude * 2;
          break;
        case 'horizontal':
          this.currentOffsetX += Math.sin(s.timer * s.frequency) * magnitude;
          break;
        case 'vertical':
          this.currentOffsetY += Math.sin(s.timer * s.frequency) * magnitude;
          break;
        case 'rotational':
          this.currentRotation += (Math.random()-0.5) * magnitude * 0.01;
          break;
        case 'impact':
          this.currentOffsetX += Math.sin(s.timer * 0.8) * magnitude * (s.timer % 2 === 0 ? 1 : -1);
          this.currentOffsetY += Math.cos(s.timer * 0.8) * magnitude * (s.timer % 2 === 0 ? 1 : -1);
          break;
      }

      if (s.timer <= 0) {
        this.shakes.splice(i, 1);
      }
    }
  },

  apply(ctx) {
    if (this.currentOffsetX !== 0 || this.currentOffsetY !== 0 || this.currentRotation !== 0) {
      ctx.translate(this.currentOffsetX, this.currentOffsetY);
      if (this.currentRotation !== 0) {
        ctx.translate(210, 375);
        ctx.rotate(this.currentRotation);
        ctx.translate(-210, -375);
      }
    }
  }
};

// ============================================================
// SECTION 52: ENEMY BEHAVIOR AI EXPANSION
// ============================================================

const EnemyAI = {
  behaviors: {
    // Straight line down
    straight(e, dt) {
      e.y += (e.vy || 1) * (e.formationSpeed || 1);
    },

    // Zigzag pattern
    zigzag(e, dt) {
      e.y += (e.vy || 0.8) * (e.formationSpeed || 1);
      e.x += Math.sin(e.y * 0.03) * 2;
    },

    // Strafe left and right
    strafe(e, dt) {
      e.y += (e.vy || 0.3);
      if (!e._strafeDir) e._strafeDir = 1;
      if (!e._strafeTimer) e._strafeTimer = 0;
      e._strafeTimer++;
      if (e._strafeTimer > 120) {
        e._strafeDir *= -1;
        e._strafeTimer = 0;
      }
      e.x += e._strafeDir * 1.5;
    },

    // Swooping dive
    swoop(e, dt) {
      if (!e._swoopPhase) e._swoopPhase = 0;
      e._swoopPhase += 0.02;
      e.y += Math.sin(e._swoopPhase) * 2 + 0.5;
      e.x += Math.cos(e._swoopPhase * 1.5) * 3;
    },

    // Dive bomb toward player
    dive(e, dt) {
      if (!e._diveState) e._diveState = 'approach';
      if (!e._diveTimer) e._diveTimer = 0;
      e._diveTimer++;

      if (e._diveState === 'approach' && e.y < 200) {
        e.y += 1;
      } else if (e._diveState === 'approach') {
        e._diveState = 'aim';
        e._diveTimer = 0;
        if (typeof player !== 'undefined') {
          e._targetX = player.x;
          e._targetY = player.y;
        }
      } else if (e._diveState === 'aim' && e._diveTimer > 30) {
        e._diveState = 'dive';
      } else if (e._diveState === 'dive') {
        if (e._targetX !== undefined) {
          const dx = e._targetX - e.x;
          const dy = e._targetY - e.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist > 5) {
            e.x += (dx / dist) * 5;
            e.y += (dy / dist) * 5;
          } else {
            e._diveState = 'retreat';
            e._diveTimer = 0;
          }
        }
      } else if (e._diveState === 'retreat') {
        e.y -= 2;
        if (e.y < -30) e.active = false;
      }
    },

    // Orbit around a point
    orbit(e, dt) {
      if (!e._orbitAngle) e._orbitAngle = Math.random() * Math.PI * 2;
      if (!e._orbitRadius) e._orbitRadius = 60 + Math.random() * 40;
      if (!e._orbitCenterX) e._orbitCenterX = 210;
      if (!e._orbitCenterY) e._orbitCenterY = 200;

      e._orbitAngle += 0.02;
      e.x = e._orbitCenterX + Math.cos(e._orbitAngle) * e._orbitRadius;
      e.y = e._orbitCenterY + Math.sin(e._orbitAngle) * e._orbitRadius * 0.6;

      // Slowly move orbit center down
      e._orbitCenterY += 0.1;
    },

    // Guard formation - stay at top and shoot
    guard(e, dt) {
      if (!e._guardTarget) {
        e._guardTarget = { x: 30 + Math.random() * 360, y: 50 + Math.random() * 80 };
      }
      e.x += (e._guardTarget.x - e.x) * 0.02;
      e.y += (e._guardTarget.y - e.y) * 0.02;

      // Periodically pick new guard position
      if (!e._guardTimer) e._guardTimer = 0;
      e._guardTimer++;
      if (e._guardTimer > 180) {
        e._guardTarget = { x: 30 + Math.random() * 360, y: 50 + Math.random() * 80 };
        e._guardTimer = 0;
      }
    },

    // Teleport
    teleport(e, dt) {
      if (!e._teleTimer) e._teleTimer = 0;
      e._teleTimer++;
      e.y += 0.3;

      if (e._teleTimer > 120) {
        e._teleTimer = 0;
        const oldX = e.x, oldY = e.y;
        e.x = 30 + Math.random() * 360;
        e.y = Math.max(30, e.y + (Math.random()-0.5) * 100);

        // Teleport particles
        if (typeof ParticlePresets !== 'undefined') {
          ParticlePresets.sparks(oldX, oldY, '#AA44FF', 6);
          ParticlePresets.sparks(e.x, e.y, '#AA44FF', 6);
        }
      }
    },

    // Charge attack
    charge(e, dt) {
      if (!e._chargeState) e._chargeState = 'wait';
      if (!e._chargeTimer) e._chargeTimer = 0;
      e._chargeTimer++;

      if (e._chargeState === 'wait') {
        e.y += 0.3;
        if (e._chargeTimer > 90) {
          e._chargeState = 'telegraph';
          e._chargeTimer = 0;
          // Flash red
          e._flashTimer = 30;
        }
      } else if (e._chargeState === 'telegraph') {
        if (e._chargeTimer > 30) {
          e._chargeState = 'charge';
          e._chargeTimer = 0;
          if (typeof player !== 'undefined') {
            const dx = player.x - e.x;
            const dy = player.y - e.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            e._chargeVX = (dx / dist) * 8;
            e._chargeVY = (dy / dist) * 8;
          }
        }
      } else if (e._chargeState === 'charge') {
        e.x += e._chargeVX || 0;
        e.y += e._chargeVY || 0;
        if (typeof ParticlePresets !== 'undefined' && e._chargeTimer % 3 === 0) {
          ParticlePresets.trail(e.x, e.y, '#FF4444');
        }
        if (e._chargeTimer > 40) {
          e._chargeState = 'wait';
          e._chargeTimer = 0;
        }
      }
    },

    // Boss multi-phase behavior
    boss(e, dt) {
      // Boss behavior is handled by BossSystem
      // Keep boss in bounds
      e.x = clamp(e.x, 30, 390);
      e.y = clamp(e.y, 30, 300);
    },

    // Swarm random movement
    swarm(e, dt) {
      if (!e._swarmTarget) {
        e._swarmTarget = {
          x: typeof player !== 'undefined' ? player.x + (Math.random()-0.5) * 100 : 210,
          y: typeof player !== 'undefined' ? player.y + (Math.random()-0.5) * 100 : 400
        };
      }
      if (!e._swarmTimer) e._swarmTimer = 0;
      e._swarmTimer++;

      const dx = e._swarmTarget.x - e.x;
      const dy = e._swarmTarget.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      e.x += (dx / dist) * 2;
      e.y += (dy / dist) * 2;

      if (e._swarmTimer > 60 || dist < 10) {
        e._swarmTarget = {
          x: typeof player !== 'undefined' ? player.x + (Math.random()-0.5) * 120 : 210,
          y: typeof player !== 'undefined' ? player.y + (Math.random()-0.5) * 120 : 400
        };
        e._swarmTimer = 0;
      }
    },

    // Pincer movement from sides
    pincer(e, dt) {
      if (!e._pincerPhase) e._pincerPhase = 'flank';
      if (!e._pincerTimer) e._pincerTimer = 0;
      e._pincerTimer++;

      if (e._pincerPhase === 'flank') {
        e.y += 0.5;
        // Move toward center
        if (e.x < 210) e.x += 1;
        else e.x -= 1;

        if (e._pincerTimer > 60) {
          e._pincerPhase = 'close';
          e._pincerTimer = 0;
        }
      } else if (e._pincerPhase === 'close') {
        // Rush toward player
        if (typeof player !== 'undefined') {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          e.x += (dx / dist) * 3;
          e.y += (dy / dist) * 3;
        }
      }
    },

    // Mine layer
    minelayer(e, dt) {
      e.y += 0.5;
      e.x += Math.sin(e.y * 0.02) * 1.5;

      if (!e._mineTimer) e._mineTimer = 0;
      e._mineTimer++;

      if (e._mineTimer > 90) {
        e._mineTimer = 0;
        // Spawn mine as AOE
        if (typeof AOEs !== 'undefined') {
          const mine = AOEs.spawn(e.x, e.y);
          if (mine) {
            mine.radius = 0;
            mine.maxRadius = 40;
            mine.damage = 15;
            mine.lifetime = 180;
            mine.maxLifetime = 180;
            mine.color = '#FF880044';
            mine.isEnemyBomb = true;
            mine.isMine = true;
          }
        }
      }
    },

    // Bomber drop
    bomber(e, dt) {
      if (!e._bomberDir) e._bomberDir = Math.random() < 0.5 ? -1 : 1;
      e.y += 0.4;
      e.x += e._bomberDir * 1.2;
      if (e.x < 30 || e.x > 390) e._bomberDir *= -1;

      if (!e._bombTimer) e._bombTimer = 0;
      e._bombTimer++;

      if (e._bombTimer > 60) {
        e._bombTimer = 0;
        if (typeof AOEs !== 'undefined') {
          const bomb = AOEs.spawn(e.x, e.y + 10);
          if (bomb) {
            bomb.radius = 0;
            bomb.maxRadius = 50;
            bomb.damage = 20;
            bomb.lifetime = 45;
            bomb.maxLifetime = 45;
            bomb.color = '#FF440044';
            bomb.isEnemyBomb = true;
          }
        }
      }
    },

    // Splitter - splits on death
    splitter(e, dt) {
      e.y += 0.6;
      e.x += Math.sin(e.y * 0.04) * 2;

      // Split on death is handled in death callback
    },

    // Healer behavior
    healer(e, dt) {
      // Stay behind other enemies
      e.y += 0.2;
      if (e.y > 200) e.y = 200;
      e.x += Math.sin(Date.now() * 0.002 + e.x) * 0.5;

      if (!e._healTimer) e._healTimer = 0;
      e._healTimer++;

      if (e._healTimer > 60) {
        e._healTimer = 0;
        // Heal nearby enemies
        if (typeof Enemies !== 'undefined') {
          for (let i = 0; i < Enemies.pool.length; i++) {
            const other = Enemies.pool[i];
            if (other.active && other !== e) {
              const dx = other.x - e.x, dy = other.y - e.y;
              if (dx*dx + dy*dy < 10000) { // 100 radius
                other.hp = Math.min(other.maxHP, other.hp + 5);
                if (typeof ParticlePresets !== 'undefined') {
                  ParticlePresets.heal(other.x, other.y);
                }
              }
            }
          }
        }
      }
    },

    // Shield enemy - protects nearby
    shielder(e, dt) {
      e.y += 0.3;
      if (e.y > 180) e.y = 180;
      e.x += Math.sin(Date.now() * 0.001 + e.x * 0.1) * 0.8;
    }
  },

  // Get behavior function by type
  getBehavior(type) {
    const typeMap = {
      basic: 'straight',
      fast: 'zigzag',
      tank: 'straight',
      shooter: 'strafe',
      swarm: 'swarm',
      bomber: 'bomber',
      healer: 'healer',
      shield: 'shielder',
      splitter: 'splitter',
      teleporter: 'teleport',
      charger: 'charge',
      minelayer: 'minelayer'
    };
    const behaviorName = typeMap[type] || 'straight';
    return this.behaviors[behaviorName] || this.behaviors.straight;
  }
};

// ============================================================
// SECTION 53: DIFFICULTY SCALING ENGINE
// ============================================================

const DifficultyScaling = {
  baseEnemyHP: 20,
  baseEnemyDamage: 10,
  baseEnemySpeed: 1,
  baseEnemyCount: 5,

  getWaveConfig(wave) {
    const ngBonus = NewGamePlus.level > 0 ? NewGamePlus.getBonuses() : {
      enemyHPMultiplier: 1, enemyDamageMultiplier: 1, enemySpeedMultiplier: 1,
      enemyCountMultiplier: 1, bossHPMultiplier: 1
    };

    const hpScale = 1 + wave * 0.15;
    const dmgScale = 1 + wave * 0.08;
    const spdScale = 1 + wave * 0.02;
    const countBase = Math.min(20, this.baseEnemyCount + Math.floor(wave * 0.5));

    return {
      enemyHP: Math.floor(this.baseEnemyHP * hpScale * (ngBonus.enemyHPMultiplier || 1)),
      enemyDamage: Math.floor(this.baseEnemyDamage * dmgScale * (ngBonus.enemyDamageMultiplier || 1)),
      enemySpeed: this.baseEnemySpeed * spdScale * (ngBonus.enemySpeedMultiplier || 1),
      enemyCount: Math.floor(countBase * (ngBonus.enemyCountMultiplier || 1)),
      isBossWave: wave % 5 === 0,
      bossHP: Math.floor(500 * (1 + wave * 0.2) * (ngBonus.bossHPMultiplier || 1)),
      biome: Math.min(5, Math.floor((wave - 1) / 10)),
      useFormations: wave >= 3,
      formationChance: Math.min(0.7, 0.1 + wave * 0.02),
      eliteChance: Math.min(0.3, 0.02 + wave * 0.01),
      enemyTypes: this.getAvailableTypes(wave)
    };
  },

  getAvailableTypes(wave) {
    const types = ['basic'];
    if (wave >= 2) types.push('fast');
    if (wave >= 3) types.push('shooter');
    if (wave >= 4) types.push('swarm');
    if (wave >= 5) types.push('tank');
    if (wave >= 7) types.push('bomber');
    if (wave >= 8) types.push('charger');
    if (wave >= 10) types.push('healer');
    if (wave >= 12) types.push('shield');
    if (wave >= 15) types.push('splitter');
    if (wave >= 18) types.push('teleporter');
    if (wave >= 20) types.push('minelayer');
    return types;
  },

  getBossForWave(wave) {
    const bossIndex = Math.floor(wave / 5) - 1;
    const bosses = ['warden', 'destroyer', 'queen', 'architect', 'core'];
    return bosses[bossIndex % bosses.length];
  }
};

// ============================================================
// SECTION 54: GLOBAL ERROR RECOVERY
// ============================================================

const ErrorRecovery = {
  errorCount: 0,
  maxErrors: 50,
  lastError: null,
  lastErrorTime: 0,

  handle(error, context) {
    this.errorCount++;
    this.lastError = error;
    this.lastErrorTime = Date.now();

    // If too many errors, try to recover
    if (this.errorCount > this.maxErrors) {
      this.attemptRecovery();
    }
  },

  attemptRecovery() {
    try {
      // Reset to safe state
      this.errorCount = 0;

      // If in gameplay, pause
      if (gameState.screen === 'playing') {
        gameState.screen = 'paused';
      }

      // Clear all active entities to reduce error sources
      const pools = [
        typeof Enemies !== 'undefined' ? Enemies : null,
        typeof PlayerBullets !== 'undefined' ? PlayerBullets : null,
        typeof EnemyBullets !== 'undefined' ? EnemyBullets : null,
        typeof Pickups !== 'undefined' ? Pickups : null,
        typeof Particles !== 'undefined' ? Particles : null,
        typeof AOEs !== 'undefined' ? AOEs : null
      ];

      for (let pool of pools) {
        if (pool && pool.pool) {
          for (let i = 0; i < pool.pool.length; i++) {
            pool.pool[i].active = false;
          }
        }
      }
    } catch(e) {
      // Recovery itself failed - just continue
    }
  }
};

// Override existing error handler
window.onerror = function(msg, url, line, col, error) {
  ErrorRecovery.handle(error || msg, `${url}:${line}:${col}`);
  return true;
};

// Store reference to old loop if it exists
const _oldLoop = typeof loop === 'function' ? loop : null;

// Override the main loop
function gameLoop(timestamp) {
  try {
    const canvas = document.getElementById('gameCanvas') || document.querySelector('canvas');
    if (!canvas) { requestAnimationFrame(gameLoop); return; }
    const ctx = canvas.getContext('2d');
    if (!ctx) { requestAnimationFrame(gameLoop); return; }

    // Clear
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Apply device pixel ratio scaling
    ctx.save();
    const dpr = window.devicePixelRatio || 1;
    const W = 420, H = 750;

    // Scale to virtual resolution
    const scaleX = canvas.width / (W * dpr);
    const scaleY = canvas.height / (H * dpr);
    const scale = Math.min(scaleX, scaleY) * dpr;
    const offsetX = (canvas.width - W * scale) / 2;
    const offsetY = (canvas.height - H * scale) / 2;
    ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);

    // Apply screen shake
    ScreenShakeManager.update();
    if (gameState.screen === 'playing') {
      ScreenShakeManager.apply(ctx);
    }

    // Update input
    if (typeof Input !== 'undefined' && Input.update) Input.update();

    // Update game
    if (gameState.screen === 'playing') {
      // Run original game update if it exists
      if (typeof updateGameplay === 'function') {
        try { updateGameplay(); } catch(e) { ErrorRecovery.handle(e, 'updateGameplay'); }
      }
      // Run enhanced updates
      enhancedUpdate();
    }

    // Render
    if (gameState.screen === 'playing') {
      // Render game world
      try {
        // Background
        if (typeof renderBackground === 'function') renderBackground(ctx);
        else {
          ctx.fillStyle = '#050510';
          ctx.fillRect(0, 0, W, H);
        }

        // Stars
        if (typeof Stars !== 'undefined' && Stars.render) Stars.render(ctx);
        if (typeof Stars !== 'undefined' && Stars.update) Stars.update();

        // Entities
        if (typeof Pickups !== 'undefined') {
          for (let i = 0; i < Pickups.pool.length; i++) {
            const p = Pickups.pool[i];
            if (p.active) {
              ctx.fillStyle = p.color || '#FFD700';
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size || 6, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }

        // Player bullets
        if (typeof PlayerBullets !== 'undefined') {
          ctx.fillStyle = player.element === 'fire' ? '#FF4400' :
                          player.element === 'ice' ? '#44AAFF' :
                          player.element === 'lightning' ? '#FFFF44' :
                          player.element === 'earth' ? '#88AA44' :
                          player.element === 'wind' ? '#44FFAA' :
                          player.element === 'dark' ? '#AA44FF' : '#FFDD44';
          for (let i = 0; i < PlayerBullets.pool.length; i++) {
            const b = PlayerBullets.pool[i];
            if (b.active) {
              ctx.beginPath();
              ctx.arc(b.x, b.y, b.size || 3, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }

        // Enemy bullets
        if (typeof EnemyBullets !== 'undefined') {
          for (let i = 0; i < EnemyBullets.pool.length; i++) {
            const b = EnemyBullets.pool[i];
            if (b.active) {
              ctx.fillStyle = b.color || '#FF4488';
              ctx.beginPath();
              ctx.arc(b.x, b.y, b.size || 4, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }

        // Enemies
        if (typeof Enemies !== 'undefined') {
          for (let i = 0; i < Enemies.pool.length; i++) {
            const e = Enemies.pool[i];
            if (e.active) {
              // Enemy body
              ctx.fillStyle = e.color || '#FF4444';
              if (e.isBoss) {
                // Boss rendering
                const bossSize = e.size || 30;
                ctx.beginPath();
                drawPolygon(ctx, e.x, e.y, bossSize, 6, Date.now() * 0.001);
                ctx.fill();
                ctx.strokeStyle = '#FFFFFF44';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Boss laser
                if (BossSystem.activeBoss) {
                  BossSystem.renderLaser(ctx, e);
                }

                // Boss shield
                if (BossSystem.bossShieldActive) {
                  ctx.strokeStyle = '#44DDFF88';
                  ctx.lineWidth = 3;
                  ctx.beginPath();
                  ctx.arc(e.x, e.y, bossSize + 15, 0, Math.PI * 2);
                  ctx.stroke();
                }
              } else {
                // Regular enemy
                const size = e.size || 12;
                ctx.beginPath();
                ctx.arc(e.x, e.y, size, 0, Math.PI * 2);
                ctx.fill();

                // HP bar for enemies with > 50% HP left
                if (e.hp < e.maxHP) {
                  const barW = size * 2;
                  const barH = 3;
                  const barX = e.x - barW/2;
                  const barY = e.y - size - 6;
                  ctx.fillStyle = 'rgba(0,0,0,0.5)';
                  ctx.fillRect(barX, barY, barW, barH);
                  ctx.fillStyle = '#44FF44';
                  ctx.fillRect(barX, barY, barW * (e.hp / e.maxHP), barH);
                }

                // Flash effect
                if (e._flashTimer && e._flashTimer > 0) {
                  ctx.fillStyle = 'rgba(255,255,255,0.5)';
                  ctx.beginPath();
                  ctx.arc(e.x, e.y, size + 2, 0, Math.PI * 2);
                  ctx.fill();
                  e._flashTimer--;
                }
              }
            }
          }
        }

        // Player
        if (typeof player !== 'undefined' && player.hp > 0) {
          // Invulnerability flash
          if (player.invulnTimer > 0 && Math.floor(player.invulnTimer / 4) % 2 === 0) {
            ctx.globalAlpha = 0.5;
          }

          // Dash trail
          if (player.dashing) {
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#44FFFF';
            ctx.beginPath();
            ctx.arc(player.x, player.y + 10, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }

          // Ship
          const shipColor = typeof SHIPS !== 'undefined' && SHIPS[gameState.selectedShip || 0] ?
            SHIPS[gameState.selectedShip || 0].color : '#44FF44';
          if (typeof drawShipSprite === 'function') {
            try {
              drawShipSprite(ctx, player.x, player.y, 15, shipColor);
            } catch(e) {
              ctx.fillStyle = shipColor;
              ctx.beginPath();
              ctx.moveTo(player.x, player.y - 15);
              ctx.lineTo(player.x - 10, player.y + 10);
              ctx.lineTo(player.x + 10, player.y + 10);
              ctx.closePath();
              ctx.fill();
            }
          } else {
            ctx.fillStyle = shipColor;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 15);
            ctx.lineTo(player.x - 10, player.y + 10);
            ctx.lineTo(player.x + 10, player.y + 10);
            ctx.closePath();
            ctx.fill();
          }

          ctx.globalAlpha = 1;

          // Engine trail
          if (!player.dashing) {
            ParticlePresets.trail(player.x + (Math.random()-0.5) * 6, player.y + 12, shipColor + '88');
          }
        }

        // AOEs
        if (typeof AOEs !== 'undefined') {
          for (let i = 0; i < AOEs.pool.length; i++) {
            const a = AOEs.pool[i];
            if (a.active) {
              const alpha = a.lifetime / (a.maxLifetime || 60);
              ctx.fillStyle = (a.color || 'rgba(255,100,0,0.3)');
              ctx.globalAlpha = alpha * 0.4;
              ctx.beginPath();
              ctx.arc(a.x, a.y, a.radius || a.maxRadius || 30, 0, Math.PI * 2);
              ctx.fill();
              ctx.globalAlpha = 1;
            }
          }
        }

        // Particles
        if (typeof Particles !== 'undefined') {
          for (let i = 0; i < Particles.pool.length; i++) {
            const p = Particles.pool[i];
            if (p.active) {
              const alpha = p.life / (p.maxLife || 30);
              ctx.fillStyle = p.color || '#FFFFFF';
              ctx.globalAlpha = alpha;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size || 2, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.globalAlpha = 1;
        }

        // Float text
        if (typeof FloatTexts !== 'undefined') {
          for (let i = 0; i < FloatTexts.pool.length; i++) {
            const ft = FloatTexts.pool[i];
            if (ft.active) {
              const alpha = ft.life / (ft.maxLife || 40);
              ctx.fillStyle = ft.color || '#FFFFFF';
              ctx.globalAlpha = alpha;
              ctx.font = `bold ${ft.size || 14}px monospace`;
              ctx.textAlign = 'center';
              ctx.fillText(ft.text || '', ft.x, ft.y);
            }
          }
          ctx.globalAlpha = 1;
        }

        // Loot drop animations
        LootDropAnimation.update();
        LootDropAnimation.render(ctx);

      } catch(e) {
        ErrorRecovery.handle(e, 'render_gameplay');
      }

      // HUD on top
      renderEnhancedHUD(ctx);
    } else {
      // Menu screens
      renderScreen(ctx);
    }

    ctx.restore();

  } catch(e) {
    ErrorRecovery.handle(e, 'gameLoop');
  }

  requestAnimationFrame(gameLoop);
}

// Start the enhanced game loop
// Cancel old loop by not calling it again, start our new one
requestAnimationFrame(gameLoop);

const TrailSystem = {
  trails: [],
  maxTrails: 30,
  
  createTrail(entity, color, width, decay) {
    const trail = {
      points: [],
      maxPoints: 30,
      color: color || '#FFFFFF',
      width: width || 3,
      decay: decay || 0.95,
      active: true,
      entityRef: entity
    };
    if (this.trails.length >= this.maxTrails) {
      this.trails.shift();
    }
    this.trails.push(trail);
    return trail;
  },
  
  update() {
    for (let i = this.trails.length - 1; i >= 0; i--) {
      const trail = this.trails[i];
      if (!trail.active) {
        this.trails.splice(i, 1);
        continue;
      }
      
      // Add new point from entity position
      if (trail.entityRef && (trail.entityRef.active !== false)) {
        trail.points.push({
          x: trail.entityRef.x,
          y: trail.entityRef.y,
          alpha: 1.0,
          width: trail.width
        });
      }
      
      // Decay points
      for (let j = trail.points.length - 1; j >= 0; j--) {
        trail.points[j].alpha *= trail.decay;
        trail.points[j].width *= 0.98;
        if (trail.points[j].alpha < 0.01) {
          trail.points.splice(j, 1);
        }
      }
      
      // Trim excess points
      while (trail.points.length > trail.maxPoints) {
        trail.points.shift();
      }
      
      // Remove empty trails
      if (trail.points.length === 0 && (!trail.entityRef || trail.entityRef.active === false)) {
        trail.active = false;
      }
    }
  },
  
  render(ctx) {
    for (let trail of this.trails) {
      if (!trail.active || trail.points.length < 2) continue;
      
      for (let i = 1; i < trail.points.length; i++) {
        const p0 = trail.points[i - 1];
        const p1 = trail.points[i];
        
        ctx.strokeStyle = trail.color;
        ctx.globalAlpha = p1.alpha * 0.5;
        ctx.lineWidth = p1.width;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
  },
  
  clear() {
    this.trails = [];
  }
};

      color: '#8844FF',
      duration: 360,
      rarity: 0.08,
      apply: function() { return { timeSlow: 0.5 }; },
      description: 'Slow all enemies!'
    }
  },
  
  activate(typeId) {
    const type = this.powerUpTypes[typeId];
    if (!type) return;
    
    // Remove existing of same type
    this.activePowerUps = this.activePowerUps.filter(p => p.typeId !== typeId);
    
    // Trim if too many
    while (this.activePowerUps.length >= this.maxActive) {
      this.activePowerUps.shift();
    }
    
    const effects = type.apply();
    this.activePowerUps.push({
      typeId: typeId,
      name: type.name,
      icon: type.icon,
      color: type.color,
      timer: type.duration,
      maxTimer: type.duration,
      effects: effects
    });
    
    if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('powerup');
  },
  
  getActiveEffects() {
    const combined = {};
    for (let pu of this.activePowerUps) {
      for (let key in pu.effects) {
        if (typeof pu.effects[key] === 'number') {
          if (key.includes('Mult')) {
            combined[key] = (combined[key] || 1) * pu.effects[key];
          } else {
            combined[key] = (combined[key] || 0) + pu.effects[key];
          }
        } else {
          combined[key] = pu.effects[key];
        }
      }
    }
    return combined;
  },
  
  update() {
    for (let i = this.activePowerUps.length - 1; i >= 0; i--) {
      this.activePowerUps[i].timer--;
      if (this.activePowerUps[i].timer <= 0) {
        this.activePowerUps.splice(i, 1);
      }
    }
  },
  
  render(ctx) {
    if (this.activePowerUps.length === 0) return;
    
    const startX = 10;
    const startY = 95;
    const iconSize = 22;
    const spacing = 26;
    
    for (let i = 0; i < this.activePowerUps.length; i++) {
      const pu = this.activePowerUps[i];
      const px = startX + i * spacing;
      const py = startY;
      
      // Background
      ctx.fillStyle = pu.color + '33';
      ctx.strokeStyle = pu.color;
      ctx.lineWidth = 1;
      roundRect(ctx, px, py, iconSize, iconSize, 4);
      ctx.fill();
      ctx.stroke();
      
      // Timer bar
      const pct = pu.timer / pu.maxTimer;
      ctx.fillStyle = pu.color;
      ctx.fillRect(px, py + iconSize + 1, iconSize * pct, 2);
      
      // Icon
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(pu.icon, px + iconSize/2, py + iconSize - 4);
    }
  },
  
  spawnRandom(x, y) {
    const types = Object.keys(this.powerUpTypes);
    // Weighted random by rarity
    let totalWeight = 0;
    const weights = [];
    for (let id of types) {
      const w = this.powerUpTypes[id].rarity;
      weights.push(w);
      totalWeight += w;
    }
    
    let rand = Math.random() * totalWeight;
    for (let i = 0; i < types.length; i++) {
      rand -= weights[i];
      if (rand <= 0) {
        return types[i];
      }
    }
    return types[0];
  }
};
