        // Stats
        ctx.fillStyle = '#888';
        ctx.font = '12px system-ui';
        ctx.textAlign = 'left';
        ctx.fillText(`High Score: ${window.highScore}`, 10, VIRTUAL_HEIGHT - 60);
        ctx.fillText(`Total Kills: ${gameState.totalKills}`, 10, VIRTUAL_HEIGHT - 45);
        ctx.fillText(`Gold: ${gameState.gold}`, 10, VIRTUAL_HEIGHT - 30);
        ctx.fillText(`Prestige: ${gameState.prestigeLevel}`, 10, VIRTUAL_HEIGHT - 15);
    }


    // ============================================================================
    // DRAW GAME
    // ============================================================================

    function drawGame() {
        // Cap arrays to prevent performance degradation
        if (bullets.length > MAX_BULLETS) bullets.splice(0, bullets.length - MAX_BULLETS);
        if (particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);
        if (explosions.length > MAX_EXPLOSIONS) explosions.splice(0, explosions.length - MAX_EXPLOSIONS);
        if (muzzleFlashes.length > MAX_MUZZLE_FLASHES) muzzleFlashes.splice(0, muzzleFlashes.length - MAX_MUZZLE_FLASHES);
        if (damageNumbers.length > MAX_DAMAGE_NUMBERS) damageNumbers.splice(0, damageNumbers.length - MAX_DAMAGE_NUMBERS);

        drawBackground();

        ctx.save();
        ctx.translate(VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2);
        ctx.rotate(gameState.screenShakeRotation);
        ctx.translate(-VIRTUAL_WIDTH / 2, -VIRTUAL_HEIGHT / 2);

        if (gameState.screenShake > 0) {
            const shakeX = (Math.random() - 0.5) * gameState.screenShake * 10;
            const shakeY = (Math.random() - 0.5) * gameState.screenShake * 10;
            ctx.translate(shakeX, shakeY);
        }

        // DRAW EXPLOSIONS - ENHANCED MULTI-RING WITH PARTICLE BURST
        explosions = explosions.filter(exp => {
            try {
                const life = exp.life / exp.maxLife;

                // Outer expanding shockwave rings (4 total)
                for (let ring = 0; ring < 4; ring++) {
                    const delay = ring * 0.04;
                    const ringLife = Math.max(0, life - delay) / (1 - delay);
                    if (ringLife > 0) {
                        const ringRadius = exp.radius * ringLife * (1 + ring * 0.6);
                        const ringAlpha = (1 - ringLife) * (0.9 - ring * 0.1);

                        ctx.strokeStyle = colorAlpha(exp.color, ringAlpha);
                        ctx.lineWidth = 3 + ring * 0.5;
                        ctx.beginPath();
                        ctx.arc(exp.x, exp.y, Math.max(0.1, ringRadius), 0, Math.PI * 2);
                        ctx.stroke();

                        // Secondary inner rings for density
                        if (ring > 0) {
                            ctx.strokeStyle = colorAlpha('#ffffff', ringAlpha * 0.5);
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.arc(exp.x, exp.y, Math.max(0.1, ringRadius * 0.7), 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }
                }

                // Inner bright flash core
                const flashAlpha = Math.max(0, 1 - life * 2);
                const flashGrad = ctx.createRadialGradient(exp.x, exp.y, 0, exp.x, exp.y, Math.max(0.1, exp.radius * 0.4));
                flashGrad.addColorStop(0, colorAlpha('#ffffff', flashAlpha * 0.95));
                flashGrad.addColorStop(0.3, colorAlpha('#ffff00', flashAlpha * 0.7));
                flashGrad.addColorStop(1, colorAlpha(exp.color, flashAlpha * 0.3));
                ctx.fillStyle = flashGrad;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, Math.max(0.1, exp.radius * 0.4), 0, Math.PI * 2);
                ctx.fill();

                // Generate particle burst (one-time on initial explosion)
                if (life > 0.95 && Math.random() < 0.1) {
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2;
                        if (particles.length < MAX_PARTICLES) {
                            particles.push({
                                x: exp.x,
                                y: exp.y,
                                vx: Math.cos(angle) * 150 * (0.5 + Math.random() * 0.5),
                                vy: Math.sin(angle) * 150 * (0.5 + Math.random() * 0.5),
                                life: 0.5 + Math.random() * 0.3,
                                color: exp.color,
                                size: 3 + Math.random() * 2,
                            });
                        }
                    }
                }

                return exp.life > 0;
            } catch (e) {
                return false;
            }
        });

        // PARTICLES
        particles = particles.filter(p => {
            try {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                p.vy += 50 * dt; // Gravity
                ctx.fillStyle = colorAlpha(p.color, p.life);
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2);
                ctx.fill();
                return p.life > 0;
            } catch (e) {
                return false;
            }
        });

        // MUZZLE FLASHES - ENHANCED
        muzzleFlashes = muzzleFlashes.filter(mf => {
            try {
                const life = mf.life / 0.05;
                if (life > 0) {
                    // Inner yellow core
                    ctx.fillStyle = colorAlpha('#ffff00', life);
                    ctx.beginPath();
                    ctx.arc(mf.x, mf.y, Math.max(0.1, mf.size), 0, Math.PI * 2);
                    ctx.fill();

                    // Middle orange ring
                    ctx.strokeStyle = colorAlpha('#ff8800', life * 0.7);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(mf.x, mf.y, Math.max(0.1, mf.size * 1.5), 0, Math.PI * 2);
                    ctx.stroke();

                    // Outer glow
                    ctx.strokeStyle = colorAlpha('#ff6600', life * 0.4);
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(mf.x, mf.y, Math.max(0.1, mf.size * 2.5), 0, Math.PI * 2);
                    ctx.stroke();
                }
                return mf.life > 0;
            } catch (e) {
                return false;
            }
        });

        // BULLETS - ENHANCED
        bullets = bullets.filter(bullet => {
            try {
                bullet.x += bullet.vx * dt;
                bullet.y += bullet.vy * dt;
                bullet.life -= dt;

                if (bullet.type === 'blaster') {
                    // Player bullets: elongated energy bolts with glow trail
                    const grad = ctx.createLinearGradient(bullet.x - 3, bullet.y - 8, bullet.x + 3, bullet.y + 8);
                    grad.addColorStop(0, colorAlpha('#ffffff', 0.95));
                    grad.addColorStop(0.4, colorAlpha('#00ff00', 0.85));
                    grad.addColorStop(1, colorAlpha('#00ff00', 0.4));
                    ctx.fillStyle = grad;
                    ctx.fillRect(bullet.x - 3.5, bullet.y - 8, 7, 16);

                    // Outer glow ring
                    ctx.strokeStyle = colorAlpha('#00ff00', 0.7);
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, Math.max(0.1, bullet.size + 2), 0, Math.PI * 2);
                    ctx.stroke();

                    // Inner bright core
                    ctx.fillStyle = colorAlpha('#ffffff', 0.5);
                    ctx.fillRect(bullet.x - 1.5, bullet.y - 5, 3, 10);

                    // Trailing particles with energy effect
                    if (Math.random() < 0.2) {
                        if (particles.length < MAX_PARTICLES) {
                            particles.push({
                                x: bullet.x + (Math.random() - 0.5) * 3,
                                y: bullet.y + (Math.random() - 0.5) * 3,
                                vx: (Math.random() - 0.5) * 40,
                                vy: (Math.random() - 0.5) * 40,
                                life: 0.2,
                                color: '#00ff00',
                                size: 1.5,
                            });
                        }
                    }

                } else if (bullet.type === 'laser') {
                    // Laser: brilliant beam with intense sparkles
                    const grad = ctx.createLinearGradient(bullet.x, bullet.y - 7, bullet.x, bullet.y + 7);
                    grad.addColorStop(0, colorAlpha('#ffffff', 0.95));
                    grad.addColorStop(0.3, colorAlpha('#ffff00', 0.9));
                    grad.addColorStop(1, colorAlpha('#ffff00', 0.3));
                    ctx.fillStyle = grad;
                    ctx.fillRect(bullet.x - 2, bullet.y - 7, 4, 14);

                    // Wide glow aura
                    ctx.strokeStyle = colorAlpha('#ffff00', 0.6);
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(bullet.x, bullet.y - 7);
                    ctx.lineTo(bullet.x, bullet.y + 7);
                    ctx.stroke();

                    // Outer glow
                    ctx.strokeStyle = colorAlpha('#ffff00', 0.3);
                    ctx.lineWidth = 8;
                    ctx.beginPath();
                    ctx.moveTo(bullet.x, bullet.y - 7);
                    ctx.lineTo(bullet.x, bullet.y + 7);
                    ctx.stroke();

                    // Frequent sparkles
                    if (Math.random() < 0.15) {
                        if (particles.length < MAX_PARTICLES) {
                            particles.push({
                                x: bullet.x + (Math.random() - 0.5) * 4,
                                y: bullet.y,
                                vx: (Math.random() - 0.5) * 60,
                                vy: (Math.random() - 0.5) * 60,
                                life: 0.25,
                                color: '#ffffff',
                                size: 0.75,
                            });
                        }
                    }

                } else if (bullet.type === 'missile') {
                    // Missile: teardrop with flame trail
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.moveTo(bullet.x, bullet.y - 6);
                    ctx.lineTo(bullet.x - 3, bullet.y);
                    ctx.lineTo(bullet.x, bullet.y + 3);
                    ctx.lineTo(bullet.x + 3, bullet.y);
                    ctx.closePath();
                    ctx.fill();

                    // Flame trail
                    const flameLen = 8 + Math.sin(Date.now() * 0.01) * 2;
                    const flameGrad = ctx.createLinearGradient(bullet.x, bullet.y + 3, bullet.x, bullet.y + 3 + flameLen);
                    flameGrad.addColorStop(0, 'rgba(255, 100, 0, 0.8)');
                    flameGrad.addColorStop(1, 'rgba(255, 50, 0, 0)');
                    ctx.fillStyle = flameGrad;
                    ctx.beginPath();
                    ctx.moveTo(bullet.x - 2, bullet.y + 3);
                    ctx.lineTo(bullet.x + 2, bullet.y + 3);
                    ctx.lineTo(bullet.x + Math.sin(Date.now() * 0.02), bullet.y + 3 + flameLen);
                    ctx.closePath();
                    ctx.fill();

                } else {
                    // Enemy bullets: menacing red orbs
                    const pulse = 0.8 + Math.sin(Date.now() * 0.01) * 0.2;
                    const grad = ctx.createRadialGradient(bullet.x, bullet.y, 1, bullet.x, bullet.y, Math.max(0.1, bullet.size * pulse));
                    grad.addColorStop(0, colorAlpha('#666', 0.8));
                    grad.addColorStop(0.5, colorAlpha('#ff3333', 0.8));
                    grad.addColorStop(1, colorAlpha('#ff3333', 0));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, Math.max(0.1, bullet.size), 0, Math.PI * 2);
                    ctx.fill();

                    // Pulsing border
                    ctx.strokeStyle = colorAlpha('#ff0000', 0.6);
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, Math.max(0.1, bullet.size * 1.3), 0, Math.PI * 2);
                    ctx.stroke();
                }

                return bullet.life > 0 && bullet.x > -20 && bullet.x < VIRTUAL_WIDTH + 20 && bullet.y > -20 && bullet.y < VIRTUAL_HEIGHT + 20;
            } catch (e) {
                return false;
            }
        });

        // ENEMIES
        enemies.forEach(enemy => enemy.draw(ctx));

        // PICKUPS - POLISHED POWERUPS AND GOLD WITH ENHANCED EFFECTS
        pickups = pickups.filter(pickup => {
            try {
                if (pickup.collected) return false;

                const type = POWERUP_TYPES[pickup.type];
                if (type) {
                    // XP Orb: Pulsing glowing sphere with rotating rings
                    const pulse = 0.6 + Math.sin(Date.now() * 0.005) * 0.4;
                    const orbeSize = 8 * pulse;

                    // Outer glow
                    const glowGrad = ctx.createRadialGradient(pickup.x, pickup.y, orbeSize * 0.2, pickup.x, pickup.y, orbeSize * 1.3);
                    glowGrad.addColorStop(0, colorAlpha(type.color, 0.6));
                    glowGrad.addColorStop(1, colorAlpha(type.color, 0));
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(pickup.x, pickup.y, orbeSize * 1.3, 0, Math.PI * 2);
                    ctx.fill();

                    // Main orb
                    const grad = ctx.createRadialGradient(pickup.x - 1, pickup.y - 1, 1, pickup.x, pickup.y, Math.max(0.1, orbeSize));
                    grad.addColorStop(0, colorAlpha('#ffffff', 0.95));
                    grad.addColorStop(0.4, colorAlpha(type.color, 0.8));
                    grad.addColorStop(1, colorAlpha(type.color, 0.1));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(pickup.x, pickup.y, Math.max(0.1, orbeSize), 0, Math.PI * 2);
                    ctx.fill();

                    // Rotating ring around orb
                    ctx.strokeStyle = colorAlpha(type.color, 0.6);
                    ctx.lineWidth = 1.5;
                    ctx.save();
                    ctx.translate(pickup.x, pickup.y);
                    ctx.rotate(Date.now() * 0.003);
                    ctx.beginPath();
                    ctx.arc(0, 0, orbeSize * 0.8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();

                    // Icon inside with glow
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 10px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = type.color;
                    ctx.shadowBlur = 6;
                    ctx.fillText(type.icon, pickup.x, pickup.y);
                    ctx.shadowBlur = 0;

                    // Animated beacon pulses
                    const beaconAlpha = 0.4 + Math.sin(Date.now() * 0.004) * 0.2;
                    ctx.strokeStyle = colorAlpha(type.color, beaconAlpha);
                    ctx.lineWidth = 1;
                    for (let ring = 1; ring <= 2; ring++) {
                        ctx.beginPath();
                        ctx.arc(pickup.x, pickup.y, 10 + ring * 3, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                } else {
                    // Gold coin - enhanced 3D spinning effect
                    const spin = Date.now() * 0.005;
                    const width = 8 + Math.sin(spin) * 4;
                    const height = 10;

                    // Coin glow
                    const coinGlow = ctx.createRadialGradient(pickup.x, pickup.y, width * 0.3, pickup.x, pickup.y, width * 1.2);
                    coinGlow.addColorStop(0, colorAlpha('#ffff00', 0.3));
                    coinGlow.addColorStop(1, colorAlpha('#ffff00', 0));
                    ctx.fillStyle = coinGlow;
                    ctx.beginPath();
                    ctx.ellipse(pickup.x, pickup.y, width * 1.2, height * 1.2, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Main coin body
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath();
                    ctx.ellipse(pickup.x, pickup.y, width, height, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Coin rim highlight
                    ctx.strokeStyle = colorAlpha('#ffff00', 0.7);
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.ellipse(pickup.x, pickup.y, width, height, 0, 0, Math.PI * 2);
                    ctx.stroke();

                    // 3D effect - top highlight
                    ctx.fillStyle = colorAlpha('#ffffff', 0.6);
                    ctx.beginPath();
                    ctx.ellipse(pickup.x, pickup.y - 2, width * 0.9, height * 0.3, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Sparkle particles radiating out
                    if (Math.random() < 0.4) {
                        const angle = Math.random() * Math.PI * 2;
                        if (particles.length < MAX_PARTICLES) {
                            particles.push({
                                x: pickup.x + Math.cos(angle) * 8,
                                y: pickup.y + Math.sin(angle) * 8,
                                vx: Math.cos(angle) * 50,
                                vy: Math.sin(angle) * 50,
                                life: 0.35,
                                color: '#ffff00',
                                size: 1.5,
                            });
                        }
                    }

                    // Beacon pulses for gold
                    const beaconAlpha = 0.3 + Math.sin(Date.now() * 0.004) * 0.2;
                    ctx.strokeStyle = colorAlpha('#ffff00', beaconAlpha);
                    ctx.lineWidth = 0.75;
                    ctx.beginPath();
                    ctx.arc(pickup.x, pickup.y, 12, 0, Math.PI * 2);
                    ctx.stroke();
                }

                return true;
            } catch (e) {
                return false;
            }
        });

        player.draw(ctx);

        // Chromatic aberration on damage
        if (gameState.chromaAberrationTimer > 0) {
            const aberration = 3 * (gameState.chromaAberrationTimer / 0.2);
            ctx.fillStyle = colorAlpha('#ff0000', 0.1);
            ctx.fillRect(aberration, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
            ctx.fillStyle = colorAlpha('#00ff00', 0.1);
            ctx.fillRect(-aberration, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
        }

        // DAMAGE NUMBERS - ENHANCED WITH BOUNCE AND GLOW
        damageNumbers = damageNumbers.filter(dn => {
            try {
                const t = 1 - dn.life / 0.8;
                const bounce = Math.sin(t * Math.PI) * 15;
                const scale = 1 + Math.sin(t * Math.PI * 0.5) * 0.3;

                ctx.save();
                ctx.translate(dn.x, dn.y - bounce);
                ctx.scale(scale, scale);

                // Glow effect
                ctx.shadowColor = dn.color;
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;

                ctx.fillStyle = colorAlpha(dn.color, dn.life * 1.2);
                ctx.font = 'bold 14px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(dn.text, 0, 0);
                ctx.shadowBlur = 0;
                ctx.restore();

                dn.y -= 25 * dt;
                dn.life -= dt;
                return dn.life > 0;
            } catch (e) {
                return false;
            }
        });

        ctx.restore();

        // UI OVERLAY (not affected by screen shake)

        // Vignette effect during gameplay
        const vigGrad = ctx.createRadialGradient(VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2, 100, VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2, Math.max(VIRTUAL_WIDTH, VIRTUAL_HEIGHT) * 0.8);
        vigGrad.addColorStop(0, colorAlpha('#000', 0));
        vigGrad.addColorStop(1, colorAlpha('#000', 0.25));
        ctx.fillStyle = vigGrad;
        ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        // Screen flash
        if (gameState.screenFlash > 0) {
            ctx.fillStyle = colorAlpha(gameState.screenFlashColor, gameState.screenFlash);
            ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
            gameState.screenFlash -= dt;
        }

        // HUD - PREMIUM STYLE WITH ENHANCED GLOWS
        // HP Bar background
        ctx.fillStyle = colorAlpha('#000', 0.6);
        ctx.beginPath();
        ctx.roundRect(10, 10, 100, 12, 4);
        ctx.fill();

        const hpPercent = gameState.health / gameState.maxHealth;
        const hpGrad = ctx.createLinearGradient(10, 10, 110, 22);
        hpGrad.addColorStop(0, hpPercent > 0.5 ? '#00ff00' : hpPercent > 0.25 ? '#ffff00' : '#ff0000');
        hpGrad.addColorStop(1, hpPercent > 0.5 ? '#00aa00' : hpPercent > 0.25 ? '#ffaa00' : '#aa0000');
        ctx.fillStyle = hpGrad;
        ctx.beginPath();
        ctx.roundRect(10, 10, 100 * hpPercent, 12, 4);
        ctx.fill();

        // HP Bar glow
        ctx.shadowColor = hpPercent > 0.5 ? '#00ff00' : hpPercent > 0.25 ? '#ffff00' : '#ff0000';
        ctx.shadowBlur = 6;
        ctx.strokeStyle = hpPercent > 0.5 ? '#00ff00' : hpPercent > 0.25 ? '#ffff00' : '#ff0000';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(10, 10, 100, 12, 4);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Score with glow
        ctx.fillStyle = '#0ff';
        ctx.font = 'bold 14px system-ui';
        ctx.textAlign = 'left';
        ctx.shadowColor = '#0ff';
        ctx.shadowBlur = 4;
        const displayScore = Math.floor(gameState.score);
        ctx.fillText(`Score: ${displayScore}`, 10, 50);
        ctx.shadowBlur = 0;

        // Combo with enhanced color shift and larger glow
        if (gameState.combo > 0) {
            const comboColor = gameState.combo > 20 ? '#ff00ff' : gameState.combo > 10 ? '#ffff00' : '#00ff00';
            const comboGlow = 0.6 + Math.sin(Date.now() * 0.012) * 0.4;
            const comboPulse = 1 + Math.sin(Date.now() * 0.008) * 0.15;

            ctx.fillStyle = colorAlpha(comboColor, comboGlow);
            ctx.font = `bold ${Math.floor(18 * comboPulse)}px system-ui`;
            ctx.shadowColor = comboColor;
            ctx.shadowBlur = 8;
            ctx.fillText(`x${gameState.combo}`, 10, 75);
            ctx.shadowBlur = 0;
            ctx.font = 'bold 18px system-ui';

            // Score multiplier with glow
            ctx.fillStyle = '#ff8800';
            ctx.font = '12px system-ui';
            ctx.shadowColor = '#ff8800';
            ctx.shadowBlur = 4;
            ctx.fillText(`x${gameState.scoreMultiplier.toFixed(1)}`, 10, 90);
            ctx.shadowBlur = 0;
        }

        // Wave
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(`⟨ WAVE ${gameState.wave} ⟩`, VIRTUAL_WIDTH / 2, 25);

        // Kill feed (top right)
        ctx.font = '10px system-ui';
        ctx.textAlign = 'right';
        killFeed = killFeed.filter(kf => {
            kf.life -= dt;
            ctx.fillStyle = colorAlpha(kf.color, kf.life / 3);
            ctx.fillText(`${kf.icon} ${kf.text}`, VIRTUAL_WIDTH - 10, 20 + (3 - kf.life) * 15);
            return kf.life > 0;
        });

        // Message toast
        if (gameState.messageTimer > 0) {
            ctx.fillStyle = colorAlpha('#fff', gameState.messageTimer / 180);
            ctx.font = 'bold 14px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(gameState.messageText, VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2);
            gameState.messageTimer -= dt;
        }

        // FPS counter
        if (gameState.showFPS) {
            ctx.fillStyle = '#0f0';
            ctx.font = '10px system-ui';
            ctx.textAlign = 'right';
            ctx.fillText(`FPS: ${Math.round(1 / dt)}`, VIRTUAL_WIDTH - 10, VIRTUAL_HEIGHT - 10);
        }

        // Pause hint
        ctx.fillStyle = '#888';
        ctx.font = '10px system-ui';
        ctx.textAlign = 'right';
        ctx.fillText('ESC: Pause', VIRTUAL_WIDTH - 10, VIRTUAL_HEIGHT - 25);
    }


    // ============================================================================
    // DRAW WAVE TRANSITION - EPIC
    // ============================================================================

    function drawWaveTransition() {
        // Use absolute time for transition (immune to frame timing issues)
        if (!gameState.waveTransitionStartTime) {
            gameState.waveTransitionStartTime = Date.now();
        }
        const elapsed = (Date.now() - gameState.waveTransitionStartTime) / 1000;
        const duration = 2; // seconds
        const progress = clamp(elapsed / duration, 0, 1);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        // Circle-wipe effect
        const radius = Math.max(0.1, progress * VIRTUAL_HEIGHT * 0.8);
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2, radius, 0, Math.PI * 2);
        ctx.stroke();

        // Wave number with massive scale-in
        const scale = Math.max(0.1, 0.5 + Math.sin(progress * Math.PI) * 0.8);
        ctx.save();
        ctx.translate(VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2 - 50);
        ctx.scale(scale, scale);
        ctx.fillStyle = '#0ff';
        ctx.font = 'bold 48px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`WAVE ${gameState.wave}`, 0, 0);
        ctx.restore();

        // Subtitle
        ctx.fillStyle = colorAlpha('#ffff00', clamp(1 - progress, 0, 1));
        ctx.font = 'bold 16px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('INCOMING', VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2 + 50);

        // Radar-sweep effect
        const sweepAlpha = clamp(0.5 * (1 - progress), 0, 1);
        ctx.strokeStyle = colorAlpha('#00ff00', sweepAlpha);
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
            const r = Math.max(0.1, 30 + i * 20 + progress * 50);
            ctx.beginPath();
            ctx.arc(VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2, r, 0, Math.PI * 2);
            ctx.stroke();
        }

        if (elapsed >= duration) {
            gameState.mode = 'playing';
            gameState.waveTransitionStartTime = null;
        }
    }

    // ============================================================================
    // DRAW DEAD - DRAMATIC
    // ============================================================================

    function drawDead() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        // Slow red pulse overlay
        const pulse = Math.sin(Date.now() * 0.003) * 0.2;
        ctx.fillStyle = colorAlpha('#ff0000', 0.2 + pulse);
        ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        // GAME OVER with glitch effect
        const glitchOffset = Math.random() * 4 - 2;
        ctx.fillStyle = colorAlpha('#ff0000', 0.5);
        ctx.font = 'bold 36px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', VIRTUAL_WIDTH / 2 + glitchOffset, 100);

        ctx.fillStyle = '#ff0000';
        ctx.fillText('GAME OVER', VIRTUAL_WIDTH / 2, 100);

        // Stats appear one by one with staggered fade-in
        if (gameState.deathStats) {
            const stats = gameState.deathStats;
            ctx.fillStyle = '#fff';
            ctx.font = '14px system-ui';
            const lines = [
                `Wave: ${stats.wave}`,
                `Kills: ${stats.kills}`,
                `Max Combo: ${stats.combo}`,
                `Gold Earned: ${stats.gold}`,
                `Time Survived: ${stats.timeSurvived.toFixed(1)}s`,
            ];
            lines.forEach((line, i) => {
                const delay = i * 0.1;
                const fadeIn = Math.max(0, Math.min(1, (gameState.deathStats.displayTime - delay) * 5));
                ctx.fillStyle = colorAlpha('#fff', fadeIn);
                ctx.fillText(line, VIRTUAL_WIDTH / 2, 180 + i * 30);
            });
        }

        ctx.fillStyle = '#00ff00';
        ctx.font = 'bold 14px system-ui';
        ctx.fillText('CLICK TO RETURN TO MENU', VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT - 50);

        if (gameState.score > (window.highScore || 0)) {
            window.highScore = gameState.score;
            savePersistentData();
        }
    }

    // ============================================================================
    // MAIN UPDATE & GAME LOOP
    // ============================================================================

    function update() {
        if (gameState.mode === 'menu') return;
        if (gameState.mode === 'wave_transition') return;
        if (gameState.mode === 'dead') return;

        gameState.timeSurvived += dt;
        gameState.hitStopFrames = Math.max(0, gameState.hitStopFrames - 1);
        gameState.slowMotionTimer = Math.max(0, gameState.slowMotionTimer - dt);
        gameState.chromaAberrationTimer = Math.max(0, gameState.chromaAberrationTimer - dt);
        gameState.screenShake = Math.max(0, gameState.screenShake - dt * 5);

        if (gameState.slowMotionTimer > 0) {
            gameState.slowMotionSpeed = 0.3;
        } else {
            gameState.slowMotionSpeed = 1;
        }

        const effectiveDt = dt * gameState.slowMotionSpeed;

        if (player) {
            player.update(keys, touchX, touchY, gameState);
            // Require input to fire - space key, mouse click, or touch
            if (keys[' '] || keys['z'] || keys['Z'] || mouseDown || touchActive) {
                player.fire();
            }
        }

        enemies.forEach(enemy => enemy.update(gameState));

        // Bullet-enemy collision
        for (let b = bullets.length - 1; b >= 0; b--) {
            const bullet = bullets[b];
            for (let e = enemies.length - 1; e >= 0; e--) {
                const enemy = enemies[e];
                const dist = distance(bullet.x, bullet.y, enemy.x, enemy.y);
                if (dist < bullet.size + enemy.size) {
                    const isCrit = enemy.takeDamage(bullet.damage);
                    gameState.damageDealt += bullet.damage;

                    // BULLET IMPACT SPARKS - bright particles at hit point
                    for (let i = 0; i < 4; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        if (particles.length < MAX_PARTICLES) {
                            particles.push({
                                x: bullet.x,
                                y: bullet.y,
                                vx: Math.cos(angle) * 120,
                                vy: Math.sin(angle) * 120,
                                life: 0.25,
                                color: '#ffff00',
                                size: 1.5 + Math.random(),
                            });
                        }
                    }

                    if (isCrit) {
                        gameState.screenFlash = 0.25;
                        gameState.screenFlashColor = '#ffff00';

                        // Extra sparks on crit
                        for (let i = 0; i < 6; i++) {
                            const angle = Math.random() * Math.PI * 2;
                            if (particles.length < MAX_PARTICLES) {
                                particles.push({
                                    x: bullet.x,
                                    y: bullet.y,
                                    vx: Math.cos(angle) * 150,
                                    vy: Math.sin(angle) * 150,
                                    life: 0.3,
                                    color: '#ffffff',
                                    size: 2 + Math.random(),
                                });
                            }
                        }
                    }

                    if (!bullet.piercing || bullet.piercing <= 0) {
                        bullets.splice(b, 1);
                    } else {
                        bullet.piercing--;
                    }

                    if (enemy.hp <= 0) {
                        enemy.killed = true;
                    }
                    break;
                }
            }
        }

        // Enemy shooting
        for (let enemy of enemies) {
            if (enemy.canShoot() && !enemy.killed) {
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                const speed = 150;
                const bulletSpeed = 100;
                bullets.push({
                    x: enemy.x + Math.cos(angle) * enemy.size,
                    y: enemy.y + Math.sin(angle) * enemy.size,
                    vx: Math.cos(angle) * bulletSpeed,
                    vy: Math.sin(angle) * bulletSpeed,
                    life: 5,
                    type: 'enemy',
                    damage: 10,
                    color: enemy.color,
                    size: 4,
                });
            }
        }

        // Player-enemy collision
        for (let enemy of enemies) {
            if (enemy.killed) continue;
            const dist = distance(player.x, player.y, enemy.x, enemy.y);
            if (dist < 12 + enemy.size && player.invulnTimer <= 0) {
                const damage = 10;
                gameState.health -= damage;
                gameState.chromaAberrationTimer = 0.2;
                gameState.screenShake = 0.35;

                // KNOCKBACK - push player away from enemy
                const knockbackAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                const knockbackForce = 200;
                player.vx = Math.cos(knockbackAngle) * knockbackForce;
                player.vy = Math.sin(knockbackAngle) * knockbackForce;

                damageNumbers.push({
                    x: player.x,
                    y: player.y - 15,
                    text: damage,
                    life: 0.8,
                    color: '#ff0000',
                });

                player.invulnTimer = 1;
                playSound('hit', 200, 0.1);

                if (gameState.health <= 0) {
                    gameState.mode = 'dead';
                    gameState.deathStats = {
                        wave: gameState.wave,
                        kills: gameState.kills,
                        combo: gameState.combo,
                        gold: gameState.gold,
                        timeSurvived: gameState.timeSurvived,
                        displayTime: 2,
                    };
                }
            }
        }

        // Bullet-player collision
        for (let b = bullets.length - 1; b >= 0; b--) {
            const bullet = bullets[b];
            if (bullet.type === 'enemy') {
                const dist = distance(bullet.x, bullet.y, player.x, player.y);
                if (dist < 8 + bullet.size && player.invulnTimer <= 0) {
                    const damage = 5;
                    gameState.health -= damage;
                    gameState.chromaAberrationTimer = 0.15;
                    gameState.screenShake = 0.2;

                    bullets.splice(b, 1);

                    damageNumbers.push({
                        x: player.x,
                        y: player.y - 15,
                        text: damage,
                        life: 0.8,
                        color: '#ff0000',
                    });

                    player.invulnTimer = 0.5;

                    if (gameState.health <= 0) {
                        gameState.mode = 'dead';
                        gameState.deathStats = {
                            wave: gameState.wave,
                            kills: gameState.kills,
                            combo: gameState.combo,
                            gold: gameState.gold,
                            timeSurvived: gameState.timeSurvived,
                            displayTime: 2,
                        };
                    }
                }
            }
        }

        // Magnet pickups
        for (let pickup of pickups) {
            if (pickup.collected) continue;
            const dist = distance(pickup.x, pickup.y, player.x, player.y);
            if (dist < player.magnet * (1 + 0.5 * player.upgrades.magnet)) {
                const angle = Math.atan2(player.y - pickup.y, player.x - pickup.x);
                pickup.vx = Math.cos(angle) * 200;
                pickup.vy = Math.sin(angle) * 200;

                if (dist < 12) {
                    pickup.collected = true;
                    const pickupType = POWERUP_TYPES[pickup.type];

                    if (pickupType) {
                        player.activatePowerup(pickup.type, pickupType.duration);
                        playSound('pickup', 800, 0.15);
                        showToast(`${pickupType.name} Activated!`);
                    } else {
                        gameState.gold += 10;
                        playSound('pickup', 600, 0.1);
                    }

                    player.pickupsCollected++;
                }
            }
        }

        // Update pickups
        pickups = pickups.filter(p => {
            if (!p.collected) {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vx *= 0.95;
                p.vy *= 0.95;
                return p.y < VIRTUAL_HEIGHT + 50;
            }
            return false;
        });

        // Remove dead enemies and create explosions
        enemies = enemies.filter(enemy => {
            if (enemy.killed || enemy.hp <= 0) {
                explosions.push({
                    x: enemy.x,
                    y: enemy.y,
                    radius: enemy.size + 5,
                    life: 0.4,
                    maxLife: 0.4,
                    color: enemy.color,
                });

                gameState.score += enemy.score * gameState.scoreMultiplier;
                gameState.kills++;
                gameState.combo++;
                gameState.comboTimer = 2;
                gameState.killStreak++;
                gameState.lastKillTime = gameState.timeSurvived;

                // HITSTOP EFFECT - 2 frames of freezing on kill
                gameState.hitStopFrames = 2;
                gameState.screenShake = Math.max(gameState.screenShake, 0.1);

                // SLOW MOTION on boss death
                if (enemy.type === 'boss') {
                    gameState.slowMotionTimer = 0.3;
                    gameState.screenFlash = 0.4;
                    gameState.screenFlashColor = '#ffff00';
                }

                // Particle explosion - enhanced with more particles
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    if (particles.length < MAX_PARTICLES) {
                        particles.push({
                            x: enemy.x,
                            y: enemy.y,
                            vx: Math.cos(angle) * 180,
                            vy: Math.sin(angle) * 180,
                            life: 0.6,
                            color: enemy.color,
                            size: 2.5 + Math.random() * 3,
                        });
                    }
                }

                playSound('kill', 400 + Math.random() * 200, 0.15);

                // Kill streak messages with enhanced effects
                if (KILL_STREAK_MESSAGES[gameState.killStreak]) {
                    showToast(KILL_STREAK_MESSAGES[gameState.killStreak]);
                    gameState.screenFlash = 0.4;
                    gameState.screenFlashColor = '#ff00ff';
                    // Camera zoom pulse on milestone kills
                    gameState.screenShake = Math.max(gameState.screenShake, 0.2);
                }

                // Pickup drops
                if (Math.random() < 0.15) {
                    const types = Object.keys(POWERUP_TYPES);
                    pickups.push({
                        x: enemy.x,
                        y: enemy.y,
                        vx: (Math.random() - 0.5) * 100,
                        vy: (Math.random() - 0.5) * 100,
                        type: types[Math.floor(Math.random() * types.length)],
                        collected: false,
                    });
                }

                if (Math.random() < 0.3) {
                    pickups.push({
                        x: enemy.x,
                        y: enemy.y,
                        vx: (Math.random() - 0.5) * 100,
                        vy: (Math.random() - 0.5) * 100,
                        collected: false,
                    });
                }

                return false;
            }
            return true;
        });

        // Wave management
        if (enemies.length === 0 && gameState.mode === 'playing') {
            gameState.mode = 'wave_transition';
            gameState.waveTransitionTimer = 2;
            gameState.waveTransitionStartTime = null;
            gameState.waveTransitionText = `WAVE ${gameState.wave + 1}`;
            gameState.wave++;

            gameState.health = Math.min(gameState.health + 20, gameState.maxHealth);
            player.dashEnergy = player.dashMax;

            // Spawn new wave
            for (let i = 0; i < Math.min(3 + gameState.wave, 8); i++) {
                const types = Object.keys(ENEMIES).filter(t => t !== 'boss');
                const type = types[Math.floor(Math.random() * types.length)];
                enemies.push(new Enemy(type, Math.random() * VIRTUAL_WIDTH, -20));
            }

            if (gameState.wave % 10 === 0) {
                enemies.push(new Enemy('boss', VIRTUAL_WIDTH / 2, -50));
            }
        }
    }

    function gameLoop() {
        try {
            const now = Date.now();

            // Skip update during hitstop (freeze frame effect)
            if (gameState.hitStopFrames <= 0) {
                update();
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            switch (gameState.mode) {
                case 'menu':
                    drawMenu();
                    break;
                case 'playing':
                    drawGame();
                    break;
                case 'wave_transition':
                    drawWaveTransition();
                    break;
                case 'dead':
                    drawDead();
                    break;
            }
        } catch (e) {
            console.error('Game loop error:', e);
        }

        requestAnimationFrame(gameLoop);
    }

    // ============================================================================
    // INPUT HANDLING
    // ============================================================================

    window.addEventListener('keydown', (e) => {
        keys[e.key] = true;
        if (e.key === 'Escape') {
            if (gameState.mode === 'menu') {
                gameState.mode = 'playing';
            } else if (gameState.mode === 'playing') {
                gameState.mode = 'menu';
            }
        }
        if (e.key === 'f') gameState.showFPS = !gameState.showFPS;
    });

    window.addEventListener('keyup', (e) => {
        keys[e.key] = false;
    });

    canvas.addEventListener('mousedown', (e) => {
        mouseDown = true;
    });

    canvas.addEventListener('mouseup', (e) => {
        mouseDown = false;
    });

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * VIRTUAL_WIDTH;
        const y = (e.clientY - rect.top) / rect.height * VIRTUAL_HEIGHT;

        if (gameState.mode === 'menu') {
            const shipNames = Object.keys(SHIP_STATS);
            shipNames.forEach((ship, i) => {
                const sx = 70 + i * 90;
                const sy = 250;
                if (x > sx - 30 && x < sx + 30 && y > sy - 30 && y < sy + 30) {
                    gameState.selectedShip = ship;
                }
            });

            if (x > VIRTUAL_WIDTH / 2 - 70 && x < VIRTUAL_WIDTH / 2 + 70) {
                if (y > 340 - 20 && y < 340 + 20) {
                    gameState.mode = 'wave_transition';
                    gameState.waveTransitionTimer = 2;
                    gameState.waveTransitionStartTime = null;
                    gameState.waveTransitionText = 'WAVE 1';
                    gameState.health = 100;
                    gameState.maxHealth = 100;
                    gameState.score = 0;
                    gameState.kills = 0;
                    gameState.combo = 0;
                    gameState.killStreak = 0;
                    gameState.gold = 0;
                    gameState.wave = 1;
                    gameState.timeSurvived = 0;
                    player = new Player(gameState.selectedShip);
                    bullets = [];
                    enemies = [];
                    explosions = [];
                    particles = [];
                    pickups = [];
                    damageNumbers = [];
                    killFeed = [];
                    for (let i = 0; i < 2; i++) {
                        enemies.push(new Enemy('drone', Math.random() * VIRTUAL_WIDTH, -20));
                    }
                    initAudio();
                    localStorage.setItem('nova_breach_tutorial_seen', 'true');
                    gameState.showTutorial = false;
                }
            }
        } else if (gameState.mode === 'dead') {
            gameState.mode = 'menu';
        }
    });

    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        touchX = (touch.clientX - rect.left) / rect.width * VIRTUAL_WIDTH;
        touchY = (touch.clientY - rect.top) / rect.height * VIRTUAL_HEIGHT;
        touchActive = true;
        e.preventDefault();

        if (gameState.mode === 'menu' && gameState.showTutorial) {
            gameState.showTutorial = false;
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        touchX = (touch.clientX - rect.left) / rect.width * VIRTUAL_WIDTH;
        touchY = (touch.clientY - rect.top) / rect.height * VIRTUAL_HEIGHT;
        e.preventDefault();
    });

    canvas.addEventListener('touchend', () => {
        touchX = null;
        touchY = null;
        touchActive = false;
    });

    // Initialize
    loadPersistentData();
    gameLoop();
})();
    </script>
</body>
</html>
