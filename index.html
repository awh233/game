<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID RIFT - ULTRA DELUXE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #000;
      width: 100vw;
      height: 100vh;
      max-width: 420px;
      max-height: 750px;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
'use strict';

(function() {
  // ============================================================================
  // CONSTANTS
  // ============================================================================
  const CANVAS_WIDTH = 420;
  const CANVAS_HEIGHT = 750;
  const FIXED_DT = 1000 / 60;
  const MAX_DELTA_FRAMES = 4;
  const MAX_PARTICLES = 400;
  const BIOME_TRANSITION_FRAMES = 20;

  // ============================================================================
  // GAME STATE
  // ============================================================================
  let gameState = 'menu'; // menu, play, dead, shop, pause
  let screen = 'main'; // main, ships, achievements, daily
  let score = 0;
  let wave = 0;
  let combo = 0;
  let maxCombo = 0;
  let gold = 0;
  let totalGoldEarned = 0;
  let level = 1;
  let xp = 0;
  let xpNeeded = 100;
  let highScore = 0;
  let enemiesKilled = 0;
  let itemsCollected = 0;
  let timeSurvived = 0;
  let goldEarned = 0;
  let dashesUsed = 0;
  let prestigeLevel = 0;
  let dailyHighScore = 0;
  let biomeTransitionTimer = 0;
  let lastKillTime = 0;
  let pacifistTimer = 0;

  // ============================================================================
  // BIOME SYSTEM
  // ============================================================================
  const BIOMES = [
    {
      id: 'void',
      name: 'VOID',
      waveRange: [1, 5],
      colors: { top: '#0a0a1a', bottom: '#1a0a2a' },
      nebulaHue: { min: 250, max: 290 },
      desc: 'The endless void'
    },
    {
      id: 'nebula',
      name: 'NEBULA CORE',
      waveRange: [6, 10],
      colors: { top: '#0a1a3a', bottom: '#1a2a4a' },
      nebulaHue: { min: 180, max: 240 },
      desc: 'A cosmic nebula'
    },
    {
      id: 'crimson',
      name: 'CRIMSON RIFT',
      waveRange: [11, 15],
      colors: { top: '#3a0a0a', bottom: '#4a1a0a' },
      nebulaHue: { min: 0, max: 30 },
      desc: 'A crimson wasteland'
    },
    {
      id: 'frozen',
      name: 'FROZEN ABYSS',
      waveRange: [16, 20],
      colors: { top: '#0a1a3a', bottom: '#1a3a5a' },
      nebulaHue: { min: 180, max: 220 },
      desc: 'Frozen depths'
    },
    {
      id: 'solar',
      name: 'SOLAR STORM',
      waveRange: [21, 999],
      colors: { top: '#3a2a0a', bottom: '#5a4a1a' },
      nebulaHue: { min: 20, max: 60 },
      desc: 'Solar inferno'
    }
  ];

  function getCurrentBiome() {
    for (let b of BIOMES) {
      if (wave >= b.waveRange[0] && wave <= b.waveRange[1]) {
        return b;
      }
    }
    return BIOMES[0];
  }

  // ============================================================================
  // ACHIEVEMENT SYSTEM
  // ============================================================================
  const ACHIEVEMENTS = [
    { id: 'first_blood', name: 'First Blood', desc: 'Kill 1 enemy', reward: 10, unlocked: false },
    { id: 'combo_king', name: 'Combo King', desc: 'Reach 20 combo', reward: 50, unlocked: false },
    { id: 'boss_slayer', name: 'Boss Slayer', desc: 'Kill first boss', reward: 100, unlocked: false },
    { id: 'wave_10', name: 'Wave 10', desc: 'Reach wave 10', reward: 100, unlocked: false },
    { id: 'unstoppable', name: 'Unstoppable', desc: 'Reach wave 20', reward: 500, unlocked: false },
    { id: 'gold_rush', name: 'Gold Rush', desc: 'Collect 1000 gold total', reward: 200, unlocked: false },
    { id: 'speed_demon', name: 'Speed Demon', desc: 'Dash 50 times in one run', reward: 50, unlocked: false },
    { id: 'pacifist', name: 'Pacifist', desc: 'Survive 30s without killing', reward: 100, unlocked: false },
    { id: 'glass_cannon', name: 'Glass Cannon', desc: 'Beat wave 5 with 1 HP', reward: 200, unlocked: false },
    { id: 'collector', name: 'Collector', desc: 'Pick up 100 items in one run', reward: 100, unlocked: false },
    { id: 'max_level', name: 'Max Level', desc: 'Reach level 10', reward: 200, unlocked: false },
    { id: 'millionaire', name: 'Millionaire', desc: 'Score 100,000 points', reward: 500, unlocked: false }
  ];

  let achievementToast = null;

  function unlockAchievement(id) {
    const ach = ACHIEVEMENTS.find(a => a.id === id);
    if (ach && !ach.unlocked) {
      ach.unlocked = true;
      gold += ach.reward;
      achievementToast = { text: `ACHIEVEMENT: ${ach.name}! +${ach.reward}G`, timer: 120 };
      savePersistentData();
    }
  }

  // ============================================================================
  // SHIP SYSTEM
  // ============================================================================
  const SHIPS = [
    {
      id: 'viper',
      name: 'VIPER',
      desc: 'Balanced Fighter',
      cost: 0,
      unlocked: true,
      color: '#00aaff',
      statMods: { speedMul: 1.0, hpAdd: 0, damageMul: 1.0, magnetMul: 1.0, fireMul: 1.0, dashLen: 1.0 }
    },
    {
      id: 'phantom',
      name: 'PHANTOM',
      desc: '+30% Speed, -1 HP',
      cost: 500,
      unlocked: false,
      color: '#aa00ff',
      statMods: { speedMul: 1.3, hpAdd: -1, damageMul: 1.0, magnetMul: 1.0, fireMul: 1.0, dashLen: 1.0 }
    },
    {
      id: 'titan',
      name: 'TITAN',
      desc: '+3 HP, -30% Speed, +10% DMG',
      cost: 1000,
      unlocked: false,
      color: '#ffaa00',
      statMods: { speedMul: 0.7, hpAdd: 3, damageMul: 1.1, magnetMul: 1.0, fireMul: 1.0, dashLen: 1.0 }
    },
    {
      id: 'spectre',
      name: 'SPECTRE',
      desc: '+50% Magnet, +20% Fire, +2x Dash',
      cost: 2000,
      unlocked: false,
      color: '#00ff88',
      statMods: { speedMul: 1.0, hpAdd: 0, damageMul: 1.0, magnetMul: 1.5, fireMul: 1.2, dashLen: 2.0 }
    }
  ];

  let selectedShipIndex = 0;

  // ============================================================================
  // DAILY CHALLENGE SYSTEM
  // ============================================================================
  function getDailyChallenge() {
    const today = new Date().toDateString();
    const seed = today.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const challenges = [
      { name: 'DOUBLE TIME', desc: '2x Enemy Speed', mod: { enemySpeedMul: 2.0 } },
      { name: 'NO DASH', desc: 'Dash disabled', mod: { noDash: true } },
      { name: 'ONE LIFE', desc: '1 HP only', mod: { oneHp: true } },
      { name: 'BOSS RUSH', desc: 'Bosses only', mod: { bossOnly: true } },
      { name: 'RAPID FIRE', desc: 'Always rapid fire on', mod: { alwaysRapid: true } },
      { name: 'DOUBLE GOLD', desc: '2x Gold drops', mod: { goldMul: 2.0 } },
      { name: 'SLOW MO', desc: '0.5x Enemy Speed', mod: { enemySpeedMul: 0.5 } },
      { name: 'MAGNET', desc: '2x Pickup range', mod: { magnetMul: 2.0 } }
    ];
    return challenges[seed % challenges.length];
  }

  let dailyChallenge = getDailyChallenge();
  let activeDailyMod = null;

  // ============================================================================
  // STREAK SYSTEM
  // ============================================================================
  function getPlayStreak() {
    const lastPlayDate = localStorage.getItem('void_rift_last_play_date');
    const streakCount = parseInt(localStorage.getItem('void_rift_streak_count') || '0', 10);
    const today = new Date().toDateString();

    if (lastPlayDate === today) {
      return streakCount;
    }
    const lastDate = lastPlayDate ? new Date(lastPlayDate) : null;
    const todayDate = new Date(today);
    if (lastDate) {
      const diff = (todayDate - lastDate) / (1000 * 60 * 60 * 24);
      if (Math.abs(diff - 1) < 0.5) {
        return streakCount + 1;
      }
    }
    return 1;
  }

  function getStreakMultiplier() {
    const streak = getPlayStreak();
    if (streak >= 7) return 2.0;
    if (streak >= 5) return 1.5;
    if (streak >= 3) return 1.2;
    if (streak >= 2) return 1.1;
    return 1.0;
  }

  function recordPlayToday() {
    const today = new Date().toDateString();
    const lastPlayDate = localStorage.getItem('void_rift_last_play_date');
    if (lastPlayDate !== today) {
      const currentStreak = getPlayStreak();
      localStorage.setItem('void_rift_last_play_date', today);
      localStorage.setItem('void_rift_streak_count', currentStreak);
    }
  }

  // ============================================================================
  // PLAYER
  // ============================================================================
  let player = {
    x: CANVAS_WIDTH / 2,
    y: CANVAS_HEIGHT - 80,
    vx: 0,
    vy: 0,
    radius: 12,
    maxHp: 4,
    hp: 4,
    speed: 200,
    fireRate: 0.1,
    bulletDamage: 1,
    magnetRadius: 100,
    invulnTimer: 0,
    dashTimer: 0,
    dashLength: 0.3,
    fireTimer: 0,
    weapon: 'blaster',
    hasShield: false,
    shieldTimer: 0
  };

  // ============================================================================
  // WEAPON SYSTEM
  // ============================================================================
  const WEAPONS = {
    blaster: {
      name: 'BLASTER',
      desc: 'Standard weapon',
      fireRate: 1.0,
      bulletDamage: 1.0,
      bulletSpeed: 400,
      color: '#00ff00'
    },
    laser: {
      name: 'LASER',
      desc: 'Continuous beam',
      fireRate: 1.0,
      bulletDamage: 0.3,
      bulletSpeed: 0,
      color: '#00ff00'
    },
    missiles: {
      name: 'MISSILES',
      desc: 'Homing projectiles',
      fireRate: 0.33,
      bulletDamage: 2.0,
      bulletSpeed: 250,
      color: '#ffff00'
    }
  };

  let laserActive = false;
  let laserTarget = null;

  function switchWeapon(weaponId) {
    if (WEAPONS[weaponId]) {
      player.weapon = weaponId;
      laserActive = false;
      laserTarget = null;
    }
  }

  // ============================================================================
  // ENEMIES
  // ============================================================================
  let enemies = [];
  let waveEnemiesRemaining = 0;
  let nextWaveTimer = null;
  let bossKilled = false;

  const ENEMY_TYPES = {
    drone: {
      radius: 8,
      maxHp: 1,
      speed: 100,
      fireRate: 1.5,
      bulletDamage: 0.5,
      color: '#ff3300',
      points: 10,
      goldDrop: 5
    },
    scout: {
      radius: 6,
      maxHp: 1,
      speed: 180,
      fireRate: 0.8,
      bulletDamage: 0.5,
      color: '#ffaa00',
      points: 15,
      goldDrop: 8
    },
    tank: {
      radius: 14,
      maxHp: 4,
      speed: 60,
      fireRate: 0.5,
      bulletDamage: 1.0,
      color: '#00ff00',
      points: 40,
      goldDrop: 15
    },
    shooter: {
      radius: 10,
      maxHp: 2,
      speed: 80,
      fireRate: 0.6,
      bulletDamage: 1.0,
      color: '#0088ff',
      points: 25,
      goldDrop: 12
    },
    bomber: {
      radius: 11,
      maxHp: 3,
      speed: 120,
      fireRate: 2.0,
      bulletDamage: 1.5,
      color: '#ff00ff',
      points: 35,
      goldDrop: 14
    },
    boss: {
      radius: 25,
      maxHp: 20,
      speed: 80,
      fireRate: 0.5,
      bulletDamage: 1.5,
      color: '#ffff00',
      points: 500,
      goldDrop: 100
    }
  };

  function spawnEnemy(type, x, y) {
    if (!ENEMY_TYPES[type]) return;
    const spec = ENEMY_TYPES[type];
    const speedMul = activeDailyMod?.mod.enemySpeedMul || 1.0;
    enemies.push({
      type,
      x,
      y,
      vx: 0,
      vy: (type === 'boss') ? 60 : 100,
      radius: spec.radius,
      maxHp: spec.maxHp,
      hp: spec.maxHp,
      speed: spec.speed * speedMul,
      fireRate: spec.fireRate,
      fireTimer: 0,
      bulletDamage: spec.bulletDamage,
      color: spec.color,
      points: spec.points,
      goldDrop: spec.goldDrop,
      shootCooldown: 0,
      bossPhase: 0,
      bossTimer: 0,
      bossAttackTimer: 0,
      chargeTimer: 0,
      fireTrail: [],
      iceWalls: []
    });
  }

  function spawnWave(waveNum) {
    enemies = [];
    const isBossWave = (waveNum % 5 === 0);
    bossKilled = false;

    if (isBossWave) {
      const bx = CANVAS_WIDTH / 2;
      spawnEnemy('boss', bx, 80);
      waveEnemiesRemaining = 1;
    } else {
      const baseCount = 3 + Math.floor(waveNum / 2);
      const maxCount = Math.min(baseCount, 20);
      let types = ['drone', 'scout', 'tank', 'shooter', 'bomber'];
      if (waveNum < 3) types = ['drone'];
      if (waveNum < 5) types = ['drone', 'scout'];
      if (waveNum < 10) types = ['drone', 'scout', 'tank'];

      for (let i = 0; i < maxCount; i++) {
        const type = types[Math.floor(Math.random() * types.length)];
        const x = Math.random() * (CANVAS_WIDTH - 40) + 20;
        spawnEnemy(type, x, -40);
      }
      waveEnemiesRemaining = maxCount;
    }
  }

  // ============================================================================
  // BULLETS
  // ============================================================================
  let bullets = [];
  let enemyBullets = [];

  function spawnBullet(x, y, vx, vy, damage, lifetime, isEnemy) {
    const arr = isEnemy ? enemyBullets : bullets;
    arr.push({
      x, y, vx, vy, damage, lifetime, maxLifetime: lifetime,
      radius: 3,
      isEnemy,
      homing: player.weapon === 'missiles' && !isEnemy,
      age: 0
    });
  }

  // ============================================================================
  // PICKUPS
  // ============================================================================
  let pickups = [];

  const PICKUP_TYPES = {
    gold: { color: '#ffff00', value: 10, rarity: 0.6 },
    health: { color: '#00ff00', value: 1, rarity: 0.25 },
    shield: { color: '#00aaff', value: 1, rarity: 0.1 },
    rapid: { color: '#ff6600', value: 1, rarity: 0.03 },
    spread: { color: '#ff00ff', value: 1, rarity: 0.02 }
  };

  function spawnPickups(x, y) {
    const rolls = Math.floor(Math.random() * 3) + 1;
    for (let i = 0; i < rolls; i++) {
      const rand = Math.random();
      let type = 'gold';
      let cumulative = 0;
      for (let [key, spec] of Object.entries(PICKUP_TYPES)) {
        cumulative += spec.rarity;
        if (rand < cumulative) {
          type = key;
          break;
        }
      }
      pickups.push({
        type,
        x: x + (Math.random() - 0.5) * 20,
        y: y + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 60,
        vy: (Math.random() - 0.5) * 60,
        radius: 6,
        bobPhase: Math.random() * Math.PI * 2,
        age: 0
      });
    }
  }

  // ============================================================================
  // PARTICLES
  // ============================================================================
  let particles = [];

  function spawnParticles(x, y, count, color) {
    for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
      const angle = (Math.PI * 2 * i) / count;
      const speed = 100 + Math.random() * 150;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        lifetime: 0.5 + Math.random() * 0.3,
        maxLifetime: 0.5 + Math.random() * 0.3,
        color,
        radius: 2 + Math.random() * 2
      });
    }
  }

  // ============================================================================
  // PERSISTENT SAVE DATA
  // ============================================================================
  function savePersistentData() {
    const data = {
      highScore,
      totalGoldEarned,
      prestigeLevel,
      selectedShipIndex,
      unlockedShips: SHIPS.map(s => s.unlocked),
      achievements: ACHIEVEMENTS.map(a => a.unlocked),
      dailyHighScore,
      lastPlayDate: new Date().toDateString()
    };
    localStorage.setItem('void_rift_save', JSON.stringify(data));
  }

  function loadPersistentData() {
    const saved = localStorage.getItem('void_rift_save');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        highScore = data.highScore || 0;
        totalGoldEarned = data.totalGoldEarned || 0;
        prestigeLevel = data.prestigeLevel || 0;
        selectedShipIndex = data.selectedShipIndex || 0;
        if (data.unlockedShips) {
          data.unlockedShips.forEach((u, i) => {
            if (i < SHIPS.length) SHIPS[i].unlocked = u;
          });
        }
        if (data.achievements) {
          data.achievements.forEach((u, i) => {
            if (i < ACHIEVEMENTS.length) ACHIEVEMENTS[i].unlocked = u;
          });
        }
        dailyHighScore = data.dailyHighScore || 0;
      } catch (e) {
        console.error('Failed to load save data', e);
      }
    }
  }

  function applyShipStats() {
    const ship = SHIPS[selectedShipIndex];
    const mods = ship.statMods;
    const hpMod = activeDailyMod?.mod.oneHp ? -3 : 0;
    player.maxHp = Math.max(1, 4 + hpMod + mods.hpAdd);
    player.hp = player.maxHp;
    player.speed = 200 * mods.speedMul;
    player.bulletDamage = 1 * mods.damageMul;
    player.magnetRadius = 100 * mods.magnetMul;
    player.fireRate = 0.1 * mods.fireMul;
    player.dashLength = 0.3 * mods.dashLen;
  }

  // ============================================================================
  // GAME LOGIC
  // ============================================================================
  function startGame() {
    recordPlayToday();
    gameState = 'play';
    screen = 'main';
    score = 0;
    wave = 1;
    combo = 0;
    maxCombo = 0;
    gold = 0;
    level = 1;
    xp = 0;
    xpNeeded = 100;
    enemiesKilled = 0;
    itemsCollected = 0;
    timeSurvived = 0;
    goldEarned = 0;
    dashesUsed = 0;
    pacifistTimer = 0;
    lastKillTime = 0;
    player.weapon = 'blaster';
    activeDailyMod = null;
    biomeTransitionTimer = 0;
    laserActive = false;
    laserTarget = null;

    applyShipStats();
    if (activeDailyMod?.mod.alwaysRapid) {
      player.fireRate = 0.05;
    }
    if (activeDailyMod?.mod.magnetMul) {
      player.magnetRadius *= activeDailyMod.mod.magnetMul;
    }

    spawnWave(1);
    particles = [];
    bullets = [];
    enemyBullets = [];
    pickups = [];
  }

  function startGameWithDaily() {
    activeDailyMod = { mod: dailyChallenge.mod };
    startGame();
  }

  function nextWave() {
    wave++;
    const prevBiome = getCurrentBiome();
    const newBiome = getCurrentBiome();
    if (prevBiome.id !== newBiome.id) {
      biomeTransitionTimer = BIOME_TRANSITION_FRAMES;
    }
    spawnWave(wave);
    combo = 0;
  }

  function killEnemy(enemy, x, y) {
    enemiesKilled++;
    lastKillTime = timeSurvived;
    score += Math.floor(enemy.points * (1 + prestigeLevel * 0.25));
    combo++;
    maxCombo = Math.max(maxCombo, combo);
    const goldAmount = Math.floor(enemy.goldDrop * (activeDailyMod?.mod.goldMul || 1.0) * getStreakMultiplier());
    gold += goldAmount;
    goldEarned += goldAmount;
    totalGoldEarned += goldAmount;
    xp += 10;
    spawnParticles(x, y, 10, enemy.color);
    spawnPickups(x, y);

    waveEnemiesRemaining = Math.max(0, waveEnemiesRemaining - 1);
    if (waveEnemiesRemaining === 0 && enemies.length === 0) {
      if (nextWaveTimer) clearInterval(nextWaveTimer);
      nextWaveTimer = setTimeout(() => {
        nextWave();
        nextWaveTimer = null;
      }, 1500);
    }

    if (enemy.type === 'boss') {
      bossKilled = true;
      unlockAchievement('boss_slayer');
    }

    unlockAchievementConditions();
  }

  function playerTakeDamage(amount) {
    if (player.invulnTimer > 0) return;
    if (player.hasShield) {
      player.hasShield = false;
      player.shieldTimer = 0;
      return;
    }
    player.hp -= amount;
    player.invulnTimer = 45;
    spawnParticles(player.x, player.y, 15, '#ff6666');
  }

  function update(dt) {
    if (gameState !== 'play') return;

    timeSurvived += dt;
    pacifistTimer += dt;

    // ========== INPUT ==========
    const keys = {};

    // ========== PLAYER MOVEMENT ==========
    const moveSpeed = player.speed;
    let moveX = 0;
    if (keys['arrowleft'] || keys['a']) moveX = -1;
    if (keys['arrowright'] || keys['d']) moveX = 1;
    player.vx = moveX * moveSpeed;
    player.x = Math.max(player.radius, Math.min(CANVAS_WIDTH - player.radius, player.x + player.vx * dt));

    // ========== PLAYER FIRING ==========
    const fireRateMul = 1 + (level * 0.05) + (prestigeLevel * 0.05);
    player.fireTimer -= dt;
    const isFiring = keys[' '];

    if (isFiring && player.fireTimer <= 0) {
      if (player.weapon === 'laser') {
        laserActive = true;
      } else {
        const weaponSpec = WEAPONS[player.weapon];
        if (player.weapon === 'missiles') {
          spawnBullet(player.x, player.y - player.radius, 0, -weaponSpec.bulletSpeed, player.bulletDamage * weaponSpec.bulletDamage, 300, false);
        } else {
          spawnBullet(player.x, player.y - player.radius, 0, -weaponSpec.bulletSpeed, player.bulletDamage * weaponSpec.bulletDamage, 120, false);
        }
      }
      player.fireTimer = player.fireRate * (1 / fireRateMul);
    }

    if (!isFiring) {
      laserActive = false;
      laserTarget = null;
    }

    // ========== LASER WEAPON ==========
    if (laserActive && player.weapon === 'laser') {
      laserTarget = null;
      for (let enemy of enemies) {
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const playerAngle = Math.PI * 1.5;
        const angleDiff = Math.abs(angle - playerAngle);
        if (angleDiff < 0.3 && dist < 400) {
          const dmg = player.bulletDamage * WEAPONS['laser'].bulletDamage;
          enemy.hp -= dmg * dt;
          laserTarget = enemy;
          if (enemy.hp <= 0) {
            enemies.splice(enemies.indexOf(enemy), 1);
            killEnemy(enemy, enemy.x, enemy.y);
          }
          break;
        }
      }
    }

    // ========== DASH ==========
    player.dashTimer -= dt;
    if (keys['shift'] && player.dashTimer <= 0 && !activeDailyMod?.mod.noDash) {
      player.dashTimer = 1.0;
      dashesUsed++;
      const dashDist = 60 * player.dashLength;
      player.x = Math.max(player.radius, Math.min(CANVAS_WIDTH - player.radius, player.x + moveX * dashDist));
      spawnParticles(player.x, player.y, 8, '#88ff00');
    }

    // ========== INVULNERABILITY ==========
    player.invulnTimer -= dt;

    // ========== SHIELD ==========
    if (player.hasShield) {
      player.shieldTimer -= dt;
      if (player.shieldTimer <= 0) player.hasShield = false;
    }

    // ========== ENEMY UPDATES ==========
    for (let enemy of enemies) {
      if (enemy.type === 'boss') {
        updateBoss(enemy, dt);
      } else {
        enemy.y += enemy.vy * dt;
        enemy.x += (Math.sin(Date.now() / 1000 + enemy.x) * 50) * dt;
      }

      enemy.fireTimer += dt;
      if (enemy.fireTimer >= 1.0 / enemy.fireRate) {
        enemy.fireTimer = 0;
        const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        const speed = 200;
        spawnBullet(enemy.x, enemy.y, Math.cos(angle) * speed, Math.sin(angle) * speed, enemy.bulletDamage, 300, true);
      }

      if (enemy.y > CANVAS_HEIGHT + 50) {
        enemies.splice(enemies.indexOf(enemy), 1);
        waveEnemiesRemaining = Math.max(0, waveEnemiesRemaining - 1);
      }
    }

    // ========== BOSS UPDATES ==========
    function updateBoss(boss, dt) {
      const biome = getCurrentBiome();
      const targetY = 150;
      if (boss.y < targetY) {
        boss.y += boss.speed * dt;
      } else {
        boss.y = targetY;
      }

      // Horizontal movement
      boss.x += Math.sin(Date.now() / 2000 + boss.x / 100) * 80 * dt;
      boss.x = Math.max(boss.radius + 20, Math.min(CANVAS_WIDTH - boss.radius - 20, boss.x));

      boss.bossTimer += dt;
      boss.bossAttackTimer += dt;

      // VOID Boss: aimed spread + radial burst
      if (biome.id === 'void' && boss.bossAttackTimer >= 2.0) {
        boss.bossAttackTimer = 0;
        for (let i = 0; i < 8; i++) {
          const angle = (Math.PI * 2 * i) / 8;
          spawnBullet(boss.x, boss.y, Math.cos(angle) * 150, Math.sin(angle) * 150, 1.0, 300, true);
        }
      }
      // NEBULA Boss: spawns mini-drones, shoots homing missiles
      else if (biome.id === 'nebula') {
        if (boss.bossAttackTimer >= 3.0) {
          boss.bossAttackTimer = 0;
          for (let i = 0; i < 3; i++) {
            const angle = Math.atan2(player.y - boss.y, player.x - boss.x) + (i - 1) * 0.3;
            spawnBullet(boss.x, boss.y, Math.cos(angle) * 200, Math.sin(angle) * 200, 1.5, 300, true);
          }
        }
        if (boss.bossTimer >= 3.0) {
          boss.bossTimer = 0;
          const dx = Math.random() * 100 - 50;
          spawnEnemy('drone', boss.x + dx, boss.y - 30);
        }
      }
      // CRIMSON Boss: charges at player
      else if (biome.id === 'crimson') {
        if (boss.bossAttackTimer >= 2.5) {
          boss.bossAttackTimer = 0;
          const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
          boss.vx = Math.cos(angle) * 200;
          boss.vy = Math.sin(angle) * 200;
          spawnParticles(boss.x, boss.y, 10, '#ff6600');
        }
        boss.x += boss.vx * dt;
        boss.y += boss.vy * dt;
        boss.vx *= 0.95;
        boss.vy *= 0.95;
      }
      // FROZEN Boss: creates ice walls, fires spiral
      else if (biome.id === 'frozen') {
        if (boss.bossAttackTimer >= 3.5) {
          boss.bossAttackTimer = 0;
          for (let i = 0; i < 12; i++) {
            const angle = (Math.PI * 2 * i) / 12;
            spawnBullet(boss.x, boss.y, Math.cos(angle) * 120, Math.sin(angle) * 120, 1.0, 300, true);
          }
        }
      }
      // SOLAR Boss: all abilities combined, faster
      else if (biome.id === 'solar') {
        if (boss.bossAttackTimer >= 1.5) {
          boss.bossAttackTimer = 0;
          for (let i = 0; i < 6; i++) {
            const angle = (Math.PI * 2 * i) / 6;
            spawnBullet(boss.x, boss.y, Math.cos(angle) * 180, Math.sin(angle) * 180, 1.5, 300, true);
          }
        }
      }
    }

    // ========== BULLET UPDATES ==========
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.lifetime -= 1;
      b.age += dt;

      if (b.homing) {
        let closest = null;
        let closestDist = Infinity;
        for (let e of enemies) {
          const dx = e.x - b.x;
          const dy = e.y - b.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < closestDist) {
            closestDist = d;
            closest = e;
          }
        }
        if (closest && closestDist < 500) {
          const angle = Math.atan2(closest.y - b.y, closest.x - b.x);
          const turnSpeed = 3.0;
          const bAngle = Math.atan2(b.vy, b.vx);
          const angleDiff = angle - bAngle;
          let adjustedDiff = angleDiff;
          if (adjustedDiff > Math.PI) adjustedDiff -= Math.PI * 2;
          if (adjustedDiff < -Math.PI) adjustedDiff += Math.PI * 2;
          const newAngle = bAngle + Math.max(-turnSpeed * dt, Math.min(turnSpeed * dt, adjustedDiff));
          const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
          b.vx = Math.cos(newAngle) * speed;
          b.vy = Math.sin(newAngle) * speed;
        }
      }

      let hit = false;
      for (let e of enemies) {
        const dx = e.x - b.x;
        const dy = e.y - b.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < e.radius + b.radius) {
          e.hp -= b.damage;
          hit = true;
          spawnParticles(b.x, b.y, 5, '#ffff00');
          if (e.hp <= 0) {
            enemies.splice(enemies.indexOf(e), 1);
            killEnemy(e, e.x, e.y);
          }
          break;
        }
      }

      if (hit || b.lifetime <= 0 || b.y < 0) {
        bullets.splice(i, 1);
      }
    }

    // ========== ENEMY BULLET UPDATES ==========
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.lifetime -= 1;

      const dx = player.x - b.x;
      const dy = player.y - b.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < player.radius + b.radius) {
        playerTakeDamage(b.damage);
        enemyBullets.splice(i, 1);
      } else if (b.lifetime <= 0 || b.y > CANVAS_HEIGHT + 50) {
        enemyBullets.splice(i, 1);
      }
    }

    // ========== PICKUP UPDATES ==========
    for (let i = pickups.length - 1; i >= 0; i--) {
      const p = pickups[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.bobPhase += 2 * dt;
      p.age += dt;

      const dx = player.x - p.x;
      const dy = player.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);

      if (d < player.magnetRadius) {
        const mag = 300;
        const angle = Math.atan2(dy, dx);
        p.vx += Math.cos(angle) * mag * dt;
        p.vy += Math.sin(angle) * mag * dt;
      }

      if (d < player.radius + p.radius) {
        itemsCollected++;
        if (p.type === 'gold') {
          gold += PICKUP_TYPES[p.type].value;
        } else if (p.type === 'health') {
          player.hp = Math.min(player.maxHp, player.hp + PICKUP_TYPES[p.type].value);
        } else if (p.type === 'shield') {
          player.hasShield = true;
          player.shieldTimer = 5.0;
        } else if (p.type === 'rapid') {
          player.fireRate = 0.05;
          setTimeout(() => {
            if (player.fireRate === 0.05) {
              player.fireRate = 0.1;
            }
          }, 5000);
        } else if (p.type === 'spread') {
          for (let j = -1; j <= 1; j++) {
            spawnBullet(player.x + j * 10, player.y - player.radius, j * 50, -400, player.bulletDamage, 120, false);
          }
        }
        pickups.splice(i, 1);
      } else if (p.y > CANVAS_HEIGHT + 20) {
        pickups.splice(i, 1);
      }
    }

    // ========== PARTICLE UPDATES ==========
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.lifetime -= dt;
      if (p.lifetime <= 0) {
        particles.splice(i, 1);
      }
    }

    // ========== LEVEL UP ==========
    while (xp >= xpNeeded) {
      xp -= xpNeeded;
      level++;
      xpNeeded = 100 + level * 50;
    }

    // ========== CHECK DEATH ==========
    if (player.hp <= 0) {
      gameState = 'dead';
      if (nextWaveTimer) clearInterval(nextWaveTimer);
      if (score > highScore) highScore = score;
      if (activeDailyMod && score > dailyHighScore) dailyHighScore = score;
      savePersistentData();
    }

    // ========== BIOME TRANSITION ==========
    if (biomeTransitionTimer > 0) {
      biomeTransitionTimer -= dt;
    }

    // ========== ACHIEVEMENT CHECKS ==========
    unlockAchievementConditions();
  }

  function unlockAchievementConditions() {
    if (enemiesKilled > 0) unlockAchievement('first_blood');
    if (combo >= 20) unlockAchievement('combo_king');
    if (bossKilled) unlockAchievement('boss_slayer');
    if (wave >= 10) unlockAchievement('wave_10');
    if (wave >= 20) unlockAchievement('unstoppable');
    if (totalGoldEarned >= 1000) unlockAchievement('gold_rush');
    if (dashesUsed >= 50) unlockAchievement('speed_demon');
    if (timeSurvived >= 30 && pacifistTimer >= 30) unlockAchievement('pacifist');
    if (wave >= 5 && player.hp === 1) unlockAchievement('glass_cannon');
    if (itemsCollected >= 100) unlockAchievement('collector');
    if (level >= 10) unlockAchievement('max_level');
    if (score >= 100000) unlockAchievement('millionaire');
  }

  // ============================================================================
  // DRAWING FUNCTIONS
  // ============================================================================
  function drawButton(ctx, cx, cy, w, h, text, color) {
    ctx.fillStyle = color;
    ctx.fillRect(cx - w / 2, cy - h / 2, w, h);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - w / 2, cy - h / 2, w, h);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, cx, cy);
  }

  function drawStars(ctx) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    for (let i = 0; i < 100; i++) {
      const seed = Math.sin(i * 12.9898) * 43758.5453;
      const x = ((seed - Math.floor(seed)) * CANVAS_WIDTH) % CANVAS_WIDTH;
      const y = ((seed * 78.233 - Math.floor(seed * 78.233)) * CANVAS_HEIGHT) % CANVAS_HEIGHT;
      const radius = Math.max(0.5, (seed * 0.5) % 1);
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawBackground(ctx) {
    const biome = getCurrentBiome();
    const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
    gradient.addColorStop(0, biome.colors.top);
    gradient.addColorStop(1, biome.colors.bottom);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    drawStars(ctx);
  }

  function drawPlayer(ctx) {
    const ship = SHIPS[selectedShipIndex];
    const visible = player.invulnTimer <= 0 || Math.floor(player.invulnTimer * 10) % 2 === 0;
    ctx.fillStyle = visible ? ship.color : 'rgba(0, 0, 0, 0)';
    ctx.shadowBlur = visible ? 15 : 0;
    ctx.shadowColor = ship.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    if (visible) {
      ctx.strokeStyle = ship.color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(player.x, player.y - 8, 3, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (player.hasShield) {
      ctx.strokeStyle = '#00aaff';
      ctx.lineWidth = 2;
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#00aaff';
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  function drawEnemies(ctx) {
    for (let enemy of enemies) {
      ctx.fillStyle = enemy.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = enemy.color;
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const hpText = Math.ceil(enemy.hp);
      ctx.fillText(hpText, enemy.x, enemy.y);
    }
  }

  function drawBullets(ctx) {
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#00ff00';
    for (let b of bullets) {
      ctx.fillStyle = WEAPONS[player.weapon].color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    if (laserActive && player.weapon === 'laser') {
      ctx.strokeStyle = '#00ff00';
      ctx.lineWidth = 4;
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#00ff00';
      ctx.beginPath();
      ctx.moveTo(player.x, player.y);
      ctx.lineTo(player.x, 0);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  function drawEnemyBullets(ctx) {
    ctx.fillStyle = '#ff6600';
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#ff6600';
    for (let b of enemyBullets) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function drawPickups(ctx) {
    for (let p of pickups) {
      const spec = PICKUP_TYPES[p.type];
      const bob = Math.sin(p.bobPhase) * 3;
      ctx.fillStyle = spec.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = spec.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y + bob, p.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function drawParticles(ctx) {
    for (let p of particles) {
      ctx.fillStyle = p.color;
      const alpha = p.lifetime / p.maxLifetime;
      ctx.globalAlpha = alpha;
      ctx.shadowBlur = 4;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }
  }

  function drawHUD(ctx) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    ctx.fillText(`Wave: ${wave}`, 10, 10);
    ctx.fillText(`Score: ${score}`, 10, 25);
    ctx.fillText(`Gold: ${gold}`, 10, 40);
    ctx.fillText(`HP: ${player.hp}/${player.maxHp}`, 10, 55);
    ctx.fillText(`Level: ${level}`, 10, 70);

    ctx.fillText(`Combo: ${combo}`, CANVAS_WIDTH - 120, 10);
    ctx.fillText(`Weapon: ${WEAPONS[player.weapon].name}`, CANVAS_WIDTH - 120, 25);

    const xpBarW = 100;
    const xpBarH = 8;
    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(CANVAS_WIDTH - 110, 45, xpBarW, xpBarH);
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(CANVAS_WIDTH - 110, 45, (xp / xpNeeded) * xpBarW, xpBarH);

    ctx.fillText(`XP: ${xp}/${xpNeeded}`, CANVAS_WIDTH - 120, 60);

    if (combo >= 10 && combo % 10 === 0) {
      ctx.font = 'bold 28px Arial';
      ctx.fillStyle = 'rgba(255, 255, 0, 0.9)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ffff00';
      ctx.fillText(`${combo}x COMBO!`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
      ctx.shadowBlur = 0;
    }
  }

  function drawBiomeTransition(ctx) {
    if (biomeTransitionTimer > 0) {
      const alpha = biomeTransitionTimer / BIOME_TRANSITION_FRAMES;
      const biome = getCurrentBiome();
      ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#ffffff';
      ctx.fillText(`ENTERING: ${biome.name}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
      ctx.shadowBlur = 0;
    }
  }

  function drawCRTEffect(ctx) {
    const imageData = ctx.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      if (Math.random() < 0.02) {
        data[i] = Math.max(0, data[i] - 50);
        data[i + 1] = Math.max(0, data[i + 1] - 50);
        data[i + 2] = Math.max(0, data[i + 2] - 50);
      }
    }
    ctx.putImageData(imageData, 0, 0);
  }

  function drawMenuBackground(ctx) {
    const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
    gradient.addColorStop(0, '#0a0a2a');
    gradient.addColorStop(1, '#1a0a3a');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    const time = Date.now() / 1000;
    for (let i = 0; i < 150; i++) {
      const angle = (time * 0.1 + i * 0.1) % (Math.PI * 2);
      const radius = 150 + i * 2;
      const x = CANVAS_WIDTH / 2 + Math.cos(angle) * radius;
      const y = CANVAS_HEIGHT / 2 + Math.sin(angle) * radius;
      ctx.fillStyle = `rgba(100, 150, 255, ${0.1 - i * 0.0005})`;
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    drawStars(ctx);
  }

  function drawMenu(ctx) {
    drawMenuBackground(ctx);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#00ff00';
    ctx.fillText('VOID RIFT', CANVAS_WIDTH / 2, 20);
    ctx.shadowBlur = 0;

    ctx.font = '12px Arial';
    ctx.shadowBlur = 2;
    ctx.shadowColor = '#ffffff';
    ctx.fillText(`High Score: ${highScore}`, CANVAS_WIDTH / 2, 65);
    ctx.fillText(`Streak: Day ${getPlayStreak()}`, CANVAS_WIDTH / 2, 82);
    ctx.fillText(`Prestige: ${prestigeLevel}x`, CANVAS_WIDTH / 2, 99);
    ctx.shadowBlur = 0;

    const btnY1 = 150;
    const btnY2 = 200;
    const btnY3 = 250;
    const btnY4 = 300;
    const btnY5 = 350;
    const btnY6 = 400;

    drawButton(ctx, CANVAS_WIDTH / 2, btnY1, 130, 35, 'PLAY', '#00ff00');
    drawButton(ctx, CANVAS_WIDTH / 2, btnY2, 130, 35, 'DAILY', '#ffaa00');
    drawButton(ctx, CANVAS_WIDTH / 2, btnY3, 130, 35, 'SHIPS', '#0088ff');
    drawButton(ctx, CANVAS_WIDTH / 2, btnY4, 130, 35, 'ACHIEVEMENTS', '#ff00ff');
    drawButton(ctx, CANVAS_WIDTH / 2, btnY5, 130, 35, 'SHOP', '#ffff00');
  }

  function drawShipsScreen(ctx) {
    drawMenuBackground(ctx);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('SELECT SHIP', CANVAS_WIDTH / 2, 15);

    const shipW = 100;
    const shipH = 80;
    const cols = 2;
    let idx = 0;
    for (let row = 0; row < 2; row++) {
      for (let col = 0; col < cols && idx < SHIPS.length; idx++, col++) {
        const ship = SHIPS[idx];
        const sx = 50 + col * 185;
        const sy = 80 + row * 135;

        ctx.fillStyle = '#333333';
        ctx.fillRect(sx - shipW / 2, sy - shipH / 2, shipW, shipH);
        ctx.strokeStyle = ship.unlocked ? '#00ff00' : '#ff0000';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - shipW / 2, sy - shipH / 2, shipW, shipH);

        if (selectedShipIndex === idx) {
          ctx.strokeStyle = '#ffff00';
          ctx.lineWidth = 3;
          ctx.strokeRect(sx - shipW / 2 - 3, sy - shipH / 2 - 3, shipW + 6, shipH + 6);
        }

        ctx.fillStyle = ship.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = ship.color;
        ctx.beginPath();
        ctx.arc(sx, sy - 15, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(ship.name, sx, sy + 5);
        ctx.font = '9px Arial';
        if (ship.unlocked) {
          ctx.fillText('OWNED', sx, sy + 18);
          if (selectedShipIndex === idx) {
            ctx.fillText('SELECTED', sx, sy + 28);
          }
        } else {
          ctx.fillText(`${ship.cost}G`, sx, sy + 18);
          if (gold >= ship.cost) {
            ctx.fillStyle = '#00ff00';
            ctx.fillText('BUY', sx, sy + 28);
          } else {
            ctx.fillStyle = '#ff0000';
            ctx.fillText('LOCKED', sx, sy + 28);
          }
        }
      }
    }

    drawButton(ctx, CANVAS_WIDTH / 2, CANVAS_HEIGHT - 50, 100, 30, 'BACK', '#ff6600');
  }

  function drawAchievementsScreen(ctx) {
    drawMenuBackground(ctx);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('ACHIEVEMENTS', CANVAS_WIDTH / 2, 8);

    const achW = 95;
    const achH = 60;
    const cols = 2;
    for (let i = 0; i < ACHIEVEMENTS.length; i++) {
      const ach = ACHIEVEMENTS[i];
      const row = Math.floor(i / cols);
      const col = i % cols;
      const ax = 30 + col * 180;
      const ay = 55 + row * 80;

      ctx.fillStyle = ach.unlocked ? '#006600' : '#330000';
      ctx.fillRect(ax - achW / 2, ay - achH / 2, achW, achH);
      ctx.strokeStyle = ach.unlocked ? '#00ff00' : '#ff0000';
      ctx.lineWidth = 2;
      ctx.strokeRect(ax - achW / 2, ay - achH / 2, achW, achH);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 8px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(ach.name, ax, ay - 21);
      ctx.font = '7px Arial';
      ctx.fillText(ach.desc, ax, ay - 10);
      ctx.fillStyle = ach.unlocked ? '#ffff00' : '#666666';
      ctx.fillText(`+${ach.reward}G`, ax, ay + 4);
    }

    drawButton(ctx, CANVAS_WIDTH / 2, CANVAS_HEIGHT - 50, 100, 30, 'BACK', '#ff6600');
  }

  function drawDailyScreen(ctx) {
    drawMenuBackground(ctx);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('DAILY CHALLENGE', CANVAS_WIDTH / 2, 15);

    ctx.font = 'bold 18px Arial';
    ctx.fillStyle = '#ffff00';
    ctx.fillText(dailyChallenge.name, CANVAS_WIDTH / 2, 70);
    ctx.font = '14px Arial';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(dailyChallenge.desc, CANVAS_WIDTH / 2, 100);

    ctx.font = '12px Arial';
    ctx.fillText(`Today's High Score: ${dailyHighScore}`, CANVAS_WIDTH / 2, 150);

    drawButton(ctx, CANVAS_WIDTH / 2, 250, 140, 35, 'START DAILY', '#ffaa00');
    drawButton(ctx, CANVAS_WIDTH / 2, CANVAS_HEIGHT - 50, 100, 30, 'BACK', '#ff6600');
  }

  function drawDead(ctx) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#ff0000';
    ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, 40);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffffff';
    ctx.font = '14px Arial';
    ctx.fillText(`Score: ${score}`, CANVAS_WIDTH / 2, 110);
    ctx.fillText(`Wave: ${wave}`, CANVAS_WIDTH / 2, 130);
    ctx.fillText(`Gold: ${gold}`, CANVAS_WIDTH / 2, 150);
    ctx.fillText(`Max Combo: ${maxCombo}`, CANVAS_WIDTH / 2, 170);
    ctx.fillText(`Level: ${level}`, CANVAS_WIDTH / 2, 190);

    if (score > highScore) {
      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 16px Arial';
      ctx.fillText('NEW HIGH SCORE!', CANVAS_WIDTH / 2, 230);
    }

    drawButton(ctx, CANVAS_WIDTH / 2, CANVAS_HEIGHT - 120, 120, 35, 'MENU', '#00ff00');
    drawButton(ctx, CANVAS_WIDTH / 2, CANVAS_HEIGHT - 60, 120, 35, 'RETRY', '#0088ff');
  }

  function handleMenuClick(x, y) {
    if (screen === 'main') {
      const btnY1 = 150, btnY2 = 200, btnY3 = 250, btnY4 = 300, btnY5 = 350;
      const btnW = 130, btnH = 35;

      if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY1) < btnH / 2) {
        startGame();
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY2) < btnH / 2) {
        screen = 'daily';
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY3) < btnH / 2) {
        screen = 'ships';
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY4) < btnH / 2) {
        screen = 'achievements';
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY5) < btnH / 2) {
        gameState = 'shop';
      }
    } else if (screen === 'ships') {
      const btnW = 100, btnH = 30;
      if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - (CANVAS_HEIGHT - 50)) < btnH / 2) {
        screen = 'main';
      } else {
        const shipW = 100, shipH = 80;
        const cols = 2;
        for (let i = 0; i < SHIPS.length; i++) {
          const ship = SHIPS[i];
          const row = Math.floor(i / cols);
          const col = i % cols;
          const sx = 50 + col * 185;
          const sy = 80 + row * 135;

          if (Math.abs(x - sx) < shipW / 2 && Math.abs(y - sy) < shipH / 2) {
            if (ship.unlocked) {
              selectedShipIndex = i;
              savePersistentData();
            } else if (gold >= ship.cost) {
              gold -= ship.cost;
              ship.unlocked = true;
              selectedShipIndex = i;
              savePersistentData();
            }
          }
        }
      }
    } else if (screen === 'achievements') {
      const btnW = 100, btnH = 30;
      if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - (CANVAS_HEIGHT - 50)) < btnH / 2) {
        screen = 'main';
      }
    } else if (screen === 'daily') {
      const btnW1 = 140, btnH1 = 35;
      const btnW2 = 100, btnH2 = 30;
      if (Math.abs(x - CANVAS_WIDTH / 2) < btnW1 / 2 && Math.abs(y - 250) < btnH1 / 2) {
        startGameWithDaily();
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW2 / 2 && Math.abs(y - (CANVAS_HEIGHT - 50)) < btnH2 / 2) {
        screen = 'main';
      }
    }
  }

  function handleDeadClick(x, y) {
    const btnW = 120, btnH = 35;
    if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - (CANVAS_HEIGHT - 120)) < btnH / 2) {
      gameState = 'menu';
      screen = 'main';
    } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - (CANVAS_HEIGHT - 60)) < btnH / 2) {
      startGame();
    }
  }

  // ============================================================================
  // RENDERING
  // ============================================================================
  function render(ctx) {
    if (gameState === 'menu') {
      drawMenu(ctx);
      if (screen === 'ships') drawShipsScreen(ctx);
      else if (screen === 'achievements') drawAchievementsScreen(ctx);
      else if (screen === 'daily') drawDailyScreen(ctx);
    } else if (gameState === 'play') {
      drawBackground(ctx);
      drawPickups(ctx);
      drawEnemyBullets(ctx);
      drawBullets(ctx);
      drawEnemies(ctx);
      drawParticles(ctx);
      drawPlayer(ctx);
      drawHUD(ctx);
      drawBiomeTransition(ctx);
      drawCRTEffect(ctx);

      if (achievementToast) {
        achievementToast.timer -= 1;
        const alpha = achievementToast.timer / 120;
        ctx.fillStyle = `rgba(255, 200, 0, ${alpha * 0.9})`;
        ctx.fillRect(0, 0, CANVAS_WIDTH, 30);
        ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(achievementToast.text, CANVAS_WIDTH / 2, 15);
        if (achievementToast.timer <= 0) achievementToast = null;
      }
    } else if (gameState === 'dead') {
      drawBackground(ctx);
      drawDead(ctx);
    }
  }

  // ============================================================================
  // EVENT HANDLERS
  // ============================================================================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(window.innerWidth / CANVAS_WIDTH, window.innerHeight / CANVAS_HEIGHT);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const keyState = {};
  window.addEventListener('keydown', (e) => {
    keyState[e.key.toLowerCase()] = true;
    if (e.key === '1') switchWeapon('blaster');
    if (e.key === '2') switchWeapon('laser');
    if (e.key === '3') switchWeapon('missiles');
  });
  window.addEventListener('keyup', (e) => {
    keyState[e.key.toLowerCase()] = false;
  });

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 0) return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    const x = (touch.clientX - rect.left) * scaleX;
    const y = (touch.clientY - rect.top) * scaleY;

    if (gameState === 'menu') {
      handleMenuClick(x, y);
    } else if (gameState === 'play') {
      if (y > CANVAS_HEIGHT - 80) {
        if (x < CANVAS_WIDTH / 3) switchWeapon('blaster');
        else if (x < 2 * CANVAS_WIDTH / 3) switchWeapon('laser');
        else switchWeapon('missiles');
      }
    } else if (gameState === 'dead') {
      handleDeadClick(x, y);
    }
  }, { passive: false });

  // ============================================================================
  // GAME LOOP
  // ============================================================================
  let lastTime = Date.now();
  let accumulator = 0;

  function gameLoop() {
    const now = Date.now();
    const deltaTime = now - lastTime;
    lastTime = now;
    accumulator += deltaTime;

    let updateCount = 0;
    const stepDt = FIXED_DT / 1000;
    while (accumulator >= FIXED_DT && updateCount < MAX_DELTA_FRAMES) {
      update(stepDt);
      accumulator -= FIXED_DT;
      updateCount++;
    }

    ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    render(ctx);
    requestAnimationFrame(gameLoop);
  }

  loadPersistentData();
  gameLoop();
})();
</script>
</body>
</html>
