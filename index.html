(function(){"use strict";
var canvas=document.getElementById('c');var ctx=canvas.getContext('2d');var W=420,H=750;var scale=1,offsetX=0,offsetY=0;
function resize(){canvas.width=window.innerWidth*devicePixelRatio;canvas.height=window.innerHeight*devicePixelRatio;var scaleX=canvas.width/W;var scaleY=canvas.height/H;scale=Math.min(scaleX,scaleY);offsetX=(canvas.width-W*scale)/2;offsetY=(canvas.height-H*scale)/2;}
window.addEventListener('resize',resize);resize();
var audioCtx=null,masterGain=null,musicPlaying=false,musicOscs=[],musicGains=[];
var musicBass=null,musicBassGain=null,musicLFO=null,musicArpTimer=0,musicNotes=[262,294,330,392,440],musicNoteIdx=0;
function initAudio(){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=0.3;masterGain.connect(audioCtx.destination);}catch(e){audioCtx=null;}}
function playFM(cf,ct,mf,md,dur,vol){if(!audioCtx)return;try{if(audioCtx.state==='suspended')audioCtx.resume();var t=audioCtx.currentTime;var c=audioCtx.createOscillator();c.type=ct;c.frequency.setValueAtTime(cf,t);var m=audioCtx.createOscillator();m.type='sine';m.frequency.setValueAtTime(mf,t);var mg=audioCtx.createGain();mg.gain.setValueAtTime(md,t);var g=audioCtx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);m.connect(mg);mg.connect(c.frequency);c.connect(g);g.connect(masterGain);c.start(t);m.start(t);c.stop(t+dur);m.stop(t+dur);}catch(e){}}
function startMusic(){if(musicPlaying||!audioCtx)return;musicPlaying=true;var t=audioCtx.currentTime;musicBass=audioCtx.createOscillator();musicBass.type='sine';musicBass.frequency.setValueAtTime(65,t);musicBassGain=audioCtx.createGain();musicBassGain.gain.setValueAtTime(0.08,t);musicLFO=audioCtx.createOscillator();musicLFO.type='sine';musicLFO.frequency.setValueAtTime(0.5,t);var lfoGain=audioCtx.createGain();lfoGain.gain.setValueAtTime(0.05,t);musicLFO.connect(lfoGain);lfoGain.connect(musicBassGain.gain);musicBass.connect(musicBassGain);musicBassGain.connect(masterGain);musicBass.start(t);musicLFO.start(t);musicArpTimer=setInterval(function(){if(musicPlaying&&audioCtx){var nt=audioCtx.currentTime;var osc=audioCtx.createOscillator();var g=audioCtx.createGain();osc.type='sine';osc.frequency.setValueAtTime(musicNotes[musicNoteIdx],nt);g.gain.setValueAtTime(0.08,nt);g.gain.exponentialRampToValueAtTime(0.001,nt+0.15);osc.connect(g);g.connect(masterGain);osc.start(nt);osc.stop(nt+0.15);musicNoteIdx=(musicNoteIdx+1)%musicNotes.length;}},250);}
function stopMusic(){if(!musicPlaying)return;musicPlaying=false;if(musicBass){musicBass.stop();musicLFO.stop();}clearInterval(musicArpTimer);}
function playSound(type){if(!audioCtx)return;try{if(audioCtx.state==='suspended')audioCtx.resume();var t=audioCtx.currentTime;switch(type){case'shoot':var pitch=600*(1+(Math.random()-0.5)*0.2);playFM(pitch,'sine',1200,400,0.06,0.12);break;case'hit':var hp=400*(1+(Math.random()-0.5)*0.2);playFM(hp,'triangle',800,200,0.08,0.15);break;case'explode':playFM(80,'sawtooth',40,200,0.3,0.25);var nb=audioCtx.createBufferSource();var len=audioCtx.sampleRate*0.3;var buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);var data=buf.getChannelData(0);for(var i=0;i<len;i++)data[i]=Math.random()*2-1;nb.buffer=buf;var ng=audioCtx.createGain();ng.gain.setValueAtTime(0.1,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.3);nb.connect(ng);ng.connect(masterGain);nb.start(t);nb.stop(t+0.3);break;case'powerup':playFM(400,'sine',600,100,0.15,0.15);break;case'damage':playFM(150,'square',75,300,0.12,0.2);break;case'levelup':var notes=[523,659,784];for(var i=0;i<notes.length;i++){(function(idx,delay){var osc=audioCtx.createOscillator();var gain=audioCtx.createGain();osc.connect(gain);gain.connect(masterGain);var nt=t+delay;osc.frequency.setValueAtTime(notes[idx],nt);gain.gain.setValueAtTime(0.15,nt);gain.gain.exponentialRampToValueAtTime(0.001,nt+0.1);osc.start(nt);osc.stop(nt+0.1);})(i,i*0.1);}break;case'boss':playFM(60,'sawtooth',30,400,0.6,0.25);break;case'waveclear':var cn=[261,329,392];for(var i=0;i<cn.length;i++){(function(idx){var osc=audioCtx.createOscillator();var gain=audioCtx.createGain();osc.connect(gain);gain.connect(masterGain);var nt=t;osc.frequency.setValueAtTime(cn[idx],nt);gain.gain.setValueAtTime(0.12,nt);gain.gain.exponentialRampToValueAtTime(0.001,nt+0.2);osc.start(nt);osc.stop(nt+0.2);})(i);}break;case'heartbeat':playFM(60,'sine',30,100,0.1,0.15);break;}}catch(e){}}
var STATE_MENU=0,STATE_PLAY=1,STATE_SHOP=2,STATE_DEAD=3,STATE_LEVELUP=4,STATE_BOSS_WARN=5,STATE_PAUSED=6,STATE_STATS=7,STATE_TUTORIAL=8,STATE_REVIVE=9,STATE_DAILY=10,STATE_SKINS=11;
var state=STATE_MENU;var score=0,highScore=0,wave=1,gold=0,xp=0,xpNeeded=50,level=1;var combo=0,comboTimer=0,maxCombo=0,killCount=0;var screenShake=0,flashAlpha=0,bossWarningTimer=0,gameTime=0;var waveEnemiesRemaining=0,waveSpawnTimers=[];var hitstopTimer=0,slowMoTimer=0,slowMoRate=0.3;var comboScale=1.0,zoomPulse=1.0,heartbeatTimer=0;var totalKills=0,gamesPlayed=0,totalGoldEarned=0,highestWave=1;var waveTransitionTimer=0,waveTransitionText='',biomeTransitionTimer=0,biomeTransitionText='';var playerDeathDebris=[];var achievementNotifications=[];
var tutorialStep=0,hasPlayedBefore=false,reviveTimer=0,hasRevived=false;var currentBiome=0,isDailyMode=false,dailySeed='',dailyBest=0;var qualityLevel=1,selectedSkin=0;
var achievements=[{id:'first_kill',name:'First Blood',desc:'Kill 1 enemy',unlocked:false},{id:'wave_5',name:'Warming Up',desc:'Reach wave 5',unlocked:false},{id:'wave_10',name:'Veteran',desc:'Reach wave 10',unlocked:false},{id:'wave_20',name:'Legend',desc:'Reach wave 20',unlocked:false},{id:'combo_10',name:'Combo King',desc:'Get 10x combo',unlocked:false},{id:'combo_25',name:'Unstoppable',desc:'Get 25x combo',unlocked:false},{id:'combo_50',name:'GODLIKE',desc:'Get 50x combo',unlocked:false},{id:'kill_100',name:'Centurion',desc:'Kill 100 enemies',unlocked:false}];
var baseStats={maxHp:5,speed:4,fireRate:12,bulletDmg:1,bulletSpeed:8,bulletCount:1,shield:0,magnetRange:60};var player={};
function resetPlayer(){player.x=W/2;player.y=H-120;player.w=30;player.h=30;player.hp=baseStats.maxHp;player.maxHp=baseStats.maxHp;player.speed=baseStats.speed;player.fireRate=baseStats.fireRate;player.bulletDmg=baseStats.bulletDmg;player.bulletSpeed=baseStats.bulletSpeed;player.bulletCount=baseStats.bulletCount;player.shield=baseStats.shield;player.magnetRange=baseStats.magnetRange;player.fireTimer=0;player.invincible=60;player.dashCooldown=0;player.dashTimer=0;player.isDashing=false;player.trail=[];player.muzzleFlash=0;player.vx=0;player.vy=0;player.weapon='normal';player.weaponTimer=0;}
resetPlayer();
var shipSkins=[{name:'NEON',cost:0,colors:{body:'#0cf',core:'#06f',dark:'#068'}},{name:'INFERNO',cost:25,colors:{body:'#f55',core:'#f80',dark:'#a00'}},{name:'AURORA',cost:50,colors:{body:'#0f8',core:'#0f0',dark:'#088'}}];var unlockedSkins=[true,false,false];
function loadGame(){try{var saved=localStorage.getItem('voidrift_save');if(saved){var data=JSON.parse(saved);gold=data.gold||0;highScore=data.highScore||0;baseStats=data.baseStats||baseStats;totalKills=data.totalKills||0;gamesPlayed=data.gamesPlayed||0;totalGoldEarned=data.totalGoldEarned||0;highestWave=data.highestWave||1;achievements=data.achievements||achievements;hasPlayedBefore=data.hasPlayedBefore||false;selectedSkin=data.selectedSkin||0;unlockedSkins=data.unlockedSkins||[true,false,false];qualityLevel=data.qualityLevel||1;}}catch(e){}try{var ds=new Date().toISOString().slice(0,10).replace(/-/g,'');var daily=localStorage.getItem('voidrift_daily_'+ds);if(daily){var dd=JSON.parse(daily);dailyBest=dd.best||0;}}catch(e){}}
function saveGame(){try{var data={gold:gold,highScore:highScore,baseStats:baseStats,totalKills:totalKills,gamesPlayed:gamesPlayed,totalGoldEarned:totalGoldEarned,highestWave:highestWave,achievements:achievements,hasPlayedBefore:hasPlayedBefore,selectedSkin:selectedSkin,unlockedSkins:unlockedSkins,qualityLevel:qualityLevel};localStorage.setItem('voidrift_save',JSON.stringify(data));}catch(e){}}
function saveDailyBest(){try{var ds=new Date().toISOString().slice(0,10).replace(/-/g,'');localStorage.setItem('voidrift_daily_'+ds,JSON.stringify({best:Math.max(dailyBest,score)}));}catch(e){}}
loadGame();
var bullets=[],bulletTrails=[],enemies=[],particles=[],pickups=[],enemyBullets=[],stars=[],damageNumbers=[],nebulas=[],debris=[],asteroids=[];
var MAX_PARTICLES=qualityLevel===0?100:(qualityLevel===1?200:300);var MAX_BULLETS=100,MAX_ENEMY_BULLETS=80,MAX_PICKUPS=50,MAX_ASTEROIDS=10;
var biomeColors={bg1:'#0a0a2e',bg2:'#1a0a2e',starTint:'#fff',uiAccent:'#0ff'};
function updateBiomeColors(){var b=Math.floor((wave-1)/10);currentBiome=b;if(b===0){biomeColors={bg1:'#0a0a2e',bg2:'#1a0a2e',starTint:'#fff',uiAccent:'#0ff'};}else if(b===1){biomeColors={bg1:'#1a1a0a',bg2:'#0a0a0a',starTint:'#ff8800',uiAccent:'#ff8800'};}else if(b===2){biomeColors={bg1:'#2a0a2a',bg2:'#0a0a1a',starTint:'#ff00ff',uiAccent:'#ff00ff'};}else{biomeColors={bg1:'#0a0000',bg2:'#000000',starTint:'#ff0000',uiAccent:'#ff0000'};}}
function initStars(){stars=[];for(var i=0;i<30;i++){stars.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*2.5+1.5,speed:Math.random()*2.5+1.5,bright:Math.random()*0.6+0.4,layer:'near'});}for(var i=0;i<30;i++){stars.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*1.5+0.7,speed:Math.random()*0.8+0.3,bright:Math.random()*0.4+0.3,layer:'mid'});}for(var i=0;i<20;i++){stars.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*0.8+0.3,speed:Math.random()*0.2+0.05,bright:Math.random()*0.3+0.2,layer:'far'});}}
initStars();
function initNebulas(){nebulas=[];var colors=['rgba(200, 50, 150, 0.15)','rgba(50, 150, 200, 0.15)','rgba(100, 200, 50, 0.12)','rgba(200, 100, 50, 0.12)'];for(var i=0;i<4;i++){nebulas.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*80+100,color:colors[i%colors.length],vx:Math.random()*0.3-0.15,vy:Math.random()*0.15-0.075});}}
initNebulas();
function initDebris(){debris=[];for(var i=0;i<12;i++){debris.push({x:Math.random()*W,y:Math.random()*H,vx:Math.random()*0.3-0.15,vy:Math.random()*0.5+0.1,size:Math.random()*2+1,rot:Math.random()*6.28,rotSpd:Math.random()*0.05-0.025});}}
initDebris();
var touch={active:false,id:-1,sx:0,sy:0,x:0,y:0};var mouseDown=false,mouseX=W/2,mouseY=H/2;var keys={};
function screenToGame(sx,sy){var rect=canvas.getBoundingClientRect();var px=(sx-rect.left)*devicePixelRatio;var py=(sy-rect.top)*devicePixelRatio;return{x:(px-offsetX)/scale,y:(py-offsetY)/scale};}
canvas.addEventListener('touchstart',function(e){e.preventDefault();if(!audioCtx)initAudio();for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];var p=screenToGame(t.clientX,t.clientY);if(state===STATE_MENU){handleMenuClick(p.x,p.y);return;}if(state===STATE_TUTORIAL){handleTutorialClick(p.x,p.y);return;}if(state===STATE_REVIVE){handleReviveClick(p.x,p.y);return;}if(state===STATE_DEAD){handleDeadClick(p.x,p.y);return;}if(state===STATE_SHOP){handleShopClick(p.x,p.y);return;}if(state===STATE_LEVELUP){handleLevelUpClick(p.x,p.y);return;}if(state===STATE_PAUSED){handlePauseClick(p.x,p.y);return;}if(state===STATE_STATS){handleStatsClick(p.x,p.y);return;}if(state===STATE_SKINS){handleSkinsClick(p.x,p.y);return;}if(p.x>W*0.65){triggerDash();}else if(!touch.active){touch.active=true;touch.id=t.identifier;touch.sx=p.x;touch.sy=p.y;touch.x=p.x;touch.y=p.y;}}},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];if(t.identifier===touch.id){var p=screenToGame(t.clientX,t.clientY);touch.x=p.x;touch.y=p.y;}}},{passive:false});
canvas.addEventListener('touchend',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===touch.id){touch.active=false;touch.id=-1;}}},{passive:false});
canvas.addEventListener('mousedown',function(e){if(!audioCtx)initAudio();var p=screenToGame(e.clientX,e.clientY);mouseDown=true;mouseX=p.x;mouseY=p.y;if(state===STATE_MENU)handleMenuClick(p.x,p.y);else if(state===STATE_TUTORIAL)handleTutorialClick(p.x,p.y);else if(state===STATE_REVIVE)handleReviveClick(p.x,p.y);else if(state===STATE_DEAD)handleDeadClick(p.x,p.y);else if(state===STATE_SHOP)handleShopClick(p.x,p.y);else if(state===STATE_LEVELUP)handleLevelUpClick(p.x,p.y);else if(state===STATE_PAUSED)handlePauseClick(p.x,p.y);else if(state===STATE_STATS)handleStatsClick(p.x,p.y);else if(state===STATE_SKINS)handleSkinsClick(p.x,p.y);});
canvas.addEventListener('mousemove',function(e){var p=screenToGame(e.clientX,e.clientY);mouseX=p.x;mouseY=p.y;});
canvas.addEventListener('mouseup',function(){mouseDown=false;});
window.addEventListener('keydown',function(e){keys[e.key]=true;if(!audioCtx)initAudio();if(state===STATE_MENU&&(e.key===' '||e.key==='Enter'))startGame();if(state===STATE_PLAY&&e.key===' ')triggerDash();if(state===STATE_PLAY&&e.key==='p'){state=STATE_PAUSED;playSound('powerup');}if(state===STATE_PAUSED&&e.key==='p'){state=STATE_PLAY;playSound('powerup');}});
window.addEventListener('keyup',function(e){keys[e.key]=false;});
function triggerDash(){if(state!==STATE_PLAY)return;if(player.dashCooldown>0||player.isDashing)return;player.isDashing=true;player.dashTimer=8;player.dashCooldown=60;player.invincible=Math.max(player.invincible,10);playSound('powerup');}
function handleMenuClick(x,y){if(x>W/2-90&&x<W/2+90){if(y>355&&y<405)startGame();else if(y>425&&y<475){state=STATE_SHOP;playSound('powerup');}else if(y>495&&y<545){state=STATE_STATS;playSound('powerup');}else if(y>565&&y<615){isDailyMode=true;dailySeed=new Date().toISOString().slice(0,10).replace(/-/g,'');startGame();}}if(x>W/2-60&&x<W/2+60&&y>625&&y<675){state=STATE_SKINS;playSound('powerup');}}
function handleTutorialClick(x,y){if(x>W/2-60&&x<W/2+60&&y>680&&y<730){tutorialStep++;if(tutorialStep>2){hasPlayedBefore=true;saveGame();state=STATE_PLAY;score=0;wave=1;xp=0;xpNeeded=50;level=1;combo=0;comboTimer=0;maxCombo=0;killCount=0;gameTime=0;waveEnemiesRemaining=0;gamesPlayed++;bullets=[];bulletTrails=[];enemies=[];particles=[];pickups=[];enemyBullets=[];damageNumbers=[];asteroids=[];resetPlayer();initDebris();spawnWave();startMusic();playSound('levelup');}playSound('powerup');}}
function handleReviveClick(x,y){if(x>W/2-80&&x<W/2+80&&y>280&&y<330){if(gold>=50){gold-=50;player.hp=3;player.maxHp=Math.max(player.maxHp,3);player.invincible=180;state=STATE_PLAY;hasRevived=true;playSound('levelup');}else{playSound('damage');}}else if(x>W/2-80&&x<W/2+80&&y>380&&y<430){state=STATE_DEAD;playSound('shoot');}}
function handleDeadClick(x,y){if(y>450&&y<520&&x>W/2-80&&x<W/2+80){if(isDailyMode){saveDailyBest();isDailyMode=false;}state=STATE_MENU;playSound('shoot');stopMusic();}}
var shopItems=[{name:'+1 MAX HP',cost:50,stat:'maxHp',val:1},{name:'FIRE RATE+',cost:80,stat:'fireRate',val:-2},{name:'SPEED+',cost:60,stat:'speed',val:0.5},{name:'MAGNET+',cost:40,stat:'magnetRange',val:20},{name:'DAMAGE+',cost:100,stat:'bulletDmg',val:1}];
function handleShopClick(x,y){if(x>W/2-60&&x<W/2+60&&y>650&&y<690){state=STATE_MENU;playSound('shoot');return;}for(var i=0;i<shopItems.length;i++){var iy=250+i*70;if(x>40&&x<W-40&&y>iy-25&&y<iy+25){if(gold>=shopItems[i].cost){gold-=shopItems[i].cost;baseStats[shopItems[i].stat]+=shopItems[i].val;if(shopItems[i].stat==='fireRate'&&baseStats.fireRate<4)baseStats.fireRate=4;shopItems[i].cost=Math.floor(shopItems[i].cost*1.5);playSound('levelup');saveGame();}else{playSound('damage');}}}}
var levelUpChoices=[];
function generateLevelUpChoices(){var all=[{name:'REPAIR +2',fn:function(){player.hp=Math.min(player.hp+2,player.maxHp);}},{name:'FIRE RATE+',fn:function(){player.fireRate=Math.max(3,player.fireRate-2);}},{name:'DAMAGE+',fn:function(){player.bulletDmg+=1;}},{name:'SPEED+',fn:function(){player.speed+=0.5;}},{name:'MAGNET+',fn:function(){player.magnetRange+=30;}},{name:'+1 MAX HP',fn:function(){player.maxHp+=1;player.hp+=1;}},{name:'SHIELD+',fn:function(){player.shield+=1;}},{name:'BULLET SPD+',fn:function(){player.bulletSpeed+=2;}},{name:'+1 BULLET',fn:function(){if(player.bulletCount<5)player.bulletCount+=1;}}];for(var i=all.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=all[i];all[i]=all[j];all[j]=tmp;}levelUpChoices=all.slice(0,3);}
function handleLevelUpClick(x,y){for(var i=0;i<3;i++){var iy=320+i*80;if(x>60&&x<W-60&&y>iy-28&&y<iy+28){levelUpChoices[i].fn();state=STATE_PLAY;playSound('levelup');zoomPulse=1.05;return;}}}
function handlePauseClick(x,y){if(x>20&&x<80&&y>H-140&&y<H-100){state=STATE_PLAY;playSound('shoot');}else if(x>20&&x<80&&y>H-80&&y<H-40){state=STATE_MENU;playSound('shoot');stopMusic();}else if(x>W/2-50&&x<W/2+50&&y>300&&y<340){qualityLevel=(qualityLevel+1)%3;MAX_PARTICLES=qualityLevel===0?100:(qualityLevel===1?200:300);saveGame();playSound('powerup');}}
function handleStatsClick(x,y){if(x>W/2-60&&x<W/2+60&&y>H-60&&y<H-20){state=STATE_MENU;playSound('shoot');}}

function drawHUD(){ctx.textAlign='left';var hpW=120;ctx.fillStyle='#333';ctx.fillRect(10,10,hpW,12);var hpR=player.hp/player.maxHp;ctx.fillStyle=hpR>0.5?'#0f0':(hpR>0.25?'#ff0':'#f00');ctx.fillRect(10,10,hpW*hpR,12);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(10,10,hpW,12);ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.fillText('HP: '+player.hp+'/'+player.maxHp,14,20);ctx.fillStyle='#333';ctx.fillRect(10,28,hpW,6);ctx.fillStyle='#0ff';ctx.fillRect(10,28,hpW*(xp/xpNeeded),6);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.fillText(String(score),W-10,24);ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('WAVE '+wave,W-10,42);ctx.textAlign='left';ctx.fillStyle='#0ff';ctx.font='11px monospace';ctx.fillText('LV.'+level,10,48);ctx.fillStyle='#ff0';ctx.fillText(gold+'G',10,62);if(player.weaponTimer>0){ctx.textAlign='center';ctx.fillStyle='#f0f';ctx.font='bold 12px monospace';var wName=player.weapon==='laser'?'LASER':(player.weapon==='spread'?'SPREAD':'MISSILE');ctx.fillText(wName,W/2,62);var wBar=60;ctx.fillStyle='#333';ctx.fillRect(W/2-wBar/2,68,wBar,4);ctx.fillStyle='#f0f';ctx.fillRect(W/2-wBar/2,68,wBar*(player.weaponTimer/480),4);}if(combo>1){ctx.textAlign='center';ctx.fillStyle='#f80';ctx.font='bold '+Math.round(18*comboScale)+'px monospace';ctx.fillText('x'+combo+' COMBO',W/2,30);}ctx.textAlign='right';ctx.font='11px monospace';if(player.dashCooldown>0){ctx.fillStyle='#555';ctx.fillText('DASH: '+Math.ceil(player.dashCooldown/60)+'s',W-10,H-15);}else{ctx.fillStyle='#0ff';ctx.fillText('DASH READY',W-10,H-15);}}

var lastTime=0,accumulator=0,STEP=1000/60;function loop(ts){try{if(lastTime===0)lastTime=ts;var dt=ts-lastTime;lastTime=ts;if(dt>100)dt=100;accumulator+=dt;var steps=0;while(accumulator>=STEP&&steps<4){update();accumulator-=STEP;steps++;}if(steps>=4)accumulator=0;draw();}catch(e){if(!window._le){window._le=true;console.error('LOOP_ERR:'+e.message);document.title='ERR:'+e.message;}}requestAnimationFrame(loop);}
