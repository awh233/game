<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID RIFT - ULTRA DELUXE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #000;
      width: 100vw;
      height: 100vh;
      max-width: 420px;
      max-height: 750px;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
'use strict';

(function() {
  // ============================================================================
  // CONSTANTS
  // ============================================================================
  const CANVAS_WIDTH = 420;
  const CANVAS_HEIGHT = 750;
  const FIXED_DT = 1000 / 60;
  const MAX_DELTA_FRAMES = 4;
  const MAX_PARTICLES = 400;
  const BIOME_TRANSITION_FRAMES = 20;

  // ============================================================================
  // GAME STATE
  // ============================================================================
  let gameState = 'menu'; // menu, play, dead, shop, pause
  let screen = 'main'; // main, ships, achievements, daily
  let score = 0;
  let wave = 0;
  let combo = 0;
  let maxCombo = 0;
  let gold = 0;
  let totalGoldEarned = 0;
  let level = 1;
  let xp = 0;
  let xpNeeded = 100;
  let highScore = 0;
  let enemiesKilled = 0;
  let itemsCollected = 0;
  let timeSurvived = 0;
  let goldEarned = 0;
  let dashesUsed = 0;
  let prestigeLevel = 0;
  let dailyHighScore = 0;
  let biomeTransitionTimer = 0;
  let lastKillTime = 0;
  let pacifistTimer = 0;

  // SCREEN SHAKE
  let shakeTimer = 0, shakeIntensity = 0, shakeX = 0, shakeY = 0;
  function triggerShake(intensity, dur) { shakeIntensity = intensity; shakeTimer = dur; }

  // SCORE POPUPS
  let scorePopups = [];
  function addScorePopup(x, y, text, color, size) {
    scorePopups.push({ x, y, text, color, size: size || 14, timer: 60, maxTimer: 60 });
  }

  // WAVE ANNOUNCEMENT
  let waveAnnouncement = null;
  function showWaveAnnouncement(text, sub, dur) {
    waveAnnouncement = { text, sub: sub || '', timer: dur || 120, maxTimer: dur || 120 };
  }

  // COMBO TIMER
  let comboTimer = 0;
  const COMBO_TIMEOUT = 2.5;
  function getComboMul() { return combo >= 50 ? 5 : combo >= 20 ? 3 : combo >= 10 ? 2 : combo >= 5 ? 1.5 : 1; }

  // DEATH SEQUENCE
  let deathSlowMo = false, deathTimer = 0;

  // SCREEN FLASH
  let screenFlashTimer = 0, screenFlashColor = '#ffffff';

  // AUDIO
  let audioCtx = null, masterVol = 0.3, audioMuted = false;
  function initAudio() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  function playTone(freq, dur, type, vol) {
    if (!audioCtx || audioMuted) return;
    try {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime((vol || 0.2) * masterVol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  }
  function playNoise(dur, vol) {
    if (!audioCtx || audioMuted) return;
    try {
      const n = audioCtx.sampleRate * dur, buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
      const d = buf.getChannelData(0); for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
      const s = audioCtx.createBufferSource(), g = audioCtx.createGain();
      s.buffer = buf; g.gain.setValueAtTime((vol || 0.2) * masterVol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      s.connect(g); g.connect(audioCtx.destination); s.start();
    } catch(e) {}
  }
  function playShoot() { playTone(player.weapon === 'blaster' ? 880 : player.weapon === 'laser' ? 440 : 220, 0.08, 'square', 0.12); }
  function playExplosion() { playNoise(0.25, 0.2); playTone(80, 0.2, 'sine', 0.15); }
  function playPickup() { playTone(600, 0.05, 'sine', 0.15); setTimeout(() => playTone(800, 0.05, 'sine', 0.15), 50); setTimeout(() => playTone(1000, 0.08, 'sine', 0.15), 100); }
  function playHit() { playTone(150, 0.1, 'square', 0.1); }
  function playDeath() { playNoise(0.4, 0.25); playTone(200, 0.4, 'sawtooth', 0.12); }
  function playLevelUp() { [400,500,600,700,800].forEach((f,i) => setTimeout(() => playTone(f, 0.1, 'sine', 0.15), i * 60)); }
  function playBossWarning() { playTone(60, 0.6, 'sine', 0.25); }

  // ============================================================================
  // BIOME SYSTEM
  // ============================================================================
  const BIOMES = [
    {
      id: 'void',
      name: 'VOID',
      waveRange: [1, 5],
      colors: { top: '#0a0a1a', bottom: '#1a0a2a' },
      nebulaHue: { min: 250, max: 290 },
      desc: 'The endless void'
    },
    {
      id: 'nebula',
      name: 'NEBULA CORE',
      waveRange: [6, 10],
      colors: { top: '#0a1a3a', bottom: '#1a2a4a' },
      nebulaHue: { min: 180, max: 240 },
      desc: 'A cosmic nebula'
    },
    {
      id: 'crimson',
      name: 'CRIMSON RIFT',
      waveRange: [11, 15],
      colors: { top: '#3a0a0a', bottom: '#4a1a0a' },
      nebulaHue: { min: 0, max: 30 },
      desc: 'A crimson wasteland'
    },
    {
      id: 'frozen',
      name: 'FROZEN ABYSS',
      waveRange: [16, 20],
      colors: { top: '#0a1a3a', bottom: '#1a3a5a' },
      nebulaHue: { min: 180, max: 220 },
      desc: 'Frozen depths'
    },
    {
      id: 'solar',
      name: 'SOLAR STORM',
      waveRange: [21, 999],
      colors: { top: '#3a2a0a', bottom: '#5a4a1a' },
      nebulaHue: { min: 20, max: 60 },
      desc: 'Solar inferno'
    }
  ];

  function getCurrentBiome() {
    for (let b of BIOMES) {
      if (wave >= b.waveRange[0] && wave <= b.waveRange[1]) {
        return b;
      }
    }
    return BIOMES[0];
  }

  // ============================================================================
  // ACHIEVEMENT SYSTEM
  // ============================================================================
  const ACHIEVEMENTS = [
    { id: 'first_blood', name: 'First Blood', desc: 'Kill 1 enemy', reward: 10, unlocked: false },
    { id: 'combo_king', name: 'Combo King', desc: 'Reach 20 combo', reward: 50, unlocked: false },
    { id: 'boss_slayer', name: 'Boss Slayer', desc: 'Kill first boss', reward: 100, unlocked: false },
    { id: 'wave_10', name: 'Wave 10', desc: 'Reach wave 10', reward: 100, unlocked: false },
    { id: 'unstoppable', name: 'Unstoppable', desc: 'Reach wave 20', reward: 500, unlocked: false },
    { id: 'gold_rush', name: 'Gold Rush', desc: 'Collect 1000 gold total', reward: 200, unlocked: false },
    { id: 'speed_demon', name: 'Speed Demon', desc: 'Dash 50 times in one run', reward: 50, unlocked: false },
    { id: 'pacifist', name: 'Pacifist', desc: 'Survive 30s without killing', reward: 100, unlocked: false },
    { id: 'glass_cannon', name: 'Glass Cannon', desc: 'Beat wave 5 with 1 HP', reward: 200, unlocked: false },
    { id: 'collector', name: 'Collector', desc: 'Pick up 100 items in one run', reward: 100, unlocked: false },
    { id: 'max_level', name: 'Max Level', desc: 'Reach level 10', reward: 200, unlocked: false },
    { id: 'millionaire', name: 'Millionaire', desc: 'Score 100,000 points', reward: 500, unlocked: false }
  ];

  let achievementToast = null;

  function unlockAchievement(id) {
    const ach = ACHIEVEMENTS.find(a => a.id === id);
    if (ach && !ach.unlocked) {
      ach.unlocked = true;
      gold += ach.reward;
      achievementToast = { text: `ACHIEVEMENT: ${ach.name}! +${ach.reward}G`, timer: 120 };
      savePersistentData();
    }
  }

  // ============================================================================
  // SHIP SYSTEM
  // ============================================================================
  const SHIPS = [
    {
      id: 'viper',
      name: 'VIPER',
      desc: 'Balanced Fighter',
      cost: 0,
      unlocked: true,
      color: '#00aaff',
      statMods: { speedMul: 1.0, hpAdd: 0, damageMul: 1.0, magnetMul: 1.0, fireMul: 1.0, dashLen: 1.0 }
    },
    {
      id: 'phantom',
      name: 'PHANTOM',
      desc: '+30% Speed, -1 HP',
      cost: 500,
      unlocked: false,
      color: '#aa00ff',
      statMods: { speedMul: 1.3, hpAdd: -1, damageMul: 1.0, magnetMul: 1.0, fireMul: 1.0, dashLen: 1.0 }
    },
    {
      id: 'titan',
      name: 'TITAN',
      desc: '+3 HP, -30% Speed, +10% DMG',
      cost: 1000,
      unlocked: false,
      color: '#ffaa00',
      statMods: { speedMul: 0.7, hpAdd: 3, damageMul: 1.1, magnetMul: 1.0, fireMul: 1.0, dashLen: 1.0 }
    },
    {
      id: 'spectre',
      name: 'SPECTRE',
      desc: '+50% Magnet, +20% Fire, +2x Dash',
      cost: 2000,
      unlocked: false,
      color: '#00ff88',
      statMods: { speedMul: 1.0, hpAdd: 0, damageMul: 1.0, magnetMul: 1.5, fireMul: 1.2, dashLen: 2.0 }
    }
  ];

  let selectedShipIndex = 0;

  // ============================================================================
  // DAILY CHALLENGE SYSTEM
  // ============================================================================
  function getDailyChallenge() {
    const today = new Date().toDateString();
    const seed = today.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const challenges = [
      { name: 'DOUBLE TIME', desc: '2x Enemy Speed', mod: { enemySpeedMul: 2.0 } },
      { name: 'NO DASH', desc: 'Dash disabled', mod: { noDash: true } },
      { name: 'ONE LIFE', desc: '1 HP only', mod: { oneHp: true } },
      { name: 'BOSS RUSH', desc: 'Bosses only', mod: { bossOnly: true } },
      { name: 'RAPID FIRE', desc: 'Always rapid fire on', mod: { alwaysRapid: true } },
      { name: 'DOUBLE GOLD', desc: '2x Gold drops', mod: { goldMul: 2.0 } },
      { name: 'SLOW MO', desc: '0.5x Enemy Speed', mod: { enemySpeedMul: 0.5 } },
      { name: 'MAGNET', desc: '2x Pickup range', mod: { magnetMul: 2.0 } }
    ];
    return challenges[seed % challenges.length];
  }

  let dailyChallenge = getDailyChallenge();
  let activeDailyMod = null;

  // ============================================================================
  // STREAK SYSTEM
  // ============================================================================
  function getPlayStreak() {
    const lastPlayDate = localStorage.getItem('void_rift_last_play_date');
    const streakCount = parseInt(localStorage.getItem('void_rift_streak_count') || '0', 10);
    const today = new Date().toDateString();

    if (lastPlayDate === today) {
      return streakCount;
    }
    const lastDate = lastPlayDate ? new Date(lastPlayDate) : null;
    const todayDate = new Date(today);
    if (lastDate) {
      const diff = (todayDate - lastDate) / (1000 * 60 * 60 * 24);
      if (Math.abs(diff - 1) < 0.5) {
        return streakCount + 1;
      }
    }
    return 1;
  }

  function getStreakMultiplier() {
    const streak = getPlayStreak();
    if (streak >= 7) return 2.0;
    if (streak >= 5) return 1.5;
    if (streak >= 3) return 1.2;
    if (streak >= 2) return 1.1;
    return 1.0;
  }

  function recordPlayToday() {
    const today = new Date().toDateString();
    const lastPlayDate = localStorage.getItem('void_rift_last_play_date');
    if (lastPlayDate !== today) {
      const currentStreak = getPlayStreak();
      localStorage.setItem('void_rift_last_play_date', today);
      localStorage.setItem('void_rift_streak_count', currentStreak);
    }
  }

  // ============================================================================
  // PLAYER
  // ============================================================================
  let player = {
    x: CANVAS_WIDTH / 2,
    y: CANVAS_HEIGHT - 80,
    vx: 0,
    vy: 0,
    radius: 12,
    maxHp: 4,
    hp: 4,
    speed: 200,
    fireRate: 0.1,
    bulletDamage: 1,
    magnetRadius: 100,
    invulnTimer: 0,
    dashTimer: 0,
    dashLength: 0.3,
    fireTimer: 0,
    weapon: 'blaster',
    hasShield: false,
    shieldTimer: 0
  };

  // ============================================================================
  // WEAPON SYSTEM
  // ============================================================================
  const WEAPONS = {
    blaster: {
      name: 'BLASTER',
      desc: 'Standard weapon',
      fireRate: 1.0,
      bulletDamage: 1.0,
      bulletSpeed: 400,
      color: '#00ff00'
    },
    laser: {
      name: 'LASER',
      desc: 'Continuous beam',
      fireRate: 1.0,
      bulletDamage: 0.3,
      bulletSpeed: 0,
      color: '#00ff00'
    },
    missiles: {
      name: 'MISSILES',
      desc: 'Homing projectiles',
      fireRate: 0.33,
      bulletDamage: 2.0,
      bulletSpeed: 250,
      color: '#ffff00'
    }
  };

  let laserActive = false;
  let laserTarget = null;

  function switchWeapon(weaponId) {
    if (WEAPONS[weaponId]) {
      player.weapon = weaponId;
      laserActive = false;
      laserTarget = null;
    }
  }

  // ============================================================================
  // ENEMIES
  // ============================================================================
  let enemies = [];
  let waveEnemiesRemaining = 0;
  let nextWaveTimer = null;
  let bossKilled = false;

  const ENEMY_TYPES = {
    drone: {
      radius: 8,
      maxHp: 1,
      speed: 100,
      fireRate: 1.5,
      bulletDamage: 0.5,
      color: '#ff3300',
      points: 10,
      goldDrop: 5
    },
    scout: {
      radius: 6,
      maxHp: 1,
      speed: 180,
      fireRate: 0.8,
      bulletDamage: 0.5,
      color: '#ffaa00',
      points: 15,
      goldDrop: 8
    },
    tank: {
      radius: 14,
      maxHp: 4,
      speed: 60,
      fireRate: 0.5,
      bulletDamage: 1.0,
      color: '#00ff00',
      points: 40,
      goldDrop: 15
    },
    shooter: {
      radius: 10,
      maxHp: 2,
      speed: 80,
      fireRate: 0.6,
      bulletDamage: 1.0,
      color: '#0088ff',
      points: 25,
      goldDrop: 12
    },
    bomber: {
      radius: 11,
      maxHp: 3,
      speed: 120,
      fireRate: 2.0,
      bulletDamage: 1.5,
      color: '#ff00ff',
      points: 35,
      goldDrop: 14
    },
    boss: {
      radius: 25,
      maxHp: 20,
      speed: 80,
      fireRate: 0.5,
      bulletDamage: 1.5,
      color: '#ffff00',
      points: 500,
      goldDrop: 100
    }
  };

  function spawnEnemy(type, x, y) {
    if (!ENEMY_TYPES[type]) return;
    const spec = ENEMY_TYPES[type];
    const speedMul = activeDailyMod?.mod.enemySpeedMul || 1.0;
    enemies.push({
      type,
      x,
      y,
      vx: 0,
      vy: (type === 'boss') ? 60 : 100,
      radius: spec.radius,
      maxHp: spec.maxHp,
      hp: spec.maxHp,
      speed: spec.speed * speedMul,
      fireRate: spec.fireRate,
      fireTimer: 0,
      bulletDamage: spec.bulletDamage,
      color: spec.color,
      points: spec.points,
      goldDrop: spec.goldDrop,
      shootCooldown: 0,
      bossPhase: 0,
      bossTimer: 0,
      bossAttackTimer: 0,
      chargeTimer: 0,
      fireTrail: [],
      iceWalls: []
    });
  }

  function spawnWave(waveNum) {
    enemies = [];
    const isBossWave = (waveNum % 5 === 0);
    bossKilled = false;

    if (isBossWave) {
      const bx = CANVAS_WIDTH / 2;
      spawnEnemy('boss', bx, 80);
      waveEnemiesRemaining = 1;
      showWaveAnnouncement('BOSS INCOMING!', 'Wave ' + waveNum, 120);
      triggerShake(4, 10);
      playBossWarning();
    } else {
      showWaveAnnouncement('WAVE ' + waveNum, '', 90);
      const baseCount = 3 + Math.floor(waveNum / 2);
      const maxCount = Math.min(baseCount, 20);
      let types = ['drone', 'scout', 'tank', 'shooter', 'bomber'];
      if (waveNum < 3) types = ['drone'];
      if (waveNum < 5) types = ['drone', 'scout'];
      if (waveNum < 10) types = ['drone', 'scout', 'tank'];

      for (let i = 0; i < maxCount; i++) {
        const type = types[Math.floor(Math.random() * types.length)];
        const x = Math.random() * (CANVAS_WIDTH - 40) + 20;
        spawnEnemy(type, x, -40);
      }
      waveEnemiesRemaining = maxCount;
    }
  }

  // ============================================================================
  // BULLETS
  // ============================================================================
  let bullets = [];
  let enemyBullets = [];

  function spawnBullet(x, y, vx, vy, damage, lifetime, isEnemy) {
    const arr = isEnemy ? enemyBullets : bullets;
    arr.push({
      x, y, vx, vy, damage, lifetime, maxLifetime: lifetime,
      radius: 3,
      isEnemy,
      homing: player.weapon === 'missiles' && !isEnemy,
      age: 0
    });
  }

  // ============================================================================
  // PICKUPS
  // ============================================================================
  let pickups = [];

  const PICKUP_TYPES = {
    gold: { color: '#ffff00', value: 10, rarity: 0.6 },
    health: { color: '#00ff00', value: 1, rarity: 0.25 },
    shield: { color: '#00aaff', value: 1, rarity: 0.1 },
    rapid: { color: '#ff6600', value: 1, rarity: 0.03 },
    spread: { color: '#ff00ff', value: 1, rarity: 0.02 }
  };

  function spawnPickups(x, y) {
    const rolls = Math.floor(Math.random() * 3) + 1;
    for (let i = 0; i < rolls; i++) {
      const rand = Math.random();
      let type = 'gold';
      let cumulative = 0;
      for (let [key, spec] of Object.entries(PICKUP_TYPES)) {
        cumulative += spec.rarity;
        if (rand < cumulative) {
          type = key;
          break;
        }
      }
      pickups.push({
        type,
        x: x + (Math.random() - 0.5) * 20,
        y: y + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 60,
        vy: (Math.random() - 0.5) * 60,
        radius: 6,
        bobPhase: Math.random() * Math.PI * 2,
        age: 0
      });
    }
  }

  // ============================================================================
  // PARTICLES
  // ============================================================================
  let particles = [];

  function spawnParticles(x, y, count, color) {
    for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
      const angle = (Math.PI * 2 * i) / count;
      const speed = 100 + Math.random() * 150;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        lifetime: 0.5 + Math.random() * 0.3,
        maxLifetime: 0.5 + Math.random() * 0.3,
        color,
        radius: 2 + Math.random() * 2
      });
    }
  }

  // ============================================================================
  // PERSISTENT SAVE DATA
  // ============================================================================
  function savePersistentData() {
    const data = {
      highScore,
      totalGoldEarned,
      prestigeLevel,
      selectedShipIndex,
      unlockedShips: SHIPS.map(s => s.unlocked),
      achievements: ACHIEVEMENTS.map(a => a.unlocked),
      dailyHighScore,
      lastPlayDate: new Date().toDateString()
    };
    localStorage.setItem('void_rift_save', JSON.stringify(data));
  }

  function loadPersistentData() {
    const saved = localStorage.getItem('void_rift_save');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        highScore = data.highScore || 0;
        totalGoldEarned = data.totalGoldEarned || 0;
        prestigeLevel = data.prestigeLevel || 0;
        selectedShipIndex = data.selectedShipIndex || 0;
        if (data.unlockedShips) {
          data.unlockedShips.forEach((u, i) => {
            if (i < SHIPS.length) SHIPS[i].unlocked = u;
          });
        }
        if (data.achievements) {
          data.achievements.forEach((u, i) => {
            if (i < ACHIEVEMENTS.length) ACHIEVEMENTS[i].unlocked = u;
          });
        }
        dailyHighScore = data.dailyHighScore || 0;
      } catch (e) {
        console.error('Failed to load save data', e);
      }
    }
  }

  function applyShipStats() {
    const ship = SHIPS[selectedShipIndex];
    const mods = ship.statMods;
    const hpMod = activeDailyMod?.mod.oneHp ? -3 : 0;
    player.maxHp = Math.max(1, 4 + hpMod + mods.hpAdd);
    player.hp = player.maxHp;
    player.speed = 200 * mods.speedMul;
    player.bulletDamage = 1 * mods.damageMul;
    player.magnetRadius = 100 * mods.magnetMul;
    player.fireRate = 0.1 * mods.fireMul;
    player.dashLength = 0.3 * mods.dashLen;
  }

  // ============================================================================
  // GAME LOGIC
  // ============================================================================
  function startGame() {
    initAudio();
    recordPlayToday();
    gameState = 'play';
    scorePopups = [];
    waveAnnouncement = null;
    shakeTimer = 0; shakeX = 0; shakeY = 0;
    screenFlashTimer = 0;
    comboTimer = 0;
    screen = 'main';
    score = 0;
    wave = 1;
    combo = 0;
    maxCombo = 0;
    gold = 0;
    level = 1;
    xp = 0;
    xpNeeded = 100;
    enemiesKilled = 0;
    itemsCollected = 0;
    timeSurvived = 0;
    goldEarned = 0;
    dashesUsed = 0;
    pacifistTimer = 0;
    lastKillTime = 0;
    player.weapon = 'blaster';
    activeDailyMod = null;
    biomeTransitionTimer = 0;
    laserActive = false;
    laserTarget = null;

    applyShipStats();
    if (activeDailyMod?.mod.alwaysRapid) {
      player.fireRate = 0.05;
    }
    if (activeDailyMod?.mod.magnetMul) {
      player.magnetRadius *= activeDailyMod.mod.magnetMul;
    }

    spawnWave(1);
    particles = [];
    bullets = [];
    enemyBullets = [];
    pickups = [];
  }

  function startGameWithDaily() {
    activeDailyMod = { mod: dailyChallenge.mod };
    startGame();
  }

  function nextWave() {
    const prevBiome = getCurrentBiome();
    wave++;
    const newBiome = getCurrentBiome();
    if (prevBiome.id !== newBiome.id) {
      biomeTransitionTimer = BIOME_TRANSITION_FRAMES;
    }
    spawnWave(wave);
    combo = 0;
  }

  function killEnemy(enemy, x, y) {
    enemiesKilled++;
    lastKillTime = timeSurvived;
    comboTimer = COMBO_TIMEOUT;
    combo++;
    maxCombo = Math.max(maxCombo, combo);
    const pts = Math.floor(enemy.points * (1 + prestigeLevel * 0.25) * getComboMul());
    score += pts;
    const goldAmount = Math.floor(enemy.goldDrop * (activeDailyMod?.mod.goldMul || 1.0) * getStreakMultiplier());
    gold += goldAmount;
    goldEarned += goldAmount;
    totalGoldEarned += goldAmount;
    xp += 10;

    // Premium effects
    const isBoss = enemy.type === 'boss';
    spawnParticles(x, y, isBoss ? 40 : 15, enemy.color);
    spawnPickups(x, y);
    addScorePopup(x, y - 20, '+' + pts, '#ffffff', 14);
    if (goldAmount > 0) addScorePopup(x + 15, y - 10, '+' + goldAmount + 'G', '#ffff00', 11);
    triggerShake(isBoss ? 10 : 2, isBoss ? 15 : 3);
    playExplosion();

    // Combo milestone announcements
    if (combo === 10) addScorePopup(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, '10x COMBO!', '#ffaa00', 28);
    if (combo === 20) addScorePopup(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, '20x COMBO!', '#ff6600', 32);
    if (combo === 50) addScorePopup(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, '50x COMBO!', '#ff0000', 38);

    waveEnemiesRemaining = Math.max(0, waveEnemiesRemaining - 1);
    if (waveEnemiesRemaining === 0 && enemies.length === 0) {
      if (nextWaveTimer) clearInterval(nextWaveTimer);
      nextWaveTimer = setTimeout(() => {
        nextWave();
        nextWaveTimer = null;
      }, 1500);
    }

    if (isBoss) {
      bossKilled = true;
      unlockAchievement('boss_slayer');
      screenFlashColor = '#ffff00';
      screenFlashTimer = 15;
    }

    unlockAchievementConditions();
  }

  function playerTakeDamage(amount) {
    if (player.invulnTimer > 0) return;
    if (player.hasShield) {
      player.hasShield = false;
      player.shieldTimer = 0;
      playHit();
      triggerShake(3, 4);
      return;
    }
    player.hp -= amount;
    player.invulnTimer = 45;
    spawnParticles(player.x, player.y, 15, '#ff6666');
    triggerShake(5, 8);
    playHit();
    screenFlashColor = '#ff0000';
    screenFlashTimer = 8;
  }

  function update(dt) {
    if (gameState !== 'play') return;

    timeSurvived += dt;
    pacifistTimer += dt;

    // ========== PLAYER MOVEMENT ==========
    const moveSpeed = player.speed;
    let moveX = 0;
    let moveY = 0;
    if (keyState['arrowleft'] || keyState['a']) moveX = -1;
    if (keyState['arrowright'] || keyState['d']) moveX = 1;
    if (keyState['arrowup'] || keyState['w']) moveY = -1;
    if (keyState['arrowdown'] || keyState['s']) moveY = 1;
    player.vx = moveX * moveSpeed;
    player.vy = moveY * moveSpeed;
    player.x = Math.max(player.radius, Math.min(CANVAS_WIDTH - player.radius, player.x + player.vx * dt));
    player.y = Math.max(player.radius, Math.min(CANVAS_HEIGHT - player.radius, player.y + player.vy * dt));

    // ========== PLAYER FIRING ==========
    const fireRateMul = 1 + (level * 0.05) + (prestigeLevel * 0.05);
    player.fireTimer -= dt;
    const isFiring = keyState[' '] || touchAutoFire;

    if (isFiring && player.fireTimer <= 0) {
      if (player.weapon === 'laser') {
        laserActive = true;
      } else {
        const weaponSpec = WEAPONS[player.weapon];
        if (player.weapon === 'missiles') {
          spawnBullet(player.x, player.y - player.radius, 0, -weaponSpec.bulletSpeed, player.bulletDamage * weaponSpec.bulletDamage, 300, false);
        } else {
          spawnBullet(player.x, player.y - player.radius, 0, -weaponSpec.bulletSpeed, player.bulletDamage * weaponSpec.bulletDamage, 120, false);
        }
      }
      player.fireTimer = player.fireRate * (1 / fireRateMul);
      playShoot();
    }

    if (!isFiring) {
      laserActive = false;
      laserTarget = null;
    }

    // ========== LASER WEAPON ==========
    if (laserActive && player.weapon === 'laser') {
      laserTarget = null;
      for (let enemy of enemies) {
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const playerAngle = Math.PI * 1.5;
        const angleDiff = Math.abs(angle - playerAngle);
        if (angleDiff < 0.3 && dist < 400) {
          const dmg = player.bulletDamage * WEAPONS['laser'].bulletDamage;
          enemy.hp -= dmg * dt;
          laserTarget = enemy;
          if (enemy.hp <= 0) {
            enemies.splice(enemies.indexOf(enemy), 1);
            killEnemy(enemy, enemy.x, enemy.y);
          }
          break;
        }
      }
    }

    // ========== DASH ==========
    player.dashTimer -= dt;
    if (keyState['shift'] && player.dashTimer <= 0 && !activeDailyMod?.mod.noDash) {
      player.dashTimer = 1.0;
      dashesUsed++;
      const dashDist = 60 * player.dashLength;
      player.x = Math.max(player.radius, Math.min(CANVAS_WIDTH - player.radius, player.x + moveX * dashDist));
      spawnParticles(player.x, player.y, 8, '#88ff00');
    }

    // ========== INVULNERABILITY ==========
    player.invulnTimer -= dt;

    // ========== SHIELD ==========
    if (player.hasShield) {
      player.shieldTimer -= dt;
      if (player.shieldTimer <= 0) player.hasShield = false;
    }

    // ========== ENEMY UPDATES ==========
    for (let enemy of enemies) {
      if (enemy.type === 'boss') {
        updateBoss(enemy, dt);
      } else {
        enemy.y += enemy.vy * dt;
        enemy.x += (Math.sin(Date.now() / 1000 + enemy.x) * 50) * dt;
      }

      enemy.fireTimer += dt;
      if (enemy.fireTimer >= 1.0 / enemy.fireRate) {
        enemy.fireTimer = 0;
        const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        const speed = 200;
        spawnBullet(enemy.x, enemy.y, Math.cos(angle) * speed, Math.sin(angle) * speed, enemy.bulletDamage, 300, true);
      }

      // Player-enemy collision (contact damage)
      const pdx = player.x - enemy.x;
      const pdy = player.y - enemy.y;
      const pDist = Math.sqrt(pdx * pdx + pdy * pdy);
      if (pDist < player.radius + enemy.radius) {
        playerTakeDamage(1);
      }

      if (enemy.y > CANVAS_HEIGHT + 50) {
        enemies.splice(enemies.indexOf(enemy), 1);
        waveEnemiesRemaining = Math.max(0, waveEnemiesRemaining - 1);
      }
    }

    // ========== BOSS UPDATES ==========
    function updateBoss(boss, dt) {
      const biome = getCurrentBiome();
      const targetY = 150;
      if (boss.y < targetY) {
        boss.y += boss.speed * dt;
      } else {
        boss.y = targetY;
      }

      // Horizontal movement
      boss.x += Math.sin(Date.now() / 2000 + boss.x / 100) * 80 * dt;
      boss.x = Math.max(boss.radius + 20, Math.min(CANVAS_WIDTH - boss.radius - 20, boss.x));

      boss.bossTimer += dt;
      boss.bossAttackTimer += dt;

      // VOID Boss: aimed spread + radial burst
      if (biome.id === 'void' && boss.bossAttackTimer >= 2.0) {
        boss.bossAttackTimer = 0;
        for (let i = 0; i < 8; i++) {
          const angle = (Math.PI * 2 * i) / 8;
          spawnBullet(boss.x, boss.y, Math.cos(angle) * 150, Math.sin(angle) * 150, 1.0, 300, true);
        }
      }
      // NEBULA Boss: spawns mini-drones, shoots homing missiles
      else if (biome.id === 'nebula') {
        if (boss.bossAttackTimer >= 3.0) {
          boss.bossAttackTimer = 0;
          for (let i = 0; i < 3; i++) {
            const angle = Math.atan2(player.y - boss.y, player.x - boss.x) + (i - 1) * 0.3;
            spawnBullet(boss.x, boss.y, Math.cos(angle) * 200, Math.sin(angle) * 200, 1.5, 300, true);
          }
        }
        if (boss.bossTimer >= 3.0) {
          boss.bossTimer = 0;
          const dx = Math.random() * 100 - 50;
          spawnEnemy('drone', boss.x + dx, boss.y - 30);
        }
      }
      // CRIMSON Boss: charges at player
      else if (biome.id === 'crimson') {
        if (boss.bossAttackTimer >= 2.5) {
          boss.bossAttackTimer = 0;
          const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
          boss.vx = Math.cos(angle) * 200;
          boss.vy = Math.sin(angle) * 200;
          spawnParticles(boss.x, boss.y, 10, '#ff6600');
        }
        boss.x += boss.vx * dt;
        boss.y += boss.vy * dt;
        boss.vx *= 0.95;
        boss.vy *= 0.95;
      }
      // FROZEN Boss: creates ice walls, fires spiral
      else if (biome.id === 'frozen') {
        if (boss.bossAttackTimer >= 3.5) {
          boss.bossAttackTimer = 0;
          for (let i = 0; i < 12; i++) {
            const angle = (Math.PI * 2 * i) / 12;
            spawnBullet(boss.x, boss.y, Math.cos(angle) * 120, Math.sin(angle) * 120, 1.0, 300, true);
          }
        }
      }
      // SOLAR Boss: all abilities combined, faster
      else if (biome.id === 'solar') {
        if (boss.bossAttackTimer >= 1.5) {
          boss.bossAttackTimer = 0;
          for (let i = 0; i < 6; i++) {
            const angle = (Math.PI * 2 * i) / 6;
            spawnBullet(boss.x, boss.y, Math.cos(angle) * 180, Math.sin(angle) * 180, 1.5, 300, true);
          }
        }
      }
    }

    // ========== BULLET UPDATES ==========
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.lifetime -= 1;
      b.age += dt;

      if (b.homing) {
        let closest = null;
        let closestDist = Infinity;
        for (let e of enemies) {
          const dx = e.x - b.x;
          const dy = e.y - b.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < closestDist) {
            closestDist = d;
            closest = e;
          }
        }
        if (closest && closestDist < 500) {
          const angle = Math.atan2(closest.y - b.y, closest.x - b.x);
          const turnSpeed = 3.0;
          const bAngle = Math.atan2(b.vy, b.vx);
          const angleDiff = angle - bAngle;
          let adjustedDiff = angleDiff;
          if (adjustedDiff > Math.PI) adjustedDiff -= Math.PI * 2;
          if (adjustedDiff < -Math.PI) adjustedDiff += Math.PI * 2;
          const newAngle = bAngle + Math.max(-turnSpeed * dt, Math.min(turnSpeed * dt, adjustedDiff));
          const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
          b.vx = Math.cos(newAngle) * speed;
          b.vy = Math.sin(newAngle) * speed;
        }
      }

      let hit = false;
      for (let e of enemies) {
        const dx = e.x - b.x;
        const dy = e.y - b.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < e.radius + b.radius) {
          e.hp -= b.damage;
          hit = true;
          spawnParticles(b.x, b.y, 5, '#ffff00');
          if (e.hp <= 0) {
            enemies.splice(enemies.indexOf(e), 1);
            killEnemy(e, e.x, e.y);
          }
          break;
        }
      }

      if (hit || b.lifetime <= 0 || b.y < 0) {
        bullets.splice(i, 1);
      }
    }

    // ========== ENEMY BULLET UPDATES ==========
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.lifetime -= 1;

      const dx = player.x - b.x;
      const dy = player.y - b.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < player.radius + b.radius) {
        playerTakeDamage(b.damage);
        enemyBullets.splice(i, 1);
      } else if (b.lifetime <= 0 || b.y > CANVAS_HEIGHT + 50) {
        enemyBullets.splice(i, 1);
      }
    }

    // ========== PICKUP UPDATES ==========
    for (let i = pickups.length - 1; i >= 0; i--) {
      const p = pickups[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.bobPhase += 2 * dt;
      p.age += dt;

      const dx = player.x - p.x;
      const dy = player.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);

      if (d < player.magnetRadius) {
        const mag = 300;
        const angle = Math.atan2(dy, dx);
        p.vx += Math.cos(angle) * mag * dt;
        p.vy += Math.sin(angle) * mag * dt;
      }

      if (d < player.radius + p.radius) {
        itemsCollected++;
        playPickup();
        screenFlashColor = '#ffffff';
        screenFlashTimer = 4;
        if (p.type === 'gold') {
          gold += PICKUP_TYPES[p.type].value;
        } else if (p.type === 'health') {
          player.hp = Math.min(player.maxHp, player.hp + PICKUP_TYPES[p.type].value);
        } else if (p.type === 'shield') {
          player.hasShield = true;
          player.shieldTimer = 5.0;
        } else if (p.type === 'rapid') {
          player.fireRate = 0.05;
          setTimeout(() => {
            if (player.fireRate === 0.05) {
              player.fireRate = 0.1;
            }
          }, 5000);
        } else if (p.type === 'spread') {
          for (let j = -1; j <= 1; j++) {
            spawnBullet(player.x + j * 10, player.y - player.radius, j * 50, -400, player.bulletDamage, 120, false);
          }
        }
        pickups.splice(i, 1);
      } else if (p.y > CANVAS_HEIGHT + 20) {
        pickups.splice(i, 1);
      }
    }

    // ========== PARTICLE UPDATES ==========
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.lifetime -= dt;
      if (p.lifetime <= 0) {
        particles.splice(i, 1);
      }
    }

    // ========== LEVEL UP ==========
    while (xp >= xpNeeded) {
      xp -= xpNeeded;
      level++;
      xpNeeded = 100 + level * 50;
      playLevelUp();
      addScorePopup(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 40, 'LEVEL UP!', '#00ff88', 24);
      screenFlashColor = '#00ff88';
      screenFlashTimer = 10;
    }

    // ========== COMBO TIMER ==========
    if (combo > 0) {
      comboTimer -= dt;
      if (comboTimer <= 0) { combo = 0; comboTimer = 0; }
    }

    // ========== SCORE POPUP UPDATES ==========
    for (let i = scorePopups.length - 1; i >= 0; i--) {
      scorePopups[i].y -= 40 * dt;
      scorePopups[i].timer--;
      if (scorePopups[i].timer <= 0) scorePopups.splice(i, 1);
    }

    // ========== SCREEN SHAKE ==========
    if (shakeTimer > 0) {
      shakeTimer -= dt;
      shakeX = (Math.random() - 0.5) * 2 * shakeIntensity;
      shakeY = (Math.random() - 0.5) * 2 * shakeIntensity;
    } else { shakeX = 0; shakeY = 0; }

    // ========== SCREEN FLASH ==========
    if (screenFlashTimer > 0) screenFlashTimer--;

    // ========== WAVE ANNOUNCEMENT ==========
    if (waveAnnouncement) {
      waveAnnouncement.timer--;
      if (waveAnnouncement.timer <= 0) waveAnnouncement = null;
    }

    // ========== CHECK DEATH ==========
    if (player.hp <= 0) {
      gameState = 'dead';
      playDeath();
      triggerShake(8, 20);
      spawnParticles(player.x, player.y, 35, '#ff4444');
      spawnParticles(player.x, player.y, 15, '#ffaa00');
      screenFlashColor = '#ff0000';
      screenFlashTimer = 15;
      if (nextWaveTimer) clearInterval(nextWaveTimer);
      if (score > highScore) highScore = score;
      if (activeDailyMod && score > dailyHighScore) dailyHighScore = score;
      savePersistentData();
    }

    // ========== BIOME TRANSITION ==========
    if (biomeTransitionTimer > 0) {
      biomeTransitionTimer -= dt;
    }

    // ========== ACHIEVEMENT CHECKS ==========
    unlockAchievementConditions();
  }

  function unlockAchievementConditions() {
    if (enemiesKilled > 0) unlockAchievement('first_blood');
    if (combo >= 20) unlockAchievement('combo_king');
    if (bossKilled) unlockAchievement('boss_slayer');
    if (wave >= 10) unlockAchievement('wave_10');
    if (wave >= 20) unlockAchievement('unstoppable');
    if (totalGoldEarned >= 1000) unlockAchievement('gold_rush');
    if (dashesUsed >= 50) unlockAchievement('speed_demon');
    if (timeSurvived >= 30 && pacifistTimer >= 30) unlockAchievement('pacifist');
    if (wave >= 5 && player.hp === 1) unlockAchievement('glass_cannon');
    if (itemsCollected >= 100) unlockAchievement('collector');
    if (level >= 10) unlockAchievement('max_level');
    if (score >= 100000) unlockAchievement('millionaire');
  }

  // ============================================================================
  // DRAWING FUNCTIONS
  // ============================================================================
  function drawButton(ctx, cx, cy, w, h, text, color) {
    const x = cx - w / 2;
    const y = cy - h / 2;
    const radius = 8;

    // Gradient fill (darker at top, lighter at bottom)
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, color);
    grad.addColorStop(1, adjustBrightness(color, 1.3));

    // Draw rounded rectangle background
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.fill();

    // Inner glow (subtle highlight on top)
    const innerGrad = ctx.createLinearGradient(x, y, x, y + h * 0.4);
    innerGrad.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
    innerGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = innerGrad;
    ctx.beginPath();
    ctx.moveTo(x + radius, y + 1);
    ctx.lineTo(x + w - radius, y + 1);
    ctx.quadraticCurveTo(x + w - 1, y + 1, x + w - 1, y + radius);
    ctx.lineTo(x + w - 1, y + h * 0.4);
    ctx.quadraticCurveTo(x + w - 1, y + h * 0.4, x, y + h * 0.4);
    ctx.lineTo(x + 1, y + radius);
    ctx.quadraticCurveTo(x + 1, y + 1, x + radius, y + 1);
    ctx.fill();

    // Outer border with glow
    ctx.strokeStyle = adjustBrightness(color, 0.7);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.stroke();

    // Shadow glow effect
    ctx.shadowBlur = 12;
    ctx.shadowColor = color;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 2;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;

    // Text with shadow
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 4;
    ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;
    ctx.fillText(text, cx, cy);
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
  }

  function adjustBrightness(color, factor) {
    const num = parseInt(color.replace("#",""), 16);
    const r = Math.min(255, Math.floor((num >> 16) * factor));
    const g = Math.min(255, Math.floor((num >> 8 & 0x00FF) * factor));
    const b = Math.min(255, Math.floor((num & 0x0000FF) * factor));
    return "#" + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
  }

  function drawStars(ctx) {
    const time = Date.now() * 0.0001;

    // Multiple layers of stars with parallax
    for (let layer = 0; layer < 3; layer++) {
      const layerSpeed = 0.3 + layer * 0.2;
      const layerOpacity = 0.3 + layer * 0.25;

      for (let i = 0; i < 100 + layer * 50; i++) {
        const seed = Math.sin(i * 12.9898 + layer * 73.156) * 43758.5453;
        const baseSeed = seed - Math.floor(seed);
        let x = (baseSeed * CANVAS_WIDTH + time * layerSpeed * 20) % CANVAS_WIDTH;
        if (x < 0) x += CANVAS_WIDTH;

        const y = ((seed * 78.233 - Math.floor(seed * 78.233)) * CANVAS_HEIGHT) % CANVAS_HEIGHT;
        let radius = Math.max(0.3, (seed * 0.7) % 1.2);

        // Twinkling effect
        const twinkle = Math.sin(time * (1 + layer * 0.5) + i * 0.1) * 0.5 + 0.5;
        const brightness = Math.pow(twinkle, 2);

        ctx.fillStyle = `rgba(255, 255, 255, ${layerOpacity * brightness})`;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();

        // Glow for brighter stars
        if (brightness > 0.7) {
          ctx.fillStyle = `rgba(200, 220, 255, ${layerOpacity * (brightness - 0.7) * 0.5})`;
          ctx.beginPath();
          ctx.arc(x, y, radius + 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  function drawBackground(ctx) {
    const biome = getCurrentBiome();
    const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
    gradient.addColorStop(0, biome.colors.top);
    gradient.addColorStop(1, biome.colors.bottom);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    drawStars(ctx);
  }

  function drawPlayer(ctx) {
    const ship = SHIPS[selectedShipIndex];
    const visible = player.invulnTimer <= 0 || Math.floor(player.invulnTimer * 10) % 2 === 0;

    if (!visible) return;

    const x = player.x;
    const y = player.y;
    const size = player.radius;
    const time = Date.now() * 0.002;

    // Engine flame effect (behind ship)
    const flameLength = size * 2.5 + Math.sin(time) * 3;
    const flame1 = Math.sin(time + 1) * 0.8;
    const flame2 = Math.sin(time + 2) * 0.8;

    // Inner flame (hot yellow-orange)
    ctx.fillStyle = 'rgba(255, 200, 50, 0.7)';
    ctx.beginPath();
    ctx.moveTo(x - size * 0.6, y + size);
    ctx.lineTo(x - size * 0.3 + flame1 * 3, y + flameLength);
    ctx.lineTo(x + size * 0.3 + flame2 * 3, y + flameLength);
    ctx.lineTo(x + size * 0.6, y + size);
    ctx.fill();

    // Outer flame (more transparent orange-red)
    ctx.fillStyle = 'rgba(255, 100, 0, 0.4)';
    ctx.beginPath();
    ctx.moveTo(x - size * 0.8, y + size);
    ctx.lineTo(x - size * 0.3 + flame1 * 5, y + flameLength + 5);
    ctx.lineTo(x + size * 0.3 + flame2 * 5, y + flameLength + 5);
    ctx.lineTo(x + size * 0.8, y + size);
    ctx.fill();

    // Glow trail behind
    ctx.shadowBlur = 20;
    ctx.shadowColor = ship.color;

    // Ship body - triangle/arrow pointing up
    ctx.fillStyle = ship.color;
    ctx.beginPath();
    ctx.moveTo(x, y - size * 1.2);  // Nose
    ctx.lineTo(x + size * 0.9, y + size * 0.8); // Right wing
    ctx.lineTo(x, y + size * 0.4); // Center indent
    ctx.lineTo(x - size * 0.9, y + size * 0.8); // Left wing
    ctx.fill();

    // Inner highlight on ship
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.moveTo(x, y - size * 0.8);
    ctx.lineTo(x + size * 0.4, y);
    ctx.lineTo(x - size * 0.4, y);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Glow circle around ship
    ctx.strokeStyle = ship.color;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(x, y, size * 1.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Shield effect
    if (player.hasShield) {
      const shieldPulse = Math.sin(time * 4) * 0.3 + 0.7;
      ctx.strokeStyle = `rgba(0, 170, 255, ${shieldPulse * 0.8})`;
      ctx.lineWidth = 2;
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#00aaff';
      ctx.beginPath();
      ctx.arc(x, y, player.radius + 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Shield inner ring
      ctx.strokeStyle = `rgba(100, 200, 255, ${shieldPulse * 0.4})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, player.radius + 8, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawEnemies(ctx) {
    const time = Date.now() * 0.002;

    for (let enemy of enemies) {
      const isBoss = enemy.type === 'boss';
      const x = enemy.x;
      const y = enemy.y;
      const r = enemy.radius;

      // Pulsing glow effect
      const pulse = Math.sin(time * (isBoss ? 2 : 4)) * 0.3 + 0.7;
      ctx.shadowBlur = 15 * pulse;
      ctx.shadowColor = enemy.color;

      if (isBoss) {
        // Boss enemy - larger, spiky, rotating
        const rotation = time * (0.5 + Math.sin(enemy.x * 0.01) * 0.3);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);

        // Outer spikes
        ctx.fillStyle = `rgba(255, 100, 0, ${pulse * 0.6})`;
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          const sx = Math.cos(angle) * r * 1.8;
          const sy = Math.sin(angle) * r * 1.8;
          ctx.beginPath();
          ctx.arc(sx, sy, r * 0.5, 0, Math.PI * 2);
          ctx.fill();
        }

        // Main body (diamond shape)
        ctx.fillStyle = enemy.color;
        ctx.beginPath();
        ctx.moveTo(0, -r * 1.5);
        ctx.lineTo(r * 1.5, 0);
        ctx.lineTo(0, r * 1.5);
        ctx.lineTo(-r * 1.5, 0);
        ctx.fill();

        // Inner glow on boss
        ctx.fillStyle = `rgba(255, 200, 100, 0.5)`;
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.8, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      } else {
        // Regular enemy - hexagon shape
        ctx.fillStyle = enemy.color;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2;
          const hx = x + Math.cos(angle) * r;
          const hy = y + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(hx, hy);
          else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.fill();

        // Hexagon border
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      ctx.shadowBlur = 0;

      // HP bar above enemy
      const barW = r * 2.5;
      const barH = 4;
      const barY = y - r - 12;

      // Background bar (dark)
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(x - barW / 2, barY, barW, barH);

      // Health gradient (red to yellow to green)
      const hpPercent = Math.max(0, enemy.hp / enemy.maxHp);
      const hpBarW = barW * hpPercent;

      let hpColor;
      if (hpPercent > 0.66) {
        hpColor = '#00ff00'; // Green
      } else if (hpPercent > 0.33) {
        hpColor = '#ffff00'; // Yellow
      } else {
        hpColor = '#ff0000'; // Red
      }

      const hpGrad = ctx.createLinearGradient(x - barW / 2, barY, x - barW / 2 + hpBarW, barY);
      hpGrad.addColorStop(0, hpColor);
      hpGrad.addColorStop(1, adjustBrightness(hpColor, 1.3));
      ctx.fillStyle = hpGrad;
      ctx.fillRect(x - barW / 2, barY, hpBarW, barH);

      // HP bar border
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x - barW / 2, barY, barW, barH);

      // HP text below bar (optional, for debugging)
      if (enemy.hp <= 5 || isBoss) {
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 8px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(Math.ceil(enemy.hp), x, barY + barH + 2);
      }
    }
  }

  function drawBullets(ctx) {
    const time = Date.now() * 0.002;

    for (let b of bullets) {
      const weaponColor = WEAPONS[player.weapon].color;
      const speedY = Math.abs(b.vy) || 5;
      const size = b.radius;

      // Calculate direction
      const vx = b.vx || 0;
      const vy = b.vy || -5;
      const speed = Math.sqrt(vx * vx + vy * vy);
      const dirX = vx / (speed || 1);
      const dirY = vy / (speed || 1);

      // Trailing glow behind bullet
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = weaponColor;
      for (let trail = 1; trail <= 3; trail++) {
        const trailX = b.x - dirX * trail * 4;
        const trailY = b.y - dirY * trail * 4;
        ctx.beginPath();
        ctx.arc(trailX, trailY, size * (1 - trail * 0.3), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Main bullet - teardrop/oval shape
      ctx.save();
      ctx.translate(b.x, b.y);
      const bulletAngle = Math.atan2(dirY, dirX);
      ctx.rotate(bulletAngle);

      ctx.fillStyle = weaponColor;
      ctx.shadowBlur = 10;
      ctx.shadowColor = weaponColor;
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 2, size, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Bright core
      ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
      ctx.beginPath();
      ctx.ellipse(size * 0.8, 0, size * 0.8, size * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    if (laserActive && player.weapon === 'laser') {
      // Pulsing laser beam
      const laserPulse = Math.sin(time * 6) * 0.4 + 0.6;
      const laserWidth = 4 + laserPulse * 2;

      ctx.strokeStyle = '#00ff00';
      ctx.lineWidth = laserWidth;
      ctx.shadowBlur = 12 + laserPulse * 4;
      ctx.shadowColor = '#00ff00';
      ctx.beginPath();
      ctx.moveTo(player.x, player.y);
      ctx.lineTo(player.x, 0);
      ctx.stroke();

      // Inner bright core
      ctx.strokeStyle = 'rgba(200, 255, 100, 0.8)';
      ctx.lineWidth = laserWidth * 0.4;
      ctx.beginPath();
      ctx.moveTo(player.x, player.y);
      ctx.lineTo(player.x, 0);
      ctx.stroke();

      ctx.shadowBlur = 0;
    }
  }

  function drawEnemyBullets(ctx) {
    const time = Date.now() * 0.002;

    for (let b of enemyBullets) {
      const x = b.x;
      const y = b.y;
      const r = b.radius;

      // Direction of travel
      const vx = b.vx || 0;
      const vy = b.vy || 5;
      const speed = Math.sqrt(vx * vx + vy * vy);
      const dirX = vx / (speed || 1);
      const dirY = vy / (speed || 1);

      // Trailing particles
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = 'rgba(255, 100, 0, 0.6)';
      for (let trail = 1; trail <= 2; trail++) {
        const trailX = x - dirX * trail * 3;
        const trailY = y - dirY * trail * 3;
        ctx.beginPath();
        ctx.arc(trailX, trailY, r * (1 - trail * 0.4), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Menacing shape - spiraling diamond
      ctx.save();
      ctx.translate(x, y);
      const bulletRotation = (time * (speed + 2)) % (Math.PI * 2);
      ctx.rotate(bulletRotation);

      ctx.fillStyle = '#ff6600';
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ff0000';
      ctx.beginPath();
      ctx.moveTo(0, -r * 1.2);
      ctx.lineTo(r * 1.2, 0);
      ctx.lineTo(0, r * 1.2);
      ctx.lineTo(-r * 1.2, 0);
      ctx.fill();

      // Spiky protrusions
      ctx.fillStyle = '#ff3300';
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2;
        const sx = Math.cos(angle) * r * 1.5;
        const sy = Math.sin(angle) * r * 1.5;
        ctx.beginPath();
        ctx.arc(sx, sy, r * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Inner bright core
      ctx.fillStyle = 'rgba(255, 200, 100, 0.7)';
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  function drawPickups(ctx) {
    const time = Date.now() * 0.002;

    for (let p of pickups) {
      const spec = PICKUP_TYPES[p.type];
      const bob = Math.sin(p.bobPhase) * 3;
      const r = p.radius;

      // Pulsing glow
      const pulse = Math.sin(time * 3) * 0.3 + 0.7;
      ctx.shadowBlur = 12 * pulse;
      ctx.shadowColor = spec.color;

      ctx.save();
      ctx.translate(p.x, p.y + bob);

      // Rotation based on type
      const rotationSpeed = p.type === 'gold' ? 3 : (p.type === 'health' ? 2 : 2.5);
      const rotation = time * rotationSpeed;
      ctx.rotate(rotation);

      ctx.fillStyle = spec.color;

      if (p.type === 'gold') {
        // Diamond shape for gold
        ctx.beginPath();
        ctx.moveTo(0, -r * 1.2);
        ctx.lineTo(r * 1.2, 0);
        ctx.lineTo(0, r * 1.2);
        ctx.lineTo(-r * 1.2, 0);
        ctx.fill();

        // Inner shine
        ctx.fillStyle = 'rgba(255, 255, 150, 0.6)';
        ctx.beginPath();
        ctx.arc(0, -r * 0.3, r * 0.5, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === 'health') {
        // Cross/plus shape for health
        ctx.fillRect(-r * 0.3, -r * 1.1, r * 0.6, r * 2.2);
        ctx.fillRect(-r * 1.1, -r * 0.3, r * 2.2, r * 0.6);

        // Center circle
        ctx.fillStyle = 'rgba(255, 255, 200, 0.7)';
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Star shape for power-ups
        const points = 5;
        const outerRad = r;
        const innerRad = r * 0.5;
        ctx.beginPath();
        for (let i = 0; i < points * 2; i++) {
          const angle = (i / (points * 2)) * Math.PI * 2;
          const rad = i % 2 === 0 ? outerRad : innerRad;
          const x = Math.cos(angle) * rad;
          const y = Math.sin(angle) * rad;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        // Inner core
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();

      // Particle sparkle effect around pickup
      const sparkleCount = 4;
      for (let i = 0; i < sparkleCount; i++) {
        const sparkleAngle = (time * 2 + (i / sparkleCount) * Math.PI * 2) % (Math.PI * 2);
        const sparkleRadius = r * 2 + Math.sin(time * 2 + i) * 3;
        const sx = p.x + Math.cos(sparkleAngle) * sparkleRadius;
        const sy = p.y + bob + Math.sin(sparkleAngle) * sparkleRadius;

        ctx.fillStyle = `rgba(255, 255, 255, ${pulse * 0.6})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.shadowBlur = 0;
    }
  }

  function drawParticles(ctx) {
    for (let p of particles) {
      ctx.fillStyle = p.color;
      const alpha = p.lifetime / p.maxLifetime;
      ctx.globalAlpha = alpha;
      ctx.shadowBlur = 4;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }
  }

  function drawHUD(ctx) {
    const time = Date.now() * 0.002;
    const panelPadding = 8;
    const panelH = 85;

    // Semi-transparent dark panel at top
    ctx.fillStyle = 'rgba(10, 10, 20, 0.8)';
    ctx.fillRect(0, 0, CANVAS_WIDTH, panelH);

    // Panel border
    ctx.strokeStyle = 'rgba(100, 200, 255, 0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(0, 0, CANVAS_WIDTH, panelH);

    // LEFT SIDE - Wave, Score, Gold, Level
    ctx.fillStyle = '#00ccff';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    ctx.fillText(`WAVE ${wave}`, 10, 8);
    ctx.fillStyle = '#ffffff';
    ctx.font = '11px Arial';
    ctx.fillText(`Score: ${score}`, 10, 20);
    ctx.fillText(`Gold: ${gold}`, 10, 32);
    ctx.fillText(`Lvl: ${level}`, 10, 44);

    // Health bar (red/green gradient)
    const healthBarW = 80;
    const healthBarH = 10;
    const healthBarX = 10;
    const healthBarY = 56;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(healthBarX, healthBarY, healthBarW, healthBarH);

    const healthPercent = Math.max(0, player.hp / player.maxHp);
    const healthBarFill = healthBarW * healthPercent;

    const hpGrad = ctx.createLinearGradient(healthBarX, healthBarY, healthBarX + healthBarFill, healthBarY);
    hpGrad.addColorStop(0, '#00ff00');
    hpGrad.addColorStop(0.5, '#ffff00');
    hpGrad.addColorStop(1, '#ff0000');
    ctx.fillStyle = hpGrad;
    ctx.fillRect(healthBarX, healthBarY, healthBarFill, healthBarH);

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(healthBarX, healthBarY, healthBarW, healthBarH);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${Math.ceil(player.hp)}/${player.maxHp}`, healthBarX + healthBarW / 2, healthBarY + healthBarH / 2);

    // RIGHT SIDE - Combo, Weapon, XP
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillStyle = combo > 0 ? '#ffff00' : '#888888';
    ctx.font = 'bold 10px Arial';
    ctx.fillText(`COMBO x${combo}`, CANVAS_WIDTH - 10, 8);

    ctx.fillStyle = '#ffffff';
    ctx.font = '11px Arial';
    ctx.fillText(`${WEAPONS[player.weapon].name}`, CANVAS_WIDTH - 10, 20);

    // XP bar with glow
    const xpBarW = 100;
    const xpBarH = 10;
    const xpBarX = CANVAS_WIDTH - 110;
    const xpBarY = 35;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(xpBarX, xpBarY, xpBarW, xpBarH);

    const xpPercent = Math.max(0, xp / xpNeeded);
    const xpBarFill = xpBarW * xpPercent;

    const xpGrad = ctx.createLinearGradient(xpBarX, xpBarY, xpBarX + xpBarFill, xpBarY);
    xpGrad.addColorStop(0, '#0088ff');
    xpGrad.addColorStop(1, '#00ff88');
    ctx.fillStyle = xpGrad;
    ctx.fillRect(xpBarX, xpBarY, xpBarFill, xpBarH);

    // XP bar glow
    if (xpPercent > 0.8) {
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#00ff88';
      ctx.strokeStyle = 'rgba(0, 255, 136, 0.6)';
      ctx.lineWidth = 1;
      ctx.strokeRect(xpBarX, xpBarY, xpBarFill, xpBarH);
      ctx.shadowBlur = 0;
    }

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(xpBarX, xpBarY, xpBarW, xpBarH);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('XP', CANVAS_WIDTH - 60, xpBarY + xpBarH / 2);

    // Combo fire effect when high combo
    if (combo >= 10 && combo % 10 === 0) {
      ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowBlur = 16;
      ctx.shadowColor = '#ffff00';

      // Glitch effect on combo text
      const glitch = Math.sin(time * 10) * 2;
      ctx.fillStyle = 'rgba(255, 255, 0, 0.95)';
      ctx.fillText(`${combo}x COMBO!`, CANVAS_WIDTH / 2 + glitch, CANVAS_HEIGHT / 2);

      ctx.fillStyle = 'rgba(255, 100, 0, 0.5)';
      ctx.fillText(`${combo}x COMBO!`, CANVAS_WIDTH / 2 - glitch, CANVAS_HEIGHT / 2);

      ctx.shadowBlur = 0;
    }
  }

  function drawBiomeTransition(ctx) {
    if (biomeTransitionTimer > 0) {
      const progress = 1 - (biomeTransitionTimer / BIOME_TRANSITION_FRAMES);
      const biome = getCurrentBiome();

      // Cinematic black bars wipe from top and bottom
      const barHeight = CANVAS_HEIGHT * 0.25 * progress;
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, CANVAS_WIDTH, barHeight);
      ctx.fillRect(0, CANVAS_HEIGHT - barHeight, CANVAS_WIDTH, barHeight);

      // Center text with per-letter glow cycling
      const textY = CANVAS_HEIGHT / 2;
      const text = `ENTERING: ${biome.name}`;
      const baseFontSize = 24;
      const glowCycle = (Date.now() * 0.003) % 1;

      ctx.font = `bold ${baseFontSize}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Draw text with per-letter color cycling
      const charWidth = ctx.measureText('M').width;
      let xOffset = CANVAS_WIDTH / 2 - (text.length * charWidth) / 4;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const hue = ((glowCycle + i * 0.1) % 1) * 360;
        const brightness = Math.sin(glowCycle * Math.PI * 2 + i * 0.5) * 0.3 + 0.7;

        // Cycle through color hues
        let color;
        if (glowCycle < 0.33) {
          color = `rgba(0, 255, 255, ${brightness})`;
        } else if (glowCycle < 0.66) {
          color = `rgba(0, 255, 100, ${brightness})`;
        } else {
          color = `rgba(100, 100, 255, ${brightness})`;
        }

        ctx.fillStyle = color;
        ctx.shadowBlur = 8 + brightness * 8;
        ctx.shadowColor = color;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.fillText(char, xOffset + i * charWidth / 2, textY);
      }
      ctx.shadowBlur = 0;

      // Semi-transparent vignette overlay
      const vignetteAlpha = progress * 0.3;
      ctx.fillStyle = `rgba(0, 0, 0, ${vignetteAlpha})`;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    }
  }

  function drawCRTEffect(ctx) {
    // Lightweight scanline overlay instead of expensive getImageData
    ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
    for (let y = 0; y < CANVAS_HEIGHT; y += 3) {
      ctx.fillRect(0, y, CANVAS_WIDTH, 1);
    }
    // Subtle vignette
    const vg = ctx.createRadialGradient(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, CANVAS_WIDTH * 0.3, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, CANVAS_WIDTH * 0.9);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
  }

  function drawMenuBackground(ctx) {
    const time = Date.now() / 1000;

    // Rich gradient base
    const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
    gradient.addColorStop(0, '#0a0a2a');
    gradient.addColorStop(0.3, '#1a0a4a');
    gradient.addColorStop(0.7, '#2a0a3a');
    gradient.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    // Animated nebula clouds using radial gradients
    for (let nebula = 0; nebula < 3; nebula++) {
      const cloudX = CANVAS_WIDTH / 2 + Math.sin(time * 0.2 + nebula) * 50;
      const cloudY = CANVAS_HEIGHT / 2 + Math.cos(time * 0.15 + nebula * 1.5) * 80;
      const scale = 100 + nebula * 40;

      const nebGrad = ctx.createRadialGradient(cloudX, cloudY, 0, cloudX, cloudY, scale);
      const colors = [
        ['rgba(100, 50, 150, 0.2)', 'rgba(100, 100, 255, 0.15)'],
        ['rgba(150, 50, 100, 0.15)', 'rgba(200, 100, 150, 0.1)'],
        ['rgba(50, 100, 150, 0.1)', 'rgba(100, 150, 200, 0.08)']
      ];
      nebGrad.addColorStop(0, colors[nebula][0]);
      nebGrad.addColorStop(1, colors[nebula][1]);
      ctx.fillStyle = nebGrad;
      ctx.beginPath();
      ctx.arc(cloudX, cloudY, scale, 0, Math.PI * 2);
      ctx.fill();
    }

    // Drifting particles
    for (let i = 0; i < 50; i++) {
      const seed = Math.sin(i * 12.9898) * 43758.5453;
      const x = ((seed - Math.floor(seed)) * CANVAS_WIDTH + time * 5) % CANVAS_WIDTH;
      const y = ((seed * 78.233 - Math.floor(seed * 78.233)) * CANVAS_HEIGHT + time * 10) % CANVAS_HEIGHT;
      const size = Math.max(0.5, (seed * 0.8) % 1.5);
      const opacity = 0.2 + (seed * 0.3) % 0.3;

      ctx.fillStyle = `rgba(100, 150, 255, ${opacity})`;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Rotating star field
    for (let i = 0; i < 200; i++) {
      const angle = (time * 0.05 + i * 0.1) % (Math.PI * 2);
      const radiusBase = 80 + i * 1.5;
      const radius = radiusBase + Math.sin(time * 0.1 + i * 0.05) * 20;
      const x = CANVAS_WIDTH / 2 + Math.cos(angle) * radius;
      const y = CANVAS_HEIGHT / 2 + Math.sin(angle) * radius;

      const brightness = Math.sin(time * 0.2 + i * 0.05) * 0.5 + 0.5;
      const opacity = Math.max(0.02, brightness * (0.15 - i * 0.00035));
      ctx.fillStyle = `rgba(100, 150, 255, ${opacity})`;
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw animated stars layer
    drawStars(ctx);
  }

  function drawMenu(ctx) {
    drawMenuBackground(ctx);

    const time = Date.now() * 0.003;
    const title = 'VOID RIFT';

    // Animated title with per-letter glow
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const charWidth = ctx.measureText('M').width;
    let xOffset = CANVAS_WIDTH / 2 - (title.length * charWidth) / 2;

    for (let i = 0; i < title.length; i++) {
      const char = title[i];
      const letterGlow = Math.sin(time + i * 0.5) * 0.5 + 0.5;
      const yBob = Math.sin(time * 1.5 + i * 0.3) * 3;

      // Color cycling per letter
      let color;
      const huePhase = (time + i * 0.15) % 1;
      if (huePhase < 0.33) {
        color = `rgba(0, 255, 100, ${letterGlow * 0.8 + 0.2})`;
      } else if (huePhase < 0.66) {
        color = `rgba(0, 150, 255, ${letterGlow * 0.8 + 0.2})`;
      } else {
        color = `rgba(150, 0, 255, ${letterGlow * 0.8 + 0.2})`;
      }

      ctx.fillStyle = color;
      ctx.shadowBlur = 8 + letterGlow * 12;
      ctx.shadowColor = color;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.fillText(char, xOffset + i * charWidth, 15 + yBob);
    }
    ctx.shadowBlur = 0;

    // Subtitle "ULTRA DELUXE"
    ctx.font = 'bold 12px Arial';
    ctx.fillStyle = '#ffff00';
    ctx.shadowBlur = 4;
    ctx.shadowColor = '#ffff00';

  function handleMenuClick(x, y) {
    if (screen === 'main') {
      const btnY1 = 160, btnY2 = 210, btnY3 = 260, btnY4 = 310, btnY5 = 360;
      const btnW = 130, btnH = 35;

      if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY1) < btnH / 2) {
        startGame();
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY2) < btnH / 2) {
        screen = 'daily';
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY3) < btnH / 2) {
        screen = 'ships';
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY4) < btnH / 2) {
        screen = 'achievements';
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - btnY5) < btnH / 2) {
        gameState = 'shop';
      }
    } else if (screen === 'ships') {
      const btnW = 100, btnH = 30;
      if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - (CANVAS_HEIGHT - 50)) < btnH / 2) {
        screen = 'main';
      } else {
        const shipW = 100, shipH = 80;
        const cols = 2;
        for (let i = 0; i < SHIPS.length; i++) {
          const ship = SHIPS[i];
          const row = Math.floor(i / cols);
          const col = i % cols;
          const sx = 50 + col * 185;
          const sy = 80 + row * 135;

          if (Math.abs(x - sx) < shipW / 2 && Math.abs(y - sy) < shipH / 2) {
            if (ship.unlocked) {
              selectedShipIndex = i;
              savePersistentData();
            } else if (gold >= ship.cost) {
              gold -= ship.cost;
              ship.unlocked = true;
              selectedShipIndex = i;
              savePersistentData();
            }
          }
        }
      }
    } else if (screen === 'achievements') {
      const btnW = 100, btnH = 30;
      if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - (CANVAS_HEIGHT - 50)) < btnH / 2) {
        screen = 'main';
      }
    } else if (screen === 'daily') {
      const btnW1 = 140, btnH1 = 35;
      const btnW2 = 100, btnH2 = 30;
      if (Math.abs(x - CANVAS_WIDTH / 2) < btnW1 / 2 && Math.abs(y - 250) < btnH1 / 2) {
        startGameWithDaily();
      } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW2 / 2 && Math.abs(y - (CANVAS_HEIGHT - 50)) < btnH2 / 2) {
        screen = 'main';
      }
    }
  }

  function handleDeadClick(x, y) {
    const btnW = 120, btnH = 35;
    if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - (CANVAS_HEIGHT - 120)) < btnH / 2) {
      gameState = 'menu';
      screen = 'main';
    } else if (Math.abs(x - CANVAS_WIDTH / 2) < btnW / 2 && Math.abs(y - (CANVAS_HEIGHT - 60)) < btnH / 2) {
      startGame();
    }
  }

  // ============================================================================
  // RENDERING
  // ============================================================================
  // BOSS HP BAR
  function drawBossBar(ctx) {
    const boss = enemies.find(e => e.type === 'boss');
    if (!boss) return;
    const barW = CANVAS_WIDTH - 60;
    const barH = 8;
    const barX = 30;
    const barY = 92;
    const hpPct = Math.max(0, boss.hp / boss.maxHp);

    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);

    const g = ctx.createLinearGradient(barX, barY, barX + barW * hpPct, barY);
    g.addColorStop(0, hpPct < 0.25 ? '#ff0000' : '#ff6600');
    g.addColorStop(1, hpPct < 0.25 ? '#ff4400' : '#ffff00');
    ctx.fillStyle = g;
    ctx.fillRect(barX, barY, barW * hpPct, barH);

    if (hpPct < 0.25) {
      ctx.fillStyle = `rgba(255,0,0,${Math.sin(Date.now() * 0.01) * 0.3 + 0.3})`;
      ctx.fillRect(barX, barY, barW * hpPct, barH);
    }

    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    const biome = getCurrentBiome();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 9px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(biome.name + ' BOSS', CANVAS_WIDTH / 2, barY - 3);
  }

  // WEAPON SELECTOR UI
  function drawWeaponUI(ctx) {
    const weaponNames = ['blaster', 'laser', 'missiles'];
    const labels = ['BLS', 'LSR', 'MSL'];
    const colors = ['#00ff00', '#00ffff', '#ffff00'];
    const y = CANVAS_HEIGHT - 30;
    const w = 60;
    const gap = 10;
    const startX = CANVAS_WIDTH / 2 - (w * 3 + gap * 2) / 2;

    for (let i = 0; i < 3; i++) {
      const x = startX + i * (w + gap);
      const active = player.weapon === weaponNames[i];

      ctx.fillStyle = active ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.4)';
      ctx.fillRect(x, y, w, 22);

      if (active) {
        ctx.shadowBlur = 8;
        ctx.shadowColor = colors[i];
        ctx.strokeStyle = colors[i];
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, 22);
        ctx.shadowBlur = 0;
      } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, w, 22);
      }

      ctx.fillStyle = active ? colors[i] : '#888888';
      ctx.font = active ? 'bold 10px Arial' : '9px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(labels[i], x + w / 2, y + 8);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '7px Arial';
      ctx.fillText(String(i + 1), x + w / 2, y + 18);
    }
