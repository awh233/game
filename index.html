<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA BREACH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #000;
            width: 100vw;
            height: 100vh;
            max-width: 420px;
            max-height: 750px;
            image-rendering: auto;
        }
        #errorOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: #f00;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 18px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="errorOverlay"></div>
    <script>
'use strict';

(() => {
    // ============================================================================
    // NOVA BREACH - VISUAL OVERHAUL v8.0
    // ============================================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: true, willReadFrequently: false });
    const VIRTUAL_WIDTH = 420;
    const VIRTUAL_HEIGHT = 750;
    let dpr = window.devicePixelRatio || 1;

    function resizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = VIRTUAL_WIDTH * dpr;
        canvas.height = VIRTUAL_HEIGHT * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================================================
    // CONSTANTS & STATE
    // ============================================================================
    const FIXED_DT = 1000 / 60;
    const dt = FIXED_DT / 1000;
    const SAVE_KEY = 'void_rift_save';
    const VERSION = 'v8.0';

    // Array capacity limits to prevent performance degradation
    const MAX_BULLETS = 150;
    const MAX_PARTICLES = 200;
    const MAX_EXPLOSIONS = 20;
    const MAX_MUZZLE_FLASHES = 10;
    const MAX_DAMAGE_NUMBERS = 30;

    let gameState = {
        mode: 'menu',
        wave: 1,
        score: 0,
        combo: 0,
        comboTimer: 0,
        kills: 0,
        xp: 0,
        xpMax: 100,
        health: 100,
        maxHealth: 100,
        selectedShip: 'viper',
        difficulty: 1,
        screenShake: 0,
        screenShakeRotation: 0,
        screenFlash: 0,
        screenFlashColor: '#fff',
        invulnTimer: 0,
        dashCooldown: 0,
        deaths: 0,
        totalKills: 0,
        gold: 0,
        playStreak: 0,
        lastPlayDate: null,
        achievements: {},
        dailyChallenge: '',
        prestigeLevel: 0,
        upgradeChoices: [],
        selectedUpgradeIdx: 0,
        messageTimer: 0,
        messageText: '',
        waves: [],
        numEnemies: 0,
        isDailyMode: false,
        scoreMultiplier: 1,
        killStreak: 0,
        lastKillTime: 0,
        hitStopFrames: 0,
        slowMotionTimer: 0,
        slowMotionSpeed: 1,
        cameraX: 0,
        cameraY: 0,
        chromaAberrationTimer: 0,
        showFPS: false,
        showTutorial: false,
        waveTransitionTimer: 0,
        waveTransitionText: '',
        deathStats: null,
        timeSurvived: 0,
        audioInitialized: false,
    };

    let player = null;
    let bullets = [];
    let enemies = [];
    let explosions = [];
    let particles = [];
    let pickups = [];
    let scorePopups = [];
    let damageNumbers = [];
    let killFeed = [];
    let stars = [];
    let nebulaClouds = [];
    let dustParticles = [];
    let titleParticles = [];
    let muzzleFlashes = [];

    let touchX = null;
    let touchY = null;
    let keys = {};
    let mouseDown = false;
    let touchActive = false;

    let audioContext = null;
    let masterVolume = 0.3;
    let musicOscillators = [];
    let musicGains = [];
    let musicDucking = 1;

    const SHIP_STATS = {
        viper: { hp: 100, speed: 240, fireRate: 3.5, damage: 3, magnet: 100, name: 'VIPER' },
        phantom: { hp: 60, speed: 320, fireRate: 4, damage: 2.5, magnet: 100, name: 'PHANTOM' },
        titan: { hp: 150, speed: 180, fireRate: 2, damage: 5, magnet: 100, name: 'TITAN' },
        spectre: { hp: 90, speed: 250, fireRate: 3, damage: 3.5, magnet: 180, name: 'SPECTRE' },
    };

    const ENEMIES = {
        drone: { hp: 30, speed: 100, score: 50, size: 8, color: '#ff3333', fireRate: 0.5, pattern: 'straight' },
        scout: { hp: 25, speed: 200, score: 75, size: 10, color: '#ff8833', fireRate: 0.3, pattern: 'straight' },
        tank: { hp: 100, speed: 60, score: 200, size: 16, color: '#00ff44', fireRate: 0.7, pattern: 'straight' },
        shooter: { hp: 60, speed: 140, score: 150, size: 12, color: '#ffff44', fireRate: 1.5, pattern: 'straight' },
        bomber: { hp: 120, speed: 80, score: 250, size: 14, color: '#ff00ff', fireRate: 0.8, pattern: 'straight' },
        zigzag: { hp: 50, speed: 150, score: 120, size: 10, color: '#ff6600', fireRate: 0.6, pattern: 'zigzag' },
        spiral: { hp: 70, speed: 120, score: 140, size: 11, color: '#6600ff', fireRate: 0.8, pattern: 'spiral' },
        formation: { hp: 35, speed: 130, score: 100, size: 8, color: '#00ffff', fireRate: 0.4, pattern: 'formation' },
        boss: { hp: 800, speed: 80, score: 2000, size: 40, color: '#0ff', fireRate: 2, pattern: 'boss' },
    };

    const ACHIEVEMENTS = {
        first_blood: { name: 'First Blood', desc: 'Kill your first enemy' },
        combo_king: { name: 'Combo King', desc: 'Get a 10x combo' },
        boss_slayer: { name: 'Boss Slayer', desc: 'Defeat a boss' },
        wave_10: { name: 'Wave Master', desc: 'Reach wave 10' },
        unstoppable: { name: 'Unstoppable', desc: 'Get a 50x combo' },
        gold_rush: { name: 'Gold Rush', desc: 'Collect 1000 gold' },
        speed_demon: { name: 'Speed Demon', desc: 'Travel 50000 units' },
        pacifist: { name: 'Pacifist', desc: 'Complete a wave without shooting' },
        glass_cannon: { name: 'Glass Cannon', desc: 'Deal 10000 damage in one game' },
        collector: { name: 'Collector', desc: 'Collect 100 pickups in one game' },
        max_level: { name: 'Max Level', desc: 'Reach upgrade level 20' },
        millionaire: { name: 'Millionaire', desc: 'Accumulate 10000 gold lifetime' },
    };

    const POWERUP_TYPES = {
        rapidfire: { name: 'Rapid Fire', duration: 5, color: '#ff3333', icon: '>' },
        tripleshot: { name: 'Triple Shot', duration: 5, color: '#ffff44', icon: '≡' },
        invincible: { name: 'Invincibility', duration: 3, color: '#ff00ff', icon: '◆' },
        magnet: { name: 'Magnet Boost', duration: 10, color: '#00ffff', icon: 'O' },
        scoremulti: { name: 'Score Multiplier', duration: 8, color: '#ff8800', icon: '×' },
    };

    const KILL_STREAK_MESSAGES = {
        2: 'DOUBLE KILL',
        3: 'TRIPLE KILL',
        4: 'QUAD KILL',
        5: 'RAMPAGE',
        7: 'UNSTOPPABLE',
        10: 'GODLIKE',
    };

    // ============================================================================
    // HELPERS
    // ============================================================================

    function clamp(v, min, max) {
        return Math.min(Math.max(v, min), max);
    }

    function distance(x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function colorAlpha(color, alpha) {
        if (!color || typeof color !== 'string') {
            return `rgba(255,255,255,${alpha})`;
        }
        if (color.startsWith('#')) {
            let hex = color.replace('#', '');
            if (hex.length === 3) {
                hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
            }
            if (hex.length !== 6) {
                return `rgba(255,255,255,${alpha})`;
            }
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        } else if (color.startsWith('rgba')) {
            return color.replace(/[\d.]+\)$/, `${alpha})`);
        } else if (color.startsWith('rgb')) {
            return color.replace('rgb', 'rgba').replace(')', `, ${alpha})`);
        }
        return `rgba(255,255,255,${alpha})`;
    }

    function rrPath(x, y, w, h, r) {
        const path = new Path2D();
        r = Math.min(r, w / 2, h / 2);
        path.moveTo(x + r, y);
        path.lineTo(x + w - r, y);
        path.arcTo(x + w, y, x + w, y + r, r);
        path.lineTo(x + w, y + h - r);
        path.arcTo(x + w, y + h, x + w - r, y + h, r);
        path.lineTo(x + r, y + h);
        path.arcTo(x, y + h, x, y + h - r, r);
        path.lineTo(x, y + r);
        path.arcTo(x, y, x + r, y, r);
        path.closePath();
        return path;
    }

    function getDailyChallenge() {
        const challenges = ['double_time', 'no_dash', 'one_life', 'boss_rush', 'rapid_fire', 'double_gold', 'slow_mo', 'magnet'];
        const dateStr = new Date().toISOString().split('T')[0];
        const hash = dateStr.split('').reduce((a, c) => ((a << 5) - a) + c.charCodeAt(0), 0);
        return challenges[Math.abs(hash) % challenges.length];
    }

    function savePersistentData() {
        const data = {
            gold: gameState.gold,
            deaths: gameState.deaths,
            totalKills: gameState.totalKills,
            playStreak: gameState.playStreak,
            lastPlayDate: gameState.lastPlayDate,
            achievements: gameState.achievements,
            prestigeLevel: gameState.prestigeLevel,
            highScore: window.highScore || 0,
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    }

    function loadPersistentData() {
        const data = localStorage.getItem(SAVE_KEY);
        if (data) {
            try {
                const saved = JSON.parse(data);
                gameState.gold = saved.gold || 0;
                gameState.deaths = saved.deaths || 0;
                gameState.totalKills = saved.totalKills || 0;
                gameState.playStreak = saved.playStreak || 0;
                gameState.lastPlayDate = saved.lastPlayDate;
                gameState.achievements = saved.achievements || {};
                gameState.prestigeLevel = saved.prestigeLevel || 0;
                window.highScore = saved.highScore || 0;

                const today = new Date().toISOString().split('T')[0];
                const lastDay = saved.lastPlayDate ? saved.lastPlayDate.split('T')[0] : null;
                if (lastDay && lastDay !== today) {
                    gameState.playStreak++;
                } else if (!lastDay) {
                    gameState.playStreak = 1;
                }
                gameState.lastPlayDate = new Date().toISOString();
            } catch (e) {
                console.error('Failed to load save:', e);
            }
        }
        window.highScore = window.highScore || 0;
        gameState.dailyChallenge = getDailyChallenge();
        gameState.showTutorial = !localStorage.getItem('nova_breach_tutorial_seen');
    }

    function declareAchievement(id) {
        if (!gameState.achievements[id]) {
            gameState.achievements[id] = true;
            savePersistentData();
            showToast(`Achievement Unlocked: ${ACHIEVEMENTS[id].name}`);
        }
    }

    function showToast(text) {
        gameState.messageText = text;
        gameState.messageTimer = 180;
    }

    // ============================================================================
    // AUDIO - WEB AUDIO API
    // ============================================================================

    function initAudio() {
        if (gameState.audioInitialized) return;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            gameState.audioInitialized = true;
            startBackgroundMusic();
        } catch (e) {
            console.warn('Web Audio API not supported');
        }
    }

    function startBackgroundMusic() {
        if (!audioContext || audioContext.state !== 'running') return;
        try {
            const masterGain = audioContext.createGain();
            masterGain.connect(audioContext.destination);
            masterGain.gain.setValueAtTime(masterVolume * 0.4, audioContext.currentTime);

            const bassOsc = audioContext.createOscillator();
            const bassGain = audioContext.createGain();
            bassOsc.type = 'sawtooth';
            bassOsc.frequency.setValueAtTime(55, audioContext.currentTime);
            bassGain.gain.setValueAtTime(0.3, audioContext.currentTime);
            bassOsc.connect(bassGain);
            bassGain.connect(masterGain);

            const arpeggio = audioContext.createOscillator();
            const arpeggioGain = audioContext.createGain();
            arpeggio.type = 'triangle';
            arpeggio.frequency.setValueAtTime(220, audioContext.currentTime);
            arpeggioGain.gain.setValueAtTime(0.2, audioContext.currentTime);
            arpeggio.connect(arpeggioGain);
            arpeggioGain.connect(masterGain);

            const pad = audioContext.createOscillator();
            const padGain = audioContext.createGain();
            pad.type = 'sine';
            pad.frequency.setValueAtTime(110, audioContext.currentTime);
            padGain.gain.setValueAtTime(0.15, audioContext.currentTime);
            pad.connect(padGain);
            padGain.connect(masterGain);

            bassOsc.start();
            arpeggio.start();
            pad.start();

            musicOscillators = [bassOsc, arpeggio, pad];
            musicGains = [masterGain, bassGain, arpeggioGain, padGain];
        } catch (e) {
            console.warn('Failed to start background music');
        }
    }

    function stopBackgroundMusic() {
        try {
            musicOscillators.forEach(osc => osc.stop());
            musicOscillators = [];
            musicGains = [];
        } catch (e) {}
    }

    function playSound(type, freq = 400, duration = 0.1) {
        if (!audioContext || audioContext.state !== 'running') return;
        try {
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            gain.gain.setValueAtTime(masterVolume * 0.7 * musicDucking, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            if (type === 'shoot') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.6, now + duration);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq + Math.random() * 100, now);
            } else if (type === 'kill') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq * 1.5, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.3, now + duration);
            } else if (type === 'pickup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq * 1.2, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.8, now + duration);
            } else if (type === 'explosion') {
                const noise = audioContext.createBufferSource();
                const buffer = audioContext.createBuffer(1, audioContext.sampleRate * duration, audioContext.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                noise.connect(gain);
                noise.start(now);
                noise.stop(now + duration * 0.5);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq * 0.8, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.1, now + duration);
            }

            osc.start(now);
            osc.stop(now + duration);
        } catch (e) {}
    }

    // ============================================================================
    // PLAYER CLASS
    // ============================================================================

    class Player {
        constructor(ship) {
            const stats = SHIP_STATS[ship];
            this.ship = ship;
            this.x = VIRTUAL_WIDTH / 2;
            this.y = VIRTUAL_HEIGHT - 80;
            this.vx = 0;
            this.vy = 0;
            this.speed = stats.speed;
            this.fireRate = stats.fireRate;
            this.fireCooldown = 0;
            this.weapon = 0;
            this.damage = stats.damage;
            this.hp = stats.hp;
            this.maxHp = stats.hp;
            this.magnet = stats.magnet;
            this.shieldEnergy = 0;
            this.shieldMax = 100;
            this.shield = false;
            this.invulnTimer = 0;
            this.dashCooldown = 0;
            this.dashEnergy = 100;
            this.dashMax = 100;
            this.upgrades = {
                maxHp: 0,
                fireRate: 0,
                speed: 0,
                damage: 0,
                magnet: 0,
                pierce: 0,
                rearGun: false,
                sideGuns: false,
                shieldRegen: 0,
                xpRange: 0,
            };
            this.distanceTraveled = 0;
            this.damageDealt = 0;
            this.pickupsCollected = 0;
            this.shieldAngle = 0;
            this.shipColor = { viper: '#00ffff', phantom: '#ff00ff', titan: '#ffff00', spectre: '#00ff88' }[ship] || '#0f0';
            this.shipAccent = { viper: '#0088ff', phantom: '#ff0088', titan: '#ff8800', spectre: '#0088ff' }[ship] || '#00aa00';
            this.activePowerups = {};
            this.powerupTimers = {};
            this.trailParticles = [];
            this.engineFlamePhase = 0;
            this.cockpitScanPhase = 0;
        }

        update(keys, touchX, touchY, gameState) {
            this.fireCooldown = Math.max(0, this.fireCooldown - dt);
            this.invulnTimer = Math.max(0, this.invulnTimer - dt);
            this.dashCooldown = Math.max(0, this.dashCooldown - dt);
            this.shieldEnergy = Math.min(this.shieldMax, this.shieldEnergy + 5 * dt);
            this.engineFlamePhase += dt;
            this.cockpitScanPhase += dt;

            for (let key in this.powerupTimers) {
                this.powerupTimers[key] -= dt;
                if (this.powerupTimers[key] <= 0) {
                    delete this.activePowerups[key];
                    delete this.powerupTimers[key];
                }
            }

            let ax = 0, ay = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) ax -= 1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) ax += 1;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) ay -= 1;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) ay += 1;

            if (touchX !== null && touchY !== null) {
                const dx = touchX - this.x;
                const dy = touchY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 20) {
                    ax = dx / Math.max(dist, 0.1);
                    ay = dy / Math.max(dist, 0.1);
                }
            }

            const mag = Math.sqrt(ax * ax + ay * ay);
            if (mag > 0) {
                ax /= mag;
                ay /= mag;
                this.vx = ax * this.speed * (1 + 0.5 * this.upgrades.speed);
                this.vy = ay * this.speed * (1 + 0.5 * this.upgrades.speed);
            } else {
                this.vx *= 0.85;
                this.vy *= 0.85;
            }

            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.x = clamp(this.x, 15, VIRTUAL_WIDTH - 15);
            this.y = clamp(this.y, 15, VIRTUAL_HEIGHT - 15);

            const prevX = this.x - this.vx * dt;
            const prevY = this.y - this.vy * dt;
            this.distanceTraveled += distance(prevX, prevY, this.x, this.y);

            if (keys[' '] && this.dashCooldown <= 0 && this.dashEnergy > 30) {
                this.dashEnergy -= 30;
                this.dashCooldown = 0.5;
                this.vx *= 2.5;
                this.vy *= 2.5;
                for (let i = 0; i < 12; i++) {
                    particles.push({
                        x: this.x + (Math.random() - 0.5) * 20,
                        y: this.y + (Math.random() - 0.5) * 20,
                        vx: (Math.random() - 0.5) * 300,
                        vy: (Math.random() - 0.5) * 300,
                        life: 0.3,
                        color: '#0ff',
                        size: Math.random() * 4 + 2,
                    });
                }
            }
            this.dashEnergy = Math.min(this.dashMax, this.dashEnergy + 30 * dt);
        }

        fire() {
            if (this.fireCooldown > 0) return;

            let fireRateMult = 1 + 0.3 * this.upgrades.fireRate;
            if (this.activePowerups.rapidfire) {
                fireRateMult *= 2;
            }

            this.fireCooldown = 1 / (this.fireRate * fireRateMult);

            const speed = 400;
            const damage = this.damage * (1 + 0.2 * this.upgrades.damage);

            const createBullet = (x, y, vx, vy, dmg) => ({
                x, y, vx, vy,
                life: 3,
                type: 'blaster',
                damage: dmg,
                piercing: this.upgrades.pierce,
                color: '#0f0',
                size: 7,
            });

            if (this.weapon === 0) {
                if (this.activePowerups.tripleshot) {
                    bullets.push(createBullet(this.x - 8, this.y - 15, -speed * 0.2, -speed * 0.97, damage));
                    bullets.push(createBullet(this.x, this.y - 15, 0, -speed, damage));
                    bullets.push(createBullet(this.x + 8, this.y - 15, speed * 0.2, -speed * 0.97, damage));
                } else {
                    bullets.push(createBullet(this.x, this.y - 15, 0, -speed, damage));

                    if (this.upgrades.sideGuns) {
                        bullets.push(createBullet(this.x - 10, this.y, -speed * 0.3, -speed * 0.95, damage * 0.6));
                        bullets.push(createBullet(this.x + 10, this.y, speed * 0.3, -speed * 0.95, damage * 0.6));
                    }
                    if (this.upgrades.rearGun) {
                        bullets.push(createBullet(this.x, this.y + 15, 0, speed * 0.5, damage * 0.5));
                    }
                }

                muzzleFlashes.push({
                    x: this.x,
                    y: this.y - 15,
                    life: 0.05,
                    size: 8,
                });

                playSound('shoot', 300 + Math.random() * 100, 0.08);
                gameState.screenShake = Math.max(gameState.screenShake, 0.05);
            } else if (this.weapon === 1) {
                bullets.push({
                    x: this.x,
                    y: this.y - 15,
                    vx: 0,
                    vy: -speed * 1.2,
                    life: 3,
                    type: 'laser',
                    damage: damage * 0.8,
                    piercing: this.upgrades.pierce + 1,
                    color: '#ff0',
                    size: 3,
                });
                playSound('shoot', 250 + Math.random() * 100, 0.1);
            } else if (this.weapon === 2) {
                bullets.push({
                    x: this.x,
                    y: this.y - 15,
                    vx: 0,
                    vy: -speed * 0.8,
                    life: 3,
                    type: 'missile',
                    damage: damage * 1.5,
                    piercing: this.upgrades.pierce,
                    color: '#f00',
                    size: 6,
                });
                playSound('shoot', 200 + Math.random() * 100, 0.12);
            }
        }

        activatePowerup(type, duration) {
            this.activePowerups[type] = true;
            this.powerupTimers[type] = duration;
        }

        draw(ctx) {
            try {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Trail effect
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 100) {
                    for (let i = 0; i < 3; i++) {
                        if (particles.length < MAX_PARTICLES) {
                            particles.push({
                                x: this.x + (Math.random() - 0.5) * 10,
                                y: this.y + (Math.random() - 0.5) * 10,
                                vx: (Math.random() - 0.5) * 60,
                                vy: (Math.random() - 0.5) * 60,
                                life: 0.2,
                                color: this.shipColor,
                                size: 2.5,
                            });
                        }
                    }
                }

                // Invulnerability: pulsing rainbow aura
                if (this.invulnTimer > 0) {
                    const pulse = 0.4 + Math.sin(Date.now() * 0.01) * 0.3;
                    const colors = ['#ff0000', '#ff7700', '#ffff00', '#00ff00', '#0000ff', '#ff00ff'];

                    for (let i = 0; i < 6; i++) {
                        ctx.strokeStyle = colorAlpha(colors[i], pulse * 0.4);
                        ctx.lineWidth = 2 + i * 0.5;
                        ctx.beginPath();
                        ctx.arc(0, 0, 20 + i * 3, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                // Engine exhaust - ENHANCED WITH MULTIPLE FLAME LAYERS
                const t = Date.now() * 0.001;
                const flameBase = 14 + Math.sin(t * 6) * 5;
                const flameMid = 10 + Math.sin(t * 5 + 0.5) * 4;

                // LEFT ENGINE - triple layer
                for (let layer = 0; layer < 3; layer++) {
                    const leftFlame = ctx.createLinearGradient(-6, 8, -6, 8 + flameBase * (1 - layer * 0.2));
                    const colors = [
                        ['rgba(255, 200, 100, 0.8)', 'rgba(255, 100, 50, 0.5)', 'rgba(255, 50, 0, 0)'],
                        ['rgba(255, 150, 50, 0.6)', 'rgba(255, 80, 20, 0.3)', 'rgba(255, 30, 0, 0)'],
                        ['rgba(200, 100, 0, 0.4)', 'rgba(150, 50, 0, 0.2)', 'rgba(100, 0, 0, 0)']
                    ];
                    leftFlame.addColorStop(0, colors[layer][0]);
                    leftFlame.addColorStop(0.5, colors[layer][1]);
                    leftFlame.addColorStop(1, colors[layer][2]);
                    ctx.fillStyle = leftFlame;
                    ctx.beginPath();
                    ctx.moveTo(-8 + layer, 8);
                    ctx.lineTo(-4 - layer, 8);
                    ctx.lineTo(-5 + Math.sin(t * 7) * 1.5 + layer * 0.5, 8 + flameBase * (1 - layer * 0.15));
                    ctx.lineTo(-7 + Math.sin(t * 6.5) * 1.5 - layer * 0.5, 8 + flameBase * (1 - layer * 0.15));
                    ctx.closePath();
                    ctx.fill();
                }

                // RIGHT ENGINE - triple layer
                for (let layer = 0; layer < 3; layer++) {
                    const rightFlame = ctx.createLinearGradient(6, 8, 6, 8 + flameBase * (1 - layer * 0.2));
                    const colors = [
                        ['rgba(255, 200, 100, 0.8)', 'rgba(255, 100, 50, 0.5)', 'rgba(255, 50, 0, 0)'],
                        ['rgba(255, 150, 50, 0.6)', 'rgba(255, 80, 20, 0.3)', 'rgba(255, 30, 0, 0)'],
                        ['rgba(200, 100, 0, 0.4)', 'rgba(150, 50, 0, 0.2)', 'rgba(100, 0, 0, 0)']
                    ];
                    rightFlame.addColorStop(0, colors[layer][0]);
                    rightFlame.addColorStop(0.5, colors[layer][1]);
                    rightFlame.addColorStop(1, colors[layer][2]);
                    ctx.fillStyle = rightFlame;
                    ctx.beginPath();
                    ctx.moveTo(4 - layer, 8);
                    ctx.lineTo(8 + layer, 8);
                    ctx.lineTo(7 + Math.sin(t * 7 + 0.2) * 1.5 - layer * 0.5, 8 + flameBase * (1 - layer * 0.15));
                    ctx.lineTo(5 + Math.sin(t * 6.5 + 0.2) * 1.5 + layer * 0.5, 8 + flameBase * (1 - layer * 0.15));
                    ctx.closePath();
                    ctx.fill();
                }

                // CENTER AFTERBURNER - enhanced blue flame
                if (speed > 150) {
                    for (let layer = 0; layer < 2; layer++) {
                        const afterburner = ctx.createLinearGradient(0, 10, 0, 10 + flameBase * 1.5 * (1 - layer * 0.3));
                        afterburner.addColorStop(0, 'rgba(100, 150, 255, 0.7)');
                        afterburner.addColorStop(0.4, 'rgba(50, 100, 200, 0.4)');
                        afterburner.addColorStop(1, 'rgba(0, 50, 150, 0)');
                        ctx.fillStyle = afterburner;
                        ctx.beginPath();
                        ctx.moveTo(-2 - layer, 10);
                        ctx.lineTo(2 + layer, 10);
                        ctx.lineTo(1 + Math.sin(t * 8) * 1.2, 10 + flameBase * 1.5 * (1 - layer * 0.2));
                        ctx.lineTo(-1 + Math.sin(t * 7.5) * 1.2, 10 + flameBase * 1.5 * (1 - layer * 0.2));
                        ctx.closePath();
                        ctx.fill();
                    }
                }

                // HULL - 4 LAYER GRADIENT FOR PREMIUM LOOK
                const outerHull = ctx.createLinearGradient(-10, -12, 10, 14);
                outerHull.addColorStop(0, colorAlpha(this.shipColor, 0.95));
                outerHull.addColorStop(0.3, colorAlpha(this.shipAccent, 0.8));
                outerHull.addColorStop(0.7, colorAlpha(this.shipColor, 0.6));
                outerHull.addColorStop(1, colorAlpha(this.shipColor, 0.3));
                ctx.fillStyle = outerHull;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(-10, 12);
                ctx.lineTo(0, 8);
                ctx.lineTo(10, 12);
                ctx.closePath();
                ctx.fill();

                // Inner hull highlight with layered detail
                ctx.fillStyle = colorAlpha(this.shipAccent, 0.7);
                ctx.beginPath();
                ctx.moveTo(0, -8);
                ctx.lineTo(-8, 10);
                ctx.lineTo(0, 6);
                ctx.lineTo(8, 10);
                ctx.closePath();
                ctx.fill();

                // Mid-layer detail
                ctx.fillStyle = colorAlpha('#ffffff', 0.5);
                ctx.beginPath();
                ctx.moveTo(0, -6);
                ctx.lineTo(-6, 9);
                ctx.lineTo(0, 5);
                ctx.lineTo(6, 9);
                ctx.closePath();
                ctx.fill();

                // Core layer with bright center
                ctx.fillStyle = colorAlpha('#ffffff', 0.6);
                ctx.beginPath();
                ctx.moveTo(0, -4);
                ctx.lineTo(-4, 7);
                ctx.lineTo(0, 4);
                ctx.lineTo(4, 7);
                ctx.closePath();
                ctx.fill();

                // COCKPIT WITH ENHANCED SCANNING DETAIL
                // Main cockpit glass
                ctx.fillStyle = colorAlpha('#ffff00', 0.95);
                ctx.beginPath();
                ctx.arc(0, -2, 4.5, 0, Math.PI * 2);
                ctx.fill();

                // Cockpit rim
                ctx.strokeStyle = colorAlpha(this.shipColor, 0.8);
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, -2, 4.5, 0, Math.PI * 2);
                ctx.stroke();

                // Inner glass with reflection
                ctx.fillStyle = colorAlpha('#ffffff', 0.6);
                ctx.beginPath();
                ctx.arc(0, -3, 2, 0, Math.PI * 2);
                ctx.fill();

                // Scanning line animation with glow
                const scanY = -6 + Math.sin(this.cockpitScanPhase * 5) * 4;
                ctx.strokeStyle = colorAlpha('#0f0', 0.8);
                ctx.lineWidth = 1;
                ctx.shadowColor = '#0f0';
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.moveTo(-3.5, scanY);
                ctx.lineTo(3.5, scanY);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // WING RUNNING LIGHTS - with glow effects
                const wingGlowL = 0.6 + Math.sin(Date.now() * 0.006) * 0.4;
                const wingGlowR = 0.6 + Math.sin(Date.now() * 0.006 + 0.5) * 0.4;

                // Left wing light
                ctx.fillStyle = colorAlpha('#00ffff', wingGlowL);
                ctx.beginPath();
                ctx.arc(-9, 0, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = colorAlpha('#00ffff', wingGlowL * 0.6);
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(-9, 0, 3.5, 0, Math.PI * 2);
                ctx.stroke();

                // Right wing light
                ctx.fillStyle = colorAlpha('#ff00ff', wingGlowR);
                ctx.beginPath();
                ctx.arc(9, 0, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = colorAlpha('#ff00ff', wingGlowR * 0.6);
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(9, 0, 3.5, 0, Math.PI * 2);
                ctx.stroke();

                // SHIELD - HEXAGONAL GRID WITH ROTATION
                if (this.shieldEnergy > 20) {
                    this.shieldAngle += dt * 0.5;
                    ctx.strokeStyle = colorAlpha(this.shipAccent, 0.5);
                    ctx.lineWidth = 1;
                    
                    // Outer hexagonal shield
                    ctx.save();
                    ctx.rotate(this.shieldAngle);
                    for (let ring = 1; ring <= 2; ring++) {
                        const radius = 15 + ring * 4;
                        ctx.beginPath();
                        for (let i = 0; i < 6; i++) {
                            const angle = (i / 6) * Math.PI * 2;
                            const x = Math.cos(angle) * radius;
                            const y = Math.sin(angle) * radius;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        ctx.stroke();
                    }
                    ctx.restore();

                    // Ripple effect
                    const ripple = (Date.now() * 0.002) % 1;
                    ctx.strokeStyle = colorAlpha(this.shipAccent, 0.3 * (1 - ripple));
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, 15 + ripple * 8, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // ENERGY FIELD GLOW - PULSES WITH FIRE RATE
                const fireGlow = 0.3 + Math.sin(gameState.timeSurvived * gameState.scoreMultiplier * 5) * 0.2;
                ctx.strokeStyle = colorAlpha(this.shipColor, fireGlow);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.stroke();

                // Dash energy indicator
                ctx.fillStyle = colorAlpha('#0ff', 0.4);
                ctx.fillRect(-6, 14, 12, 2);
                ctx.fillStyle = '#0ff';
                ctx.fillRect(-6, 14, (this.dashEnergy / this.dashMax) * 12, 2);

                // Active powerup indicators
                let powerupIdx = 0;
                for (let key in this.activePowerups) {
                    const pt = POWERUP_TYPES[key];
                    if (pt) {
                        ctx.fillStyle = colorAlpha(pt.color, 0.6);
                        ctx.beginPath();
                        ctx.arc(-10 + powerupIdx * 8, -18, 3, 0, Math.PI * 2);
                        ctx.fill();
                        powerupIdx++;
                    }
                }

                ctx.restore();
            } catch (e) {
                console.error('Player draw error:', e);
            }
        }
    }


    // ============================================================================
    // ENEMY CLASS - ENHANCED VISUALS
    // ============================================================================

    class Enemy {
        constructor(type, x, y) {
            const stats = ENEMIES[type];
            this.type = type;
            this.x = x;
            this.y = y;
            this.vx = 0;
            this.vy = stats.speed / 60;
            this.hp = stats.hp;
            this.maxHp = stats.hp;
            this.speed = stats.speed;
            this.fireRate = stats.fireRate;
            this.fireCooldown = Math.random() * (1 / stats.fireRate);
            this.color = stats.color;
            this.size = stats.size;
            this.score = stats.score;
            this.pattern = stats.pattern;
            this.lifetime = 0;
            this.shootCooldown = 0;
            this.warpin = 0.3;
            this.patternPhase = Math.random() * Math.PI * 2;
            this.damageCracks = [];
            this.rotation = 0;
            this.armPhase = 0;
        }

        update(gameState) {
            this.lifetime += dt;
            this.warpin = Math.max(0, this.warpin - dt);
            this.shootCooldown = Math.max(0, this.shootCooldown - dt);
            this.rotation += dt * 2;
            this.armPhase += dt;

            if (this.pattern === 'zigzag') {
                this.vx = Math.sin(this.lifetime * 3) * this.speed * 0.6;
                this.vy = this.speed / 60;
            } else if (this.pattern === 'spiral') {
                const spiralAmount = this.lifetime * 2;
                this.vx = Math.cos(spiralAmount) * this.speed * 0.5;
                this.vy = this.speed / 60 + Math.sin(spiralAmount) * 20;
            } else if (this.pattern === 'formation') {
                this.vx = Math.sin(this.patternPhase + this.lifetime * 2) * 30;
                this.vy = this.speed / 60;
            } else if (this.pattern === 'boss') {
                const phase = this.lifetime % 3;
                if (phase < 1) {
                    this.vx = -this.speed * 0.5;
                } else if (phase < 2) {
                    this.vx = this.speed * 0.5;
                } else {
                    this.vx = 0;
                }
                this.vy = this.speed / 60 * 0.3;
            } else {
                this.vy = this.speed / 60;
            }

            this.x += this.vx * dt;
            this.y += this.vy * dt;

            // Generate damage cracks
            if (this.hp < this.maxHp * 0.7 && Math.random() < 0.05) {
                this.damageCracks.push({
                    x: (Math.random() - 0.5) * this.size,
                    y: (Math.random() - 0.5) * this.size,
                    angle: Math.random() * Math.PI * 2,
                    length: Math.random() * 4 + 2,
                });
            }
        }

        canShoot() {
            if (this.shootCooldown > 0) return false;
            this.shootCooldown = 1 / this.fireRate;
            return true;
        }

        takeDamage(amount) {
            const actualDamage = amount;
            this.hp -= actualDamage;

            const isCrit = Math.random() < 0.15;
            const damageMultiplier = isCrit ? 2.5 : 1;
            const actualDmg = actualDamage * damageMultiplier;
            this.hp -= actualDmg - actualDamage;

            damageNumbers.push({
                x: this.x + (Math.random() - 0.5) * 10,
                y: this.y - 10,
                text: Math.floor(actualDmg),
                life: 0.8,
                color: isCrit ? '#ffff00' : '#ffffff',
            });

            if (isCrit) {
                gameState.screenFlash = 0.15;
                gameState.screenFlashColor = '#ffff00';
            }

            return isCrit;
        }

        draw(ctx) {
            try {
                if (this.warpin > 0) {
                    const warpinAlpha = 1 - (this.warpin / 0.3);
                    ctx.globalAlpha = warpinAlpha;
                    ctx.strokeStyle = '#0ff';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 3; i++) {
                        const angle = (this.warpin * 10 + i * Math.PI * 2 / 3) % (Math.PI * 2);
                        const scale = 1 + warpinAlpha * 0.5;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * scale, angle, angle + Math.PI / 2);
                        ctx.stroke();
                    }
                }
                ctx.globalAlpha = 1;

                ctx.save();
                ctx.translate(this.x, this.y);

                // DAMAGE FLASH - bright white flash on hit
                const damageFlash = this.hp < this.maxHp * 0.95 && Math.random() > 0.88;
                const baseColor = damageFlash ? '#ffffff' : this.color;
                const accentColor = this.color;

                if (this.type === 'drone') {
                    // Sleek arrow with 3 layers
                    const grad1 = ctx.createLinearGradient(-6, -4, 6, 6);
                    grad1.addColorStop(0, accentColor);
                    grad1.addColorStop(0.5, colorAlpha(this.color, 0.7));
                    grad1.addColorStop(1, colorAlpha(this.color, 0.4));
                    ctx.fillStyle = grad1;
                    ctx.beginPath();
                    ctx.moveTo(0, -8);
                    ctx.lineTo(-8, 6);
                    ctx.lineTo(0, 4);
                    ctx.lineTo(8, 6);
                    ctx.closePath();
                    ctx.fill();

                    // Inner bright core
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.moveTo(0, -6);
                    ctx.lineTo(-5, 4);
                    ctx.lineTo(0, 2);
                    ctx.lineTo(5, 4);
                    ctx.closePath();
                    ctx.fill();

                    // Twin engine glows
                    ctx.fillStyle = colorAlpha('#ff6600', 0.8);
                    ctx.beginPath();
                    ctx.arc(-3, 6, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(3, 6, 2, 0, Math.PI * 2);
                    ctx.fill();

                    // Antenna wobble
                    const wobble = Math.sin(this.lifetime * 4) * 1.5;
                    ctx.strokeStyle = colorAlpha(accentColor, 0.7);
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, -8);
                    ctx.lineTo(wobble, -12);
                    ctx.stroke();

                    // Scanning beam
                    ctx.strokeStyle = colorAlpha(accentColor, 0.4);
                    ctx.lineWidth = 0.5;
                    const beamAngle = this.lifetime * 2;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.sin(beamAngle) * 15, Math.cos(beamAngle) * 15);
                    ctx.stroke();

                } else if (this.type === 'scout') {
                    // Fast diamond with speed lines and gyroscope
                    const grad = ctx.createLinearGradient(-6, -6, 6, 6);
                    grad.addColorStop(0, accentColor);
                    grad.addColorStop(1, colorAlpha(this.color, 0.4));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(0, -8);
                    ctx.lineTo(8, 0);
                    ctx.lineTo(0, 8);
                    ctx.lineTo(-8, 0);
                    ctx.closePath();
                    ctx.fill();

                    // Motion blur - speed lines
                    ctx.strokeStyle = colorAlpha(accentColor, 0.3);
                    ctx.lineWidth = 1;
                    for (let i = 1; i <= 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(-8 - i * 2, -2);
                        ctx.lineTo(-8 - i * 2, 2);
                        ctx.stroke();
                    }

                    // Inner spinning gyroscope
                    ctx.strokeStyle = colorAlpha('#ffff00', 0.7);
                    ctx.lineWidth = 1.5;
                    ctx.save();
                    ctx.rotate(this.lifetime * 5);
                    ctx.beginPath();
                    ctx.moveTo(-4, 0);
                    ctx.lineTo(4, 0);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, -4);
                    ctx.lineTo(0, 4);
                    ctx.stroke();
                    ctx.restore();

                    ctx.strokeStyle = colorAlpha(accentColor, 0.6);
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(0, 0, 10, this.lifetime, this.lifetime + Math.PI / 2);
                    ctx.stroke();

                } else if (this.type === 'tank') {
                    // Heavy hexagon with rotating armor plates
                    ctx.fillStyle = colorAlpha(this.color, 0.7);
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const ang = (i / 6) * Math.PI * 2;
                        const px = Math.cos(ang) * 10;
                        const py = Math.sin(ang) * 9;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();

                    // Rotating armor plates
                    ctx.strokeStyle = colorAlpha(accentColor, 0.8);
                    ctx.lineWidth = 1.5;
                    for (let i = 0; i < 6; i++) {
                        const ang = (i / 6) * Math.PI * 2 + this.lifetime * 0.8;
                        const px = Math.cos(ang) * 9;
                        const py = Math.sin(ang) * 8;
                        ctx.beginPath();
                        ctx.arc(px, py, 3, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    // Central eye
                    ctx.fillStyle = colorAlpha(accentColor, 0.8);
                    ctx.beginPath();
                    ctx.arc(0, 0, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = colorAlpha('#000000', 0.9);
                    ctx.beginPath();
                    ctx.arc(0, 0, 2, 0, Math.PI * 2);
                    ctx.fill();

                    // Weak spot glow on back
                    ctx.fillStyle = colorAlpha('#ff0000', 0.5 + Math.sin(this.lifetime * 4) * 0.3);
                    ctx.beginPath();
                    ctx.arc(0, -10, 2, 0, Math.PI * 2);
                    ctx.fill();

                } else if (this.type === 'shooter') {
                    // Angular attack ship with dual cannons
                    const grad = ctx.createLinearGradient(-8, -6, 8, 6);
                    grad.addColorStop(0, accentColor);
                    grad.addColorStop(1, colorAlpha(this.color, 0.5));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(0, -8);
                    ctx.lineTo(-10, 0);
                    ctx.lineTo(-5, 8);
                    ctx.lineTo(0, 6);
                    ctx.lineTo(5, 8);
                    ctx.lineTo(10, 0);
                    ctx.closePath();
                    ctx.fill();

                    // Dual cannon barrels with glow
                    const cannonGlow = 0.5 + Math.sin(this.lifetime * 6) * 0.5;
                    ctx.fillStyle = colorAlpha('#ffff00', cannonGlow);
                    ctx.beginPath();
                    ctx.arc(-4, -2, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(4, -2, 2.5, 0, Math.PI * 2);
                    ctx.fill();

                    // Pulsing energy core
                    ctx.fillStyle = colorAlpha('#ffff00', 0.6 + Math.sin(this.lifetime * 5) * 0.4);
                    ctx.beginPath();
                    ctx.arc(0, 2, 2, 0, Math.PI * 2);
                    ctx.fill();

                    // Targeting laser
                    ctx.strokeStyle = colorAlpha(accentColor, 0.4);
                    ctx.lineWidth = 0.5;
                    ctx.setLineDash([2, 2]);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(0, 20);
                    ctx.stroke();
                    ctx.setLineDash([]);

                } else if (this.type === 'bomber') {
                    // Pulsing orb with concentric rings
                    const pulse = 0.7 + Math.sin(this.lifetime * 4) * 0.3;
                    const grad = ctx.createRadialGradient(0, 0, 1, 0, 0, Math.max(0.1, 10 * pulse));
                    grad.addColorStop(0, colorAlpha('#ffffff', 0.9));
                    grad.addColorStop(0.5, colorAlpha(this.color, 0.6));
                    grad.addColorStop(1, colorAlpha(this.color, 0));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, Math.max(0.1, this.size * pulse), 0, Math.PI * 2);
                    ctx.fill();

                    // Concentric expanding rings
                    for (let ring = 0; ring < 3; ring++) {
                        const ringRadius = (this.lifetime * 15 + ring * 6) % 20;
                        ctx.strokeStyle = colorAlpha(this.color, 0.6 * (1 - ringRadius / 20));
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(0, 0, Math.max(0.1, ringRadius), 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    // Inner plasma effect
                    for (let i = 0; i < 3; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * 4;
                        ctx.fillStyle = colorAlpha('#ffff00', Math.random() * 0.5);
                        ctx.beginPath();
                        ctx.arc(Math.cos(angle) * dist, Math.sin(angle) * dist, 1, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Warning indicator - expanding red circle
                    ctx.strokeStyle = colorAlpha('#ff0000', 0.5 + Math.sin(this.lifetime * 5) * 0.3);
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, 15 + Math.sin(this.lifetime * 5) * 3, 0, Math.PI * 2);
                    ctx.stroke();

                } else if (this.type === 'zigzag') {
                    // Spinning bowtie/shuriken
                    const spin = this.lifetime * 4;
                    ctx.fillStyle = this.color;
                    ctx.save();
                    ctx.rotate(spin);
                    ctx.beginPath();
                    ctx.moveTo(8, -2);
                    ctx.lineTo(10, 0);
                    ctx.lineTo(8, 2);
                    ctx.lineTo(8, -2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-8, -2);
                    ctx.lineTo(-10, 0);
                    ctx.lineTo(-8, 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();

                    // Wing tip bright dots
                    ctx.fillStyle = colorAlpha('#ffff00', 0.8);
                    ctx.beginPath();
                    ctx.arc(Math.cos(spin) * 8, Math.sin(spin) * 8, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(Math.cos(spin + Math.PI) * 8, Math.sin(spin + Math.PI) * 8, 1.5, 0, Math.PI * 2);
                    ctx.fill();

                    // Sparkle trail
                    for (let i = 0; i < 2; i++) {
                        const angle = spin + i * Math.PI;
                        if (particles.length < MAX_PARTICLES) {
                            particles.push({
                                x: this.x + Math.cos(angle) * 8,
                                y: this.y + Math.sin(angle) * 8,
                                vx: (Math.random() - 0.5) * 50,
                                vy: (Math.random() - 0.5) * 50,
                                life: 0.2,
                                color: '#ffff00',
                                size: 1,
                            });
                        }
                    }

                } else if (this.type === 'spiral') {
                    // Tentacle with 4 orbiting satellites
                    ctx.fillStyle = colorAlpha(this.color, 0.7);
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.7, 0, Math.PI * 2);
                    ctx.fill();

                    // Central pulsing eye
                    ctx.fillStyle = colorAlpha('#ffff00', 0.5 + Math.sin(this.lifetime * 5) * 0.3);
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2);
                    ctx.fill();

                    // 4 orbiting satellite nodes
                    for (let i = 0; i < 4; i++) {
                        const a = this.lifetime * 3 + (i / 4) * Math.PI * 2;
                        const px = Math.cos(a) * 8;
                        const py = Math.sin(a) * 8;

                        // Energy tether - glowing line
                        ctx.strokeStyle = colorAlpha(this.color, 0.6);
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(px, py);
                        ctx.stroke();

                        // Satellite node
                        ctx.fillStyle = colorAlpha(this.color, 0.9);
                        ctx.beginPath();
                        ctx.arc(px, py, 2, 0, Math.PI * 2);
                        ctx.fill();

                        // Trail particles
                        if (particles.length < MAX_PARTICLES) {
                            particles.push({
                                x: this.x + px,
                                y: this.y + py,
                                vx: (Math.random() - 0.5) * 40,
                                vy: (Math.random() - 0.5) * 40,
                                life: 0.15,
                                color: this.color,
                                size: 1,
                            });
                        }
                    }

                } else if (this.type === 'formation') {
                    // Mini fighter with formation lights
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -6);
                    ctx.lineTo(-6, 4);
                    ctx.lineTo(0, 2);
                    ctx.lineTo(6, 4);
                    ctx.closePath();
                    ctx.fill();

                    // Formation lights
                    const lightGlow = 0.6 + Math.sin(this.lifetime * 5) * 0.3;
                    ctx.fillStyle = colorAlpha('#00ffff', lightGlow);
                    ctx.beginPath();
                    ctx.arc(-5, 2, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = colorAlpha('#ff00ff', lightGlow);
                    ctx.beginPath();
                    ctx.arc(5, 2, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = colorAlpha('#00ff00', lightGlow);
                    ctx.beginPath();
                    ctx.arc(0, 4, 1.5, 0, Math.PI * 2);
                    ctx.fill();

                } else if (this.type === 'boss') {
                    // MASSIVE TERRIFYING BOSS
                    // 3 rotating rings
                    for (let ring = 0; ring < 3; ring++) {
                        const ringRadius = 15 + ring * 8;
                        const ringSpeed = [1, -0.7, 1.3][ring];
                        ctx.strokeStyle = colorAlpha(this.color, 0.5 - ring * 0.1);
                        ctx.lineWidth = 2;
                        ctx.save();
                        ctx.rotate(this.lifetime * ringSpeed);
                        ctx.beginPath();
                        ctx.arc(0, 0, Math.max(0.1, ringRadius), 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();
                    }

                    // Core with phase-based color shift
                    const phase = Math.floor((this.hp / this.maxHp) * 3);
                    const coreColors = ['#0ff', '#ff0', '#f0f'];
                    const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, Math.max(0.1, 12));
                    grad.addColorStop(0, colorAlpha(coreColors[phase], 0.9));
                    grad.addColorStop(0.5, colorAlpha(this.color, 0.5));
                    grad.addColorStop(1, colorAlpha(this.color, 0));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, 12, 0, Math.PI * 2);
                    ctx.fill();

                    // 8 extending energy arms
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        const armLength = 20 + Math.sin(this.armPhase + i) * 8;
                        const px = Math.cos(angle) * armLength;
                        const py = Math.sin(angle) * armLength;

                        // Arm
                        ctx.strokeStyle = colorAlpha(this.color, 0.8);
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(px, py);
                        ctx.stroke();

                        // Arm tip glow
                        ctx.fillStyle = colorAlpha('#ffff00', 0.7);
                        ctx.beginPath();
                        ctx.arc(px, py, 2, 0, Math.PI * 2);
                        ctx.fill();

                        // Particle emission
                        if (particles.length < MAX_PARTICLES) {
                            particles.push({
                                x: this.x + px,
                                y: this.y + py,
                                vx: Math.cos(angle) * 40,
                                vy: Math.sin(angle) * 40,
                                life: 0.3,
                                color: this.color,
                                size: 1.5,
                            });
                        }
                    }

                    // Damage indicator - visual shield segments break off
                    const hpPercent = this.hp / this.maxHp;
                    if (hpPercent < 0.8) {
                        ctx.strokeStyle = colorAlpha('#ff0000', 0.6);
                        ctx.lineWidth = 1.5;
                        ctx.setLineDash([3, 3]);
                        ctx.beginPath();
                        ctx.arc(0, 0, 25, 0, Math.PI * 2 * hpPercent);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }

                ctx.restore();
            } catch (e) {
                console.error('Enemy draw error:', e);
            }
        }
    }


    // ============================================================================
    // BACKGROUND - LIVING SPACE SCENE
    // ============================================================================

    function drawBackground() {
        try {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

            const time = Date.now() * 0.0001;

            // 4 LAYERS OF PARALLAX STARS WITH TWINKLING
            const starLayers = [
                { speed: 0.01, size: 0.5, count: 30, brightness: 0.5 },
                { speed: 0.02, size: 1, count: 25, brightness: 0.7 },
                { speed: 0.04, size: 1.5, count: 15, brightness: 0.9 },
                { speed: 0.08, size: 2, count: 8, brightness: 1 },
            ];

            for (let layer of starLayers) {
                for (let i = 0; i < layer.count; i++) {
                    const seed = i * 7919;
                    let x = (seed * 73 + i * 11) % VIRTUAL_WIDTH;
                    let y = (seed * 131 + i * 17) % VIRTUAL_HEIGHT;

                    const scrollX = (time * layer.speed * 30) % VIRTUAL_WIDTH;
                    const displayX = (x + scrollX) % VIRTUAL_WIDTH;

                    // Twinkle effect
                    const twitclePhase = seed * 0.1 + Date.now() * 0.001;
                    const twinkle = 0.3 + Math.sin(twitclePhase) * 0.4 + Math.sin(twitclePhase * 0.3) * 0.3;
                    const brightness = layer.brightness * twinkle;

                    ctx.fillStyle = colorAlpha('#fff', brightness);
                    ctx.beginPath();
                    ctx.arc(displayX, y, layer.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // SHOOTING STARS
            for (let i = 0; i < 2; i++) {
                const starTime = (Date.now() * 0.0005 + i) % 1;
                if (starTime < 0.3) {
                    const startX = starTime * VIRTUAL_WIDTH * 1.5;
                    const startY = Math.sin(starTime * Math.PI) * VIRTUAL_HEIGHT * 0.5;
                    const endX = startX + 40;
                    const endY = startY - 20;

                    // Trail
                    const trailGrad = ctx.createLinearGradient(startX, startY, endX, endY);
                    trailGrad.addColorStop(0, colorAlpha('#ffffff', 0.8));
                    trailGrad.addColorStop(1, colorAlpha('#ffffff', 0));
                    ctx.strokeStyle = trailGrad;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                }
            }

            // 5+ NEBULA CLOUDS WITH COLOR SHIFTING
            if (!window.nebulaSeedDone) {
                window.nebulaSeedDone = true;
                for (let i = 0; i < 5; i++) {
                    nebulaClouds.push({
                        x: Math.random() * VIRTUAL_WIDTH * 2,
                        y: Math.random() * VIRTUAL_HEIGHT,
                        radius: 80 + Math.random() * 60,
                        vx: (Math.random() - 0.5) * 20,
                        vy: (Math.random() - 0.5) * 10,
                        hueOffset: i * 60,
                        rotationSpeed: (Math.random() - 0.5) * 0.3,
                        rotation: Math.random() * Math.PI * 2,
                    });
                }
            }

            // Update and draw nebulae
            for (let neb of nebulaClouds) {
                neb.x += neb.vx * dt;
                neb.y += neb.vy * dt;
                neb.rotation += neb.rotationSpeed * dt;

                if (neb.x < -100) neb.x = VIRTUAL_WIDTH + 100;
                if (neb.x > VIRTUAL_WIDTH + 100) neb.x = -100;
                if (neb.y < -100) neb.y = VIRTUAL_HEIGHT + 100;
                if (neb.y > VIRTUAL_HEIGHT + 100) neb.y = -100;

                // Color shift
                const hueShift = (Date.now() * 0.0001 + neb.hueOffset) % 360;
                const colors = ['#ff0088', '#0088ff', '#00ff88', '#ffff00', '#ff00ff'];
                const colorIdx = Math.floor((hueShift / 72) % colors.length);
                const color = colors[colorIdx];

                const grad = ctx.createRadialGradient(neb.x, neb.y, 10, neb.x, neb.y, Math.max(0.1, neb.radius));
                grad.addColorStop(0, colorAlpha(color, 0.2));
                grad.addColorStop(1, colorAlpha(color, 0));
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(neb.x, neb.y, Math.max(0.1, neb.radius), 0, Math.PI * 2);
                ctx.fill();
            }

            // DISTANT GALAXY SPIRALS - VERY FAINT
            for (let i = 0; i < 3; i++) {
                const gx = VIRTUAL_WIDTH * (0.2 + i * 0.4);
                const gy = VIRTUAL_HEIGHT * 0.3;
                const spiralRotation = Date.now() * 0.00005 + i * 2;

                ctx.strokeStyle = colorAlpha('#0088ff', 0.15);
                ctx.lineWidth = 0.5;
                for (let arm = 0; arm < 3; arm++) {
                    ctx.beginPath();
                    for (let t = 0; t < 2 * Math.PI; t += 0.1) {
                        const r = (t / (2 * Math.PI)) * 30;
                        const angle = t + spiralRotation + (arm / 3) * Math.PI * 2;
                        const x = gx + Math.cos(angle) * r;
                        const y = gy + Math.sin(angle) * r;
                        if (t === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
            }

            // TRON-STYLE GRID - VERY FAINT
            ctx.strokeStyle = colorAlpha('#00ff00', 0.08);
            ctx.lineWidth = 0.5;
            const gridSize = 60;
            const gridScroll = (time * 30) % gridSize;
            for (let x = -gridSize; x < VIRTUAL_WIDTH + gridSize; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x + gridScroll, 0);
                ctx.lineTo(x + gridScroll, VIRTUAL_HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y < VIRTUAL_HEIGHT; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(VIRTUAL_WIDTH, y);
                ctx.stroke();
            }

            // DUST PARTICLES - RESPOND TO PLAYER MOVEMENT
            for (let d of dustParticles) {
                d.x += d.vx * dt;
                d.y += d.vy * dt;
                if (d.x < 0) d.x = VIRTUAL_WIDTH;
                if (d.x > VIRTUAL_WIDTH) d.x = 0;
                if (d.y < 0) d.y = VIRTUAL_HEIGHT;
                if (d.y > VIRTUAL_HEIGHT) d.y = 0;
                ctx.fillStyle = colorAlpha('#fff', d.brightness);
                ctx.fillRect(d.x, d.y, d.size, d.size);
            }

            // Vignette
            const vigGrad = ctx.createRadialGradient(VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2, 0, VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2, Math.max(VIRTUAL_WIDTH, VIRTUAL_HEIGHT));
            vigGrad.addColorStop(0, colorAlpha('#000', 0));
            vigGrad.addColorStop(1, colorAlpha('#000', 0.3));
            ctx.fillStyle = vigGrad;
            ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
        } catch (e) {
            console.error('Background draw error:', e);
        }
    }

    // ============================================================================
    // DRAW MENU - CINEMATIC
    // ============================================================================

    function drawMenu() {
        drawBackground();

        // Title screen aggressive particle system
        for (let i = 0; i < 3; i++) {
            if (Math.random() < 0.03) {
                titleParticles.push({
                    x: Math.random() * VIRTUAL_WIDTH,
                    y: -10,
                    vx: (Math.random() - 0.5) * 100,
                    vy: Math.random() * 50 + 40,
                    life: 3,
                    color: ['#0f0', '#f0f', '#0ff', '#ff0', '#ff00ff'][Math.floor(Math.random() * 5)],
                    size: Math.random() * 3 + 1,
                });
            }
        }

        titleParticles = titleParticles.filter(p => {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
            ctx.fillStyle = colorAlpha(p.color, p.life / 3);
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2);
            ctx.fill();
            return p.life > 0;
        });

        // Animated title with letter-by-letter glow wave
        const title = 'NOVA BREACH';
        ctx.font = 'bold 36px system-ui';
        ctx.textAlign = 'center';
        const charWidth = ctx.measureText('A').width;
        const titleWidth = charWidth * title.length;
        const startX = (VIRTUAL_WIDTH - titleWidth) / 2;

        for (let i = 0; i < title.length; i++) {
            const charGlow = 0.5 + Math.sin(Date.now() * 0.005 + i * 0.3) * 0.5;
            ctx.fillStyle = colorAlpha('#0ff', charGlow);
            ctx.globalShadow = '0 0 10px #0ff';
            ctx.fillText(title[i], startX + i * charWidth + charWidth / 2, 80);
        }
        ctx.globalShadow = 'none';

        // Chromatic aberration on title
        const aberOffset = 1 + Math.sin(Date.now() * 0.003) * 0.5;
        ctx.fillStyle = colorAlpha('#ff0000', 0.2);
        ctx.fillText(title, VIRTUAL_WIDTH / 2 + aberOffset, 80 + aberOffset);
        ctx.fillStyle = colorAlpha('#00ff00', 0.2);
        ctx.fillText(title, VIRTUAL_WIDTH / 2 - aberOffset, 80 - aberOffset);

        // Subtitle with scanning line
        ctx.fillStyle = '#ff00ff';
        ctx.font = '16px system-ui';
        ctx.fillText('DELUXE EDITION', VIRTUAL_WIDTH / 2, 105);
        const scanY = 100 + Math.sin(Date.now() * 0.005) * 10;
        ctx.strokeStyle = colorAlpha('#0f0', 0.5);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(VIRTUAL_WIDTH / 2 - 80, scanY);
        ctx.lineTo(VIRTUAL_WIDTH / 2 + 80, scanY);
        ctx.stroke();

        // Version
        ctx.fillStyle = '#888';
        ctx.font = '10px system-ui';
        ctx.textAlign = 'right';
        ctx.fillText(VERSION, VIRTUAL_WIDTH - 5, VIRTUAL_HEIGHT - 5);

        // Tutorial
        if (gameState.showTutorial) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

            ctx.fillStyle = '#0ff';
            ctx.font = '14px system-ui';
            ctx.textAlign = 'center';
            const tutorialLines = [
                'TAP TO MOVE',
                'AUTO-FIRE',
                'HOLD SPACE TO DASH',
                'COLLECT POWER-UPS',
                'REACH WAVE 10 FOR BOSS',
            ];
            tutorialLines.forEach((line, i) => {
                ctx.fillText(line, VIRTUAL_WIDTH / 2, 250 + i * 30);
            });

            ctx.fillStyle = '#fff';
            ctx.font = '12px system-ui';
            ctx.fillText('TAP ANYWHERE TO START', VIRTUAL_WIDTH / 2, 450);
        }

        // Ship selection
        ctx.fillStyle = '#ffff00';
        ctx.font = '14px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('SELECT SHIP (CLICK)', VIRTUAL_WIDTH / 2, 180);

        const shipNames = Object.keys(SHIP_STATS);
        shipNames.forEach((ship, i) => {
            const x = 70 + i * 90;
            const y = 250;

            // Glass morphism style button
            ctx.fillStyle = gameState.selectedShip === ship ? colorAlpha('#0ff', 0.2) : colorAlpha('#888', 0.1);
            ctx.lineWidth = gameState.selectedShip === ship ? 2 : 1;
            ctx.strokeStyle = gameState.selectedShip === ship ? '#0ff' : '#888';
            ctx.fillRect(x - 30, y - 30, 60, 60);
            ctx.strokeRect(x - 30, y - 30, 60, 60);

            ctx.fillStyle = SHIP_STATS[ship].hp > 100 ? '#ffff00' : SHIP_STATS[ship].speed > 250 ? '#ff00ff' : '#0f0';
            ctx.font = 'bold 18px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(ship.toUpperCase()[0], x, y + 8);

            ctx.fillStyle = '#aaa';
            ctx.font = '10px system-ui';
            ctx.fillText(SHIP_STATS[ship].name, x, y + 50);
        });

        // Buttons with animated borders
        const menuButtons = [
            { label: 'PLAY', y: 340, borderColor: '#0ff' },
            { label: 'DAILY', y: 400, borderColor: '#ff8800' },
            { label: 'STATS', y: 460, borderColor: '#00ff88' },
        ];
        menuButtons.forEach(btn => {
            const bx = VIRTUAL_WIDTH / 2 - 70;
            const by = btn.y;
            const bw = 140;
            const bh = 40;

            // Glass morphism fill
            const btnGrad = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
            btnGrad.addColorStop(0, colorAlpha(btn.borderColor, 0.15));
            btnGrad.addColorStop(1, colorAlpha(btn.borderColor, 0.05));
            ctx.fillStyle = btnGrad;
            ctx.fillRect(bx, by, bw, bh);

            // Animated tracing border
            const borderPhase = (Date.now() * 0.005) % (bw * 2 + bh * 2);
            ctx.strokeStyle = btn.borderColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(bx, by, bw, bh);

            // Label
            ctx.fillStyle = btn.borderColor;
            ctx.font = 'bold 16px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(btn.label, VIRTUAL_WIDTH / 2, btn.y + 25);
