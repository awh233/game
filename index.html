  equip(item) {
    if (!item || !item.slot) return false;
    const slot = item.slot;
    
    // Unequip current
    if (this.slots[slot]) {
      this.addToInventory(this.slots[slot]);
    }
    
    this.slots[slot] = item;
    
    // Remove from inventory
    const idx = this.inventory.indexOf(item);
    if (idx >= 0) this.inventory.splice(idx, 1);
    
    return true;
  },
  
  unequip(slot) {
    if (!this.slots[slot]) return false;
    this.addToInventory(this.slots[slot]);
    this.slots[slot] = null;
    return true;
  },
  
  addToInventory(item) {
    if (this.inventory.length >= this.maxInventory) {
      // Auto-sell cheapest
      let cheapest = 0;
      for (let i = 1; i < this.inventory.length; i++) {
        if (this.getTierValue(this.inventory[i].tier) < this.getTierValue(this.inventory[cheapest].tier)) {
          cheapest = i;
        }
      }
      const sold = this.inventory.splice(cheapest, 1)[0];
      if (typeof player !== 'undefined') {
        player.coins = (player.coins || 0) + this.getSellPrice(sold);
      }
    }
    this.inventory.push(item);
  },
  
  getTierValue(tier) {
    const values = { common: 1, uncommon: 2, rare: 3, epic: 4, legendary: 5, mythic: 6 };
    return values[tier] || 0;
  },
  
  getSellPrice(item) {
    const basePrices = { common: 10, uncommon: 25, rare: 50, epic: 100, legendary: 250, mythic: 500 };
    return basePrices[item.tier] || 10;
  },
  
  getTotalStats() {
    const stats = {};
    for (let slot in this.slots) {
      const item = this.slots[slot];
      if (item && item.stats) {
        for (let key in item.stats) {
          if (typeof item.stats[key] === 'number') {
            stats[key] = (stats[key] || 0) + item.stats[key];
          } else {
            stats[key] = item.stats[key];
          }
        }
      }
    }
    return stats;
  },
  
  generateLoot(wave, luck) {
    luck = luck || 0;
    
    // Determine tier
    const roll = Math.random() + luck;
    let tier;
    if (roll > 0.98) tier = 'mythic';
    else if (roll > 0.93) tier = 'legendary';
    else if (roll > 0.82) tier = 'epic';
    else if (roll > 0.65) tier = 'rare';
    else if (roll > 0.40) tier = 'uncommon';
    else tier = 'common';
    
    // Pick category
    const categories = ['weapons', 'armors', 'accessories', 'cores', 'modules'];
    const category = categories[Math.floor(Math.random() * categories.length)];
    
    // Filter by tier
    const available = this.equipmentDB[category].filter(e => e.tier === tier);
    if (available.length === 0) {
      // Fallback to any in category
      const all = this.equipmentDB[category];
      return { ...all[Math.floor(Math.random() * all.length)] };
    }
    
    return { ...available[Math.floor(Math.random() * available.length)] };
  }
};

  ctx.rect(10, invStartY, W - 20, visibleH);

  for (let i = 0; i < EquipmentSystem.inventory.length; i++) {

}

  drones: [],
  maxDrones: 4,
  
  droneTypes: {
    attack: {
      name: 'Attack Drone',
      color: '#FF4444',
      damage: 5,
      fireRate: 30,
      range: 150,
      orbitRadius: 40,

      shieldAmount: 2,
      healRate: 120,
      orbitRadius: 35,
      orbitSpeed: 0.02,
      size: 5
    },
    support: {
      name: 'Support Drone',
      color: '#44FF44',
      magnetBonus: 30,
      xpBonus: 0.1,
      orbitRadius: 50,
      orbitSpeed: 0.025,
      size: 5
    },
    elemental: {
      name: 'Elemental Drone',
      color: '#FFD700',
      damage: 3,
      fireRate: 45,
      range: 120,
      elementalDamage: true,
      orbitRadius: 45,
      orbitSpeed: 0.035,
      size: 7
    }
  },
  
  addDrone(type) {
    if (this.drones.length >= this.maxDrones) return false;
    const droneType = this.droneTypes[type];
    if (!droneType) return false;
    
    this.drones.push({
      type: type,
      config: droneType,
      angle: (this.drones.length / this.maxDrones) * Math.PI * 2,
      x: 0,
      y: 0,
      fireTimer: 0,
      healTimer: 0,
      active: true
    });
    return true;
  },
  
  update() {
    if (typeof player === 'undefined') return;
    const px = player.x, py = player.y;
    
    for (let drone of this.drones) {
      if (!drone.active) continue;
      
      // Orbit around player
      drone.angle += drone.config.orbitSpeed || 0.03;
      const orbitR = drone.config.orbitRadius || 40;
      drone.x = px + Math.cos(drone.angle) * orbitR;
      drone.y = py + Math.sin(drone.angle) * orbitR;
      
      // Type-specific behavior
      switch(drone.type) {
        case 'attack':
        case 'elemental': {
          drone.fireTimer++;
          if (drone.fireTimer >= (drone.config.fireRate || 30)) {
            drone.fireTimer = 0;
            // Find nearest enemy
            let nearestEnemy = null;
            let nearestDist = drone.config.range || 150;
            if (typeof Enemies !== 'undefined') {
              for (let i = 0; i < Enemies.pool.length; i++) {
                const e = Enemies.pool[i];
                if (e.active) {
                  const dx = e.x - drone.x, dy = e.y - drone.y;
                  const dist = Math.sqrt(dx*dx + dy*dy);
                  if (dist < nearestDist) {
                    nearestDist = dist;
                    nearestEnemy = e;
                  }
                }
              }
            }
            if (nearestEnemy && typeof PlayerBullets !== 'undefined') {
              const angle = Math.atan2(nearestEnemy.y - drone.y, nearestEnemy.x - drone.x);
              const speed = 5;
              PlayerBullets.spawn(drone.x, drone.y,
                Math.cos(angle) * speed, Math.sin(angle) * speed,
                drone.config.damage || 5, drone.config.color);
              if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('shoot');
            }
          }
          break;
        }
        case 'shield': {
          drone.healTimer++;
          if (drone.healTimer >= (drone.config.healRate || 120)) {
            drone.healTimer = 0;
            if (player.shield < (player.maxShield || 0)) {
              player.shield = Math.min(player.maxShield || 0, player.shield + (drone.config.shieldAmount || 2));
            }
          }
          break;
        }
      }
    }
  },
  
  render(ctx) {
    for (let drone of this.drones) {
      if (!drone.active) continue;
      
      const t = Date.now() * 0.003;
      
      // Glow
      ctx.fillStyle = drone.config.color + '33';
      ctx.beginPath();
      ctx.arc(drone.x, drone.y, (drone.config.size || 5) + 3, 0, Math.PI * 2);
      ctx.fill();
      
      // Body
      ctx.fillStyle = drone.config.color;
      ctx.strokeStyle = '#FFFFFF44';
      ctx.lineWidth = 1;
      ctx.beginPath();
      const size = drone.config.size || 5;
      // Diamond shape
      ctx.moveTo(drone.x, drone.y - size);
      ctx.lineTo(drone.x + size * 0.7, drone.y);
      ctx.lineTo(drone.x, drone.y + size * 0.7);
      ctx.lineTo(drone.x - size * 0.7, drone.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      
      // Pulse effect
      const pulse = Math.sin(t + drone.angle) * 0.3 + 0.7;
      ctx.fillStyle = drone.config.color;
      ctx.globalAlpha = pulse * 0.5;
      ctx.beginPath();
      ctx.arc(drone.x, drone.y, size + Math.sin(t) * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  },
  
  clear() {
    this.drones = [];
  }
};

// SECTION 64: SKILL TREE VISUAL RENDERER
// ============================================================

const SkillTreeRenderer = {
  nodeRadius: 18,
  connectionWidth: 2,
  selectedNode: null,
  hoveredNode: null,
  
  renderTree(ctx, tree, x, y, w, h) {
    if (!tree || !tree.nodes) return;
    
    const nodes = tree.nodes;
    const tiers = {};
    
    // Group by tier
    for (let node of nodes) {
      if (!tiers[node.tier]) tiers[node.tier] = [];
      tiers[node.tier].push(node);
    }
    
    const tierKeys = Object.keys(tiers).sort((a,b) => a-b);
    const tierSpacing = h / (tierKeys.length + 1);
    
    // Draw connections
    for (let node of nodes) {
      if (node.requires) {
        for (let reqId of node.requires) {
          const reqNode = nodes.find(n => n.id === reqId);
          if (reqNode) {
            const fromPos = this.getNodePosition(tiers, reqNode, tierKeys, x, y, w, tierSpacing);
            const toPos = this.getNodePosition(tiers, node, tierKeys, x, y, w, tierSpacing);
            
            ctx.strokeStyle = (node.unlocked && reqNode.unlocked) ? tree.color : 'rgba(255,255,255,0.1)';
            ctx.lineWidth = this.connectionWidth;
            ctx.beginPath();
            ctx.moveTo(fromPos.x, fromPos.y);
            
            // Bezier curve connection
            const midY = (fromPos.y + toPos.y) / 2;
            ctx.bezierCurveTo(fromPos.x, midY, toPos.x, midY, toPos.x, toPos.y);
            ctx.stroke();
          }
        }
      }
    }
    
    // Draw nodes
    for (let node of nodes) {
      const pos = this.getNodePosition(tiers, node, tierKeys, x, y, w, tierSpacing);
      this.renderNode(ctx, node, pos.x, pos.y, tree.color);
    }
  },
  
  getNodePosition(tiers, node, tierKeys, x, y, w, tierSpacing) {
    const tierIndex = tierKeys.indexOf(String(node.tier));
    const nodesInTier = tiers[node.tier];
    const nodeIndex = nodesInTier.indexOf(node);
    const count = nodesInTier.length;
    
    const ny = y + (tierIndex + 1) * tierSpacing;
    const spacing = Math.min(100, w / (count + 1));
    const startX = x + w/2 - ((count - 1) * spacing) / 2;
    const nx = startX + nodeIndex * spacing;
    
    return { x: nx, y: ny };
  },
  
  renderNode(ctx, node, cx, cy, treeColor) {
    const r = this.nodeRadius;
    const t = Date.now() * 0.003;
    
    // Node glow for unlocked
    if (node.unlocked) {
      const glowR = r + 5 + Math.sin(t) * 3;
      ctx.fillStyle = treeColor + '22';
      ctx.beginPath();
      ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Node background
    ctx.fillStyle = node.unlocked ? treeColor + '44' : 'rgba(30,30,50,0.8)';
    ctx.strokeStyle = node.unlocked ? treeColor : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = node.unlocked ? 2 : 1;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    
    // Inner detail
    if (node.unlocked) {
      ctx.fillStyle = treeColor;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.4, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Lock icon
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('🔒', cx, cy + 4);
    }
    
    // Node name below
    ctx.fillStyle = node.unlocked ? '#FFFFFF' : '#666666';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(node.name, cx, cy + r + 12);
  }
};

const SaveManager = {
  saveKey: 'VR5_SAVE',
  autoSaveInterval: 1800, // 30 seconds
  autoSaveTimer: 0,
  lastSaveTime: 0,
  
  save() {
    try {
      const saveData = {
        version: 5,
        timestamp: Date.now(),
        player: {
          coins: player.coins || 0,
          ownedShips: player.ownedShips || [0],
          shopLevels: player.shopLevels || {},
          highScore: gameState.highScore || 0,
          highWave: gameState.highWave || 0
        },
        weaponTrees: {},
        equipment: {
          slots: {},
          inventory: EquipmentSystem.inventory.map(i => i.id)
        },
        codex: {},
        story: StorySystem.chapters.map(ch => ch.seen),
        ngPlus: NewGamePlus.level,
        career: Statistics.career,
        achievements: [],
        settings: gameState.settings || {}
      };
      
      // Save weapon tree progress
      for (let tree in WeaponTrees.trees) {
        saveData.weaponTrees[tree] = WeaponTrees.trees[tree].nodes
          .filter(n => n.unlocked)
          .map(n => n.id);
      }
      
      // Save codex
      for (let cat in Codex.entries) {
        saveData.codex[cat] = {};
        for (let id in Codex.entries[cat]) {
          if (Codex.entries[cat][id].discovered) {
            saveData.codex[cat][id] = true;
          }
        }
      }
      
      // Save equipped items
      for (let slot in EquipmentSystem.slots) {
        if (EquipmentSystem.slots[slot]) {
          saveData.equipment.slots[slot] = EquipmentSystem.slots[slot].id;
        }
      }
      
      localStorage.setItem(this.saveKey, JSON.stringify(saveData));
      this.lastSaveTime = Date.now();
      return true;
    } catch(e) {
      return false;
    }
  },
  
  load() {
    try {
      const raw = localStorage.getItem(this.saveKey);
      if (!raw) return false;
      
      const saveData = JSON.parse(raw);
      if (saveData.version !== 5) return false;
      
      // Restore player data
      if (saveData.player) {
        player.coins = saveData.player.coins || 0;
        player.ownedShips = saveData.player.ownedShips || [0];
        player.shopLevels = saveData.player.shopLevels || {};
        gameState.highScore = saveData.player.highScore || 0;
        gameState.highWave = saveData.player.highWave || 0;
      }
      
      // Restore weapon trees
      if (saveData.weaponTrees) {
        for (let tree in saveData.weaponTrees) {
          if (WeaponTrees.trees[tree]) {
            for (let nodeId of saveData.weaponTrees[tree]) {
              const node = WeaponTrees.trees[tree].nodes.find(n => n.id === nodeId);
              if (node) node.unlocked = true;
            }
          }
        }
      }
      
      // Restore codex
      if (saveData.codex) {
        for (let cat in saveData.codex) {
          for (let id in saveData.codex[cat]) {
            if (Codex.entries[cat] && Codex.entries[cat][id]) {
              Codex.entries[cat][id].discovered = true;
            }
          }
        }
      }
      
      // Restore story
      if (saveData.story) {
        for (let i = 0; i < saveData.story.length && i < StorySystem.chapters.length; i++) {
          StorySystem.chapters[i].seen = saveData.story[i];
        }
      }
      
      // Restore NG+
      if (saveData.ngPlus !== undefined) {
        NewGamePlus.level = saveData.ngPlus;
      }
      
      // Restore career
      if (saveData.career) {
        Object.assign(Statistics.career, saveData.career);
      }
      
      // Restore settings
      if (saveData.settings) {
        gameState.settings = saveData.settings;
      }
      
      return true;
    } catch(e) {
      return false;
    }
  },
  
  autoSaveUpdate() {
    this.autoSaveTimer++;
    if (this.autoSaveTimer >= this.autoSaveInterval) {
      this.autoSaveTimer = 0;
      this.save();
    }
  },
  
  deleteSave() {
    try {
      localStorage.removeItem(this.saveKey);
      return true;
    } catch(e) {
      return false;
    }
  }
};

const PerfMonitor = {
  fps: 60,
  frameTime: 0,
  frameTimes: [],
  maxSamples: 60,
  showFPS: false,
  lowFPSCount: 0,
  qualityLevel: 2, // 0=low, 1=medium, 2=high
  
  startFrame() {
    this.frameStart = performance.now();
  },
  
  endFrame() {
    const elapsed = performance.now() - this.frameStart;
    this.frameTimes.push(elapsed);
    if (this.frameTimes.length > this.maxSamples) {
      this.frameTimes.shift();
    }
    
    const avg = this.frameTimes.reduce((a,b) => a+b, 0) / this.frameTimes.length;
    this.frameTime = avg;
    this.fps = Math.round(1000 / Math.max(1, avg));
    
    // Auto quality adjustment
    if (this.fps < 30) {
      this.lowFPSCount++;
      if (this.lowFPSCount > 120 && this.qualityLevel > 0) {
        this.qualityLevel--;
        this.lowFPSCount = 0;
        this.applyQuality();
      }
    } else {
      this.lowFPSCount = Math.max(0, this.lowFPSCount - 1);
    }
  },
  
  applyQuality() {
    switch(this.qualityLevel) {
      case 0: // Low
        if (typeof Particles !== 'undefined') Particles.maxActive = 100;
        if (typeof Weather !== 'undefined') Weather.maxParticles = 30;
        break;
      case 1: // Medium
        if (typeof Particles !== 'undefined') Particles.maxActive = 300;
        if (typeof Weather !== 'undefined') Weather.maxParticles = 80;
        break;
      case 2: // High
        if (typeof Particles !== 'undefined') Particles.maxActive = 600;
        if (typeof Weather !== 'undefined') Weather.maxParticles = 150;
        break;
    }
  },
  
  render(ctx) {
    if (!this.showFPS) return;
    ctx.fillStyle = this.fps >= 50 ? '#44FF44' : this.fps >= 30 ? '#FFAA00' : '#FF4444';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`FPS: ${this.fps} | Q: ${['LOW','MED','HIGH'][this.qualityLevel]}`, 10, 750 - 5);
  }
};

      maxTimer: preset.lifetime || 30,
      particles: this.generateParticles(preset, x, y, color, scale),
      ring: preset.ring ? { radius: 0, maxRadius: (preset.ringMaxRadius || 50) * scale, speed: preset.ringSpeed || 4, width: preset.ringWidth || 3 } : null,
      active: true
    });
  },
  
  generateParticles(preset, x, y, color, scale) {
    const particles = [];
    const count = preset.particleCount || 10;
    
    switch(preset.type) {
      case 'radial':
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = (preset.speed.min + Math.random() * (preset.speed.max - preset.speed.min)) * scale;
          const size = (preset.size.min + Math.random() * (preset.size.max - preset.size.min)) * scale;
          particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: size,
            maxSize: size,
            life: preset.lifetime.min + Math.random() * (preset.lifetime.max - preset.lifetime.min),
            maxLife: 0,
            color: color,
            gravity: preset.gravity || 0,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.2
          });
          particles[particles.length-1].maxLife = particles[particles.length-1].life;
        }
        break;
        
      case 'inward':
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const dist = (preset.startRadius || 60) * scale;
          const px = x + Math.cos(angle) * dist;
          const py = y + Math.sin(angle) * dist;
          const speed = preset.speed || 3;
          particles.push({
            x: px, y: py,
            vx: -Math.cos(angle) * speed * scale,
            vy: -Math.sin(angle) * speed * scale,
            size: (preset.size.min + Math.random() * (preset.size.max - preset.size.min)) * scale,
            life: preset.lifetime || 20,
            maxLife: preset.lifetime || 20,
            color: color
          });
        }
        break;
        
      case 'spiral':
        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2;
          const r = (preset.radius || 50) * scale;
          particles.push({
            x: x + Math.cos(angle) * r,
            y: y + Math.sin(angle) * r,
            angle: angle,
            radius: r,
            size: (preset.size.min + Math.random() * (preset.size.max - preset.size.min)) * scale,
            life: preset.lifetime || 60,
            maxLife: preset.lifetime || 60,
            color: color,
            rotSpeed: preset.rotSpeed || 0.15,
            inward: preset.inward || false
          });
        }
        break;
        
      case 'aura':
        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2;
          const r = (preset.radius || 40) * scale;
          particles.push({
            x: x + Math.cos(angle) * r * (0.5 + Math.random() * 0.5),
            y: y + Math.sin(angle) * r * (0.5 + Math.random() * 0.5),
            vy: -(preset.riseSpeed || 1.5),
            size: (preset.size.min + Math.random() * (preset.size.max - preset.size.min)) * scale,
            life: preset.lifetime || 30,
            maxLife: preset.lifetime || 30,
            color: color
          });
        }
        break;
    }
    
    return particles;
  },
  
  update() {
    for (let i = this.effects.length - 1; i >= 0; i--) {
      const effect = this.effects[i];
      effect.timer++;
      
      // Update ring
      if (effect.ring) {
        effect.ring.radius += effect.ring.speed;
        if (effect.ring.radius > effect.ring.maxRadius) {
          effect.ring.radius = effect.ring.maxRadius;
        }
      }
      
      // Update particles
      for (let j = effect.particles.length - 1; j >= 0; j--) {
        const p = effect.particles[j];
        p.life--;
        
        if (p.vx !== undefined) p.x += p.vx;
        if (p.vy !== undefined) p.y += p.vy;
        if (p.gravity) p.vy += p.gravity;
        if (p.rotation !== undefined) p.rotation += p.rotSpeed || 0;
        
        // Spiral movement
        if (p.angle !== undefined) {
          p.angle += p.rotSpeed || 0.15;
          if (p.inward) p.radius *= 0.98;
          p.x = effect.x + Math.cos(p.angle) * p.radius;
          p.y = effect.y + Math.sin(p.angle) * p.radius;
        }
        
        if (p.life <= 0) {
          effect.particles.splice(j, 1);
        }
      }
      
      if (effect.timer >= effect.maxTimer && effect.particles.length === 0) {
        this.effects.splice(i, 1);
      }
    }
  },
  
  render(ctx) {
    for (let effect of this.effects) {
      const progress = effect.timer / effect.maxTimer;
      
      // Render ring
      if (effect.ring && effect.ring.radius > 0) {
        const ringAlpha = 1 - (effect.ring.radius / effect.ring.maxRadius);
        ctx.strokeStyle = effect.color;
        ctx.globalAlpha = ringAlpha * 0.6;
        ctx.lineWidth = effect.ring.width * (1 - progress);
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, effect.ring.radius, 0, Math.PI * 2);
        ctx.stroke();
      }
      
      // Render particles
      for (let p of effect.particles) {
        const lifeRatio = p.maxLife > 0 ? p.life / p.maxLife : 1;
        ctx.fillStyle = p.color || effect.color;
        ctx.globalAlpha = lifeRatio;
        
        const size = p.size * lifeRatio;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, size), 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.globalAlpha = 1;
      
      // Special rendering for lightning
      if (effect.config.type === 'lightning' && effect.timer < effect.maxTimer) {
        this.renderLightning(ctx, effect);
      }
      
      // Special rendering for teleport
      if (effect.config.type === 'teleport') {
        this.renderTeleport(ctx, effect);
      }
    }
  },
  
  renderLightning(ctx, effect) {
    const alpha = 1 - (effect.timer / effect.maxTimer);
    ctx.strokeStyle = effect.color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = effect.config.width || 3;
    
    // Main bolt
    const segments = effect.config.segments || 8;
    const spread = (effect.config.spread || 15) * effect.scale;
    const height = 100 * effect.scale;
    
    ctx.beginPath();
    let px = effect.x, py = effect.y;
    ctx.moveTo(px, py);
    
    for (let i = 1; i <= segments; i++) {
      const nx = px + (Math.random() - 0.5) * spread;
      const ny = py + height / segments;
      ctx.lineTo(nx, ny);
      
      // Branches
      if (Math.random() < (effect.config.branchChance || 0.3)) {
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(nx, ny);
        const bx = nx + (Math.random() - 0.5) * spread * 2;
        const by = ny + height / segments * 0.5;
        ctx.lineTo(bx, by);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(nx, ny);
      }
      
      px = nx;
      py = ny;
    }
    ctx.stroke();
    
    // Glow
    ctx.globalAlpha = alpha * 0.3;
    ctx.lineWidth = (effect.config.width || 3) * 3;
    ctx.beginPath();
    ctx.moveTo(effect.x, effect.y);
    px = effect.x; py = effect.y;
    for (let i = 1; i <= segments; i++) {
      const nx = px + (Math.random() - 0.5) * spread;
      const ny = py + height / segments;
      ctx.lineTo(nx, ny);
      px = nx; py = ny;
    }
    ctx.stroke();
    
    ctx.globalAlpha = 1;
  },
  
  renderTeleport(ctx, effect) {
    const alpha = 1 - (effect.timer / effect.maxTimer);
    const columns = effect.config.columns || 8;
    const colW = effect.config.columnWidth || 3;
    const height = (effect.config.height || 60) * effect.scale;
    
    for (let i = 0; i < columns; i++) {
      const cx = effect.x + (i - columns/2) * (colW + 2);
      const delay = i * 2;
      const t = Math.max(0, effect.timer - delay);
      const h = Math.min(height, t * 5);
      
      ctx.fillStyle = effect.color;
      ctx.globalAlpha = alpha * (0.3 + Math.sin(t * 0.3 + i) * 0.3);
      ctx.fillRect(cx - colW/2, effect.y - h/2, colW, h);
    }
    ctx.globalAlpha = 1;
  }
};

// SECTION 70: CINEMATIC CAMERA SYSTEM

const CinematicCamera = {
  targetX: 0,
  targetY: 0,
  currentX: 0,
  currentY: 0,
  zoom: 1,
  targetZoom: 1,
  zoomSpeed: 0.05,
  followSpeed: 0.1,
  shakeX: 0,
  shakeY: 0,
  cinematicMode: false,
  cinematicSequence: [],
  cinematicTimer: 0,
  cinematicIndex: 0,
  
  // Set camera to follow a target
  follow(x, y) {
    this.targetX = x;
    this.targetY = y;
  },
  
  // Zoom to a specific level
  zoomTo(level) {
    this.targetZoom = Math.max(0.5, Math.min(2, level));
  },
  
  // Start cinematic sequence
  startCinematic(sequence) {
    this.cinematicMode = true;
    this.cinematicSequence = sequence;
    this.cinematicIndex = 0;
    this.cinematicTimer = 0;
  },
  
  update() {
    // Smooth follow
    this.currentX += (this.targetX - this.currentX) * this.followSpeed;
    this.currentY += (this.targetY - this.currentY) * this.followSpeed;
    
    // Smooth zoom
    this.zoom += (this.targetZoom - this.zoom) * this.zoomSpeed;
    
    // Cinematic sequence
    if (this.cinematicMode && this.cinematicSequence.length > 0) {
      this.cinematicTimer++;
      const step = this.cinematicSequence[this.cinematicIndex];
      if (step) {
        if (step.target) {
          this.follow(step.target.x, step.target.y);
        }
        if (step.zoom) {
          this.zoomTo(step.zoom);
        }
        if (this.cinematicTimer >= step.duration) {
          this.cinematicIndex++;
          this.cinematicTimer = 0;
          if (this.cinematicIndex >= this.cinematicSequence.length) {
            this.cinematicMode = false;
            this.targetZoom = 1;
          }
        }
      }
    }
  },
  
  apply(ctx) {
    const W = 420, H = 750;
    const centerX = W / 2;
    const centerY = H / 2;
    
    // Apply zoom
    if (this.zoom !== 1) {
      ctx.translate(centerX, centerY);
      ctx.scale(this.zoom, this.zoom);
      ctx.translate(-centerX, -centerY);
    }
    
    // Apply camera offset (limited)
    const offsetX = -(this.currentX - centerX) * (this.zoom - 1);
    const offsetY = -(this.currentY - centerY) * (this.zoom - 1);
    ctx.translate(offsetX + this.shakeX, offsetY + this.shakeY);
  },
  
  reset() {
    this.targetX = 210;
    this.targetY = 375;
    this.currentX = 210;
    this.currentY = 375;
    this.zoom = 1;
    this.targetZoom = 1;
    this.cinematicMode = false;
  }
};

    for (let evt of this.eventPool) {

function renderEnhancedAchievementsScreen(ctx) {
  const W = 420, H = 750;
  
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);
  
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ACHIEVEMENTS', W/2, 35);
  
  // Count
  const unlocked = AchievementSystem.getUnlockedCount();
  const total = AchievementSystem.getTotalCount();
  ctx.fillStyle = '#AAAAAA';
  ctx.font = '11px monospace';
  ctx.fillText(`${unlocked}/${total} Unlocked (${Math.floor(unlocked/total*100)}%)`, W/2, 55);
  
  // Progress bar
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, 30, 62, W - 60, 6, 3);
  ctx.fill();
  ctx.fillStyle = '#FFD700';
  roundRect(ctx, 30, 62, (W - 60) * (unlocked / total), 6, 3);
  ctx.fill();
  
  // Filter tabs
  if (!gameState.achFilter) gameState.achFilter = 'all';
  const filters = [
    { id: 'all', label: 'ALL' },
    { id: 'unlocked', label: '✓' },
    { id: 'locked', label: '🔒' }
  ];
  
  const filterW = 60;
  const filterStartX = W/2 - (filters.length * (filterW + 5)) / 2;
  
  for (let i = 0; i < filters.length; i++) {
    const fx = filterStartX + i * (filterW + 5);
    const isActive = gameState.achFilter === filters[i].id;
    
    ctx.fillStyle = isActive ? 'rgba(255,215,0,0.2)' : 'rgba(255,255,255,0.05)';
    ctx.strokeStyle = isActive ? '#FFD700' : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    roundRect(ctx, fx, 78, filterW, 22, 5);
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = isActive ? '#FFD700' : '#888888';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(filters[i].label, fx + filterW/2, 93);
  }
  
  // Achievement list
  const achStartY = 110;
  const achH = 62;
  const visibleH = H - achStartY - 60;
  
  let filteredAch = AchievementSystem.achievements;
  if (gameState.achFilter === 'unlocked') filteredAch = filteredAch.filter(a => a.unlocked);
  else if (gameState.achFilter === 'locked') filteredAch = filteredAch.filter(a => !a.unlocked);
  
  if (!gameState.achScroll) gameState.achScroll = 0;
  const maxScroll = Math.max(0, filteredAch.length * achH - visibleH);
  gameState.achScroll = clamp(gameState.achScroll, 0, maxScroll);
  
  ctx.save();
  ctx.beginPath();
  ctx.rect(10, achStartY, W - 20, visibleH);
  ctx.clip();
  
  const tierColors = {
    Common: '#AAAAAA',
    Uncommon: '#44FF44',
    Rare: '#44AAFF',
    Epic: '#AA44FF',
    Legendary: '#FFD700'
  };
  
  for (let i = 0; i < filteredAch.length; i++) {
    const ach = filteredAch[i];
    const ay = achStartY + i * achH - gameState.achScroll;
    
    if (ay + achH < achStartY || ay > achStartY + visibleH) continue;
    
    // Card
    ctx.fillStyle = ach.unlocked ? (ach.color || '#888888') + '10' : 'rgba(255,255,255,0.02)';
    ctx.strokeStyle = ach.unlocked ? (ach.color || '#888888') + '44' : 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    roundRect(ctx, 15, ay + 1, W - 30, achH - 2, 8);
    ctx.fill();
    ctx.stroke();
    
    if (ach.unlocked) {
      // Icon
      ctx.font = '22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(ach.icon, 38, ay + 35);
      
      // Name
      ctx.fillStyle = ach.color || '#FFFFFF';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(ach.name, 58, ay + 20);
      
      // Description
      ctx.fillStyle = '#AAAAAA';
      ctx.font = '10px monospace';
      ctx.fillText(ach.desc, 58, ay + 36);
      
      // Rarity
      ctx.fillStyle = tierColors[ach.rarity] || '#888888';
      ctx.font = '8px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(ach.rarity, W - 25, ay + 52);
      
      // Checkmark
      ctx.fillStyle = '#44FF44';
      ctx.font = '14px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('✓', W - 25, ay + 22);
    } else {
      // Locked
      ctx.font = '22px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#444444';
      ctx.fillText('🔒', 38, ay + 35);
      
      ctx.fillStyle = '#666666';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(ach.name, 58, ay + 20);
      
      ctx.fillStyle = '#555555';
      ctx.font = '10px monospace';
      ctx.fillText(ach.desc, 58, ay + 36);
      
      ctx.fillStyle = '#444444';
      ctx.font = '8px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(ach.rarity, W - 25, ay + 52);
    }
  }
  
  ctx.restore();
  
  // Back button
  drawGlassButton(ctx, W/2 - 60, H - 50, 120, 36, 'BACK', '#FF4444', true);
}

      effects: { convertChance: 0.1 } }
  ],
  
  collect(relicId) {
    if (this.collected.length >= this.maxRelics) return false;
    const relic = this.relics.find(r => r.id === relicId);
    if (!relic) return false;
    if (this.collected.find(r => r.id === relicId)) return false;
    
    this.collected.push({ ...relic });
    if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('achievement');
    return true;
  },
  
  hasRelic(relicId) {
    return this.collected.some(r => r.id === relicId);
  },
  
  getEffects() {
    const combined = {};
    for (let relic of this.collected) {
      for (let key in relic.effects) {
        if (typeof relic.effects[key] === 'number') {
          combined[key] = (combined[key] || 0) + relic.effects[key];
        } else {
          combined[key] = relic.effects[key];
        }
      }
    }
    return combined;
  },
  
  generateChoice(count) {
    count = count || 3;
    const available = this.relics.filter(r => !this.collected.find(c => c.id === r.id));
    const choices = [];
    const pool = [...available];
    
    for (let i = 0; i < count && pool.length > 0; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      choices.push(pool.splice(idx, 1)[0]);
    }
    return choices;
  },
  
  render(ctx, x, y) {
    if (this.collected.length === 0) return;
    
    const iconSize = 20;
    const spacing = 24;
    
    for (let i = 0; i < this.collected.length; i++) {
      const relic = this.collected[i];
      const rx = x + i * spacing;
      
      // Background
      ctx.fillStyle = relic.color + '33';
      ctx.strokeStyle = relic.color;
      ctx.lineWidth = 1;
      roundRect(ctx, rx, y, iconSize, iconSize, 4);
      ctx.fill();
      ctx.stroke();
      
      // Icon
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(relic.icon, rx + iconSize/2, y + 15);
    }
  }
};

function renderRelicChoiceScreen(ctx) {
  const W = 420, H = 750;
  
  // Darken background
  ctx.fillStyle = 'rgba(0,0,10,0.9)';
  ctx.fillRect(0, 0, W, H);
  
  // Title
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CHOOSE A RELIC', W/2, 60);
  
  ctx.fillStyle = '#888888';
  ctx.font = '11px monospace';
  ctx.fillText('Relics provide powerful passive bonuses', W/2, 80);
  
  // Generate choices if not already done
  if (!gameState.relicChoices || gameState.relicChoices.length === 0) {
    gameState.relicChoices = RelicSystem.generateChoice(3);
  }
  
  const choices = gameState.relicChoices;
  const cardW = W - 60;
  const cardH = 140;
  const startY = 110;
  const cardSpacing = cardH + 20;
  
  const tierColors = {
    common: '#AAAAAA',
    uncommon: '#44FF44',
    rare: '#44AAFF',
    epic: '#AA44FF',
    legendary: '#FFD700',
    mythic: '#FF0044'
  };
  
  for (let i = 0; i < choices.length; i++) {
    const relic = choices[i];
    const cy = startY + i * cardSpacing;
    const color = tierColors[relic.rarity] || '#888888';
    
    // Card background
    ctx.fillStyle = color + '15';
    ctx.strokeStyle = color + '66';
    ctx.lineWidth = 2;
    roundRect(ctx, 30, cy, cardW, cardH, 12);
    ctx.fill();
    ctx.stroke();
    
    // Inner glow
    const glow = ctx.createLinearGradient(30, cy, 30, cy + cardH);
    glow.addColorStop(0, color + '15');
    glow.addColorStop(0.5, 'transparent');
    glow.addColorStop(1, color + '10');
    ctx.fillStyle = glow;
    roundRect(ctx, 30, cy, cardW, cardH, 12);
    ctx.fill();
    
    // Icon
    ctx.font = '36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(relic.icon, 70, cy + 50);
    
    // Name
    ctx.fillStyle = relic.color || '#FFFFFF';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(relic.name, 100, cy + 28);
    
    // Rarity
    ctx.fillStyle = color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(relic.rarity.toUpperCase(), W - 40, cy + 18);
    
    // Description
    ctx.fillStyle = '#CCCCCC';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    
    // Word wrap description
    const words = relic.desc.split(' ');
    let line = '';
    let lineY = cy + 50;
    for (let w of words) {
      const testLine = line + w + ' ';
      if (ctx.measureText(testLine).width > cardW - 90) {
        ctx.fillText(line.trim(), 100, lineY);
        line = w + ' ';
        lineY += 14;
      } else {
        line = testLine;
      }
    }
    if (line.trim()) ctx.fillText(line.trim(), 100, lineY);
    
    // Effects preview
    ctx.fillStyle = '#44FF4488';
    ctx.font = '9px monospace';
    const effectStrs = [];
    for (let key in relic.effects) {
      const val = relic.effects[key];
      if (typeof val === 'number') {
        effectStrs.push(key + ': +' + (val * 100).toFixed(0) + '%');
      } else if (val === true) {
        effectStrs.push(key);
      }
    }
    ctx.fillText(effectStrs.join(' | '), 100, cy + cardH - 12);
    
    // Select button
    ctx.fillStyle = color + '33';
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    roundRect(ctx, W - 100, cy + cardH - 35, 55, 25, 6);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SELECT', W - 72, cy + cardH - 18);
  }
  
  // Skip button
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  roundRect(ctx, W/2 - 40, H - 50, 80, 28, 6);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#888888';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SKIP', W/2, H - 32);
}

  updateProgress(metric, value) {
    if (!this.activeChallenge) return;
    if (this.activeChallenge.metric === metric) {
      this.progress = value;
      if (this.progress >= this.activeChallenge.target) {
        this.complete();
      }
    }
  },
  
  complete() {
    if (!this.activeChallenge) return;
    
    const elapsed = Date.now() - this.startTime;
    
    // Update best records
    if (this.activeChallenge.bestTime !== undefined) {
      this.activeChallenge.bestTime = Math.min(this.activeChallenge.bestTime, elapsed);
    }
    if (this.activeChallenge.bestWave !== undefined) {
      this.activeChallenge.bestWave = Math.max(this.activeChallenge.bestWave, this.progress);
    }
    
    // Announce
    ComboSystem.addAnnouncement('CHALLENGE COMPLETE!', '#FFD700');
    if (typeof Audio !== 'undefined' && Audio.ctx) Audio.play('achievement');
    
    this.activeChallenge = null;
  },
  
  render(ctx) {
    if (!this.activeChallenge) return;
    
    const W = 420;
    const ch = this.activeChallenge;
    const pct = Math.min(1, this.progress / ch.target);
    
    // Challenge bar
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    roundRect(ctx, 10, 88, W - 20, 20, 4);
    ctx.fill();
    
    ctx.fillStyle = ch.color + '66';
    roundRect(ctx, 10, 88, (W - 20) * pct, 20, 4);
    ctx.fill();
    
    ctx.fillStyle = ch.color;
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`${ch.icon} ${ch.name}: ${Math.floor(this.progress)}/${ch.target}`, W/2, 102);
  }
};

  starPoints: 0,
  
  canUnlock(nodeId) {
    const node = this.nodes.find(n => n.id === nodeId);
    if (!node || node.unlocked) return false;
    if (this.starPoints < node.cost) return false;
    
    // Check if any prerequisite node is connected and unlocked
    // (First node in each chain has no prereqs - always available)
    const hasParent = this.nodes.some(n => n.connections.includes(nodeId));
    if (!hasParent) return true; // Root node
    
    return this.nodes.some(n => n.connections.includes(nodeId) && n.unlocked);
  },
  
  unlock(nodeId) {
    if (!this.canUnlock(nodeId)) return false;
    const node = this.nodes.find(n => n.id === nodeId);
    node.unlocked = true;
    this.starPoints -= node.cost;
    return true;
  },
  
  getTotalBonuses() {
    const bonuses = {};
    for (let node of this.nodes) {
      if (node.unlocked) {
        bonuses[node.stat] = (bonuses[node.stat] || 0) + node.value;
      }
    }
    return bonuses;

          ctx.lineTo(connNode.x, connNode.y);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
    }
    
    // Draw nodes
    for (let node of this.nodes) {
      const canBuy = this.canUnlock(node.id);
      
      // Glow for unlocked
      if (node.unlocked) {
        const glowR = 15 + Math.sin(t * 3 + node.x) * 3;

      ctx.beginPath();
      ctx.arc(node.x, node.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      
      // Star shape for unlocked
      if (node.unlocked) {
        ctx.fillStyle = '#FFFFFF';

        for (let i = 0; i < 5; i++) {
          const angle = (i * Math.PI * 2 / 5) - Math.PI/2;

          if (i === 0) ctx.moveTo(node.x + Math.cos(angle) * r, node.y + Math.sin(angle) * r);

  },
  
  noteTimer: 0,

  // Simple patterns (indices into notes array)
  patterns: [
    [0, 2, 4, 2, 0, 3, 5, 3],
    [0, 1, 2, 3, 4, 3, 2, 1],
    [4, 3, 2, 1, 0, 1, 2, 3],
    [0, 4, 2, 5, 1, 3, 0, 4],
    [5, 4, 3, 2, 1, 0, 1, 2]
  ],
  
  start(trackName) {
    if (typeof Audio === 'undefined' || !Audio.ctx) return;
    
    const track = this.tracks[trackName];
    if (!track) return;
    
    this.currentTrack = track;
    this.isPlaying = true;
    this.noteTimer = 0;
    this.noteIndex = 0;
    this.patternIndex = 0;
  },
  
  stop() {
    this.isPlaying = false;
    this.currentTrack = null;
    // Clean up oscillators
    for (let osc of this.oscillators) {
      try { osc.stop(); } catch(e) {}
    }
    this.oscillators = [];
  },
  
  update() {
    if (!this.isPlaying || !this.currentTrack) return;
    if (typeof Audio === 'undefined' || !Audio.ctx) return;
    
    const track = this.currentTrack;
    const beatsPerSecond = track.tempo / 60;
    const framesPerBeat = 60 / beatsPerSecond;
    
    this.noteTimer++;
    
    if (this.noteTimer >= framesPerBeat) {
      this.noteTimer = 0;
      this.playNote();
    }
  },
  
  playNote() {
    if (!this.currentTrack) return;
    const ctx = Audio.ctx;
    const now = ctx.currentTime;
    const track = this.currentTrack;
    
    try {
      const pattern = this.patterns[this.patternIndex % this.patterns.length];
      const noteIdx = pattern[this.noteIndex % pattern.length];
      const freq = track.notes[noteIdx % track.notes.length];
      
      // Main note
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = track.mood === 'ethereal' ? 'sine' : 
                 track.mood === 'battle' ? 'sawtooth' : 
                 track.mood === 'ambient' ? 'sine' : 'triangle';
      osc.frequency.setValueAtTime(freq, now);
      
      const noteLength = 0.3;
      gain.gain.setValueAtTime(this.volume * 0.5, now);
      gain.gain.linearRampToValueAtTime(0, now + noteLength);
      
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + noteLength);
      
      // Bass note (every other beat)
      if (this.noteIndex % 2 === 0) {
        const bassOsc = ctx.createOscillator();
        const bassGain = ctx.createGain();
        bassOsc.type = 'sine';
        bassOsc.frequency.setValueAtTime(freq / 2, now);
        bassGain.gain.setValueAtTime(this.volume * 0.3, now);
        bassGain.gain.linearRampToValueAtTime(0, now + 0.4);
        bassOsc.connect(bassGain);
        bassGain.connect(ctx.destination);
        bassOsc.start(now);
        bassOsc.stop(now + 0.4);
      }
      
      this.noteIndex++;
      if (this.noteIndex >= pattern.length) {
        this.noteIndex = 0;
        this.patternIndex++;
      }
    } catch(e) {}
  },
  
  setVolume(vol) {
    this.volume = Math.max(0, Math.min(1, vol));
  }
};

            ctx.stroke();
          }
          break;
        case 'dash':
          ctx.beginPath();
          ctx.arc(W - 70, H - 100, 30 + pulseR, 0, Math.PI * 2);
          ctx.stroke();
          break;
        case 'combo':
          roundRect(ctx, W - 55, 40, 50, 30 + pulseR, 6);
          ctx.stroke();
          break;
        case 'abilities':
          roundRect(ctx, W - 170, H - 170, 160, 50 + pulseR, 6);
          ctx.stroke();
          break;
      }
      ctx.setLineDash([]);
    }
  }
};

// ============================================================
// SECTION 82: NOTIFICATION QUEUE SYSTEM
// ============================================================

const NotificationQueue = {
  queue: [],
  current: null,
  timer: 0,
  duration: 120,
  slideY: 0,
  
  add(text, color, icon, priority) {
    this.queue.push({
      text: text,
      color: color || '#FFFFFF',
      icon: icon || '',
      priority: priority || 0
    });
    
    // Sort by priority
    this.queue.sort((a, b) => b.priority - a.priority);
  },
  
  update() {
    if (this.current) {
      this.timer++;
      
      if (this.timer < 15) {
        this.slideY = Math.min(30, this.slideY + 2);
      } else if (this.timer > this.duration - 15) {
        this.slideY = Math.max(0, this.slideY - 2);
      }
      
      if (this.timer >= this.duration) {
        this.current = null;
        this.timer = 0;
        this.slideY = 0;
      }
    } else if (this.queue.length > 0) {
      this.current = this.queue.shift();
      this.timer = 0;
      this.slideY = 0;
    }
  },
  
  render(ctx) {
    if (!this.current || this.slideY <= 0) return;
    
    const W = 420;
    const notifW = 280;
    const notifH = 28;
    const x = (W - notifW) / 2;
    const y = 38 - notifH + this.slideY;
    
    ctx.fillStyle = 'rgba(10,10,30,0.9)';
    ctx.strokeStyle = this.current.color + '66';
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, notifW, notifH, 6);
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = this.current.color;
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText((this.current.icon ? this.current.icon + ' ' : '') + this.current.text, W/2, y + 18);
  }
};

const GameStateSerializer = {
  // Serialize current game state for pause/resume
  serialize() {
    try {
      return {
        version: '5.0',
        timestamp: Date.now(),
        screen: gameState.screen,
        wave: gameState.wave,
        score: gameState.score,
        biome: gameState.biome,
        player: {
          x: player.x,
          y: player.y,
          hp: player.hp,
          maxHP: player.maxHP,
          shield: player.shield,
          maxShield: player.maxShield,
          level: player.level,
          xp: player.xp,
          xpToNext: player.xpToNext,
          attack: player.attack,
          defense: player.defense,
          speed: player.speed,
          element: player.element,
          coins: player.coins
        },
        combo: {
          count: ComboSystem.combo,
          max: ComboSystem.maxCombo,
          rank: ComboSystem.rank
        },
        statistics: { ...Statistics.session },
        bossActive: !!BossSystem.activeBoss,
        bossType: BossSystem.activeBoss,
        bossPhase: BossSystem.bossPhase,
        weather: Weather.current,
        powerUps: PowerUpSystem.activePowerUps.map(p => ({
          typeId: p.typeId,
          timer: p.timer
        })),
        relics: RelicSystem.collected.map(r => r.id)
      };
    } catch(e) {
      return null;
    }
  },
  
  // Deserialize and restore game state
  deserialize(data) {
    if (!data || data.version !== '5.0') return false;
    
    try {
      gameState.screen = data.screen;
      gameState.wave = data.wave;
      gameState.score = data.score;
      gameState.biome = data.biome;
      
      Object.assign(player, data.player);
      
      ComboSystem.combo = data.combo.count;
      ComboSystem.maxCombo = data.combo.max;
      ComboSystem.rank = data.combo.rank;
      ComboSystem.updateRank();
      
      Object.assign(Statistics.session, data.statistics);
      
      if (data.bossActive) {
        BossSystem.activeBoss = data.bossType;
        BossSystem.bossPhase = data.bossPhase;
      }
      
      Weather.setWeather(data.weather);
      
      // Restore relics
      RelicSystem.collected = [];
      for (let relicId of data.relics) {
        RelicSystem.collect(relicId);
      }
      
      return true;
    } catch(e) {
      return false;
    }
  },
  
  // Quick save to localStorage
  quickSave() {
    const data = this.serialize();
    if (data) {
      try {
        localStorage.setItem('VR5_quicksave', JSON.stringify(data));
        NotificationQueue.add('Game Saved', '#44FF44', '💾');
        return true;
      } catch(e) {}
    }
    return false;
  },
  
  // Quick load from localStorage
  quickLoad() {
    try {
      const raw = localStorage.getItem('VR5_quicksave');
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (this.deserialize(data)) {
        NotificationQueue.add('Game Loaded', '#44AAFF', '📂');
        return true;
      }
    } catch(e) {}
    return false;
  }
};

// Helper to get enemy variant for spawning
function getEnemyVariant(biome, type) {
  try {
    const b = EnemyVariants[biome] || EnemyVariants.nebula;
    return b[type] || b.grunt;
  } catch(e) {
    return EnemyVariants.nebula.grunt;
  }
}

  rollDrop: function(table) {
    try {
      const drops = this[table] || this.commonDrops;
      const totalWeight = drops.reduce((s, d) => s + (d.weight || 0), 0);
      let roll = Math.random() * totalWeight;
      for(const drop of drops) {
        roll -= (drop.weight || 0);
        if(roll <= 0) {
          const amt = Array.isArray(drop.amount) ?
            Math.floor(drop.amount[0] + Math.random()*(drop.amount[1]-drop.amount[0]+1)) :
            (drop.amount || 1);
          return { type: drop.type, amount: amt };
        }
      }
      return { type: 'credits', amount: 5 };
    } catch(e) { return { type: 'credits', amount: 5 }; }
  },

  getDropsForEnemy: function(enemyType, wave, biome) {
    try {
      const drops = [];
      const baseTable = wave < 5 ? 'commonDrops' :
                        wave < 10 ? 'uncommonDrops' :
                        wave < 20 ? 'rareDrops' :
                        wave < 30 ? 'epicDrops' : 'legendaryDrops';

      drops.push(this.rollDrop(baseTable));

      if(enemyType === 'tank' || enemyType === 'bomber') {
        drops.push(this.rollDrop(baseTable));
        if(Math.random() < 0.3) {
          const betterTable = wave < 10 ? 'rareDrops' :
                              wave < 20 ? 'epicDrops' : 'legendaryDrops';
          drops.push(this.rollDrop(betterTable));
        }
      }
      if(enemyType === 'healer' || enemyType === 'sniper') {
        if(Math.random() < 0.4) drops.push(this.rollDrop(baseTable));
      }
      if(enemyType === 'splitter') {
        if(Math.random() < 0.2) drops.push(this.rollDrop(baseTable));
      }
      return drops;
    } catch(e) { return [{ type: 'credits', amount: 5 }]; }
  },

  getDropsForBoss: function(bossId) {
    try {
      const bossTable = this.bossDrops[bossId] || this.bossDrops.warden;
      const drops = [...bossTable.guaranteed.map(g => ({
        type: g.type,
        amount: Array.isArray(g.amount) ?
          Math.floor(g.amount[0] + Math.random()*(g.amount[1]-g.amount[0]+1)) :
          g.amount
      }))];

      const numBonus = 2 + Math.floor(Math.random() * 3);
      for(let i = 0; i < numBonus; i++) {
        const totalWeight = bossTable.bonus.reduce((s, b) => s + (b.weight||0), 0);
        let roll = Math.random() * totalWeight;
        for(const bonus of bossTable.bonus) {

                (bonus.amount || 1)
            });
            break;
          }
        }
      }
      return drops;
    } catch(e) { return [{ type: 'credits', amount: 100 }]; }
  }
};

// SECTION 87: COLLISION SYSTEM REFINED
// Spatial hash grid for efficient collision detection
// ============================================================
const CollisionGrid = {
  cellSize: 40,
  grid: {},
  
  clear: function() {
    this.grid = {};
  },

  getKey: function(x, y) {
    const cx = Math.floor(x / this.cellSize);
    const cy = Math.floor(y / this.cellSize);
    return cx + ',' + cy;
  },

  insert: function(entity) {
    try {
      if(!entity || !entity.active) return;
      const x = safeNum(entity.x);
      const y = safeNum(entity.y);
      const s = safeNum(entity.size || entity.s, 10);
      const minCX = Math.floor((x - s) / this.cellSize);
      const maxCX = Math.floor((x + s) / this.cellSize);
      const minCY = Math.floor((y - s) / this.cellSize);
      const maxCY = Math.floor((y + s) / this.cellSize);
      for(let cx = minCX; cx <= maxCX; cx++) {
        for(let cy = minCY; cy <= maxCY; cy++) {
          const key = cx + ',' + cy;
          if(!this.grid[key]) this.grid[key] = [];
          this.grid[key].push(entity);
        }
      }
    } catch(e) {}
  },

  query: function(x, y, radius) {
    try {
      const results = new Set();
      const minCX = Math.floor((x - radius) / this.cellSize);
      const maxCX = Math.floor((x + radius) / this.cellSize);
      const minCY = Math.floor((y - radius) / this.cellSize);
      const maxCY = Math.floor((y + radius) / this.cellSize);
      for(let cx = minCX; cx <= maxCX; cx++) {
        for(let cy = minCY; cy <= maxCY; cy++) {
          const key = cx + ',' + cy;
          const cell = this.grid[key];
          if(cell) {
            for(let i = 0; i < cell.length; i++) {
              results.add(cell[i]);
            }
          }
        }
      }
      return Array.from(results);
    } catch(e) { return []; }
  },

  checkCollision: function(a, b) {
    try {
      if(!a || !b || !a.active || !b.active) return false;
      const dx = safeNum(a.x) - safeNum(b.x);
      const dy = safeNum(a.y) - safeNum(b.y);
      const dist = dx*dx + dy*dy;
      const minDist = safeNum(a.size||a.s, 8) + safeNum(b.size||b.s, 8);
      return dist < minDist * minDist;
    } catch(e) { return false; }
  },

  processCollisions: function(groupA, groupB, callback) {
    try {
      this.clear();
      for(let i = 0; i < groupB.length; i++) {
        if(groupB[i] && groupB[i].active) {
          this.insert(groupB[i]);
        }
      }
      for(let i = 0; i < groupA.length; i++) {
        const a = groupA[i];
        if(!a || !a.active) continue;
        const nearby = this.query(safeNum(a.x), safeNum(a.y), safeNum(a.size||a.s, 8) + this.cellSize);
        for(let j = 0; j < nearby.length; j++) {
          const b = nearby[j];
          if(b.active && this.checkCollision(a, b)) {
            callback(a, b);
          }
        }
      }
    } catch(e) {}
  }
};

// ============================================================
// SECTION 89: ADVANCED SHIP RENDERING SYSTEM
// Detailed procedural ship drawings for all 8 ships
// ============================================================
const ShipRenderer = {
  renderShip: function(ctx, shipId, x, y, size, time, element) {
    try {
      const s = size || 16;
      const t = time || 0;
      ctx.save();
      ctx.translate(x, y);
      
      switch(shipId) {
        case 0: this.drawVoidRunner(ctx, s, t, element); break;
        case 1: this.drawStarLance(ctx, s, t, element); break;
        case 2: this.drawIronclad(ctx, s, t, element); break;
        case 3: this.drawPhantom(ctx, s, t, element); break;
        case 4: this.drawTempest(ctx, s, t, element); break;
        case 5: this.drawCrystalWing(ctx, s, t, element); break;
        case 6: this.drawInferno(ctx, s, t, element); break;
        case 7: this.drawVoidWraith(ctx, s, t, element); break;
        default: this.drawVoidRunner(ctx, s, t, element); break;
      }
      ctx.restore();
    } catch(e) {}
  },

  getElementColor: function(element) {
    const colors = {
      fire: '#ff4400', ice: '#44aaff', lightning: '#ffee00',
      poison: '#44ff44', plasma: '#ff44ff', void: '#9944cc',
      neutral: '#88aacc'
    };
    return colors[element] || colors.neutral;
  },

  getElementGlow: function(element) {
    const glows = {
      fire: '#ff660044', ice: '#44aaff44', lightning: '#ffee0044',
      poison: '#44ff4444', plasma: '#ff44ff44', void: '#9944cc44',
      neutral: '#88aacc44'
    };
    return glows[element] || glows.neutral;
  },

  drawVoidRunner: function(ctx, s, t, element) {
    const ec = this.getElementColor(element);
    // Main body
    ctx.fillStyle = '#4488cc';
    ctx.beginPath();
    ctx.moveTo(0, -s*1.3);
    ctx.lineTo(s*0.3, -s*0.5);
    ctx.lineTo(s*0.5, s*0.3);
    ctx.lineTo(s*0.3, s*0.8);
    ctx.lineTo(-s*0.3, s*0.8);
    ctx.lineTo(-s*0.5, s*0.3);
    ctx.lineTo(-s*0.3, -s*0.5);
    ctx.closePath();
    ctx.fill();
    // Wings
    ctx.fillStyle = '#3366aa';
    ctx.beginPath();
    ctx.moveTo(s*0.3, -s*0.2);
    ctx.lineTo(s*1.1, s*0.3);
    ctx.lineTo(s*0.8, s*0.8);
    ctx.lineTo(s*0.4, s*0.5);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-s*0.3, -s*0.2);
    ctx.lineTo(-s*1.1, s*0.3);
    ctx.lineTo(-s*0.8, s*0.8);
    ctx.lineTo(-s*0.4, s*0.5);
    ctx.closePath();
    ctx.fill();
    // Cockpit
    ctx.fillStyle = '#66ccff';
    ctx.beginPath();
    ctx.ellipse(0, -s*0.4, s*0.15, s*0.3, 0, 0, Math.PI*2);
    ctx.fill();
    // Engine glow
    const glow = 0.6 + Math.sin(t*8)*0.4;
    ctx.fillStyle = ec;
    ctx.globalAlpha = glow;
    ctx.beginPath();
    ctx.ellipse(-s*0.15, s*0.9, s*0.1, s*0.15+Math.sin(t*10)*s*0.05, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s*0.15, s*0.9, s*0.1, s*0.15+Math.sin(t*10+1)*s*0.05, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Element accent
    ctx.strokeStyle = ec;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -s*1.3);
    ctx.lineTo(0, -s*0.3);
    ctx.stroke();
  },

  drawStarLance: function(ctx, s, t, element) {
    const ec = this.getElementColor(element);
    // Narrow, fast ship
    ctx.fillStyle = '#55cc88';
    ctx.beginPath();
    ctx.moveTo(0, -s*1.5);
    ctx.lineTo(s*0.2, -s*0.8);
    ctx.lineTo(s*0.35, s*0.5);
    ctx.lineTo(s*0.15, s);
    ctx.lineTo(-s*0.15, s);
    ctx.lineTo(-s*0.35, s*0.5);
    ctx.lineTo(-s*0.2, -s*0.8);
    ctx.closePath();
    ctx.fill();
    // Side fins
    ctx.fillStyle = '#44aa77';
    ctx.beginPath();
    ctx.moveTo(s*0.35, s*0.1);
    ctx.lineTo(s*0.9, s*0.6);
    ctx.lineTo(s*0.7, s*0.9);
    ctx.lineTo(s*0.35, s*0.5);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-s*0.35, s*0.1);
    ctx.lineTo(-s*0.9, s*0.6);
    ctx.lineTo(-s*0.7, s*0.9);
    ctx.lineTo(-s*0.35, s*0.5);
    ctx.closePath();
    ctx.fill();
    // Cockpit
    ctx.fillStyle = '#88ffbb';
    ctx.beginPath();
    ctx.ellipse(0, -s*0.5, s*0.1, s*0.25, 0, 0, Math.PI*2);
    ctx.fill();
    // Engine
    const glow = 0.6+Math.sin(t*10)*0.4;
    ctx.fillStyle = ec;
    ctx.globalAlpha = glow;
    ctx.beginPath();
    ctx.ellipse(0, s*1.1, s*0.08, s*0.2+Math.sin(t*12)*s*0.08, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  },

  drawIronclad: function(ctx, s, t, element) {
    const ec = this.getElementColor(element);
    // Heavy, boxy ship
    ctx.fillStyle = '#888899';
    ctx.beginPath();
    ctx.moveTo(0, -s*1.1);
    ctx.lineTo(s*0.5, -s*0.5);
    ctx.lineTo(s*0.7, 0);
    ctx.lineTo(s*0.7, s*0.7);
    ctx.lineTo(s*0.3, s);
    ctx.lineTo(-s*0.3, s);
    ctx.lineTo(-s*0.7, s*0.7);
    ctx.lineTo(-s*0.7, 0);
    ctx.lineTo(-s*0.5, -s*0.5);
    ctx.closePath();
    ctx.fill();
    // Armor plates
    ctx.fillStyle = '#777788';
    ctx.fillRect(-s*0.5, -s*0.3, s, s*0.6);
    ctx.fillStyle = '#999aab';
    ctx.fillRect(-s*0.35, -s*0.2, s*0.7, s*0.4);
    // Shield generators (side pods)
    ctx.fillStyle = '#6677aa';
    ctx.beginPath(); ctx.arc(-s*0.8, s*0.2, s*0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(s*0.8, s*0.2, s*0.2, 0, Math.PI*2); ctx.fill();
    // Cockpit
    ctx.fillStyle = '#aabbdd';
    ctx.beginPath();
    ctx.arc(0, -s*0.4, s*0.18, 0, Math.PI*2);
    ctx.fill();
    // Shield glow
    const shieldPulse = 0.2 + Math.sin(t*3)*0.15;
    ctx.strokeStyle = `rgba(100,150,255,${shieldPulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, s*1.2, 0, Math.PI*2);
    ctx.stroke();
    // Engines
    const glow = 0.5 + Math.sin(t*8)*0.3;
    ctx.fillStyle = ec;
    ctx.globalAlpha = glow;
    ctx.fillRect(-s*0.5, s*0.95, s*0.3, s*0.2+Math.sin(t*10)*s*0.05);
    ctx.fillRect(s*0.2, s*0.95, s*0.3, s*0.2+Math.sin(t*10+0.5)*s*0.05);
    ctx.globalAlpha = 1;
  },

  drawPhantom: function(ctx, s, t, element) {
    const ec = this.getElementColor(element);
    // Stealth ship, sleek curves
    const phase = 0.7 + Math.sin(t*2)*0.15;
    ctx.globalAlpha = phase;
    ctx.fillStyle = '#556677';
    ctx.beginPath();
    ctx.moveTo(0, -s*1.3);
    ctx.bezierCurveTo(s*0.5, -s*0.8, s*0.8, -s*0.2, s*0.6, s*0.5);
    ctx.lineTo(s*0.2, s*0.8);
    ctx.lineTo(-s*0.2, s*0.8);
    ctx.lineTo(-s*0.6, s*0.5);
    ctx.bezierCurveTo(-s*0.8, -s*0.2, -s*0.5, -s*0.8, 0, -s*1.3);
    ctx.fill();
    // Dark panels
    ctx.fillStyle = '#334455';
    ctx.beginPath();
    ctx.moveTo(0, -s*0.8);
    ctx.bezierCurveTo(s*0.3, -s*0.4, s*0.4, 0, s*0.3, s*0.4);
    ctx.lineTo(-s*0.3, s*0.4);
    ctx.bezierCurveTo(-s*0.4, 0, -s*0.3, -s*0.4, 0, -s*0.8);
    ctx.fill();
    // Cockpit (glowing eyes)
    ctx.fillStyle = ec;
    ctx.globalAlpha = phase;
    ctx.beginPath(); ctx.arc(-s*0.15, -s*0.4, s*0.08, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(s*0.15, -s*0.4, s*0.08, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  },

  drawTempest: function(ctx, s, t, element) {
    const ec = this.getElementColor(element);
    // Swept-wing fighter
    ctx.fillStyle = '#cc8844';
    ctx.beginPath();
    ctx.moveTo(0, -s*1.2);
    ctx.lineTo(s*0.25, -s*0.3);
    ctx.lineTo(s*0.4, s*0.3);
    ctx.lineTo(s*0.2, s*0.7);
    ctx.lineTo(-s*0.2, s*0.7);
    ctx.lineTo(-s*0.4, s*0.3);
    ctx.lineTo(-s*0.25, -s*0.3);
    ctx.closePath();
    ctx.fill();
    // Swept wings
    ctx.fillStyle = '#aa6633';
    ctx.beginPath();
    ctx.moveTo(s*0.25, -s*0.1);
    ctx.lineTo(s*1.3, s*0.4);
    ctx.lineTo(s*1.1, s*0.7);
    ctx.lineTo(s*0.4, s*0.4);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-s*0.25, -s*0.1);
    ctx.lineTo(-s*1.3, s*0.4);
    ctx.lineTo(-s*1.1, s*0.7);
    ctx.lineTo(-s*0.4, s*0.4);
    ctx.closePath();
    ctx.fill();
    // Wing tip weapons
    ctx.fillStyle = ec;
    ctx.beginPath(); ctx.arc(s*1.2, s*0.55, s*0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-s*1.2, s*0.55, s*0.1, 0, Math.PI*2); ctx.fill();
    // Cockpit
    ctx.fillStyle = '#ffcc88';
    ctx.beginPath();
    ctx.ellipse(0, -s*0.4, s*0.12, s*0.25, 0, 0, Math.PI*2);
    ctx.fill();
    // Triple engine
    const glow = 0.5+Math.sin(t*9)*0.4;
    ctx.fillStyle = ec;
    ctx.globalAlpha = glow;
    ctx.beginPath(); ctx.ellipse(0, s*0.8, s*0.06, s*0.15, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-s*0.15, s*0.75, s*0.05, s*0.12, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s*0.15, s*0.75, s*0.05, s*0.12, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  },

  drawCrystalWing: function(ctx, s, t, element) {
    const ec = this.getElementColor(element);
    // Crystalline ship
    ctx.fillStyle = '#44ddaa';
    ctx.beginPath();
    ctx.moveTo(0, -s*1.2);
    ctx.lineTo(s*0.35, -s*0.3);
    ctx.lineTo(s*0.3, s*0.6);
    ctx.lineTo(0, s*0.9);
    ctx.lineTo(-s*0.3, s*0.6);
    ctx.lineTo(-s*0.35, -s*0.3);
    ctx.closePath();
    ctx.fill();
    // Crystal wings
    ctx.fillStyle = '#33bb8866';
    ctx.beginPath();
    ctx.moveTo(s*0.35, -s*0.1);
    ctx.lineTo(s*1.0, -s*0.3);
    ctx.lineTo(s*0.8, s*0.5);
    ctx.lineTo(s*0.3, s*0.3);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-s*0.35, -s*0.1);
    ctx.lineTo(-s*1.0, -s*0.3);
    ctx.lineTo(-s*0.8, s*0.5);
    ctx.lineTo(-s*0.3, s*0.3);
    ctx.closePath();
    ctx.fill();
    // Crystal facets
    ctx.strokeStyle = '#88ffcc';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -s*1.2); ctx.lineTo(0, s*0.9);
    ctx.moveTo(-s*0.35, -s*0.3); ctx.lineTo(s*0.35, -s*0.3);
    ctx.moveTo(-s*0.3, s*0.3); ctx.lineTo(s*0.3, s*0.3);
    ctx.stroke();
    // Core
    const corePulse = 0.5+Math.sin(t*4)*0.5;
    ctx.fillStyle = ec;
    ctx.globalAlpha = corePulse;
    ctx.beginPath(); ctx.arc(0, 0, s*0.2, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  },

  drawInferno: function(ctx, s, t, element) {
    const ec = this.getElementColor(element);
    // Aggressive, angular
    ctx.fillStyle = '#dd4422';
    ctx.beginPath();
    ctx.moveTo(0, -s*1.3);
    ctx.lineTo(s*0.4, -s*0.5);
    ctx.lineTo(s*0.6, 0);
    ctx.lineTo(s*0.4, s*0.6);
    ctx.lineTo(s*0.15, s*0.8);
    ctx.lineTo(-s*0.15, s*0.8);
    ctx.lineTo(-s*0.4, s*0.6);
    ctx.lineTo(-s*0.6, 0);
    ctx.lineTo(-s*0.4, -s*0.5);

    ctx.fill();
    // Flame wings

    ctx.beginPath();
    ctx.moveTo(s*0.6, -s*0.1);
    ctx.lineTo(s*1.2, s*0.2);
    ctx.lineTo(s*1.0, s*0.7);
    ctx.lineTo(s*0.5, s*0.4);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-s*0.6, -s*0.1);
    ctx.lineTo(-s*1.2, s*0.2);
    ctx.lineTo(-s*1.0, s*0.7);
    ctx.lineTo(-s*0.5, s*0.4);
    ctx.closePath();
    ctx.fill();
    // Heat vents
    ctx.fillStyle = '#ff8844';
    ctx.fillRect(-s*0.08, -s*0.3, s*0.16, s*0.6);
    // Cockpit
    ctx.fillStyle = '#ffaa66';
    ctx.beginPath(); ctx.arc(0, -s*0.5, s*0.12, 0, Math.PI*2); ctx.fill();
    // Engine flames
    const flameLen = s*0.3 + Math.random()*s*0.2;
    ctx.fillStyle = '#ff6622';
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.moveTo(-s*0.15, s*0.8);
    ctx.lineTo(0, s*0.8+flameLen);
    ctx.lineTo(s*0.15, s*0.8);
    ctx.fill();
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.moveTo(-s*0.08, s*0.8);
    ctx.lineTo(0, s*0.8+flameLen*0.6);
    ctx.lineTo(s*0.08, s*0.8);
    ctx.fill();
    ctx.globalAlpha = 1;
  },

  drawVoidWraith: function(ctx, s, t, element) {
    const ec = this.getElementColor(element);
    // Ethereal, shifting shape
    const shift = Math.sin(t*2)*0.1;
    ctx.fillStyle = '#7733aa';
    ctx.beginPath();
    ctx.moveTo(0, -s*1.3);
    ctx.bezierCurveTo(s*(0.5+shift), -s*0.6, s*(0.6-shift), s*0.1, s*0.4, s*0.7);
    ctx.lineTo(0, s*0.5);
    ctx.lineTo(-s*0.4, s*0.7);
    ctx.bezierCurveTo(-s*(0.6-shift), s*0.1, -s*(0.5+shift), -s*0.6, 0, -s*1.3);
    ctx.fill();
    // Void tendrils
    ctx.strokeStyle = '#bb88ee';
    ctx.lineWidth = 1.5;
    for(let i = 0; i < 4; i++) {
      const baseA = i * Math.PI / 2 + t * 0.5;
      ctx.beginPath();
      ctx.moveTo(Math.cos(baseA)*s*0.3, Math.sin(baseA)*s*0.3);
      ctx.quadraticCurveTo(
        Math.cos(baseA+0.5)*s*0.8, Math.sin(baseA+0.5)*s*0.8,
        Math.cos(baseA+1)*s*1.1, Math.sin(baseA+1)*s*1.1
      );
      ctx.stroke();
    }
    // Core eye
    ctx.fillStyle = '#dd88ff';
    ctx.beginPath(); ctx.arc(0, -s*0.2, s*0.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#220044';
    ctx.beginPath(); ctx.arc(0, -s*0.2, s*0.1, 0, Math.PI*2); ctx.fill();
    // Void aura
    const aura = 0.15 + Math.sin(t*3)*0.1;
    ctx.strokeStyle = `rgba(153,68,204,${aura})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, s*1.4+Math.sin(t*2)*s*0.1, 0, Math.PI*2); ctx.stroke();
  }
};

  startScene: function(sceneId) {
    try {
      const scene = this.scenes[sceneId];
      if(!scene) return;
      this.active = true;
      this.currentScene = scene;
      this.stepIndex = 0;
      this.sceneTimer = 0;
      this.textBuffer = '';
      this.textIndex = 0;
      this.skipRequested = false;
      this.fadeAlpha = 0;
    } catch(e) { this.active = false; }
  },

  update: function() {
    try {
      if(!this.active || !this.currentScene) return;
      const step = this.currentScene.steps[this.stepIndex];
      if(!step) { this.active = false; return; }

      this.sceneTimer++;

      switch(step.type) {
        case 'fade_in':
          this.fadeAlpha = Math.min(1, this.sceneTimer / step.duration);
          if(this.sceneTimer >= step.duration || this.skipRequested) {
            this.fadeAlpha = 1;
            this.nextStep();
          }
          break;

        case 'fade_out':
          this.fadeAlpha = Math.max(0, 1 - this.sceneTimer / step.duration);
          if(this.sceneTimer >= step.duration || this.skipRequested) {
            this.fadeAlpha = 0;
            this.nextStep();
          }
          break;

        case 'text':
          if(this.textIndex < step.text.length) {
            this.textIndex += this.textSpeed;
            this.textBuffer = step.text.substring(0, Math.min(this.textIndex, step.text.length));
          }
          if(this.sceneTimer >= step.duration || this.skipRequested) {
            this.nextStep();
          }
          break;

        case 'end':
          this.active = false;
          break;
      }
      this.skipRequested = false;
    } catch(e) { this.active = false; }
  },

  nextStep: function() {
    this.stepIndex++;
    this.sceneTimer = 0;
    this.textIndex = 0;
    this.textBuffer = '';
    this.skipRequested = false;
  },

  skip: function() {
    this.skipRequested = true;
  },

  render: function(ctx, W, H) {
    try {
      if(!this.active || !this.currentScene) return;
      const step = this.currentScene.steps[this.stepIndex];
      if(!step) return;

      // Background dim
      ctx.fillStyle = `rgba(0,0,0,${0.7 * this.fadeAlpha})`;
      ctx.fillRect(0, 0, W, H);

      if(step.type === 'text' && this.fadeAlpha > 0) {
        // Speaker name
        const speakerColors = {
          'COMMANDER': '#4488cc',
          'PILOT': '#44cc88',
          'SENSORS': '#cccc44',
          'WARDEN': '#cc4444',
          'DESTROYER': '#ff6644',
          'QUEEN': '#cc44cc',
          'ARCHITECT': '#44cccc',
          'VOID CORE': '#9944cc'
        };
        const speakerColor = speakerColors[step.speaker] || '#aaaaaa';

        // Dialog box
        ctx.fillStyle = 'rgba(0,0,20,0.85)';
        ctx.strokeStyle = speakerColor;
        ctx.lineWidth = 2;
        const boxY = H * 0.65;
        const boxH = H * 0.25;
        ctx.fillRect(20, boxY, W-40, boxH);
        ctx.strokeRect(20, boxY, W-40, boxH);

        // Speaker label
        ctx.fillStyle = speakerColor;
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(step.speaker, 35, boxY + 22);

        // Text with typewriter effect
        ctx.fillStyle = '#ccccdd';
        ctx.font = '12px monospace';
        const maxWidth = W - 80;
        const words = this.textBuffer.split(' ');
        let line = '';
        let lineY = boxY + 44;
        for(const word of words) {
          const testLine = line + (line ? ' ' : '') + word;
          if(ctx.measureText(testLine).width > maxWidth) {
            ctx.fillText(line, 35, lineY);
            line = word;
            lineY += 18;
          } else {
            line = testLine;
          }
        }
        if(line) ctx.fillText(line, 35, lineY);

        // Tap to continue hint
        const blink = Math.sin(Date.now()*0.005) > 0;
        if(blink && this.textIndex >= step.text.length) {
          ctx.fillStyle = '#666677';
          ctx.font = '10px monospace';
          ctx.textAlign = 'right';
          ctx.fillText('TAP TO CONTINUE', W-30, boxY + boxH - 10);
        }
      }

      // Skip indicator
      ctx.fillStyle = '#555566';
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('TAP TO SKIP', W-20, 25);
      ctx.textAlign = 'left';
    } catch(e) {}
  }
};

    try {

        element: safeStr(element, 'neutral'),
        time: safeNum(time),
        rank: safeStr(rank, 'D'),

      };
      this.entries.push(entry);

      if(this.entries.length > this.maxEntries) {

      }

// SECTION 92: MEDAL / RANK SYSTEM
// Performance ranking for each run
// ============================================================
const RankSystem = {
  thresholds: {
    SSS: { score: 500000, combo: 200, waves: 50, accuracy: 0.9, noDeath: true },
    SS:  { score: 200000, combo: 150, waves: 40, accuracy: 0.8, noDeath: true },
    S:   { score: 100000, combo: 100, waves: 30, accuracy: 0.7, noDeath: false },
    A:   { score: 50000, combo: 50, waves: 20, accuracy: 0.6, noDeath: false },
    B:   { score: 25000, combo: 25, waves: 15, accuracy: 0.5, noDeath: false },
    C:   { score: 10000, combo: 10, waves: 10, accuracy: 0.3, noDeath: false },
    D:   { score: 0, combo: 0, waves: 0, accuracy: 0, noDeath: false }
  },

  calculateRank: function(stats) {
    try {
      const score = safeNum(stats.score);
      const maxCombo = safeNum(stats.maxCombo);
      const wavesCleared = safeNum(stats.wavesCleared);
      const accuracy = safeNum(stats.accuracy);
      const deaths = safeNum(stats.deaths);

      const ranks = ['SSS','SS','S','A','B','C','D'];
      for(const rank of ranks) {
        const t = this.thresholds[rank];
        let matches = 0;
        let total = 0;
        if(score >= t.score) matches++; total++;
        if(maxCombo >= t.combo) matches++; total++;
        if(wavesCleared >= t.waves) matches++; total++;
        if(accuracy >= t.accuracy) matches++; total++;
        if(t.noDeath) {
          if(deaths === 0) matches++;
          total++;
        }
        if(matches >= total * 0.6) return rank;
      }
      return 'D';
    } catch(e) { return 'D'; }
  },

  getRankColor: function(rank) {
    const colors = {
      'SSS': '#ff44ff', 'SS': '#ffcc44', 'S': '#ff8844',
      'A': '#44ff44', 'B': '#44ccff', 'C': '#aaaacc', 'D': '#888888'
    };
    return colors[rank] || '#888888';
  },

  getRankTitle: function(rank) {
    const titles = {
      'SSS': 'VOID LEGEND', 'SS': 'VOID MASTER', 'S': 'ELITE PILOT',
      'A': 'VETERAN', 'B': 'SKILLED', 'C': 'ROOKIE', 'D': 'CADET'
    };
    return titles[rank] || 'CADET';
  },

  renderRankDisplay: function(ctx, rank, x, y, size) {
    try {
      const color = this.getRankColor(rank);
      const s = size || 40;

      // Glowing background
      ctx.fillStyle = color + '33';
      ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI*2); ctx.fill();

      // Border
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(x, y, s*0.85, 0, Math.PI*2); ctx.stroke();

      // Rank text
      ctx.fillStyle = color;
      ctx.font = `bold ${Math.floor(s*0.8)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(rank, x, y);
      ctx.textBaseline = 'alphabetic';
    } catch(e) {}
  }
};

      // Check for existing effect
      const existing = this.activeEffects.find(e =>
        e.target === target && e.effectId === effectId && e.active
      );

      if(existing) {
        if(type.stackable) {
          existing.stacks = Math.min((existing.stacks||1) + 1, type.maxStacks || 1);
          existing.duration = Math.max(existing.duration, duration);
          existing.timer = 0;
          if(type.onApply) type.onApply(target, existing.stacks);
        } else {
          existing.duration = Math.max(existing.duration, duration);
          existing.timer = 0;
        }
        return;
      }

      if(this.activeEffects.length >= this.maxEffects) {
        const oldest = this.activeEffects.findIndex(e => !e.active);
        if(oldest >= 0) this.activeEffects.splice(oldest, 1);
        else this.activeEffects.shift();
      }

      const effect = {
        target: target,
        effectId: effectId,
        type: type,
        duration: duration,
        timer: 0,
        tickTimer: 0,
        stacks: 1,
        source: source,
        active: true
      };

      this.activeEffects.push(effect);
      if(type.onApply) type.onApply(target, 1);
    } catch(e) {}
  },

  removeEffect: function(target, effectId) {
    try {
      const idx = this.activeEffects.findIndex(e =>
        e.target === target && e.effectId === effectId && e.active
      );
      if(idx >= 0) {
        const effect = this.activeEffects[idx];
        if(effect.type.onRemove) effect.type.onRemove(target, effect.stacks);
        effect.active = false;
      }
    } catch(e) {}
  },

  update: function() {
    try {
      for(let i = this.activeEffects.length - 1; i >= 0; i--) {
        const effect = this.activeEffects[i];
        if(!effect.active) {
          this.activeEffects.splice(i, 1);
          continue;
        }

        effect.timer++;

        // Tick effects
        if(effect.type.tickRate && effect.type.onTick) {
          effect.tickTimer++;
          if(effect.tickTimer >= effect.type.tickRate) {
            effect.tickTimer = 0;
            effect.type.onTick(effect.target, effect.stacks);
          }
        }

        // Duration check
        if(effect.timer >= effect.duration) {
          if(effect.type.onRemove) effect.type.onRemove(effect.target, effect.stacks);
          effect.active = false;
          this.activeEffects.splice(i, 1);
        }
      }
    } catch(e) {}
  },

  getEffectsForTarget: function(target) {
    return this.activeEffects.filter(e => e.target === target && e.active);
  },

  clearAllForTarget: function(target) {
    try {
      for(let i = this.activeEffects.length - 1; i >= 0; i--) {
        const e = this.activeEffects[i];
        if(e.target === target && e.active) {
          if(e.type.onRemove) e.type.onRemove(target, e.stacks);
          this.activeEffects.splice(i, 1);
        }
      }
    } catch(e) {}
  },

  renderStatusBar: function(ctx, target, x, y, maxWidth) {
    try {
      const effects = this.getEffectsForTarget(target);
      if(effects.length === 0) return;

      let offsetX = 0;
      for(const effect of effects) {
        if(offsetX + 28 > maxWidth) break;

        // Icon background
        ctx.fillStyle = effect.type.color + '44';
        ctx.fillRect(x + offsetX, y, 26, 14);
        ctx.strokeStyle = effect.type.color;
        ctx.lineWidth = 1;
        ctx.strokeRect(x + offsetX, y, 26, 14);

        // Icon text
        ctx.fillStyle = effect.type.color;
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(effect.type.icon, x + offsetX + 13, y + 10);

        // Stack count
        if(effect.stacks > 1) {
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 7px monospace';
          ctx.fillText('x'+effect.stacks, x + offsetX + 22, y + 6);
        }

        // Duration bar
        const pct = 1 - (effect.timer / effect.duration);
        ctx.fillStyle = effect.type.color + '88';
        ctx.fillRect(x + offsetX, y + 14, 26 * pct, 2);

        offsetX += 28;
      }
      ctx.textAlign = 'left';
    } catch(e) {}
  }
};

      );
      for(const hazType of biomeHazards) {
        if(this.activeHazards.length < this.maxHazards && Math.random() < hazType.spawnRate) {
          this.activeHazards.push(hazType.create(W, H));
        }
      }

      // Update active hazards
      for(let i = this.activeHazards.length - 1; i >= 0; i--) {
        const h = this.activeHazards[i];
        const hazType = this.hazardTypes[h.type];
        if(!hazType || !hazType.update(h, W, H)) {
          this.activeHazards.splice(i, 1);
        }
      }
    } catch(e) {}
  },
