<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA BREACH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #000;
            width: 100vw;
            height: 100vh;
            max-width: 420px;
            max-height: 750px;
            image-rendering: auto;
        }
        #errorOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: #f00;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 18px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="errorOverlay"></div>
    <script>
'use strict';

(() => {
    // ============================================================================
    // NOVA BREACH - DELUXE EDITION v5.0
    // ============================================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: true, willReadFrequently: false });
    const VIRTUAL_WIDTH = 420;
    const VIRTUAL_HEIGHT = 750;
    let dpr = window.devicePixelRatio || 1;

    function resizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = VIRTUAL_WIDTH * dpr;
        canvas.height = VIRTUAL_HEIGHT * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================================================
    // CONSTANTS & STATE
    // ============================================================================
    const FIXED_DT = 1000 / 60;
    const dt = FIXED_DT / 1000;
    const SAVE_KEY = 'void_rift_save';
    const VERSION = 'v5.0';

    let gameState = {
        mode: 'menu', // menu, upgrade, playing, dead, wave_transition
        wave: 1,
        score: 0,
        combo: 0,
        comboTimer: 0,
        kills: 0,
        xp: 0,
        xpMax: 100,
        health: 100,
        maxHealth: 100,
        selectedShip: 'viper',
        difficulty: 1,
        screenShake: 0,
        screenShakeRotation: 0,
        screenFlash: 0,
        screenFlashColor: '#fff',
        invulnTimer: 0,
        dashCooldown: 0,
        deaths: 0,
        totalKills: 0,
        gold: 0,
        playStreak: 0,
        lastPlayDate: null,
        achievements: {},
        dailyChallenge: '',
        prestigeLevel: 0,
        upgradeChoices: [],
        selectedUpgradeIdx: 0,
        messageTimer: 0,
        messageText: '',
        waves: [],
        numEnemies: 0,
        isDailyMode: false,
        scoreMultiplier: 1,
        killStreak: 0,
        lastKillTime: 0,
        hitStopFrames: 0,
        slowMotionTimer: 0,
        slowMotionSpeed: 1,
        cameraX: 0,
        cameraY: 0,
        chromaAberrationTimer: 0,
        showFPS: false,
        showTutorial: false,
        waveTransitionTimer: 0,
        waveTransitionText: '',
        deathStats: null,
        timeSurvived: 0,
        audioInitialized: false,
    };

    let player = null;
    let bullets = [];
    let enemies = [];
    let explosions = [];
    let particles = [];
    let pickups = [];
    let scorePopups = [];
    let damageNumbers = [];
    let killFeed = [];
    let stars = [];
    let nebulaClouds = [];
    let dustParticles = [];
    let titleParticles = [];
    let muzzleFlashes = [];

    let touchX = null;
    let touchY = null;
    let keys = {};

    let audioContext = null;
    let masterVolume = 0.3;
    let musicOscillators = [];
    let musicGains = [];
    let musicDucking = 1;

    const SHIP_STATS = {
        viper: { hp: 100, speed: 240, fireRate: 8, damage: 1, magnet: 100, name: 'VIPER' },
        phantom: { hp: 60, speed: 320, fireRate: 8, damage: 1, magnet: 100, name: 'PHANTOM' },
        titan: { hp: 150, speed: 180, fireRate: 7, damage: 1.3, magnet: 100, name: 'TITAN' },
        spectre: { hp: 90, speed: 250, fireRate: 9, damage: 1, magnet: 180, name: 'SPECTRE' },
    };

    const ENEMIES = {
        drone: { hp: 20, speed: 100, score: 50, size: 8, color: '#ff3333', fireRate: 0.5, pattern: 'straight' },
        scout: { hp: 15, speed: 200, score: 75, size: 10, color: '#ff8833', fireRate: 0.3, pattern: 'straight' },
        tank: { hp: 60, speed: 60, score: 200, size: 16, color: '#00ff44', fireRate: 1, pattern: 'straight' },
        shooter: { hp: 40, speed: 140, score: 150, size: 12, color: '#ffff44', fireRate: 2, pattern: 'straight' },
        bomber: { hp: 80, speed: 80, score: 250, size: 14, color: '#ff00ff', fireRate: 0.8, pattern: 'straight' },
        zigzag: { hp: 35, speed: 150, score: 120, size: 10, color: '#ff6600', fireRate: 0.6, pattern: 'zigzag' },
        spiral: { hp: 45, speed: 120, score: 140, size: 11, color: '#6600ff', fireRate: 1.2, pattern: 'spiral' },
        formation: { hp: 25, speed: 130, score: 100, size: 8, color: '#00ffff', fireRate: 0.4, pattern: 'formation' },
        boss: { hp: 500, speed: 80, score: 2000, size: 40, color: '#0ff', fireRate: 2, pattern: 'boss' },
    };

    const ACHIEVEMENTS = {
        first_blood: { name: 'First Blood', desc: 'Kill your first enemy' },
        combo_king: { name: 'Combo King', desc: 'Get a 10x combo' },
        boss_slayer: { name: 'Boss Slayer', desc: 'Defeat a boss' },
        wave_10: { name: 'Wave Master', desc: 'Reach wave 10' },
        unstoppable: { name: 'Unstoppable', desc: 'Get a 50x combo' },
        gold_rush: { name: 'Gold Rush', desc: 'Collect 1000 gold' },
        speed_demon: { name: 'Speed Demon', desc: 'Travel 50000 units' },
        pacifist: { name: 'Pacifist', desc: 'Complete a wave without shooting' },
        glass_cannon: { name: 'Glass Cannon', desc: 'Deal 10000 damage in one game' },
        collector: { name: 'Collector', desc: 'Collect 100 pickups in one game' },
        max_level: { name: 'Max Level', desc: 'Reach upgrade level 20' },
        millionaire: { name: 'Millionaire', desc: 'Accumulate 10000 gold lifetime' },
    };

    const POWERUP_TYPES = {
        rapidfire: { name: 'Rapid Fire', duration: 5, color: '#ff3333', icon: '>' },
        tripleshot: { name: 'Triple Shot', duration: 5, color: '#ffff44', icon: '≡' },
        invincible: { name: 'Invincibility', duration: 3, color: '#ff00ff', icon: '◆' },
        magnet: { name: 'Magnet Boost', duration: 10, color: '#00ffff', icon: 'O' },
        scoremulti: { name: 'Score Multiplier', duration: 8, color: '#ff8800', icon: '×' },
    };

    const KILL_STREAK_MESSAGES = {
        2: 'DOUBLE KILL',
        3: 'TRIPLE KILL',
        4: 'QUAD KILL',
        5: 'RAMPAGE',
        7: 'UNSTOPPABLE',
        10: 'GODLIKE',
    };

    // ============================================================================
    // HELPERS
    // ============================================================================

    function clamp(v, min, max) {
        return Math.min(Math.max(v, min), max);
    }

    function distance(x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function colorAlpha(color, alpha) {
        if (!color || typeof color !== 'string') {
            return `rgba(255,255,255,${alpha})`;
        }
        if (color.startsWith('#')) {
            let hex = color.replace('#', '');
            if (hex.length === 3) {
                hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
            }
            if (hex.length !== 6) {
                return `rgba(255,255,255,${alpha})`;
            }
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        } else if (color.startsWith('rgba')) {
            return color.replace(/[\d.]+\)$/, `${alpha})`);
        } else if (color.startsWith('rgb')) {
            return color.replace('rgb', 'rgba').replace(')', `, ${alpha})`);
        }
        return `rgba(255,255,255,${alpha})`;
    }

    function rrPath(x, y, w, h, r) {
        const path = new Path2D();
        r = Math.min(r, w / 2, h / 2);
        path.moveTo(x + r, y);
        path.lineTo(x + w - r, y);
        path.arcTo(x + w, y, x + w, y + r, r);
        path.lineTo(x + w, y + h - r);
        path.arcTo(x + w, y + h, x + w - r, y + h, r);
        path.lineTo(x + r, y + h);
        path.arcTo(x, y + h, x, y + h - r, r);
        path.lineTo(x, y + r);
        path.arcTo(x, y, x + r, y, r);
        path.closePath();
        return path;
    }

    function getDailyChallenge() {
        const challenges = ['double_time', 'no_dash', 'one_life', 'boss_rush', 'rapid_fire', 'double_gold', 'slow_mo', 'magnet'];
        const dateStr = new Date().toISOString().split('T')[0];
        const hash = dateStr.split('').reduce((a, c) => ((a << 5) - a) + c.charCodeAt(0), 0);
        return challenges[Math.abs(hash) % challenges.length];
    }

    function savePersistentData() {
        const data = {
            gold: gameState.gold,
            deaths: gameState.deaths,
            totalKills: gameState.totalKills,
            playStreak: gameState.playStreak,
            lastPlayDate: gameState.lastPlayDate,
            achievements: gameState.achievements,
            prestigeLevel: gameState.prestigeLevel,
            highScore: window.highScore || 0,
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    }

    function loadPersistentData() {
        const data = localStorage.getItem(SAVE_KEY);
        if (data) {
            try {
                const saved = JSON.parse(data);
                gameState.gold = saved.gold || 0;
                gameState.deaths = saved.deaths || 0;
                gameState.totalKills = saved.totalKills || 0;
                gameState.playStreak = saved.playStreak || 0;
                gameState.lastPlayDate = saved.lastPlayDate;
                gameState.achievements = saved.achievements || {};
                gameState.prestigeLevel = saved.prestigeLevel || 0;
                window.highScore = saved.highScore || 0;

                const today = new Date().toISOString().split('T')[0];
                const lastDay = saved.lastPlayDate ? saved.lastPlayDate.split('T')[0] : null;
                if (lastDay && lastDay !== today) {
                    gameState.playStreak++;
                } else if (!lastDay) {
                    gameState.playStreak = 1;
                }
                gameState.lastPlayDate = new Date().toISOString();
            } catch (e) {
                console.error('Failed to load save:', e);
            }
        }
        window.highScore = window.highScore || 0;
        gameState.dailyChallenge = getDailyChallenge();
        gameState.showTutorial = !localStorage.getItem('nova_breach_tutorial_seen');
    }

    function declareAchievement(id) {
        if (!gameState.achievements[id]) {
            gameState.achievements[id] = true;
            savePersistentData();
            showToast(`Achievement Unlocked: ${ACHIEVEMENTS[id].name}`);
        }
    }

    function showToast(text) {
        gameState.messageText = text;
        gameState.messageTimer = 180;
    }

    // ============================================================================
    // AUDIO - WEB AUDIO API
    // ============================================================================

    function initAudio() {
        if (gameState.audioInitialized) return;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            gameState.audioInitialized = true;
            startBackgroundMusic();
        } catch (e) {
            console.warn('Web Audio API not supported');
        }
    }

    function startBackgroundMusic() {
        if (!audioContext || audioContext.state !== 'running') return;
        try {
            // Create master gain
            const masterGain = audioContext.createGain();
            masterGain.connect(audioContext.destination);
            masterGain.gain.setValueAtTime(masterVolume * 0.4, audioContext.currentTime);

            // Bass oscillator (low frequency)
            const bassOsc = audioContext.createOscillator();
            const bassGain = audioContext.createGain();
            bassOsc.type = 'sawtooth';
            bassOsc.frequency.setValueAtTime(55, audioContext.currentTime);
            bassGain.gain.setValueAtTime(0.3, audioContext.currentTime);
            bassOsc.connect(bassGain);
            bassGain.connect(masterGain);

            // Arpeggio oscillator (mid frequency)
            const arpeggio = audioContext.createOscillator();
            const arpeggioGain = audioContext.createGain();
            arpeggio.type = 'triangle';
            arpeggio.frequency.setValueAtTime(220, audioContext.currentTime);
            arpeggioGain.gain.setValueAtTime(0.2, audioContext.currentTime);
            arpeggio.connect(arpeggioGain);
            arpeggioGain.connect(masterGain);

            // Pad oscillator (smooth background)
            const pad = audioContext.createOscillator();
            const padGain = audioContext.createGain();
            pad.type = 'sine';
            pad.frequency.setValueAtTime(110, audioContext.currentTime);
            padGain.gain.setValueAtTime(0.15, audioContext.currentTime);
            pad.connect(padGain);
            padGain.connect(masterGain);

            bassOsc.start();
            arpeggio.start();
            pad.start();

            musicOscillators = [bassOsc, arpeggio, pad];
            musicGains = [masterGain, bassGain, arpeggioGain, padGain];
        } catch (e) {
            console.warn('Failed to start background music');
        }
    }

    function stopBackgroundMusic() {
        try {
            musicOscillators.forEach(osc => osc.stop());
            musicOscillators = [];
            musicGains = [];
        } catch (e) {
            // Silently fail
        }
    }

    function playSound(type, freq = 400, duration = 0.1) {
        if (!audioContext || audioContext.state !== 'running') return;
        try {
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            gain.gain.setValueAtTime(masterVolume * 0.7 * musicDucking, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            if (type === 'shoot') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.6, now + duration);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq + Math.random() * 100, now);
            } else if (type === 'kill') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq * 1.5, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.3, now + duration);
            } else if (type === 'pickup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq * 1.2, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.8, now + duration);
            } else if (type === 'explosion') {
                // Noise burst + sine drop
                const noise = audioContext.createBufferSource();
                const buffer = audioContext.createBuffer(1, audioContext.sampleRate * duration, audioContext.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                noise.connect(gain);
                noise.start(now);
                noise.stop(now + duration * 0.5);

                // Sine drop
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq * 0.8, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.1, now + duration);
            }

            osc.start(now);
            osc.stop(now + duration);
        } catch (e) {
            // Silently fail
        }
    }

    // ============================================================================
    // PLAYER CLASS
    // ============================================================================

    class Player {
        constructor(ship) {
            const stats = SHIP_STATS[ship];
            this.ship = ship;
            this.x = VIRTUAL_WIDTH / 2;
            this.y = VIRTUAL_HEIGHT - 80;
            this.vx = 0;
            this.vy = 0;
            this.speed = stats.speed;
            this.fireRate = stats.fireRate;
            this.fireCooldown = 0;
            this.weapon = 0; // 0=blaster, 1=laser, 2=missile
            this.damage = stats.damage;
            this.hp = stats.hp;
            this.maxHp = stats.hp;
            this.magnet = stats.magnet;
            this.shieldEnergy = 0;
            this.shieldMax = 100;
            this.shield = false;
            this.invulnTimer = 0;
            this.dashCooldown = 0;
            this.dashEnergy = 100;
            this.dashMax = 100;
            this.upgrades = {
                maxHp: 0,
                fireRate: 0,
                speed: 0,
                damage: 0,
                magnet: 0,
                pierce: 0,
                rearGun: false,
                sideGuns: false,
                shieldRegen: 0,
                xpRange: 0,
            };
            this.distanceTraveled = 0;
            this.damageDealt = 0;
            this.pickupsCollected = 0;
            this.shieldAngle = 0;
            this.shipColor = { viper: '#00ffff', phantom: '#ff00ff', titan: '#ffff00', spectre: '#00ff88' }[ship] || '#0f0';
            this.shipAccent = { viper: '#0088ff', phantom: '#ff0088', titan: '#ff8800', spectre: '#0088ff' }[ship] || '#00aa00';
            this.activePowerups = {};
            this.powerupTimers = {};
        }

        update(keys, touchX, touchY, gameState) {
            this.fireCooldown = Math.max(0, this.fireCooldown - dt);
            this.invulnTimer = Math.max(0, this.invulnTimer - dt);
            this.dashCooldown = Math.max(0, this.dashCooldown - dt);
            this.shieldEnergy = Math.min(this.shieldMax, this.shieldEnergy + 5 * dt);

            // Update powerup timers
            for (let key in this.powerupTimers) {
                this.powerupTimers[key] -= dt;
                if (this.powerupTimers[key] <= 0) {
                    delete this.activePowerups[key];
                    delete this.powerupTimers[key];
                }
            }

            let ax = 0, ay = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) ax -= 1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) ax += 1;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) ay -= 1;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) ay += 1;

            if (touchX !== null && touchY !== null) {
                const dx = touchX - this.x;
                const dy = touchY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 20) {
                    ax = dx / Math.max(dist, 0.1);
                    ay = dy / Math.max(dist, 0.1);
                }
            }

            const mag = Math.sqrt(ax * ax + ay * ay);
            if (mag > 0) {
                ax /= mag;
                ay /= mag;
                this.vx = ax * this.speed * (1 + 0.5 * this.upgrades.speed);
                this.vy = ay * this.speed * (1 + 0.5 * this.upgrades.speed);
            } else {
                this.vx *= 0.85;
                this.vy *= 0.85;
            }

            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.x = clamp(this.x, 15, VIRTUAL_WIDTH - 15);
            this.y = clamp(this.y, 15, VIRTUAL_HEIGHT - 15);

            const prevX = this.x - this.vx * dt;
            const prevY = this.y - this.vy * dt;
            this.distanceTraveled += distance(prevX, prevY, this.x, this.y);

            if (keys[' '] && this.dashCooldown <= 0 && this.dashEnergy > 30) {
                this.dashEnergy -= 30;
                this.dashCooldown = 0.5;
                this.vx *= 2.5;
                this.vy *= 2.5;
                for (let i = 0; i < 12; i++) {
                    particles.push({
                        x: this.x + (Math.random() - 0.5) * 20,
                        y: this.y + (Math.random() - 0.5) * 20,
                        vx: (Math.random() - 0.5) * 300,
                        vy: (Math.random() - 0.5) * 300,
                        life: 0.3,
                        color: '#0ff',
                        size: Math.random() * 4 + 2,
                    });
                }
            }
            this.dashEnergy = Math.min(this.dashMax, this.dashEnergy + 30 * dt);
        }

        fire() {
            if (this.fireCooldown > 0) return;

            let fireRateMult = 1 + 0.3 * this.upgrades.fireRate;
            if (this.activePowerups.rapidfire) {
                fireRateMult *= 2;
            }

            this.fireCooldown = 1 / (this.fireRate * fireRateMult);

            const speed = 400;
            const damage = this.damage * (1 + 0.2 * this.upgrades.damage);

            const createBullet = (x, y, vx, vy, dmg) => ({
                x, y, vx, vy,
                life: 3,
                type: 'blaster',
                damage: dmg,
                piercing: this.upgrades.pierce,
                color: '#0f0',
                size: 5,
            });

            if (this.weapon === 0) { // Blaster
                if (this.activePowerups.tripleshot) {
                    bullets.push(createBullet(this.x - 8, this.y - 15, -speed * 0.2, -speed * 0.97, damage));
                    bullets.push(createBullet(this.x, this.y - 15, 0, -speed, damage));
                    bullets.push(createBullet(this.x + 8, this.y - 15, speed * 0.2, -speed * 0.97, damage));
                } else {
                    bullets.push(createBullet(this.x, this.y - 15, 0, -speed, damage));

                    if (this.upgrades.sideGuns) {
                        bullets.push(createBullet(this.x - 10, this.y, -speed * 0.3, -speed * 0.95, damage * 0.6));
                        bullets.push(createBullet(this.x + 10, this.y, speed * 0.3, -speed * 0.95, damage * 0.6));
                    }
                    if (this.upgrades.rearGun) {
                        bullets.push(createBullet(this.x, this.y + 15, 0, speed * 0.5, damage * 0.5));
                    }
                }

                // Muzzle flash
                muzzleFlashes.push({
                    x: this.x,
                    y: this.y - 15,
                    life: 0.05,
                    size: 8,
                });

                playSound('shoot', 300 + Math.random() * 100, 0.08);
            } else if (this.weapon === 1) { // Laser
                bullets.push({
                    x: this.x,
                    y: this.y - 15,
                    vx: 0,
                    vy: -speed * 1.2,
                    life: 3,
                    type: 'laser',
                    damage: damage * 0.8,
                    piercing: this.upgrades.pierce + 1,
                    color: '#ff0',
                    size: 3,
                });
                playSound('shoot', 250 + Math.random() * 100, 0.1);
            } else if (this.weapon === 2) { // Missile
                bullets.push({
                    x: this.x,
                    y: this.y - 15,
                    vx: 0,
                    vy: -speed * 0.8,
                    life: 3,
                    type: 'missile',
                    damage: damage * 1.5,
                    piercing: this.upgrades.pierce,
                    color: '#f00',
                    size: 6,
                });
                playSound('shoot', 200 + Math.random() * 100, 0.12);
            }
        }

        activatePowerup(type, duration) {
            this.activePowerups[type] = true;
            this.powerupTimers[type] = duration;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);

            if (this.invulnTimer > 0 && Math.floor(this.invulnTimer * 10) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }

            if (this.ship === 'viper') {
                ctx.fillStyle = this.shipColor;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(-8, 12);
                ctx.lineTo(-2, 4);
                ctx.lineTo(2, 4);
                ctx.lineTo(8, 12);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = this.shipAccent;
                ctx.fillRect(-2, 0, 4, 8);
            } else if (this.ship === 'phantom') {
                ctx.fillStyle = this.shipColor;
                ctx.beginPath();
                ctx.moveTo(0, -14);
                ctx.lineTo(-6, 10);
                ctx.lineTo(0, 2);
                ctx.lineTo(6, 10);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = this.shipAccent;
                ctx.beginPath();
                ctx.arc(0, -4, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (this.ship === 'titan') {
                ctx.fillStyle = this.shipColor;
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(-10, 12);
                ctx.lineTo(-3, 4);
                ctx.lineTo(3, 4);
                ctx.lineTo(10, 12);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = this.shipAccent;
                ctx.fillRect(-6, -5, 12, 6);
            } else if (this.ship === 'spectre') {
                ctx.fillStyle = this.shipColor;
                ctx.beginPath();
                ctx.moveTo(0, -13);
                ctx.lineTo(-7, 11);
                ctx.lineTo(0, 3);
                ctx.lineTo(7, 11);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = this.shipAccent;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Shield visualization
            if (this.shieldEnergy > 20) {
                ctx.strokeStyle = colorAlpha('#0ff', 0.5);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, Math.max(0.1, 20), 0, Math.PI * 2);
                ctx.stroke();

                // Hexagon pattern
                const hexSize = 8;
                ctx.strokeStyle = colorAlpha('#0ff', 0.3);
                ctx.lineWidth = 1;
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const x1 = Math.cos(angle) * hexSize;
                    const y1 = Math.sin(angle) * hexSize;
                    const x2 = Math.cos(angle + Math.PI / 3) * hexSize;
                    const y2 = Math.sin(angle + Math.PI / 3) * hexSize;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            }

            ctx.restore();
        }
    }

    // ============================================================================
    // ENEMY CLASS
    // ============================================================================

    class Enemy {
        constructor(type, x, y) {
            const stats = ENEMIES[type];
            this.type = type;
            this.x = x;
            this.y = y;
            this.vx = 0;
            this.vy = stats.speed / 60;
            this.hp = stats.hp;
            this.maxHp = stats.hp;
            this.speed = stats.speed;
            this.fireRate = stats.fireRate;
            this.fireCooldown = Math.random() * (1 / stats.fireRate);
            this.color = stats.color;
            this.size = stats.size;
            this.score = stats.score;
            this.pattern = stats.pattern;
            this.lifetime = 0;
            this.shootCooldown = 0;
            this.warpin = 0.3; // Warp-in animation
            this.patternPhase = Math.random() * Math.PI * 2;
        }

        update(gameState) {
            this.lifetime += dt;
            this.warpin = Math.max(0, this.warpin - dt);
            this.shootCooldown = Math.max(0, this.shootCooldown - dt);

            // Different movement patterns based on type
            if (this.pattern === 'zigzag') {
                this.vx = Math.sin(this.lifetime * 3) * this.speed * 0.6;
                this.vy = this.speed / 60;
            } else if (this.pattern === 'spiral') {
                const spiralAmount = this.lifetime * 2;
                this.vx = Math.cos(spiralAmount) * this.speed * 0.5;
                this.vy = this.speed / 60 + Math.sin(spiralAmount) * 20;
            } else if (this.pattern === 'formation') {
                // Slight wobble
                this.vx = Math.sin(this.patternPhase + this.lifetime * 2) * 30;
                this.vy = this.speed / 60;
            } else if (this.pattern === 'boss') {
                // Boss patterns - more complex
                const phase = this.lifetime % 3;
                if (phase < 1) {
                    // Move left
                    this.vx = -this.speed * 0.5;
                } else if (phase < 2) {
                    // Move right
                    this.vx = this.speed * 0.5;
                } else {
                    // Shoot pattern - spiral bullets
                    this.vx = 0;
                }
                this.vy = this.speed / 60 * 0.3;
            } else {
                this.vy = this.speed / 60;
            }

            this.x += this.vx * dt;
            this.y += this.vy * dt;
        }

        canShoot() {
            if (this.shootCooldown > 0) return false;
            this.shootCooldown = 1 / this.fireRate;
            return true;
        }

        takeDamage(amount) {
            const actualDamage = amount;
            this.hp -= actualDamage;

            // Check for critical hit
            const isCrit = Math.random() < 0.15;
            const damageMultiplier = isCrit ? 2.5 : 1;
            const actualDmg = actualDamage * damageMultiplier;
            this.hp -= actualDmg - actualDamage;

            // Damage number
            damageNumbers.push({
                x: this.x + (Math.random() - 0.5) * 10,
                y: this.y - 10,
                text: Math.floor(actualDmg),
                life: 0.8,
                color: isCrit ? '#ffff00' : '#ffffff',
            });

            if (isCrit) {
                // Screen flash for crit
                gameState.screenFlash = 0.15;
                gameState.screenFlashColor = '#ffff00';
            }

            return isCrit;
        }

        draw(ctx) {
            if (this.warpin > 0) {
                const warpinAlpha = 1 - (this.warpin / 0.3);
                ctx.globalAlpha = warpinAlpha;

                // Portal animation
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    const angle = (this.warpin * 10 + i * Math.PI * 2 / 3) % (Math.PI * 2);
                    const scale = 1 + warpinAlpha * 0.5;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * scale, angle, angle + Math.PI / 2);
                    ctx.stroke();
                }
            }

            ctx.globalAlpha = 1;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
            ctx.fill();

            // HP bar
            const hpPercent = this.hp / this.maxHp;
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(this.x - this.size, this.y + this.size + 4, this.size * 2, 2);
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(this.x - this.size, this.y + this.size + 4, this.size * 2 * hpPercent, 2);
        }
    }

    // ============================================================================
    // EXPLOSION SYSTEM
    // ============================================================================

    function createExplosion(x, y, size = 1, screenShakeAmount = 0.5) {
        // Screen shake with rotation
        gameState.screenShake = Math.max(gameState.screenShake, screenShakeAmount);
        gameState.screenShakeRotation = (Math.random() - 0.5) * 0.05;

        // Ring shockwave
        explosions.push({
            x, y,
            life: 0.4,
            maxLife: 0.4,
            radius: 2,
            maxRadius: 60 * size,
            color: '#ff6600',
            type: 'ring',
        });

        // Debris particles
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            particles.push({
                x, y,
                vx: Math.cos(angle) * 150 * size,
                vy: Math.sin(angle) * 150 * size,
                life: 0.6,
                color: '#ff8800',
                size: Math.random() * 3 + 1,
            });
        }

        // Screen-space bloom effect (flash)
        gameState.screenFlash = Math.max(gameState.screenFlash, 0.3);
        gameState.screenFlashColor = '#ffaa00';

        playSound('explosion', 100, 0.3);
    }

    // ============================================================================
    // PICKUP SYSTEM
    // ============================================================================

    function createPickup(x, y) {
        const chance = Math.random();
        let type = 'gold';

        if (chance < 0.05) type = 'tripleshot';
        else if (chance < 0.1) type = 'rapidfire';
        else if (chance < 0.14) type = 'invincible';
        else if (chance < 0.18) type = 'magnet';
        else if (chance < 0.22) type = 'scoremulti';

        pickups.push({
            x, y,
            type,
            vx: (Math.random() - 0.5) * 100,
            vy: -100,
            life: 10,
            collected: false,
        });
    }

    function collectPickup(pickup, player) {
        pickup.collected = true;

        if (pickup.type === 'gold') {
            gameState.gold += 10;
            gameState.score += 10 * gameState.scoreMultiplier;
        } else if (POWERUP_TYPES[pickup.type]) {
            player.activatePowerup(pickup.type, POWERUP_TYPES[pickup.type].duration);
            playSound('pickup', 600, 0.15);
        }

        // Ascending arpeggio for pickups
        if (audioContext && audioContext.state === 'running') {
            const notes = [440, 550, 660];
            notes.forEach((freq, i) => {
                setTimeout(() => playSound('pickup', freq, 0.1), i * 50);
            });
        }
    }

    // ============================================================================
    // KILL FEED & DAMAGE NUMBERS
    // ============================================================================

    function addKillFeed(enemy) {
        const iconMap = {
            drone: '◆', scout: '▲', tank: '■', shooter: '▶', bomber: '●', boss: '✶',
            zigzag: '⟿', spiral: '◉', formation: '▪',
        };
        killFeed.push({
            icon: iconMap[enemy.type] || '●',
            text: `${SHIP_STATS[gameState.selectedShip].name} • ${enemy.type.toUpperCase()}`,
            life: 3,
            color: enemy.type === 'boss' ? '#ff00ff' : '#ffff00',
        });
        if (killFeed.length > 5) killFeed.shift();
    }

    function updateKillStreak() {
        const currentTime = Date.now() / 1000;
        if (currentTime - gameState.lastKillTime > 5) {
            gameState.killStreak = 0;
        }
        gameState.killStreak += 1;
        gameState.lastKillTime = currentTime;

        if (gameState.killStreak in KILL_STREAK_MESSAGES) {
            showToast(KILL_STREAK_MESSAGES[gameState.killStreak]);
            gameState.screenFlash = 0.2;
        }
    }

    // ============================================================================
    // GAME LOGIC
    // ============================================================================

    function generateWave(waveNum) {
        const baseEnemyCount = 3 + Math.floor(waveNum / 2);
        const enemies_list = [];

        // Difficulty scaling
        const difficultyMult = 1 + (waveNum - 1) * 0.1;

        // Mini-boss every 5 waves (in addition to wave 10+)
        if (waveNum % 5 === 0 && waveNum % 10 !== 0) {
            for (let i = 0; i < baseEnemyCount; i++) {
                const type = ['drone', 'scout', 'tank', 'shooter', 'zigzag', 'spiral'][Math.floor(Math.random() * 6)];
                enemies_list.push({ type, count: 1 + Math.floor(Math.random() * 3) });
            }
        } else if (waveNum >= 10 && waveNum % 10 === 0) {
            // Boss wave
            enemies_list.push({ type: 'boss', count: 1 });
        } else {
            // Regular enemies with some variance
            const typePool = ['drone', 'scout', 'tank', 'shooter', 'bomber', 'zigzag', 'spiral', 'formation'];
            for (let i = 0; i < baseEnemyCount; i++) {
                const type = typePool[Math.floor(Math.random() * typePool.length)];
                enemies_list.push({ type, count: 1 + Math.floor(Math.random() * 2) });
            }
        }

        return enemies_list;
    }

    function spawnWaveEnemies(waveNum) {
        const wave = generateWave(waveNum);
        let index = 0;

        wave.forEach(group => {
            for (let i = 0; i < group.count; i++) {
                setTimeout(() => {
                    const x = Math.random() * (VIRTUAL_WIDTH - 40) + 20;
                    const enemy = new Enemy(group.type, x, -30);
                    enemies.push(enemy);
                    gameState.numEnemies = enemies.length;
                }, index * 300);
                index++;
            }
        });
    }

    function startNewWave() {
        gameState.wave += 1;
        gameState.mode = 'wave_transition';
        gameState.waveTransitionTimer = 2;
        gameState.waveTransitionText = `WAVE ${gameState.wave}`;
        spawnWaveEnemies(gameState.wave);
    }

    function initGame() {
        gameState.mode = 'playing';
        gameState.wave = 1;
        gameState.score = 0;
        gameState.combo = 0;
        gameState.kills = 0;
        gameState.health = 100;
        gameState.maxHealth = 100;
        gameState.screenShake = 0;
        gameState.screenShakeRotation = 0;
        gameState.screenFlash = 0;
        gameState.timeSurvived = 0;
        gameState.killStreak = 0;
        gameState.scoreMultiplier = 1;
        gameState.slowMotionTimer = 0;
        gameState.slowMotionSpeed = 1;

        player = new Player(gameState.selectedShip);
        gameState.health = player.hp;
        gameState.maxHealth = player.maxHp;

        bullets = [];
        enemies = [];
        explosions = [];
        particles = [];
        pickups = [];
        scorePopups = [];
        damageNumbers = [];
        killFeed = [];
        muzzleFlashes = [];

        spawnWaveEnemies(gameState.wave);
    }

    function updateGame() {
        gameState.timeSurvived += dt;

        // Update slow motion
        if (gameState.slowMotionTimer > 0) {
            gameState.slowMotionTimer -= dt;
            gameState.slowMotionSpeed = 0.3;
        } else {
            gameState.slowMotionSpeed = 1;
        }

        // Apply slow motion to dt for game logic
        const effectiveDt = dt * gameState.slowMotionSpeed;

        // Update hitstop/freeze frames
        if (gameState.hitStopFrames > 0) {
            gameState.hitStopFrames--;
            return; // Skip one frame
        }

        // Update chromatic aberration
        if (gameState.chromaAberrationTimer > 0) {
            gameState.chromaAberrationTimer -= dt;
        }

        // Update music ducking
        if (gameState.combo > 10) {
            musicDucking = 0.5;
        } else {
            musicDucking = 1;
        }

        // Player update
        player.update(keys, touchX, touchY, gameState);
        player.fire();

        // Magnet effect
        for (let pickup of pickups) {
            if (pickup.collected) continue;
            const dist = distance(player.x, player.y, pickup.x, pickup.y);
            const magnetRange = player.magnet * (1 + 0.3 * player.upgrades.magnet);
            if (dist < magnetRange) {
                const angle = Math.atan2(player.y - pickup.y, player.x - pickup.x);
                pickup.vx = Math.cos(angle) * 300;
                pickup.vy = Math.sin(angle) * 300;
            }
        }

        // Update bullets
        bullets = bullets.filter(bullet => {
            bullet.x += bullet.vx * effectiveDt;
            bullet.y += bullet.vy * effectiveDt;
            bullet.life -= effectiveDt;

            // Bullet trails
            particles.push({
                x: bullet.x,
                y: bullet.y,
                vx: bullet.vx * 0.3,
                vy: bullet.vy * 0.3,
                life: 0.1,
                color: bullet.color,
                size: bullet.size * 0.5,
            });

            return bullet.life > 0;
        });

        // Update enemies
        enemies = enemies.filter(enemy => {
            enemy.update(gameState);

            // Enemy shooting
            if (enemy.canShoot() && enemy.type !== 'boss') {
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                bullets.push({
                    x: enemy.x,
                    y: enemy.y,
                    vx: Math.cos(angle) * 150,
                    vy: Math.sin(angle) * 150,
                    life: 3,
                    type: 'enemy',
                    damage: 5,
                    piercing: 0,
                    color: '#ff3333',
                    size: 4,
                    isEnemy: true,
                });
            } else if (enemy.type === 'boss' && enemy.canShoot()) {
                // Boss attack patterns
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);

                // Spiral bullet pattern
                for (let i = 0; i < 8; i++) {
                    const spiralAngle = angle + (i / 8) * Math.PI * 2;
                    bullets.push({
                        x: enemy.x,
                        y: enemy.y,
                        vx: Math.cos(spiralAngle) * 120,
                        vy: Math.sin(spiralAngle) * 120,
                        life: 4,
                        type: 'enemy',
                        damage: 8,
                        piercing: 0,
                        color: '#ff00ff',
                        size: 5,
                        isEnemy: true,
                    });
                }
            }

            // Collision with player bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                if (bullet.isEnemy) continue;

                const dist = distance(bullet.x, bullet.y, enemy.x, enemy.y);
                if (dist < enemy.size + bullet.size) {
                    const isCrit = enemy.takeDamage(bullet.damage);

                    player.damageDealt += bullet.damage;

                    if (isCrit) {
                        gameState.screenShake = Math.max(gameState.screenShake, 0.3);
                        gameState.hitStopFrames = 2;
                    }

                    if (!bullet.piercing) {
                        bullets.splice(i, 1);
                    } else {
                        bullet.piercing--;
                    }

                    if (enemy.hp <= 0) {
                        createExplosion(enemy.x, enemy.y, 1.5, 0.4);
                        gameState.score += Math.floor(enemy.score * gameState.scoreMultiplier);
                        gameState.combo += 1;
                        gameState.comboTimer = 5;
                        gameState.kills += 1;
                        player.pickupsCollected += 1;
                        updateKillStreak();
                        addKillFeed(enemy);

                        if (enemy.type === 'boss') {
                            declareAchievement('boss_slayer');
                            gameState.slowMotionTimer = 1; // 1 second slow-mo on boss kill
                            createExplosion(enemy.x, enemy.y, 3, 1.5);
                        }

                        if (Math.random() < 0.3 + (gameState.wave * 0.05)) {
                            createPickup(enemy.x, enemy.y);
                        }

                        return false;
                    }

                    break;
                }
            }

            // Collision with player
            const pDist = distance(player.x, player.y, enemy.x, enemy.y);
            if (pDist < player.magnet + enemy.size && player.invulnTimer <= 0) {
                player.hp -= 10;
                gameState.health = player.hp;
                player.invulnTimer = 1;
                gameState.screenFlash = 0.2;
                gameState.screenFlashColor = '#ff0000';

                if (player.hp <= 0) {
                    gameState.mode = 'dead';
                    gameState.deathStats = {
                        kills: gameState.kills,
                        combo: gameState.combo,
                        gold: gameState.gold,
                        timeSurvived: gameState.timeSurvived,
                        wave: gameState.wave,
                    };
                    gameState.deaths += 1;
                    gameState.totalKills += gameState.kills;
                    savePersistentData();
                    return false;
                }
            }

            return true;
        });

        // Enemy spawn from pickups
        if (enemies.length === 0 && gameState.numEnemies === 0) {
            if (gameState.combo >= 10) {
                declareAchievement('combo_king');
            }
            if (gameState.combo >= 50) {
                declareAchievement('unstoppable');
            }
            startNewWave();
        }

        // Update pickups
        pickups = pickups.filter(pickup => {
            if (pickup.collected) {
                pickup.life -= effectiveDt;
                return pickup.life > 0;
            }

            pickup.vx *= 0.98;
            pickup.vy += 100 * effectiveDt;
            pickup.x += pickup.vx * effectiveDt;
            pickup.y += pickup.vy * effectiveDt;
            pickup.life -= effectiveDt;

            const dist = distance(player.x, player.y, pickup.x, pickup.y);
            if (dist < 20) {
                collectPickup(pickup, player);
            }

            return pickup.life > 0 && pickup.y < VIRTUAL_HEIGHT + 50;
        });

        // Update particles
        particles = particles.filter(p => {
            p.vx *= 0.98;
            p.vy *= 0.98;
            p.x += p.vx * effectiveDt;
            p.y += p.vy * effectiveDt;
            p.life -= effectiveDt;
            return p.life > 0;
        });

        // Update explosions
        explosions = explosions.filter(exp => {
            exp.life -= effectiveDt;
            exp.radius = (1 - exp.life / exp.maxLife) * exp.maxRadius;
            return exp.life > 0;
        });

        // Update muzzle flashes
        muzzleFlashes = muzzleFlashes.filter(mf => {
            mf.life -= dt;
            return mf.life > 0;
        });

        // Update damage numbers
        damageNumbers = damageNumbers.filter(dn => {
            dn.y -= 30 * dt;
            dn.life -= dt;
            return dn.life > 0;
        });

        // Update kill feed
        killFeed = killFeed.filter(kf => {
            kf.life -= dt;
            return kf.life > 0;
        });

        // Update combo timer
        gameState.comboTimer -= dt;
        if (gameState.comboTimer <= 0) {
            gameState.combo = 0;
            gameState.scoreMultiplier = 1;
        } else {
            gameState.scoreMultiplier = 1 + gameState.combo * 0.1;
        }

        // Update screen shake
        gameState.screenShake *= 0.9;

        // Camera lerp toward player movement
        const targetCameraX = player.vx * 0.1;
        const targetCameraY = player.vy * 0.1;
        gameState.cameraX += (targetCameraX - gameState.cameraX) * 0.1;
        gameState.cameraY += (targetCameraY - gameState.cameraY) * 0.1;
    }

            ctx.fillStyle = gameState.selectedShip === ship ? '#0ff' : '#888';
            ctx.lineWidth = gameState.selectedShip === ship ? 2 : 1;
            ctx.strokeStyle = ctx.fillStyle;
            ctx.strokeRect(x - 30, y - 30, 60, 60);

            ctx.fillStyle = SHIP_STATS[ship].hp > 100 ? '#ffff00' : SHIP_STATS[ship].speed > 250 ? '#ff00ff' : '#0f0';
            ctx.font = 'bold 18px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(ship.toUpperCase()[0], x, y + 8);

            ctx.fillStyle = '#aaa';
            ctx.font = '10px system-ui';
            ctx.fillText(SHIP_STATS[ship].name, x, y + 50);
        });

        // Start button
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(VIRTUAL_WIDTH / 2 - 60, 350, 120, 40);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 16px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('START', VIRTUAL_WIDTH / 2, 375);

        // Stats
        ctx.fillStyle = '#888';
        ctx.font = '12px system-ui';
        ctx.textAlign = 'left';
        ctx.fillText(`High Score: ${window.highScore}`, 10, VIRTUAL_HEIGHT - 60);
        ctx.fillText(`Total Kills: ${gameState.totalKills}`, 10, VIRTUAL_HEIGHT - 45);
        ctx.fillText(`Gold: ${gameState.gold}`, 10, VIRTUAL_HEIGHT - 30);
        ctx.fillText(`Prestige: ${gameState.prestigeLevel}`, 10, VIRTUAL_HEIGHT - 15);
    }

    function drawGame() {
        // Background with parallax
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        // Star field with camera
        if (stars.length === 0) {
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * VIRTUAL_WIDTH * 2,
                    y: Math.random() * VIRTUAL_HEIGHT * 2,
                    size: Math.random() * 0.5 + 0.5,
                    color: '#fff',
                });
            }
        }

        stars.forEach(star => {
            ctx.fillStyle = star.color;
            ctx.beginPath();
            ctx.arc(star.x - gameState.cameraX * 0.1, star.y - gameState.cameraY * 0.1, Math.max(0.1, star.size), 0, Math.PI * 2);
            ctx.fill();
        });

        // Apply screen shake with rotation
        ctx.save();
        ctx.translate(VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2);
        ctx.rotate(gameState.screenShakeRotation);
        ctx.translate(-VIRTUAL_WIDTH / 2, -VIRTUAL_HEIGHT / 2);

        if (gameState.screenShake > 0) {
            const shakeX = (Math.random() - 0.5) * gameState.screenShake * 10;
            const shakeY = (Math.random() - 0.5) * gameState.screenShake * 10;
            ctx.translate(shakeX, shakeY);
        }

        // Draw game objects
        explosions.forEach(exp => {
            ctx.strokeStyle = colorAlpha(exp.color, exp.life / exp.maxLife);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, Math.max(0.1, exp.radius), 0, Math.PI * 2);
            ctx.stroke();
        });

        particles.forEach(p => {
            ctx.fillStyle = colorAlpha(p.color, p.life);
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2);
            ctx.fill();
        });

        muzzleFlashes.forEach(mf => {
            ctx.fillStyle = colorAlpha('#ffff00', mf.life / 0.05);
            ctx.beginPath();
            ctx.arc(mf.x, mf.y, Math.max(0.1, mf.size), 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = colorAlpha('#ff8800', mf.life / 0.05 * 0.5);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(mf.x, mf.y, Math.max(0.1, mf.size * 1.5), 0, Math.PI * 2);
            ctx.stroke();
        });

        bullets.forEach(bullet => {
            ctx.fillStyle = bullet.color;
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, Math.max(0.1, bullet.size), 0, Math.PI * 2);
            ctx.fill();
        });

        enemies.forEach(enemy => enemy.draw(ctx));

        pickups.forEach(pickup => {
            if (pickup.collected) return;
            const type = POWERUP_TYPES[pickup.type];
            if (type) {
                ctx.fillStyle = type.color;
                ctx.font = 'bold 12px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(type.icon, pickup.x, pickup.y);
            } else {
                ctx.fillStyle = '#ffff00';
                ctx.fillText('$', pickup.x, pickup.y);
            }
        });

        player.draw(ctx);

        // Chromatic aberration on damage
        if (gameState.chromaAberrationTimer > 0) {
            const aberration = 3 * (gameState.chromaAberrationTimer / 0.2);
            ctx.fillStyle = colorAlpha('#ff0000', 0.1);
            ctx.fillRect(aberration, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
            ctx.fillStyle = colorAlpha('#00ff00', 0.1);
            ctx.fillRect(-aberration, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
        }

        damageNumbers.forEach(dn => {
            ctx.fillStyle = colorAlpha(dn.color, dn.life);
            ctx.font = 'bold 12px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(dn.text, dn.x, dn.y);
        });

        ctx.restore();

        // Draw UI (not affected by screen shake)

        // Screen flash
        if (gameState.screenFlash > 0) {
            ctx.fillStyle = colorAlpha(gameState.screenFlashColor, gameState.screenFlash);
            ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
            gameState.screenFlash -= dt;
        }

        // HUD - HP Bar with ghost bar
        ctx.fillStyle = '#333';
        ctx.fillRect(10, 10, 100, 8);
        const hpPercent = gameState.health / gameState.maxHealth;
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(10, 10, 100 * hpPercent, 8);

        // Combo meter
        ctx.fillStyle = '#666';
        ctx.fillRect(10, 20, 100, 6);
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(10, 20, 100 * Math.min(gameState.combo / 50, 1), 6);

        // Score
        ctx.fillStyle = '#0ff';
        ctx.font = 'bold 14px system-ui';
        ctx.textAlign = 'left';
        ctx.fillText(`Score: ${Math.floor(gameState.score)}`, 10, 50);

        // Combo display
        if (gameState.combo > 0) {
            ctx.fillStyle = gameState.combo > 20 ? '#ff00ff' : '#ffff00';
            ctx.font = 'bold 16px system-ui';
            ctx.fillText(`Combo x${gameState.combo}`, 10, 70);

            // Score multiplier scale
            ctx.fillStyle = '#ff8800';
            ctx.font = '12px system-ui';
            ctx.fillText(`x${gameState.scoreMultiplier.toFixed(1)}`, 10, 85);
        }

        // Wave
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(`WAVE ${gameState.wave}`, VIRTUAL_WIDTH / 2, 20);

        // Kill feed (top right)
        ctx.font = '10px system-ui';
        ctx.textAlign = 'right';
        killFeed.forEach((kf, i) => {
            ctx.fillStyle = colorAlpha(kf.color, kf.life / 3);
            ctx.fillText(`${kf.icon} ${kf.text}`, VIRTUAL_WIDTH - 10, 20 + i * 15);
        });

        // Message toast
        if (gameState.messageTimer > 0) {
            ctx.fillStyle = colorAlpha('#fff', gameState.messageTimer / 180);
            ctx.font = 'bold 14px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(gameState.messageText, VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2);
            gameState.messageTimer -= dt;
        }

        // FPS counter (toggleable)
        if (gameState.showFPS) {
            ctx.fillStyle = '#0f0';
            ctx.font = '10px system-ui';
            ctx.textAlign = 'right';
            ctx.fillText(`FPS: ${Math.round(1 / dt)}`, VIRTUAL_WIDTH - 10, VIRTUAL_HEIGHT - 10);
        }

        // Pause hint
        ctx.fillStyle = '#888';
        ctx.font = '10px system-ui';
        ctx.textAlign = 'right';
        ctx.fillText('ESC: Pause', VIRTUAL_WIDTH - 10, VIRTUAL_HEIGHT - 25);
    }

    function drawWaveTransition() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        const scale = 1 + Math.sin(gameState.waveTransitionTimer * Math.PI * 2) * 0.2;
        ctx.fillStyle = '#0ff';
        ctx.font = `bold ${32 * scale}px system-ui`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(gameState.waveTransitionText, VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT / 2);

        gameState.waveTransitionTimer -= dt;
        if (gameState.waveTransitionTimer <= 0) {
            gameState.mode = 'playing';
        }
    }

    function drawDead() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        // Death explosion effect
        ctx.fillStyle = colorAlpha('#ff0000', 0.3);
        ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 36px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', VIRTUAL_WIDTH / 2, 100);

        if (gameState.deathStats) {
            const stats = gameState.deathStats;
            ctx.fillStyle = '#fff';
            ctx.font = '14px system-ui';
            const lines = [
                `Wave: ${stats.wave}`,
                `Kills: ${stats.kills}`,
                `Max Combo: ${stats.combo}`,
                `Gold Earned: ${stats.gold}`,
                `Time Survived: ${stats.timeSurvived.toFixed(1)}s`,
            ];
            lines.forEach((line, i) => {
                ctx.fillText(line, VIRTUAL_WIDTH / 2, 180 + i * 30);
            });
        }

        ctx.fillStyle = '#00ff00';
        ctx.font = 'bold 14px system-ui';
        ctx.fillText('CLICK TO RETURN TO MENU', VIRTUAL_WIDTH / 2, VIRTUAL_HEIGHT - 50);

        // Update high score
        if (gameState.score > (window.highScore || 0)) {
            window.highScore = gameState.score;
            savePersistentData();
        }
    }

    function render() {
        // Clear canvas
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

        if (gameState.mode === 'menu') {
            drawMenu();
        } else if (gameState.mode === 'playing') {
            drawGame();
        } else if (gameState.mode === 'wave_transition') {
            drawGame();
            drawWaveTransition();
        } else if (gameState.mode === 'dead') {
            drawDead();
        }
    }

    // ============================================================================
    // EVENT HANDLING
    // ============================================================================

    window.addEventListener('keydown', e => {
        keys[e.key] = true;

        if (e.key === 'Escape') {
            if (gameState.mode === 'playing') {
                gameState.mode = 'menu';
            }
        }

        if (e.key === 'f' || e.key === 'F') {
            gameState.showFPS = !gameState.showFPS;
        }
    });

    window.addEventListener('keyup', e => {
        keys[e.key] = false;
    });

    canvas.addEventListener('touchstart', e => {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const scaleX = VIRTUAL_WIDTH / rect.width;
        const scaleY = VIRTUAL_HEIGHT / rect.height;
        touchX = (touch.clientX - rect.left) * scaleX;
        touchY = (touch.clientY - rect.top) * scaleY;

        if (gameState.mode === 'menu') {
            const startButtonY = 350;
            if (touchY > startButtonY && touchY < startButtonY + 40) {
                gameState.showTutorial = false;
                localStorage.setItem('nova_breach_tutorial_seen', '1');
                initGame();
            }

            // Ship selection
            const shipNames = Object.keys(SHIP_STATS);
            shipNames.forEach((ship, i) => {
                const x = 70 + i * 90;
                const y = 250;
                const dist = Math.sqrt((touchX - x) ** 2 + (touchY - y) ** 2);
                if (dist < 35) {
                    gameState.selectedShip = ship;
                }
            });

            // Tutorial toggle
            if (gameState.showTutorial && touchY > 400) {
                gameState.showTutorial = false;
            }
        } else if (gameState.mode === 'dead') {
            gameState.mode = 'menu';
        }
    });

    canvas.addEventListener('touchmove', e => {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const scaleX = VIRTUAL_WIDTH / rect.width;
        const scaleY = VIRTUAL_HEIGHT / rect.height;
        touchX = (touch.clientX - rect.left) * scaleX;
        touchY = (touch.clientY - rect.top) * scaleY;
    });

    canvas.addEventListener('touchend', e => {
        touchX = null;
        touchY = null;
    });

    canvas.addEventListener('click', e => {
        const rect = canvas.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * VIRTUAL_WIDTH;
        const y = ((e.clientY - rect.top) / rect.height) * VIRTUAL_HEIGHT;

        if (gameState.mode === 'menu') {
            const startButtonY = 350;
            if (y > startButtonY && y < startButtonY + 40) {
                gameState.showTutorial = false;
                localStorage.setItem('nova_breach_tutorial_seen', '1');
                initGame();
            }

            // Ship selection
            const shipNames = Object.keys(SHIP_STATS);
            shipNames.forEach((ship, i) => {
                const sx = 70 + i * 90;
                const sy = 250;
                const dist = Math.sqrt((x - sx) ** 2 + (y - sy) ** 2);
                if (dist < 35) {
                    gameState.selectedShip = ship;
                }
            });

            // Tutorial toggle
            if (gameState.showTutorial && y > 400) {
                gameState.showTutorial = false;
            }
        } else if (gameState.mode === 'dead') {
            gameState.mode = 'menu';
        }
    });

    // ============================================================================
    // MAIN GAME LOOP
    // ============================================================================

    let lastFrameTime = Date.now();
    let accumulator = 0;

    function gameLoop() {
        const now = Date.now();
        const frameTime = (now - lastFrameTime) / 1000;
        lastFrameTime = now;

        accumulator += frameTime;

        while (accumulator >= dt) {
            if (gameState.mode === 'playing' || gameState.mode === 'wave_transition') {
                updateGame();
            }
            accumulator -= dt;
        }

        render();
        requestAnimationFrame(gameLoop);
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================

    initAudio();
    loadPersistentData();

    // Start with menu
    gameState.mode = 'menu';

    gameLoop();
})();
    </script>
</body>
