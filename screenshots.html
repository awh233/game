<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VOID RIFT - App Store Screenshots</title>
<style>
body { background: #111; color: #fff; font-family: -apple-system, sans-serif; padding: 40px; text-align: center; }
h1 { color: #0ff; font-size: 24px; margin-bottom: 30px; }
.screenshots { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
.phone-frame {
  width: 300px;
  height: 650px;
  border: 3px solid #333;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  background: #000;
  flex-shrink: 0;
}
.phone-frame canvas {
  width: 100%;
  height: 100%;
}
.label { color: #888; font-size: 14px; margin-top: 10px; }
.notch {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 30px;
  background: #000;
  border-radius: 0 0 20px 20px;
  z-index: 10;
}
</style>
</head>
<body>
<h1>VOID RIFT — App Store Screenshot Previews</h1>
<p style="color:#888;margin-bottom:30px">These are static mockups. Take actual screenshots from the live game on an iPhone simulator.</p>
<div class="screenshots">

<div>
<div class="phone-frame">
<div class="notch"></div>
<canvas id="s1" width="420" height="910"></canvas>
</div>
<div class="label">1. Title Screen</div>
</div>

<div>
<div class="phone-frame">
<div class="notch"></div>
<canvas id="s2" width="420" height="910"></canvas>
</div>
<div class="label">2. Gameplay</div>
</div>

<div>
<div class="phone-frame">
<div class="notch"></div>
<canvas id="s3" width="420" height="910"></canvas>
</div>
<div class="label">3. Boss Battle</div>
</div>

<div>
<div class="phone-frame">
<div class="notch"></div>
<canvas id="s4" width="420" height="910"></canvas>
</div>
<div class="label">4. Level Up</div>
</div>

</div>

<script>
function drawScreenshot(id, drawFn) {
  var c = document.getElementById(id);
  var ctx = c.getContext('2d');
  var W = 420, H = 910;

  // Background
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0a2e');
  bg.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (var i = 0; i < 40; i++) {
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = Math.random() * 0.5 + 0.3;
    ctx.fillRect(Math.random()*W, Math.random()*H, Math.random()*2+0.5, Math.random()*2+0.5);
  }
  ctx.globalAlpha = 1;

  // Nebula hints
  ctx.fillStyle = 'rgba(200,50,150,0.08)';
  ctx.beginPath(); ctx.arc(100, 300, 50, 0, 6.28); ctx.fill();
  ctx.fillStyle = 'rgba(50,150,200,0.08)';
  ctx.beginPath(); ctx.arc(350, 600, 40, 0, 6.28); ctx.fill();

  drawFn(ctx, W, H);
}

function drawButton(ctx, cx, cy, w, h, text, color) {
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.strokeRect(cx-w/2, cy-h/2, w, h);
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = color;
  ctx.fillRect(cx-w/2, cy-h/2, w, h);
  ctx.globalAlpha = 1;
  ctx.fillStyle = color; ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text, cx, cy+7);
}

function drawShip(ctx, x, y, size) {
  var s = size/2;
  var g = ctx.createLinearGradient(x, y-s*1.2, x, y+s*0.8);
  g.addColorStop(0, '#0cf'); g.addColorStop(0.5, '#06f'); g.addColorStop(1, '#036');
  ctx.fillStyle = g;
  ctx.shadowColor = '#0cf'; ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(x, y-s*1.2); ctx.lineTo(x+s, y+s*0.8);
  ctx.lineTo(x+s*0.3, y+s*0.4); ctx.lineTo(x-s*0.3, y+s*0.4);
  ctx.lineTo(x-s, y+s*0.8);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  // Engine
  var fg = ctx.createLinearGradient(x, y+s*0.5, x, y+s*1.5);
  fg.addColorStop(0, '#f80'); fg.addColorStop(0.5, '#ff0'); fg.addColorStop(1, '#0cf');
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.moveTo(x-s*0.3, y+s*0.5); ctx.lineTo(x, y+s*1.4); ctx.lineTo(x+s*0.3, y+s*0.5);
  ctx.fill();
}

// Screenshot 1: Title Screen
drawScreenshot('s1', function(ctx, W, H) {
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0ff'; ctx.font = 'bold 60px monospace';
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
  ctx.fillText('VOID', W/2, 250);
  ctx.fillStyle = '#f0f'; ctx.shadowColor = '#f0f';
  ctx.fillText('RIFT', W/2, 320);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#888'; ctx.font = '14px monospace';
  ctx.fillText('COSMIC SURVIVOR', W/2, 360);
  ctx.fillText('v7.0', W/2, 380);
  drawButton(ctx, W/2, 460, 180, 50, 'PLAY', '#0ff');
  drawButton(ctx, W/2, 530, 180, 50, 'SHOP', '#ff0');
  drawButton(ctx, W/2, 600, 180, 50, 'STATS', '#0f0');
  drawButton(ctx, W/2, 670, 180, 50, 'DAILY', '#f0f');
  drawButton(ctx, W/2, 740, 180, 50, 'SKINS', '#f80');
  ctx.fillStyle = '#555'; ctx.font = '11px monospace';
  ctx.fillText('TAP or CLICK to START', W/2, H-60);
});

// Screenshot 2: Gameplay
drawScreenshot('s2', function(ctx, W, H) {
  // HUD
  ctx.fillStyle = '#333'; ctx.fillRect(10, 50, 120, 12);
  ctx.fillStyle = '#0f0'; ctx.fillRect(10, 50, 96, 12);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(10, 50, 120, 12);
  ctx.fillStyle = '#fff'; ctx.font = '10px monospace'; ctx.textAlign = 'left';
  ctx.fillText('HP: 4/5', 14, 60);
  ctx.fillStyle = '#333'; ctx.fillRect(10, 68, 120, 6);
  ctx.fillStyle = '#0ff'; ctx.fillRect(10, 68, 60, 6);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
  ctx.fillText('1250', W-10, 64);
  ctx.fillStyle = '#888'; ctx.font = '12px monospace';
  ctx.fillText('WAVE 3', W-10, 82);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#0ff'; ctx.font = '11px monospace';
  ctx.fillText('LV.2', 10, 88);
  ctx.fillStyle = '#ff0'; ctx.fillText('45G', 10, 102);
  // Combo
  ctx.textAlign = 'center'; ctx.fillStyle = '#f80';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('x5 COMBO', W/2, 70);

  // Player
  drawShip(ctx, W/2, H-200, 30);

  // Bullets
  ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 8;
  for (var i = 0; i < 6; i++) {
    var bx = W/2 + (Math.random()-0.5)*20;
    var by = H-250 - i*80;
    ctx.beginPath();
    ctx.ellipse(bx, by, 3, 8, 0, 0, 6.28);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Enemies
  var enemies = [
    {x:120, y:200, type:'drone', color:'#f55'},
    {x:300, y:150, type:'tank', color:'#f80'},
    {x:200, y:280, type:'shooter', color:'#f0f'},
    {x:350, y:350, type:'zigzag', color:'#5ff'},
  ];
  enemies.forEach(function(e) {
    ctx.fillStyle = e.color; ctx.shadowColor = e.color; ctx.shadowBlur = 6;
    if (e.type === 'drone') {
      ctx.beginPath(); ctx.moveTo(e.x, e.y-12); ctx.lineTo(e.x+12, e.y+12); ctx.lineTo(e.x-12, e.y+12); ctx.closePath(); ctx.fill();
    } else if (e.type === 'tank') {
      ctx.fillRect(e.x-18, e.y-18, 36, 36);
    } else if (e.type === 'shooter') {
      ctx.beginPath(); ctx.moveTo(e.x, e.y-13); ctx.lineTo(e.x+13, e.y); ctx.lineTo(e.x, e.y+13); ctx.lineTo(e.x-13, e.y); ctx.closePath(); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(e.x, e.y, 11, 0, 6.28); ctx.fill();
    }
    ctx.shadowBlur = 0;
  });

  // Enemy bullets
  ctx.fillStyle = '#f55'; ctx.shadowColor = '#f55'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.arc(250, 500, 4, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(180, 450, 4, 0, 6.28); ctx.fill();
  ctx.shadowBlur = 0;

  // Pickups
  ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(150, 400, 6, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#ff0'; ctx.fillRect(310, 440, 8, 8);

  // Dash indicator
  ctx.textAlign = 'right'; ctx.font = '11px monospace';
  ctx.fillStyle = '#0ff'; ctx.fillText('DASH READY', W-10, H-55);
});

// Screenshot 3: Boss Battle
drawScreenshot('s3', function(ctx, W, H) {
  // Warning overlay
  ctx.fillStyle = 'rgba(255,0,0,0.05)'; ctx.fillRect(0, 0, W, H);

  // Boss
  ctx.fillStyle = '#f0f'; ctx.shadowColor = '#f0f'; ctx.shadowBlur = 10;
  ctx.beginPath();
  for (var i = 0; i < 6; i++) {
    var a = i * Math.PI/3 - Math.PI/6;
    var ex = W/2 + Math.cos(a)*40;
    var ey = 200 + Math.sin(a)*40;
    if (i===0) ctx.moveTo(ex,ey); else ctx.lineTo(ex,ey);
  }
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;

  // Boss HP bar
  ctx.fillStyle = '#333'; ctx.fillRect(W/2-100, 140, 200, 10);
  ctx.fillStyle = '#f0f'; ctx.fillRect(W/2-100, 140, 130, 10);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(W/2-100, 140, 200, 10);
  ctx.fillStyle = '#fff'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillText('BOSS', W/2, 135);

  // Boss bullets (spiral pattern)
  ctx.fillStyle = '#f55'; ctx.shadowColor = '#f55'; ctx.shadowBlur = 4;
  for (var i = 0; i < 8; i++) {
    var ba = (i/8)*6.28;
    var bx = W/2 + Math.cos(ba)*80;
    var by = 200 + Math.sin(ba)*80;
    ctx.beginPath(); ctx.arc(bx, by, 4, 0, 6.28); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Minions
  ctx.fillStyle = '#f55'; ctx.shadowColor = '#f55'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.moveTo(120,350); ctx.lineTo(132,374); ctx.lineTo(108,374); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(320,320); ctx.lineTo(332,344); ctx.lineTo(308,344); ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;

  // Player
  drawShip(ctx, W/2, H-200, 30);

  // HUD
  ctx.fillStyle = '#333'; ctx.fillRect(10, 50, 120, 12);
  ctx.fillStyle = '#f00'; ctx.fillRect(10, 50, 48, 12);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(10, 50, 120, 12);
  ctx.fillStyle = '#fff'; ctx.font = '10px monospace'; ctx.textAlign = 'left';
  ctx.fillText('HP: 2/5', 14, 60);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
  ctx.fillText('3580', W-10, 64);
  ctx.fillStyle = '#888'; ctx.font = '12px monospace';
  ctx.fillText('WAVE 5', W-10, 82);
});

// Screenshot 4: Level Up
drawScreenshot('s4', function(ctx, W, H) {
  // Darken
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#0ff'; ctx.font = 'bold 32px monospace';
  ctx.fillText('LEVEL UP!', W/2, 280);
  ctx.fillStyle = '#fff'; ctx.font = '16px monospace';
  ctx.fillText('Level 3', W/2, 320);
  ctx.fillText('Choose an upgrade:', W/2, 350);

  var choices = [
    {name: 'FIRE RATE+', desc: 'Shoot faster'},
    {name: 'DAMAGE+', desc: 'Deal more damage'},
    {name: '+1 MAX HP', desc: 'Increase maximum health'}
  ];
  for (var i = 0; i < 3; i++) {
    var iy = 420 + i*90;
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
    ctx.strokeRect(70, iy-30, W-140, 60);
    ctx.fillStyle = 'rgba(0,255,255,0.1)';
    ctx.fillRect(70, iy-30, W-140, 60);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
    ctx.fillText(choices[i].name, W/2, iy);
    ctx.fillStyle = '#888'; ctx.font = '12px monospace';
    ctx.fillText(choices[i].desc, W/2, iy+20);
  }
});
</script>
</body>
</html>
